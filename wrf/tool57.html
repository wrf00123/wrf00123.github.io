<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED广告牌模拟器</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2.5em;
    background: linear-gradient(90deg, #ff0000, #ff6600, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
  }

  .led-display-wrapper {
    background: #0a0a0a;
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 
      0 0 50px rgba(255, 0, 0, 0.2),
      inset 0 0 100px rgba(0, 0, 0, 0.8);
    border: 4px solid #222;
    position: relative;
    overflow: hidden;
  }

  .led-frame {
    background: #000;
    border-radius: 10px;
    padding: 20px;
    box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9);
    overflow: hidden;
  }

  #ledCanvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .control-panel {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .control-panel h2 {
    font-size: 1.2em;
    margin-bottom: 15px;
    color: #00ffff;
    border-bottom: 1px solid rgba(0, 255, 255, 0.3);
    padding-bottom: 8px;
  }

  .control-group {
    margin-bottom: 15px;
  }

  .control-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9em;
    color: #ccc;
  }

  .control-group input[type="text"],
  .control-group textarea,
  .control-group select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(0, 0, 0, 0.5);
    color: #fff;
    font-size: 14px;
    transition: all 0.3s;
  }

  .control-group input[type="text"]:focus,
  .control-group textarea:focus,
  .control-group select:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
  }

  .control-group textarea {
    resize: vertical;
    min-height: 80px;
    font-family: monospace;
  }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-group input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.2);
    outline: none;
  }

  .slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00ffff, #0080ff);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    transition: transform 0.2s;
  }

  .slider-group input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .slider-value {
    min-width: 50px;
    text-align: right;
    font-family: monospace;
    font-size: 14px;
    color: #00ffff;
  }

  .color-picker-group {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .color-picker-group input[type="color"] {
    width: 50px;
    height: 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
  }

  .color-presets {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .color-preset {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }

  .color-preset:hover {
    transform: scale(1.1);
    border-color: #fff;
  }

  .color-preset.active {
    border-color: #fff;
    box-shadow: 0 0 10px currentColor;
  }

  .btn-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #00ffff, #0080ff);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 14px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
  }

  button:active {
    transform: translateY(0);
  }

  button.secondary {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  button.secondary:hover {
    background: rgba(255, 255, 255, 0.2);
    box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
  }

  button.danger {
    background: linear-gradient(135deg, #ff4444, #cc0000);
    color: #fff;
  }

  button.danger:hover {
    box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
  }

  .toggle-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .toggle-btn {
    padding: 8px 16px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #ccc;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.3s;
  }

  .toggle-btn.active {
    background: linear-gradient(135deg, #00ffff, #0080ff);
    color: #000;
    border-color: transparent;
    font-weight: bold;
  }

  .effect-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .effect-btn {
    padding: 8px;
    font-size: 12px;
    text-align: center;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    cursor: pointer;
    transition: all 0.2s;
    color: #ccc;
  }

  .effect-btn:hover {
    background: rgba(0, 255, 255, 0.2);
    border-color: #00ffff;
  }

  .effect-btn.active {
    background: rgba(0, 255, 255, 0.3);
    border-color: #00ffff;
    color: #fff;
  }

  .stats-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 10px;
    margin-top: 15px;
    font-family: monospace;
    font-size: 13px;
    color: #888;
  }

  .stats-bar span {
    color: #00ffff;
  }

  .preview-section {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    padding: 25px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 30px;
  }

  .preview-section h2 {
    font-size: 1.2em;
    margin-bottom: 15px;
    color: #00ffff;
    border-bottom: 1px solid rgba(0, 255, 255, 0.3);
    padding-bottom: 8px;
  }

  .font-preview {
    background: #000;
    padding: 20px;
    border-radius: 10px;
    overflow-x: auto;
  }

  .fullscreen-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    z-index: 10;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    opacity: 0;
  }

  .led-display-wrapper:hover .fullscreen-btn {
    opacity: 1;
  }

  .fullscreen-btn:hover {
    background: rgba(0, 255, 255, 0.3);
    border-color: #00ffff;
  }

  .led-display-wrapper:fullscreen,
  .led-display-wrapper:-webkit-full-screen {
    width: 100vw;
    height: 100vh;
    margin: 0;
    border-radius: 0;
    border: none;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .led-display-wrapper:fullscreen .led-frame,
  .led-display-wrapper:-webkit-full-screen .led-frame {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .led-display-wrapper:fullscreen #ledCanvas,
  .led-display-wrapper:-webkit-full-screen #ledCanvas {
    max-height: 85vh;
    width: 100% !important;
    height: auto !important;
    max-width: 100%;
  }

  .led-display-wrapper:fullscreen .stats-bar,
  .led-display-wrapper:-webkit-full-screen .stats-bar {
    margin-top: 20px;
  }

  .color-screen .led-frame {
    background: linear-gradient(135deg, #0a1628 0%, #0d2137 100%);
    box-shadow: 
      inset 0 0 50px rgba(0, 150, 255, 0.1),
      0 0 30px rgba(0, 100, 200, 0.3);
    border: 2px solid rgba(0, 150, 255, 0.3);
    position: relative;
  }

  .color-screen .led-frame::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(
      transparent 50%,
      rgba(0, 0, 0, 0.05) 50%
    );
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 1;
  }

  .color-screen.led-display-wrapper {
    background: linear-gradient(135deg, #0a1628 0%, #0d2137 50%, #0a1628 100%);
    box-shadow: 
      0 0 60px rgba(0, 100, 200, 0.3),
      inset 0 0 80px rgba(0, 50, 100, 0.4);
    border-color: rgba(0, 150, 255, 0.3);
  }

  @media (max-width: 768px) {
    h1 {
      font-size: 1.8em;
    }
    .controls {
      grid-template-columns: 1fr;
    }
    .led-display-wrapper {
      padding: 15px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>✨ LED 广告牌模拟器 ✨</h1>

  <div class="led-display-wrapper" id="displayWrapper">
    <button class="fullscreen-btn" id="floatingFullscreenBtn" title="全屏显示">⛶</button>
    <div class="led-frame">
      <canvas id="ledCanvas"></canvas>
    </div>
    <div class="stats-bar">
      <div>点阵大小: <span id="dotMatrixSize">--</span></div>
      <div>滚动速度: <span id="currentSpeed">--</span></div>
      <div>FPS: <span id="fpsDisplay">--</span></div>
      <div>字符数: <span id="charCount">--</span></div>
    </div>
  </div>

  <div class="controls">
    <div class="control-panel">
      <h2>📝 文字内容</h2>
      <div class="control-group">
        <label>显示文字</label>
        <textarea id="textInput" placeholder="请输入要显示的文字...">欢迎使用LED广告牌模拟器！</textarea>
      </div>
      <div class="control-group">
        <label>字体选择</label>
        <select id="fontSelect">
          <option value="5x7">标准 5×7</option>
          <option value="3x5">迷你 3×5</option>
          <option value="7x9">大号 7×9</option>
          <option value="8x16">高清 8×16</option>
        </select>
      </div>
      <div class="control-group">
        <label>字符间距</label>
        <div class="slider-group">
          <input type="range" id="charSpacing" min="0" max="5" value="1" step="1">
          <span class="slider-value" id="charSpacingValue">1</span>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <h2>🎨 颜色设置</h2>
      <div class="control-group">
        <label>LED 亮灯颜色</label>
        <div class="color-picker-group">
          <input type="color" id="ledColor" value="#ff0000">
          <div class="color-presets" id="colorPresets">
            <div class="color-preset active" style="background:#ff0000" data-color="#ff0000"></div>
            <div class="color-preset" style="background:#00ff00" data-color="#00ff00"></div>
            <div class="color-preset" style="background:#0000ff" data-color="#0000ff"></div>
            <div class="color-preset" style="background:#ffff00" data-color="#ffff00"></div>
            <div class="color-preset" style="background:#ff00ff" data-color="#ff00ff"></div>
            <div class="color-preset" style="background:#00ffff" data-color="#00ffff"></div>
            <div class="color-preset" style="background:#ffffff" data-color="#ffffff"></div>
            <div class="color-preset" style="background:#ff6600" data-color="#ff6600"></div>
          </div>
        </div>
      </div>
      <div class="control-group">
        <label>背景颜色</label>
        <div class="color-picker-group">
          <input type="color" id="bgColor" value="#000000">
          <div class="color-presets">
            <div class="color-preset active" style="background:#000000" data-color="#000000" data-target="bgColor"></div>
            <div class="color-preset" style="background:#1a1a2e" data-color="#1a1a2e" data-target="bgColor"></div>
            <div class="color-preset" style="background:#0a0a0a" data-color="#0a0a0a" data-target="bgColor"></div>
            <div class="color-preset" style="background:#1a0a0a" data-color="#1a0a0a" data-target="bgColor"></div>
          </div>
        </div>
      </div>
      <div class="control-group">
        <label>LED 亮度</label>
        <div class="slider-group">
          <input type="range" id="brightness" min="10" max="100" value="100">
          <span class="slider-value" id="brightnessValue">100%</span>
        </div>
      </div>
      <div class="control-group">
        <label>发光效果</label>
        <div class="slider-group">
          <input type="range" id="glow" min="0" max="30" value="8">
          <span class="slider-value" id="glowValue">8px</span>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <h2>⚡ 滚动控制</h2>
      <div class="control-group">
        <label>滚动速度</label>
        <div class="slider-group">
          <input type="range" id="speed" min="0.1" max="30" value="3" step="0.1">
          <span class="slider-value" id="speedValue">3.0</span>
        </div>
      </div>
      <div class="control-group">
        <label>滚动方向</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-direction="left">← 向左</button>
          <button class="toggle-btn" data-direction="right">向右 →</button>
        </div>
      </div>
      <div class="control-group">
        <label>滚动模式</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-mode="scroll">连续滚动</button>
          <button class="toggle-btn" data-mode="bounce">弹跳</button>
          <button class="toggle-btn" data-mode="static">静止</button>
        </div>
      </div>
      <div class="control-group">
        <label>播放控制</label>
        <div class="btn-group">
          <button id="playPauseBtn">⏸ 暂停</button>
          <button class="secondary" id="resetBtn">↺ 重置</button>
          <button class="secondary" id="fullscreenBtn">⛶ 全屏</button>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <h2>🔧 显示设置</h2>
      <div class="control-group">
        <label>LED 点大小</label>
        <div class="slider-group">
          <input type="range" id="dotSize" min="2" max="12" value="6" step="1">
          <span class="slider-value" id="dotSizeValue">6px</span>
        </div>
      </div>
      <div class="control-group">
        <label>点间距</label>
        <div class="slider-group">
          <input type="range" id="dotSpacing" min="0" max="5" value="2" step="1">
          <span class="slider-value" id="dotSpacingValue">2px</span>
        </div>
      </div>
      <div class="control-group">
        <label>显示行数</label>
        <div class="slider-group">
          <input type="range" id="rows" min="7" max="32" value="16" step="1">
          <span class="slider-value" id="rowsValue">16</span>
        </div>
      </div>
      <div class="control-group">
        <label>点阵形状</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-shape="circle">圆形</button>
          <button class="toggle-btn" data-shape="square">方形</button>
        </div>
      </div>
      <div class="control-group">
        <label>显示模式</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-display-mode="led">LED点阵</button>
          <button class="toggle-btn" data-display-mode="color">现代彩屏</button>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <h2>🌈 特效模式</h2>
      <div class="control-group">
        <label>动画效果</label>
        <div class="effect-grid">
          <div class="effect-btn active" data-effect="none">无特效</div>
          <div class="effect-btn" data-effect="rainbow">彩虹</div>
          <div class="effect-btn" data-effect="blink">闪烁</div>
          <div class="effect-btn" data-effect="fade">渐变</div>
          <div class="effect-btn" data-effect="pulse">脉冲</div>
          <div class="effect-btn" data-effect="fire">火焰</div>
        </div>
      </div>
      <div class="control-group">
        <label>特效速度</label>
        <div class="slider-group">
          <input type="range" id="effectSpeed" min="1" max="20" value="5">
          <span class="slider-value" id="effectSpeedValue">5</span>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <h2>💾 预设 & 导出</h2>
      <div class="control-group">
        <label>快速预设</label>
        <div class="btn-group">
          <button class="secondary" onclick="applyPreset('classic')">经典红</button>
          <button class="secondary" onclick="applyPreset('neon')">霓虹蓝</button>
          <button class="secondary" onclick="applyPreset('christmas')">圣诞</button>
          <button class="secondary" onclick="applyPreset('warning')">警示</button>
        </div>
      </div>
      <div class="control-group">
        <label>导出图片</label>
        <div class="btn-group">
          <button onclick="exportImage()">📷 导出PNG</button>
          <button class="secondary" onclick="copySettings()">📋 复制配置</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const FONT_DATA = {
  '5x7': {
    width: 5,
    height: 7,
    chars: {}
  },
  '3x5': {
    width: 3,
    height: 5,
    chars: {}
  },
  '7x9': {
    width: 7,
    height: 9,
    chars: {}
  },
  '8x16': {
    width: 8,
    height: 16,
    chars: {}
  }
};

function generateFont_5x7() {
  const font = {};
  const base = {
    ' ': [0x00,0x00,0x00,0x00,0x00],
    '!': [0x00,0x00,0x5F,0x00,0x00],
    '"': [0x00,0x07,0x00,0x07,0x00],
    '#': [0x14,0x7F,0x14,0x7F,0x14],
    '$': [0x24,0x2A,0x7F,0x2A,0x12],
    '%': [0x23,0x13,0x08,0x64,0x62],
    '&': [0x36,0x49,0x55,0x22,0x50],
    "'": [0x00,0x05,0x03,0x00,0x00],
    '(': [0x00,0x1C,0x22,0x41,0x00],
    ')': [0x00,0x41,0x22,0x1C,0x00],
    '*': [0x08,0x2A,0x1C,0x2A,0x08],
    '+': [0x08,0x08,0x3E,0x08,0x08],
    ',': [0x00,0x50,0x30,0x00,0x00],
    '-': [0x08,0x08,0x08,0x08,0x08],
    '.': [0x00,0x60,0x60,0x00,0x00],
    '/': [0x20,0x10,0x08,0x04,0x02],
    '0': [0x3E,0x51,0x49,0x45,0x3E],
    '1': [0x00,0x42,0x7F,0x40,0x00],
    '2': [0x42,0x61,0x51,0x49,0x46],
    '3': [0x21,0x41,0x45,0x4B,0x31],
    '4': [0x18,0x14,0x12,0x7F,0x10],
    '5': [0x27,0x45,0x45,0x45,0x39],
    '6': [0x3C,0x4A,0x49,0x49,0x30],
    '7': [0x01,0x71,0x09,0x05,0x03],
    '8': [0x36,0x49,0x49,0x49,0x36],
    '9': [0x06,0x49,0x49,0x29,0x1E],
    ':': [0x00,0x36,0x36,0x00,0x00],
    ';': [0x00,0x56,0x36,0x00,0x00],
    '<': [0x00,0x08,0x14,0x22,0x41],
    '=': [0x14,0x14,0x14,0x14,0x14],
    '>': [0x41,0x22,0x14,0x08,0x00],
    '?': [0x02,0x01,0x51,0x09,0x06],
    '@': [0x32,0x49,0x79,0x41,0x3E],

function generateFont_7x9() {
  const font = {};
  const base5x7 = generateFont_5x7();
  for (let c in base5x7) {
    const arr = [];
    const src = base5x7[c];
    for (let i = 0; i < 7; i++) {
      if (i < 5) {
        arr[i] = (src[i] << 1) & 0xFE;
      } else {
        arr[i] = 0;
      }
    }
    font[c] = arr;
  }
  return font;
}

function generateFont_8x16() {
  const font = {};
  const base5x7 = generateFont_5x7();
  for (let c in base5x7) {
    const arr = [];
    const src = base5x7[c];
    for (let i = 0; i < 8; i++) {
      let val = 0;
      if (i < 5) {
        val = src[i] << 4;
      }
      arr[i] = val;
    }
    font[c] = arr;
  }
  return font;
}

FONT_DATA['5x7'].chars = generateFont_5x7();
FONT_DATA['3x5'].chars = generateFont_3x5();
FONT_DATA['7x9'].chars = generateFont_7x9();
FONT_DATA['8x16'].chars = generateFont_8x16();

function getCharPattern(char, fontName) {
  const font = FONT_DATA[fontName];
  if (!font) return null;
  
  if (char.charCodeAt(0) > 127 || isCJK(char)) {
    return generateCJKPattern(char, font);
  }
  
  if (font.chars[char]) return font.chars[char];
  const upper = char.toUpperCase();
  const lower = char.toLowerCase();
  if (font.chars[upper]) return font.chars[upper];
  if (font.chars[lower]) return font.chars[lower];
  return font.chars['?'] || [0x00];
}

const textRenderCanvas = document.createElement('canvas');
const textRenderCtx = textRenderCanvas.getContext('2d');
const cjkCache = {};

function isCJK(char) {
  const code = char.charCodeAt(0);
  return (
    (code >= 0x4E00 && code <= 0x9FFF) ||
    (code >= 0x3400 && code <= 0x4DBF) ||
    (code >= 0x3000 && code <= 0x303F) ||
    (code >= 0xFF00 && code <= 0xFFEF) ||
    (code >= 0x3040 && code <= 0x309F) ||
    (code >= 0x30A0 && code <= 0x30FF)
  );
}

function generateCJKPattern(char, font) {
  const w = font.width;
  const h = font.height;
  const isCjkChar = isCJK(char);
  const actualWidth = isCjkChar ? Math.ceil(w * 1.6) : w;
  const cacheKey = char + '_' + actualWidth + 'x' + h;
  
  if (cjkCache[cacheKey]) return cjkCache[cacheKey];

  const scale = 8;

  textRenderCanvas.width = actualWidth * scale;
  textRenderCanvas.height = h * scale;
  textRenderCtx.clearRect(0, 0, textRenderCanvas.width, textRenderCanvas.height);
  textRenderCtx.fillStyle = '#ffffff';
  textRenderCtx.textAlign = 'center';
  textRenderCtx.textBaseline = 'middle';

  const fontSize = Math.floor(h * scale * 0.85);
  textRenderCtx.font = `bold ${fontSize}px "Microsoft YaHei", "PingFang SC", "SimHei", "WenQuanYi Micro Hei", "Noto Sans CJK SC", sans-serif`;

  textRenderCtx.fillText(char, (actualWidth * scale) / 2, (h * scale) / 2 + scale * 0.5);

  const imageData = textRenderCtx.getImageData(0, 0, actualWidth * scale, h * scale);
  const data = imageData.data;

  const pattern = [];
  const threshold = 80;
  
  for (let x = 0; x < actualWidth; x++) {
    let col = 0;
    for (let y = 0; y < h; y++) {
      let total = 0;
      let count = 0;
      for (let sx = 0; sx < scale; sx++) {
        for (let sy = 0; sy < scale; sy++) {
          const px = x * scale + sx;
          const py = y * scale + sy;
          const idx = (py * actualWidth * scale + px) * 4;
          total += data[idx];
          count++;
        }
      }
      const avg = total / count;
      if (avg > threshold) {
        col |= (1 << y);
      }
    }
    pattern.push(col);
  }

  cjkCache[cacheKey] = pattern;
  return pattern;
}

const canvas = document.getElementById('ledCanvas');
const ctx = canvas.getContext('2d');

let state = {
  text: '欢迎使用LED广告牌模拟器！',
  font: '5x7',
  charSpacing: 1,
  ledColor: '#ff0000',
  bgColor: '#000000',
  brightness: 100,
  glow: 8,
  speed: 3,
  direction: 'left',
  mode: 'scroll',
  dotSize: 6,
  dotSpacing: 2,
  rows: 16,
  shape: 'circle',
  effect: 'none',
  effectSpeed: 5,
  isPlaying: true,
  offset: 0,
  bounceDir: 1,
  frameCount: 0,
  lastFrameTime: performance.now(),
  fps: 0,
  displayMode: 'led'
};

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? {
    r: parseInt(result[1], 16),
    g: parseInt(result[2], 16),
    b: parseInt(result[3], 16)
  } : { r: 255, g: 0, b: 0 };
}

function getRainbowColor(offset, speed) {
  const hue = (offset * speed) % 360;
  return hslToRgb(hue, 100, 50);
}

function hslToRgb(h, s, l) {
  s /= 100;
  l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n =>
    l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return {
    r: Math.round(f(0) * 255),
    g: Math.round(f(8) * 255),
    b: Math.round(f(4) * 255)
  };
}

function getFireColor(intensity) {
  if (intensity > 0.8) return { r: 255, g: 255, b: 150 };
  if (intensity > 0.6) return { r: 255, g: 200, b: 50 };
  if (intensity > 0.4) return { r: 255, g: 120, b: 0 };
  if (intensity > 0.2) return { r: 200, g: 50, b: 0 };
  return { r: 100, g: 20, b: 0 };
}

function getCharWidth(char, fontName) {
  const font = FONT_DATA[fontName];
  if (!font) return 0;
  const pattern = getCharPattern(char, fontName);
  return pattern.length;
}

function getTextWidth(text, fontName) {
  let width = 0;
  for (let i = 0; i < text.length; i++) {
    width += getCharWidth(text[i], fontName) + state.charSpacing;
  }
  return Math.max(1, width - state.charSpacing);
}

function getTextMatrix(text, fontName, rows) {
  const font = FONT_DATA[fontName];
  const fontHeight = font.height;
  const textWidth = getTextWidth(text, fontName);
  const yOffset = Math.floor((rows - fontHeight) / 2);
  
  const matrix = [];
  for (let y = 0; y < rows; y++) {
    matrix.push(new Array(textWidth).fill(false));
  }
  
  let xPos = 0;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const pattern = getCharPattern(char, fontName);
    const charWidth = pattern.length;
    for (let x = 0; x < charWidth; x++) {
      const col = pattern[x] || 0;
      for (let y = 0; y < fontHeight; y++) {
        const drawY = y + yOffset;
        if (drawY >= 0 && drawY < rows) {
          if (col & (1 << y)) {
            matrix[drawY][xPos + x] = true;
          }
        }
      }
    }
    xPos += charWidth + state.charSpacing;
  }
  
  return { matrix, width: textWidth, height: rows };
}

function resizeCanvas() {
  const container = canvas.parentElement;
  
  if (state.displayMode === 'color') {
    const containerWidth = container.clientWidth;
    const aspectRatio = 6;
    const actualHeight = Math.min(containerWidth / aspectRatio, 200, window.innerHeight * 0.3);
    const actualWidth = containerWidth;
    
    canvas.width = actualWidth;
    canvas.height = actualHeight;
    canvas.style.width = '100%';
    canvas.style.height = actualHeight + 'px';
    
    document.getElementById('dotMatrixSize').textContent = '彩屏模式';
  } else {
    const totalDotSize = state.dotSize + state.dotSpacing;
    const cols = Math.floor(container.clientWidth / totalDotSize);
    const actualWidth = cols * totalDotSize;
    const actualHeight = state.rows * totalDotSize;
    
    canvas.width = actualWidth;
    canvas.height = actualHeight;
    canvas.style.width = actualWidth + 'px';
    canvas.style.height = actualHeight + 'px';
    
    document.getElementById('dotMatrixSize').textContent = `${cols} × ${state.rows}`;
  }
}

function drawLED(x, y, color) {
  const size = state.dotSize;
  const spacing = state.dotSpacing;
  const totalSize = size + spacing;
  const px = x * totalSize + spacing / 2;
  const py = y * totalSize + spacing / 2;
  
  const brightness = state.brightness / 100;
  const r = Math.min(255, Math.round(color.r * brightness));
  const g = Math.min(255, Math.round(color.g * brightness));
  const b = Math.min(255, Math.round(color.b * brightness));
  
  ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 1)`;
  
  if (state.glow > 0) {
    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.8)`;
    ctx.shadowBlur = state.glow;
  } else {
    ctx.shadowBlur = 0;
  }
  
  if (state.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(px + size / 2, py + size / 2, size / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillRect(px, py, size, size);
  }
  
  ctx.shadowBlur = 0;
}

function drawDimLED(x, y) {
  const size = state.dotSize;
  const spacing = state.dotSpacing;
  const totalSize = size + spacing;
  const px = x * totalSize + spacing / 2;
  const py = y * totalSize + spacing / 2;
  
  const bgRgb = hexToRgb(state.bgColor);
  const dimR = Math.min(255, bgRgb.r + 10);
  const dimG = Math.min(255, bgRgb.g + 10);
  const dimB = Math.min(255, bgRgb.b + 10);
  
  ctx.fillStyle = `rgba(${dimR}, ${dimG}, ${dimB}, 0.3)`;
  
  if (state.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(px + size / 2, py + size / 2, size / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillRect(px, py, size, size);
  }
}

function getEffectColor(x, y, isOn, baseRgb) {
  if (!isOn) return null;
  
  const frame = state.frameCount;
  const speed = state.effectSpeed;
  
  switch (state.effect) {
    case 'rainbow':
      return getRainbowColor(x + frame * speed * 0.5, 3);
    
    case 'blink':
      const blinkOn = Math.sin(frame * speed * 0.1) > 0;
      return blinkOn ? baseRgb : null;
    
    case 'fade':
      const fadeVal = (Math.sin(frame * speed * 0.05 + x * 0.2) + 1) / 2;
      return {
        r: Math.round(baseRgb.r * fadeVal),
        g: Math.round(baseRgb.g * fadeVal),
        b: Math.round(baseRgb.b * fadeVal)
      };
    
    case 'pulse':
      const pulseVal = Math.max(0, Math.sin(frame * speed * 0.08));
      return {
        r: Math.min(255, Math.round(baseRgb.r * (0.5 + pulseVal * 0.5))),
        g: Math.min(255, Math.round(baseRgb.g * (0.5 + pulseVal * 0.5))),
        b: Math.min(255, Math.round(baseRgb.b * (0.5 + pulseVal * 0.5)))
      };
    
    case 'fire':
      const fireIntensity = 0.3 + Math.random() * 0.7;
      const fireBase = getFireColor(fireIntensity);
      return {
        r: Math.round(fireBase.r * 0.7 + baseRgb.r * 0.3),
        g: Math.round(fireBase.g * 0.7 + baseRgb.g * 0.3),
        b: Math.round(fireBase.b * 0.7 + baseRgb.b * 0.3)
      };
    
    default:
      return baseRgb;
  }
}

function render() {
  if (state.displayMode === 'color') {
    renderColorScreen();
  } else {
    renderLEDScreen();
  }
  
  state.frameCount++;
  
  const now = performance.now();
  const delta = now - state.lastFrameTime;
  if (delta >= 1000) {
    state.fps = Math.round(state.frameCount * 1000 / delta);
    state.frameCount = 0;
    state.lastFrameTime = now;
    document.getElementById('fpsDisplay').textContent = state.fps;
  }
}

function renderColorScreen() {
  const bgRgb = hexToRgb(state.bgColor);
  
  const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bgGradient.addColorStop(0, `rgb(${Math.min(255, bgRgb.r + 30)}, ${Math.min(255, bgRgb.g + 30)}, ${Math.min(255, bgRgb.b + 50)})`);
  bgGradient.addColorStop(0.5, state.bgColor);
  bgGradient.addColorStop(1, `rgb(${Math.max(0, bgRgb.r - 10)}, ${Math.max(0, bgRgb.g - 10)}, ${Math.max(0, bgRgb.b - 20)})`);
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  const baseRgb = hexToRgb(state.ledColor);
  const fontSize = Math.floor(canvas.height * 0.7);
  
  ctx.save();
  ctx.font = `bold ${fontSize}px "Microsoft YaHei", "PingFang SC", "SimHei", "WenQuanYi Micro Hei", "Noto Sans CJK SC", sans-serif`;
  ctx.textBaseline = 'middle';
  
  const textMetrics = ctx.measureText(state.text);
  const textWidth = textMetrics.width;
  const padding = canvas.height * 0.8;
  const totalTextWidth = textWidth + padding;
  
  let offsetX = state.offset;
  const speed = state.speed * 0.8;
  
  if (state.isPlaying) {
    if (state.mode === 'static') {
      offsetX = (canvas.width - textWidth) / 2;
    } else if (state.mode === 'bounce') {
      const maxX = canvas.width * 0.05;
      const minX = canvas.width - textWidth - canvas.width * 0.05;
      
      if (offsetX >= maxX) {
        state.bounceDir = -1;
      } else if (offsetX <= minX) {
        state.bounceDir = 1;
      }
      state.offset += speed * state.bounceDir * (state.direction === 'left' ? 1 : -1);
      offsetX = state.offset;
    } else {
      if (state.direction === 'left') {
        state.offset -= speed;
        if (state.offset <= -totalTextWidth) {
          state.offset = canvas.width;
        }
      } else {
        state.offset += speed;
        if (state.offset >= canvas.width) {
          state.offset = -totalTextWidth;
        }
      }
      offsetX = state.offset;
    }
  }
  
  const drawText = (x) => {
    ctx.save();
    
    const brightness = state.brightness / 100;
    let r = Math.min(255, Math.round(baseRgb.r * brightness));
    let g = Math.min(255, Math.round(baseRgb.g * brightness));
    let b = Math.min(255, Math.round(baseRgb.b * brightness));
    
    if (state.effect === 'rainbow') {
      const hue = (state.frameCount * state.effectSpeed) % 360;
      const rainbowColor = hslToRgb(hue, 100, 60);
      r = rainbowColor.r;
      g = rainbowColor.g;
      b = rainbowColor.b;
    } else if (state.effect === 'blink') {
      const blinkOn = Math.sin(state.frameCount * state.effectSpeed * 0.08) > 0;
      if (!blinkOn) {
        r = Math.round(r * 0.15);
        g = Math.round(g * 0.15);
        b = Math.round(b * 0.15);
      }
    } else if (state.effect === 'pulse') {
      const pulseVal = (Math.sin(state.frameCount * state.effectSpeed * 0.06) + 1) / 2;
      const pulseFactor = 0.4 + pulseVal * 0.6;
      r = Math.min(255, Math.round(r * pulseFactor));
      g = Math.min(255, Math.round(g * pulseFactor));
      b = Math.min(255, Math.round(b * pulseFactor));
    } else if (state.effect === 'fire') {
      const fireIntensity = 0.4 + Math.random() * 0.6;
      const fireBase = getFireColor(fireIntensity);
      r = Math.round(fireBase.r * 0.7 + r * 0.3);
      g = Math.round(fireBase.g * 0.7 + g * 0.3);
      b = Math.round(fireBase.b * 0.7 + b * 0.3);
    }
    
    if (state.glow > 0) {
      ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.9)`;
      ctx.shadowBlur = state.glow * 2.5;
    }
    
    const textGradient = ctx.createLinearGradient(x, canvas.height * 0.2, x, canvas.height * 0.8);
    if (state.effect === 'fade') {
      textGradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.2)`);
      textGradient.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, 1)`);
      textGradient.addColorStop(0.7, `rgba(${r}, ${g}, ${b}, 1)`);
      textGradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0.2)`);
    } else if (state.effect === 'rainbow') {
      for (let i = 0; i <= 6; i++) {
        const hue = (state.frameCount * state.effectSpeed + i * 60) % 360;
        const color = hslToRgb(hue, 100, 60);
        textGradient.addColorStop(i / 6, `rgb(${color.r}, ${color.g}, ${color.b})`);
      }
    } else {
      textGradient.addColorStop(0, `rgb(${Math.min(255, r + 40)}, ${Math.min(255, g + 40)}, ${Math.min(255, b + 40)})`);
      textGradient.addColorStop(0.5, `rgb(${r}, ${g}, ${b})`);
      textGradient.addColorStop(1, `rgb(${Math.max(0, r - 30)}, ${Math.max(0, g - 30)}, ${Math.max(0, b - 30)})`);
    }
    
    ctx.fillStyle = textGradient;
    ctx.fillText(state.text, x, canvas.height / 2);
    
    ctx.restore();
  };
  
  if (state.mode !== 'static') {
    drawText(offsetX);
    if (state.direction === 'left') {
      drawText(offsetX + totalTextWidth);
    } else {
      drawText(offsetX - totalTextWidth);
    }
  } else {
    drawText(offsetX);
  }
  
  ctx.restore();
  
  const scanLineCount = Math.floor(canvas.height / 3);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
  for (let i = 0; i < scanLineCount; i++) {
    ctx.fillRect(0, i * 3, canvas.width, 1);
  }
}

function renderLEDScreen() {
  const bgRgb = hexToRgb(state.bgColor);
  ctx.fillStyle = state.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  const totalDotSize = state.dotSize + state.dotSpacing;
  const cols = Math.floor(canvas.width / totalDotSize);
  const rows = state.rows;
  
  const textData = getTextMatrix(state.text, state.font, rows);
  const textWidth = textData.width;
  
  let startX;
  const speed = state.speed * 0.1;
  
  if (state.mode === 'static') {
    startX = Math.floor((cols - textWidth) / 2);
  } else if (state.mode === 'bounce') {
    startX = Math.round(state.offset);
    const maxX = cols - 1;
    const minX = -textWidth + 1;
    
    if (startX >= maxX) {
      state.bounceDir = -1;
    } else if (startX <= minX) {
      state.bounceDir = 1;
    }
    
    if (state.isPlaying) {
      state.offset += speed * state.bounceDir * (state.direction === 'left' ? 1 : -1);
    }
  } else {
    startX = Math.round(state.offset);
    
    if (state.isPlaying) {
      if (state.direction === 'left') {
        state.offset -= speed;
        if (state.offset <= -textWidth) {
          state.offset = cols;
        }
      } else {
        state.offset += speed;
        if (state.offset >= cols) {
          state.offset = -textWidth;
        }
      }
    }
  }
  
  const baseRgb = hexToRgb(state.ledColor);
  
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const textX = Math.floor(x - startX);
      let isOn = false;
      
      if (textX >= 0 && textX < textWidth) {
        isOn = textData.matrix[y]?.[textX] || false;
      }
      
      if (isOn) {
        const effectColor = getEffectColor(x, y, true, baseRgb);
        if (effectColor) {
          drawLED(x, y, effectColor);
        } else {
          drawDimLED(x, y);
        }
      } else {
        drawDimLED(x, y);
      }
    }
  }
}

function animate() {
  render();
  requestAnimationFrame(animate);
}

function updateStats() {
  document.getElementById('currentSpeed').textContent = state.speed.toFixed(1);
  document.getElementById('charCount').textContent = state.text.length;
}

function bindEvents() {
  document.getElementById('textInput').addEventListener('input', (e) => {
    state.text = e.target.value;
    updateStats();
  });
  
  document.getElementById('fontSelect').addEventListener('change', (e) => {
    state.font = e.target.value;
    resizeCanvas();
  });
  
  document.getElementById('charSpacing').addEventListener('input', (e) => {
    state.charSpacing = parseInt(e.target.value);
    document.getElementById('charSpacingValue').textContent = state.charSpacing;
  });
  
  document.getElementById('ledColor').addEventListener('input', (e) => {
    state.ledColor = e.target.value;
  });
  
  document.getElementById('bgColor').addEventListener('input', (e) => {
    state.bgColor = e.target.value;
  });
  
  document.getElementById('brightness').addEventListener('input', (e) => {
    state.brightness = parseInt(e.target.value);
    document.getElementById('brightnessValue').textContent = state.brightness + '%';
  });
  
  document.getElementById('glow').addEventListener('input', (e) => {
    state.glow = parseInt(e.target.value);
    document.getElementById('glowValue').textContent = state.glow + 'px';
  });
  
  document.getElementById('speed').addEventListener('input', (e) => {
    state.speed = parseFloat(e.target.value);
    document.getElementById('speedValue').textContent = state.speed.toFixed(1);
    updateStats();
  });
  
  document.querySelectorAll('[data-direction]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-direction]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.direction = btn.dataset.direction;
    });
  });
  
  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
      state.offset = 0;
      state.bounceDir = 1;
    });
  });
  
  document.getElementById('playPauseBtn').addEventListener('click', () => {
    state.isPlaying = !state.isPlaying;
    document.getElementById('playPauseBtn').textContent = state.isPlaying ? '⏸ 暂停' : '▶ 播放';
  });
  
  document.getElementById('resetBtn').addEventListener('click', () => {
    state.offset = 0;
    state.bounceDir = 1;
    state.frameCount = 0;
  });
  
  document.getElementById('dotSize').addEventListener('input', (e) => {
    state.dotSize = parseInt(e.target.value);
    document.getElementById('dotSizeValue').textContent = state.dotSize + 'px';
    resizeCanvas();
  });
  
  document.getElementById('dotSpacing').addEventListener('input', (e) => {
    state.dotSpacing = parseInt(e.target.value);
    document.getElementById('dotSpacingValue').textContent = state.dotSpacing + 'px';
    resizeCanvas();
  });
  
  document.getElementById('rows').addEventListener('input', (e) => {
    state.rows = parseInt(e.target.value);
    document.getElementById('rowsValue').textContent = state.rows;
    resizeCanvas();
  });
  
  document.querySelectorAll('[data-shape]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-shape]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.shape = btn.dataset.shape;
    });
  });
  
  document.querySelectorAll('[data-display-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-display-mode]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.displayMode = btn.dataset.displayMode;
      state.offset = 0;
      state.bounceDir = 1;
      
      const wrapper = document.getElementById('displayWrapper');
      if (state.displayMode === 'color') {
        wrapper.classList.add('color-screen');
      } else {
        wrapper.classList.remove('color-screen');
      }
      
      resizeCanvas();
    });
  });
  
  function toggleFullscreen() {
    const wrapper = document.getElementById('displayWrapper');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (wrapper.requestFullscreen) {
        wrapper.requestFullscreen();
      } else if (wrapper.webkitRequestFullscreen) {
        wrapper.webkitRequestFullscreen();
      } else if (wrapper.msRequestFullscreen) {
        wrapper.msRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }
  }
  
  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
  document.getElementById('floatingFullscreenBtn').addEventListener('click', toggleFullscreen);
  
  document.addEventListener('fullscreenchange', () => {
    const btn = document.getElementById('floatingFullscreenBtn');
    if (document.fullscreenElement) {
      btn.textContent = '⎙';
      btn.title = '退出全屏';
    } else {
      btn.textContent = '⛶';
      btn.title = '全屏显示';
    }
    setTimeout(resizeCanvas, 100);
  });
  
  document.addEventListener('webkitfullscreenchange', () => {
    const btn = document.getElementById('floatingFullscreenBtn');
    if (document.webkitFullscreenElement) {
      btn.textContent = '⎙';
      btn.title = '退出全屏';
    } else {
      btn.textContent = '⛶';
      btn.title = '全屏显示';
    }
    setTimeout(resizeCanvas, 100);
  });
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
      if (!e.ctrlKey && !e.altKey && !e.metaKey) {
        toggleFullscreen();
      }
    }
    if (e.key === ' ') {
      e.preventDefault();
      state.isPlaying = !state.isPlaying;
      document.getElementById('playPauseBtn').textContent = state.isPlaying ? '⏸ 暂停' : '▶ 播放';
    }
  });
  
  document.querySelectorAll('.effect-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.effect = btn.dataset.effect;
      state.frameCount = 0;
    });
  });
  
  document.getElementById('effectSpeed').addEventListener('input', (e) => {
    state.effectSpeed = parseInt(e.target.value);
    document.getElementById('effectSpeedValue').textContent = state.effectSpeed;
  });
  
  document.querySelectorAll('.color-presets .color-preset[data-color]').forEach(preset => {
    preset.addEventListener('click', () => {
      const color = preset.dataset.color;
      const target = preset.dataset.target || 'ledColor';
      document.getElementById(target).value = color;
      if (target === 'ledColor') {
        state.ledColor = color;
      } else {
        state.bgColor = color;
      }
      
      const parent = preset.parentElement;
      parent.querySelectorAll('.color-preset').forEach(p => p.classList.remove('active'));
      preset.classList.add('active');
    });
  });
  
  window.addEventListener('resize', resizeCanvas);
}

function applyPreset(name) {
  const presets = {
    classic: {
      ledColor: '#ff0000',
      bgColor: '#000000',
      effect: 'none',
      glow: 8,
      speed: 5.0
    },
    neon: {
      ledColor: '#00ffff',
      bgColor: '#0a0a1a',
      effect: 'pulse',
      glow: 15,
      speed: 3.0
    },
    christmas: {
      ledColor: '#00ff00',
      bgColor: '#0a0a0a',
      effect: 'rainbow',
      glow: 10,
      speed: 8.0
    },
    warning: {
      ledColor: '#ffff00',
      bgColor: '#1a0a0a',
      effect: 'blink',
      glow: 12,
      speed: 10.0
    }
  };
  
  const preset = presets[name];
  if (!preset) return;
  
  state.ledColor = preset.ledColor;
  state.bgColor = preset.bgColor;
  state.effect = preset.effect;
  state.glow = preset.glow;
  state.speed = preset.speed;
  
  document.getElementById('ledColor').value = preset.ledColor;
  document.getElementById('bgColor').value = preset.bgColor;
  document.getElementById('glow').value = preset.glow;
  document.getElementById('glowValue').textContent = preset.glow + 'px';
  document.getElementById('speed').value = preset.speed;
  document.getElementById('speedValue').textContent = preset.speed.toFixed(1);
  
  document.querySelectorAll('.effect-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.effect === preset.effect);
  });
  
  updateStats();
}

function exportImage() {
  const link = document.createElement('a');
  link.download = 'led-sign-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function copySettings() {
  const settings = JSON.stringify(state, null, 2);
  navigator.clipboard.writeText(settings).then(() => {
    alert('配置已复制到剪贴板！');
  }).catch(() => {
    alert('复制失败，请手动复制');
  });
}

function init() {
  bindEvents();
  resizeCanvas();
  updateStats();
  animate();
}

init();
</script>
