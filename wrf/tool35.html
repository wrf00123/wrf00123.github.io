<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>玄机阁 · 灵签运势宝典</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        /* ==================== 主题变量 ==================== */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --success: #10b981;
            --danger: #ef4444;
            --purple: #a855f7;
            --pink: #ec4899;
            --cyan: #06b6d4;

            --bg-1: #0f0c29;
            --bg-2: #302b63;
            --bg-3: #24243e;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --glass-blur: 20px;

            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;

            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);

            --nav-height: 70px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        [data-theme="light"] {
            --bg-1: #f0f4ff;
            --bg-2: #e0e7ff;
            --bg-3: #faf5ff;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(99, 102, 241, 0.15);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow-lg: 0 25px 50px -12px rgba(99, 102, 241, 0.15);
            --shadow-md: 0 10px 25px -5px rgba(99, 102, 241, 0.1);
        }

        [data-theme="gold"] {
            --primary: #d4a853;
            --primary-light: #f0d68a;
            --primary-dark: #b8963f;
            --accent: #b5343a;
            --bg-1: #1a0a0a;
            --bg-2: #2d1810;
            --bg-3: #1e1111;
            --card-bg: rgba(30, 17, 17, 0.8);
            --card-border: rgba(212, 168, 83, 0.25);
            --text-primary: #e8d5b7;
            --text-secondary: #c4a882;
            --text-muted: #8b7d6b;
            --shadow-glow: 0 0 40px rgba(212, 168, 83, 0.2);
        }

        [data-theme="ocean"] {
            --primary: #0ea5e9;
            --primary-light: #38bdf8;
            --primary-dark: #0284c7;
            --accent: #06b6d4;
            --bg-1: #0c1929;
            --bg-2: #163a5f;
            --bg-3: #0f2942;
            --card-bg: rgba(14, 165, 233, 0.08);
            --card-border: rgba(14, 165, 233, 0.2);
        }

        [data-theme="forest"] {
            --primary: #10b981;
            --primary-light: #34d399;
            --primary-dark: #059669;
            --accent: #84cc16;
            --bg-1: #0a1f14;
            --bg-2: #143d2a;
            --bg-3: #0d2b1d;
            --card-bg: rgba(16, 185, 129, 0.08);
            --card-border: rgba(16, 185, 129, 0.2);
        }

        [data-theme="rose"] {
            --primary: #ec4899;
            --primary-light: #f472b6;
            --primary-dark: #db2777;
            --accent: #f43f5e;
            --bg-1: #1f0f1a;
            --bg-2: #4a1942;
            --bg-3: #2d1230;
            --card-bg: rgba(236, 72, 153, 0.08);
            --card-border: rgba(236, 72, 153, 0.2);
        }

        /* ==================== 基础样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(245, 158, 11, 0.05) 0%, transparent 60%);
            animation: bgShift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -2%) rotate(1deg); }
            50% { transform: translate(-1%, 2%) rotate(-1deg); }
            75% { transform: translate(-2%, -1%) rotate(0.5deg); }
        }

        /* ==================== 应用容器 ==================== */
        .app-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 520px;
            margin: 0 auto;
        }

        /* ==================== 顶部导航栏 ==================== */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            padding-top: calc(16px + env(safe-area-inset-top, 0px));
            position: relative;
            z-index: 10;
        }

        .top-bar .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 8px rgba(99, 102, 241, 0.5));
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .top-bar .app-title {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .top-bar .top-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            color: var(--text-primary);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .signin-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-1);
        }

        /* ==================== 主内容区 ==================== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 16px;
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 20px);
            scroll-behavior: smooth;
        }

        .main-content::-webkit-scrollbar {
            width: 4px;
        }

        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .page {
            display: none;
            animation: pageIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page.active {
            display: block;
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 玻璃卡片 ==================== */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .section-title .title-icon {
            font-size: 1.3rem;
        }

        .section-title .title-text {
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-title .more-link {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
        }

        .section-title .more-link:hover {
            color: var(--primary-light);
        }

        /* ==================== 首页 Banner ==================== */
        .hero-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-glow);
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(245,158,11,0.3) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-greeting {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .hero-date {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 12px;
        }

        .hero-lucky {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hero-lucky-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .hero-lucky-item .label {
            opacity: 0.8;
        }

        .hero-lucky-item .value {
            font-weight: 600;
        }

        /* ==================== 功能网格 ==================== */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 6px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .feature-item:hover {
            background: var(--card-bg);
            transform: translateY(-3px);
        }

        .feature-item:active {
            transform: scale(0.95);
        }

        .feature-item .f-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s;
        }

        .feature-item:hover .f-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .feature-item.purple .f-icon {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .feature-item.amber .f-icon {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .feature-item.cyan .f-icon {
            background: linear-gradient(135deg, #06b6d4, #6366f1);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .feature-item.green .f-icon {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .feature-item.rose .f-icon {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }

        .feature-item.orange .f-icon {
            background: linear-gradient(135deg, #f97316, #f59e0b);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .feature-item.indigo .f-icon {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .feature-item .f-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }

        /* ==================== 运势卡片列表 ==================== */
        .fortune-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fortune-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
        }

        .fortune-item:hover {
            border-color: var(--primary-light);
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }

        .fortune-item .fi-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--purple));
        }

        .fortune-item .fi-info {
            flex: 1;
            min-width: 0;
        }

        .fortune-item .fi-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .fortune-item .fi-stars {
            color: var(--accent);
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .fortune-item .fi-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .fortune-item .fi-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        /* ==================== 底部导航栏 ==================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 520px;
            height: calc(var(--nav-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            color: var(--text-muted);
        }

        .nav-item.active {
            color: var(--primary-light);
        }

        .nav-item .nav-icon {
            font-size: 1.4rem;
            transition: transform 0.3s;
        }

        .nav-item.active .nav-icon {
            transform: translateY(-3px);
            filter: drop-shadow(0 4px 8px rgba(99, 102, 241, 0.4));
        }

        .nav-item .nav-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .nav-item.active .nav-label {
            font-weight: 600;
        }

        /* ==================== 按钮样式 ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            backdrop-filter: blur(var(--glass-blur));
        }

        .btn-secondary:hover {
            border-color: var(--primary-light);
            background: rgba(99, 102, 241, 0.1);
        }

        .btn-lg {
            padding: 14px 32px;
            font-size: 1rem;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.8rem;
        }

        .btn-block {
            width: 100%;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover {
            color: var(--primary-light);
        }

        /* ==================== 签筒区域 ==================== */
        .divination-area {
            text-align: center;
            padding: 30px 0;
        }

        .tube-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tube-chip {
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.3s;
            white-space: nowrap;
            font-weight: 500;
        }

        .tube-chip.active {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .tube-chip:hover:not(.active) {
            border-color: var(--primary-light);
            color: var(--text-primary);
        }

        .shake-tube-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .shake-tube {
            font-size: 7rem;
            display: inline-block;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.4));
            transition: transform 0.1s;
            user-select: none;
        }

        .shake-tube.shaking {
            animation: shakeTube 0.8s ease-in-out;
        }

        @keyframes shakeTube {
            0%, 100% { transform: rotate(0deg) translateY(0) scale(1); }
            10% { transform: rotate(-10deg) translateY(-20px) scale(1.05); }
            20% { transform: rotate(10deg) translateY(-8px) scale(1.02); }
            30% { transform: rotate(-15deg) translateY(-25px) scale(1.08); }
            40% { transform: rotate(12deg) translateY(-10px) scale(1.03); }
            50% { transform: rotate(-8deg) translateY(-22px) scale(1.06); }
            60% { transform: rotate(8deg) translateY(-5px) scale(1.02); }
            70% { transform: rotate(-12deg) translateY(-18px) scale(1.05); }
            80% { transform: rotate(6deg) translateY(-8px) scale(1.02); }
            90% { transform: rotate(-4deg) translateY(-10px) scale(1.03); }
        }

        .shake-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 12px;
            letter-spacing: 2px;
            animation: pulseHint 2s ease-in-out infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .tube-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .shake-tube-wrapper:hover .tube-glow {
            opacity: 1;
        }

        /* ==================== 签文结果 ==================== */
        .result-card {
            background: linear-gradient(180deg, var(--card-bg) 0%, rgba(99, 102, 241, 0.05) 100%);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            text-align: center;
            animation: resultReveal 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--purple));
        }

        @keyframes resultReveal {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .result-level {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 25px;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .level-best {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
        }

        .level-good {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .level-mid {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .level-bad {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
        }

        .level-worst {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
            box-shadow: 0 4px 20px rgba(107, 114, 128, 0.3);
        }

        .result-number {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 8px 0;
            letter-spacing: 4px;
            font-family: 'ZCOOL XiaoWei', serif;
        }

        .result-poem {
            line-height: 2.2;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            margin: 16px 0;
            letter-spacing: 2px;
            font-size: 0.95rem;
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            position: relative;
        }

        .result-poem::before,
        .result-poem::after {
            content: '❝';
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
        }

        .result-poem::before {
            top: 4px;
            left: 8px;
        }

        .result-poem::after {
            content: '❞';
            bottom: 4px;
            right: 8px;
        }

        .result-detail-section {
            text-align: left;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--card-border);
        }

        .result-detail-title {
            font-weight: 600;
            color: var(--primary-light);
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .result-detail-text {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.85rem;
        }

        .result-keywords {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .keyword-tag {
            padding: 4px 10px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--primary-light);
        }

        .result-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        /* ==================== 弹窗样式 ==================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 420px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--card-border);
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 5;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        .modal-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        /* ==================== Toast ==================== */
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }

        .toast {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            box-shadow: var(--shadow-md);
            animation: toastIn 0.3s ease-out, toastOut 0.3s 2s ease-in forwards;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .toast.success {
            border-color: rgba(16, 185, 129, 0.5);
            color: #10b981;
        }

        .toast.error {
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* ==================== 输入框 ==================== */
        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"],
        input[type="number"] {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: var(--text-muted);
        }

        /* ==================== 标签/选项 ==================== */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--primary-light);
        }

        .tag .tag-remove {
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            line-height: 1;
            color: var(--danger);
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .tag .tag-remove:hover {
            opacity: 1;
        }

        /* ==================== 决策结果 ==================== */
        .decision-result {
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .decision-result .result-emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 8px;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .decision-result .result-text {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        /* ==================== 骰子/硬币 ==================== */
        .dice-display {
            font-size: 5rem;
            display: inline-block;
            animation: diceRoll 0.8s ease-out;
        }

        @keyframes diceRoll {
            0% { transform: rotateX(0) rotateY(0) scale(0.5); }
            30% { transform: rotateX(360deg) rotateY(180deg) scale(1.3); }
            60% { transform: rotateX(720deg) rotateY(360deg) scale(0.9); }
            100% { transform: rotateX(720deg) rotateY(360deg) scale(1); }
        }

        .coin-display {
            font-size: 5rem;
            display: inline-block;
            animation: coinFlip 0.8s ease-out;
        }

        @keyframes coinFlip {
            0% { transform: rotateY(0deg) scale(0.5); }
            50% { transform: rotateY(720deg) scale(1.2); }
            100% { transform: rotateY(1440deg) scale(1); }
        }

        /* ==================== 历史记录 ==================== */
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
        }

        .history-item:hover {
            border-color: var(--primary-light);
            transform: translateX(4px);
        }

        .history-item .hi-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--purple));
        }

        .history-item .hi-content {
            flex: 1;
            min-width: 0;
        }

        .history-item .hi-title {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 2px;
        }

        .history-item .hi-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item .hi-date {
            font-size: 0.7rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* ==================== 生肖/星座选择 ==================== */
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .zodiac-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 6px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }

        .zodiac-item:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .zodiac-item.active {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .zodiac-item .z-icon {
            font-size: 2rem;
        }

        .zodiac-item .z-name {
            font-size: 0.75rem;
            font-weight: 500;
        }

        .zodiac-item.active .z-name {
            color: white;
        }

        /* ==================== 塔罗牌 ==================== */
        .tarot-cards {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            perspective: 1000px;
        }

        .tarot-card {
            width: 90px;
            height: 150px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .tarot-card.flipped {
            transform: rotateY(180deg);
        }

        .tarot-card .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .tarot-card .card-back {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            border: 2px solid var(--primary-light);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .tarot-card .card-back::before {
            content: '✨';
            font-size: 2.5rem;
            opacity: 0.8;
        }

        .tarot-card .card-front {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            transform: rotateY(180deg);
            text-align: center;
        }

        .tarot-card .card-front .tc-icon {
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .tarot-card .card-front .tc-name {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tarot-card .card-front .tc-upright {
            font-size: 0.65rem;
            color: var(--success);
        }

        .tarot-card.reversed .card-front {
            transform: rotateY(180deg) rotate(180deg);
        }

        /* ==================== 黄历宜忌 ==================== */
        .almanac-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .almanac-date {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'ZCOOL XiaoWei', serif;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .almanac-lunar {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
            letter-spacing: 2px;
        }

        .almanac-section {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .almanac-box {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-md);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }

        .almanac-box.yi {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .almanac-box.ji {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .almanac-box .ab-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .almanac-box.yi .ab-title {
            color: var(--success);
        }

        .almanac-box.ji .ab-title {
            color: var(--danger);
        }

        .almanac-box .ab-items {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .almanac-box .ab-item {
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .time-item {
            text-align: center;
            padding: 8px 4px;
            border-radius: 8px;
            font-size: 0.7rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }

        .time-item.auspicious {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .time-item.inauspicious {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .time-item .t-name {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .time-item .t-range {
            font-size: 0.6rem;
            opacity: 0.7;
        }

        /* ==================== 主题选择 ==================== */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .theme-item {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .theme-item:hover {
            transform: scale(1.05);
        }

        .theme-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.3);
        }

        .theme-item .theme-preview {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .theme-item .theme-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px;
            font-size: 0.7rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        /* ==================== 心理测试 ==================== */
        .quiz-question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 14px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .quiz-option:hover {
            border-color: var(--primary-light);
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .quiz-option.selected {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            border-color: transparent;
            color: white;
        }

        .quiz-progress {
            height: 4px;
            background: var(--card-border);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .quiz-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* ==================== 收藏夹 ==================== */
        .favorite-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .favorite-item:hover {
            border-color: var(--accent);
        }

        .favorite-item .fv-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .favorite-item .fv-info {
            flex: 1;
            min-width: 0;
        }

        .favorite-item .fv-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .favorite-item .fv-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .favorite-item .fv-star {
            color: var(--accent);
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ==================== 签到日历 ==================== */
        .signin-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .signin-streak {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--danger));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .signin-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .signin-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .signin-day {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }

        .signin-day.signed {
            background: linear-gradient(135deg, var(--success), var(--primary));
            border-color: transparent;
            color: white;
            font-weight: 600;
        }

        .signin-day.today {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.3);
        }

        .signin-day.weekday {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: transparent;
            border: none;
        }

        .signin-rewards {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }

        .reward-item {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            border: 1px solid var(--card-border);
        }

        .reward-item .r-day {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .reward-item .r-icon {

            background-clip: text;

            border-radius: 6px;
            margin: 16px 0;
            overflow: hidden;

        .pair-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 6px;
            animation: barGrow 1.5s ease-out;
        }

        @keyframes barGrow {
            from { width: 0; }
        }

        .pair-traits {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 16px;
        }

        .pair-trait {
            padding: 10px;

            border-radius: var(--radius-sm);
            text-align: center;
        }

        .pair-trait .pt-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .pair-trait .pt-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-light);
        }

        /* ==================== 空状态 ==================== */
        .empty-state {
            text-align: center;

        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 12px;

        }

        .empty-state .empty-text {
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        /* ==================== 分隔线 ==================== */
        .divider {
            height: 1px;
            background: var(--card-border);
            margin: 16px 0;
        }

        /* ==================== 响应式 ==================== */

            .feature-grid {

            }

            .hero-banner {
                padding: 18px;
            }

            .app-title {
                font-size: 1.2rem !important;

        function randomInt(min, max) {

        function pickWeighted(items) {
            const totalWeight = items.reduce((sum, item) => {
                const levelInfo = LEVELS[item.level];
                return sum + (levelInfo ? levelInfo.weight : 15);
            }, 0);
            let random = Math.random() * totalWeight;
            for (const item of items) {
                const levelInfo = LEVELS[item.level];
                const w = levelInfo ? levelInfo.weight : 15;
                random -= w;
                if (random <= 0) return item;
            }
            return items[items.length - 1];
        }

        function getSigninStreak() {
            let streak = 0;
            const d = new Date();
            for (let i = 0; i < 365; i++) {
                const dateStr = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
                if (state.signinDays.includes(dateStr)) {
                    streak++;
                    d.setDate(d.getDate() - 1);
                } else if (i === 0) {
                    d.setDate(d.getDate() - 1);
                    continue;
                } else {
                    break;
                }
            }
            return streak;
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

                if (state.isShaking) return;
                state.isShaking = true;
                state.lastResult = null;
                renderDivination();

                const tube = $('#shakeTube');
                if (tube) tube.classList.add('shaking');
                const hint = $('#shakeHint');
                if (hint) hint.textContent = '✨ 正在摇签中...';

                setTimeout(() => {
                    state.isShaking = false;
                    const lib = allQianLibraries[state.activeLibrary];
                    const qian = pickWeighted(lib.data);
                    state.lastResult = {
                        type: 'divination',
                        libraryKey: state.activeLibrary,
                        libraryName: lib.name,
                        libraryIcon: lib.icon,
                        qianId: qian.id,
                        level: qian.level,
                        poem: qian.poem,
                        interpretation: qian.interpretation,
                        advice: qian.advice,
                        keywords: qian.keywords || '',
                    };
                    addHistory({
                        type: 'divination',
                        libraryName: lib.name,
                        libraryKey: state.activeLibrary,
                        level: qian.level,
                        poem: qian.poem,
                        interpretation: qian.interpretation,
                        advice: qian.advice,
                        keywords: qian.keywords,
                        resultText: qian.level + ' 第' + qian.id + '签',
                        qianId: qian.id,
                    });
                    renderDivination();
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30, 50, 60]);
                }, 900);
            },

            shakeAgain() {
                state.lastResult = null;
                state.isShaking = false;
                renderDivination();
            },

            toggleFavorite() {
                if (!state.lastResult) return;
                const r = state.lastResult;
                const existIndex = state.favorites.findIndex(f => f.type === 'divination' && f.qianId === r.qianId && f.libraryKey === r.libraryKey);
                if (existIndex >= 0) {
                    state.favorites.splice(existIndex, 1);
                    showToast('已取消收藏', '');
                } else {
                    state.favorites.unshift({
                        id: Date.now(),
                        type: 'divination',
                        libraryKey: r.libraryKey,
                        libraryName: r.libraryName,
                        qianId: r.qianId,
                        level: r.level,
                        poem: r.poem,
                        interpretation: r.interpretation,
                        advice: r.advice,
                        keywords: r.keywords,
                    });
                    showToast('已收藏 ⭐', 'success');
                }
                saveData();
                renderDivination();
                if (state.currentPage === 'mine') renderMine();
            },

            shareResult() {
                const r = state.lastResult;
                if (!r) return;
                const text = `【${r.libraryName}】第${r.qianId}签 · ${r.level}\n${r.poem.replace(/\n/g, '\n')}\n\n解签：${r.interpretation.slice(0, 50)}...\n\n—— 玄机阁`;
                if (navigator.share) {
                    navigator.share({ title: '灵签', text }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('已复制到剪贴板', 'success');
                    }).catch(() => {
                        showToast('分享失败，请手动复制');
                    });

                    const tagsHTML = options.length > 0 ?
                        options.map((o, i) => `<span class="tag">${o} <span class="tag-remove" data-idx="${i}">×</span></span>`).join('') :

                        </div>
                        <div class="tag-list" style="margin-bottom:16px;">${tagsHTML}</div>
                        ${options.length >= 2 ? `
                            <button class="btn btn-primary btn-block" onclick="app.randomChoice()" style="margin-bottom:12px;">
                                🎲 帮我选一个！
                            </button>
                            <button class="btn btn-secondary btn-sm btn-block" onclick="app.clearDecisionOptions()">清空选项</button>

                            <p style="text-align:center;font-size:0.8rem;color:var(--text-muted);">至少添加2个选项</p>
                        `}
                        ${choiceHTML}
                    `;

                    overlay.querySelectorAll('.tag-remove').forEach(el => {
                        el.addEventListener('click', () => {
                            const idx = parseInt(el.dataset.idx);
                            state.decisionOptions.splice(idx, 1);
                            state.choiceResult = null;
                            render();
                        });
                    });

                    const input = overlay.querySelector('#decisionInput');
                    if (input) setTimeout(() => input.focus(), 50);
                };
                render();

            addDecisionOption() {
                const input = document.querySelector('#decisionInput');
                if (!input) return;
                const val = input.value.trim();
                if (!val) return showToast('请输入选项内容');
                if (state.decisionOptions.length >= 20) return showToast('最多添加20个选项');
                if (state.decisionOptions.includes(val)) return showToast('选项已存在');
                state.decisionOptions.push(val);
                state.choiceResult = null;
                if (window._renderDecisionModal) window._renderDecisionModal();
            },

            clearDecisionOptions() {
                state.decisionOptions = [];
                state.choiceResult = null;
                if (window._renderDecisionModal) window._renderDecisionModal();
            },

            randomChoice() {
                if (state.decisionOptions.length < 2) return showToast('至少需要2个选项');
                let count = 0;
                const total = 15;
                const interval = 60;

                function flash() {
                    if (count < total) {
                        state.choiceResult = state.decisionOptions[randomInt(0, state.decisionOptions.length - 1)];
                        if (window._renderDecisionModal) window._renderDecisionModal();
                        count++;
                        setTimeout(flash, interval + count * 20);
                    } else {
                        state.choiceResult = state.decisionOptions[randomInt(0, state.decisionOptions.length - 1)];
                        if (window._renderDecisionModal) window._renderDecisionModal();
                        addHistory({
                            type: 'choice',
                            resultText: state.choiceResult,
                            level: '选择结果',
                        });
                        if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
                    }
                }
                flash();
            },

                    if (maxEl) maxVal = parseInt(maxEl.value) || 100;

                const range = window._getNumberRange();
                let count = 0;

                    if (count < total) {
                        window._setNumberResult(randomInt(range.min, range.max));

            calculatePair() {
                const n1 = document.querySelector('#pairName1')?.value.trim();
                const n2 = document.querySelector('#pairName2')?.value.trim();
                if (!n1 || !n2) return showToast('请输入两个姓名');

                const hash = hashCode(n1 + n2 + todayStr());
                const score = 60 + (hash % 40);
                let level, desc;
                if (score >= 95) {
                    level = '天作之合';
                    desc = '你们是天造地设的一对！彼此吸引，默契十足，在一起会非常幸福。珍惜这份缘分，携手走过一生吧。';
                } else if (score >= 85) {
                    level = '非常般配';
                    desc = '你们非常般配！有很多共同点，相处融洽。只要用心经营，一定会有美好的未来。';
                } else if (score >= 70) {
                    level = '缘分不错';
                    desc = '你们的缘分不错，彼此有吸引力。虽然可能有些小摩擦，但只要多沟通理解，感情会越来越好。';
                } else if (score >= 60) {
                    level = '需要努力';
                    desc = '你们有一定的缘分，但需要更多的磨合和努力。多包容对方，培养共同爱好，感情会逐渐升温。';
                } else {
                    level = '缘分较浅';
                    desc = '你们的缘分较浅，性格差异较大。如果想在一起，需要双方都做出很多改变和妥协。';
                }

                state.pairResult = {
                    score,
                    level,
                    desc,
                    traits: {
                        tacit: 60 + ((hash >> 2) % 35),
                        attract: 65 + ((hash >> 4) % 30),
                        complement: 55 + ((hash >> 6) % 35),
                        duration: 58 + ((hash >> 8) % 32),
                    }
                };

                addHistory({
                    type: 'pair',
                    resultText: n1 + ' & ' + n2 + ' · ' + score + '分',
                    level: level,
                });

                if (window._renderPairModal) window._renderPairModal();
            },

            startQuiz(quizId) {
                const quiz = quizzes.find(q => q.id === quizId);

                state.currentQuiz = quiz;
                state.quizIndex = 0;
                state.quizScores = {};

                const overlay = document.querySelector('.modal-overlay');
                if (overlay) overlay.remove();

                const renderQuiz = () => {
                    const q = quiz.questions[state.quizIndex];
                    const progress = ((state.quizIndex) / quiz.questions.length) * 100;

                    showModal(`
                        <div class="modal-title">${quiz.icon} ${quiz.title}</div>
                        <div class="quiz-progress">
                            <div class="quiz-progress-bar" style="width:${progress}%"></div>
                        </div>

                        <div class="quiz-options">
                            ${q.options.map((opt, i) => `
                                <div class="quiz-option" onclick="app.answerQuiz(${i})">${opt.text}</div>
                            `).join('')}
                        </div>
                    `);
                };
                renderQuiz();
                window._renderQuizModal = renderQuiz;
            },

            answerQuiz(optionIdx) {
                const quiz = state.currentQuiz;
                const q = quiz.questions[state.quizIndex];
                const opt = q.options[optionIdx];

                for (const [key, val] of Object.entries(opt.score)) {
                    state.quizScores[key] = (state.quizScores[key] || 0) + val;
                }

                if (state.quizIndex < quiz.questions.length - 1) {
                    state.quizIndex++;
                    if (window._renderQuizModal) window._renderQuizModal();
                } else {
                    let maxKey = '', maxScore = 0;
                    for (const [key, val] of Object.entries(state.quizScores)) {
                        if (val > maxScore) {
                            maxScore = val;
                            maxKey = key;
                        }
                    }
                    const result = quiz.results[maxKey];

                    addHistory({
                        type: 'quiz',
                        resultText: quiz.title + ' · ' + result.title,
                        level: result.title,
                    });

                    showModal(`
                        <div class="modal-title">测试结果</div>

                        </div>
                    `);
                }
            },

            showSignIn() {

                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const today = now.getDate();

                let daysHTML = ['日', '一', '二', '三', '四', '五', '六'].map(d =>
                    `<div class="signin-day weekday">${d}</div>`
                ).join('');

                for (let i = 0; i < firstDay; i++) {

                }
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${month + 1}-${d}`;
                    const isSigned = state.signinDays.includes(dateStr);
                    const isToday = d === today;
                    let cls = 'signin-day';
                    if (isSigned) cls += ' signed';
                    if (isToday) cls += ' today';
                    daysHTML += `<div class="${cls}">${d}</div>`;
                }

                const rewards = [
                    { day: 1, icon: '🌟' },
                    { day: 3, icon: '🎁' },
                    { day: 7, icon: '🏆' },

                                    <span class="fv-icon">${icon}</span>
                                    <div class="fv-info">
                                        <div class="fv-title">${title}</div>
                                        <div class="fv-desc">${desc}</div>
                                    </div>
                                    <span class="fv-star" onclick="event.stopPropagation();app.removeFavorite(${f.id})">⭐</span>
                                </div>
                            `;
                        }).join('');
                    }

                    overlay.querySelector('.modal').innerHTML = `
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                        <div class="modal-title">⭐ 我的收藏</div>
                        <p style="text-align:center;color:var(--text-muted);font-size:0.8rem;margin-bottom:12px;">
                            共 ${favs.length} 条收藏
                        </p>
                        <div style="max-height:50vh;overflow-y:auto;">
                            ${content}
                        </div>
                    `;
                };
                render();
                window._renderFavModal = render;
            },

            removeFavorite(id) {
                state.favorites = state.favorites.filter(f => f.id !== id);
                saveData();
                showToast('已取消收藏');
                if (window._renderFavModal) window._renderFavModal();
                if (state.currentPage === 'mine') renderMine();
            },

            viewFavorite(id) {
                const fav = state.favorites.find(f => f.id === id);
                if (!fav) return;
                if (fav.type === 'divination') {
                    state.activeLibrary = fav.libraryKey;
                    state.lastResult = {
                        type: 'divination',
                        libraryKey: fav.libraryKey,
                        libraryName: fav.libraryName,
                        libraryIcon: allQianLibraries[fav.libraryKey]?.icon || '🏮',
                        qianId: fav.qianId,
                        level: fav.level,
                        poem: fav.poem,
                        interpretation: fav.interpretation,
                        advice: fav.advice,
                        keywords: fav.keywords || '',
                    };
                    const overlay = document.querySelector('.modal-overlay');
                    if (overlay) overlay.remove();
                    this.navigate('divination');
                }
            },

            // ----- 历史 -----
            showHistory() {
                const overlay = showModal('');
                const render = () => {
                    const history = state.history;
                    let content = '';
                    if (history.length === 0) {
                        content = `
                            <div class="empty-state">
                                <div class="empty-icon">📝</div>
                                <div class="empty-text">暂无记录</div>
                            </div>
                        `;
                    } else {
                        content = history.slice(0, 50).map(h => {
                            let icon = '📝', title = '', desc = '';
                            if (h.type === 'divination') {
                                icon = '🏮';
                                title = h.libraryName + ' · ' + h.level;
                                desc = '第' + h.qianId + '签';
                            } else if (h.type === 'coin') {
                                icon = '🪙'; title = '抛硬币'; desc = h.resultText;
                            } else if (h.type === 'dice') {
                                icon = '🎲'; title = '掷骰子'; desc = '点数 ' + h.resultText;
                            } else if (h.type === 'choice') {
                                icon = '🎯'; title = '帮我选择'; desc = h.resultText;
                            } else if (h.type === 'fortune') {
                                icon = '🔮'; title = '运势测算'; desc = h.fortuneType || '';
                            } else if (h.type === 'tarot') {
                                icon = '🃏'; title = '塔罗占卜'; desc = h.resultText;
                            } else if (h.type === 'zodiac') {
                                icon = '🐉'; title = '生肖运势'; desc = h.resultText;
                            } else if (h.type === 'constellation') {
                                icon = '♌'; title = '星座运势'; desc = h.resultText;
                            } else if (h.type === 'pair') {
                                icon = '💞'; title = '姓名配对'; desc = h.resultText;
                            } else if (h.type === 'quiz') {
                                icon = '🧠'; title = '心理测试'; desc = h.resultText;
                            }
                            return `
                                <div class="history-item">
                                    <div class="hi-icon">${icon}</div>
                                    <div class="hi-content">
                                        <div class="hi-title">${title}</div>
                                        <div class="hi-desc">${desc}</div>
                                    </div>
                                    <div class="hi-date">${h.dateStr}</div>
                                </div>
                            `;
                        }).join('');
                    }

                    overlay.querySelector('.modal').innerHTML = `
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                        <div class="modal-title">📜 历史记录</div>
                        <p style="text-align:center;color:var(--text-muted);font-size:0.8rem;margin-bottom:12px;">
                            共 ${history.length} 条记录
                        </p>
                        <div style="max-height:50vh;overflow-y:auto;">
                            ${content}
                        </div>
                        ${history.length > 0 ? `
                            <button class="btn btn-secondary btn-sm btn-block" style="margin-top:12px;" onclick="app.clearHistory()">
                                🗑️ 清除记录
                            </button>
                        ` : ''}
                    `;
                };
                render();
                window._renderHistoryModal = render;
            },

            viewHistoryItem(id) {
                const h = state.history.find(x => x.id === id);
                if (!h) return;
                if (h.type === 'divination') {
                    state.activeLibrary = h.libraryKey || 'guanyin';
                    state.lastResult = {
                        type: 'divination',
                        libraryKey: h.libraryKey || 'guanyin',
                        libraryName: h.libraryName || '',
                        libraryIcon: allQianLibraries[h.libraryKey]?.icon || '🏮',
                        qianId: h.qianId,
                        level: h.level,
                        poem: h.poem || '',
                        interpretation: h.interpretation || '（历史记录）',
                        advice: h.advice || '',
                        keywords: h.keywords || '',
                    };
                    this.navigate('divination');
                }
            },

            clearHistory() {
                if (confirm('确定清除所有历史记录吗？此操作不可撤销。')) {
                    state.history = [];
                    saveData();
                    showToast('历史记录已清除');
                    if (window._renderHistoryModal) window._renderHistoryModal();
                    if (state.currentPage === 'mine') renderMine();
                    if (state.currentPage === 'home') renderHome();
                }
            },

            clearAllData() {
                if (confirm('确定清除所有本地数据吗？这将删除历史记录、收藏、签到记录等所有数据。')) {
                    localStorage.removeItem('xuanjige_data');
                    state.history = [];
                    state.favorites = [];
                    state.signinDays = [];
                    showToast('数据已清除', 'success');
                    if (state.currentPage === 'mine') renderMine();
                }
            },

            showAbout() {
                showModal(`
                    <div class="modal-title">ℹ️ 关于玄机阁</div>
                    <div style="text-align:center;padding:20px 0;">
                        <div style="font-size:4rem;margin-bottom:8px;">🔮</div>
                        <h3 style="font-family:'ZCOOL XiaoWei',serif;font-size:1.3rem;background:linear-gradient(135deg,var(--primary-light),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">玄机阁</h3>
                        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">灵签运势宝典 v2.0</p>
                    </div>
                    <div style="color:var(--text-secondary);font-size:0.85rem;line-height:1.8;">
                        <p>🏮 灵签求卜：观音、月老、关帝、财神四大灵签</p>
                        <p>🔮 运势测算：生肖、星座、每日运势</p>
                        <p>🃏 塔罗占卜：22张大阿卡纳牌</p>
                        <p>📆 黄历宜忌：宜忌 + 十二时辰吉凶</p>
                        <p>🎯 决策助手：帮你做决定、抛硬币、掷骰子</p>
                        <p>💞 姓名配对：测试你们的缘分指数</p>
                        <p>🧠 心理测试：探索你的内心世界</p>
                    </div>
                    <p style="text-align:center;font-size:0.75rem;color:var(--text-muted);margin-top:16px;">
                        ✨ 心诚则灵 · 仅供娱乐 · 积极生活 ✨
                    </p>
                `);
            },
        };

        // ==================== 签到徽章 ====================
        function updateSigninBadge() {
            const badge = document.getElementById('signinBadge');
            if (badge) {
                badge.style.display = isSignedToday() ? 'none' : 'block';
            }
        }

        // ==================== 初始化 ====================
        function init() {
            loadData();
            applyTheme(state.theme);
            renderPage('home');
            updateSigninBadge();

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    const overlay = document.querySelector('.modal-overlay');
                    if (overlay) overlay.remove();
                }
            });

            console.log('🔮 玄机阁已就绪');
            console.log('  灵签运势宝典 v2.0');
            console.log('  心诚则灵，仅供娱乐，积极生活');
        }

        window.app = app;
        window.initApp = init;

        init();
    })();
    </script>
</body>
</html>
