<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRC《全球消费品标准：个人护理与家庭》第4版 · 知识库</title>
<style>
/* ============ 主题变量 ============ */
:root{
  --bg:#0f1419; --bg2:#161b22; --bg3:#1c2330; --panel:#1a2230;
  --border:#2a3442; --text:#e6edf3; --text2:#9aa7b5; --text3:#6b7785;
  --accent:#3b82f6; --accent2:#22d3ee; --accent-soft:rgba(59,130,246,.15);
  --req:#f59e0b; --note:#8b95a3; --ok:#34d399; --danger:#f87171;
  --shadow:0 8px 30px rgba(0,0,0,.45); --radius:12px;
}
html[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#ffffff; --bg3:#eef2f8; --panel:#ffffff;
  --border:#dce3ec; --text:#1a2330; --text2:#46566a; --text3:#7a899b;
  --accent:#2563eb; --accent2:#0891b2; --accent-soft:rgba(37,99,235,.1);
  --req:#c2710a; --note:#6b7785; --ok:#059669; --danger:#dc2626;
  --shadow:0 8px 30px rgba(20,40,80,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Segoe UI","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.75;
  font-size:16px; transition:background .25s,color .25s;
}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--accent-soft)}

/* ============ 顶栏 ============ */
header{
  position:sticky;top:0;z-index:50;background:var(--bg2);
  border-bottom:1px solid var(--border);padding:10px 18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;white-space:nowrap}
.brand .logo{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;
}
.brand small{display:block;font-weight:400;color:var(--text3);font-size:11px}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:520px}
#search{
  width:100%;padding:9px 36px 9px 38px;border-radius:10px;
  border:1px solid var(--border);background:var(--bg3);color:var(--text);
  font-size:14px;outline:none;transition:.2s;
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-wrap .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.search-wrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  border:none;background:none;color:var(--text3);font-size:18px;display:none}
.search-wrap .clr:hover{color:var(--danger)}
.search-count{position:absolute;right:38px;top:50%;transform:translateY(-50%);
  font-size:11px;color:var(--text3);pointer-events:none}
.tools{display:flex;gap:6px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);padding:7px 10px;border-radius:9px;
  font-size:13px;transition:.18s;white-space:nowrap;
}
.btn:hover{color:var(--text);border-color:var(--accent);background:var(--accent-soft)}
.btn.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.btn .kbd{font-size:10px;opacity:.6}

/* ============ 布局 ============ */
.layout{display:flex;min-height:calc(100vh - 58px)}
/* 侧栏 */
aside{
  width:300px;flex:none;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s,margin .25s;
}
aside.collapsed{width:0;margin-left:-1px}
.side-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;gap:8px}
.side-head input{
  flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:13px;outline:none;min-width:0;
}
.nav{flex:1;overflow-y:auto;padding:8px 6px 30px}
.nav-group{margin-bottom:2px}
.nav-chap{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  cursor:pointer;color:var(--text);font-weight:600;font-size:14px;transition:.15s;
}
.nav-chap:hover{background:var(--bg3)}
.nav-chap .num{
  flex:none;width:26px;height:26px;border-radius:7px;background:var(--accent-soft);
  color:var(--accent);display:grid;place-items:center;font-size:12px;font-weight:700;
}
.nav-chap .ttl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-chap .cnt{font-size:11px;color:var(--text3);background:var(--bg3);
  padding:1px 7px;border-radius:20px}
.nav-chap .arrow{transition:transform .2s;color:var(--text3);font-size:11px}
.nav-chap.open .arrow{transform:rotate(90deg)}
.nav-items{display:none;padding:2px 0 4px 14px}
.nav-items.open{display:block}
.nav-item{
  display:flex;gap:8px;align-items:baseline;padding:5px 10px;border-radius:7px;
  cursor:pointer;color:var(--text2);font-size:13px;transition:.15s;
  border-left:2px solid transparent;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--text);border-left-color:var(--accent)}
.nav-item .id{color:var(--accent2);font-weight:600;font-variant-numeric:tabular-nums;flex:none}
.nav-item .it{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .star{margin-left:auto;color:var(--text3);font-size:12px;opacity:0}
.nav-item:hover .star,.nav-item.starred .star{opacity:1}
.nav-item.starred .star{color:var(--req)}

/* 主区 */
main{flex:1;min-width:0;display:flex;flex-direction:column}
.breadcrumb{padding:10px 22px;border-bottom:1px solid var(--border);background:var(--bg2);
  font-size:13px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.breadcrumb b{color:var(--text)}
.crumbs a{color:var(--accent2)}
.content{flex:1;overflow-y:auto;padding:26px 30px 80px;max-width:1080px;margin:0 auto;width:100%}
.clause-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;
  border-bottom:2px solid var(--border);padding-bottom:16px;margin-bottom:22px}
.clause-num{
  flex:none;font-size:15px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:8px 14px;border-radius:10px;font-variant-numeric:tabular-nums;letter-spacing:.5px;
}
.clause-title{flex:1;min-width:200px}
.clause-title h1{font-size:25px;line-height:1.35;margin-bottom:4px}
.clause-title .sub{color:var(--text3);font-size:13px}
.clause-actions{display:flex;gap:8px;flex-wrap:wrap}
.mini-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  padding:6px 11px;border-radius:8px;font-size:12.5px;transition:.18s;display:inline-flex;gap:5px;align-items:center}
.mini-btn:hover{color:var(--text);border-color:var(--accent)}
.mini-btn.on{color:var(--req);border-color:var(--req)}

/* 内容块 */
.block{margin-bottom:14px}
.block p{margin-bottom:12px}
.block .note{color:var(--note);font-size:14px;padding:10px 14px;border-left:3px solid var(--border);
  background:var(--bg2);border-radius:0 8px 8px 0;margin:10px 0}
.block .req-em{color:var(--req);font-weight:600}
ul.l{list-style:none;padding-left:4px;margin:8px 0}
ul.l>li{position:relative;padding:4px 0 4px 26px;margin-bottom:4px}
ul.l>li::before{content:attr(data-k);position:absolute;left:0;top:4px;font-weight:700;color:var(--accent2)}
ul.l2{padding-left:22px;margin:4px 0}
ul.l2>li{padding-left:24px}
ul.l2>li::before{color:var(--text3)}
.tip{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;
  padding:12px 16px;margin:14px 0;font-size:14px}
mark{background:var(--req);color:#1a1205;padding:0 2px;border-radius:3px}
mark.cur{background:var(--accent);color:#fff}

/* 翻页 */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:40px;
  padding-top:20px;border-top:1px solid var(--border)}
.pager a{padding:12px 18px;border:1px solid var(--border);border-radius:10px;
  background:var(--bg2);flex:1;max-width:48%;transition:.18s}
.pager a:hover{border-color:var(--accent);text-decoration:none}
.pager .pl{color:var(--text3);font-size:12px}
.pager .pt{color:var(--text);font-weight:600;font-size:14px;display:block;margin-top:2px}
.pager a.next{text-align:right}

/* 进度条 */
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  z-index:100;width:0;transition:width .3s}

/* ============ 右抽屉 ============ */
.drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--panel);
  border-left:1px solid var(--border);z-index:60;transform:translateX(105%);
  transition:transform .28s;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.drawer.open{transform:translateX(0)}
.drawer .dh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.drawer .dh h3{font-size:16px}
.drawer .dbody{flex:1;overflow-y:auto;padding:16px 18px}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;opacity:0;pointer-events:none;transition:.25s}
.mask.show{opacity:1;pointer-events:auto}

/* 搜索结果 */
.result{padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;
  cursor:pointer;transition:.15s;background:var(--bg2)}
.result:hover{border-color:var(--accent);background:var(--bg3)}
.result .rid{color:var(--accent2);font-weight:700;font-size:13px}
.result .rt{font-weight:600;font-size:14px;margin:2px 0}
.result .rs{color:var(--text2);font-size:13px;line-height:1.5}
.empty{color:var(--text3);text-align:center;padding:40px 10px}

/* 术语表 */
.term{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--bg2)}
.term b{color:var(--accent2)}
.term p{color:var(--text2);font-size:13px;margin-top:4px}

/* 统计卡 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800;color:var(--accent)}
.stat .l{font-size:12px;color:var(--text3);margin-top:2px}

/* 测验 */
.quiz-q{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.quiz-q .qt{font-weight:600;margin-bottom:10px}
.quiz-q label{display:block;padding:8px 12px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:6px;cursor:pointer;transition:.15s;font-size:14px}
.quiz-q label:hover{background:var(--bg3)}
.quiz-q label.ok{background:rgba(52,211,153,.16);border-color:var(--ok);color:var(--ok)}
.quiz-q label.bad{background:rgba(248,113,113,.16);border-color:var(--danger);color:var(--danger)}
.quiz-q .exp{font-size:13px;color:var(--text2);margin-top:8px;display:none}
.quiz-q.answered .exp{display:block}

/* 图 */
.diagram-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin:14px 0}
.diagram-wrap h4{margin-bottom:12px;font-size:15px}
.svg-box{width:100%;overflow-x:auto;text-align:center}
.svg-box svg{max-width:100%;height:auto}
.legend{font-size:12px;color:var(--text3);margin-top:8px}

/* 移动端 */
.hamburger{display:none}
@media(max-width:900px){
  aside{position:fixed;top:58px;bottom:0;left:0;z-index:40;box-shadow:var(--shadow)}
  .hamburger{display:inline-flex}
  .content{padding:18px 14px 70px}
  .clause-title h1{font-size:20px}
}
@media(max-width:560px){
  .brand small{display:none}
  .tools .btn span.txt{display:none}
  .clause-num{font-size:13px;padding:6px 10px}
}
/* 打印 */
@media print{
  aside,.tools,header .search-wrap,.pager,.clause-actions,.hamburger{display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  .layout{display:block}
  .content{max-width:100%;padding:0}
  .clause-head{border-color:#999}
  mark{background:#ffe28a;color:#000}
}

/* 基础/高级 两栏 */
.fa-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
.fa-col{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg2)}
.fa-h{padding:9px 13px;font-weight:700;font-size:13px;color:#fff;letter-spacing:.3px}
.fa-f .fa-h{background:linear-gradient(135deg,#2563eb,#0891b2)}
.fa-a .fa-h{background:linear-gradient(135deg,#c2710a,#b45309)}
.fa-b{padding:13px 15px;font-size:14.5px;line-height:1.75}
.fa-b .req-em{color:var(--req)}
@media(max-width:720px){.fa-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<header>
  <button class="btn hamburger" id="toggleNav" title="目录">☰</button>
  <div class="brand">
    <div class="logo">BRC</div>
    <div>BRC 消费品标准 知识库
      <small>个人护理与家庭 · 第4版</small>
    </div>
  </div>
  <div class="search-wrap">
    <span class="ic">🔍</span>
    <input id="search" placeholder="全文搜索：如“基础要求”“高级管理层”“审核协议”“认证机构”“可追溯性”“不符合项”…" autocomplete="off">
    <span class="search-count" id="searchCount"></span>
    <button class="clr" id="searchClear">×</button>
  </div>
  <div class="tools">
    <button class="btn" id="btnNav" title="目录树">📑<span class="txt">目录</span></button>
    <button class="btn" id="btnStar" title="我的收藏">⭐<span class="txt">收藏</span></button>
    <button class="btn" id="btnGloss" title="术语表">📖<span class="txt">术语</span></button>
    <button class="btn" id="btnGraph" title="结构图">🗺️<span class="txt">图谱</span></button>
    <button class="btn" id="btnQuiz" title="自测">🎯<span class="txt">自测</span></button>
    <button class="btn" id="btnStat" title="统计">📊<span class="txt">统计</span></button>
    <button class="btn" id="btnTheme" title="主题">🌓</button>
    <button class="btn" id="btnFontD" title="缩小字号">A−</button>
    <button class="btn" id="btnFontU" title="放大字号">A+</button>
    <button class="btn" id="btnPrint" title="打印/导出PDF">🖨️</button>
  </div>
</header>

<div class="layout">
  <aside id="aside">
    <div class="side-head">
      <input id="navFilter" placeholder="筛选条款…">
      <button class="btn" id="collapseNav" title="收起">⟨</button>
    </div>
    <div class="nav" id="nav"></div>
  </aside>

  <main>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- 右抽屉：通用容器 -->
<div class="mask" id="mask"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <h3 id="drawerTitle">面板</h3>
    <button class="btn" id="drawerClose">✕</button>
  </div>
  <div class="dbody" id="drawerBody"></div>
</div>

<script>
/* =====================================================================
   BRC《全球消费品标准：个人护理与家庭》第4版 数据
   每条 clause: {id, num, title, blocks:[...]}
   block 类型含 {t:'fa',f:'基础',a:'高级'} 两栏
   block 类型:
     {t:'p', x:'文本'}           段落
     {t:'note', x:'文本'}        注
     {t:'ul', items:[...]}       列表，item 可为 字符串 或 {t:'ul',items:[...]}
   ===================================================================== */
const CLAUSES = [
 {
  "id": "I.1",
  "num": "I.1",
  "title": "引言与背景",
  "blocks": [
   {
    "t": "p",
    "x": "欢迎阅读第四版《消费品标准》。本标准最先出版于 2003 年，之后经过大幅修改，以满足广大消费品行业的需求。本标准历经 修订，已日臻完善，以风险评估和良好操作规范 (GMP) 准则为基石，以为终端消费者提供安全合法、符合规定质量的产品为 目的。 第四版对要求的结构进行了重大修改，密切呼应市场需求。其中由两项新标准组成：个人护理及家庭，以及日用商品。各项标准 所含的要求可分为两级进行认证：基础和高级。 个人护理及家庭包括因产品性质及用途而卫生要求通常较高的配方和加工制品。例如化妆品、医疗装置、尿布、食品包装和家 用清洁剂。 日用商品种类繁多，以加工制品为主，管理生产流程以确保产品安全及质量是此类别的首要关切问题。例如电气设备、玩具、 家具、纺织品和珠宝。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.2",
  "num": "I.2",
  "title": "新版本的好处",
  "blocks": [
   {
    "t": "p",
    "x": "第四版的好处包括："
   },
   {
    "t": "ul",
    "items": []
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.3",
  "num": "I.3",
  "title": "新增自愿性审核模块",
  "blocks": [
   {
    "t": "p",
    "x": "第 4 版的制定新增了其他自愿性审核模块，对此，工厂可在报审时选择使用。为顺应市场的需要，BRC 将持续开发这样的模块 并在网站上予以公布。这一灵活性预计可使工厂满足地区或特定客户的期望并减少工厂审核和巡查的次数。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.4",
  "num": "I.4",
  "title": "《标准》的范围",
  "blocks": [
   {
    "t": "p",
    "x": "本《标准》载明对于制造和供应安全合法、质量统一的消费品的要求。产品可为零售品牌（自有品牌），供其他组织使用的品牌 或非品牌产品。 本《标准》是一项产品安全与质量管理标准。其中不含与制造工厂相关的其他重要要求，如工作场所健康和安全、环境问题、 可持续性、安保或道德贸易问题。 符合本《标准》要求保证工厂工艺对安全、合法性及质量加以考虑，且所生产的产品已满足法律或客户要求的任何符合性評估 措施。产品不因本《标准》而加贴产品安全标志，且本《标准》不取代制定的技术产品标准或与之产生冲突。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.5",
  "num": "I.5",
  "title": "营运范围",
  "blocks": [
   {
    "t": "p",
    "x": "本《标准》适用于原材料（包装除外）制造工厂，以及用于企业对企业销售或消费者零售的成品的制造工厂。其中包括消费品签 约包装商或组装包装商的活动。 本《标准》将不适用于在工厂直接控制之外的与批发、进口、分销或贮藏相关的活动。 本《标准》不直接适用于进口商，且不可用于评估进口商的营运。进口商可以要求其制造商应当满足本《标准》的要求，这将有 助于进口商履行进口安全合法的产品的责任。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.6",
  "num": "I.6",
  "title": "产品范围",
  "blocks": [
   {
    "t": "p",
    "x": "本《标准》的范围为在消费者市场推出——换言之，售予或提供予消费者——的非食品类制造产品。本《标准》还可适用于生 产消费品原材料和零部件的公司。《个人护理及家庭标准》包含清洁产品、牙刷、育儿用品和食品外包等产品。如需查阅更加详 尽的示例清单，请参看附录 2。 本《标准》不包含以下具体项目："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "本《标准》适用于向零售商或客户交付之前，处于制造商控制内的制造过程及随后的贮藏和分销过程。 BRC 制定了一系列《全球标准》，分别对消费品生产、包装、贮藏和分销过程中所进行广泛活动的要求作出了相应规定。附录 5 阐述了现行《全球标准》的范围及其相互关系的进一步详情。 如果公司符合适当质量管理体系的要求——例如符合 ISO 9001: 2015 或 ISO 22716 GMP 方针要求——其可能已经满足本 《标准》的许多要求。将此类情况提请认证机构的注意将有利于公司。审核员将验证规程足以符合本《标准》要求。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.7",
  "num": "I.7",
  "title": "基于风险的免除",
  "blocks": [
   {
    "t": "p",
    "x": "要求的编写旨在反映对采用各类加工技术的特定产品类别的典型预期（如尿布、化妆品）。但在某些情况下，要求可能不适用于 某一特定操作。某些要求可能在风险的基础上排除；然而，在每一案例中，必须提供风险评估记录供审核员评判。 最终审核报告将包含关于被视为不适用或基于风险分析而排除在外的任何条款的意见。 对制造工厂进行技术审核（如符合本《标准》要求）仅构成供应消费品所需实施的质量与安全措施的一部分，个别指定者全权 决定要求公司提供某一产品。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.8",
  "num": "I.8",
  "title": "《标准》的准则",
  "blocks": [
   {
    "t": "p",
    "x": "企业必须对其所加工、生产和分销的产品有全面的认识，而且必须建立可识别并控制显著影响产品安全与合法性的危害的体 系。本《标准》建立于几个关键组成部分的基础上：高级管理层承诺、产品及流程风险评估、对确认的风险进行管理的系统化 方法，以及落实质量管理体系和适当的运营条件。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.9",
  "num": "I.9",
  "title": "高级管理层承诺",
  "blocks": [
   {
    "t": "p",
    "x": "在企业中，其生产的产品的安全、合法性及质量必须视为跨职能的责任，需要组织内众多部门发挥不同的技能和专业知识。有 效的管理与控制延伸到了技术部门之外，而且必须融合来自生产运营、工程、分销管理、 原材料采购、客户反馈和如培训等人 力资源活动的承诺。 有效执行本《标准》的起点是高级管理层对建立一整套政策的承诺，此将作为一种手段指导各项活动，而这些活动则统统都旨 在确保消费品安全、合法。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.10",
  "num": "I.10",
  "title": "产品风险管理",
  "blocks": [
   {
    "t": "p",
    "x": "本《标准》要求对产品用于预期或合理可预见的用途时可能对消费者造成的风险进行评估，在评估中考虑潜在的使用者和与其 他产品的相互作用。它还需要运用风险评估原则，辨识、管理和控制制造流程中的潜在风险。 需要注意，就本《标准》而言，除与消费者安全直接相关的风险外，必须考虑与未满足法律或质量要求相关的风险。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.11",
  "num": "I.11",
  "title": "产品与质量管理体系",
  "blocks": [
   {
    "t": "p",
    "x": "组织务必将管理政策及规程的框架记录在册，凭此满足本《标准》的要求（即质量管理体系）。组织必须具备生产安全合法产 品所必不可少的基本环境和运营条件（即适当的运营条件）。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.12",
  "num": "I.12",
  "title": "产品安全法规",
  "blocks": [
   {
    "t": "p",
    "x": "本《标准》的目的不在于取代关于某一行业或产品类型产品安全或质量的任何具体法律条例的要求。对于这些要求，掌握最新 知识和遵守相关规定构成本《标准》审核的一部分。本《标准》不取代任何符合个别产品安全标准的需要。 对于一般安全要求和具体的产品或材料要求，产品安全相关立法的复杂程度都正在与日俱增。公司必须有途径明确和理解预期 销售国家或地区与其产品相关的法例，及时掌握最新资讯。 许多国家的零售商有义务向消费者提供安全、合法的产品，且必须采取一切合理的防范措施来保证这一点。他们还需要可以证 明，他们已采取足够的步骤，满足此类要求。制造商、进口商和品牌所有者通常在一定程度上分担上述义务，但对于零售品牌 产品，零售商将承担主要责任。 确保产品安全、合法涉及多项行动，其中包括检验产品供应商的技术能力。多年以来，这项任务或者由零售商自行负责，依照内 部制定的单独标准检验能力和性能，或者使用第三方审核与检验机构。为提高效率、加强一致性，BRC 集思广益，汇聚各个利 益相关者团队，为更新版消费品产品技术标准确立基础，新标准可以单独接受审核，将服务于世界各地的零售商。 公司必须了解以下各类法例和研究，且必须掌握与其所造产品的特定要求相关的最新消息。对于审核考察之间颁布的任何与安 全或质量有关的新法例，公司须确保及时推行和遵循。 公司必须了解："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "要求有关的义务"
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "许多产品类型设有自愿性或强制性标准。其中一些标准针对制造规格，而另一些则与测试方法有关。政府机构已将一些标准设 立为强制性标准，因此必须遵守，而另一些属于自愿性标准。一般建议遵循适用的国家、地区或国际标准，即使它们为自愿性标 准，因为如此可以以直观的方式证明产品在相关方面符合行业最佳规范。如果公司选择不采用自愿性标准，其应采取其他方法 证实产品安全、合法。一些国家习惯于使用此类自愿性共识标准，辅以产品认证计划，作为满足安全要求的主要方法。"
   }
  ],
  "ch": "I"
 },
 {
  "id": "I.13",
  "num": "I.13",
  "title": "认证与审核程序",
  "blocks": [
   {
    "t": "p",
    "x": "当工厂符合本《标准》规定的要求时，可选择依照要求接受审核，进而成为“获得认证的工厂”。审核和认证以各个工厂为单位， 因此拥有多个制造工厂的公司需要对各家工厂进行单独认证。本《标准》是一项流程与产品认证计划，在该计划中，企业将在完 成由独立第三方——认证机构——所聘用的审核员的满意审核后获得认证。 为使企业在结束满意的审核后取得有效的证书，其必须首先选择一家 BRC 认可的认证机构。BRC 规定了认证机构要获得认可 所必须满足的详细要求，以及对审核员的审核专业知识和产品部门知识的具体要求。 关于认证流程和认证机构的更多详情将在本《标准》的第 III 和 IV 章阐明。 第 II 章 如何设置要求 1 高级管理层承诺"
   }
  ],
  "ch": "I"
 },
 {
  "id": "II.1.2.1",
  "num": "II.1.2.1",
  "title": "1.2.1",
  "blocks": [
   {
    "t": "p",
    "x": "工厂公司须备有可体现公司管理结构的最新关键员工组织结构图。须明确划分确保产品安全、合法性 和质量的各项活动的管理责任，且得到各负责经理的理解。另外还须提供明确证据说明，如果负责人 缺席，谁将代表负责人行使职权。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.1.2.2",
  "num": "II.1.2.2",
  "title": "1.2.2",
  "blocks": [
   {
    "t": "p",
    "x": "工厂的高级管理层须确保全体员工都明确自己的责任。在对于所进行的活动制定有成文的工作指导的 情况下，相关员工须有权取用这些文件且能够证明工作是依照相应的指导进行的。 应指定一名高级员工承担按需停止生产的责任和权限。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.2.4.1",
  "num": "II.2.4.1",
  "title": "2.4.1",
  "blocks": [
   {
    "t": "p",
    "x": "包装的目的适用性须接受评估，且判定适于： • 保护产品免受损坏 维持产品完整 保护消费者免受伤害 • 避免污染。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.5.1",
  "num": "II.3.5.1",
  "title": "3.5.1",
  "blocks": [
   {
    "t": "p",
    "x": "工厂须建立有效的供应商审批和监督体系，以确保知晓由原材料、零部件或包装带给最终产品安全、合法性和质量的任何潜 在风险，且对此加以管理。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.5.1.1",
  "num": "II.3.5.1.1",
  "title": "3.5.1.1",
  "blocks": [
   {
    "t": "fa",
    "f": "工厂须设立规定明确、妥善贯彻的供应商审批流 程，包括对产品安全、合法性或质量产生影响的 原材料、零部件及包装的获批供应商名单。 供应商的审批须基于以下的一项或多项： 供应商问卷 • 分析证书 • 供应商审核 范围覆盖所供应产品的供应商认证 良好供货的以往证据。",
    "a": "工厂须设立成文的供应商审批规程，包括对产品 安全、合法性或质量产生影响的产品、材料及服 务的获批供应商名单。 供应商的审批须基于以下的一项或多项： 供应商问卷 • 分析证书 • 供应商审核 范围覆盖所供应产品的供应商认证。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.5.2",
  "num": "II.3.5.2",
  "title": "来料原材料、零部件及包装材料的控制和验收",
  "blocks": [
   {
    "t": "p",
    "x": "公司须确立有效的流程，以确保来料原材料、零部件及包装材料适于使用，且不对成品的安全、合法性或质量造成不良影响。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.5.2.1",
  "num": "II.3.5.2.1",
  "title": "3.5.2.1",
  "blocks": [
   {
    "t": "fa",
    "f": "原材料、零部件及包装须在送达时接受检查，以确保符合约定的规格及任何约定的验收标准，如分析证书。",
    "a": "原材料、零部件及包装须设有成文的审批规程，以确保符合约定的规格和要求，且应设立制定成文的积极批次放行规程。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.5.2.2",
  "num": "II.3.5.2.2",
  "title": "3.5.2.2",
  "blocks": [
   {
    "t": "fa",
    "f": "公司须设立流程，用以确保家内工作者（在采用家内工作者且经过客户批准的情况下）使用的原材料、零部件及包装得到审批。",
    "a": "（在采用家内工作者且经过客户批准的情况下）使用的原材料、零部件及包装得到审批。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.5.2.3",
  "num": "II.3.5.2.3",
  "title": "3.5.2.3",
  "blocks": [
   {
    "t": "fa",
    "f": "公司须设立流程，用以确保原材料、零部件及包装 的真实性，以防欺诈。",
    "a": "公司须设立成文的规程，用以确保原材料、零部 件、包装及文档的真实性，以防欺诈。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.7.1",
  "num": "II.3.7.1",
  "title": "3.7.1",
  "blocks": [
   {
    "t": "fa",
    "f": "公司须实施一项有效的系统，用以在可能的不符 合项对产品安全、合法性或质量至关重要的情况 下，掌握、记录所报告的不符合项或事项，并及时 采取纠正措施。",
    "a": "公司须实施一项有效、制定成文的流程，用以在可 能的不符合项对产品安全、合法性或质量至为关 键的情况下，掌握、记录和及时调查所报告的不符 合项或事项。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.7.3",
  "num": "II.3.7.3",
  "title": "3.7.3",
  "blocks": [
   {
    "t": "fa",
    "f": "公司须确保纠正措施避免问题再次出现，并对纠 正措施的妥善落实进行监督和记录。",
    "a": "公司须确保采取有效的纠正措施以避免问题再次 出现，并对纠正措施在适当时间框架内的妥善落 实进行监督和记录。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.7.4",
  "num": "II.3.7.4",
  "title": "3.7.4",
  "blocks": [
   {
    "t": "p",
    "x": "公司须至少每年对流程进行一次审核，采取可行的预防措施。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.8.1",
  "num": "II.3.8.1",
  "title": "3.8.1",
  "blocks": [
   {
    "t": "p",
    "x": "须实施清楚规程，用于控制不合格材料和产品，包括客户退货，且所有相关获授权人员应理解此类规 程。其中须包括在决定以拒收、妥协接受或代替用途等方式最终处置不合格产品之前的有效识别和 隔离。 3.9 可追溯性 公司须能够追踪从供应商，经过所有的加工步骤并发送到初级客户的所有原材料、零部件及包装，而且能从客户 追溯至供应商。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.9.1",
  "num": "II.3.9.1",
  "title": "3.9.1",
  "blocks": [
   {
    "t": "p",
    "x": "工厂须建立一套体系，以在成品加工及配送的所有阶段及时追溯和跟踪来自供应商的所有原材料、零 部件及包装材料，反之亦然。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.9.2",
  "num": "II.3.9.2",
  "title": "3.9.2",
  "blocks": [
   {
    "t": "p",
    "x": "原材料批量/批次的标识，包括包装、加工助剂、中间品/半成品、部分使用材料、返工品、成品和处于 调查中的材料，须足以确保可追溯性。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.9.3",
  "num": "II.3.9.3",
  "title": "3.9.3",
  "blocks": [
   {
    "t": "fa",
    "f": "依照法律要求或客户规定，成品须使用独一无二 的代码进行标识，例如适用于产品或包装的批次 代码。 必须建立规程用以追踪成品所用原材料或包装的 批次。",
    "a": "成品须使用独一无二的代码进行标识，例如适用 于产品或包装的批次代码。 必须建立成文的规程用以追踪成品所用原材料或 包装的批次。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.9.4",
  "num": "II.3.9.4",
  "title": "3.9.4",
  "blocks": [
   {
    "t": "p",
    "x": "产品或零部件分包制造商须取得事先客户批准，且可追溯至与风险相符的层次。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.9.5",
  "num": "II.3.9.5",
  "title": "3.9.5",
  "blocks": [
   {
    "t": "p",
    "x": "公司须测试系统，以确保可确定从原材料接收到成品与从成品到原材料接收的可追溯性。这须按预先 确定的频率进行，最起码每年进行一次，而且保存测试结果。须计算和记录完成测试所花费的时间。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.3.9.6",
  "num": "II.3.9.6",
  "title": "3.9.6",
  "blocks": [
   {
    "t": "p",
    "x": "应根据风险和任何法律或具体客户要求确立实施全链扩展追溯的需求。如有要求，须实施扩展追溯。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.3",
  "num": "II.4.3",
  "title": "布局、产品流和隔离",
  "blocks": [
   {
    "t": "p",
    "x": "工厂布局、加工流程和人员移动须得当，以防止造成产品污染和掺杂的风险，以及满足相关立法的要求。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.1.1",
  "num": "II.4.1.1",
  "title": "4.1.1",
  "blocks": [
   {
    "t": "fa",
    "f": "须明确界定接受审核的现场，且现场的位置和维 护可以确保生产安全、合法的产品。 须保持外部区域及周边井然有序。",
    "a": "须明确界定接受审核的现场，且现场的位置和维 护可以确保生产安全、合法的产品。 须保持外部区域及周边井然有序。 须保存现场平面图，且可以随时提供。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.1.2",
  "num": "II.4.1.2",
  "title": "4.1.2",
  "blocks": [
   {
    "t": "p",
    "x": "须考虑当地活动和现场环境，而且采取预防污染的措施。在已采取保护现场（免受污染物、洪灾等之害）的措施的情况下，须对这些措施进行定期评审，以反映所出现的任何变化。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.2.1",
  "num": "II.4.2.1",
  "title": "4.2.1",
  "blocks": [
   {
    "t": "p",
    "x": "员工、承包商和访客进入现场须受到控制，且须设立访客报告体系。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.2.2",
  "num": "II.4.2.2",
  "title": "4.2.2",
  "blocks": [
   {
    "t": "fa",
    "f": "从事维护或维修的承包商应符合资格或接受监 工厂布局、加工流程和人员移动须得当，以防止造成产品污染和掺杂的风险，以及满足相关立法的要求。",
    "a": "从事维护或维修的承包商须符合资格或接受监 督，针对可能对产品安全、合法性或质量产生的潜 在影响方面，一名指定的员工须对承包商的行为 负责。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.3.1",
  "num": "II.4.3.1",
  "title": "布局、产品流和隔离",
  "blocks": [
   {
    "t": "p",
    "x": "机械和设备的布局和加工流程的配置须以尽量减少产品污染及损坏的风险为目标。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.3.2",
  "num": "II.4.3.2",
  "title": "布局、产品流和隔离",
  "blocks": [
   {
    "t": "p",
    "x": "工厂须具备充足的作业空间和贮藏能力，以使所有的操作均能够在卫生的条件下（如必要）正常进行。 每件产品必须维持必要的卫生水平。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.3.3",
  "num": "II.4.3.3",
  "title": "布局、产品流和隔离",
  "blocks": [
   {
    "t": "p",
    "x": "工厂和服务设施的位置，包括厕所、清洁和餐饮设施，须与生产区分隔和分离，不得对产品的完整性造成威胁。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.3.4",
  "num": "II.4.3.4",
  "title": "布局、产品流和隔离",
  "blocks": [
   {
    "t": "fa",
    "f": "在对产品安全、合法性、质量或客户要求至关重要 的情况下，须采取控制措施，以防止不同规格的原 材料、在制品、返工品、废料材料、包装、零部件 及成品无意中混杂，确保有效隔离。",
    "a": "须实施有效的隔离以最大程度减少产品交叉污染 的风险，将产品流、材料性质、设备、人员、废料、 气流、空气质量和公共设施考虑在内。 须建立成文的控制规程。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.3.5",
  "num": "II.4.3.5",
  "title": "布局、产品流和隔离",
  "blocks": [
   {
    "t": "p",
    "x": "如果材料或产品需要采取特殊的处理规程，则须维持这类规程，以确保不损害产品的安全、质量及合 法性。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.3.6",
  "num": "II.4.3.6",
  "title": "布局、产品流和隔离",
  "blocks": [
   {
    "t": "p",
    "x": "公司须确定是否使用引起过敏或敏感的材料，以及如使用，是否须针对处理此类材料制定成文的政 策，包括： 在物理或时间上与其他产品隔离 如有必要，使用标记的专用设备 • 对成分进行充分的贴标。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.7",
  "num": "II.4.7",
  "title": "废料和废料处置",
  "blocks": [
   {
    "t": "p",
    "x": "废料须根据法律要求进行管理，而且须有助防止积聚、混杂、污染风险和诱引害虫。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.6.1",
  "num": "II.4.6.1",
  "title": "4.6.1",
  "blocks": [
   {
    "t": "p",
    "x": "设备、生产和贮藏区须维持与所进行作业相符的清洁状态。须妥善完成保洁工作，以最大限度地减少 污染风险，并保留相关记录。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.6.2",
  "num": "II.4.6.2",
  "title": "4.6.2",
  "blocks": [
   {
    "t": "p",
    "x": "须标识、清楚标记和控制适当的清洁化学品，以预防产品污染的风险。除非容器经过恰当的标记和标 识，否则不得将化学品移入其他容器。须提供充足的储存设施并恰当选址，以避免损害产品的安全、 合法性及质量。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.6.3",
  "num": "II.4.6.3",
  "title": "4.6.3",
  "blocks": [
   {
    "t": "p",
    "x": "如果外包保洁服务，服务提供商须已签订合同，明确规定保洁工作的范围和频率，且须保留相关记录。 一名指定的公司代表须负责确保工作的履行情况令人满意。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.6.5",
  "num": "II.4.6.5",
  "title": "4.6.5",
  "blocks": [
   {
    "t": "fa",
    "f": "废料须根据法律要求进行管理，而且须有助防止积聚、混杂、污染风险和诱引害虫。",
    "a": "保洁的标准须与所制造的产品相适应，且须经过 检验、记录成文，而且在适用情况下，与客户商 定。须对纠正措施进行记录。 在建筑施工、维护、设备变更或引进新产品后，须 重新验证保洁规程。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.7.1",
  "num": "II.4.7.1",
  "title": "废料和废料处置",
  "blocks": [
   {
    "t": "p",
    "x": "废料须根据法律要求进行管理，而且须有助防止积聚、混杂、污染风险和诱引害虫。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.7.2",
  "num": "II.4.7.2",
  "title": "废料和废料处置",
  "blocks": [
   {
    "t": "p",
    "x": "在法律要求的情况下，须委聘经过确定和许可的承包商移除废料，且工厂应维持废料处置记录。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.4.7.4",
  "num": "II.4.7.4",
  "title": "废料和废料处置",
  "blocks": [
   {
    "t": "p",
    "x": "如有必要，外部废料收集容器和压缩机须得到管理，以最大限度地减少对产品的风险。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.1.1",
  "num": "II.5.1.1",
  "title": "5.1.1",
  "blocks": [
   {
    "t": "p",
    "x": "须根据规格规定的每一产品或产品组的风险，制定排定日程的产品测试计划。计划须基于以下各类 信息： 产品和流程风险评估的结果 预期销售地区的任何测试法律要求 • 用于表明安全产品生产的工厂要求 须清楚界定测试的方法、频率和规定限制。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.1.2",
  "num": "II.5.1.2",
  "title": "5.1.2",
  "blocks": [
   {
    "t": "p",
    "x": "须执行测试计划，保存所有测试结果的记录。如果结果超出规定规范，则须立即由一名经过授权的胜 任人士进行审核。须评估和记录采取纠正措施的需要，以及在必要的情况下采取任何措施。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.1.3",
  "num": "II.5.1.3",
  "title": "5.1.3",
  "blocks": [
   {
    "t": "fa",
    "f": "在公司进行或转包对于产品安全或合法性至关重要的分析的情况下，实验室或分包商须取得公认实验 室的认证，或者按 ISO/IEC 如果没有使用认可的方法，须提供书面的正当理由说明。",
    "a": "17025 的要求和原则进行操作。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.1.4",
  "num": "II.5.1.4",
  "title": "5.1.4",
  "blocks": [
   {
    "t": "p",
    "x": "除对安全和合法性至关重要的结果，须制定规程，以确保测试结果的可靠性。这须包括： 对公认测试方法和参考标准的运用（如有） 成文的测试规程 • 确保员工有适当的资格和/或培训且有能力进行所需的分析 • 对核实测试结果准确性的系统的运用（如环测试或熟练测试） 对恰当校准和维护设备的运用。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.1.5",
  "num": "II.5.1.5",
  "title": "5.1.5",
  "blocks": [
   {
    "t": "p",
    "x": "须定期审查测试和检验结果，以识别变化趋势。必须理解外部实验室结果的重要性并采取相应的措施。须及时实施相应的措施，以关注任何不满意的变化趋势。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.1.6",
  "num": "II.5.1.6",
  "title": "5.1.6",
  "blocks": [
   {
    "t": "p",
    "x": "如果测试交由第三方进行，须明确规定所需的测试，包括说明测试标准或所用方法的编号、日期及版本。如果公司依靠第三方测试机构的专业知识确定适当的测试要求，公司须确保第三方取得关于测试目的的清晰书面简要介绍，并正式商定和记录测试计划。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.2.1",
  "num": "II.5.2.1",
  "title": "5.2.1",
  "blocks": [
   {
    "t": "p",
    "x": "如有必要，公司须运行数量控制体系，该体系应符合产品销售国的法定要求和/或特定的客户要求。 现场须备有书面证据以证实相关主张。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.5.2.2",
  "num": "II.5.2.2",
  "title": "5.2.2",
  "blocks": [
   {
    "t": "p",
    "x": "如果需要开展数量检查，基于有效取样计划的频率和方法须符合任何数量检验相关立法的最低 要求。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1",
  "num": "II.6.1.1",
  "title": "流程风险评估",
  "blocks": [
   {
    "t": "p",
    "x": "流程风险评估"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1.1",
  "num": "II.6.1.1.1",
  "title": "6.1.1.1",
  "blocks": [
   {
    "t": "fa",
    "f": "危害与风险分析须由一支多学科团队或者事实证 明可以胜任的经理开展。 如果工厂内部缺乏相应的专业知识，可寻求外部 技术力量，但体系的日常管理须始终是工厂自己 的责任。",
    "a": "危害与风险分析须由一支多学科团队开展，团队 成员包括对工厂从事的特定活动具备丰富经验的 代表。团队成员须了解危害与风险分析准则。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1.3",
  "num": "II.6.1.1.3",
  "title": "6.1.1.3",
  "blocks": [
   {
    "t": "p",
    "x": "如果危害与风险分析研究已由总公司集中进行，现场须备有准确的流程图。 必须可以证明集中危害与风险分析已证实符合当地运作的具体活动。检验活动包括内部审核及投诉 分析。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1.4",
  "num": "II.6.1.1.4",
  "title": "6.1.1.4",
  "blocks": [
   {
    "t": "p",
    "x": "危害与风险分析的范围须根据所含的产品和流程而确定。 工厂须建立准确的加工流程图，确定产品生产的每一步骤。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1.5",
  "num": "II.6.1.1.5",
  "title": "6.1.1.5",
  "blocks": [
   {
    "t": "fa",
    "f": "工厂须考虑每个加工阶段可能出现的潜在产品安 全与质量问题。 每项潜在问题须经过评估，以确定风险水平，确立 适当的控制措施以减少或消除风险。",
    "a": "工厂须考虑每个加工阶段可能出现的潜在产品安 全与质量问题。这应包括： 物理或化学产品污染 • 微生物污染 • 与所生产产品相符合的产品质量或安全问题 评估结果须记录在册。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1.7",
  "num": "II.6.1.1.7",
  "title": "6.1.1.7",
  "blocks": [
   {
    "t": "fa",
    "f": "如果任何重大的产品安全或质量问题由流程监控 所控制，须确定流程参数，同时保持对流程检查 的记录。",
    "a": "对于每一种需要进行控制的问题，须对控制点进 行评审，以识别对于防止、消除问题或将问题缓解 至可接受的限度至关重要的临界控制点。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1.8",
  "num": "II.6.1.1.8",
  "title": "6.1.1.8",
  "blocks": [
   {
    "t": "fa",
    "f": "如果存在确定的临界控制点 工厂须： 建立和验证临界限制 • 建立 CCP 控制监控体系 • 确立监控表明特定 设立包括系统审核在内的验证和检验规程，以确认系统有效运作 建立关于所有规程和记录的适当存档。",
    "a": "(CCP)，需要针对产品安全和合法性设置控制措施，对于每个 CCP， 超出控制范围时采取的纠正措施"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.1.1.9",
  "num": "II.6.1.1.9",
  "title": "6.1.1.9",
  "blocks": [
   {
    "t": "p",
    "x": "如流程与规格偏差，须采取纠正措施。此须记录在案。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.3.1",
  "num": "II.6.3.3.1",
  "title": "6.3.3.1",
  "blocks": [
   {
    "t": "p",
    "x": "工具和其他尖锐金属器具，包括制造中所用的刀、切割刀片、针、穿孔刀片及金属丝，如存在造成产品 污染的风险，则须予以控制。可用的方法包括但不限于以下： 将工具永久固定在设备上以防遗失 • 使用物品发放编目及登记规程控制各项物品 • 在发放替换用针之前，回收破损的针的所有部分。 禁止使用可折断刀片美工刀。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.3.2",
  "num": "II.6.3.3.2",
  "title": "6.3.3.2",
  "blocks": [
   {
    "t": "p",
    "x": "不得在开放式产品区使用书钉、纸夹和图钉。 在使用书钉或其他物品作为包装材料或封装材料的情况下，须采取适当的预防措施，以最大限度地减 少产品污染风险。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.4.1",
  "num": "II.6.3.4.1",
  "title": "6.3.4.1",
  "blocks": [
   {
    "t": "p",
    "x": "须避免在存在产品污染风险的区域使用玻璃或其他易碎材料，否则应采取防碎措施。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.4.2",
  "num": "II.6.3.4.2",
  "title": "6.3.4.2",
  "blocks": [
   {
    "t": "p",
    "x": "如果可能对产品造成风险，生产区域的所有玻璃、陶瓷、木材及易碎塑料物品（作为产品一部分的物品 除外）须包含在风险评估范围内，且在登记册中列明。处理这类材料的成文规程须包括： 按照规定的时间间隔定期检查这类材料的状况，并进行记录 在事故报告中记录所有破损状况 • 隔离受污染的产品 • 记录保洁或更换的详情，以最大限度地减少产品污染的可能性。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.5",
  "num": "II.6.3.5",
  "title": "6.3.5",
  "blocks": [
   {
    "t": "p",
    "x": "异物检测和清除设备 风险评估须明确设备的可能使用情形，以检测和清除异物污染。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.5.1.1",
  "num": "II.6.3.5.1.1",
  "title": "6.3.5.1.1",
  "blocks": [
   {
    "t": "p",
    "x": "用于控制异物的过滤器和筛子须具备规定的网孔尺寸或容量规格，而且其设计应能够提供对产品的最 大实际保护。须对被系统保留或剔除的材料进行检验并记录，以识别风险。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.5.1.2",
  "num": "II.6.3.5.1.2",
  "title": "6.3.5.1.2",
  "blocks": [
   {
    "t": "fa",
    "f": "须定期对过滤器和筛子的破坏情况进行检查和 测试。 存在缺陷的筛子和过滤器须隔离，并采取适当的 措施予以更换。 须维持相关记录。",
    "a": "须按根据风险评估确定的成文的频率定期对过滤 器和筛子的破坏情况进行检查和测试。 存在缺陷的筛子和过滤器须隔离，并采取适当的 措施予以更换。 须维持相关记录。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.5.2",
  "num": "II.6.3.5.2",
  "title": "金属探测器和 X 射线设备",
  "blocks": [
   {
    "t": "p",
    "x": "金属探测器和 X 射线设备"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.5.2.1",
  "num": "II.6.3.5.2.1",
  "title": "6.3.5.2.1",
  "blocks": [
   {
    "t": "p",
    "x": "如果根据风险评估需要金属或其他异物探测器，公司须建立成文的规程，具体说明测试方法和频率、 探测临界限制，以及测试结果记录。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.5.2.2",
  "num": "II.6.3.5.2.2",
  "title": "6.3.5.2.2",
  "blocks": [
   {
    "t": "p",
    "x": "金属探测器或 X 射线设备须满足以下各项要求之一： • 自动拒收装置 • 带报警器的皮带停止运行系统（在产品不能被自动拒绝的情况下），如对于很大的袋子 • 识别污染物位置的生产线上探测器，以实现对受影响产品的有效分离。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.3.5.2.3",
  "num": "II.6.3.5.2.3",
  "title": "6.3.5.2.3",
  "blocks": [
   {
    "t": "p",
    "x": "须实施相关系统，以分离金属探测器拒收的产品，从而避免这类产品意外重新进入生产线，协助对金 属污染物源头的调查。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.6.1",
  "num": "II.6.6.1",
  "title": "6.6.1",
  "blocks": [
   {
    "t": "p",
    "x": "须实施控制以确保存货周转准确，且在适用的情况下，在规定的保质或使用期限内按正确的次序使用 材料和产品。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.6.2",
  "num": "II.6.6.2",
  "title": "6.6.2",
  "blocks": [
   {
    "t": "p",
    "x": "公司须确保由外部分包商带入的产品应包含在产品放行规程中。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.6.6.3",
  "num": "II.6.6.3",
  "title": "6.6.3",
  "blocks": [
   {
    "t": "fa",
    "f": "仅符合规格和约定质量要求的商品得以放行，进 入配送程序。 如果未开展此类控制措施，公司须对此拥有充分 的正当理由，在客户协议中明文规定，至少一年审 核一次。",
    "a": "须设立成文的规程，以确保仅符合规格的产品 得到放行，进入配送程序。规程可能包括但 不限于： 经授权的员工的积极最终放行 • 在线测试方法 • 自动拒收流程（须接受验证和监控）。 如果风险评估决定不需要此类控制措施，公司须 对此拥有充分的正当理由，在客户协议中明文规 定，且至少一年审核一次。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "II.7.3.8",
  "num": "II.7.3.8",
  "title": "7.3.8",
  "blocks": [
   {
    "t": "fa",
    "f": "如果存在对产品安全和合法性的风险，工厂应已 制定规程，允许包括临时工、访客及承包商在内的 人员报告他们可能已接触或在遭受的任何传染疾 病或症状。",
    "a": "工厂须制定成文的规程，允许包括临时工、访客及 承包商在内的人员报告他们可能已接触或在遭受 的任何传染、疾病或症状。"
   }
  ],
  "ch": "II"
 },
 {
  "id": "III.0",
  "num": "III.0",
  "title": "审核协议 概述",
  "blocks": [
   {
    "t": "p",
    "x": "通用审核协议描述了适用于两种认证水平所有审核方案的审核和认证要求。此应在开展认证流程之前仔细阅读和充分理解。 公司是否符合《消费品全球标准：个人护理及家庭》要求及是否适合授予认证，将由独立审核公司——认证机构——予以评 估：评估采取赴厂审核的形式，由获批的认证机构进行。BRC 自身不开展任何审核。图 1 概述了公司取得和维持认证的详细 流程。 将依照所选择的审核方案和不符合项的数量及类型对认证进行评级。本《标准》的这一章节将介绍寻求认证的公司应遵循的 流程。 图 1 审核协议——如何获取认证"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1",
  "num": "III.1",
  "title": "通用协议——审核准备",
  "blocks": [
   {
    "t": "p",
    "x": "取得 BRC 认证对于公司而言往往充满挑战。重要的是，公司为审核做好万全准备，否则可能产生不必要的大额成本，而且可能 对结果感到失望。有意取得认证的公司应对以下方面予以考虑："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "许多认证机构提供可选的预评估考察。认证机构不得作为顾问行事，因为这可能造成认证机构审核自身的工作，但是预评估考 察有助于落差分析，帮助公司清楚了解流程和规程待改进的地方。实证表明，对于许多公司而言，预评估考察大有益处，大幅提 升在 BRC 《全球标准》审核中成功取得认证的机会。 预评估考察不属于认证流程的一部分，不计入实际认证审核。 如果公司与特定零售商或其他指定者合作，建议与工厂技术团队探讨实施计划，以确保所采取的步骤与零售商的要求和时间框 架相符。 公司可以参加由 BRC 和其他 BRC 批准的培训师讲授的培训课程。有关详情，请访问 BRC 全球标准网站的培训页面。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.1",
  "num": "III.1.1",
  "title": "选择审核方案",
  "blocks": [
   {
    "t": "p",
    "x": "为满足指定者的不同期望，《标准》可分为基础水平或高级水平。所有法律要求和所有意向声明的目标适用于两个水平。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.1.1",
  "num": "III.1.1.1",
  "title": "基础水平",
  "blocks": [
   {
    "t": "p",
    "x": "工厂必须可以证明其满足标题为“基础”的一栏中的全部要求。必须实施所有法律、安全及关键质量检查。产品必须符合预期 销售地的法例。这往往是代表客户的第三方的责任。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.1.2",
  "num": "III.1.1.2",
  "title": "高级水平",
  "blocks": [
   {
    "t": "p",
    "x": "工厂必须满足标题为“高级”的一栏中的全部要求。其中包括对用以确定产品和流程控制措施的风险评估和所有要求的实际运 用设立明文规定的规程。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.2",
  "num": "III.1.2",
  "title": "标准符合性自我评估",
  "blocks": [
   {
    "t": "p",
    "x": "根据认证要求，公司应备有现行《标准》的电子或纸质原始版本。如果公司拥有中央总部和多个工厂，《标准》应由总部持有，且 获取《标准》原始版本是为认证进行准备的第一步。第二步是阅读和理解《标准》。第三步是公司依据《标准》开展初步自我评 估，解决任何不符合的领域。 和培训课程。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.3",
  "num": "III.1.3",
  "title": "选择认证机构",
  "blocks": [
   {
    "t": "p",
    "x": "一旦完成自我评估，解决不符合项，公司必须选择一家认证机构。BRC 无法就具体认证机构的条款提供建议，但 BRC 全球标 准名录 (www.brcdirectory.com) 列出获 BRC 批准的认证机构。 在挑选认证机构时，公司应考虑以下各点："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "定机构公布的资格鉴定计划表，取得对于认证机构资格鉴定范围的认证，以及认证机构可审核的产品类别的确认。附录 2 提 供了类别和产品示例清单。"
   },
   {
    "t": "ul",
    "items": []
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.4",
  "num": "III.1.4",
  "title": "公司/认证机构合约安排",
  "blocks": [
   {
    "t": "p",
    "x": "公司与认证机构之间须根据 ISO/IEC 17065 的规定订立合约，详细说明审核范围和报告要求。另外，合约还须包含允许 BRC 对 其方案进行有效管理以及允许资格鉴定机构对其认证机构进行资格鉴定的条款。这些条款对于确保在方案管理和得以持续付 诸实施方面的信心至关重要，对于所有已获得认证的工厂都有益。特别地，要获得对方案的认证，必须满足以下各个条件："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "结果。与审核相关的其他文件须根据 BRC 的请求有索必供。向 BRC 所提交的所有文件均须为原件。向 BRC 所提供的文件 应保密。"
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "获得认证后，为了受理投诉或作为 BRC 例行合规活动的一部分，BRC 有权开展其自己的审核或赴厂考察，以确保方案的尊严。 此类的赴厂考察可能是通知的，也可能是突击性的。 BRC 可就认证状态或为了获取对有关认证机构绩效的反馈而与工厂直接联系，甚至可对被举报的问题展开调查。 本出版物规定对希望申请依照本《标准》进行审核工厂以及已获授证书工厂的要求。认证机构与工厂间的合约须包含对 这些义 务表示认可的条款。该合约将由认证机构制定。 对任何此类合约义务的任何不遵守均会影响对工厂认证的状态。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.5",
  "num": "III.1.5",
  "title": "注册费",
  "blocks": [
   {
    "t": "p",
    "x": "BRC 将要求认证机构就每次审核向公司收取注册费。收到注册费以及认证机构的审核费后，证书及审核报告方能生效，而与认 证过程的结果无关。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.6.1",
  "num": "III.1.6.1",
  "title": "确定审核范围",
  "blocks": [
   {
    "t": "p",
    "x": "审核范围——所生产的产品和制造过程——须在审核之前在工厂与认证机构之间达成一致，以确保调配具备适当类别和产品 知识的审核员。 审核须包括本《标准》内的所有适用要求以及寻求认证工厂认证范围内所含产品所采用的所有生产流程。 审核范围及任何准可的例外内容均须在审核报告及所颁发的任何证书中予以明确界定。审核范围的措辞将由审核员在现场审核 期间核准。产品组以及适用情况下包装方式的措辞须能够使报告或证书的获授方清楚地确定所供产品是否包含在该范围之 内。这应包括对工厂所从事的属于本《标准》范围之内加工活动的描述，从而使报告或证书的使用者更为明确 和了解（如洗浴产 品的吹瓶、混合、装瓶和包装）。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.1.6.2",
  "num": "III.1.6.2",
  "title": "审核范围免除内容",
  "blocks": [
   {
    "t": "p",
    "x": "认证标准的履行依赖于工厂管理层对采用本《标准》内所列最佳规范原则的明确承诺。因此，只有在例外情形下从认证范围内 免除产品才是允许的。 BRC 徽标只准由不存在免除内容的工厂使用。 工厂所生产产品的免除只有在以下情况下才是可接受的："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "在请求免除的情况下，这须在审核之前与认证机构达成一致。免除内容须在审核报告和证书以及审核报告内所记录的原因说明 中予以明确说明。 产品认证必须包含对从原材料到最终产品发货的整个流程的审核。既不得排除工厂所从事加工的任何部分，也不得排除本 《标准》的任何部分。在免除内容获准的情况下，审核员须评估由被免除领域或产品所产生的任何危害（如过敏原或异物风险 的引入），以及可能发现的与被免除领域有关、对审核范围内产品产生风险的不符合项。 审核员保留在未充分满足标准的情形下驳回免除请求的权利。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.1.1",
  "num": "III.2.1.1",
  "title": "公司的准备工作",
  "blocks": [
   {
    "t": "p",
    "x": "对于初次审核，工厂须在适当考虑满足本《标准》的要求所需完成工作量的情况下协商确定一个对于双方都方便的日期。工厂 必须为审核做好准备，包括备好适当的文件以供审核员进行评估以及让相关员工在现场审核期间始终待命以听从召唤。 工厂须确保审核时生产计划表包含预期认证范围所涵盖的相关产品。一旦可行，这些产品的最大范围须处于生产状态，以供审 核员评估。在产品范围大或品种多的情况下，审核员可酌情决定是否继续审核，直到对预期的认证范围完全满意为止。在重要 生产流程只能在一年中不同于审核期的时段运行的情况下，可能需要进行单独审核，以评估该生产方法。是否需要附加审核将 取决于新增流程和产品的性质，以及与审核范围内流程和产品的差异程度。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.1.2",
  "num": "III.2.1.2",
  "title": "向认证机构提供审核筹备情况信息",
  "blocks": [
   {
    "t": "p",
    "x": "工厂须在审核日期之前向认证机构提供背景信息，以确保审核员做好充分准备并提供可高效完成审核的最佳机会。认证机构将 请求提供相关信息，其中包括，但不仅限于："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "在与新认证机构签署审核合约的情况下，工厂须向认证机构提供上一年的审核报告和证书。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.1.3",
  "num": "III.2.1.3",
  "title": "审核持续时间",
  "blocks": [
   {
    "t": "p",
    "x": "进行审核之前，认证机构须说明审核的大概持续时间。审核的典型持续时间为基础水平 1 到 1.5 天（在工厂 8 小时/天），高级 水平 2 到 3 天。评估对任何特定工厂进行审核所需预期时间的计算表已开发完成，以确保一致性，且须用作计算审核总持续时 审核持续时间的计算基于："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "显然，其他因素也可能影响计算结果，但认为不是很显著，因此对审核总持续时间的影响不得超过 30%。这些因素包括："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "如果审核过程包含对额外贮藏设施、地点或总公司的评估，则须在审核计算表所计算时间的基础上另外分配时间。 如果依照本《标准》所进行的审核包括 BRC 自愿性审核模块或需要结合其他审核标准进行，则应适当延长审核的总持续时间。 有关联合审核的详情，须在审核报告中予以说明。 审核持续时间的计算须确定在工厂进行审核预计所需的时间量。审核所提供的书面证据和完成最终审核报告将需要附加 时间。 如与所计算时间框架出现偏差，必须理由充分且在审核报告中予以说明。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.2",
  "num": "III.2.2",
  "title": "现场审核",
  "blocks": [
   {
    "t": "p",
    "x": "现场审核包括以下七个阶段："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "同 BRC 全球标准有关审核技术指导文件中所规定。"
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "除首次会议和总结会之外，审核员无需按照所列的顺序开展审核，但审核必须包括所有七个组成要素。 工厂须全程、全方位地协助审核员的工作。代表工厂出席首次会议和总结会的人员应为高级经理层人员，他们应持有适当的权 限，以确保在发现不符合项时可推进纠正措施的实施。工厂的最高运营经理或所任命的副经理须在审核期间待命，而且应出席 首次会议和总结会。 审核过程的重点在于产品安全与质量管理规程和通用良好操作规范的实际实施情况。审核生产和现场设施、员工面谈、观察流 程和与员工一起审核生产区文件预计将占审核期至少 50% 的时间。 审核期间，审核员须对工厂对照本《标准》的符合项和不符合项进行详细记录，这些记录将用作审核报告的基础。审核员须评 估任何不符合项的性质和严重程度，而且须与审核期间陪伴审核的工厂代表一起进行讨论。 在总结会上，审核员须阐述他们的审核发现并再次确认审核期间已发现的所有不符合项，但不得对认证过程的可能后果进行评 论。必须提供有关工厂向审核员提供解决不符合项纠正措施证据的进程和时间框架信息。审核员将在总结会上或 审核完成后 一个工作日之内把在总结会上所讨论的不符合项形成书面摘要。 在总结会上，审核员须向工厂提供有关 BRC 全球标准名录以及可与认证机构和 BRC 进行交流的反馈系统的说明，前者允许安 全访问客户及其指定客户的审核数据。 授予认证的决定以及证书的等级将由认证机构管理层，继对审核报告的技术审核和不符合项在适当时间框架内的撤销后，独立 确定。公司将在此项审核之后接到有关认证决定的通知。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.3",
  "num": "III.2.3",
  "title": "不符合项及纠正措施",
  "blocks": [
   {
    "t": "p",
    "x": "审核员依照本《标准》的要求所评定的不符合项级别是依照审核期间所收集的证据以及所进行的观察，对不符合项的严重性和 风险作出的客观判断。这将由认证机构管理层进行核准。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.3.1",
  "num": "III.2.3.1",
  "title": "不符合项",
  "blocks": [
   {
    "t": "p",
    "x": "不符合项分为三个级别："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "所生产产品的合规性造成重大嫌疑。"
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "审核的目的在于提供对运营标准以及对本《标准》遵守程度的真实反映。如对照本《标准》的特定条款反复出现次要不符合项， 则应以一个主要不符合项论处。不允许累积相当多的针对某个条款的次要不符合项并将其 记录为一个次要不符合项。认证机构 须对未将大量（多于 20 个）次要不符合项记录为一个以上主要不符合项的情况说明理由。这须在审核报告中详细列明。 此次审核中须检查上一次审核发现的任何不符合项，以确认已采取纠正措施，且纠正措施有效运作。如此次审核中再次出现相 同的不符合项，须进行记录，考虑将重复出现的次要不符合项的状态提升为主要不符合项。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.3.2",
  "num": "III.2.3.2",
  "title": "不符合项处理规程及纠正措施",
  "blocks": [
   {
    "t": "p",
    "x": "在审核期间发现任何不符合项之后，工厂必须采取纠正措施以及时补救（纠正）并对不符合项的背后原因（根本原因）进行分 析，而且必须制定纠正措施计划，以解除根本原因并预防再次发生。 “撤销”不符合项的过程取决于所发现的不符合项的级别和数量。 导致无法通过认证的单个或多个关键不符合项 在某些情况下，审核期间所发现的不符合项达到一定数量或严重性会影响工厂继审核之后是否可通过基础或高级水平认证。这 类情形包括："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "不符合项的等级将在审核之后由认证机构通过独立认证流程进行复核。在复核确认不予授予证书的情况下，工厂需要在 认证 评估之前再次接受全面审核。 如已获得认证的工厂发生上述情况，则必须立即撤销认证。 复审不得在审核日期后的 28 天内进行，因为不太可能在 28 天内解决不符合项，而且制定并实施全面有效的改进措施——但也 不排除有例外情况。 有些客户要求，如发现其供应商存在关键不符合项或未能通过认证，则须通知他们。在此情况下，公司须及时通知其客户并让客 户全面了解相关情况。如必要，还应向客户提供有关要采取的纠正措施以解决不符合项的信息。 主要和次要不符合项 只有证明已永久性地或通过认证机构可接受的临时解决方案解决主要和次要不符合项，方能授予证书。 对于所发现的每一个不符合项，工厂除采取及时必要的纠正措施外，还须审查不符合项的根本原因。工厂须查明根本原因并向 认证机构提供纠正不符合项的行动计划，包括时间安排。所提议的预防措施须包含在审核报告中。 不符合项的撤销既可通过向认证机构提供客观证据（如更新的规程、记录、照片或所进行工作的发票）实现，也可通过让认证 机构进行进一步现场考察实现。 在高级水平审核期间所发现不符合项的数量和级别致使授予 D 级证书的情况下（基础水平审核不进行评级），不符合项的撤销 须通过对工厂进一步考察的方式进行，以审查所采取的措施。如果要签发证书，此项考察须在审核之后 28 天之内进行。 仅限于初次审核允许最多 90 个日历日提供证明纠正审核时发现的任何不符合项的客观证据。工厂将维持未认证的状态，直至 对实施的纠正措施进行检验之后，方可取得认证。 对于重新认证审核中发现的所有次要不符合项和主要不符合项，如果未能在审核后 28 个日历日的提交期限内提供令人满意的 证据，将不予授予认证。 在两种情况下，如果工厂无法在期限内撤销不符合项，则工厂需要接受进一步的全面审核，方能考虑是否予以认证。 在下一次工厂审核期间，还须检查上次审核所发现的不符合项，以验证是否有效地撤销了不符合项及其根本原因。在纠正措施 不奏效的情况下，须再次提出不符合项。 认证机构将在授予证书之前审查已完成纠正措施的客观证据。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.4",
  "num": "III.2.4",
  "title": "审核等级",
  "blocks": [
   {
    "t": "p",
    "x": "认证评级体系的目的在于向报告使用者指出工厂需持续遵守的承诺，而且将决定日后审核的频率。认证的等级取决于审核期间 所发现的不符合项的数量和严重程度。不符合项将由认证机构管理层通过技术评审流程进行核准。如果评审致使不符合项的 数量和/或严重程度发生变化，工厂须接到相应的通知。 基础水平审核不进行评级，而是采用通过或不通过体系。 为取得认证，工厂必须遵守所有相关条款，发现的所有不符合项应根据第 2.3.2 条所述撤销。表 1 表明导致无法通过认证的不 符合项的数量和等级。 高级水平审核的评级如表 1 所示。 表 1 评级标准、所需采取措施和审核频率摘要 等级 关键 主要 次要 纠正措施 审核频率 AA 5 项或以下 28 个日历日内提供客观证据（如属初次审 12 个月 核，则为 90 日） A 6–10 28 个日历日内提供客观证据（如属初次审 12 个月 核，则为 90 日） B 11–16 28 个日历日内提供客观证据（如属初次审 12 个月 核，则为 90 日） B 1 10 项或以 28 个日历日内提供客观证据（如属初次审 12 个月 下 核，则为 90 日） C 17–24 28 个日历日内提供客观证据（如属初次审 12 个月 核，则为 90 日） C 1 11–16 28 个日历日内提供客观证据（如属初次审 12 个月 核，则为 90 日） C 2 10 项或以 28 个日历日内提供客观证据（如属初次审 12 个月 下 核，则为 90 日） D 25–30 28 个日历日内重新赴厂考察（如属初次审 12 个月 核，则 为 90 日） D 1 17–24 28 个日历日内重新赴厂考察（如属初次审 12 个月 核，则 为 90 日） D 2 11–16 28 个日历日内重新赴厂考察（如属初次审 12 个月 核，则 为 90 日） 不予认证 1 项或以上 不授予证书。需要重新审核 不予认证 31 项或以 不授予证书。需要重新审核 上 不予认证 1 25 项或以 不授予证书。需要重新审核 上 不予认证 2 17 项或以 不授予证书。需要重新审核 上 不予认证 3 项或以上 不授予证书。需要重新审核 请注意，阴影单元格表示零个不符合项。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.5",
  "num": "III.2.5",
  "title": "审核报告",
  "blocks": [
   {
    "t": "p",
    "x": "每次审核后，均须按商定的格式编制全面书面报告。报告须根据使用者的需要使用英语或其他语言书就。在报告用非英语语言 书就的情况下，审核摘要部分须另行使用英语撰写。 审核报告须根据本《标准》的规定，向公司及客户或潜在客户提供对公司的简介和准确的工厂绩效摘要。 审核报告必须帮助读者了解："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "报告须准确反映审核员的审核结果。报告须在全面审核完成之后 42 个日历日内编制并派发给公司（如属初次审核，则为 104 个 日历日）。 无论是否颁发证书，审核报告均须及时上传至 BRC 全球标准名录。审核报告的所有者可向名录中的客户或其他方分配对审核 报告的访问权限。 审核报告及相关文件，包括审核员备注，均须由认证机构妥善保存 5 年。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.5.1",
  "num": "III.2.5.1",
  "title": "临时报告",
  "blocks": [
   {
    "t": "p",
    "x": "一些客户可能要求在完成审查和认证过程之前告知其审核的结果。在此类情况下，将在审核后 10 个日历日内出具一份说明审核 水平和发现的不符合项的临时报告，并将该报告上传至 BRC 名录。工厂可与其客户共享该临时报告。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.6",
  "num": "III.2.6",
  "title": "认证",
  "blocks": [
   {
    "t": "p",
    "x": "评审审核报告及与所发现的不符合项相关的书面证据之后，所指定的独立认证经理须做出认证决定。如决定授予证书，这须由 认证机构于审核之后 42 个日历日内签发（如属初次审核，则为 104 个日历日）。证书须符合附录 4 所示的格式。证书上所使用 的徽标（如 BRC 和资格鉴定机构徽标）须遵循它们各自的使用规则。 证书将详细列出："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "证书上所显示的审核日期须为与授予证书相关的审核的日期，而与之后确认纠正措施的赴厂检查无关。 尽管证书是颁发给工厂的，但其依然是认证机构的财产，该机构控制其所有权、使用和展示。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.7.1",
  "num": "III.2.7.1",
  "title": "确定复审日期",
  "blocks": [
   {
    "t": "p",
    "x": "后续审核时间表和审核方案的选择将由工厂与认证机构协商确定。通知审核的频率将为 12 个月一次。 后续审核的到期日期须按初次审核的日期进行计算，不按证书的颁发日期计算，与是否需要进一步赴厂验证初次审核中所提出 的纠正措施无关，而且不按证书的颁发日期计算。 后续通知审核须安排在下一次审核到期日之前的 28 天内。这样可确保在发现任何不符合项的情况下，有足够的时间采 取纠正 措施，而不会影响继续认证。 工厂有责任维护认证。如审核推迟至预定到期日期之后，除非是理由充分的情况，否则在下次审核时须导致以主要不符合项论 处。理由充分的情况须在审核报告中予以记录。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.7.2",
  "num": "III.2.7.2",
  "title": "证书到期——理由充分的情况",
  "blocks": [
   {
    "t": "p",
    "x": "在某些情况下，由于认证机构无法开展审核，致使证书无法按照 12 个月的期限展期。这些不会以主要不符合项论处的 理由充分的情况（1.1.5 条款）可包括当工厂："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "出于合并审核、人手不够或进行修建工作的原因而将审核日期延后到更“可接受”的日期不是错过到期日期的可接受理由。 仅仅因工厂未处于全面生产状态不是推迟审核的正当理由；然而，审核必须在生产产品期间进行。 如果证书由于这些例外情况而不能得到展期，客户仍可决定在约定期限内从该工厂采购产品，因为客户仍可以通过诸如风险评 估和投诉记录等其他方法证明其符合法规的要求，进而表明该工厂在安排下一次审核之前仍有能力继续生产。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.7.3",
  "num": "III.2.7.3",
  "title": "在到期日期前进行审核",
  "blocks": [
   {
    "t": "p",
    "x": "展期审核的到期日期将于初次审核的 12 个月周期到来之前在 28 天时间窗口中发生。 在某些情况下，可以在到期日期到来之前进行审核，比如重新确定日期以便与其他方案合并审核，或者要包括在不同季节所生 产的产品。在审核日期提前的情况下，须遵守以下规则："
   },
   {
    "t": "ul",
    "items": []
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.2.7.4",
  "num": "III.2.7.4",
  "title": "季节性生产工厂",
  "blocks": [
   {
    "t": "p",
    "x": "有关“季节性生产工厂”的定义，请参见词汇表。 一年 12 个月开工的工厂可能在加工不同季节的产品，但不会被划分为季节性生产工厂，因为它整年都在运营。如果特定的时令 性产品包含在这一范围内，那么可能存在一年赴厂审核一年一次以上的情况。 对于真正的季节性生产工厂，可能存在审核的频率会在 12 个月以上的情况。现场审核日期可能受由关键节庆活动推动的季节 性需求影响。这类情况下证书的失效日期将受实际审核日期的控制，而非初次审核日期的周期日期。审核报告中应阐明相应的 理由。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.3.1",

  "title": "与认证机构的交流",

   {
    "t": "p",
    "x": "在公司内部状况发生变化，可能影响持续认证有效期的情况下，工厂必须及时通知认证机构。这可能包括："

   {
    "t": "p",
    "x": "认证机构须对此采取切实的步骤评估相关情形及对认证的任何影响，然后采取合理措施。 工厂须按认证机构的请求提供相关信息，以便就对当前证书有效期的影响做出评估。 认证机构可根据情况："

    "items": []

 {
  "id": "III.3.2",
  "num": "III.3.2",
  "title": "范围扩展",
  "blocks": [
   {
    "t": "p",
    "x": "一旦获得认证后，如需要在认证范围内增补工厂所生产的任何重要产品或所采用的任何流程，必须与认证机构进行沟通。认证 机构须评估新产品或流程的重要性并决定是否要进行赴厂考察，以检查所需范围扩展的各个方面。 在以下情况下，要批准范围扩展，需要进行重新赴厂考察："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "比如，在以下情况下，赴厂考察的可能较低："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "在证书要失效之前不久要求范围扩展的情况下，进行全面审核并颁发新证书可能更合适些。这一选择应在进行范围扩展审核之 前在认证机构与其客户之间达成一致意见。 当认为有必要进行重新赴厂考察时，这一考察的持续时间将依对所要求范围扩展进行检查项目多少的不同而不同。赴厂考察应 依照与原审核相同的原则进行（如包括首次会议、流程运行检查、文件跟踪和总结会）。重新赴厂考察应当事先通知。 应对所发现的不符合项编制成文并在本《标准》常规协议的范畴内（如公司有提供撤销不符合项相应证据的 28 天时间 以及认 证机构应评审相关信息并以正常方式确认认证决定）采取相应的措施。赴厂考察期间所发现的附加不符合项既不影响当前的认 证等级，也不影响继续保持认证。然而，如果发现致使认证机构怀疑继续保持认证理由的做法（如发现关键不符合项），那么认 证机构须安排对工厂的重新全面审核。在这样的情况下，当前证书须被撤销。 须编制赴厂考察报告，但格式应有别于 BRC 标准审核报告。报告须简要阐明赴厂考察的性质、所审核的内容和结论。赴厂考察 报告应注明现行的控制措施并确认这些控制措施的有效性。报告应明确说明所考查的各个方面以及所免除的内容。 工厂的当前证书将由所颁发的任何新的证书所替代。证书必须使用与原证书所列相同的失效日期。因此，下一次全面审核的到 期日期将保持相同，而且这应由认证机构在安排范围扩展赴厂考察之前明确告知供应商。再者，等级亦须保持相同。 证书应涵盖此为范围扩展的相关标识以及赴厂考察日期。"
   }
  ],
  "ch": "III"
 },

  "ch": "III"
 },
 {
  "id": "III.3.4",
  "num": "III.3.4",
  "title": "上诉",
  "blocks": [
   {
    "t": "p",
    "x": "公司有权对认证机构所作出的认证决定进行上诉，而且任何上诉均应在收到认证决定后 7 个日历日内以书面形式向认证机构 提出。 认证机构须制定成文的规程，以受理并解决对认证决定的上诉。这些调查程序须独立于审核员和认证经理本人。 各认证机构的书面上诉程序对于工厂应有索必供。对上诉的最终裁决结果应在收到上诉后 30 个日历日内作出。完整的书面回 复将在完成对上诉的全面和彻底调查后作出。 即使上诉没有成功，认证机构也有权收取上诉费用。"
   }

  "ch": "III"

 {
  "id": "III.3.5",
  "num": "III.3.5",
  "title": "对已获认证公司的监理",
  "blocks": [
   {
    "t": "p",
    "x": "对于已获得认证的公司，在适当情况下，认证机构或 BRC 全球标准团队可随时开展进一步审核或对相关活动进行问责，以确认 继续保持认证。这些赴厂考察可以通知或突击的形式进行，以行使全面或部分审核。拒绝进入工厂可影响认证状态。 赴厂考察期间所发现的任何不符合项均必须得到纠正且在常规协议的限期内（即赴厂考察后 28 天内）得以撤销，并且必须得到 认证机构的复核和认可。如果工厂一方无意采取相关的纠正措施，或者纠正措施被认为不当，须撤销认证。吊销还是撤销认证的 最终决定权在认证机构一方。认证状态的任何变化须由认证机构通知 BRC，而且在 BRC 全球标准名录中的状态也须作相应 修改。 如认证被认证机构吊销或撤销，公司须及时通知其客户并让客户全面了解撤销或吊销的相关情况。另外，还应向客户提供为恢复 认证状态所要采取纠正措施的相关信息。"
   }
  ],
  "ch": "III"
 },
 {
  "id": "III.3.6",
  "num": "III.3.6",
  "title": "BRC 徽标",
  "blocks": [
   {
    "t": "p",
    "x": "获得 BRC 认证是一件光荣的事情。获得认证且无范围免除内容的公司有权在公司信笺和其他营销资料上使用 BRC 徽标。有关 如果工厂因证书失效、撤销或吊销不再得到认证，则不得再继续使用表明获得认证的徽标或证书。 BRC 徽标并非产品认证标志，因此不得用于产品或产品包装上。获得认证的任何工厂如被发现滥用标志，将被带入BRC 投诉/"
   }
  ],
  "ch": "III"
 },
 {
  "id": "IV.1",
  "num": "IV.1",
  "title": "对认证机构的要求",
  "blocks": [
   {
    "t": "p",
    "x": "《消费品全球标准》是一种过程和产品认证方案。在该方案中，企业将在完成由独立第三方——认证机构——所聘用 的审核 员的满意审核后获得认证。反过来，认证机构也须经国家资格鉴定机构评估和判断认定具备相应的资格。 图 2 列出了认证与资格鉴定的流程。 为使企业在结束满意的审核后取得有效的证书，该组织必须选择一家 BRC 认可的认证机构。BRC 规定了认证机构要获 得认可 所必须满足的详细要求。 作为最低要求，认证机构必须通过隶属于国际认可论坛且受 BRC 承认的国家资格鉴定机构所开展的 ISO/IEC 17065认证。 文件“关于根据 BRC《全球标准》的条件提供认证的机构的规定”中提供了进一步详情，如需要，可向 BRC 索取。 寻求本《标准》认证的公司应保证他们所选用的是真正获得 BRC 认可的认证机构。BRC 全球标准名录 (www.brcdirectory.com) 上提供了 BRC 所认可的所有认证机构的名单。 BRC 认识到，在某些情况下，比如对于少数希望开展本《标准》认证的新认证机构，可能尚未获得资格鉴定。这是因为资格鉴定 流程本身要求完成某些审核，然后作为对认证机构资格鉴定审核的一部分进行评审。认证机构必须有能力开展审核，这是资格 鉴定流程的一部分，因此将执行一些不予认可的审核。如果机构能够体现以下各项，则将获得许可："
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "一致"
   },
   {
    "t": "ul",
    "items": []
   },
   {
    "t": "p",
    "x": "等待获得资格鉴定，但满足上述条件的认证机构所生成审核报告的可接受性，将视个别指定者的具体情况酌情考虑。"
   }
  ],
  "ch": "IV"
 },
 {
  "id": "IV.2",
  "num": "IV.2",
  "title": "《标准》的技术监管",
  "blocks": [
   {
    "t": "p",
    "x": "本《标准》及相关方案由 BRC 借助通过多个利益相关者组（参见图 3）所提供的监管和技术建议进行管理，每个组都按一套确 定的职权范围发挥作用。"
   }

 {
  "id": "IV.3",
  "num": "IV.3",
  "title": "国际顾问委员会",
  "blocks": [
   {
    "t": "p",
    "x": "本《标准》的技术管理与运作由 BRC 国际顾问委员会监管。这些委员会由国际零售和生产企业的高级技术代表组成。 顾问委员会的职能是就 BRC《全球标准》及相关活动的制定和管理提供战略建议，以确保对认证机构和审核过程的有效 管理。"

 {
  "id": "IV.4",
  "num": "IV.4",
  "title": "技术顾问委员会",
  "blocks": [
   {
    "t": "p",
    "x": "每一部 BRC《全球标准》均由至少一个技术顾问委员会 (TAC) 提供支持，其定期召集会议讨论与标准有关的技术、运作和解 释问题。BRC 为这些组提供技术秘书处。 《消费品全球标准》的 TAC 由代表本《标准》用户的技术管理人员组成，而且包括零售商、生产商、各行业贸易协会、认证机 构、资格鉴定机构的代表和独立技术专家。 本《标准》每 3 年评审一次，以评估更新或制定新版本的必要性。此项工作由 TAC 负责，这将以包括其他可用专长为目的得到 扩充。 MANAGEMENT ISO/IEC 17065 www.brcdirectory.com 图 2 认证机构资格鉴定流程 另外，TAC 还将评审审核员的能力要求、拟定的培训资料和支持本《标准》的补充技术文件。"
   }

 {

 {
  "id": "IV.6",
  "num": "IV.6",
  "title": "力求一致性",
  "blocks": [
   {
    "t": "p",
    "x": "维护审核和认证的高度一致性标准以及获得认证的工厂维护审核时所达到标准的能力对于对本方案的信心和认证的价值至关 重要。鉴此，BRC 制定了积极的合规计划，以对资格鉴定机构的工作进行补充并确保维护高标准。 BRC 方案只能由认证机构开展认证，而这些认证机构必须在 BRC 注册并获得认可，而且应取得 BRC 所承认资格鉴定机构的 资格鉴定。根据本《标准》开展审核的所有审核员均必须满足 BRC 的审核员能力要求并在 BRC 注册。关于根据 BRC《消费品 全球标准》开展审核审核员的资格、培训和经验要求将在附录 1 中详细阐述。根据本《标准》所开展的所有审核均须上传到 BRC 全球标准名录，此将为 BRC 提供对认证机构活动的监督和评审所编制报告质量的机会。 为支持本《标准》，BRC 通过实施合规计划评审认证机构的绩效，抽样检查审核报告的质量，评估对方案要求的理解程度，并 调查任何问题或投诉。作为该计划的一部分，BRC 通过关键绩效指标 (KPI) 方案提供对各认证机构的绩效反馈。 作为合规计划的一部分，BRC 将审核认证机构的办事处并陪同审核员前往工厂进行审核，以观察审核员的绩效。另外，BRC 还 可能对已获得认证的工厂进行独立考察，以确保其产品安全、质量和合法性标准得到与其认证状态相一致的维护，而且确保其 审核和报告过程达到预期标准。"
   }
  ],
  "ch": "IV"
 },
 {
  "id": "IV.7",
  "num": "IV.7",
  "title": "评定审核员",
  "blocks": [
   {
    "t": "p",
    "x": "该方案的关键要素是对审核员的评定，以确保其对相关要求的持续理解和运用。所有认证机构都必须制定评定其内部审核员的 流程。培训和评定审核员的基本要素是见证审核方案。审核员在审核期间将受到观察，而且将收到有关其审核绩效的反馈。为了 确保认证机构之间的一致性以及出于资格鉴定的目的，审核可能需要在 BRC 代表或资格鉴定机构审核员的见证下进行。将对 这类的活动运用指导原则，以确保工厂不会因出现两位审核员而受到不利影响。这一过程构成该方案的关键部分，而且作为认 证条件的一部分，工厂有义务同意见证审核。"
   }
  ],
  "ch": "IV"
 },
 {
  "id": "IV.8",
  "num": "IV.8",
  "title": "反馈",
  "blocks": [
   {
    "t": "p",
    "x": "接受本《标准》审核的公司可能希望向认证机构或 BRC 提供有关审核员绩效的反馈。BRC 将对所收到的此类反馈予以保密。 反馈将为 BRC 对认证机构绩效的监督计划提供宝贵意见。"
   }
  ],

 },
 {

  const n=c.num||'';
  if(n.startsWith('II.')){ const p=n.split('.'); return p.slice(0,2).join('.'); }
  if(n.startsWith('I.')) return 'I';
  if(n.startsWith('III.')) return 'III';
  if(n.startsWith('IV.')) return 'IV';
  if(n.startsWith('附录')) return '附录';
  return n.split('.')[0];
}

/* 全文搜索（在所有条款文本中检索） */
function clauseText(c){
  return c.blocks.map(b=>{
    if(b.t==='ul') return b.items.map(it=>typeof it==='string'?it:(it.items?it.items.join(' '):'')).join(' ');
    return b.x||'';
  }).join(' ');
}
function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- 侧栏导航 ---------- */
function buildNav(filter=''){
  const nav = $('#nav'); nav.innerHTML='';
  GROUPS.forEach(g=>{
    const items = (groupOf[g.key]||[]).filter(c=>{
      if(!filter) return true;
      const f=filter.toLowerCase();
      return c.num.toLowerCase().includes(f)||c.title.toLowerCase().includes(f)||clauseText(c).toLowerCase().includes(f);
    });
    if(!items.length) return;
    const open = filter? true : LS.get('open_'+g.key,true);
    const gp = document.createElement('div'); gp.className='nav-group';
    const badge = {引言:'0','附录A':'A','附录B':'B','参考文献':'R'}[g.key] || g.key;
    const chap = document.createElement('div'); chap.className='nav-chap'+(open?' open':'');
    chap.innerHTML = `<span class="num">${badge}</span>
      <span class="ttl">${g.label}</span><span class="cnt">${items.length}</span><span class="arrow">▶</span>`;
    const box = document.createElement('div'); box.className='nav-items'+(open?' open':'');
    items.forEach(c=>{
      const it = document.createElement('div');
      it.className='nav-item'+(stars.includes(c.id)?' starred':'');
      it.dataset.id=c.id;
      it.innerHTML=`<span class="id">${c.num}</span><span class="it">${c.title}</span>
        <span class="star" data-star="${c.id}" title="收藏">${stars.includes(c.id)?'★':'☆'}</span>`;
      it.addEventListener('click',e=>{
        if(e.target.dataset.star){toggleStar(c.id);return;}
        goto(c.id);
      });
      box.appendChild(it);
    });
    chap.addEventListener('click',()=>{
      const isOpen=box.classList.toggle('open'); chap.classList.toggle('open',isOpen);
      LS.set('open_'+g.key,isOpen);
    });
    gp.appendChild(chap); gp.appendChild(box); nav.appendChild(gp);
  });
}

/* ---------- 渲染条款内容 ---------- */
function renderBlocks(blocks, highlight=''){
  const re = highlight? new RegExp('('+escapeRe(highlight)+')','gi') : null;
  const hl = t=> re? t.replace(re,'<mark>$1</mark>') : escapeHtml(t);
  let html='';
  blocks.forEach(b=>{
    if(typeof b==='string'){ html+=`<p>${hl(b)}</p>`; return; }
    if(b.t==='p'){ html+=`<p>${hl(b.x)}</p>`; }
    else if(b.t==='note'){ html+=`<div class="block"><div class="note">${hl(b.x)}</div></div>`; }
    else if(b.t==='ul'){ html+=renderList(b,hl); }
    else if(b.t==='fa'){ html+=renderFA(b,hl); }
  });
  return html;
}
function renderList(ul,hl){
  const letter=/^[a-z]\s*[）)、]/i;
  let html='<ul class="l">';
  ul.items.forEach(it=>{
    if(typeof it==='string'){
      const k = it.match(/^([a-z])\s*[）)、]/i)? it.match(/^([a-z])\s*[）)、]/i)[1]+'）'
               : it.match(/^(\d+)\s*[）)、.]/)? it.match(/^(\d+)\s*[）)、.]/)[1]+'）' : '';
      const content = k? it.slice(it.indexOf(k)+k.length).trim() : it;
      html+=`<li data-k="${k||'·'}">${hl(content)}</li>`;
    } else if(it.t==='ul'){
      html+=renderList(it,hl).replace('<ul class="l">','<ul class="l l2">');
    }
  });
  html+='</ul>';
  return html;
}

function renderFA(b,hl){
  const f=hl(b.f||''); const a=hl(b.a||'');
  let h='<div class="fa-grid">';
  h+='<div class="fa-col fa-f"><div class="fa-h">基础要求 · Fundamental</div><div class="fa-b">'+f+'</div></div>';
  if(a){ h+='<div class="fa-col fa-a"><div class="fa-h">高级要求 · Advanced</div><div class="fa-b">'+a+'</div></div>'; }
  h+='</div>';
  return h;
}

/* ---------- 跳转 / 显示条款 ---------- */
let currentId=null, currentHl='';
function goto(id, hl=''){
  const c = byId(id); if(!c) return;
  currentId=id; currentHl=hl; LS.set('last',id);
  if(!read.includes(id)){read.push(id);LS.set('read',read);}
  if($('#drawer').dataset.panel==='search') closeDrawer();
  recent = [id, ...recent.filter(r=>r!==id)].slice(0,12); LS.set('recent',recent);
  // 面包屑
  const g = topGroup(c);
  const gLabel = (GROUPS.find(x=>x.key===g)||{}).label||'';
  $('#breadcrumb').innerHTML = `<a onclick="goto('${id}')">知识库</a> <span>›</span> <b>${gLabel}</b> <span>›</span> <b>${c.num} ${c.title}</b>`;
  // 高亮侧栏
  $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  // 内容
  const idx = CLAUSES.findIndex(x=>x.id===id);
  const prev = CLAUSES[idx-1], next = CLAUSES[idx+1];
  const reqCount = (clauseText(c).match(/应/g)||[]).length;
  $('#content').innerHTML = `
    <div class="clause-head">
      <div class="clause-num">${c.num}</div>
      <div class="clause-title"><h1>${c.title}</h1>
        <div class="sub">${gLabel} · 含“应”要求 ${reqCount} 处 · ${read.includes(id)?'已读':'未读'}</div></div>
      <div class="clause-actions">
        <button class="mini-btn" id="copyBtn">📋 复制</button>
        <button class="mini-btn ${stars.includes(id)?'on':''}" id="starBtn">${stars.includes(id)?'★ 已收藏':'☆ 收藏'}</button>
        <button class="mini-btn" id="hlBtn">✨ 高亮要求</button>
      </div>
    </div>
    <div id="clauseBody">${renderBlocks(c.blocks, hl)}</div>
    <div class="pager">
      ${prev?`<a class="prev" onclick="goto('${prev.id}')"><span class="pl">← 上一条</span><span class="pt">${prev.num} ${prev.title}</span></a>`:'<span></span>'}
      ${next?`<a class="next" onclick="goto('${next.id}')"><span class="pl">下一条 →</span><span class="pt">${next.num} ${next.title}</span></a>`:'<span></span>'}
    </div>`;
  // 复制
  $('#copyBtn').addEventListener('click',()=>{
    const txt = `${c.num} ${c.title}\n\n`+clauseText(c);
    navigator.clipboard.writeText(txt).then(()=>toast('已复制到剪贴板'));
  });
  $('#starBtn').addEventListener('click',()=>{toggleStar(id); goto(id,currentHl);});
  $('#hlBtn').addEventListener('click',()=>highlightReq());
  $('#content').scrollTop=0;
  // 移动端自动收起侧栏
  if(window.innerWidth<=900) $('#aside').classList.add('collapsed');
  updateProgress();
}
function highlightReq(){
  const body=$('#clauseBody'); if(!body) return;
  // 切换：若已高亮则清除
  if(body.dataset.hl==='1'){ goto(currentId,currentHl); body.dataset.hl='0'; return; }
  const reg=/((?:组织|最高管理者|环境方针|环境目标)?应[^，。；、（）()\n]{0,40}?)(?:[，。；、]|$)/g;
  // 简单方案：对所有“应”出现的位置加标
  body.querySelectorAll('p,li,.note,.fa-b').forEach(node=>{
    node.innerHTML = node.innerHTML.replace(/应/g,'<span class="req-em">应</span>');
  });
  body.dataset.hl='1';
  toast('已高亮“应”要求条款');
}

/* ---------- 收藏 ---------- */
function toggleStar(id){
  if(stars.includes(id)) stars=stars.filter(s=>s!==id);
  else stars.push(id);
  LS.set('stars',stars);
  // 更新侧栏星标
  const it=document.querySelector(`.nav-item[data-id="${id}"]`);
  if(it){it.classList.toggle('starred',stars.includes(id));
    const s=it.querySelector('.star'); if(s)s.textContent=stars.includes(id)?'★':'☆';}
  buildNav($('#navFilter').value);
  // 刷新抽屉收藏列表（若打开）
  if($('#drawer').dataset.panel==='star') openStars();
}

/* ---------- 进度 ---------- */
function updateProgress(){
  const pct = Math.round(read.length/CLAUSES.length*100);
  $('#progress').style.width = pct+'%';
  $('#progress').title = `已读 ${read.length}/${CLAUSES.length}`;
}

/* ---------- 抽屉面板 ---------- */
function openDrawer(title,panel,html){
  $('#drawerTitle').textContent=title;
  $('#drawerBody').innerHTML=html;
  $('#drawer').classList.add('open');
  $('#drawer').dataset.panel=panel;
  $('#mask').classList.add('show');
}
function closeDrawer(){$('#drawer').classList.remove('open');$('#mask').classList.remove('show');$('#drawer').dataset.panel='';}
function openStars(){
  let h = stars.length? '' : '<div class="empty">还没有收藏任何条款。<br>点击条款右上角的 ☆ 即可收藏。</div>';
  stars.forEach(id=>{const c=byId(id); if(c) h+=`<div class="result" onclick="goto('${id}')"><div class="rid">${c.num}</div><div class="rt">${c.title}</div></div>`;});
  openDrawer(`⭐ 我的收藏（${stars.length}）`,'star',h);
}
function openGloss(){
  let h='<input id="glSearch" placeholder="搜索术语…" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);margin-bottom:12px;outline:none">';
  GLOSSARY.forEach(([t,d])=>{h+=`<div class="term" data-t="${t}"><b>${t}</b><p>${d}</p></div>`;});
  openDrawer('📖 术语表','gloss',h);
  const gs=$('#glSearch'); if(gs) gs.addEventListener('input',()=>{
    const v=gs.value.toLowerCase();
    $$('#drawerBody .term').forEach(t=>t.style.display = t.dataset.t.toLowerCase().includes(v)?'':'none');
  });
}
function openGraph(){
  let h=`
  <div class="diagram-wrap">
    <h4>🧭 BRC 标准关键组成部分</h4>
    <div class="svg-box">${svgBRC()}</div>
    <div class="legend">图：标准建立在高级管理层承诺、产品及流程风险评估、系统化方法、产品与质量管理体系及适当的运营条件之上，并分基础与高级两级认证。</div>
  </div>
  <div class="diagram-wrap">
    <h4>🔗 通用审核协议——如何获取与维持认证</h4>
    <div class="svg-box">${svgFlow()}</div>
    <div class="legend">图：从选择审核方案到后续审核的认证流程。</div>
  </div>
  <div class="diagram-wrap">
    <h4>📚 关键组成部分说明</h4>
    <ul class="l">${PRINCIPLES.map(p=>`<li data-k="•"><b>${p[0]}</b>：${p[1]}</li>`).join('')}</ul>
  </div>`;
  openDrawer('🗺️ 结构图谱','graph',h);
}
function openQuiz(){
  let h=`<p style="color:var(--text3);font-size:13px;margin-bottom:12px">共 ${QUIZ.length} 题，点击选项查看答案与解析。</p>`;
  QUIZ.forEach((q,i)=>{
    h+=`<div class="quiz-q" data-i="${i}"><div class="qt">Q${i+1}. ${q.q}</div>`;
    q.o.forEach((o,j)=>{h+=`<label data-j="${j}">${String.fromCharCode(65+j)}. ${o}</label>`;});
    h+=`<div class="exp">✅ 正确答案：${String.fromCharCode(65+q.a)}。${q.exp}</div></div>`;
  });
  openDrawer('🎯 自测练习','quiz',h);
  $$('#drawerBody .quiz-q label').forEach(lab=>{
    lab.addEventListener('click',()=>{
      const qbox=lab.closest('.quiz-q'); const i=+qbox.dataset.i; const j=+lab.dataset.j;
      if(qbox.classList.contains('answered')) return;
      qbox.classList.add('answered');
      qbox.querySelectorAll('label').forEach((L,k)=>{
        if(k===QUIZ[i].a) L.classList.add('ok');
        else if(k===j) L.classList.add('bad');
      });
    });
  });
}
function openStat(){
  const total=CLAUSES.length;
  const reqTotal=CLAUSES.reduce((s,c)=>s+(clauseText(c).match(/应/g)||[]).length,0);
  let chStat='';
  GROUPS.forEach(g=>{const items=groupOf[g.key]||[]; if(!items.length)return;
    const rc=items.filter(c=>read.includes(c.id)).length;
    chStat+=`<div class="stat" style="grid-column:span 1"><div class="n">${rc}/${items.length}</div><div class="l">${g.label.split(' ')[0]}</div></div>`;
  });
  let h=`<div class="stat-grid">
    <div class="stat"><div class="n">${total}</div><div class="l">条款总数</div></div>
    <div class="stat"><div class="n">${read.length}</div><div class="l">已读</div></div>
    <div class="stat"><div class="n">${Math.round(read.length/total*100)}%</div><div class="l">阅读进度</div></div>
    <div class="stat"><div class="n">${stars.length}</div><div class="l">收藏</div></div>
    <div class="stat"><div class="n">${reqTotal}</div><div class="l">“应”要求总数</div></div>
    <div class="stat"><div class="n">${PRINCIPLES.length}</div><div class="l">管理原则</div></div>
  </div>
  <h4 style="margin:18px 0 10px">各章阅读进度</h4>
  <div class="stat-grid">${chStat}</div>`;
  openDrawer('📊 统计','stat',h);
}

/* ---------- SVG 图 ---------- */
function svgBRC(){
  return `<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12.5" fill="var(--text)">
    <rect x="185" y="125" width="150" height="56" rx="10" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2"/>
    <text x="260" y="150" text-anchor="middle" font-weight="700">产品安全与质量</text>
    <text x="260" y="168" text-anchor="middle" font-size="11" fill="var(--text3)">管理体系 (QMS)</text>
    <rect x="25" y="35" width="150" height="46" rx="8" fill="var(--bg3)" stroke="var(--accent)"/>
    <text x="100" y="63" text-anchor="middle">高级管理层承诺</text>
    <rect x="345" y="35" width="150" height="46" rx="8" fill="var(--bg3)" stroke="var(--accent)"/>
    <text x="420" y="63" text-anchor="middle">产品及流程风险评估</text>
    <rect x="25" y="219" width="150" height="46" rx="8" fill="var(--bg3)" stroke="var(--accent)"/>
    <text x="100" y="247" text-anchor="middle">系统化方法</text>
    <rect x="345" y="219" width="150" height="46" rx="8" fill="var(--bg3)" stroke="var(--accent)"/>
    <text x="420" y="247" text-anchor="middle">适当的运营条件</text>
    <line x1="175" y1="58" x2="185" y2="125" stroke="var(--text3)"/>
    <line x1="345" y1="58" x2="335" y2="125" stroke="var(--text3)"/>
    <line x1="175" y1="242" x2="185" y2="181" stroke="var(--text3)"/>
    <line x1="345" y1="242" x2="335" y2="181" stroke="var(--text3)"/>
    <rect x="185" y="262" width="150" height="32" rx="8" fill="none" stroke="var(--req)"/>
    <text x="260" y="283" text-anchor="middle" fill="var(--req)" font-size="12">基础 与 高级 两级认证</text>
  </svg>`;
}
function svgFlow(){
  const steps=['选择审核方案','标准符合性\n自我评估','选择认证机构','现场审核','不符合项\n纠正措施','审核等级','认证','后续审核'];
  let bx='', lab='';
  steps.forEach((s,i)=>{
    const x=20+(i%4)*125, y=20+Math.floor(i/4)*90;
    bx+='<rect x="'+x+'" y="'+y+'" width="110" height="56" rx="9" fill="var(--bg3)" stroke="var(--accent)"/>';
    const t=s.split('\n');
    t.forEach((tt,k)=>{ bx+='<text x="'+(x+55)+'" y="'+(y+24+k*16)+'" text-anchor="middle" font-size="11.5">'+tt+'</text>'; });
    if(i%4<3) lab+='<line x1="'+(x+110)+'" y1="'+(y+28)+'" x2="'+(x+125)+'" y2="'+(y+28)+'" stroke="var(--text3)" marker-end="url(#ar)"/>';
    if(i===3) lab+='<line x1="'+(x+55)+'" y1="'+(y+56)+'" x2="'+(x+55)+'" y2="'+(y+69)+'" stroke="var(--text3)" marker-end="url(#ar)"/>';
  });
  return `<svg viewBox="0 0 520 210" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" fill="var(--text)">
    <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text3)"/></marker></defs>
    ${bx}${lab}</svg>`;
}

/* ---------- 搜索 ---------- */
function doSearch(q){
  q=q.trim();
  if(!q){ $('#searchCount').textContent=''; $('#searchClear').style.display='none'; goto(currentId||'0.1',currentHl); return; }
  $('#searchClear').style.display='block';
  const results=[];
  CLAUSES.forEach(c=>{
    const t=clauseText(c); const i=t.toLowerCase().indexOf(q.toLowerCase());
    if(i>=0){
      const start=Math.max(0,i-30); const snip=t.slice(start,i+ (t.length>i+30?60:q.length));
      results.push({c, snip});
    }
  });
  $('#searchCount').textContent = results.length? `${results.length} 条` : '无';
  let h='';
  if(!results.length) h='<div class="empty">未找到匹配“'+escapeHtml(q)+'”的条款。</div>';
  results.forEach(({c,snip})=>{
    const reg=new RegExp('('+escapeRe(q)+')','gi');
    const s=escapeHtml(snip).replace(reg,'<mark>$1</mark>');
    h+=`<div class="result" onclick="goto('${c.id}','${escapeHtml(q).replace(/'/g,"\\'")}')">
      <div class="rid">${c.num} · ${c.title}</div>
      <div class="rs">…${s}…</div></div>`;
  });
  // 将搜索结果放入侧栏下方？这里用抽屉展示，避免覆盖正文
  openDrawer('🔍 搜索结果：'+results.length+' 条','search',h);
}

/* ---------- 提示 ---------- */
let toastTimer;
function toast(msg){
  let t=$('#toast'); if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:10px;z-index:200;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.25s';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity='0',1600);
}

/* ---------- 主题 / 字号 ---------- */
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);}
function applyFont(){document.body.style.fontSize=fontSize+'px';}

/* ---------- 初始化 ---------- */
function init(){
  applyTheme(); applyFont(); updateProgress(); buildNav();
  goto(LS.get('last','I.1'));
  // 顶栏按钮
  $('#btnNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#toggleNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#collapseNav').addEventListener('click',()=>$('#aside').classList.add('collapsed'));
  $('#btnStar').addEventListener('click',openStars);
  $('#btnGloss').addEventListener('click',openGloss);
  $('#btnGraph').addEventListener('click',openGraph);
  $('#btnQuiz').addEventListener('click',openQuiz);
  $('#btnStat').addEventListener('click',openStat);
  $('#drawerClose').addEventListener('click',closeDrawer);
  $('#mask').addEventListener('click',closeDrawer);
  $('#btnTheme').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';LS.set('theme',theme);applyTheme();toast('主题：'+(theme==='dark'?'深色':'浅色'));});
  $('#btnFontU').addEventListener('click',()=>{fontSize=Math.min(24,fontSize+1);LS.set('font',fontSize);applyFont();});
  $('#btnFontD').addEventListener('click',()=>{fontSize=Math.max(12,fontSize-1);LS.set('font',fontSize);applyFont();});
  $('#btnPrint').addEventListener('click',()=>window.print());
  $('#navFilter').addEventListener('input',e=>buildNav(e.target.value));
  // 搜索
  const sb=$('#search');
  sb.addEventListener('input',e=>{ const v=e.target.value; if(!v){$('#searchCount').textContent='';$('#searchClear').style.display='none';return;} doSearch(v); });
  sb.addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(sb.value); });
  $('#searchClear').addEventListener('click',()=>{sb.value='';$('#searchCount').textContent='';$('#searchClear').style.display='none';closeDrawer();goto(currentId,currentHl);});
  // 键盘快捷键
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    const idx=CLAUSES.findIndex(x=>x.id===currentId);
    if(e.key==='ArrowRight'&&idx<CLAUSES.length-1) goto(CLAUSES[idx+1].id);
    if(e.key==='ArrowLeft'&&idx>0) goto(CLAUSES[idx-1].id);
    if(e.key==='/'&&!e.ctrlKey){e.preventDefault();sb.focus();}
    if(e.key==='Escape') closeDrawer();
  });
  // 关闭抽屉时若处于搜索态则不清空，仅隐藏
}
init();
</script>
