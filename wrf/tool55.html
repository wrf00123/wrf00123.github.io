<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>文件夹侧边标签制作工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --green:#0F3D2E; --green-2:#16463A; --cream:#F5F1E8; --panel:#ECE7D9;
    --orange:#E07A3C; --orange-2:#c9652a; --ink:#1A1A1A; --muted:#6b6557;
    --line:#d8d2c2; --line-2:#c4bda9; --white:#ffffff;
    --radius:6px;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
    --serif:'Fraunces',Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --kai:'Noto Serif SC',serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--cream);
    font-size:13px; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit; font-size:13px;}
  h1,h2,h3{font-family:var(--serif); font-weight:600; margin:0;}

  /* ---------- 顶部工具栏 ---------- */
  .topbar{
    height:56px; background:var(--green); color:var(--cream);
    display:flex; align-items:center; gap:14px; padding:0 16px;
    box-shadow:0 1px 0 rgba(0,0,0,.15), 0 2px 10px rgba(0,0,0,.12);
    position:relative; z-index:30;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{
    width:30px; height:30px; border-radius:7px; background:var(--orange);
    display:grid; place-items:center; box-shadow:0 2px 0 rgba(0,0,0,.18);
  }
  .brand .mark svg{width:18px;height:18px;}
  .brand .title{font-family:var(--serif); font-size:17px; font-weight:700; letter-spacing:.2px; line-height:1;}
  .brand .sub{font-size:10px; opacity:.7; letter-spacing:.6px; text-transform:uppercase;}
  .proj-name{
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18);
    color:var(--cream); padding:7px 10px; border-radius:var(--radius); width:180px;
  }
  .proj-name:focus{outline:none; border-color:var(--orange); background:rgba(255,255,255,.16);}
  .spacer{flex:1}
  .topbar .grp{display:flex; gap:6px; align-items:center;}
  .tbtn{
    display:inline-flex; align-items:center; gap:6px; padding:8px 12px;
    border-radius:var(--radius); border:1px solid transparent; background:rgba(255,255,255,.08);
    color:var(--cream); font-size:12.5px; font-weight:500; transition:.15s;
  }
  .tbtn:hover{background:rgba(255,255,255,.18); transform:translateY(-1px);}
  .tbtn svg{width:15px;height:15px;}
  .tbtn.primary{background:var(--orange); color:#fff;}
  .tbtn.primary:hover{background:var(--orange-2);}
  .tbtn.ghost{background:transparent; border-color:rgba(255,255,255,.22);}
  .seg{display:flex; background:rgba(0,0,0,.18); border-radius:var(--radius); padding:3px; gap:2px;}
  .seg button{
    border:none; background:transparent; color:rgba(245,241,232,.75);
    padding:5px 11px; border-radius:4px; font-size:12px; font-weight:500;
  }
  .seg button.on{background:var(--green-2); color:#fff; box-shadow:0 1px 2px rgba(0,0,0,.25);}
  .vdiv{width:1px; height:24px; background:rgba(255,255,255,.18);}

  /* ---------- 主布局 ---------- */
  .layout{display:flex; height:calc(100% - 56px);}
  .panel{
    background:var(--panel); border-right:1px solid var(--line);
    width:300px; flex-shrink:0; overflow-y:auto; padding:14px 14px 30px;
  }
  .panel.right{border-right:none; border-left:1px solid var(--line); width:260px;}
  .panel::-webkit-scrollbar{width:9px}
  .panel::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:6px;}
  .panel::-webkit-scrollbar-track{background:transparent}

  .stage{
    flex:1; background:#dfd9c8; overflow:auto; position:relative;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,.05) 1px, transparent 0);
    background-size:14px 14px;
  }
  .stage::-webkit-scrollbar{width:12px;height:12px}
  .stage::-webkit-scrollbar-thumb{background:#b3ab95; border-radius:8px; border:3px solid #dfd9c8;}

  #preview-stage{display:flex; flex-direction:column; align-items:center; gap:22px; padding:30px;}

  .group{margin-bottom:18px; background:var(--white); border:1px solid var(--line);
    border-radius:8px; overflow:hidden;}
  .group > .gh{
    background:var(--green); color:var(--cream); padding:8px 12px; font-size:11px;
    letter-spacing:.7px; text-transform:uppercase; font-weight:600; display:flex; align-items:center; gap:7px;
  }
  .group > .gh svg{width:13px;height:13px; opacity:.85;}
  .group > .gb{padding:11px 12px;}

  .row{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
  .row:last-child{margin-bottom:0}
  .row > label{width:64px; font-size:11.5px; color:var(--muted); flex-shrink:0;}
  .row > .grow{flex:1; display:flex; align-items:center; gap:6px; min-width:0;}
  input[type=number]{
    width:100%; padding:5px 7px; border:1px solid var(--line-2); border-radius:5px;
    background:var(--cream); color:var(--ink);
  }
  input[type=number]:focus, select:focus, textarea:focus, input[type=text]:focus{outline:none; border-color:var(--orange);}
  select{
    width:100%; padding:5px 7px; border:1px solid var(--line-2); border-radius:5px;
    background:var(--cream); color:var(--ink); cursor:pointer;
  }
  textarea{
    width:100%; padding:7px 8px; border:1px solid var(--line-2); border-radius:5px;
    background:var(--cream); resize:vertical; min-height:54px; line-height:1.4;
  }
  input[type=color]{
    width:34px; height:26px; padding:0; border:1px solid var(--line-2); border-radius:5px;
    background:transparent; cursor:pointer;
  }
  input[type=range]{width:100%; accent-color:var(--green);}
  input[type=checkbox]{accent-color:var(--green); width:14px; height:14px; cursor:pointer;}

  .seg-sm{display:flex; background:var(--cream); border:1px solid var(--line-2); border-radius:5px; padding:2px; gap:2px; flex:1;}
  .seg-sm button{flex:1; border:none; background:transparent; color:var(--muted); padding:4px 0; border-radius:3px; font-size:11.5px;}
  .seg-sm button.on{background:var(--green); color:#fff;}
  .seg-sm svg{width:13px;height:13px;}

  .num-pair{display:flex; gap:5px;}
  .num-pair input{width:100%;}
  .num-suf{font-size:10px; color:var(--muted); padding:0 2px;}

  .btn{
    width:100%; padding:8px 10px; border-radius:var(--radius); border:1px solid var(--line-2);
    background:var(--cream); color:var(--ink); font-size:12.5px; font-weight:500;
    display:inline-flex; align-items:center; justify-content:center; gap:6px; transition:.15s;
  }
  .btn:hover{background:#fff; border-color:var(--green); transform:translateY(-1px);}
  .btn svg{width:14px;height:14px;}
  .btn.accent{background:var(--green); color:#fff; border-color:var(--green);}
  .btn.accent:hover{background:var(--green-2);}
  .btn.orange{background:var(--orange); color:#fff; border-color:var(--orange);}
  .btn.orange:hover{background:var(--orange-2);}
  .btn.danger{color:#9a3b2e;}
  .btn.danger:hover{background:#f6e3df; border-color:#c98077;}
  .btn-row{display:flex; gap:6px;}
  .btn-row .btn{flex:1;}

  .info-pill{
    display:inline-flex; gap:5px; align-items:center; background:var(--cream);
    border:1px solid var(--line-2); border-radius:20px; padding:3px 9px; font-size:11px;
    color:var(--muted); font-family:var(--mono);
  }
  .info-pill b{color:var(--green); font-weight:600;}

  /* ---------- A4 页面 ---------- */
  .page-wrap{position:relative;}
  .a4-page{
    position:relative; background:#fff; box-shadow:0 6px 24px rgba(0,0,0,.18), 0 2px 6px rgba(0,0,0,.1);
    transform-origin:top center;
  }
  .a4-page .margin-box{position:absolute; border:1px dashed #e2dccd; pointer-events:none;}
  #print-area .margin-box{display:none;}

  .cell{position:absolute;}
  .cell.empty .cell-bg{display:none}
  .cell.empty .cell-text{display:none}
  .cell.empty .cell-logo{display:none}
  .cell.empty .cell-border{display:none}
  .cell.cut::after{
    content:""; position:absolute; inset:0; outline:0.15mm dashed #9a9384;
    outline-offset:0; pointer-events:none; z-index:4;
  }
  .cell-bg{position:absolute; inset:0; overflow:hidden;}
  .cell-text{
    position:absolute; inset:1.5mm; display:flex; white-space:pre; overflow:hidden;
    transform-origin:center center; line-height:1;
  }
  .cell-text.rotated{inset:auto; left:50%; top:50%;}
  .cell-logo{position:absolute; pointer-events:none; z-index:2;}
  .cell-logo img{display:block; height:auto;}
  .cell-border{position:absolute; inset:0; pointer-events:none; box-sizing:border-box; z-index:3;}

  .page-num{
    position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
    font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.5px;
  }

  .zoombar{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--green); color:var(--cream); border-radius:30px; padding:5px;
    display:flex; align-items:center; gap:2px; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:20;
  }
  .zoombar button{
    width:30px; height:30px; border-radius:50%; border:none; background:transparent;
    color:var(--cream); display:grid; place-items:center;
  }
  .zoombar button:hover{background:rgba(255,255,255,.15);}
  .zoombar .zv{font-family:var(--mono); font-size:11.5px; min-width:48px; text-align:center;}

  /* ---------- 标签列表 ---------- */
  .list-head{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;}
  .list-head .btn{flex:1; padding:6px 4px; font-size:11.5px; min-width:0;}
  .list-empty{padding:18px 10px; text-align:center; color:var(--muted); font-size:12px; line-height:1.6;}
  .list-empty svg{width:30px;height:30px; opacity:.4; margin-bottom:6px;}
  .lbl-item{
    display:flex; align-items:center; gap:9px; padding:8px 9px; background:var(--white);
    border:1px solid var(--line); border-radius:7px; margin-bottom:7px; cursor:pointer;
    transition:.12s; position:relative;
  }
  .lbl-item:hover{border-color:var(--green); transform:translateX(-2px);}
  .lbl-item.sel{border-color:var(--orange); box-shadow:0 0 0 2px rgba(224,122,60,.18); background:#fdf4ee;}
  .lbl-item .idx{
    width:22px; height:22px; border-radius:5px; background:var(--panel); color:var(--muted);
    display:grid; place-items:center; font-family:var(--mono); font-size:11px; flex-shrink:0;
  }
  .lbl-item.sel .idx{background:var(--orange); color:#fff;}
  .lbl-item .txt{flex:1; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--ink);}
  .lbl-item .grip{color:var(--line-2); cursor:grab;}
  .lbl-item .grip:active{cursor:grabbing;}
  .lbl-item.dragging{opacity:.4;}
  .lbl-item .mini{
    width:18px; height:18px; border-radius:3px; flex-shrink:0; border:1px solid var(--line-2);
  }

  /* ---------- 弹窗 ---------- */
  .modal-mask{
    position:fixed; inset:0; background:rgba(15,61,46,.45); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50;
  }
  .modal-mask.show{display:flex;}
  .modal{
    background:var(--cream); border-radius:12px; width:480px; max-width:92vw; max-height:88vh;
    overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.3); display:flex; flex-direction:column;
  }
  .modal .mh{
    background:var(--green); color:var(--cream); padding:14px 18px; display:flex; align-items:center;
    justify-content:space-between;
  }
  .modal .mh h3{font-size:16px;}
  .modal .mh .x{background:none; border:none; color:var(--cream); font-size:20px; cursor:pointer; opacity:.8;}
  .modal .mb{padding:18px; overflow-y:auto;}
  .modal .mf{padding:12px 18px; background:var(--panel); border-top:1px solid var(--line); display:flex; gap:8px; justify-content:flex-end;}
  .modal .mb textarea{min-height:160px; font-family:var(--mono); font-size:13px;}
  .modal .hint{font-size:11.5px; color:var(--muted); margin-top:8px; line-height:1.5;}
  .check-row{display:flex; align-items:center; gap:8px; margin-top:12px; font-size:12.5px;}

  /* ---------- toast ---------- */
  .toast{
    position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--cream); padding:10px 18px; border-radius:30px;
    font-size:12.5px; opacity:0; pointer-events:none; transition:.3s; z-index:60;
    box-shadow:0 6px 20px rgba(0,0,0,.3);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- 打印 ---------- */
  #print-area{display:none; position:absolute; left:-99999px; top:0;}
  @media print{
    @page{ size: A4; margin:0; }
    body *{visibility:hidden!important;}
    #print-area, #print-area *{visibility:visible!important;}
    #print-area{display:block!important; position:absolute; left:0; top:0; width:100%;}
    .a4-page{box-shadow:none!important; transform:none!important; page-break-after:always; break-after:page;}
    .a4-page:last-child{page-break-after:auto;}
    .page-num{display:none!important;}
  }

  .load-hide{display:none;}
  .responsive-toggle{display:none;}
  @media (max-width:1100px){
    .panel.right{position:fixed; right:0; top:56px; bottom:0; transform:translateX(100%); transition:.25s; z-index:25; box-shadow:-4px 0 20px rgba(0,0,0,.15);}
    .panel.right.open{transform:translateX(0);}
    .responsive-toggle{display:inline-flex;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h6v16H4z"/><path d="M10 4h6v16h-6z"/><path d="M16 8h4v12h-4z"/></svg>
    </div>
    <div>
      <div class="title">FolderTab</div>
      <div class="sub">侧边标签制作工坊</div>
    </div>
  </div>
  <input class="proj-name" id="proj-name" value="我的标签项目" />
  <div class="spacer"></div>

  <div class="grp">
    <span style="font-size:11px; opacity:.7;">A4 方向</span>
    <div class="seg" id="orient-seg">
      <button data-v="portrait" class="on">纵向</button>
      <button data-v="landscape">横向</button>
    </div>
  </div>

  <div class="vdiv"></div>
  <button class="tbtn ghost" id="btn-save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>保存项目</button>
  <button class="tbtn ghost" id="btn-load"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>加载项目</button>
  <input type="file" id="load-input" accept=".json" class="load-hide" />

  <div class="vdiv"></div>
  <button class="tbtn ghost" id="btn-print"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>打印</button>
  <button class="tbtn primary" id="btn-export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>导出 PDF</button>
  <button class="tbtn ghost responsive-toggle" id="btn-toggle-list">标签列表</button>
</header>

<div class="layout">
  <!-- 左侧属性面板 -->
  <aside class="panel" id="left-panel"></aside>

  <!-- 中央预览 -->
  <section class="stage">
    <div id="preview-stage"></div>
  </section>

  <!-- 右侧标签列表 -->
  <aside class="panel right" id="right-panel">
    <div class="list-head">
      <button class="btn accent" id="btn-add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加</button>
      <button class="btn" id="btn-dup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>复制</button>
      <button class="btn danger" id="btn-del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>删除</button>
      <button class="btn danger" id="btn-clear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/></svg>清空</button>
    </div>
    <div id="label-list"></div>
  </aside>
</div>

<!-- 缩放条 -->
<div class="zoombar">
  <button id="zoom-out" title="缩小"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  <span class="zv" id="zoom-val">100%</span>
  <button id="zoom-in" title="放大"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  <button id="zoom-fit" title="适配" style="font-size:11px;">FIT</button>
</div>

<!-- 批量生成弹窗 -->
<div class="modal-mask" id="batch-mask">
  <div class="modal">
    <div class="mh"><h3>批量生成标签</h3><button class="x" id="batch-close">&times;</button></div>
    <div class="mb">
      <div style="font-size:12.5px; margin-bottom:8px; color:var(--muted);">每行一个标签文字（支持换行内容用 / 分隔）：</div>
      <textarea id="batch-text" placeholder="财务部&#10;人事档案&#10;2024合同/正本&#10;报销凭证"></textarea>
      <div class="check-row"><input type="checkbox" id="batch-use-style" checked><label for="batch-use-style" style="cursor:pointer;">沿用当前选中标签的样式</label></div>
      <div class="check-row"><input type="checkbox" id="batch-append"><label for="batch-append" style="cursor:pointer;">追加到现有标签后（不勾选则替换全部）</label></div>
      <div class="hint">提示：使用「/」可在单个标签内换行，例如「2024合同/正本」会显示为两行。</div>
    </div>
    <div class="mf">
      <button class="btn" id="batch-cancel" style="width:auto; padding:8px 18px;">取消</button>
      <button class="btn orange" id="batch-go" style="width:auto; padding:8px 22px;">生成</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="print-area"></div>

<script>
"use strict";
/* ============================================================
   文件夹侧边标签制作工具 —— 单文件应用
   ============================================================ */

const { jsPDF } = window.jspdf;
const MM = 3.7795275591;          // 1mm -> px @96dpi
const A4 = { portrait:{w:210,h:297}, landscape:{w:297,h:210} };

/* ---------- 预设模板 ---------- */
const TEMPLATES = {
  custom:    { name:'自定义',          w:60,  h:25  },
  hangtab:   { name:'悬挂文件夹 Tab',   w:45,  h:16  },
  binder:    { name:'活页夹侧签',       w:70,  h:25  },
  spine:     { name:'文件夹脊背（竖）', w:30,  h:200 },

/* ---------- 工具函数 ---------- */
const $ = s => document.querySelector(s);
const ce = (t, cls, html) => { const e=document.createElement(t); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800); }
function curLabel(){ return state.labels.find(l=>l.id===state.selectedId) || null; }
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

/* ---------- 计算 ---------- */
function pageDims(){ return A4[state.page.orientation]; }
function gridInfo(){
  const d = pageDims();
  const m = state.page.margin;
  const g = state.page.gap;
  const availW = d.w - m.l - m.r;
  const availH = d.h - m.t - m.b;
  const lw = Math.max(5, state.label.widthMm);
  const lh = Math.max(5, state.label.heightMm);
  const cols = Math.max(1, Math.floor((availW + g.x) / (lw + g.x)));
  const rows = Math.max(1, Math.floor((availH + g.y) / (lh + g.y)));
  const perPage = cols*rows;
  const pages = Math.max(1, Math.ceil(state.labels.length / perPage));
  return { d, m, g, lw, lh, cols, rows, perPage, pages, availW, availH };
}

/* ============================================================
   渲染：A4 页面（同时用于预览 / 打印 / 导出）
   ============================================================ */
function buildPageNode(pageIndex){
  const info = gridInfo();
  const d = info.d;
  const page = ce('div','a4-page');
  page.style.width = d.w+'mm';
  page.style.height = d.h+'mm';

  // 页边距参考框
  const mb = ce('div','margin-box');
  mb.style.left = info.m.l+'mm'; mb.style.top = info.m.t+'mm';
  mb.style.width = info.availW+'mm'; mb.style.height = info.availH+'mm';
  page.appendChild(mb);

  for(let i=0;i<info.perPage;i++){
    const globalIdx = pageIndex*info.perPage + i;
    const label = state.labels[globalIdx];
    const col = i % info.cols;
    const row = Math.floor(i / info.cols);
    const x = info.m.l + col*(info.lw + info.g.x);
    const y = info.m.t + row*(info.lh + info.g.y);

    const cell = ce('div','cell');
    cell.style.left = x+'mm'; cell.style.top = y+'mm';
    cell.style.width = info.lw+'mm'; cell.style.height = info.lh+'mm';
    if(state.page.showCutLines) cell.classList.add('cut');
    if(!label){ cell.classList.add('empty'); page.appendChild(cell); continue; }

    cell.appendChild(buildLabelBg(label));
    if(label.logo) cell.appendChild(buildLabelLogo(label));
    cell.appendChild(buildLabelText(label, info.lw, info.lh));
    cell.appendChild(buildLabelBorder(label));
    page.appendChild(cell);
  }
  return page;
}

function buildLabelBg(label){
  const bg = label.background;
  const node = ce('div','cell-bg');
  const base = bg.color;
  if(bg.type==='solid'){
    node.style.background = base;
  } else if(bg.type==='stripes'){
    node.style.background = `repeating-linear-gradient(45deg, ${base} 0 2mm, ${bg.patternColor}44 2mm 4mm)`;
  } else if(bg.type==='dots'){
    node.style.background = `radial-gradient(${bg.patternColor}55 28%, transparent 30%)`;
    node.style.backgroundSize = '3mm 3mm';
    node.style.backgroundColor = base;
  } else if(bg.type==='grid'){
    node.style.background =
      `linear-gradient(${bg.patternColor}33 1px, transparent 1px),
       linear-gradient(90deg, ${bg.patternColor}33 1px, transparent 1px)`;
    node.style.backgroundSize = '4mm 4mm';
    node.style.backgroundColor = base;
  }
  return node;
}

function buildLabelLogo(label){
  const logo = label.logo;
  const wrap = ce('div','cell-logo');
  wrap.style.left = logo.xPct+'%';
  wrap.style.top = logo.yPct+'%';
  wrap.style.transform = 'translate(-50%,-50%)';
  wrap.style.width = logo.widthPct+'%';
  wrap.style.opacity = logo.opacity;
  const img = ce('img');
  img.src = logo.src;
  img.style.width = '100%';
  img.style.display = 'block';
  img.style.borderRadius = logo.radius+'px';
  if(logo.shadow) img.style.boxShadow = '0 1px 3px rgba(0,0,0,.3)';
  wrap.appendChild(img);
  return wrap;
}

function buildLabelText(label, lw, lh){
  const f = label.font;
  const node = ce('div','cell-text');
  const ff = FONT_FAMILIES[f.family] || FONT_FAMILIES.sans;
  node.style.fontFamily = ff.preview;
  node.style.fontSize = f.size+'pt';
  node.style.fontWeight = f.weight;
  node.style.color = f.color;
  node.style.lineHeight = f.lineHeight;
  node.style.letterSpacing = f.letterSpacing+'px';
  if(f.shadow) node.style.textShadow = '0.4mm 0.4mm 0.6mm rgba(0,0,0,.28)';

  const rot = Number(f.rotation)||0;
  const isVertical = (f.direction || 'horizontal') === 'vertical';

  // 旋转盒尺寸（90/270 用单元格长边作书写边）
  const applyRot = (n) => {
    if(rot===90||rot===270||rot===-90){
      n.classList.add('rotated');
      n.style.width = lh+'mm';
      n.style.height = lw+'mm';
      n.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;
    } else {
      n.style.transform = `rotate(${rot}deg)`;
    }
  };

  if(isVertical){
    // 垂直方向：手动拆字 + flex 列布局纵向排列。
    // 不使用 writing-mode（html2canvas 不支持，会导致导出 PDF 时变横排），
    // 改用普通块级 span 堆叠，预览/打印/PDF 三者完全一致。
    node.style.display = 'flex';
    node.style.flexDirection = 'row';
    // 水平对齐 -> 列组在主轴(水平)的位置
    node.style.justifyContent = f.align==='left'?'flex-start':(f.align==='right'?'flex-end':'center');
    // 列纵向拉伸填满，由列内部 valign 控制字符组位置
    node.style.alignItems = 'stretch';
    // 列间距：用行高派生，便于区分多列
    node.style.gap = Math.max(1, f.lineHeight * f.size * 0.35) + 'px';

    // 竖排传统阅读顺序：第一行在最右 → 反转后正序添加（从左到右）
    const lines = label.text.split('\n');
    lines.slice().reverse().forEach(line => {
      const col = ce('div');
      col.style.display = 'flex';
      col.style.flexDirection = 'column';
      col.style.alignItems = 'center';            // 字符水平居中
      col.style.justifyContent = f.valign==='top'?'flex-start':(f.valign==='bottom'?'flex-end':'center');
      col.style.gap = f.letterSpacing + 'px';     // 字符垂直间距
      col.style.lineHeight = '1';
      // 逐字符（Array.from 支持 emoji 等代理对）
      Array.from(line).forEach(ch => {
        const s = ce('span');
        s.textContent = ch === ' ' ? '\u00A0' : ch; // 空格用 nbsp 防止塌陷
        s.style.display = 'block';
        col.appendChild(s);
      });
      node.appendChild(col);
    });
  } else {
    // 水平方向：常规横排
    node.textContent = label.text;
    node.style.whiteSpace = 'pre';
    node.style.textAlign = f.align;
    node.style.flexDirection = 'column';
    node.style.alignItems = 'stretch';
    node.style.justifyContent = f.valign==='top'?'flex-start':f.valign==='bottom'?'flex-end':'center';
  }
  applyRot(node);
  return node;
}

function buildLabelBorder(label){
  const b = label.border;
  const node = ce('div','cell-border');
  if(b.width>0){
    node.style.border = `${b.width}mm ${b.style} ${b.color}`;
  }
  node.style.borderRadius = b.radius+'mm';
  return node;
}

/* ---------- 预览渲染 ---------- */
function renderPreview(){
  const stage = $('#preview-stage');
  stage.innerHTML='';
  const info = gridInfo();
  const scale = currentScale();
  for(let p=0;p<info.pages;p++){
    const wrap = ce('div','page-wrap');
    wrap.style.width = (info.d.w*MM*scale)+'px';
    wrap.style.height = (info.d.h*MM*scale)+'px';
    wrap.style.position='relative';
    const page = buildPageNode(p);
    page.style.position='absolute';
    page.style.left='0'; page.style.top='0';
    page.style.transformOrigin='top left';
    page.style.transform=`scale(${scale})`;
    wrap.appendChild(page);
    const num = ce('div','page-num', `第 ${p+1} / ${info.pages} 页 · ${info.cols}×${info.rows}`);
    wrap.appendChild(num);
    stage.appendChild(wrap);
  }
  updateInfoBar();
}
function currentScale(){ return fitScale*zoom; }

function recomputeFit(){
  const stage = $('.stage');
  const d = pageDims();
  const availW = stage.clientWidth - 60;
  const availH = stage.clientHeight - 60;
  const pageWpx = d.w * MM;
  const pageHpx = d.h * MM;
  let s = Math.min(availW/pageWpx, availH/pageHpx);
  s = clamp(s, 0.2, 2);
  fitScale = s;
}

    const cg = ce('div','grow'); const ci = ce('input'); ci.type='color'; ci.value=bg.color;
    ci.oninput=()=>{bg.color=ci.value;scheduleSave();renderPreview();renderList();}; cg.appendChild(ci); cRow.appendChild(cg); bb.appendChild(cRow);
    if(bg.type!=='solid'){
      const pRow = ce('div','row'); pRow.appendChild(ce('label','','图案色'));
      const pg = ce('div','grow'); const pi = ce('input'); pi.type='color'; pi.value=bg.patternColor;
      pi.oninput=()=>{bg.patternColor=pi.value;scheduleSave();renderPreview();}; pg.appendChild(pi); pRow.appendChild(pg); bb.appendChild(pRow);
    }
  } else { bb.appendChild(ce('div','list-empty','请先选中一个标签')); }
  gBg.appendChild(bb);
  panel.appendChild(gBg);

  /* --- 边框 --- */
  const gBd = ce('div','group');
  gBd.innerHTML = `<div class="gh">${svgIcon('<rect x="3" y="3" width="18" height="18" rx="2"/>')}边框</div>`;
  const bd = ce('div','gb');
  if(l){
    const b = l.border;
    bd.appendChild(field('宽度', ()=>rangeInput(b.width, v=>{b.width=v;scheduleSave();renderPreview();}, 0, 4, 0.1, v=>v.toFixed(1)+'mm')));
    const cRow = ce('div','row'); cRow.appendChild(ce('label','','颜色'));
    const cg = ce('div','grow'); const ci = ce('input'); ci.type='color'; ci.value=b.color;
    ci.oninput=()=>{b.color=ci.value;scheduleSave();renderPreview();}; cg.appendChild(ci); cRow.appendChild(cg); bd.appendChild(cRow);
    bd.appendChild(field('圆角', ()=>rangeInput(b.radius, v=>{b.radius=v;scheduleSave();renderPreview();}, 0, 20, 0.5, v=>v.toFixed(1)+'mm')));
    bd.appendChild(field('样式', ()=>segSm(['solid','dashed','double'],['实线','虚线','双线'], b.style, v=>{b.style=v;scheduleSave();renderPreview();})));
  } else { bd.appendChild(ce('div','list-empty','请先选中一个标签')); }
  gBd.appendChild(bd);
  panel.appendChild(gBd);

  /* --- 操作 --- */
  const gAct = ce('div','group');
  gAct.innerHTML = `<div class="gh">${svgIcon('<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4"/>')}批量操作</div>`;
  const ab = ce('div','gb');
  const bBatch = ce('button','btn orange'); bBatch.innerHTML = svgIcon('<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>')+'批量生成标签';
  bBatch.onclick = openBatch;
  ab.appendChild(bBatch);
  const bApply = ce('button','btn accent'); bApply.innerHTML = svgIcon('<polyline points="20 6 9 17 4 12"/>')+'应用样式到全部';
  bApply.style.marginTop='8px';
  bApply.onclick = applyStyleToAll;
  ab.appendChild(bApply);
  gAct.appendChild(ab);
  panel.appendChild(gAct);
}

/* ---------- 表单构建小工具 ---------- */
function field(label, builder){
  const row = ce('div','row');
  row.appendChild(ce('label','',label));
  const g = ce('div','grow');
  g.appendChild(builder());
  row.appendChild(g);
  return row;
}
function numInput(val, on, min, max, step){
  const i = ce('input'); i.type='number'; i.value=val;
  if(min!=null)i.min=min; if(max!=null)i.max=max; if(step!=null)i.step=step;
  i.oninput=()=>{ let v=parseFloat(i.value); if(isNaN(v))return; if(min!=null)v=Math.max(min,v); if(max!=null)v=Math.min(max,v); on(v); };
  return i;
}
function rangeInput(val, on, min, max, step, fmt){
  const wrap = ce('div'); wrap.style.cssText='display:flex;align-items:center;gap:7px;width:100%';
  const r = ce('input'); r.type='range'; r.min=min; r.max=max; r.step=step||1; r.value=val; r.style.flex='1';
  const lbl = ce('span','',fmt?fmt(val):val); lbl.style.cssText='font-family:var(--mono);font-size:10.5px;color:var(--muted);min-width:38px;text-align:right';
  r.oninput=()=>{ let v=parseFloat(r.value); on(v); lbl.textContent=fmt?fmt(v):v; };
  wrap.appendChild(r); wrap.appendChild(lbl);
  return wrap;
}
function segSm(values, labels, cur, on){
  const seg = ce('div','seg-sm');
  values.forEach((v,i)=>{
    const b = ce('button'); b.innerHTML=labels[i]; b.dataset.v=v;
    if(String(v)===String(cur)) b.classList.add('on');
    b.onclick=()=>{ on(v); seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
    seg.appendChild(b);
  });
  return seg;
}
function checkRow(label, val, on){
  const row = ce('div','row'); row.style.cursor='pointer';
  const cb = ce('input'); cb.type='checkbox'; cb.checked=val;
  const lbl = ce('label','',label); lbl.style.cssText='flex:1;cursor:pointer;font-size:12px;color:var(--ink)';
  cb.onchange=()=>on(cb.checked);
  row.appendChild(cb); row.appendChild(lbl);
  return row;
}

/* ---------- Logo 上传 ---------- */
function logoPicker(label){
  const input = ce('input'); input.type='file'; input.accept='image/*';
  input.onchange = ()=>{
    const f = input.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        label.logo = { src:reader.result, widthPct:50, xPct:50, yPct:25,
                       opacity:1, radius:3, shadow:false, aspect: img.width/img.height };
        scheduleSave(); buildLeftPanel(); renderPreview(); renderList();
        toast('Logo 已添加');
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(f);
  };
  input.click();
}

/* ============================================================
   标签列表
   ============================================================ */
function renderList(){
  const list = $('#label-list');
  list.innerHTML='';
  if(!state.labels.length){
    list.innerHTML = `<div class="list-empty">${svgIcon('<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/>')}<br>暂无标签<br>点击「添加」开始</div>`;
    return;
  }
  state.labels.forEach((l, i)=>{
    const item = ce('div','lbl-item');
    if(l.id===state.selectedId) item.classList.add('sel');
    item.draggable = true;
    item.dataset.id = l.id;

    const grip = ce('span','grip'); grip.innerHTML = svgIcon('<circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/>');
    const idx = ce('div','idx', String(i+1));
    const mini = ce('div','mini'); mini.style.background = l.background.color;
    const txt = ce('div','txt'); txt.textContent = l.text.split('\n')[0] || '(空标签)';
    item.appendChild(grip); item.appendChild(idx); item.appendChild(mini); item.appendChild(txt);

    item.onclick = ()=>{ state.selectedId = l.id; refreshAll(); };
    item.ondragstart = e=>{ item.classList.add('dragging'); e.dataTransfer.setData('text', l.id); };
    item.ondragend = ()=>item.classList.remove('dragging');
    item.ondragover = e=>{ e.preventDefault(); };
    item.ondrop = e=>{
      e.preventDefault();
      const fromId = e.dataTransfer.getData('text');
      const fromIdx = state.labels.findIndex(x=>x.id===fromId);
      const toIdx = i;
      if(fromIdx<0||fromIdx===toIdx) return;
      const [moved] = state.labels.splice(fromIdx,1);
      state.labels.splice(toIdx,0,moved);
      scheduleSave(); renderList(); renderPreview();
    };
    list.appendChild(item);
  });
}

/* ============================================================
   操作动作
   ============================================================ */
function addLabel(){
  const tmpl = curLabel();
  const n = tmpl ? cloneLabelStyle(tmpl, '新标签') : defaultLabel('新标签');
  state.labels.push(n); state.selectedId = n.id;
  scheduleSave(); refreshAll();
}
function dupLabel(){
  const l = curLabel(); if(!l) return;
  const idx = state.labels.findIndex(x=>x.id===l.id);
  const n = cloneLabelStyle(l, l.text);
  n.logo = l.logo ? {...l.logo} : null;
  state.labels.splice(idx+1,0,n); state.selectedId=n.id;
  scheduleSave(); refreshAll();
}
function delLabel(){
  const l = curLabel(); if(!l) return;
  const idx = state.labels.findIndex(x=>x.id===l.id);
  state.labels.splice(idx,1);
  state.selectedId = state.labels[Math.min(idx, state.labels.length-1)]?.id || null;
  scheduleSave(); refreshAll();
}
function clearAll(){
  if(!state.labels.length) return;
  state.labels = []; state.selectedId = null;
  scheduleSave(); refreshAll();
}
function cloneLabelStyle(src, text){
  const n = defaultLabel(text);
  n.font = {...src.font};
  n.background = {...src.background};
  n.border = {...src.border};
  return n;
}
function applyStyleToAll(){
  const l = curLabel(); if(!l){ toast('请先选中一个标签'); return; }
  state.labels.forEach(x=>{
    if(x.id===l.id) return;
    x.font = {...l.font};
    x.background = {...l.background};
    x.border = {...l.border};
    if(l.logo) x.logo = {...l.logo}; else x.logo = null;
  });
  scheduleSave(); refreshAll(); toast('已应用到全部标签');
}

/* ---------- 批量生成 ---------- */
function openBatch(){ $('#batch-mask').classList.add('show'); }
function closeBatch(){ $('#batch-mask').classList.remove('show'); }
function doBatch(){
  const text = $('#batch-text').value;
  const useStyle = $('#batch-use-style').checked;
  const append = $('#batch-append').checked;
  const lines = text.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ toast('请输入至少一行文字'); return; }
  const tmpl = (useStyle && curLabel()) ? curLabel() : null;
  const newLabels = lines.map(line=>{
    const t = line.replace(/\//g,'\n');
    const n = tmpl ? cloneLabelStyle(tmpl, t) : defaultLabel(t);
    if(tmpl && tmpl.logo) n.logo = {...tmpl.logo};
    return n;
  });
  if(append){ state.labels = state.labels.concat(newLabels); }
  else { state.labels = newLabels; }
  state.selectedId = newLabels[0].id;
  closeBatch(); $('#batch-text').value='';
  scheduleSave(); refreshAll(); toast(`已生成 ${newLabels.length} 个标签`);
}

/* ============================================================
   持久化
   ============================================================ */
const scheduleSave = debounce(()=>{ try{ localStorage.setItem('foldertab_draft', JSON.stringify(state)); }catch(e){} }, 500);
function loadDraft(){
  try{ const s = localStorage.getItem('foldertab_draft'); if(!s) return null; const o = JSON.parse(s); return migrate(o); }catch(e){ return null; }
}
function migrate(o){
  if(!o || !o.page) return null;
  if(!o.page.margin) o.page.margin = {t:10,r:10,b:10,l:10};
  if(!o.page.gap) o.page.gap = {x:3,y:3};
  if(o.page.showCutLines==null) o.page.showCutLines = true;
  if(!o.label) o.label = {widthMm:45,heightMm:16,template:'hangtab'};
  if(!o.labels) o.labels = [];
  (o.labels||[]).forEach(l=>{
    if(!l.font) l.font = defaultLabel().font;
    if(!l.font.direction) l.font.direction = 'horizontal';
    if(!l.background) l.background = defaultLabel().background;
    if(!l.border) l.border = defaultLabel().border;
    if(!l.id) l.id = uid();
  });
  return o;
}
function saveProject(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = ce('a'); a.href = URL.createObjectURL(blob);
  a.download = (state.name||'标签项目') + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('项目已保存为 JSON');
}
function loadProject(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const o = JSON.parse(reader.result);
      const m = migrate(o); if(!m) throw 0;
      state = m;
      if(!state.labels.length) state.labels = [defaultLabel()];
      state.selectedId = state.labels[0].id;
      $('#proj-name').value = state.name;
      scheduleSave(); refreshAll(); toast('项目已加载');
    }catch(e){ toast('文件格式不正确'); }
  };
  reader.readAsText(file);
}

/* ============================================================
   导出 PDF / 打印
   ============================================================ */
async function exportPDF(){
  toast('正在生成 PDF，请稍候…');
  await document.fonts.ready;
  const info = gridInfo();
  const d = info.d;
  const doc = new jsPDF({ orientation: state.page.orientation, unit:'mm', format:'a4' });
  const hide = $('#print-area');
  hide.style.display = 'block';
  hide.innerHTML = '';
  for(let p=0; p<info.pages; p++){
    const page = buildPageNode(p);
    page.style.transform = 'none';
    hide.appendChild(page);
    // 等图片加载
    await Promise.all([...page.querySelectorAll('img')].map(img=> img.complete?Promise.resolve():new Promise(r=>{img.onload=img.onerror=r;})));
    const canvas = await html2canvas(page, { scale:3, backgroundColor:'#ffffff', useCORS:true, logging:false });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    if(p>0) doc.addPage('a4', state.page.orientation);
    doc.addImage(imgData, 'JPEG', 0, 0, d.w, d.h);
    hide.innerHTML = '';
  }
  hide.style.display = 'none';
  doc.save((state.name||'文件夹侧边标签') + '.pdf');
  toast('PDF 已导出');
}

function doPrint(){
  const info = gridInfo();
  const area = $('#print-area');
  area.innerHTML='';
  for(let p=0;p<info.pages;p++){
    const page = buildPageNode(p);
    page.style.transform = 'none';
    area.appendChild(page);
  }
  area.style.display='block';
  // 动态注入 @page 方向
  let st = document.getElementById('dyn-print-style');
  if(!st){ st = ce('style'); st.id='dyn-print-style'; document.head.appendChild(st); }
  st.textContent = `@page{ size: A4 ${state.page.orientation}; margin:0; }`;
  setTimeout(()=>{ window.print(); }, 60);
}
window.onafterprint = ()=>{ $('#print-area').style.display='none'; $('#print-area').innerHTML=''; };

/* ============================================================
   刷新 / 信息条
   ============================================================ */
function refreshAll(){ buildLeftPanel(); renderList(); renderPreview(); }
function updateInfoBar(){
  const info = gridInfo();
  let bar = $('#info-bar');
  if(!bar){ bar = ce('div'); bar.id='info-bar'; bar.style.cssText='position:fixed;top:64px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:15;pointer-events:none;'; document.body.appendChild(bar); }
  bar.innerHTML =
    `<span class="info-pill">标签 <b>${info.lw}×${info.lh}mm</b></span>`+
    `<span class="info-pill">网格 <b>${info.cols}×${info.rows}</b></span>`+
    `<span class="info-pill">每页 <b>${info.perPage}</b> 个</span>`+
    `<span class="info-pill">共 <b>${state.labels.length}</b> 个 · <b>${info.pages}</b> 页</span>`;
}

/* ============================================================
   缩放
   ============================================================ */
function setZoom(z){
  zoom = clamp(z, 0.2, 5); autoFit = false;
  $('#zoom-val').textContent = Math.round(zoom*100)+'%';
  renderPreview();
}
function fitZoom(){
  recomputeFit(); autoFit = true; zoom = 1;
  $('#zoom-val').textContent = 'FIT';
  renderPreview();
}

/* ============================================================
   事件绑定
   ============================================================ */
function bindEvents(){
  // 方向
  $('#orient-seg').querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{ $('#orient-seg').querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
      state.page.orientation = b.dataset.v; scheduleSave(); recomputeFit(); renderPreview(); };
  });
  // 项目名
  $('#proj-name').oninput = ()=>{ state.name = $('#proj-name').value; scheduleSave(); };
  // 顶部按钮
  $('#btn-save').onclick = saveProject;
  $('#btn-load').onclick = ()=>$('#load-input').click();
  $('#load-input').onchange = e=>{ if(e.target.files[0]) loadProject(e.target.files[0]); e.target.value=''; };
  $('#btn-print').onclick = doPrint;
  $('#btn-export').onclick = exportPDF;
  $('#btn-toggle-list').onclick = ()=>$('#right-panel').classList.toggle('open');
  // 列表按钮
  $('#btn-add').onclick = addLabel;
  $('#btn-dup').onclick = dupLabel;
  $('#btn-del').onclick = delLabel;
  $('#btn-clear').onclick = clearAll;
  // 批量弹窗
  $('#batch-close').onclick = closeBatch;
  $('#batch-cancel').onclick = closeBatch;
  $('#batch-go').onclick = doBatch;
  $('#batch-mask').onclick = e=>{ if(e.target.id==='batch-mask') closeBatch(); };
  // 缩放
  $('#zoom-in').onclick = ()=>{ setZoom((autoFit?1:zoom)*1.15); };
  $('#zoom-out').onclick = ()=>{ setZoom((autoFit?1:zoom)/1.15); };
  $('#zoom-fit').onclick = fitZoom;
  // 窗口
  window.addEventListener('resize', debounce(()=>{ recomputeFit(); if(autoFit) renderPreview(); }, 150));
  // 键盘删除
  document.addEventListener('keydown', e=>{
    const tag = (e.target.tagName||'').toLowerCase();
    if(tag==='input'||tag==='textarea'||tag==='select') return;
    if((e.key==='Delete'||e.key==='Backspace') && state.selectedId){ delLabel(); }
    if(e.key==='Escape'){ closeBatch(); $('#right-panel').classList.remove('open'); }
  });
}

/* ---------- 初始化 ---------- */
function init(){
  $('#proj-name').value = state.name;
  // 方向按钮
  $('#orient-seg').querySelectorAll('button').forEach(b=>{
    b.classList.toggle('on', b.dataset.v===state.page.orientation);
  });
  bindEvents();
  recomputeFit();
  refreshAll();
  $('#zoom-val').textContent = 'FIT';
}
init();
</script>
