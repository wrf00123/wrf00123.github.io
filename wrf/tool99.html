<html lang="zh-CN" data-theme="dark" data-trae-theme="dark"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 导出工具 - 实时预览编辑器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --bg-card: #1e293b;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --accent-light: #818cf8;
  --accent-glow: rgba(99, 102, 241, 0.3);
  --border: #334155;
  --border-light: #475569;
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.2);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -4px rgba(0,0,0,0.2);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}

body.light-theme {
  --bg-primary: #f8fafc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f1f5f9;
  --bg-card: #ffffff;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --accent-light: #818cf8;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --border: #e2e8f0;
  --border-light: #cbd5e1;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* 顶部工具栏 */
.toolbar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-right: 10px;
  border-right: 1px solid var(--border);
}

.toolbar-group:last-child { border-right: none; }

.toolbar-btn {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid transparent;
  padding: 8px 14px;
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.toolbar-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--accent-glow);
}

.toolbar-btn:active {
  transform: translateY(0);
}

.toolbar-btn.primary {
  background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
  border-color: transparent;
  color: white;
  box-shadow: 0 2px 8px var(--accent-glow);
}

.toolbar-btn.primary:hover {
  background: linear-gradient(135deg, var(--accent-hover) 0%, #7c3aed 100%);
  box-shadow: 0 6px 20px var(--accent-glow);
}

.toolbar-btn.danger {
  color: var(--error);
}

.toolbar-btn.danger:hover {
  background: var(--error);
  color: white;
  border-color: var(--error);
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
}

.toolbar-btn.icon-only {
  padding: 8px 10px;
}

.toolbar-select {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid transparent;
  padding: 8px 10px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.toolbar-select:hover {
  border-color: var(--border-light);
}

.toolbar-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.toolbar-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

.toolbar-label input[type="checkbox"] {
  accent-color: var(--accent);
  margin-right: 4px;
  cursor: pointer;
}

/* 主内容区 */
.main-container {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.editor-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  min-width: 0;
  background: var(--bg-primary);
}

.preview-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-primary);
}

/* 标签页 */
.tabs {
  display: flex;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  gap: 2px;
}

.tab {
  padding: 12px 22px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
  position: relative;
}

.tab:hover {
  color: var(--text-primary);
  background: var(--bg-tertiary);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--bg-primary);
}

/* 编辑器容器 */
.editor-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: none;
}

.editor-container.active {
  display: flex;
}

.line-numbers {
  background: var(--bg-secondary);
  color: var(--text-muted);
  padding: 16px 12px;
  text-align: right;
  font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  user-select: none;
  min-width: 56px;
  overflow: hidden;
  white-space: pre;
  border-right: 1px solid var(--border);
}

.code-editor {
  flex: 1;
  background: var(--bg-primary);
  color: var(--text-primary);
  border: none;
  outline: none;
  padding: 16px;
  font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  tab-size: 2;
  overflow: auto;
  white-space: pre;
  caret-color: var(--accent);
}

.code-editor::selection {
  background: var(--accent);
  color: white;
}

.code-editor:focus {
  outline: none;
}

/* 预览区 */
.preview-header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.preview-title {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}

.preview-title::before {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.preview-actions {
  display: flex;
  gap: 6px;
}

.preview-iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: white;
}

/* 状态栏 */
.status-bar {
  background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
  color: white;
  padding: 6px 16px;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 -2px 10px var(--accent-glow);
}

.status-left, .status-right {
  display: flex;
  gap: 20px;
  align-items: center;
}

.status-bar span {
  display: flex;
  align-items: center;
  gap: 5px;
}

/* 搜索替换面板 */
.search-panel {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: none;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}

.search-panel.show {
  display: flex;
  animation: slideDown 0.2s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.search-input {
  background: var(--bg-primary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: var(--radius-md);
  font-size: 13px;
  min-width: 200px;
  transition: all 0.2s;
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* 视图模式 */
body.preview-only .editor-section { display: none; }
body.editor-only .preview-section { display: none; }
body.fullscreen .toolbar, body.fullscreen .status-bar { display: none; }

body.vertical-layout .main-container { flex-direction: column; }
body.vertical-layout .editor-section {
  border-right: none;
  border-bottom: 1px solid var(--border);
}

/* 滚动条美化 */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb {
  background: var(--border-light);
  border-radius: 4px;
  transition: background 0.2s;
}
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Toast 提示 */
.toast {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  color: var(--text-primary);
  padding: 14px 24px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  z-index: 2000;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow-lg);
  font-size: 14px;
  font-weight: 500;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success {
  border-color: var(--success);
  box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
}

.toast.error {
  border-color: var(--error);
  box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2);
}

/* 分隔条 */
.resizer {
  width: 4px;
  background: transparent;
  cursor: col-resize;
  transition: background 0.2s;
  flex-shrink: 0;
  position: relative;
}

.resizer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 100%;
  background: var(--border);
  transition: all 0.2s;
}

.resizer:hover::before,
.resizer.active::before {
  width: 4px;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

body.vertical-layout .resizer {
  width: 100%;
  height: 4px;
  cursor: row-resize;
}

body.vertical-layout .resizer::before {
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  width: 100%;
  height: 2px;
}

body.vertical-layout .resizer:hover::before,
body.vertical-layout .resizer.active::before {
  height: 4px;
  width: 100%;
}

/* 响应式 */
@media (max-width: 768px) {
  .main-container { flex-direction: column; }
  .editor-section { border-right: none; border-bottom: 1px solid var(--border); }
  .toolbar { overflow-x: auto; flex-wrap: nowrap; }
}
</style>

<div class="toast" id="toast"></div>

<script>
var state = {
  currentTab: 'html',
  autoUpdate: true,
  fontSize: 13,
  theme: 'dark',
  view: 'split',
  layout: 'horizontal',
  history: { html: [], css: [], js: [] },
  historyIndex: { html: -1, css: -1, js: -1 },
  maxHistory: 50,
  debounceTimer: null
};

var defaultHTML = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>我的页面</title>\n</head>\n<body>\n\n</body>\n</html>';

function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.editor-container').forEach(function(c) {
    c.classList.remove('active');
  });
  document.getElementById('editor-' + tab).classList.add('active');
  document.getElementById('statusTab').textContent = tab.toUpperCase();
  updateStatus();
}

function onCodeChange(type) {
  saveToHistory(type);
  updateLineNumbers(type);
  updateStatus();
  if (state.autoUpdate) {
    clearTimeout(state.debounceTimer);
    state.debounceTimer = setTimeout(function() { updatePreview(); }, 300);
  }
  saveToStorage();
}

function buildFullHTML(html, css, js) {
  var result = html;
  if (css) {
    if (result.indexOf('</head>') !== -1) {
      result = result.replace('</head>', '<style>\n' + css + '\n</style>\n</head>');
    } else {
      result = '<style>\n' + css + '\n</style>\n' + result;
    }
  }
  if (js) {
    var scriptTag = '<' + 'script>\n' + js + '\n<' + '/script>';
    if (result.indexOf('</body>') !== -1) {
      result = result.replace('</body>', scriptTag + '\n</body>');
    } else {
      result = result + '\n' + scriptTag;
    }
  }
  return result;
}

function updatePreview() {
  var html = document.getElementById('code-html').value;
  var css = document.getElementById('code-css').value;
  var js = document.getElementById('code-js').value;
  var fullHtml = buildFullHTML(html, css, js);
  var iframe = document.getElementById('previewFrame');
  iframe.srcdoc = fullHtml;
}

function runCode() {
  updatePreview();
  showToast('代码已运行', 'success');
}

function refreshPreview() {
  updatePreview();
  showToast('预览已刷新', 'success');
}

function toggleAutoUpdate() {
  state.autoUpdate = document.getElementById('autoUpdate').checked;
  if (state.autoUpdate) updatePreview();
}

function exportHTML() {
  var html = document.getElementById('code-html').value;
  var css = document.getElementById('code-css').value;
  var js = document.getElementById('code-js').value;
  var fullHtml = buildFullHTML(html, css, js);
  var blob = new Blob([fullHtml], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'exported-page.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('导出成功！', 'success');
}

function importHTML(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    parseImportedHTML(e.target.result);
    showToast('导入成功！', 'success');
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseImportedHTML(content) {
  var html = content;
  var css = '';
  var js = '';
  var styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/i;
  var styleMatch = html.match(styleRegex);
  if (styleMatch) {
    css = styleMatch[1].trim();
    html = html.replace(styleMatch[0], '');
  }
  var scriptRegex = /<script(?![^>]*src)[^>]*>([\s\S]*?)<\/script>/i;
  var scriptMatch = html.match(scriptRegex);
  if (scriptMatch) {
    js = scriptMatch[1].trim();
    html = html.replace(scriptMatch[0], '');
  }
  document.getElementById('code-html').value = html.trim();
  document.getElementById('code-css').value = css;
  document.getElementById('code-js').value = js;
  updateLineNumbers();
  updatePreview();
  saveToStorage();
  saveToHistory('html');
  saveToHistory('css');
  saveToHistory('js');
}

function formatCode() {
  var tab = state.currentTab;
  var code = document.getElementById('code-' + tab).value;
  var formatted = code;
  if (tab === 'html') formatted = formatHTML(code);
  else if (tab === 'css') formatted = formatCSS(code);
  else if (tab === 'js') formatted = formatJS(code);
  document.getElementById('code-' + tab).value = formatted;
  updateLineNumbers(tab);
  onCodeChange(tab);
  showToast('代码已格式化', 'success');
}

function formatHTML(html) {
  var formatted = '';
  var indent = 0;
  var indentStr = '  ';
  html = html.replace(/>\s*</g, '>\n<');
  var lines = html.split('\n');
  var selfClosing = ['br','hr','img','input','meta','link','area','base','col','embed','source','track','wbr'];
  lines.forEach(function(line) {
    line = line.trim();
    if (!line) return;
    var isClosing = line.indexOf('</') === 0;
    var isSelf = false;
    for (var i = 0; i < selfClosing.length; i++) {
      var tag = selfClosing[i];
      var re1 = new RegExp('^<' + tag + '[\\s>]', 'i');
      var re2 = new RegExp('^<' + tag + '/>', 'i');
      if (re1.test(line) || re2.test(line)) { isSelf = true; break; }
    }
    var isOpening = line.indexOf('<') === 0 && !isClosing && !isSelf && line.indexOf('<!') !== 0;
    if (isClosing) indent = Math.max(0, indent - 1);
    formatted += indentStr.repeat(indent) + line + '\n';
    if (isOpening && line.indexOf('</') === -1) indent++;
  });
  return formatted.trim();
}

function formatCSS(css) {
  var formatted = '';
  var indent = 0;
  var indentStr = '  ';
  css = css.replace(/\s*{\s*/g, ' {\n');
  css = css.replace(/\s*}\s*/g, '\n}\n');
  css = css.replace(/;\s*/g, ';\n');
  var lines = css.split('\n');
  lines.forEach(function(line) {
    line = line.trim();
    if (!line) return;
    if (line.indexOf('}') !== -1) indent = Math.max(0, indent - 1);
    formatted += indentStr.repeat(indent) + line + '\n';
    if (line.indexOf('{') !== -1 && line.indexOf('}') === -1) indent++;
  });
  return formatted.trim();
}

function formatJS(js) {
  var formatted = '';
  var indent = 0;
  var indentStr = '  ';
  js = js.replace(/\s*{\s*/g, ' {\n');
  js = js.replace(/\s*}\s*/g, '\n}\n');
  js = js.replace(/;\s*/g, ';\n');
  var lines = js.split('\n');
  lines.forEach(function(line) {
    line = line.trim();
    if (!line) return;
    if (line.indexOf('}') === 0 || line.indexOf(']') === 0) indent = Math.max(0, indent - 1);
    formatted += indentStr.repeat(indent) + line + '\n';
    var opens = (line.match(/{/g) || []).length;
    var closes = (line.match(/}/g) || []).length;
    indent += opens - closes;
    indent = Math.max(0, indent);
  });
  return formatted.trim();
}

function copyCode() {
  var html = document.getElementById('code-html').value;
  var css = document.getElementById('code-css').value;
  var js = document.getElementById('code-js').value;
  var fullHtml = buildFullHTML(html, css, js);
  navigator.clipboard.writeText(fullHtml).then(function() {
    showToast('代码已复制到剪贴板', 'success');
  }).catch(function() {
    showToast('复制失败', 'error');
  });
}

function toggleSearch() {
  var panel = document.getElementById('searchPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) document.getElementById('searchInput').focus();
}

function getActiveEditor() {
  return document.getElementById('code-' + state.currentTab);
}

function highlightSearch() {
  var editor = getActiveEditor();
  var search = document.getElementById('searchInput').value;
  var countEl = document.getElementById('searchCount');
  if (!search) { countEl.textContent = ''; return; }
  var regex = new RegExp(escapeRegex(search), 'gi');
  var matches = editor.value.match(regex);
  countEl.textContent = matches ? '找到 ' + matches.length + ' 个结果' : '未找到';
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function findNext() {
  var editor = getActiveEditor();
  var search = document.getElementById('searchInput').value;
  if (!search) return;
  var text = editor.value;
  var startPos = editor.selectionEnd;
  var regex = new RegExp(escapeRegex(search), 'gi');
  regex.lastIndex = startPos;
  var match = regex.exec(text);
  if (!match) { regex.lastIndex = 0; match = regex.exec(text); }
  if (match) {
    editor.focus();
    editor.setSelectionRange(match.index, match.index + search.length);
  }
}

function findPrev() {
  var editor = getActiveEditor();
  var search = document.getElementById('searchInput').value;
  if (!search) return;
  var text = editor.value;
  var startPos = editor.selectionStart;
  var regex = new RegExp(escapeRegex(search), 'gi');
  var match;
  var lastMatch = null;
  while ((match = regex.exec(text)) !== null) {
    if (match.index < startPos) lastMatch = match;
    else break;
  }
  if (!lastMatch) {
    while ((match = regex.exec(text)) !== null) lastMatch = match;
  }
  if (lastMatch) {
    editor.focus();
    editor.setSelectionRange(lastMatch.index, lastMatch.index + search.length);
  }
}

function replaceOne() {
  var editor = getActiveEditor();
  var search = document.getElementById('searchInput').value;
  var replace = document.getElementById('replaceInput').value;
  if (!search) return;
  var start = editor.selectionStart;
  var end = editor.selectionEnd;
  var text = editor.value;
  if (text.substring(start, end).toLowerCase() === search.toLowerCase()) {
    var newText = text.substring(0, start) + replace + text.substring(end);
    editor.value = newText;
    editor.focus();
    editor.setSelectionRange(start, start + replace.length);
    onCodeChange(state.currentTab);
    highlightSearch();
  } else {
    findNext();
  }
}

function replaceAll() {
  var editor = getActiveEditor();
  var search = document.getElementById('searchInput').value;
  var replace = document.getElementById('replaceInput').value;
  if (!search) return;
  var regex = new RegExp(escapeRegex(search), 'gi');
  var count = (editor.value.match(regex) || []).length;
  editor.value = editor.value.replace(regex, replace);
  onCodeChange(state.currentTab);
  showToast('已替换 ' + count + ' 处', 'success');
}

function saveToHistory(type) {
  var code = document.getElementById('code-' + type).value;
  if (state.historyIndex[type] >= 0 && state.history[type][state.historyIndex[type]] === code) return;
  state.history[type] = state.history[type].slice(0, state.historyIndex[type] + 1);
  state.history[type].push(code);
  if (state.history[type].length > state.maxHistory) state.history[type].shift();
  state.historyIndex[type] = state.history[type].length - 1;
}

function undoAction() {
  var type = state.currentTab;
  if (state.historyIndex[type] > 0) {
    state.historyIndex[type]--;
    document.getElementById('code-' + type).value = state.history[type][state.historyIndex[type]];
    updateLineNumbers(type);
    updatePreview();
    updateStatus();
  }
}

function redoAction() {
  var type = state.currentTab;
  if (state.historyIndex[type] < state.history[type].length - 1) {
    state.historyIndex[type]++;
    document.getElementById('code-' + type).value = state.history[type][state.historyIndex[type]];
    updateLineNumbers(type);
    updatePreview();
    updateStatus();
  }
}

function setView(view) {
  state.view = view;
  document.body.classList.remove('preview-only', 'editor-only');
  if (view === 'preview') document.body.classList.add('preview-only');
  else if (view === 'editor') document.body.classList.add('editor-only');
  saveToStorage();
}

function toggleLayout() {
  state.layout = state.layout === 'horizontal' ? 'vertical' : 'horizontal';
  document.body.classList.toggle('vertical-layout', state.layout === 'vertical');
  saveToStorage();
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.body.classList.add('fullscreen');
  } else {
    document.exitFullscreen();
    document.body.classList.remove('fullscreen');
  }
}

document.addEventListener('fullscreenchange', function() {
  document.body.classList.toggle('fullscreen', !!document.fullscreenElement);
});

function changeTheme(theme) {
  state.theme = theme;
  document.body.classList.remove('dark-theme', 'light-theme');
  document.body.classList.add(theme + '-theme');
  document.getElementById('themeSelect').value = theme;
  saveToStorage();
}

function changeFontSize(delta) {
  state.fontSize = Math.max(10, Math.min(28, state.fontSize + delta));
  document.querySelectorAll('.code-editor').forEach(function(ed) {
    ed.style.fontSize = state.fontSize + 'px';
  });
  document.querySelectorAll('.line-numbers').forEach(function(ln) {
    ln.style.fontSize = state.fontSize + 'px';
  });
  saveToStorage();
}

function updateLineNumbers(type) {
  if (!type) { ['html','css','js'].forEach(updateLineNumbers); return; }
  var editor = document.getElementById('code-' + type);
  var lineNumbers = document.getElementById('lineNumbers-' + type);
  var lines = editor.value.split('\n').length;
  var html = '';
  for (var i = 1; i <= lines; i++) html += i + '\n';
  lineNumbers.textContent = html;
}

function syncScroll(type) {
  var editor = document.getElementById('code-' + type);
  var lineNumbers = document.getElementById('lineNumbers-' + type);
  lineNumbers.scrollTop = editor.scrollTop;
}

function handleKeyDown(e, type) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var editor = e.target;
    var start = editor.selectionStart;
    var end = editor.selectionEnd;
    if (e.shiftKey) {
      var lineStart = editor.value.lastIndexOf('\n', start - 1) + 1;
      var line = editor.value.substring(lineStart, start);
      if (line.indexOf('  ') === 0) {
        editor.value = editor.value.substring(0, lineStart) + line.substring(2) + editor.value.substring(start);
        editor.selectionStart = editor.selectionEnd = start - 2;
      }
    } else {
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
    }
    onCodeChange(type);
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    exportHTML();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
  if (e.ctrlKey && e.key === '/') {
    e.preventDefault();
    toggleSearch();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); toggleSearch(); }
});

function updateStatus() {
  var editor = getActiveEditor();
  var text = editor.value;
  var pos = editor.selectionStart;
  var lines = text.substring(0, pos).split('\n');
  var lineNum = lines.length;
  var colNum = lines[lines.length - 1].length + 1;
  document.getElementById('statusPosition').textContent = '行 ' + lineNum + ', 列 ' + colNum;
  document.getElementById('statusLines').textContent = '共 ' + text.split('\n').length + ' 行';
  document.getElementById('statusChars').textContent = '字符: ' + text.length;
}

document.querySelectorAll('.code-editor').forEach(function(ed) {
  ed.addEventListener('click', updateStatus);
  ed.addEventListener('keyup', updateStatus);
});

function saveToStorage() {
  var data = {
    html: document.getElementById('code-html').value,
    css: document.getElementById('code-css').value,
    js: document.getElementById('code-js').value,
    theme: state.theme,
    fontSize: state.fontSize,
    view: state.view,
    layout: state.layout,
    currentTab: state.currentTab
  };
  try { localStorage.setItem('htmlEditorData', JSON.stringify(data)); } catch(e) {}
}

function loadFromStorage() {
  try {
    var data = JSON.parse(localStorage.getItem('htmlEditorData'));
    if (data) {
      if (data.html !== undefined) document.getElementById('code-html').value = data.html;
      if (data.css !== undefined) document.getElementById('code-css').value = data.css;
      if (data.js !== undefined) document.getElementById('code-js').value = data.js;
      if (data.theme) { state.theme = data.theme; changeTheme(data.theme); }
      if (data.fontSize) {
        state.fontSize = data.fontSize;
        document.querySelectorAll('.code-editor').forEach(function(ed) { ed.style.fontSize = data.fontSize + 'px'; });
        document.querySelectorAll('.line-numbers').forEach(function(ln) { ln.style.fontSize = data.fontSize + 'px'; });
      }
      if (data.view) setView(data.view);
      if (data.layout) { state.layout = data.layout; document.body.classList.toggle('vertical-layout', data.layout === 'vertical'); }
      if (data.currentTab) switchTab(data.currentTab);
    } else {
      useDefault();
    }
  } catch (e) {
    useDefault();
  }
  ['html','css','js'].forEach(function(type) {
    var code = document.getElementById('code-' + type).value;
    state.history[type] = [code];
    state.historyIndex[type] = 0;
  });
}

function useDefault() {
  document.getElementById('code-html').value = defaultHTML;
  document.getElementById('code-css').value = '';
  document.getElementById('code-js').value = '';
}

function clearAll() {
  if (confirm('确定要清空所有代码吗？此操作不可撤销。')) {
    document.getElementById('code-html').value = '';
    document.getElementById('code-css').value = '';
    document.getElementById('code-js').value = '';
    updateLineNumbers();
    updatePreview();
    saveToStorage();
    showToast('已清空', 'success');
  }
}

function openInNewTab() {
  var html = document.getElementById('code-html').value;
  var css = document.getElementById('code-css').value;
  var js = document.getElementById('code-js').value;
  var fullHtml = buildFullHTML(html, css, js);
  var blob = new Blob([fullHtml], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  window.open(url, '_blank');
}

function setupResizer() {
  var resizer = document.getElementById('resizer');
  var container = document.getElementById('mainContainer');
  var editor = document.getElementById('editorSection');
  var preview = document.getElementById('previewSection');
  var isResizing = false;
  resizer.addEventListener('mousedown', function(e) {
    isResizing = true;
    resizer.classList.add('active');
    document.body.style.cursor = state.layout === 'vertical' ? 'row-resize' : 'col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    var rect = container.getBoundingClientRect();
    if (state.layout === 'horizontal') {
      var newWidth = e.clientX - rect.left;
      var percent = (newWidth / rect.width) * 100;
      editor.style.flex = '0 0 ' + percent + '%';
      preview.style.flex = '1';
    } else {
      var newHeight = e.clientY - rect.top;
      var percentV = (newHeight / rect.height) * 100;
      editor.style.flex = '0 0 ' + percentV + '%';
      preview.style.flex = '1';
    }
  });
  document.addEventListener('mouseup', function() {
    isResizing = false;
    resizer.classList.remove('active');
    document.body.style.cursor = '';
  });
}

function showToast(message, type) {
  var toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + (type || '');
  setTimeout(function() { toast.classList.add('show'); }, 10);
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

document.addEventListener('DOMContentLoaded', function() {
  loadFromStorage();
  updateLineNumbers();
  updatePreview();
  setupResizer();
  updateStatus();
});
