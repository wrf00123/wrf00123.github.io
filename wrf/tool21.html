<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子印章生成器 - 高度自定义</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --panel-bg: #ffffff;
            --text: #2c2416;
            --text-secondary: #5c5347;
            --border: #e0d8cc;
            --accent: #b5343a;
            --accent-hover: #8b1a1f;
            --slider-track: #d4c8b8;
            --input-bg: #faf8f5;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
            --radius: 14px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 30%, #ede6db 0%, transparent 60%),
                radial-gradient(ellipse at 75% 70%, #e8dfd2 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, #f7f3ec 0%, transparent 70%);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container {
            display: flex;
            gap: 24px;
            max-width: 1300px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        .preview-section {
            flex: 1 1 480px;
            max-width: 620px;
            min-width: 380px;
            background: var(--panel-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 20px;
        }
        .preview-section h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }
        .preview-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .canvas-wrapper {
            position: relative;
            background: #fefdfb;
            border-radius: 12px;
            border: 2px dashed #e8e0d4;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 500px;
            max-height: 500px;
            overflow: hidden;
            transition: border-color var(--transition), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .canvas-wrapper:hover {
            border-color: #c4b8a2;
        }
        .canvas-wrapper canvas {
            display: block;
            max-width: 92%;
            max-height: 92%;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .canvas-wrapper canvas:active {
            transform: scale(0.97);
        }
        .preview-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(181, 52, 58, 0.3);
        }
        .btn-outline {
            background: #fff;
            color: var(--accent);
            border: 1.5px solid var(--accent);
        }
        .btn-outline:hover {
            background: #fef5f5;
            border-color: var(--accent-hover);
            color: var(--accent-hover);
        }
        .btn-ghost {
            background: #f8f5f0;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: #efe9df;
            color: var(--text);
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .control-section {
            flex: 1 1 420px;
            max-width: 560px;
            min-width: 340px;
            background: var(--panel-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 22px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #d0c8b8 transparent;
        }
        .control-section::-webkit-scrollbar {
            width: 5px;
        }
        .control-section::-webkit-scrollbar-track {
            background: transparent;
        }
        .control-section::-webkit-scrollbar-thumb {
            background: #d0c8b8;
            border-radius: 10px;
        }
        .control-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-section h2 .icon {
            font-size: 1.3rem;
        }

        .param-group {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            background: #fdfcf9;
            transition: all var(--transition);
        }
        .param-group:hover {
            border-color: #c8bca6;
        }
        .param-group summary {
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text);
            letter-spacing: 0.02em;
            padding: 2px 0;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .param-group summary::-webkit-details-marker {
            display: none;
        }
        .param-group summary::before {
            content: '▸';
            display: inline-block;
            transition: transform 0.25s ease;
            font-size: 0.75rem;
            color: var(--accent);
            flex-shrink: 0;
        }
        .param-group[open] summary::before {
            transform: rotate(90deg);
        }
        .param-group .group-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .form-row label {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            min-width: 60px;
            flex-shrink: 0;
            letter-spacing: 0.02em;
        }
        .form-row input[type="range"] {
            flex: 1 1 90px;
            min-width: 70px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--slider-track);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        .form-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }
        .form-row input[type="range"]::-webkit-slider-thumb:hover {
            background: #fef5f5;
            border-color: var(--accent-hover);
            transform: scale(1.08);
        }
        .form-row .val {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 34px;
            text-align: right;
            flex-shrink: 0;
        }
        .form-row input[type="text"],
        .form-row input[type="number"] {
            flex: 1 1 100px;
            min-width: 80px;
            padding: 7px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            background: var(--input-bg);
            color: var(--text);
            transition: all var(--transition);
            font-family: inherit;
            letter-spacing: 0.02em;
        }
        .form-row input[type="text"]:focus,
        .form-row input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(181, 52, 58, 0.06);
            background: #fff;
        }
        .form-row input[type="color"] {
            width: 36px;
            height: 32px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            padding: 2px;
            background: #fff;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .form-row input[type="color"]:hover {
            border-color: var(--accent);
        }
        .form-row select {
            flex: 1 1 100px;
            min-width: 80px;
            padding: 7px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            background: var(--input-bg);
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
        }
        .form-row select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-row .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
        .form-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }

        .preset-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }
        .preset-chip {
            padding: 6px 13px;
            border-radius: 20px;
            font-size: 0.78rem;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        .preset-chip:hover {
            background: #fef5f5;
            border-color: var(--accent);
            color: var(--accent);
        }
        .preset-chip.active {
            background: #fef0f0;
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2c2416;
            color: #fff;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }
            .preview-section {
                position: static;
                flex: 1 1 auto;
                max-width: 100%;
                min-width: auto;
                width: 100%;
                padding: 20px 14px 14px;
            }
            .control-section {
                flex: 1 1 auto;
                max-width: 100%;
                min-width: auto;
                width: 100%;
                max-height: none;
                overflow-y: visible;
                padding: 18px 14px 14px;
            }
            .canvas-wrapper {
                max-width: 380px;
                max-height: 380px;
            }
            body {
                padding: 10px;
            }
        }
        @media (max-width: 480px) {
            .canvas-wrapper {
                max-width: 290px;
                max-height: 290px;
            }
            .form-row {
                gap: 6px;
            }
            .form-row label {
                min-width: 48px;
                font-size: 0.75rem;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 预览区 -->
        <section class="preview-section">
            <h2>🔴 印章预览</h2>
            <p class="preview-subtitle">点击印章可放大查看 · 实时调整参数</p>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="sealCanvas"></canvas>
            </div>
            <div class="preview-actions">
                <button class="btn btn-primary" id="btnDownload" title="下载透明背景PNG">
                    ⬇ 下载印章 (PNG)
                </button>
                <button class="btn btn-outline" id="btnDownloadHD" title="高清2倍分辨率">
                    ⬇ 高清下载 (2x)
                </button>
                <button class="btn btn-ghost btn-sm" id="btnRandom" title="随机生成一枚印章">
                    🎲 随机
                </button>
                <button class="btn btn-ghost btn-sm" id="btnReset" title="恢复默认设置">
                    ↺ 重置
                </button>
            </div>
        </section>

        <!-- 控制面板 -->
        <section class="control-section" id="controlSection">
            <h2><span class="icon">⚙️</span> 自定义参数</h2>

            <!-- 预设 -->
            <div class="param-group">
                <summary>📋 快速预设</summary>
                <div class="group-content">
                    <div class="preset-chips" id="presetChips">
                        <span class="preset-chip active" data-preset="default">公司公章</span>
                        <span class="preset-chip" data-preset="contract">合同专用章</span>
                        <span class="preset-chip" data-preset="finance">财务专用章</span>
                        <span class="preset-chip" data-preset="invoice">发票专用章</span>
                        <span class="preset-chip" data-preset="personal">个人名章</span>
                        <span class="preset-chip" data-preset="vintage">复古做旧</span>
                    </div>
                </div>
            </div>

            <!-- 印章外观 -->
            <details class="param-group" open>
                <summary>🎨 印章外观</summary>
                <div class="group-content">
                    <div class="form-row">
                        <label>印章颜色</label>
                        <input type="color" id="sealColor" value="#c41e3a">
                        <span class="val" id="sealColorVal">#C41E3A</span>
                    </div>
                    <div class="form-row">
                        <label>直径</label>
                        <input type="range" id="sealDiameter" min="200" max="480" value="400" step="2">
                        <span class="val" id="sealDiameterVal">400</span>
                    </div>
                    <div class="form-row">
                        <label>外圈粗细</label>
                        <input type="range" id="outerRingWidth" min="3" max="30" value="12" step="0.5">
                        <span class="val" id="outerRingWidthVal">12</span>
                    </div>
                    <div class="form-row">
                        <label>内圈粗细</label>
                        <input type="range" id="innerRingWidth" min="0" max="12" value="2.5" step="0.5">
                        <span class="val" id="innerRingWidthVal">2.5</span>
                    </div>
                    <div class="form-row">
                        <label>内圈偏移</label>
                        <input type="range" id="innerRingOffset" min="8" max="50" value="22" step="1">
                        <span class="val" id="innerRingOffsetVal">22</span>
                    </div>
                    <div class="form-row">
                        <label>整体旋转</label>
                        <input type="range" id="globalRotation" min="-15" max="15" value="0" step="0.5">
                        <span class="val" id="globalRotationVal">0°</span>
                    </div>
                    <div class="form-row">
                        <label>做旧程度</label>
                        <input type="range" id="distressLevel" min="0" max="100" value="8" step="1">
                        <span class="val" id="distressLevelVal">8</span>
                    </div>
                    <div class="form-row">
                        <label>边缘模糊</label>
                        <input type="range" id="edgeBlur" min="0" max="8" value="0.5" step="0.1">
                        <span class="val" id="edgeBlurVal">0.5</span>
                    </div>
                </div>
            </details>

            <!-- 顶部弧形文字 -->
            <details class="param-group" open>
                <summary>🔤 顶部弧形文字</summary>
                <div class="group-content">
                    <div class="form-row">
                        <label>文字内容</label>
                        <input type="text" id="topText" value="某某科技有限公司" maxlength="30">
                    </div>
                    <div class="form-row">
                        <label>排布方向</label>
                        <select id="topTextDirection">
                            <option value="ltr" selected>从左到右</option>
                            <option value="rtl">从右到左</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>字体大小</label>
                        <input type="range" id="topFontSize" min="16" max="60" value="32" step="1">
                        <span class="val" id="topFontSizeVal">32</span>
                    </div>
                    <div class="form-row">
                        <label>距圆心</label>
                        <input type="range" id="topTextRadius" min="60" max="220" value="155" step="1">
                        <span class="val" id="topTextRadiusVal">155</span>
                    </div>
                    <div class="form-row">
                        <label>角度跨度</label>
                        <input type="range" id="topTextSpan" min="40" max="175" value="140" step="1">
                        <span class="val" id="topTextSpanVal">140°</span>
                    </div>
                    <div class="form-row">
                        <label>角度偏移</label>
                        <input type="range" id="topTextOffset" min="-30" max="30" value="0" step="1">
                        <span class="val" id="topTextOffsetVal">0°</span>
                    </div>
                    <div class="form-row">
                        <label>字符间距</label>
                        <input type="range" id="topLetterSpacing" min="-3" max="12" value="2" step="0.5">
                        <span class="val" id="topLetterSpacingVal">2</span>
                    </div>
                    <div class="form-row">
                        <label>字体</label>
                        <select id="topFontFamily">
                            <option value="SimSun, serif">宋体</option>
                            <option value="SimHei, sans-serif" selected>黑体</option>
                            <option value="KaiTi, serif">楷体</option>
                            <option value="FangSong, serif">仿宋</option>
                            <option value="Microsoft YaHei, sans-serif">微软雅黑</option>
                            <option value="STSong, serif">华文宋体</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label class="checkbox-wrap">
                            <input type="checkbox" id="topTextBold" checked> 加粗
                        </label>
                    </div>
                </div>
            </details>

            <!-- 底部弧形文字 -->
            <details class="param-group" open>
                <summary>🔤 底部弧形文字</summary>
                <div class="group-content">
                    <div class="form-row">
                        <label>文字内容</label>
                        <input type="text" id="bottomText" value="合同专用章" maxlength="20">
                    </div>
                    <div class="form-row">
                        <label>排布方向</label>
                        <select id="bottomTextDirection">
                            <option value="ltr" selected>从左到右</option>
                            <option value="rtl">从右到左</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>字体大小</label>
                        <input type="range" id="bottomFontSize" min="14" max="55" value="28" step="1">
                        <span class="val" id="bottomFontSizeVal">28</span>
                    </div>
                    <div class="form-row">
                        <label>距圆心</label>
                        <input type="range" id="bottomTextRadius" min="55" max="210" value="148" step="1">
                        <span class="val" id="bottomTextRadiusVal">148</span>
                    </div>
                    <div class="form-row">
                        <label>角度跨度</label>
                        <input type="range" id="bottomTextSpan" min="30" max="170" value="120" step="1">
                        <span class="val" id="bottomTextSpanVal">120°</span>
                    </div>
                    <div class="form-row">
                        <label>角度偏移</label>
                        <input type="range" id="bottomTextOffset" min="-30" max="30" value="0" step="1">
                        <span class="val" id="bottomTextOffsetVal">0°</span>
                    </div>
                    <div class="form-row">
                        <label>字符间距</label>
                        <input type="range" id="bottomLetterSpacing" min="-3" max="12" value="2" step="0.5">
                        <span class="val" id="bottomLetterSpacingVal">2</span>
                    </div>
                    <div class="form-row">
                        <label>字体</label>
                        <select id="bottomFontFamily">
                            <option value="SimSun, serif">宋体</option>
                            <option value="SimHei, sans-serif" selected>黑体</option>
                            <option value="KaiTi, serif">楷体</option>
                            <option value="FangSong, serif">仿宋</option>
                            <option value="Microsoft YaHei, sans-serif">微软雅黑</option>
                            <option value="STSong, serif">华文宋体</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label class="checkbox-wrap">
                            <input type="checkbox" id="bottomTextBold" checked> 加粗
                        </label>
                    </div>
                </div>
            </details>

            <!-- 中间图案 -->
            <details class="param-group" open>
                <summary>⭐ 中间图案</summary>
                <div class="group-content">
                    <div class="form-row">
                        <label>五角星大小</label>
                        <input type="range" id="starSize" min="20" max="120" value="62" step="1">
                        <span class="val" id="starSizeVal">62</span>
                    </div>
                    <div class="form-row">
                        <label>星旋转角度</label>
                        <input type="range" id="starRotation" min="-90" max="90" value="0" step="1">
                        <span class="val" id="starRotationVal">0°</span>
                    </div>
                    <div class="form-row">
                        <label>星内径比</label>
                        <input type="range" id="starInnerRatio" min="25" max="65" value="40" step="1">
                        <span class="val" id="starInnerRatioVal">40%</span>
                    </div>
                    <div class="form-row">
                        <label class="checkbox-wrap">
                            <input type="checkbox" id="showStar" checked> 显示五角星
                        </label>
                    </div>
                </div>
            </details>

            <!-- 中间横排文字 -->
            <details class="param-group">
                <summary>📝 中间横排文字</summary>
                <div class="group-content">
                    <div class="form-row">
                        <label>文字内容</label>
                        <input type="text" id="centerText" value="" maxlength="15" placeholder="留空则不显示">
                    </div>
                    <div class="form-row">
                        <label>字体大小</label>
                        <input type="range" id="centerFontSize" min="10" max="45" value="20" step="1">
                        <span class="val" id="centerFontSizeVal">20</span>
                    </div>
                    <div class="form-row">
                        <label>垂直偏移</label>
                        <input type="range" id="centerTextOffsetY" min="-80" max="80" value="30" step="1">
                        <span class="val" id="centerTextOffsetYVal">30</span>
                    </div>
                    <div class="form-row">
                        <label>字体</label>
                        <select id="centerFontFamily">
                            <option value="SimSun, serif">宋体</option>
                            <option value="SimHei, sans-serif" selected>黑体</option>
                            <option value="KaiTi, serif">楷体</option>
                            <option value="FangSong, serif">仿宋</option>
                            <option value="Microsoft YaHei, sans-serif">微软雅黑</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label class="checkbox-wrap">
                            <input type="checkbox" id="centerTextBold"> 加粗
                        </label>
                    </div>
                </div>
            </details>

            <!-- 编号/小字 -->
            <details class="param-group">
                <summary>🔢 底部编号小字</summary>
                <div class="group-content">
                    <div class="form-row">
                        <label>编号内容</label>
                        <input type="text" id="serialNumber" value="" maxlength="25" placeholder="留空则不显示，如：No.20240001">
                    </div>
                    <div class="form-row">
                        <label>字体大小</label>
                        <input type="range" id="serialFontSize" min="8" max="30" value="13" step="0.5">
                        <span class="val" id="serialFontSizeVal">13</span>
                    </div>
                    <div class="form-row">
                        <label>垂直偏移</label>
                        <input type="range" id="serialOffsetY" min="0" max="100" value="55" step="1">
                        <span class="val" id="serialOffsetYVal">55</span>
                    </div>
                </div>
            </details>
        </section>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ DOM 元素 ============
            const canvas = document.getElementById('sealCanvas');
            const ctx = canvas.getContext('2d');
            const canvasWrapper = document.getElementById('canvasWrapper');
            const toast = document.getElementById('toast');

            // 控制元素映射
            const controls = {
                sealColor: document.getElementById('sealColor'),
                sealDiameter: document.getElementById('sealDiameter'),
                outerRingWidth: document.getElementById('outerRingWidth'),
                innerRingWidth: document.getElementById('innerRingWidth'),
                innerRingOffset: document.getElementById('innerRingOffset'),
                globalRotation: document.getElementById('globalRotation'),
                distressLevel: document.getElementById('distressLevel'),
                edgeBlur: document.getElementById('edgeBlur'),
                topText: document.getElementById('topText'),
                topTextDirection: document.getElementById('topTextDirection'),
                topFontSize: document.getElementById('topFontSize'),
                topTextRadius: document.getElementById('topTextRadius'),
                topTextSpan: document.getElementById('topTextSpan'),
                topTextOffset: document.getElementById('topTextOffset'),
                topLetterSpacing: document.getElementById('topLetterSpacing'),
                topFontFamily: document.getElementById('topFontFamily'),
                topTextBold: document.getElementById('topTextBold'),
                bottomText: document.getElementById('bottomText'),
                bottomTextDirection: document.getElementById('bottomTextDirection'),
                bottomFontSize: document.getElementById('bottomFontSize'),
                bottomTextRadius: document.getElementById('bottomTextRadius'),
                bottomTextSpan: document.getElementById('bottomTextSpan'),
                bottomTextOffset: document.getElementById('bottomTextOffset'),
                bottomLetterSpacing: document.getElementById('bottomLetterSpacing'),
                bottomFontFamily: document.getElementById('bottomFontFamily'),
                bottomTextBold: document.getElementById('bottomTextBold'),
                starSize: document.getElementById('starSize'),
                starRotation: document.getElementById('starRotation'),
                starInnerRatio: document.getElementById('starInnerRatio'),
                showStar: document.getElementById('showStar'),
                centerText: document.getElementById('centerText'),
                centerFontSize: document.getElementById('centerFontSize'),
                centerTextOffsetY: document.getElementById('centerTextOffsetY'),
                centerFontFamily: document.getElementById('centerFontFamily'),
                centerTextBold: document.getElementById('centerTextBold'),
                serialNumber: document.getElementById('serialNumber'),
                serialFontSize: document.getElementById('serialFontSize'),
                serialOffsetY: document.getElementById('serialOffsetY'),
            };

            // 显示值的span映射
            const valSpans = {
                sealDiameter: document.getElementById('sealDiameterVal'),
                outerRingWidth: document.getElementById('outerRingWidthVal'),
                innerRingWidth: document.getElementById('innerRingWidthVal'),
                innerRingOffset: document.getElementById('innerRingOffsetVal'),
                globalRotation: document.getElementById('globalRotationVal'),
                distressLevel: document.getElementById('distressLevelVal'),
                edgeBlur: document.getElementById('edgeBlurVal'),
                topFontSize: document.getElementById('topFontSizeVal'),
                topTextRadius: document.getElementById('topTextRadiusVal'),
                topTextSpan: document.getElementById('topTextSpanVal'),
                topTextOffset: document.getElementById('topTextOffsetVal'),
                topLetterSpacing: document.getElementById('topLetterSpacingVal'),
                bottomFontSize: document.getElementById('bottomFontSizeVal'),
                bottomTextRadius: document.getElementById('bottomTextRadiusVal'),
                bottomTextSpan: document.getElementById('bottomTextSpanVal'),
                bottomTextOffset: document.getElementById('bottomTextOffsetVal'),
                bottomLetterSpacing: document.getElementById('bottomLetterSpacingVal'),
                starSize: document.getElementById('starSizeVal'),
                starRotation: document.getElementById('starRotationVal'),
                starInnerRatio: document.getElementById('starInnerRatioVal'),
                centerFontSize: document.getElementById('centerFontSizeVal'),
                centerTextOffsetY: document.getElementById('centerTextOffsetYVal'),
                serialFontSize: document.getElementById('serialFontSizeVal'),
                serialOffsetY: document.getElementById('serialOffsetYVal'),
                sealColor: document.getElementById('sealColorVal'),
            };

            // ============ 状态 ============
            let currentPreset = 'default';

            // ============ Canvas 初始化 ============
            const BASE_SIZE = 500;
            let displaySize = BASE_SIZE;

            function resizeCanvas() {
                const wrapperWidth = canvasWrapper.clientWidth;
                const wrapperHeight = canvasWrapper.clientHeight;
                displaySize = Math.min(wrapperWidth, wrapperHeight, BASE_SIZE) * 0.92;
                displaySize = Math.max(200, Math.floor(displaySize));
                canvas.width = BASE_SIZE;
                canvas.height = BASE_SIZE;
                canvas.style.width = displaySize + 'px';
                canvas.style.height = displaySize + 'px';
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
                drawSeal();
            });

            // ============ 绘制函数 ============
            function getParams() {
                const d = parseFloat(controls.sealDiameter.value);
                const radius = d / 2;
                const cx = BASE_SIZE / 2;
                const cy = BASE_SIZE / 2;
                return {
                    cx,
                    cy,
                    diameter: d,
                    radius,
                    sealColor: controls.sealColor.value,
                    outerRingWidth: parseFloat(controls.outerRingWidth.value),
                    innerRingWidth: parseFloat(controls.innerRingWidth.value),
                    innerRingOffset: parseFloat(controls.innerRingOffset.value),
                    globalRotation: parseFloat(controls.globalRotation.value) * Math.PI / 180,
                    distressLevel: parseInt(controls.distressLevel.value),
                    edgeBlur: parseFloat(controls.edgeBlur.value),
                    topText: controls.topText.value.trim(),
                    topTextDirection: controls.topTextDirection.value,
                    topFontSize: parseInt(controls.topFontSize.value),
                    topTextRadius: parseFloat(controls.topTextRadius.value),
                    topTextSpan: parseFloat(controls.topTextSpan.value) * Math.PI / 180,
                    topTextOffset: parseFloat(controls.topTextOffset.value) * Math.PI / 180,
                    topLetterSpacing: parseFloat(controls.topLetterSpacing.value),
                    topFontFamily: controls.topFontFamily.value,
                    topTextBold: controls.topTextBold.checked,
                    bottomText: controls.bottomText.value.trim(),
                    bottomTextDirection: controls.bottomTextDirection.value,
                    bottomFontSize: parseInt(controls.bottomFontSize.value),
                    bottomTextRadius: parseFloat(controls.bottomTextRadius.value),
                    bottomTextSpan: parseFloat(controls.bottomTextSpan.value) * Math.PI / 180,
                    bottomTextOffset: parseFloat(controls.bottomTextOffset.value) * Math.PI / 180,
                    bottomLetterSpacing: parseFloat(controls.bottomLetterSpacing.value),
                    bottomFontFamily: controls.bottomFontFamily.value,
                    bottomTextBold: controls.bottomTextBold.checked,
                    starSize: parseFloat(controls.starSize.value),
                    starRotation: parseFloat(controls.starRotation.value) * Math.PI / 180,
                    starInnerRatio: parseFloat(controls.starInnerRatio.value) / 100,
                    showStar: controls.showStar.checked,
                    centerText: controls.centerText.value.trim(),
                    centerFontSize: parseInt(controls.centerFontSize.value),
                    centerTextOffsetY: parseFloat(controls.centerTextOffsetY.value),
                    centerFontFamily: controls.centerFontFamily.value,
                    centerTextBold: controls.centerTextBold.checked,
                    serialNumber: controls.serialNumber.value.trim(),
                    serialFontSize: parseFloat(controls.serialFontSize.value),
                    serialOffsetY: parseFloat(controls.serialOffsetY.value),
                };
            }

            function drawStar(cx, cy, outerR, innerR, rotation, color) {
                const points = 10;
                const angleStep = Math.PI / 5;
                ctx.beginPath();
                for (let i = 0; i < points; i++) {
                    const angle = rotation - Math.PI / 2 + i * angleStep;
                    const r = i % 2 === 0 ? outerR : innerR;
                    const x = cx + r * Math.cos(angle);
                    const y = cy + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
            }

            function drawArcText(text, cx, cy, radius, startAngle, spanAngle, fontSize, fontFamily, isBold,
                letterSpacing, color, isTop, direction) {
                if (!text || text.length === 0) return;
                const chars = [...text];
                if (chars.length === 0) return;

                const totalSpan = spanAngle;
                const charCount = chars.length;
                const effectiveSpan = totalSpan;
                const anglePerChar = effectiveSpan / (charCount - 1 + (charCount > 1 ? 0 : 1));
                const totalUsedSpan = charCount > 1 ? anglePerChar * (charCount - 1) : 0;
                const startOffset = (totalSpan - totalUsedSpan) / 2;

                const fontWeight = isBold ? 'bold ' : '';
                ctx.font = `${fontWeight}${fontSize}px ${fontFamily}`;
                ctx.fillStyle = color;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const isRTL = (direction === 'rtl');

                for (let i = 0; i < charCount; i++) {
                    const charIndex = isRTL ? (charCount - 1 - i) : i;
                    let angle;
                    if (isTop) {
                        angle = startAngle - startOffset - i * anglePerChar;
                    } else {
                        angle = startAngle + startOffset + i * anglePerChar;
                    }

                    const charX = cx + radius * Math.cos(angle);
                    const charY = cy + radius * Math.sin(angle);

                    ctx.save();
                    ctx.translate(charX, charY);
                    if (isTop) {
                        ctx.rotate(angle + Math.PI / 2);
                    } else {
                        ctx.rotate(angle - Math.PI / 2);
                    }
                    const spacingOffset = letterSpacing * (i - (charCount - 1) / 2) * 0.3;
                    ctx.fillText(chars[charIndex], 0, spacingOffset);
                    ctx.restore();
                }
            }

            /**
             * 应用做旧效果 - 包含外圈、内圈、文字、五角星等所有元素的同步做旧
             * @param {CanvasRenderingContext2D} targetCtx - 目标画布上下文
             * @param {number} cx - 圆心X
             * @param {number} cy - 圆心Y
             * @param {number} radius - 印章半径
             * @param {number} level - 做旧程度 0-100
             * @param {string} color - 印章颜色
             * @param {boolean} showStar - 是否显示五角星
             * @param {number} starSize - 五角星外径
             */
            function applyDistress(targetCtx, cx, cy, radius, level, color, showStar, starSize) {
                if (level <= 0) return;
                const rng = seedRandom(42);

                // ===== 第一层：全局掉色擦除（影响外圈、内圈、文字、五角星等所有元素） =====
                const count = Math.floor(level * 8);
                targetCtx.save();
                targetCtx.globalCompositeOperation = 'destination-out';
                for (let i = 0; i < count; i++) {
                    const angle = rng() * Math.PI * 2;
                    const dist = radius * (0.55 + rng() * 0.5);
                    const ex = cx + dist * Math.cos(angle);
                    const ey = cy + dist * Math.sin(angle);
                    const er = 1 + rng() * level * 0.4;
                    const grad = targetCtx.createRadialGradient(ex, ey, 0, ex, ey, er);
                    grad.addColorStop(0, 'rgba(0,0,0,1)');
                    grad.addColorStop(0.5, 'rgba(0,0,0,0.6)');
                    grad.addColorStop(1, 'rgba(0,0,0,0)');
                    targetCtx.fillStyle = grad;
                    targetCtx.beginPath();
                    targetCtx.arc(ex, ey, er, 0, Math.PI * 2);
                    targetCtx.fill();
                }
                targetCtx.restore();

                // ===== 第二层：边缘磨损擦除 =====
                const edgeCount = Math.floor(level * 3);
                targetCtx.save();
                targetCtx.globalCompositeOperation = 'destination-out';
                for (let i = 0; i < edgeCount; i++) {
                    const angle = rng() * Math.PI * 2;
                    const dist = radius * (0.88 + rng() * 0.14);
                    const ex = cx + dist * Math.cos(angle);
                    const ey = cy + dist * Math.sin(angle);
                    const er = 2 + rng() * level * 0.5;
                    const grad = targetCtx.createRadialGradient(ex, ey, 0, ex, ey, er);
                    grad.addColorStop(0, 'rgba(0,0,0,0.9)');
                    grad.addColorStop(0.6, 'rgba(0,0,0,0.4)');
                    grad.addColorStop(1, 'rgba(0,0,0,0)');
                    targetCtx.fillStyle = grad;
                    targetCtx.beginPath();
                    targetCtx.arc(ex, ey, er, 0, Math.PI * 2);
                    targetCtx.fill();
                }
                targetCtx.restore();

                // ===== 第三层：五角星区域专属做旧擦除 =====
                if (showStar && starSize > 0) {
                    const starOuterR = starSize / 2;
                    const starAreaRadius = starOuterR * 1.2;
                    const starCenterCount = Math.floor(level * 4);
                    targetCtx.save();
                    targetCtx.globalCompositeOperation = 'destination-out';
                    for (let i = 0; i < starCenterCount; i++) {
                        const angle = rng() * Math.PI * 2;
                        const dist = starAreaRadius * (0.15 + rng() * 0.85);
                        const ex = cx + dist * Math.cos(angle);
                        const ey = cy + dist * Math.sin(angle);
                        const er = 0.6 + rng() * level * 0.35;
                        const grad = targetCtx.createRadialGradient(ex, ey, 0, ex, ey, er);
                        grad.addColorStop(0, 'rgba(0,0,0,0.85)');
                        grad.addColorStop(0.5, 'rgba(0,0,0,0.5)');
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        targetCtx.fillStyle = grad;
                        targetCtx.beginPath();
                        targetCtx.arc(ex, ey, er, 0, Math.PI * 2);
                        targetCtx.fill();
                    }

                    // 五角星边缘磨损
                    const starEdgeCount = Math.floor(level * 2.5);
                    for (let i = 0; i < starEdgeCount; i++) {
                        const angle = rng() * Math.PI * 2;
                        const dist = starOuterR * (0.82 + rng() * 0.22);
                        const ex = cx + dist * Math.cos(angle);
                        const ey = cy + dist * Math.sin(angle);
                        const er = 1.2 + rng() * level * 0.4;
                        const grad = targetCtx.createRadialGradient(ex, ey, 0, ex, ey, er);
                        grad.addColorStop(0, 'rgba(0,0,0,0.9)');
                        grad.addColorStop(0.5, 'rgba(0,0,0,0.45)');
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        targetCtx.fillStyle = grad;
                        targetCtx.beginPath();
                        targetCtx.arc(ex, ey, er, 0, Math.PI * 2);
                        targetCtx.fill();
                    }
                    targetCtx.restore();
                } else if (!showStar) {
                    // 即使没有五角星，中心区域也应该有做旧（针对中心文字等）
                    const centerOnlyCount = Math.floor(level * 2);
                    targetCtx.save();
                    targetCtx.globalCompositeOperation = 'destination-out';
                    for (let i = 0; i < centerOnlyCount; i++) {
                        const angle = rng() * Math.PI * 2;
                        const dist = radius * rng() * 0.35;
                        const ex = cx + dist * Math.cos(angle);
                        const ey = cy + dist * Math.sin(angle);
                        const er = 0.8 + rng() * level * 0.3;
                        const grad = targetCtx.createRadialGradient(ex, ey, 0, ex, ey, er);
                        grad.addColorStop(0, 'rgba(0,0,0,0.7)');
                        grad.addColorStop(0.5, 'rgba(0,0,0,0.35)');
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        targetCtx.fillStyle = grad;
                        targetCtx.beginPath();
                        targetCtx.arc(ex, ey, er, 0, Math.PI * 2);
                        targetCtx.fill();
                    }
                    targetCtx.restore();
                }

                // ===== 第四层：全局污渍斑点 =====
                targetCtx.save();
                targetCtx.globalCompositeOperation = 'source-over';
                const spotCount = Math.floor(level * 2.5);
                for (let i = 0; i < spotCount; i++) {
                    const angle = rng() * Math.PI * 2;
                    const dist = radius * (0.3 + rng() * 0.65);
                    const sx = cx + dist * Math.cos(angle);
                    const sy = cy + dist * Math.sin(angle);
                    const sr = 1 + rng() * 3;
                    const alpha = 0.03 + rng() * 0.12;
                    targetCtx.fillStyle = `rgba(0,0,0,${alpha})`;
                    targetCtx.beginPath();
                    targetCtx.arc(sx, sy, sr, 0, Math.PI * 2);
                    targetCtx.fill();
                }

                // 中心区域额外污渍（五角星或中心文字区域）
                const centerSpotCount = Math.floor(level * 1.8);
                const centerSpotRadius = showStar && starSize > 0 ? starSize / 2 : radius * 0.35;
                for (let i = 0; i < centerSpotCount; i++) {
                    const angle = rng() * Math.PI * 2;
                    const dist = centerSpotRadius * (0.1 + rng() * 0.9);
                    const sx = cx + dist * Math.cos(angle);
                    const sy = cy + dist * Math.sin(angle);
                    const sr = 0.6 + rng() * 2.5;
                    const alpha = 0.02 + rng() * 0.1;
                    targetCtx.fillStyle = `rgba(0,0,0,${alpha})`;
                    targetCtx.beginPath();
                    targetCtx.arc(sx, sy, sr, 0, Math.PI * 2);
                    targetCtx.fill();
                }
                targetCtx.restore();
            }

            function seedRandom(seed) {
                let s = seed;
                return function() {
                    s = (s * 16807 + 0) % 2147483647;
                    return (s - 1) / 2147483646;
                };
            }

            function drawSeal() {
                const p = getParams();
                const { cx, cy, radius, sealColor } = p;

                ctx.clearRect(0, 0, BASE_SIZE, BASE_SIZE);

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(p.globalRotation);
                ctx.translate(-cx, -cy);

                if (p.edgeBlur > 0) {
                    ctx.shadowColor = sealColor;
                    ctx.shadowBlur = p.edgeBlur * 3;
                }

                const outerRingRadius = radius - p.outerRingWidth / 2;
                ctx.beginPath();
                ctx.arc(cx, cy, outerRingRadius, 0, Math.PI * 2);
                ctx.strokeStyle = sealColor;
                ctx.lineWidth = p.outerRingWidth;
                ctx.stroke();

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;

                if (p.innerRingWidth > 0.3) {
                    const innerRingRadius = radius - p.innerRingOffset;
                    ctx.beginPath();
                    ctx.arc(cx, cy, innerRingRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = sealColor;
                    ctx.lineWidth = p.innerRingWidth;
                    ctx.stroke();
                }

                if (p.topText) {
                    const topStartAngle = -Math.PI / 2 + p.topTextSpan / 2 + p.topTextOffset;
                    drawArcText(p.topText, cx, cy, p.topTextRadius, topStartAngle, p.topTextSpan,
                        p.topFontSize, p.topFontFamily, p.topTextBold, p.topLetterSpacing, sealColor, true,
                        p.topTextDirection);
                }

                if (p.bottomText) {
                    const bottomStartAngle = Math.PI / 2 - p.bottomTextSpan / 2 + p.bottomTextOffset;
                    drawArcText(p.bottomText, cx, cy, p.bottomTextRadius, bottomStartAngle, p.bottomTextSpan,
                        p.bottomFontSize, p.bottomFontFamily, p.bottomTextBold, p.bottomLetterSpacing, sealColor,
                        false, p.bottomTextDirection);
                }

                if (p.showStar && p.starSize > 0) {
                    const starOuterR = p.starSize / 2;
                    const starInnerR = starOuterR * p.starInnerRatio;
                    drawStar(cx, cy, starOuterR, starInnerR, p.starRotation, sealColor);
                }

                if (p.centerText) {
                    const fontWeight = p.centerTextBold ? 'bold ' : '';
                    ctx.font = `${fontWeight}${p.centerFontSize}px ${p.centerFontFamily}`;
                    ctx.fillStyle = sealColor;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.centerText, cx, cy + p.centerTextOffsetY);
                }

                if (p.serialNumber) {
                    ctx.font = `${p.serialFontSize}px SimSun, serif`;
                    ctx.fillStyle = sealColor;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.serialNumber, cx, cy + p.serialOffsetY);
                }

                ctx.restore();

                // 做旧效果 - 传入五角星参数确保同步做旧
                if (p.distressLevel > 0) {
                    applyDistress(ctx, cx, cy, radius, p.distressLevel, sealColor, p.showStar, p.starSize);
                }
            }

            // ============ 更新显示值 ============
            function updateValSpans() {
                const p = getParams();
                valSpans.sealDiameter.textContent = Math.round(p.diameter);
                valSpans.outerRingWidth.textContent = p.outerRingWidth;
                valSpans.innerRingWidth.textContent = p.innerRingWidth;
                valSpans.innerRingOffset.textContent = p.innerRingOffset;
                valSpans.globalRotation.textContent = parseFloat(controls.globalRotation.value) + '°';
                valSpans.distressLevel.textContent = p.distressLevel;
                valSpans.edgeBlur.textContent = p.edgeBlur;
                valSpans.topFontSize.textContent = p.topFontSize;
                valSpans.topTextRadius.textContent = Math.round(p.topTextRadius);
                valSpans.topTextSpan.textContent = Math.round(parseFloat(controls.topTextSpan.value)) + '°';
                valSpans.topTextOffset.textContent = parseFloat(controls.topTextOffset.value) + '°';
                valSpans.topLetterSpacing.textContent = p.topLetterSpacing;
                valSpans.bottomFontSize.textContent = p.bottomFontSize;
                valSpans.bottomTextRadius.textContent = Math.round(p.bottomTextRadius);
                valSpans.bottomTextSpan.textContent = Math.round(parseFloat(controls.bottomTextSpan.value)) + '°';
                valSpans.bottomTextOffset.textContent = parseFloat(controls.bottomTextOffset.value) + '°';
                valSpans.bottomLetterSpacing.textContent = p.bottomLetterSpacing;
                valSpans.starSize.textContent = Math.round(p.starSize);
                valSpans.starRotation.textContent = parseFloat(controls.starRotation.value) + '°';
                valSpans.starInnerRatio.textContent = Math.round(p.starInnerRatio * 100) + '%';
                valSpans.centerFontSize.textContent = p.centerFontSize;
                valSpans.centerTextOffsetY.textContent = Math.round(p.centerTextOffsetY);
                valSpans.serialFontSize.textContent = p.serialFontSize;
                valSpans.serialOffsetY.textContent = Math.round(p.serialOffsetY);
                valSpans.sealColor.textContent = p.sealColor.toUpperCase();
            }

            // ============ 事件监听 ============
            function bindControl(id, callback) {
                const el = controls[id];
                if (!el) return;
                el.addEventListener('input', () => {
                    callback();
                    updateValSpans();
                    drawSeal();
                });
                el.addEventListener('change', () => {
                    callback();
                    updateValSpans();
                    drawSeal();
                });
            }

            Object.keys(controls).forEach(id => {
                if (id === 'sealColor') {
                    controls[id].addEventListener('input', () => {
                        updateValSpans();
                        drawSeal();
                    });
                } else if (['topTextBold', 'bottomTextBold', 'centerTextBold', 'showStar'].includes(id)) {

            function downloadSeal(scale) {
                const p = getParams();
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = BASE_SIZE;
                tempCanvas.height = BASE_SIZE;
                const tempCtx = tempCanvas.getContext('2d');

                drawSealToContext(tempCtx, p);

                const exportSize = BASE_SIZE * scale;
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = exportSize;
                exportCanvas.height = exportSize;
                const exportCtx = exportCanvas.getContext('2d');
                exportCtx.scale(scale, scale);
                exportCtx.drawImage(tempCanvas, 0, 0);

                exportCanvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const filename = `电子印章_${p.topText || 'seal'}_${Date.now()}.png`;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('✅ 印章已下载: ' + filename);
                }, 'image/png');
            }

            function drawSealToContext(targetCtx, p) {
                const { cx, cy, radius, sealColor } = p;
                targetCtx.clearRect(0, 0, BASE_SIZE, BASE_SIZE);

                targetCtx.save();
                targetCtx.translate(cx, cy);
                targetCtx.rotate(p.globalRotation);
                targetCtx.translate(-cx, -cy);

                if (p.edgeBlur > 0) {
                    targetCtx.shadowColor = sealColor;
                    targetCtx.shadowBlur = p.edgeBlur * 3;
                }

                const outerRingRadius = radius - p.outerRingWidth / 2;
                targetCtx.beginPath();
                targetCtx.arc(cx, cy, outerRingRadius, 0, Math.PI * 2);
                targetCtx.strokeStyle = sealColor;
                targetCtx.lineWidth = p.outerRingWidth;
                targetCtx.stroke();
                targetCtx.shadowColor = 'transparent';
                targetCtx.shadowBlur = 0;

                if (p.innerRingWidth > 0.3) {
                    const innerRingRadius = radius - p.innerRingOffset;
                    targetCtx.beginPath();
                    targetCtx.arc(cx, cy, innerRingRadius, 0, Math.PI * 2);
                    targetCtx.strokeStyle = sealColor;
                    targetCtx.lineWidth = p.innerRingWidth;
                    targetCtx.stroke();
                }

                if (p.topText) {
                    const topStartAngle = -Math.PI / 2 + p.topTextSpan / 2 + p.topTextOffset;
                    drawArcTextToCtx(targetCtx, p.topText, cx, cy, p.topTextRadius, topStartAngle, p.topTextSpan,
                        p.topFontSize, p.topFontFamily, p.topTextBold, p.topLetterSpacing, sealColor, true,
                        p.topTextDirection);
                }

                if (p.bottomText) {
                    const bottomStartAngle = Math.PI / 2 - p.bottomTextSpan / 2 + p.bottomTextOffset;
                    drawArcTextToCtx(targetCtx, p.bottomText, cx, cy, p.bottomTextRadius, bottomStartAngle, p
                        .bottomTextSpan,
                        p.bottomFontSize, p.bottomFontFamily, p.bottomTextBold, p.bottomLetterSpacing, sealColor,
                        false, p.bottomTextDirection);
                }

                if (p.showStar && p.starSize > 0) {
                    const starOuterR = p.starSize / 2;
                    const starInnerR = starOuterR * p.starInnerRatio;
                    drawStarToCtx(targetCtx, cx, cy, starOuterR, starInnerR, p.starRotation, sealColor);
                }

                if (p.centerText) {
                    const fontWeight = p.centerTextBold ? 'bold ' : '';
                    targetCtx.font = `${fontWeight}${p.centerFontSize}px ${p.centerFontFamily}`;
                    targetCtx.fillStyle = sealColor;
                    targetCtx.textAlign = 'center';
                    targetCtx.textBaseline = 'middle';
                    targetCtx.fillText(p.centerText, cx, cy + p.centerTextOffsetY);
                }

                if (p.serialNumber) {
                    targetCtx.font = `${p.serialFontSize}px SimSun, serif`;
                    targetCtx.fillStyle = sealColor;
                    targetCtx.textAlign = 'center';
                    targetCtx.textBaseline = 'middle';
                    targetCtx.fillText(p.serialNumber, cx, cy + p.serialOffsetY);
                }

                targetCtx.restore();

                // 做旧效果 - 传入五角星参数确保同步做旧
                if (p.distressLevel > 0) {
                    applyDistress(targetCtx, cx, cy, radius, p.distressLevel, sealColor, p.showStar, p.starSize);
                }
            }

            function drawArcTextToCtx(targetCtx, text, cx, cy, radius, startAngle, spanAngle, fontSize, fontFamily,
                isBold, letterSpacing, color, isTop, direction) {
                if (!text || text.length === 0) return;
                const chars = [...text];
                if (chars.length === 0) return;
                const charCount = chars.length;
                const anglePerChar = charCount > 1 ? spanAngle / (charCount - 1) : 0;
                const totalUsedSpan = charCount > 1 ? anglePerChar * (charCount - 1) : 0;
                const startOffset = (spanAngle - totalUsedSpan) / 2;
                const fontWeight = isBold ? 'bold ' : '';
                targetCtx.font = `${fontWeight}${fontSize}px ${fontFamily}`;
                targetCtx.fillStyle = color;
                targetCtx.textAlign = 'center';
                targetCtx.textBaseline = 'middle';

                const isRTL = (direction === 'rtl');

                for (let i = 0; i < charCount; i++) {
                    const charIndex = isRTL ? (charCount - 1 - i) : i;
                    let angle;
                    if (isTop) {
                        angle = startAngle - startOffset - i * anglePerChar;
                    } else {
                        angle = startAngle + startOffset + i * anglePerChar;
                    }
                    const charX = cx + radius * Math.cos(angle);
                    const charY = cy + radius * Math.sin(angle);
                    targetCtx.save();
                    targetCtx.translate(charX, charY);
                    if (isTop) {
                        targetCtx.rotate(angle + Math.PI / 2);
                    } else {
                        targetCtx.rotate(angle - Math.PI / 2);
                    }
                    const spacingOffset = letterSpacing * (i - (charCount - 1) / 2) * 0.3;
                    targetCtx.fillText(chars[charIndex], 0, spacingOffset);
                    targetCtx.restore();
                }
            }

            function drawStarToCtx(targetCtx, cx, cy, outerR, innerR, rotation, color) {
                const points = 10;
                const angleStep = Math.PI / 5;
                targetCtx.beginPath();
                for (let i = 0; i < points; i++) {
                    const angle = rotation - Math.PI / 2 + i * angleStep;
                    const r = i % 2 === 0 ? outerR : innerR;
                    const x = cx + r * Math.cos(angle);
                    const y = cy + r * Math.sin(angle);
                    if (i === 0) targetCtx.moveTo(x, y);
                    else targetCtx.lineTo(x, y);
                }
                targetCtx.closePath();
                targetCtx.fillStyle = color;
                targetCtx.fill();
            }

            function applyPreset(name) {
                const preset = presets[name];
                if (!preset) return;

                Object.keys(preset).forEach(key => {
                    const el = controls[key];
                    if (!el) return;
                    if (el.type === 'checkbox') {
                        el.checked = preset[key];
                    } else {
                        el.value = preset[key];
                    }
                });
                document.querySelectorAll('.preset-chip').forEach(chip => {
                    chip.classList.toggle('active', chip.dataset.preset === name);
                });
            }
