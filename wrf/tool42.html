<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证书制作工具 · 奖状/荣誉/聘书/获奖/培训证书</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f2f5;
            --panel-bg: #ffffff;
            --text: #1a1a2e;
            --border: #e0e0e0;
            --primary: #c41e3a;
            --blue: #1a5276;
            --gold: #b8860b;
            --green: #1e7a5e;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --font-serif: 'STSong','Songti SC','Noto Serif SC','SimSun','宋体',serif;
            --font-kai: 'STKaiti','Kaiti SC','KaiTi','楷体',serif;
            --font-hei: 'STHeiti','Heiti SC','SimHei','黑体','Microsoft YaHei',sans-serif;
            --font-xingkai: 'STXingkai','Xingkai SC','华文行楷','KaiTi',serif;
            --font-source-han: 'Noto Sans SC','Source Han Sans SC','思源黑体','Microsoft YaHei',sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
        }
        .app-header {
            background: var(--panel-bg); border-bottom:1px solid var(--border); padding:0 20px; height:56px;
            display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow);
            position:sticky; top:0; z-index:100; gap:16px;
        }
        .app-header .logo { display:flex; align-items:center; gap:10px; font-size:1.2em; font-weight:700; color:var(--primary); }
        .app-header .logo .icon { width:36px; height:36px; background:linear-gradient(135deg,#c41e3a,#e74c3c); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.3em; }
        .header-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .btn {
            padding:9px 16px; border:none; border-radius:var(--radius-sm); cursor:pointer; font-size:0.9em; font-weight:600;
            transition:all var(--transition); display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
        }
        .btn:active { transform:scale(0.96); }
        .btn-primary { background:var(--primary); color:#fff; } .btn-primary:hover { background:#a01830; }
        .btn-blue { background:#2980b9; color:#fff; } .btn-blue:hover { background:#1f6da0; }
        .btn-gold { background:#b8860b; color:#fff; } .btn-gold:hover { background:#9a7008; }
        .btn-outline { background:#fff; color:var(--text); border:2px solid var(--border); } .btn-outline:hover { border-color:#aaa; background:#fafafa; }
        .btn-sm { padding:6px 12px; font-size:0.82em; border-radius:6px; }
        .btn-xs { padding:4px 10px; font-size:0.75em; border-radius:5px; }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }

        .main-container { display:flex; gap:20px; padding:20px; max-width:1600px; margin:0 auto; min-height:calc(100vh - 56px); align-items:flex-start; }
        .edit-panel {
            flex:0 0 390px; background:var(--panel-bg); border-radius:var(--radius); box-shadow:var(--shadow);
            padding:20px 18px; display:flex; flex-direction:column; gap:16px; position:sticky; top:76px;
            max-height:calc(100vh - 96px); overflow-y:auto; border:1px solid var(--border);
        }
        .edit-panel::-webkit-scrollbar { width:5px; } .edit-panel::-webkit-scrollbar-thumb { background:#ccc; border-radius:10px; }
        .panel-section { border-bottom:1px solid #f0f0f0; padding-bottom:14px; }
        .panel-section:last-child { border-bottom:none; padding-bottom:0; }
        .panel-section h3 { font-size:0.95em; font-weight:700; margin-bottom:10px; color:#333; display:flex; align-items:center; gap:6px; }
        .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .dot-red { background:#c41e3a; } .dot-blue { background:#2980b9; } .dot-gold { background:#b8860b; } .dot-green { background:#27ae60; } .dot-teal { background:#1e7a5e; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:0.82em; font-weight:600; color:#555; margin-bottom:4px; }
        .form-group input, .form-group textarea, .form-group select {
            width:100%; padding:9px 12px; border:2px solid #e8e8e8; border-radius:var(--radius-sm); font-size:0.9em;
            background:#fafafa; font-family:inherit; resize:vertical; color:#333; transition:all var(--transition);
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline:none; border-color:var(--primary); background:#fff; }
        .form-group textarea { min-height:50px; font-size:0.85em; }
        .form-row { display:flex; gap:8px; } .form-row .form-group { flex:1; }
        .color-input-wrap { display:flex; align-items:center; gap:8px; }
        .color-input-wrap input[type="color"] { width:38px; height:38px; border:2px solid #e0e0e0; border-radius:50%; cursor:pointer; padding:2px; }
        input[type="range"] { width:100%; margin:4px 0; }
        .range-label { display:flex; justify-content:space-between; font-size:0.75em; color:#888; }

        .template-btns { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
        .template-btn {
            padding:10px 6px; border:2px solid #e8e8e8; border-radius:var(--radius-sm); cursor:pointer; text-align:center;
            font-weight:600; font-size:0.8em; background:#fafafa; transition:all var(--transition);
        }
        .template-btn:hover { border-color:#bbb; background:#f5f5f5; transform:translateY(-1px); }
        .template-btn.active { border-color:var(--primary); background:#fff5f5; color:var(--primary); }
        .template-btn.t-blue.active { border-color:#2980b9; background:#f5f9fd; color:#2980b9; }
        .template-btn.t-gold.active { border-color:#b8860b; background:#fffdf5; color:#b8860b; }
        .template-btn.t-dark.active { border-color:#2c3e50; background:#f8f9fa; color:#2c3e50; }
        .template-btn.t-teal.active { border-color:#1e7a5e; background:#f5fdf9; color:#1e7a5e; }

        .preview-area { flex:1; display:flex; flex-direction:column; align-items:center; gap:12px; min-width:0; }
        .certificate-wrapper { background:#fff; box-shadow:var(--shadow-lg); border-radius:4px; display:inline-block; transition:all var(--transition); margin:0 auto; }
        .certificate {
            position:relative; overflow:hidden; font-family:var(--font-serif); background:#fffdf7;
            display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
            padding:50px 60px; box-sizing:border-box; user-select:none; width:700px; height:990px; font-size:20px;
        }
        .cert-bg-img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0; pointer-events:none; }
        .cert-content { position:relative; z-index:1; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }

        .cert-template-1 { background:linear-gradient(180deg,#fffef9,#fffdf4,#fffef8,#fffdf3); border:8px solid #8b1a1a; outline:3px solid #c41e3a; outline-offset:-18px; box-shadow:inset 0 0 0 4px #d4a853,inset 0 0 0 7px #8b1a1a,inset 0 0 0 11px #d4a853; }
        .cert-template-2 { background:linear-gradient(180deg,#f8fbff,#f0f5fc,#f8fbff,#f0f5fc); border:6px solid #1a3c5e; outline:2px solid #2980b9; outline-offset:-14px; box-shadow:inset 0 0 0 3px #5b9bd5,inset 0 0 0 6px #1a3c5e,inset 0 0 0 9px #5b9bd5; }
        .cert-template-3 { background:linear-gradient(180deg,#fffdf8,#fdf8f0,#fffdf8,#fdf8f0); border:10px solid #5c1010; outline:3px solid #8b1a1a; outline-offset:-22px; box-shadow:inset 0 0 0 5px #c9a050,inset 0 0 0 8px #5c1010,inset 0 0 0 13px #c9a050; }
        .cert-template-4 { background:linear-gradient(180deg,#fffefa,#fffef5,#fffefa,#fffef5); border:5px solid #8b6914; outline:4px solid #d4a853; outline-offset:-12px; box-shadow:inset 0 0 0 2px #8b6914,inset 0 0 0 6px #d4a853,inset 0 0 0 8px #8b6914; }
        .cert-template-5 { background:linear-gradient(180deg,#f8fdf9,#f0f8f2,#f8fdf9,#f0f8f2); border:7px solid #1e5a4a; outline:2px solid #1e7a5e; outline-offset:-16px; box-shadow:inset 0 0 0 3px #8fbc8f,inset 0 0 0 6px #1e5a4a,inset 0 0 0 9px #8fbc8f; }

        .cert-title { font-size:2.8em; font-weight:bold; letter-spacing:0.15em; margin-bottom:8px; }
        .cert-subtitle { font-size:1em; letter-spacing:0.2em; margin-bottom:25px; opacity:0.8; }
        .cert-body { font-size:1.15em; line-height:2; letter-spacing:0.05em; max-width:85%; }
        .cert-name { font-size:1.8em; font-weight:bold; padding:4px 20px; border-bottom:2px solid; display:inline-block; margin:8px 0; }
        .cert-footer { margin-top:30px; font-size:0.9em; letter-spacing:0.05em; transition:all 0.3s; }
        .cert-seal { position:absolute; bottom:60px; right:80px; transition:all 0.3s; }
        .seal-svg { width:100px; height:100px; opacity:0.85; }
        .cert-stars { position:absolute; top:35px; width:100%; text-align:center; opacity:0.5; font-size:1.4em; letter-spacing:0.3em; color:#d4a853; }
        .cert-decor-left, .cert-decor-right { position:absolute; top:50%; transform:translateY(-50%); opacity:0.25; }
        .cert-decor-left { left:25px; } .cert-decor-right { right:25px; }
        .cert-decor-svg { width:50px; height:120px; }

        .progress-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
        .progress-card { background:#fff; border-radius:16px; padding:30px 40px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.3); min-width:320px; }
        .progress-bar-wrap { background:#e8e8e8; border-radius:20px; height:14px; overflow:hidden; margin:12px 0; }
        .progress-bar-fill { height:100%; background:linear-gradient(90deg,#c41e3a,#e74c3c); border-radius:20px; transition:width 0.3s; width:0%; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 24px; border-radius:30px; z-index:10000; font-weight:600; font-size:0.9em; animation:toastIn 0.4s, toastOut 0.4s 2.5s forwards; }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-30px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-20px);} }
        @media print { body * { visibility:hidden; } .certificate, .certificate * { visibility:visible; } .certificate { position:fixed; top:0; left:0; width:100%; height:100%; margin:0; box-shadow:none; } }
        @media(max-width:1200px) {
            .main-container { flex-direction:column; align-items:center; }
            .edit-panel { flex:auto; width:100%; max-width:700px; position:static; max-height:none; }
            .certificate { width:90vw !important; height:auto !important; aspect-ratio:7/9.9; }
        }
    </style>
</head>
<body>
<header class="app-header">
    <div class="logo"><span class="icon">🏅</span><span>证书制作工具</span></div>
    <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="toggleBatchPanel()">📋 批量名单</button>
        <button class="btn btn-outline btn-sm" onclick="resetAll()">🔄 重置</button>
        <button class="btn btn-blue btn-sm" onclick="exportCurrentPDF()">📄 导出PDF</button>
        <button class="btn btn-gold btn-sm" onclick="exportCurrentImage()">🖼️ 导出图片</button>
    </div>
</header>

<div class="main-container">
    <aside class="edit-panel">
        <div class="panel-section">
            <h3><span class="dot dot-red"></span> 证书模板</h3>
            <div class="template-btns">
                <button class="template-btn active" onclick="switchTemplate(1,this)">🏆 经典奖状</button>
                <button class="template-btn t-blue" onclick="switchTemplate(2,this)">🎖️ 荣誉证书</button>
                <button class="template-btn t-dark" onclick="switchTemplate(3,this)">📜 正式聘书</button>
                <button class="template-btn t-gold" onclick="switchTemplate(4,this)">🌟 获奖证书</button>
                <button class="template-btn t-teal" onclick="switchTemplate(5,this)">📘 培训证书</button>
            </div>
        </div>
        <div class="panel-section">
            <h3><span class="dot dot-blue"></span> 文本内容</h3>
            <div class="form-group"><label>🏷️ 标题</label><input type="text" id="certTitle" value="奖 状" oninput="updatePreview()"></div>
            <div class="form-group"><label>📝 副标题</label><input type="text" id="certSubtitle" value="特发此状，以资鼓励" oninput="updatePreview()"></div>
            <div class="form-group"><label>👤 被授予人姓名</label><input type="text" id="certName" value="张三" oninput="updatePreview()"></div>
            <div class="form-group"><label>📃 正文内容</label><textarea id="certBody" rows="3" oninput="updatePreview()">在2024年度工作中表现优异，成绩突出，被评为优秀员工。</textarea></div>
            <div class="form-row">
                <div class="form-group"><label>🏢 颁发单位</label><input type="text" id="certUnit" value="某某单位" oninput="updatePreview()"></div>
                <div class="form-group"><label>📅 日期</label><input type="text" id="certDate" value="2024年12月" oninput="updatePreview()"></div>
            </div>
            <div class="form-group"><label>🔢 证书编号</label><input type="text" id="certNumber" value="NO.20240001" oninput="updatePreview()"></div>
        </div>
        <div class="panel-section">
            <h3><span class="dot dot-gold"></span> 样式设置</h3>
            <div class="form-group"><label>🎨 标题颜色</label><div class="color-input-wrap"><input type="color" id="titleColor" value="#c41e3a" oninput="updatePreview()"><input type="text" id="titleColorText" value="#c41e3a" oninput="syncColor('titleColor',this.value);updatePreview();"></div></div>
            <div class="form-group"><label>✍️ 姓名字体</label><select id="nameFont" onchange="updatePreview()"><option value="var(--font-xingkai)">行楷</option><option value="var(--font-kai)">楷体</option><option value="var(--font-serif)">宋体</option><option value="var(--font-hei)">黑体</option><option value="var(--font-source-han)">思源黑体</option></select></div>
            <div class="form-group"><label>🔤 全局字体大小</label><input type="range" id="globalFontSize" min="12" max="36" value="20" step="1" oninput="updatePreview()"><span id="fontSizeValue" style="font-size:0.8em;">20px</span></div>
            <div class="form-group"><label>🔲 显示印章</label><select id="showSeal" onchange="updatePreview()"><option value="1">显示</option><option value="0">隐藏</option></select></div>
            <div class="form-group"><label>🖼️ 背景纹理</label><select id="bgTexture" onchange="updatePreview()"><option value="default">默认纹理</option><option value="clean">纯净白色</option><option value="warm">暖黄底色</option></select></div>
            <div class="form-group"><label>🖼️ 自定义背景图片</label><input type="file" id="bgImageInput" accept="image/*" onchange="handleBgImageUpload(event)"><button class="btn btn-xs btn-outline" style="margin-top:4px;" onclick="clearBgImage()">清除背景图片</button></div>
            <div class="form-group"><label>📐 纸张方向</label><select id="pageOrientation" onchange="updatePreview()"><option value="portrait">纵向 (A4)</option><option value="landscape">横向 (A4)</option></select></div>
            <div class="form-group"><label>📍 底部信息位置</label><select id="footerPosition" onchange="updatePreview()"><option value="center">居中</option><option value="right">右下角</option></select></div>
            <div class="form-group"><label>↔️ 底部水平偏移</label><input type="range" id="footerOffsetX" min="-400" max="400" value="0" oninput="updatePreview()"><span class="range-label" id="footerOffsetXVal">0 px</span></div>
            <div class="form-group"><label>↕️ 底部垂直偏移</label><input type="range" id="footerOffsetY" min="-400" max="400" value="0" oninput="updatePreview()"><span class="range-label" id="footerOffsetYVal">0 px</span></div>
            <div class="form-group"><label>↔️ 印章水平偏移</label><input type="range" id="sealOffsetX" min="-400" max="400" value="0" oninput="updatePreview()"><span class="range-label" id="sealOffsetXVal">0 px</span></div>
            <div class="form-group"><label>↕️ 印章垂直偏移</label><input type="range" id="sealOffsetY" min="-400" max="400" value="0" oninput="updatePreview()"><span class="range-label" id="sealOffsetYVal">0 px</span></div>
            <div class="form-group"><label>⭐ 显示五角星</label><select id="showStars" onchange="updatePreview()"><option value="1">显示</option><option value="0">隐藏</option></select></div>
            <div class="form-group"><label>🔘 显示两侧椭圆装饰</label><select id="showDecor" onchange="updatePreview()"><option value="1">显示</option><option value="0">隐藏</option></select></div>
        </div>
        <div class="panel-section" id="batchSectionInline" style="display:none;">
            <h3><span class="dot dot-green"></span> 📋 批量名单</h3>
            <div class="form-group"><label>每行一个姓名</label><textarea id="batchNames" rows="5" placeholder="张三&#10;李四&#10;王五" oninput="updateBatchCount()"></textarea><div class="batch-info" id="batchCountInfo">已输入 0 个姓名</div></div>
            <div class="batch-actions">
                <button class="btn btn-sm btn-primary" onclick="batchExportImages()">📦 批量图片(ZIP)</button>
                <button class="btn btn-sm btn-blue" onclick="batchExportPDF()">📄 批量PDF(合并)</button>
                <button class="btn btn-sm btn-outline" onclick="clearBatchNames()">清空名单</button>
            </div>
        </div>
    </aside>

    <div class="preview-area">
        <div class="preview-toolbar">
            <span class="preview-label">📐 预览</span>
            <button class="btn btn-xs btn-outline" onclick="zoomPreview(1.1)">🔍+</button>
            <button class="btn btn-xs btn-outline" onclick="zoomPreview(0.9)">🔍-</button>
            <button class="btn btn-xs btn-outline" onclick="zoomPreview(0)">↺ 重置</button>
        </div>
        <div class="certificate-wrapper" id="certificateWrapper">
            <div class="certificate cert-template-1" id="certificate">
                <img class="cert-bg-img" id="certBgImg" style="display:none;" alt="">
                <div class="cert-content">
                    <div class="cert-stars" id="certStars">★ ★ ★ ★ ★</div>
                    <div class="cert-decor-left" id="certDecorLeft"><svg class="cert-decor-svg" viewBox="0 0 50 120"><ellipse cx="25" cy="30" rx="8" ry="14" fill="none" stroke="#d4a853" stroke-width="1.5"/><ellipse cx="25" cy="60" rx="8" ry="14" fill="none" stroke="#d4a853" stroke-width="1.5"/><ellipse cx="25" cy="90" rx="8" ry="14" fill="none" stroke="#d4a853" stroke-width="1.5"/></svg></div>
                    <div class="cert-decor-right" id="certDecorRight"><svg class="cert-decor-svg" viewBox="0 0 50 120"><ellipse cx="25" cy="30" rx="8" ry="14" fill="none" stroke="#d4a853" stroke-width="1.5"/><ellipse cx="25" cy="60" rx="8" ry="14" fill="none" stroke="#d4a853" stroke-width="1.5"/><ellipse cx="25" cy="90" rx="8" ry="14" fill="none" stroke="#d4a853" stroke-width="1.5"/></svg></div>
                    <div class="cert-title" id="previewTitle">奖 状</div>
                    <div class="cert-subtitle" id="previewSubtitle">特发此状，以资鼓励</div>
                    <div class="cert-body"><span>兹授予</span><span class="cert-name" id="previewName">张三</span><br><span id="previewBodySuffix">在2024年度工作中表现优异，成绩突出，被评为优秀员工。</span></div>
                    <div class="cert-footer" id="certFooter">
                        <div id="previewUnit" style="font-weight:bold;">某某单位</div>
                        <div id="previewDate" style="margin-top:4px;">2024年12月</div>
                        <div id="previewNumber" style="font-size:0.75em;color:#999;margin-top:3px;">NO.20240001</div>
                    </div>
                    <div class="cert-seal" id="certSealWrap">
                        <svg class="seal-svg" viewBox="0 0 200 200" id="sealSVG">
                            <circle cx="100" cy="100" r="88" fill="none" stroke="#c41e3a" stroke-width="5"/>
                            <circle cx="100" cy="100" r="80" fill="none" stroke="#c41e3a" stroke-width="1.5"/>
                            <path id="sealPath" d="M 28 100 A 72 72 0 1 1 172 100" fill="none"/>
                            <text fill="#c41e3a" font-size="17" font-weight="bold" font-family="SimHei"><textPath href="#sealPath" startOffset="50%" text-anchor="middle">某某单位</textPath></text>
                            <polygon points="100,62 107,84 131,84 112,97 119,118 100,106 81,118 88,97 69,84 93,84" fill="#c41e3a"/>
                            <text x="100" y="172" text-anchor="middle" fill="#c41e3a" font-size="13" font-weight="bold">专 用 章</text>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        <div class="preview-label">💡 支持批量导出 | Ctrl+S 导出PDF</div>
    </div>
</div>

<div id="toastContainer"></div>
<div class="progress-overlay" id="progressOverlay" style="display:none;">
    <div class="progress-card">
        <div style="font-size:2em;">⏳</div>
        <div class="progress-text" id="progressText">正在处理...</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBarFill"></div></div>
        <div id="progressDetail" style="font-size:0.8em;color:#888;"></div>
        <div id="progressTimeEstimate" style="font-size:0.75em;color:#aaa; margin-top:6px;"></div>
    </div>
</div>

<script>
    (function() {
        let currentTemplate = 1, previewZoom = 1, isProcessing = false, customBgImage = null;
        const certificate = document.getElementById('certificate');
        const certificateWrapper = document.getElementById('certificateWrapper');
        const certBgImg = document.getElementById('certBgImg');
        const certFooter = document.getElementById('certFooter');
        const certSealWrap = document.getElementById('certSealWrap');
        const sealSVG = document.getElementById('sealSVG');
        const progressOverlay = document.getElementById('progressOverlay');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressText = document.getElementById('progressText');
        const progressDetail = document.getElementById('progressDetail');
        const progressTimeEstimate = document.getElementById('progressTimeEstimate');
        const toastContainer = document.getElementById('toastContainer');
        const batchSectionInline = document.getElementById('batchSectionInline');
        const batchNamesTextarea = document.getElementById('batchNames');
        const batchCountInfo = document.getElementById('batchCountInfo');

        function showToast(msg, d=2800) {
            const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
            toastContainer.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();}, d+500);
        }
        function showProgress(t) {
            progressText.textContent=t; progressBarFill.style.width='0%'; progressDetail.textContent='';
            progressTimeEstimate.textContent=''; progressOverlay.style.display='flex';
        }
        function updateProgress(p, detail='', timeLeft='') {
            progressBarFill.style.width=Math.min(100,Math.max(0,p))+'%';
            if(detail) progressDetail.textContent = detail;
            if(timeLeft) progressTimeEstimate.textContent = '⏱️ 预计剩余时间：' + timeLeft;
        }
        function hideProgress() { progressOverlay.style.display='none'; progressBarFill.style.width='0%'; }

        function updateCertificateSize() {
            const orientation = document.getElementById('pageOrientation').value;
            certificate.style.width = orientation==='landscape' ? '990px' : '700px';
            certificate.style.height = orientation==='landscape' ? '700px' : '990px';
        }

        function updatePreview() {
            updateCertificateSize();
            const title = document.getElementById('certTitle').value || '奖 状';
            const subtitle = document.getElementById('certSubtitle').value || '';
            const name = document.getElementById('certName').value || '姓名';
            const body = document.getElementById('certBody').value || '';
            const unit = document.getElementById('certUnit').value || '';
            const date = document.getElementById('certDate').value || '';
            const number = document.getElementById('certNumber').value || '';
            const titleColor = document.getElementById('titleColor').value || '#c41e3a';
            const nameFont = document.getElementById('nameFont').value;
            const showSeal = document.getElementById('showSeal').value === '1';
            const globalFontSize = document.getElementById('globalFontSize').value + 'px';
            const footerPos = document.getElementById('footerPosition').value;
            const footerX = document.getElementById('footerOffsetX').value || 0;
            const footerY = document.getElementById('footerOffsetY').value || 0;
            const sealX = document.getElementById('sealOffsetX').value || 0;
            const sealY = document.getElementById('sealOffsetY').value || 0;
            const showStars = document.getElementById('showStars').value === '1';
            const showDecor = document.getElementById('showDecor').value === '1';

            certificate.style.fontSize = globalFontSize;
            document.getElementById('fontSizeValue').textContent = globalFontSize;
            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewTitle').style.color = titleColor;
            document.getElementById('previewSubtitle').textContent = subtitle;
            document.getElementById('previewSubtitle').style.color = titleColor;
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewName').style.fontFamily = nameFont;
            document.getElementById('previewName').style.color = titleColor;
            document.getElementById('previewBodySuffix').textContent = body;
            document.getElementById('previewUnit').textContent = unit;
            document.getElementById('previewDate').textContent = date;
            document.getElementById('previewNumber').textContent = number;
            certSealWrap.style.display = showSeal ? 'block' : 'none';
            updateSealColor(titleColor);
            updateSealText(unit);

            if (footerPos === 'right') {
                certFooter.style.textAlign = 'right';
                certFooter.style.alignSelf = 'flex-end';
            } else {
                certFooter.style.textAlign = 'center';
                certFooter.style.alignSelf = 'center';
            }
            certFooter.style.transform = `translate(${footerX}px, ${footerY}px)`;
            certSealWrap.style.transform = `translate(${sealX}px, ${sealY}px)`;

            document.getElementById('footerOffsetXVal').textContent = footerX + ' px';
            document.getElementById('footerOffsetYVal').textContent = footerY + ' px';
            document.getElementById('sealOffsetXVal').textContent = sealX + ' px';
            document.getElementById('sealOffsetYVal').textContent = sealY + ' px';

            document.getElementById('certStars').style.display = showStars ? 'block' : 'none';
            document.getElementById('certDecorLeft').style.display = showDecor ? 'block' : 'none';
            document.getElementById('certDecorRight').style.display = showDecor ? 'block' : 'none';

            if (customBgImage) { certBgImg.src = customBgImage; certBgImg.style.display='block'; }
            else { certBgImg.style.display='none'; }

            const texture = document.getElementById('bgTexture').value;
            if (!customBgImage) {
                certificate.style.background = texture==='clean' ? '#ffffff' : texture==='warm' ? 'linear-gradient(180deg,#fffef5,#fffdf0,#fffef5,#fffdf0)' : '';
            }
        }

        function updateSealColor(color) {
            sealSVG.querySelectorAll('circle').forEach(c=>{ if(c.getAttribute('stroke')) c.setAttribute('stroke',color); });
            sealSVG.querySelectorAll('text').forEach(t=>t.setAttribute('fill',color));
            const poly = sealSVG.querySelector('polygon'); if(poly) poly.setAttribute('fill',color);
        }
        function updateSealText(unit) {
            const tp = sealSVG.querySelector('textPath');
            if(tp) tp.textContent = unit || '某某单位';
        }

        function syncColor(id, hex) {
            if(/^#[0-9a-fA-F]{6}$/.test(hex)) document.getElementById(id).value = hex;
            if(id==='titleColor') document.getElementById('titleColorText').value = hex;
        }

        function switchTemplate(num, btn) {
            currentTemplate = num;
            document.querySelectorAll('.template-btn').forEach(b=>b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            certificate.className = 'certificate cert-template-'+num;
            const defaults = {
                1:{title:'奖 状',subtitle:'特发此状，以资鼓励',color:'#c41e3a'},
                2:{title:'荣誉证书',subtitle:'HONORARY CERTIFICATE',color:'#1a3c5e'},
                3:{title:'聘 书',subtitle:'兹聘请',color:'#5c1010'},
                4:{title:'获奖证书',subtitle:'AWARD CERTIFICATE',color:'#6b4c0a'},
                5:{title:'培训证书',subtitle:'TRAINING CERTIFICATE',color:'#1e5a4a'}
            };
            const d = defaults[num] || defaults[1];
            document.getElementById('certTitle').value = d.title;
            document.getElementById('certSubtitle').value = d.subtitle;
            document.getElementById('titleColor').value = d.color;
            document.getElementById('titleColorText').value = d.color;
            updatePreview();
            showToast('✅ 模板：'+d.title, 1500);
        }

        function zoomPreview(f) {
            if(f===0) previewZoom=1; else previewZoom=Math.max(0.3,Math.min(2.5, previewZoom*f));
            certificateWrapper.style.transform = `scale(${previewZoom})`;
            certificateWrapper.style.transformOrigin = 'top center';
        }

        function resetAll() {
            document.getElementById('certTitle').value='奖 状';
            document.getElementById('certSubtitle').value='特发此状，以资鼓励';
            document.getElementById('certName').value='张三';
            document.getElementById('certBody').value='在2024年度工作中表现优异，成绩突出，被评为优秀员工。';
            document.getElementById('certUnit').value='某某单位';
            document.getElementById('certDate').value='2024年12月';
            document.getElementById('certNumber').value='NO.20240001';
            document.getElementById('titleColor').value='#c41e3a';
            document.getElementById('titleColorText').value='#c41e3a';
            document.getElementById('nameFont').value='var(--font-xingkai)';
            document.getElementById('showSeal').value='1';
            document.getElementById('bgTexture').value='default';
            document.getElementById('globalFontSize').value='20';
            document.getElementById('pageOrientation').value='portrait';
            document.getElementById('footerPosition').value='center';
            ['footerOffsetX','footerOffsetY','sealOffsetX','sealOffsetY'].forEach(id=>document.getElementById(id).value='0');
            document.getElementById('showStars').value='1';
            document.getElementById('showDecor').value='1';
            clearBgImage();
            switchTemplate(1, document.querySelector('.template-btn'));
            previewZoom=1; certificateWrapper.style.transform='scale(1)';
            updatePreview();
            showToast('🔄 已恢复默认',2000);
        }

        function handleBgImageUpload(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => { customBgImage = ev.target.result; updatePreview(); showToast('🖼️ 背景已应用'); };
            reader.readAsDataURL(file);
        }
        function clearBgImage() { customBgImage=null; document.getElementById('bgImageInput').value=''; updatePreview(); }

        function toggleBatchPanel() {
            const show = batchSectionInline.style.display === 'block';
            batchSectionInline.style.display = show ? 'none' : 'block';
            if(!show) batchSectionInline.scrollIntoView({behavior:'smooth',block:'center'});
            updateBatchCount();
        }
        function updateBatchCount() {
            const names = getBatchNames(); batchCountInfo.textContent = '已输入 '+names.length+' 个姓名';
        }
        function getBatchNames() {
            const raw = batchNamesTextarea.value.trim(); if(!raw) return [];
            return raw.split(/[\n,;]+/).map(n=>n.trim()).filter(n=>n.length>0);
        }
        function clearBatchNames() { batchNamesTextarea.value=''; updateBatchCount(); }

        // 优化的截图函数：使用requestAnimationFrame确保渲染完成，并临时禁用过渡动画
        async function captureCertificate() {
            return new Promise((resolve, reject) => {
                requestAnimationFrame(async () => {
                    try {
                        const canvas = await html2canvas(certificate, {
                            scale: 2,
                            useCORS: true,
                            allowTaint: true,
                            backgroundColor: '#ffffff',
                            logging: false,
                            imageTimeout: 0,
                            removeContainer: true,
                            onclone: function(clonedDoc) {
                                const clonedCert = clonedDoc.getElementById('certificate');
                                if (clonedCert) {
                                    const computed = window.getComputedStyle(certificate);
                                    clonedCert.style.width = computed.width;
                                    clonedCert.style.height = computed.height;
                                    clonedCert.style.transform = 'none';
                                    clonedCert.style.transition = 'none';
                                    const wrapper = clonedDoc.getElementById('certificateWrapper');
                                    if (wrapper) wrapper.style.transform = 'none';
                                }
                            }
                        });
                        resolve(canvas);
                    } catch (e) { reject(e); }
                });
            });
        }

        // 通用导出进度模拟
        async function runWithProgress(task, totalSteps = 1) {
            let startTime = Date.now();
            let finished = false;
            const timer = setInterval(() => {
                if (finished) return;
                const elapsed = (Date.now() - startTime) / 1000;
                const estimatedTotal = totalSteps * 1.8;
                const progress = Math.min(95, Math.floor((elapsed / estimatedTotal) * 100));
                const remaining = Math.max(0, Math.ceil(estimatedTotal - elapsed));
                updateProgress(progress, `处理中...`, `${remaining} 秒`);
            }, 150);
            try {
                await task();
            } finally {
                finished = true;
                clearInterval(timer);
            }
        }

        async function exportCurrentImage() {
            if(isProcessing) return showToast('⚠️ 请等待');
            isProcessing = true;
            showProgress('生成图片中...');
            try {
                await runWithProgress(async () => {
                    const canvas = await captureCertificate();
                    const link = document.createElement('a');
                    link.download = (document.getElementById('certName').value||'证书')+'_证书.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    updateProgress(100, '完成！', '0 秒');
                    await new Promise(r => setTimeout(r, 300));
                }, 1);
                hideProgress();
                showToast('✅ 图片导出成功');
            } catch(e) {
                hideProgress();
                showToast('❌ 导出失败');
            }
            isProcessing = false;
        }

        async function exportCurrentPDF() {
            if(isProcessing) return showToast('⚠️ 请等待');
            isProcessing = true;
            showProgress('生成PDF中...');
            try {
                await runWithProgress(async () => {
                    const canvas = await captureCertificate();
                    const { jsPDF } = window.jspdf;
                    const orientation = document.getElementById('pageOrientation').value;
                    const pdf = new jsPDF(orientation==='landscape'?'landscape':'portrait', 'mm', 'a4');
                    pdf.addImage(canvas.toDataURL('image/jpeg',0.95), 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
                    pdf.save((document.getElementById('certName').value||'证书')+'_证书.pdf');
                    updateProgress(100, '完成！', '0 秒');
                    await new Promise(r => setTimeout(r, 300));
                }, 1);
                hideProgress();
                showToast('✅ PDF导出成功');
            } catch(e) {
                hideProgress();
                showToast('❌ 导出失败');
            }
            isProcessing = false;
        }

        async function batchExportImages() {
            if(isProcessing) return showToast('⚠️ 请等待');
            const names = getBatchNames();
            if(names.length===0){ showToast('⚠️ 请输入名单'); toggleBatchPanel(); return; }
            if(names.length>100){ showToast('⚠️ 上限100'); return; }
            isProcessing = true;
            showProgress('批量生成图片中...');
            const origName = document.getElementById('certName').value;
            const zip = new JSZip();
            let startTime = Date.now();
            try {
                for(let i=0; i<names.length; i++){
                    document.getElementById('certName').value = names[i];
                    updatePreview();
                    await new Promise(r => requestAnimationFrame(() => setTimeout(r, 250)));
                    const canvas = await captureCertificate();
                    zip.file(names[i]+'_证书.png', canvas.toDataURL('image/png').split(',')[1], {base64: true});
                    const elapsed = (Date.now() - startTime) / 1000;
                    const avg = elapsed / (i+1);
                    const remaining = Math.ceil(avg * (names.length - i - 1));
                    const progress = Math.round(((i+1) / names.length) * 100);
                    updateProgress(progress, `${i+1}/${names.length}`, `${remaining} 秒`);
                }
                const blob = await zip.generateAsync({type:'blob', compression:'DEFLATE'});
                saveAs(blob, '批量证书图片.zip');
                updateProgress(100, '完成！', '0 秒');
                await new Promise(r => setTimeout(r, 400));
                hideProgress();
                showToast('✅ 批量图片导出成功');
            } catch(e) {
                hideProgress();
                showToast('❌ 批量图片导出失败');
            }
            document.getElementById('certName').value = origName;
            updatePreview();
            isProcessing = false;
        }

        async function batchExportPDF() {
            if(isProcessing) return showToast('⚠️ 请等待');
            const names = getBatchNames();
            if(names.length===0){ showToast('⚠️ 请输入名单'); toggleBatchPanel(); return; }
            if(names.length>100){ showToast('⚠️ 上限100'); return; }
            isProcessing = true;
            showProgress('批量生成PDF中...');
            const origName = document.getElementById('certName').value;
            const { jsPDF } = window.jspdf;
            const orientation = document.getElementById('pageOrientation').value;
            const pdf = new jsPDF(orientation==='landscape'?'landscape':'portrait', 'mm', 'a4');
            const w = pdf.internal.pageSize.getWidth(), h = pdf.internal.pageSize.getHeight();
            let first = true;
            let startTime = Date.now();
            try {
                for(let i=0; i<names.length; i++){
                    document.getElementById('certName').value = names[i];
                    updatePreview();
                    await new Promise(r => requestAnimationFrame(() => setTimeout(r, 250)));
                    const canvas = await captureCertificate();
                    if(!first) pdf.addPage();
                    first = false;
                    pdf.addImage(canvas.toDataURL('image/jpeg',0.92), 'JPEG', 0,0,w,h);
                    const elapsed = (Date.now() - startTime) / 1000;
                    const avg = elapsed / (i+1);
                    const remaining = Math.ceil(avg * (names.length - i - 1));
                    const progress = Math.round(((i+1) / names.length) * 100);
                    updateProgress(progress, `${i+1}/${names.length}`, `${remaining} 秒`);
                }
                pdf.save('批量证书.pdf');
                updateProgress(100, '完成！', '0 秒');
                await new Promise(r => setTimeout(r, 400));
                hideProgress();
                showToast('✅ 批量PDF导出成功');
            } catch(e) {
                hideProgress();
                showToast('❌ 批量PDF导出失败');
            }
            document.getElementById('certName').value = origName;
            updatePreview();
            isProcessing = false;
        }

        // 绑定全局函数
        window.switchTemplate=switchTemplate; window.updatePreview=updatePreview; window.syncColor=syncColor;
        window.zoomPreview=zoomPreview; window.resetAll=resetAll; window.toggleBatchPanel=toggleBatchPanel;
        window.updateBatchCount=updateBatchCount; window.clearBatchNames=clearBatchNames;
        window.handleBgImageUpload=handleBgImageUpload; window.clearBgImage=clearBgImage;
        window.exportCurrentImage=exportCurrentImage; window.exportCurrentPDF=exportCurrentPDF;
        window.batchExportImages=batchExportImages; window.batchExportPDF=batchExportPDF;

        updatePreview();
        document.addEventListener('keydown', function(e) {
            if((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); exportCurrentPDF(); }
        });
    })();
</script>
</body>
</html>
