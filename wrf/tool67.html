<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星运阁 - 星座生肖运势查询</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --gold: #d4af37;
    --gold-light: #f4d03f;
    --gold-dark: #b8860b;
    --purple-deep: #0d001a;
    --purple-mid: #1a0a2e;
    --purple-light: #2d1b4e;
    --purple-glow: #6b3fa0;
    --white: #f0e6d6;
    --white-dim: rgba(240, 230, 214, 0.7);
    --glass: rgba(45, 27, 78, 0.5);
    --glass-border: rgba(212, 175, 55, 0.3);
  }
  
  body {
    font-family: 'Noto Serif SC', 'Songti SC', serif;
    background: var(--purple-deep);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  
  /* 星空背景 */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite;
  }
  
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  
  .shooting-star {
    position: absolute;
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.8), rgba(212,175,55,0.6));
    animation: shoot 3s ease-in-out infinite;
    opacity: 0;
  }
  
  @keyframes shoot {
    0% { transform: translateX(0) translateY(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateX(-300px) translateY(200px); opacity: 0; }
  }
  
  /* 主容器 */
  .app-container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }
  
  /* 导航 */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--glass-border);
  }
  
  .logo {
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    cursor: pointer;
    letter-spacing: 4px;
  }
  
  .nav-tabs {
    display: flex;
    gap: 10px;
  }
  
  .nav-tab {
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--white-dim);
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  
  .nav-tab:hover {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
  }
  
  .nav-tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--purple-deep);
    font-weight: bold;
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
  }
  
  /* 页面视图 */
  .view { display: none; animation: fadeIn 0.5s ease; }
  .view.active { display: block; }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* 首页 Hero */
  .hero-section {
    text-align: center;
    padding: 40px 0 60px;
  }
  
  .hero-title {
    font-size: 48px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 8px;
  }
  
  .hero-subtitle {
    color: var(--white-dim);
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  
  .today-date {
    display: inline-block;
    padding: 8px 20px;
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    color: var(--gold);
    font-size: 14px;
    margin-top: 10px;
  }
  
  /* 搜索区域 */
  .search-section {
    max-width: 600px;
    margin: 0 auto 50px;
    text-align: center;
  }
  
  .search-title {
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  
  .search-box {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .search-input {
    flex: 1;
    min-width: 200px;
    padding: 14px 24px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    color: var(--white);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }
  
  .search-input::placeholder {
    color: var(--white-dim);
  }
  
  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
  }
  
  .search-input::-webkit-calendar-picker-indicator {
    filter: invert(75%) sepia(50%) saturate(500%) hue-rotate(10deg);
    cursor: pointer;
  }
  
  .search-btn {
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    color: var(--purple-deep);
    border-radius: 30px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.3s ease;
    letter-spacing: 2px;
  }
  
  .search-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
  }
  
  .search-btn:active {
    transform: translateY(0);
  }
  
  /* 搜索结果 */
  .search-result {
    margin-top: 24px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 30px;
    backdrop-filter: blur(10px);
    display: none;
    animation: fadeIn 0.5s ease;
  }
  
  .search-result.show {
    display: block;
  }
  
  .search-result-header {
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  
  .search-result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  
  .result-card {
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .result-card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
  }
  
  .result-symbol {
    font-size: 48px;
    margin-bottom: 10px;
    display: block;
  }
  
  .result-name {
    font-size: 18px;
    color: var(--white);
    margin-bottom: 4px;
    font-weight: bold;
  }
  
  .result-desc {
    font-size: 12px;
    color: var(--white-dim);
  }
  
  .result-action {
    color: var(--gold);
    font-size: 13px;
    margin-top: 10px;
  }
  
  .search-hint {
    color: var(--white-dim);
    font-size: 13px;
    margin-top: 12px;
  }
  
  @media (max-width: 768px) {
    .search-result-grid {
      grid-template-columns: 1fr;
    }
  }
  
  /* Section 标题 */
  .section-title {
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: 2px;
  }
  
  .section-title::before {
    content: '✦';
    font-size: 16px;
  }
  
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--glass-border), transparent);
  }
  
  /* 星座选择网格 */
  .zodiac-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20px;
    margin-bottom: 60px;
  }
  
  .zodiac-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }
  
  .zodiac-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
    transition: left 0.5s;
  }
  
  .zodiac-card:hover::before { left: 100%; }
  
  .zodiac-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: var(--gold);
    box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
  }
  
  .zodiac-symbol {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
    filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
  }
  
  .zodiac-name {
    font-size: 16px;
    color: var(--white);
    margin-bottom: 4px;
    font-weight: bold;
  }
  
  .zodiac-date {
    font-size: 12px;
    color: var(--white-dim);
  }
  
  /* 生肖网格 */
  .zodiac-grid-chinese {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20px;
    margin-bottom: 60px;
  }
  
  .chinese-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(10px);
  }
  
  .chinese-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: var(--gold);
    box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
  }
  
  .chinese-symbol {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
  }
  
  .chinese-name {
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 4px;
    font-weight: bold;
    letter-spacing: 4px;
  }
  
  .chinese-element {
    font-size: 12px;
    color: var(--white-dim);
  }
  
  /* 今日运势速览 */
  .quick-fortune {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }
  
  .fortune-item {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  
  .fortune-icon {
    font-size: 32px;
    margin-bottom: 10px;
  }
  
  .fortune-label {
    font-size: 13px;
    color: var(--white-dim);
    margin-bottom: 8px;
  }
  
  .fortune-value {
    font-size: 20px;
    color: var(--gold);
    font-weight: bold;
  }
  
  /* 详情页头部 */
  .detail-header {
    display: flex;
    align-items: center;
    gap: 30px;
    padding: 30px 0;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--glass-border);
  }
  
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--white-dim);
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
    font-family: inherit;
    margin-bottom: 20px;
  }
  
  .back-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  
  .detail-symbol {
    font-size: 100px;
    filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
  }
  
  .detail-info h2 {
    font-size: 36px;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  
  .detail-info .subtitle {
    color: var(--white-dim);
    font-size: 14px;
    margin-bottom: 12px;
  }
  
  .detail-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  
  .meta-tag {
    padding: 4px 12px;
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--gold);
  }
  
  /* 时间切换 */
  .time-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .time-tab {
    padding: 12px 32px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--white-dim);
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  
  .time-tab:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  
  .time-tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--purple-deep);
    font-weight: bold;
    border-color: var(--gold);
  }
  
  /* 综合运势 */
  .overall-fortune {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 40px;
    backdrop-filter: blur(10px);
  }
  
  .circle-progress {
    width: 160px;
    height: 160px;
    flex-shrink: 0;
    position: relative;
  }
  
  .circle-progress svg {
    transform: rotate(-90deg);
  }
  
  .circle-bg {
    fill: none;
    stroke: rgba(212, 175, 55, 0.15);
    stroke-width: 10;
  }
  
  .circle-fill {
    fill: none;
    stroke: url(#goldGradient);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .circle-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  
  .circle-text .score {
    font-size: 40px;
    font-weight: bold;
    color: var(--gold);
  }
  
  .circle-text .label {
    font-size: 12px;
    color: var(--white-dim);
  }
  
  .stars {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  
  .star-icon {
    color: rgba(212, 175, 55, 0.2);
    font-size: 20px;
  }
  
  .star-icon.filled {
    color: var(--gold);
    text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
  }
  
  .overall-content {
    flex: 1;
  }
  
  .overall-content h3 {
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 16px;
  }
  
  .overall-desc {
    color: var(--white);
    line-height: 1.8;
    font-size: 15px;
  }
  
  /* 运势详情卡片 */
  .fortune-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .fortune-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }
  
  .fortune-card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
  }
  
  .fortune-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .fortune-card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    color: var(--white);
    font-weight: bold;
  }
  
  .fortune-card-icon {
    font-size: 24px;
  }
  
  .progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(212, 175, 55, 0.15);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    border-radius: 4px;
    width: 0;
    transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .fortune-card-text {
    font-size: 13px;
    color: var(--white-dim);
    line-height: 1.7;
  }
  
  /* 配对区域 */
  .pairing-section {
    margin-bottom: 30px;
  }
  
  .pairing-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  
  .pairing-item {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }
  
  .pairing-item:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
  }
  
  .pairing-symbols {
    font-size: 28px;
    margin-bottom: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  
  .pairing-name {
    font-size: 13px;
    color: var(--white);
    margin-bottom: 8px;
  }
  
  .pairing-score {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(212, 175, 55, 0.15);
    border-radius: 20px;
    font-size: 14px;
    color: var(--gold);
    font-weight: bold;
  }
  
  /* 配对详情弹窗 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(13, 0, 26, 0.9);
    z-index: 100;
    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(5px);
  }
  
  .modal-overlay.active {
    display: flex;
    animation: fadeIn 0.3s ease;
  }
  
  .modal-content {
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
    border: 1px solid var(--gold);
    border-radius: 20px;
    padding: 40px;
    max-width: 500px;
    width: 90%;
    position: relative;
    box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
    animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  
  .modal-close {
    position: absolute;
    top: 15px; right: 20px;
    background: none;
    border: none;
    color: var(--white-dim);
    font-size: 28px;
    cursor: pointer;
    transition: color 0.3s;
  }
  
  .modal-close:hover { color: var(--gold); }
  
  .modal-header {
    text-align: center;
    margin-bottom: 30px;
  }
  
  .modal-symbols {
    font-size: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  
  .modal-symbols .heart {
    color: #ff6b9d;
    font-size: 30px;
    animation: heartbeat 1.5s ease-in-out infinite;
  }
  
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  
  .modal-title {
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  
  .modal-score {
    display: inline-block;
    padding: 6px 20px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--purple-deep);
    border-radius: 20px;
    font-weight: bold;
    font-size: 16px;
  }
  
  .modal-section {
    margin-bottom: 20px;
  }
  
  .modal-section-title {
    font-size: 15px;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .modal-section-text {
    font-size: 14px;
    color: var(--white-dim);
    line-height: 1.8;
  }
  
  /* 宜忌 */
  .yi-ji {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .yi-ji-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
  }
  
  .yi-title {
    font-size: 18px;
    color: #4ade80;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .ji-title {

  for (let i = 0; i < 5; i++) {
    if (i < fullStars) {
      stars += '<span class="star-icon filled">★</span>';
    } else if (i === fullStars && halfStar) {
      stars += '<span class="star-icon filled" style="opacity:0.6">★</span>';
    } else {
      stars += '<span class="star-icon">★</span>';
    }
  }
  return stars;
}

// ==================== 星空背景 ====================
function createStarfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  
  const stars = [];
  const starCount = 200;
  
  for (let i = 0; i < starCount; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.02 + 0.01,
      phase: Math.random() * Math.PI * 2
    });
  }
  
  let shootingStars = [];
  
  function createShootingStar() {
    if (Math.random() < 0.005 && shootingStars.length < 3) {
      shootingStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.5,
        length: Math.random() * 80 + 50,
        speed: Math.random() * 5 + 8,
        opacity: 1
      });
    }
  }
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const gradient = ctx.createRadialGradient(
      canvas.width * 0.7, canvas.height * 0.3, 0,
      canvas.width * 0.7, canvas.height * 0.3, canvas.width * 0.5
    );
    gradient.addColorStop(0, 'rgba(107, 63, 160, 0.15)');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const gradient2 = ctx.createRadialGradient(
      canvas.width * 0.2, canvas.height * 0.7, 0,
      canvas.width * 0.2, canvas.height * 0.7, canvas.width * 0.4
    );
    gradient2.addColorStop(0, 'rgba(45, 27, 78, 0.3)');
    gradient2.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient2;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    stars.forEach(star => {
      star.phase += star.speed;
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(star.phase));
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fill();
      
      if (star.size > 1.5) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size * 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.2})`;
        ctx.fill();
      }
    });
    
    createShootingStar();
    shootingStars = shootingStars.filter(s => {
      s.x -= s.speed;
      s.y += s.speed * 0.7;
      s.opacity -= 0.02;
      
      if (s.opacity <= 0) return false;
      
      const grad = ctx.createLinearGradient(s.x, s.y, s.x + s.length, s.y - s.length * 0.7);
      grad.addColorStop(0, `rgba(255, 255, 255, 0)`);
      grad.addColorStop(0.5, `rgba(255, 255, 255, ${s.opacity * 0.8})`);
      grad.addColorStop(1, `rgba(212, 175, 55, ${s.opacity})`);
      
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + s.length, s.y - s.length * 0.7);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      return true;
    });
    
    requestAnimationFrame(animate);
  }
  
  animate();
}

function updateTodayDate() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const date = now.getDate();
  const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  const day = weekDays[now.getDay()];
  const lunarDays = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
    '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
    '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
  const lunarDay = lunarDays[(now.getDate() - 1) % 30];
  
  document.getElementById('today-date').textContent = 
    `${year}年${month}月${date}日 ${day} · 农历${lunarDay}`;
}

function showChinesePairing(idx1, idx2) {
  const zodiac1 = chineseZodiac[idx1];
  const zodiac2 = chineseZodiac[idx2];
  const score = chinesePairing[zodiac1.name][zodiac2.name];
  const level = getScoreLevel(score);
  const desc = zodiacPairingDesc[level];
  
  const levelText = { high: '天作之合', good: '非常般配', medium: '需要努力', low: '差异较大' };
  
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      <div class="modal-symbols">
        ${zodiac1.symbol} <span class="heart">❤</span> ${zodiac2.symbol}
      </div>
      <div class="modal-title">属${zodiac1.name} & 属${zodiac2.name}</div>
      <div class="modal-score">${score}% · ${levelText[level]}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">💕 配对解析</div>
      <div class="modal-section-text">${desc}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">💡 相处建议</div>
      <div class="modal-section-text">
        属${zodiac1.name}的${zodiac1.personality.split('，')[0]}和属${zodiac2.name}的${zodiac2.personality.split('，')[0]}在一起，
        需要互相学习对方的优点。属${zodiac1.name}五行属${zodiac1.element}，属${zodiac2.name}五行属${zodiac2.element}，
        ${zodiac1.element === zodiac2.element ? '五行相同，性格相近，容易产生共鸣。' : '五行互补，可以互相取长补短。'}
        只要真心相爱，任何困难都能克服。
      </div>
    </div>
  `;
  
  document.getElementById('pairing-modal').classList.add('active');
}

// ==================== 弹窗控制 ====================
function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('pairing-modal').classList.remove('active');
}

// ==================== 路由 ====================
function handleHashChange() {
  const hash = location.hash;
  
  if (hash.startsWith('#zodiac/')) {
    const index = parseInt(hash.split('/')[1]);
    currentZodiacIndex = index;
    showView('zodiac-detail');
    renderZodiacDetail();
  } else if (hash.startsWith('#chinese/')) {
    const index = parseInt(hash.split('/')[1]);
    currentChineseIndex = index;
    showView('chinese-detail');
    renderChineseDetail();
  } else {
    showView('home');
  }
}

function showView(viewName) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${viewName}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  location.hash = '';
}

// ==================== 启动 ====================
document.addEventListener('DOMContentLoaded', init);
</script>
