const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const catMap={};KB.categories.forEach(c=>catMap[c.id]=c);
let bookmarks=JSON.parse(localStorage.getItem('cfr_bm')||'[]');
function saveBM(){localStorage.setItem('cfr_bm',JSON.stringify(bookmarks));}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function hl(text,q){
  if(!q) return esc(text);
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}
function buildNav(filter=''){
  const nav=$('#nav'); nav.innerHTML='';
  KB.categories.forEach(c=>{
    const parts=KB.parts.filter(p=>p.category===c.id);
    if(!parts.length) return;
    const ch=document.createElement('div'); ch.className='cat-h';
    ch.innerHTML='<span class="cat-dot" style="background:'+c.color+'"></span>'+esc(c.name);
    nav.appendChild(ch);
    parts.forEach(p=>{
      const hay=(p.num+' '+p.title_cn+' '+p.tags.join(' ')).toLowerCase();
      if(filter && !hay.includes(filter.toLowerCase())) return;
      const d=document.createElement('div'); d.className='nav-item'; d.dataset.id=p.id;
      d.innerHTML='<div class="ni-top"><span class="num">'+esc(p.num)+'</span><span class="ttl">'+esc(p.title_cn)+'</span></div>';
      d.onclick=()=>{openPart(p.id); closeSidebar();};
      nav.appendChild(d);
    });
  });
}
function renderHome(){
  $('#crumb').textContent='总览';
  const v=$('#view');
  let cards='';
  KB.parts.forEach(p=>{
    cards+='<div class="card" data-id="'+p.id+'"><span class="c-num">'+esc(p.num)+'</span><div class="c-ttl">'+esc(p.title_cn)+'</div><div class="c-tags">'+p.tags.slice(0,3).map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div></div>';
  });
  v.innerHTML='<div class="hero"><h1>'+esc(KB.meta.title)+'</h1><div class="sub">'+esc(KB.meta.subtitle)+'</div><div class="src">📚 来源：'+esc(KB.meta.source)+'</div><div class="note">⚠ '+esc(KB.meta.note)+'</div></div><div class="cards">'+cards+'</div>';
  $$('.card',v).forEach(c=>c.onclick=()=>openPart(c.dataset.id));
}
function openPart(id){
  const p=KB.parts.find(x=>x.id===id); if(!p) return;
  $('#crumb').textContent=p.num+' · '+p.title_cn;
  const cat=catMap[p.category];
  const bm=bookmarks.includes(id);
  let toc='';
  const secs=[['overview','概述与范围'],['timeline','关键时限'],['sections','核心条款'],['defs','重要定义'],['related','关联法规']];
  toc=secs.map(([k,t])=>'<a href="#'+id+'-'+k+'">'+t+'</a>').join('');
  let secHtml='';
  let lastSub='__START__';
  p.sections.forEach((s,i)=>{
    const sub=(s.subpart||'');
    if(sub && sub!==lastSub){ secHtml+='<div class="subpart-h">'+esc(sub)+'</div>'; lastSub=sub; }
    secHtml+='<div class="sec" data-s="'+esc(s.num)+'"><div class="sec-head"><span class="snum">'+esc(s.num)+'</span><span>'+esc(s.title)+'</span><span class="arrow">▶</span></div><div class="sec-body">'+(s.summary?'<p class="muted">'+esc(s.summary)+'</p>':'')+'<p>'+esc(s.detail)+'</p></div></div>';
  });
  let defHtml='';
  p.definitions.forEach(d=>{defHtml+='<tr><th>'+esc(d.term)+'</th><td>'+esc(d.def)+'</td></tr>';});
  let tlHtml='';
  p.timelines.forEach(t=>{tlHtml+='<div class="tl-item"><div class="tl-when">'+esc(t.when)+'</div><div class="tl-what">'+esc(t.what)+'</div></div>';});
  let relHtml='';
  (p.related||[]).forEach(rid=>{const rp=KB.parts.find(x=>x.id===rid);if(rp)relHtml+='<span class="rel-chip" data-id="'+rid+'">'+esc(rp.num)+' · '+esc(rp.title_cn)+'</span>';});
  const v=$('#view');
  v.innerHTML=
    '<div class="part-head"><span class="ph-num">'+esc(p.num)+'</span><h2>'+esc(p.title_cn)+'</h2>'+
    '<div class="cat-badge"><span class="dot" style="background:'+cat.color+'"></span>'+esc(cat.name)+'</div></div>'+
    '<div class="toolrow"><button class="btn '+(bm?'on':'')+'" id="bmBtn">'+(bm?'★ 已收藏':'☆ 收藏')+'</button><button class="btn" onclick="window.print()">🖨 打印本页</button></div>'+
    '<div class="toc">'+toc+'</div>'+
    '<div class="block" id="'+id+'-overview"><h3><span class="ic">📌</span>概述与适用范围</h3><p>'+esc(p.overview)+'</p><p class="muted"><b>适用：</b>'+esc(p.applicability)+'</p></div>'+
    (tlHtml?'<div class="block" id="'+id+'-timeline"><h3><span class="ic">⏱</span>关键时限与节点</h3>'+tlHtml+'</div>':'')+
    '<div class="block" id="'+id+'-sections"><h3><span class="ic">📑</span>核心条款（§）</h3>'+secHtml+'</div>'+
    (defHtml?'<div class="block" id="'+id+'-defs"><h3><span class="ic">📖</span>重要定义</h3><table class="dl"><tbody>'+defHtml+'</tbody></table></div>':'')+
    (relHtml?'<div class="block" id="'+id+'-related"><h3><span class="ic">🔗</span>关联法规</h3><div class="rel-chips">'+relHtml+'</div></div>':'');
  $$('.sec',v).forEach(s=>s.querySelector('.sec-head').onclick=()=>s.classList.toggle('open'));
  $$('.rel-chip',v).forEach(c=>c.onclick=()=>openPart(c.dataset.id));
  const bmb=$('#bmBtn',v); if(bmb)bmb.onclick=()=>toggleBM(id);
  $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  v.scrollTop=0; window.scrollTo(0,0);
}
function toggleBM(id){
  const i=bookmarks.indexOf(id);
  if(i>=0)bookmarks.splice(i,1); else bookmarks.push(id);
  saveBM(); openPart(id);
}
function doSearch(q){
  q=q.trim();
  const cnt=$('#searchCount');
  if(!q){cnt.textContent='';$$('.nav-item').forEach(n=>n.style.display='');return;}
  let total=0;
  KB.parts.forEach(p=>{
    const blob=[p.num,p.title_cn,p.overview,p.applicability,
      ...p.sections.flatMap(s=>[s.num,s.title,s.summary,s.detail]),
      ...p.definitions.flatMap(d=>[d.term,d.def]),
      ...p.timelines.flatMap(t=>[t.when,t.what]),
      ...(p.related||[])].join(' ').toLowerCase();
    const hit=blob.includes(q.toLowerCase());
    total+=hit?1:0;
    const ni=$$('.nav-item').find(n=>n.dataset.id===p.id);
    if(ni) ni.style.display=hit?'':'none';
  });
  cnt.textContent='命中 '+total+' 部';
}
function showGlossary(){
  let h='<p class="muted" style="margin-bottom:8px">跨法规通用术语（点击关联法规可跳转）。</p>';
  KB.glossary.forEach(g=>{
    h+='<div class="glos-term">'+esc(g.term)+'</div><div class="glos-def">'+esc(g.def)+'</div><div class="glos-parts">📎 '+esc(g.parts)+'</div>';
  });
  openModal('📖 术语表（'+KB.glossary.length+' 条）',h);
}
function showFlow(){
  let h='';
  KB.flow.forEach(f=>{h+='<div class="flow-step"><div class="flow-n">'+f.step+'</div><div class="flow-body"><div class="ft">'+esc(f.title)+' <span class="fp" data-id="'+f.part+'">['+esc(KB.parts.find(p=>p.id===f.part).num)+']</span></div><div class="fd">'+esc(f.desc)+'</div></div></div>';});
  openModal('🧭 医疗器械合规流程总览',h);
  $$('.fp',$('#modalBody')).forEach(c=>c.onclick=()=>{closeModal();openPart(c.dataset.id);});
}
function showStats(){
  const np=KB.parts.length, ns=KB.parts.reduce((a,p)=>a+p.sections.length,0);
  const nd=KB.parts.reduce((a,p)=>a+p.definitions.length,0);
  const nt=KB.parts.reduce((a,p)=>a+p.timelines.length,0);
  const ng=KB.glossary.length, nf=KB.flow.length;
  const html='<div class="stat-grid">'+
    stat(np,'法规 Part')+stat(ns,'核心条款')+stat(nd,'重要定义')+stat(nt,'时限节点')+
    stat(ng,'术语词条')+stat(nf,'流程步骤')+stat(KB.categories.length,'主题分类')+stat(bookmarks.length,'我的收藏')+
    '</div>';
  openModal('📊 知识库统计',html);
}
function stat(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function openModal(title,body){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=body;$('#modal').classList.add('show');$('#overlay').classList.add('show');}
function closeModal(){$('#modal').classList.remove('show');$('#overlay').classList.remove('show');}
function openSidebar(){$('#sidebar').classList.add('open');$('#overlay').classList.add('show');}
function closeSidebar(){$('#sidebar').classList.remove('open');$('#overlay').classList.remove('show');}
$('#navSearch').oninput=e=>buildNav(e.target.value);
$('#globalSearch').oninput=e=>doSearch(e.target.value);
$('#btnGlossary').onclick=showGlossary;
$('#btnFlow').onclick=showFlow;
$('#btnStats').onclick=showStats;
$('#btnPrint').onclick=()=>window.print();
$('#btnToggle').onclick=openSidebar;
$('#modalClose').onclick=closeModal;
$('#overlay').onclick=()=>{closeModal();closeSidebar();};
$('#btnTheme').onclick=()=>{document.body.classList.toggle('light');localStorage.setItem('cfr_theme',document.body.classList.contains('light')?'light':'dark');};
if(localStorage.getItem('cfr_theme')==='light')document.body.classList.add('light');
buildNav(); renderHome();
</script>
</body>
</html>
