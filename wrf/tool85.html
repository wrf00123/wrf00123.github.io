<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21 CFR 医疗器械法规中文知识库（全译本）</title>
<style>
:root{
  --bg:#0f1419; --bg2:#161c24; --bg3:#1d2530; --panel:#141a22; --line:#26303c;
  --txt:#dce3ec; --txt2:#94a3b4; --accent:#4f9dff; --accent2:#33c08d; --warn:#ff7043; --purple:#b388ff;
  --hl:#ffd166;
}
body.light{ --bg:#eef2f6; --bg2:#ffffff; --bg3:#f4f7fa; --panel:#ffffff; --line:#d8e0ea; --txt:#1c2733; --txt2:#5a6b7d; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);line-height:1.65;font-size:15px}
#app{display:flex;min-height:100vh}
#sidebar{width:312px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.sb-head{display:flex;gap:12px;align-items:center;padding:18px 18px 12px}
.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700}
.sb-title{font-weight:700;font-size:16px;line-height:1.3}
.sb-title span{font-size:12px;color:var(--txt2);font-weight:500}
.sb-search{padding:0 14px 10px}
.sb-search input,.top-search input{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:8px;font-size:14px;outline:none}
.sb-search input:focus,.top-search input:focus{border-color:var(--accent)}
#nav{flex:1;overflow-y:auto;padding:6px 10px}
.cat-h{display:flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.04em;color:var(--txt2);text-transform:uppercase;margin:14px 8px 6px;font-weight:600}
.cat-dot{width:9px;height:9px;border-radius:50%}
.nav-item{display:flex;flex-direction:column;gap:2px;padding:9px 11px;border-radius:9px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:.15s}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{background:var(--bg3);border-color:var(--accent)}
.nav-item .ni-top{display:flex;align-items:center;gap:9px}
.nav-item .num{font-size:11px;font-weight:700;color:var(--accent);background:rgba(79,157,255,.12);padding:2px 7px;border-radius:5px;white-space:nowrap}
.nav-item .ttl{font-weight:600;font-size:14px}
.sb-foot{padding:10px 12px;border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ghost{background:var(--bg3);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;transition:.15s}
.ghost:hover{border-color:var(--accent);color:var(--accent)}
#content{flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;padding:13px 22px;background:var(--bg2);border-bottom:1px solid var(--line)}
.crumbs{font-weight:600;font-size:15px;flex-shrink:0}
.top-search{flex:1;display:flex;align-items:center;gap:10px;max-width:560px;margin-left:auto}
.top-search input{flex:1}
.count{font-size:12px;color:var(--accent2);white-space:nowrap;min-width:42px}
#view{padding:26px 32px 80px;max-width:1080px;margin:0 auto;width:100%}
.hero{background:linear-gradient(135deg,var(--bg3),var(--panel));border:1px solid var(--line);border-radius:16px;padding:30px 32px;margin-bottom:24px}
.hero h1{font-size:26px;margin-bottom:8px}
.hero .sub{color:var(--txt2);font-size:14px;margin-bottom:14px}
.hero .src{font-size:12.5px;color:var(--txt2);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 13px;display:inline-block}
.hero .note{font-size:12.5px;color:var(--warn);margin-top:12px;background:rgba(255,112,67,.08);border-left:3px solid var(--warn);padding:9px 12px;border-radius:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;transition:.15s}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card .c-num{font-size:11px;font-weight:700;color:var(--accent);background:rgba(79,157,255,.12);padding:2px 8px;border-radius:5px}
.card .c-ttl{font-weight:600;margin:9px 0 4px;font-size:15px}
.card .c-en{font-size:11.5px;color:var(--txt2)}
.card .c-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;color:var(--txt2);background:var(--bg3);border:1px solid var(--line);padding:2px 7px;border-radius:20px}
.part-head{border-bottom:2px solid var(--line);padding-bottom:18px;margin-bottom:22px}
.part-head .ph-num{font-size:12px;font-weight:700;color:var(--accent);background:rgba(79,157,255,.12);padding:3px 10px;border-radius:6px}
.part-head h2{font-size:24px;margin:12px 0 4px}
.part-head .ph-en{color:var(--txt2);font-size:14px}
.cat-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2);margin-top:10px}
.cat-badge .dot{width:8px;height:8px;border-radius:50%}
.toolrow{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap}
.btn{background:var(--bg3);border:1px solid var(--line);color:var(--txt);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px}
.btn:hover{border-color:var(--accent)}
.btn.on{border-color:var(--hl);color:var(--hl)}
.block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:18px}
.block h3{font-size:17px;margin-bottom:10px;display:flex;align-items:center;gap:9px}
.block h3 .ic{font-size:18px}
.block p{color:var(--txt);margin-bottom:8px}
.block .muted{color:var(--txt2)}
.sec{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.subpart-h{margin:14px 0 8px;padding:6px 12px;font-weight:700;font-size:13px;color:var(--accent);background:linear-gradient(90deg,rgba(79,157,255,.14),transparent);border-left:3px solid var(--accent);border-radius:4px}
.sec-head{display:flex;align-items:center;gap:10px;padding:12px 15px;cursor:pointer;background:var(--bg3);font-weight:600}
.sec-head:hover{background:var(--bg2)}
.sec-head .snum{font-size:12px;font-weight:700;color:var(--accent2);background:rgba(51,192,141,.12);padding:2px 8px;border-radius:5px;white-space:nowrap}
.sec-head .arrow{margin-left:auto;color:var(--txt2);transition:.2s}
.sec.open .arrow{transform:rotate(90deg)}
.sec-body{padding:0 15px;max-height:0;overflow:hidden;transition:max-height .25s ease}
.sec.open .sec-body{max-height:1200px;padding:12px 15px 16px}
.dl{width:100%;border-collapse:collapse;font-size:14px}
.dl th,.dl td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.dl th{color:var(--txt2);font-weight:600;width:200px;background:var(--bg3)}
.tl-item{display:flex;gap:14px;padding:11px 0;border-bottom:1px dashed var(--line)}
.tl-item:last-child{border-bottom:none}
.tl-when{font-size:12.5px;font-weight:700;color:var(--warn);min-width:170px;white-space:nowrap}
.tl-what{color:var(--txt)}
.rel-chips{display:flex;flex-wrap:wrap;gap:8px}
.rel-chip{font-size:13px;background:var(--bg3);border:1px solid var(--line);padding:6px 12px;border-radius:20px;cursor:pointer}
.rel-chip:hover{border-color:var(--accent);color:var(--accent)}
.toc{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.toc a{font-size:12.5px;color:var(--accent);text-decoration:none;border:1px solid var(--line);padding:4px 10px;border-radius:20px}
.toc a:hover{background:var(--bg3)}
mark{background:var(--hl);color:#1c2733;padding:0 2px;border-radius:3px}
.modal{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:24px}
.modal.show{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;max-width:820px;width:100%;max-height:84vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line);font-weight:700}
.modal-body{padding:20px;overflow-y:auto}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
#overlay.show{display:block}
.glos-term{font-weight:700;color:var(--accent);margin-top:14px}
.glos-def{color:var(--txt);margin:3px 0 2px}
.glos-parts{font-size:12px;color:var(--txt2)}
.flow-step{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--line)}
.flow-step:last-child{border-bottom:none}
.flow-n{width:34px;height:34px;flex-shrink:0;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.flow-body .ft{font-weight:600}
.flow-body .fp{font-size:12.5px;color:var(--accent2);cursor:pointer}
.flow-body .fd{font-size:13px;color:var(--txt2);margin-top:3px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;text-align:center}
.stat .n{font-size:30px;font-weight:800;color:var(--accent)}
.stat .l{font-size:13px;color:var(--txt2);margin-top:4px}
@media(max-width:860px){
  #sidebar{position:fixed;left:0;top:0;z-index:45;transform:translateX(-100%);transition:.25s}
  #sidebar.open{transform:translateX(0)}
  #view{padding:18px 16px 60px}
  .hero{padding:22px}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sb-head">
      <div class="logo">⚕</div>
      <div class="sb-title">医疗器械法规<br><span>21 CFR 知识库（全中文）</span></div>
    </div>
    <div class="sb-search">
      <input id="navSearch" type="text" placeholder="搜索导航 / Part 号…">
    </div>
    <nav id="nav"></nav>
    <div class="sb-foot">
      <button id="btnGlossary" class="ghost">📖 术语表</button>
      <button id="btnFlow" class="ghost">🧭 合规流程</button>
      <button id="btnStats" class="ghost">📊 统计</button>
      <button id="btnTheme" class="ghost">🌓 主题</button>
    </div>
  </aside>
  <main id="content">
    <header id="topbar">
      <button id="btnToggle" class="ghost">☰</button>
      <div class="crumbs"><span id="crumb">总览</span></div>
      <div class="top-search">
        <input id="globalSearch" type="text" placeholder="全文检索（条款 / 定义 / 时限…）">
        <span id="searchCount" class="count"></span>
      </div>
      <button id="btnPrint" class="ghost">🖨 打印</button>
    </header>
    <section id="view"></section>
  </main>
</div>
<div id="overlay"></div>
<div id="modal" class="modal"><div class="modal-box"><div class="modal-head"><span id="modalTitle"></span><button id="modalClose" class="ghost">✕</button></div><div id="modalBody" class="modal-body"></div></div></div>
<script>
