const KB = {"meta": {"title": "21 CFR 医疗器械法规中文知识库", "subtitle": "基于 eCFR 现行版本（截至 2026-07-15）整理 · 覆盖 12 部核心法规", "source": "21 CFR Part 11 / 801(B) / 803 / 806 / 807 / 810 / 814 / 820 / 821 / 830 / 860 及 QMSR 终版规则", "note": "本知识库为学习与管理辅助工具，内容以 eCFR 官方文本为准；如需合规应用请以 FDA 官方发布版本核对。"}, "categories": [{"id": "qms", "name": "质量体系与数据完整性", "color": "#4f9dff"}, {"id": "udi", "name": "标识与可追溯性（UDI）", "color": "#33c08d"}, {"id": "postmarket", "name": "上市后监管与纠正", "color": "#ff7043"}, {"id": "market", "name": "市场准入与注册", "color": "#b388ff"}], "parts": [{"id": "part11", "num": "Part 11", "category": "qms", "title_cn": "电子记录与电子签名", "title_en": "Electronic Records; Electronic Signatures", "tags": ["电子记录", "电子签名", "数据完整性", "计算机化系统", "审计追踪"], "overview": "Part 11 规定了 FDA 在何种条件下认可电子记录、电子签名以及手写于电子记录上的签名具有与纸质记录和手写签名同等的信任度、可靠性与法律效力。它是医疗器械（以及药品、生物制品）计算机化系统、质量体系电子化与电子提交的基础性合规要求。", "applicability": "适用于机构在任一法规下要求建立、修改、保存、归档、检索或传输的电子记录；也适用于依《联邦食品、药品和化妆品法》及《公共卫生服务法》向 FDA 提交的电子记录。不适用于纯纸质记录（即便其曾以电子方式传输）。计算机系统（含软硬件）、控制措施及相关文档须随时可供 FDA 检查。", "timelines": [{"when": "1997-08-20 之后", "what": "使用的电子签名须向 FDA 认证，声明其具有传统手写签名的法定等效性（§11.100(c)）。"}, {"when": "持续", "what": "封闭系统须维护带时间戳的审计追踪，记录创建/修改/删除操作，且不得覆盖先前记录（§11.10(e)）。"}], "sections": [{"num": "11.1", "title": "范围", "subpart": "子部分A：一般规定", "detail": "(a) 本部分的法规规定了 FDA 在何种条件下认为电子记录、电子签名以及在电子记录上执行的手写签名是可信、可靠且与纸质记录及纸上手写签名基本等效的。 (b) 本部分适用于根据 FDA 法规规定的记录要求而创建、修改、维护、归档、检索或传输的电子形式记录。本部分也适用于根据《联邦食品、药品和化妆品法》及《公共卫生服务法》要求向 FDA 提交的电子记录，即使该等记录未在 FDA 法规中被具体指明。但本部分不适用于已通过电子方式传输的纸质记录。 (c) 当电子签名及其关联电子记录符合本部分要求时，FDA 将视该电子签名等同于法规要求的完整手写签名、缩写及其他一般签署形式，除非 1997 年 8 月 20 日或之后生效的法规另有明确排除。 (d) 符合本部分要求的电子记录，可根据 §11.2 替代纸质记录使用，除非明确要求使用纸质记录。 (e) 依据本部分维护的计算机系统（含软硬件）、控制措施及相关文档，应随时可供 FDA 检查。 (f) 本部分不适用于本章 §§1.326 至 1.368 要求建立或维护的记录。符合本章第 1 部分 J 子部分要求但同时受其他适用法规管辖的记录，仍受本部分约束。 (g) 本部分不适用于依据本章 §101.11(d) 获得的电子签名。 (h) 本部分不适用于依据本章 §101.8(d) 获得的电子签名。 (i) 本部分不适用于本章第 117 部分要求建立或维护的记录。符合本章第 117 部分要求但同时受其他适用法规管辖的记录，仍受本部分约束。 (j) 本部分不适用于本章第 507 部分要求建立或维护的记录。符合本章第 507 部分要求但同时受其他适用法规管辖的记录，仍受本部分约束。 (k) 本部分不适用于本章第 112 部分要求建立或维护的记录。符合本章第 112 部分要求但同时受其他适用法规管辖的记录，仍受本部分约束。 (l) 本部分不适用于本章第 1 部分 L 子部分要求建立或维护的记录。 (m) 本部分不适用于本章第 1 部分 M 子部分要求建立或维护的记录。 (n) 本部分不适用于本章第 1 部分 O 子部分要求建立或维护的记录。 (o) 本部分不适用于本章第 121 部分要求建立或维护的记录。 (p) 本部分不适用于本章第 1 部分 R 子部分要求建立或维护的记录。", "summary": "本部分规定了电子记录与电子签名被 FDA 认可为等效于纸质记录与手写签名的标准。"}, {"num": "11.2", "title": "实施", "subpart": "子部分A：一般规定", "detail": "(a) 对于需要维护但无需提交给 FDA 的记录，在满足本部分要求的前提下，可全部或部分以电子记录替代纸质记录，或以电子签名替代传统签名。 (b) 对于提交给 FDA 的记录，在满足以下条件时，可全部或部分以电子记录替代纸质记录，或以电子签名替代传统签名：(1) 满足本部分要求；(2) 拟提交的文件或文件部分已在公共案卷 92S-0251 中被确定为 FDA 接受电子形式提交的类型。该案卷具体说明哪些类型文件可仅以电子形式提交，以及接受该等提交的 FDA 接收单位。未在案卷中指定的接收单位，电子形式文件不被视为正式文件；须附随纸质文件。相关人员应就提交方式、介质、格式及技术协议等细节咨询相应的 FDA 接收单位。", "summary": "规定了以电子形式替代纸质记录或传统签名的实施条件。"}, {"num": "11.3", "title": "定义", "subpart": "子部分A：一般规定", "detail": "(a) 法案第 201 节中的术语定义及解释适用于本部分。 (b) 以下定义亦适用于本部分： (1) “法案”指《联邦食品、药品和化妆品法》（第 201-903 节，21 U.S.C. 321-393）。 (2) “机构”指食品药品监督管理局（FDA）。 (3) “生物识别”指基于个人身体特征或可重复动作测量来验证身份的方法，该等特征/动作对个人唯一且可测量。 (4) “封闭系统”指系统访问由对系统上电子记录内容负责的人员控制的环境。 (5) “数字签名”指基于密码学发起者身份验证的电子签名，通过一组规则和参数计算，可验证签名者身份及数据完整性。 (6) “电子记录”指由计算机系统创建、修改、维护、归档、检索或分发的任何文本、图形、数据、音频、图像或其他数字形式信息的组合。 (7) “电子签名”指个人执行、采用或授权的计算机数据符号汇编，作为其手写签名的法律约束等效物。 (8) “手写签名”指个人手写其姓名或法律标记，并以当前意图以永久形式认证书写内容。 (9) “开放系统”指系统访问不由对系统上电子记录内容负责的人员控制的环境。", "summary": "定义了电子记录、电子签名、封闭系统、开放系统等关键术语。"}, {"num": "11.10", "title": "封闭系统的控制", "subpart": "子部分B：电子记录", "detail": "使用封闭系统创建、修改、维护或传输电子记录的人员，应实施旨在确保电子记录真实性、完整性及适当情况下的保密性的程序与控制措施，并确保签名者不能轻易否认已签名记录的真实性。该等程序与控制措施应包括： (a) 系统验证，以确保准确性、可靠性、一致的预期性能，并具备识别无效或篡改记录的能力。 (b) 能够生成准确完整的记录副本（人类可读及电子形式），以供 FDA 检查、审查和复制。 (c) 保护记录，确保在整个保存期内可准确、及时检索。 (d) 将系统访问权限限制于授权人员。 (e) 使用安全的、计算机生成的、带时间戳的审计追踪，独立记录创建、修改或删除电子记录的操作员输入及操作日期时间。记录更改不得掩盖先前记录信息。该审计追踪文档保存期至少与相关电子记录保存期相同，并可供 FDA 审查和复制。 (f) 酌情使用操作系统检查以强制允许的步骤和事件顺序。 (g) 使用权限检查，确保只有授权人员可使用系统、进行电子签名、访问操作或输入/输出设备、更改记录或执行当前操作。 (h) 酌情使用设备（如终端）检查，以验证数据输入或操作指令来源的有效性。 (i) 确定开发、维护或使用电子记录/签名系统的人员具备相应的教育、培训和经验。 (j) 制定并遵守书面政策，使个人对其电子签名下发起的行动负责，以防记录和签名伪造。 (k) 对系统文档实施适当控制，包括分发、访问、使用控制及修订变更控制程序。", "summary": "对封闭系统提出了验证、审计追踪、权限控制等具体的安全性和完整性要求。"}, {"num": "11.30", "title": "开放系统的控制", "subpart": "子部分B：电子记录", "detail": "使用开放系统创建、修改、维护或传输电子记录的人员，应采用旨在确保电子记录从创建点到接收点的真实性、完整性及适当情况下的保密性的程序与控制措施。该等程序与控制措施应包括 §11.10 中酌情适用的内容，以及额外的措施，如文档加密和使用适当的数字签名标准，以确保记录的真实性、完整性和保密性。", "summary": "要求开放系统在 §11.10 基础上增加加密等额外控制，以确保传输全程的安全。"}, {"num": "11.50", "title": "签名显示", "subpart": "子部分B：电子记录", "detail": "(a) 已签署的电子记录应包含与签名相关的信息，明确显示以下内容：(1) 签名者的印刷体姓名；(2) 签名执行的日期与时间；(3) 签名的含义（如审核、批准、责任或作者）。 (b) 上述信息应受到与电子记录相同的控制，并作为电子记录任何人类可读形式的一部分（如电子显示或打印输出）。", "summary": "规定电子签名必须附带签名人姓名、时间及含义等可读信息。"}, {"num": "11.70", "title": "签名/记录链接", "subpart": "子部分B：电子记录", "detail": "电子签名及在电子记录上执行的手写签名应与其各自电子记录相关联，以确保签名不能通过普通手段被剔除、复制或以其他方式转移伪造。", "summary": "要求签名与记录牢固绑定，防止篡改。"}, {"num": "11.100", "title": "一般要求", "subpart": "子部分C：电子签名", "detail": "(a) 每个电子签名对个人具有唯一性，不得被他人重复使用或重新分配。 (b) 组织在建立、分配、认证或以其他方式批准个人电子签名之前，应验证该个人身份。 (c) 使用电子签名的人员，应在此类使用之前或之时向 FDA 认证，其系统中自 1997 年 8 月 20 日起使用的电子签名旨在作为传统手写签名的法律等效物。 (1) 该认证应以传统手写签名签署，并以电子或纸质形式提交。 (2) 根据 FDA 要求，应提供额外认证或证词，证明特定电子签名是签名者手写签名的法律等效物。", "summary": "要求电子签名唯一、验证身份并向 FDA 认证其法律等效性。"}, {"num": "11.200", "title": "电子签名组件与控制", "subpart": "子部分C：电子签名", "detail": "(a) 不基于生物识别的电子签名应：(1) 使用至少两个不同的识别组件，如识别码和密码。 (i) 在单次持续受控系统访问期间执行一系列签名时，第一次签名应使用全部组件；后续签名可使用至少一个仅由个人执行的组件。 (ii) 非单次持续访问期间执行的每次签名，应使用全部组件。 (2) 仅由其真正所有者使用； (3) 其管理和执行应确保任何人试图使用他人电子签名时，需两人或多人协作。 (b) 基于生物识别的电子签名应设计为确保不能被真正所有者以外的任何人使用。", "summary": "规定了非生物识别电子签名（双组件）和生物识别电子签名的控制要求。"}, {"num": "11.300", "title": "识别码/密码的控制", "subpart": "子部分C：电子签名", "detail": "使用基于识别码与密码组合的电子签名的人员，应采用控制措施确保其安全性和完整性，包括： (a) 维护每个组合的唯一性，避免两人拥有相同组合。 (b) 确保定期检查、召回或修订识别码和密码的发放（如应对密码老化）。 (c) 遵循丢失管理程序，以电子方式取消授权丢失、被盗或其他受威胁的令牌/卡等设备，并采用严格控制发放临时或永久替换品。 (d) 使用事务保障措施，防止未经授权使用，并立即向安全部门及管理层报告任何尝试。 (e) 对承载或生成识别码/密码信息的设备进行初始及定期测试，确保其功能正常且未被篡改。", "summary": "要求对识别码和密码实施唯一性、定期更新、丢失管理和防滥用控制。"}], "definitions": [{"term": "封闭系统 (Closed system)", "def": "系统访问由对系统上电子记录内容负责的人员控制的环境。"}, {"term": "开放系统 (Open system)", "def": "系统访问不由对系统上电子记录内容负责的人员控制的环境。"}, {"term": "电子记录 (Electronic record)", "def": "由计算机系统创建、修改、保存、归档、检索或分发的文本、图形、数据、音频、图像或其他数字形式的信息表示。"}, {"term": "电子签名 (Electronic signature)", "def": "个人执行、采用或授权的计算机数据汇编，作为个人手写签名的法定绑定等效物。"}, {"term": "数字签名 (Digital signature)", "def": "基于密码学发件人认证、可验证签名人身份与数据完整性的电子签名。"}, {"term": "生物识别 (Biometrics)", "def": "基于个人身体特征或可重复动作测量验证身份、且这些特征/动作对个人唯一且可测量的方法。"}], "related": ["part820", "part807", "part803"]}, {"id": "part820", "num": "Part 820", "category": "qms", "title_cn": "质量体系法规（QMSR）", "title_en": "Quality Management System Regulation", "tags": ["QMSR", "CGMP", "ISO 13485", "质量体系", "2026生效"], "overview": "Part 820（QMSR）规定了医疗器械的现行良好生产规范（CGMP）要求，涵盖成品器械的设计、制造、包装、标签、贮存、安装与服务的全过程，确保器械安全有效并符合法案要求。2024-02-02 发布的最终规则将旧“质量体系法规（QS regulation，即 cGMP）”修订为 QMSR，通过引用纳入 ISO 13485:2016。", "applicability": "适用于在美国各州/领地制造或进口至美国的所有成品器械（含合同灭菌、安装、重新贴标、再制造、重新包装、规格开发及外国企业的初始分销商）。仅从事部分适用操作的制造商仅需遵守与之相关的要求。不适用于组件/零件制造商（鼓励参照），不适用于血液及成分制造商（受 Subchapter F 约束），HCT/P 作为器械管理者同时须满足 Part 1271 要求。", "timelines": [{"when": "2024-02-02", "what": "QMSR 最终规则在《联邦公报》发布（89 FR 7523）。"}, {"when": "2026-02-02", "what": "QMSR 正式生效，旧 QS 法规被取代；企业须符合 ISO 13485:2016 及本部分附加要求。"}], "sections": [{"num": "820.1", "title": "范围", "subpart": "子部分A：一般规定", "detail": "(a) 适用性：本质量管理体系法规（QMSR）规定了现行良好生产规范（CGMP）要求。本部分要求管理用于设计、制造、包装、标签、储存、安装和维修所有供人类使用的成品器械的方法、设施及控制措施。其旨在确保成品器械安全有效，并符合《联邦食品、药品和化妆品法》的规定。从事成品器械设计、制造、包装、标签、储存、安装或维修的任何制造商，必须建立和维护适合其具体器械的质量管理体系。受本部分约束的制造商包括但不限于执行合同灭菌、安装、重新贴标、再制造、重新包装或规格开发的制造商，以及执行上述功能的外国实体的初始分销商。若制造商仅从事部分适用操作，则仅需遵守与其操作相关的要求。 (1) 成品器械：本部分规定适用于任何成品器械。 (2) 组件或部件：本部分不适用于组件或部件制造商，但鼓励其酌情考虑本法规规定。 (3) 血液和血液成分：本部分不适用于用于输血或进一步制造的血液和血液成分制造商。 (4) HCT/Ps：本部分适用于作为器械监管的人类细胞、组织及细胞组织基产品（HCT/Ps）制造商。此类产品还须遵守第 1271 部分 C 和 D 子部分的要求。 (b) 与法案其他要求的冲突：本部分补充本章其他部分法规。若有冲突，特别适用于所涉器械的要求优先。ISO 13485 条款若与法案及其法规冲突，以法案及其法规为准。 (c) 外国制造商：进口或拟进口的器械，若看似存在掺假等情形，可依据第 801(a) 节被拒绝入境。 (d) 豁免或变更：制造商可依据第 520(f)(2) 节申请豁免或变更；FDA 亦可出于公共健康需要主动发起并批准变更。", "summary": "规定了 QMSR 的适用范围、与其他法规的冲突处理及外国制造商义务。"}, {"num": "820.3", "title": "定义", "subpart": "子部分A：一般规定", "detail": "ISO 13485 及 ISO 9000 第 3 条（通过引用纳入）中的定义适用于本部分，但本节(b)段另有规定者除外，且不影响本标题中类似术语的含义。 (a) 以下术语（在 ISO 13485 或 ISO 9000 中未使用或未定义）也适用于本部分： “批次”指由单一类型、型号、类别、尺寸、成分或软件版本组成的一个或多个组件或成品器械，在基本相同条件下制造，且旨在规定限度内具有统一特性和质量。 “组件”指拟作为成品、包装和标签器械的一部分包含的任何原材料、物质、件、部件、软件、固件、标签或组件。 “成品器械”指适合使用或能够发挥功能的任何器械或附件，无论是否包装、标签或灭菌。 “再制造商”指对成品器械进行加工、翻新、修复、重新包装或任何其他显著改变其性能/安全规格或预期用途的主体。 (b) 法案第 201 节所有定义适用并取代 ISO 13485 中相关术语定义（如“器械”和“标签”）。此外： “可植入医疗器械”具有第 860.3 节中“植入物”的含义。 “制造商”指设计、制造、制作、组装或加工成品器械的任何人，包括合同灭菌、安装、再制造等。 “组织”具有“制造商”的含义。 “返工”指对不合格产品采取措施，使其在放行分销前符合医疗器械文件（MDF）规定要求。 “安全与性能”在 ISO 13485 第 0.1 条中具有“安全与有效性”的含义，不免除制造商提供合理保证的义务。", "summary": "明确了 QMSR 中采用的术语及其定义，包括与 ISO 标准的关联和特定补充定义。"}, {"num": "820.5", "title": "[保留]", "subpart": "", "detail": "", "summary": ""}, {"num": "820.7", "title": "引用纳入", "subpart": "子部分A：一般规定", "detail": "经联邦公报局局长批准，某些材料根据 5 U.S.C. 552(a) 和 1 CFR 第 51 部分通过引用纳入本部分。所有批准的引用纳入（IBR）材料可在 FDA 及国家档案与记录管理局（NARA）查阅。可从国际标准化组织（ISO）获取。 (a) ISO 9000:2015(E) 第 3 条——术语和定义，经 IBR 批准用于 §820.3。 (b) ISO 13485:2016(E) 医疗器械——质量管理体系——用于监管目的的要求，第三版，经 IBR 批准用于 §§820.1、820.3、820.10、820.35 和 820.45。", "summary": "将 ISO 13485:2016 和 ISO 9000 第 3 条通过引用纳入本部分。"}, {"num": "820.10", "title": "质量管理体系要求", "subpart": "子部分A：一般规定", "detail": "受本部分约束的制造商必须： (a) 文件化：建立符合 ISO 13485 适用要求及本部分其他适用要求的质量管理体系文件； (b) 适用的法规要求：酌情遵守本章其他适用法规要求，包括但不限于： (1) 对于 ISO 13485 第 7.5.8 条（标识），必须按照第 830 部分建立 UDI 分配体系； (2) 对于第 7.5.9.1 条（可追溯性），如适用，须按第 821 部分建立可追溯程序； (3) 对于第 8.2.3 条（向监管机构报告），须将符合第 803 部分报告标准的投诉通知 FDA； (4) 对于第 7.2.3、8.2.3 和 8.3.3 条，咨询通知应按第 806 部分处理。 (c) 设计和开发：II 类、III 类及本节指定的 I 类器械制造商，须遵守 ISO 13485 第 7.3 条设计开发要求。 (d) 支持或维持生命的器械：此类器械制造商还须遵守第 7.5.9.2 条可植入器械可追溯性要求。 (e) 执法：未遵守本部分要求的器械视为掺假，相关人员将受监管行动。", "summary": "要求制造商建立文件化的质量体系，并补充了 UDI、追溯、投诉报告等特定法规衔接要求。"}, {"num": "820.35", "title": "记录控制", "subpart": "子部分B：补充规定", "detail": "除 ISO 13485 第 4.2.5 条（记录控制）外，制造商还须在某些记录中包含以下信息： (a) 投诉记录：除第 8.2.2 条（投诉处理）外，须保存对涉及器械、标签或包装可能未能满足规格的投诉的审查、评估和调查记录。若已对类似投诉进行调查，则无需重复，但须记录理由。对于须向 FDA 报告的投诉、制造商确定须调查的投诉及已调查的投诉，须记录：器械名称、收到日期、UDI/UPC、投诉人信息、性质详情、采取的纠正/纠正措施及回复。 (b) 维修活动记录：在遵守第 7.5.4 条（维修活动）时，至少记录：维修器械名称、UDI/UPC、维修日期、维修人员、维修内容及任何测试检查数据。 (c) UDI 记录：除第 7.5.1、7.5.8、7.5.9 条外，须为每个医疗器械或批次记录 UDI。 (d) 保密性：可标记保密记录，以协助 FDA 依据第 20 部分公共信息法规决定是否披露。", "summary": "在 ISO 13485 基础上，增加了投诉、维修和 UDI 记录的特定信息要求。"}, {"num": "820.40", "title": "[保留]", "subpart": "", "detail": "", "summary": ""}, {"num": "820.45", "title": "器械标签与包装控制", "subpart": "子部分B：补充规定", "detail": "除 ISO 13485 第 7.5.1 条（生产和服务提供控制）外，每个制造商须建立并维护程序，详细描述确保标签和包装完整性、检查、储存和操作的活动。 (a) 制造商须确保标签和包装在放行或储存前（如适用）已检查准确性，包括：正确的 UDI/UPC、失效日期、储存说明、搬运说明及任何额外加工说明。 (b) 标签放行使用须按第 4.2.5 条记录。 (c) 制造商须确保已建立和维护标签和包装操作以防止混淆，包括在使用前检查标签和包装，以确保所有器械具有正确的标签和包装（如医疗器械文件所规定）。检查结果须按第 4.2.5 条记录。", "summary": "强化了标签和包装的检查、准确性和防混淆控制要求。"}], "definitions": [{"term": "成品器械", "def": "适于使用或能够发挥功能的任何器械或其附件，无论是否包装、贴标或灭菌。"}, {"term": "制造商", "def": "设计、制造、装配或加工成品器械的任何主体；含合同灭菌、安装、重新贴标、再制造、重新包装、规格开发及外国企业的初始分销商。"}, {"term": "再制造商", "def": "对成品器械进行加工、翻新、修复、重新包装或任何其他显著改变其性能/安全规格或预期用途的行为的主体。"}, {"term": "返工", "def": "对不合格产品采取措施，使其在被放行分销前满足医疗器械文件（MDF）中的规定要求。"}, {"term": "安全与性能", "def": "含义同 ISO 13485 引言中的 safety and effectiveness；不免除制造商提供合理保证安全有效的控制义务。"}], "related": ["part11", "part830", "part821", "part803", "part806"]}, {"id": "part830", "num": "Part 830", "category": "udi", "title_cn": "唯一器械标识（UDI）", "title_en": "Unique Device Identification", "tags": ["UDI", "GUDID", "器械标识", "生产标识", "发行机构"], "overview": "Part 830 建立唯一器械标识（UDI）制度：每个器械版本/型号须带有由 FDA 或 FDA 认可的发行机构签发的 UDI，标签商须将标识数据提交至全球唯一器械标识数据库（GUDID）。UDI 由固定的“器械标识（DI）”与可变的“生产标识（PI）”组成。", "applicability": "适用于在美国制造或进口至美国、须带 UDI 的器械标签与器械包装（具体合规日期由 FDA 按器械类别规定，详见 Part 801 Subpart B）。标签商（labeler）负有标识签发与 GUDID 提交义务。", "timelines": [{"when": "标签须带 UDI 之日", "what": "标签商须按 §830.310 向 GUDID 提交标识信息（§830.330(a)）。"}, {"when": "变更后 10 个营业日", "what": "若信息未出现在标签上，更新信息须在变更后 10 个营业日内提交（§830.330(b)）。"}, {"when": "停售起 3 年", "what": "标签商须保存所有用过的 UDI 及版本/型号对应记录，自停止销售该版本/型号起 3 年（§830.360）。"}, {"when": "认可初始 3 年 / 续期 7 年", "what": "FDA 认可发行机构的初始任期为 3 年，续期每次 7 年（§830.110(f)）。"}], "sections": [{"num": "830.3", "title": "定义", "subpart": "子部分A：一般规定", "detail": "本部分使用的术语定义如下：“自动识别和数据采集（AIDC）”指任何能够通过自动化流程将 UDI 或 DI 传输入电子病历或其他计算机系统的技术。“中心主任”指 CDRH 或 CBER 主任。“器械包装”指含有固定数量特定版本/型号器械的包装。“失效日期”指标签上声明的器械必须或应当使用的日期。“FDA”指美国食品药品监督管理局。“成品器械”指适于使用或能够发挥功能的任何器械或附件。“GUDID”指全球唯一器械标识数据库。“HCT/P”指不符合第 1271.10(a) 标准且作为器械监管的 HCT/P。“签发机构”指经 FDA 认可运营 UDI 签发系统的组织。“标签”具有法案第 201(k) 节含义。“标签商”指促使标签贴于器械且意图商业分销而不更换/修改标签者，或更换/修改标签者。“批次”指在基本相同条件下制造的单一类型/型号等产品单元。“运输容器”指运输过程中使用的容器。“小企业”指员工≤500 人的器械制造商或≤100 人的重新标签/包装商。“规格”指器械须符合的要求。“UDI”指充分标识器械通过分销与使用的标识符，由器械标识（DI）和生产标识（PI）组成。", "summary": "定义了 UDI 制度中的核心术语，包括 UDI、DI、PI、标签商、GUDID 等。"}, {"num": "830.10", "title": "引用纳入", "subpart": "子部分B：UDI 要求", "detail": "经联邦公报局局长批准，ISO/IEC 646、15459-2、15459-4、15459-6 等国际标准通过引用纳入本部分。", "summary": "引用纳入相关的国际标准作为 UDI 技术要求的基础。"}, {"num": "830.20", "title": "UDI 要求", "subpart": "子部分B：UDI 要求", "detail": "UDI 必须：(a) 在 FDA 或 FDA 认可的签发机构系统下签发；(b) 符合 ISO/IEC 15459-2、-4、-6 标准；(c) 仅使用 ISO/IEC 646 不变字符集中的字符和数字。", "summary": "规定了 UDI 的签发、符合标准和字符集要求。"}, {"num": "830.40", "title": "器械标识的使用和停用", "subpart": "子部分B：UDI 要求", "detail": "(a) 特定版本/型号只能使用来自特定系统的唯一一个 DI。一个版本/型号可由多个系统的 UDI 识别。 (b) 一个 DI 只能识别一个版本/型号。 (c) 若版本/型号停产，其 DI 不得重新分配给其他器械。若重新推出且无变化，可继续使用原 DI。 (d) 若签发机构放弃或不续展认可，在 §830.50 要求分配新 DI 之前，可继续使用之前签发的 UDI。", "summary": "规定了 DI 的唯一性、停用和重新使用规则。"}, {"num": "830.50", "title": "需要新 DI 的变更", "subpart": "子部分B：UDI 要求", "detail": "(a) 若对器械进行变更导致新版本/型号，须为新版本/型号分配新 DI。 (b) 若创建新器械包装，须为新包装分配新 DI。", "summary": "明确规定导致新版本或新包装的变更须分配新 DI。"}, {"num": "830.60", "title": "需要 UDI 的器械的重新标签", "subpart": "子部分B：UDI 要求", "detail": "若重新标签须带 UDI 的器械，须：(a) 分配新 DI；(b) 保存记录显示新旧 DI 的关系。", "summary": "重新标签须分配新 DI 并保持记录。"}, {"num": "830.100", "title": "FDA 对签发机构的认可", "subpart": "子部分C：FDA 对签发机构的认可", "detail": "(a) 资格：私人组织可申请认可为签发机构。 (b) 认可标准：系统须符合 §830.20 要求，符合 ISO/IEC 15459-2、-4、-6 标准，使用 ISO/IEC 646 字符集，按一致、公平、合理的条款向所有用户提供，并防范利益冲突。", "summary": "规定了签发机构申请认可的条件和标准。"}, {"num": "830.110", "title": "签发机构认可申请", "subpart": "子部分C：FDA 对签发机构的认可", "detail": "(a) 初始认可申请：向 FDA 发送意向通知，提交包含名称、地址、标准、指南、评审流程、费用表、利益关系等信息的申请。 (b) 续期申请：至少提前 9 个月通知意向，提前 6 个月提交续期申请。 (c) FDA 在 60 天内审查并通知缺陷，申请人可在 60 天内补正。若未解决，可拒绝。 (d) 放弃认可：须提前 9 个月提交信函。 (e) 终止通知：须按 FDA 批准的方式和时限通知所有标签商。 (f) 认可期限：初始 3 年，续期 7 年。", "summary": "详细说明了申请、续期、放弃认可的程序及时限。"}, {"num": "830.120", "title": "认可签发机构的职责", "subpart": "子部分C：FDA 对签发机构的认可", "detail": "为维持认可，签发机构须：(a) 运营符合 §830.20 的系统；(b) 提供系统信息；(c) 维护标签商列表并每年向 FDA 提供；(d) 应要求提供标签商信息；(e) 持续符合认可标准。", "summary": "列举了认可签发机构须履行的持续责任。"}, {"num": "830.130", "title": "认可的中止或撤销", "subpart": "子部分C：FDA 对签发机构的认可", "detail": "若 FDA 发现签发机构在获取认可时存在虚假陈述、未履行责任、未能防范利益冲突、从事反竞争活动或违反相关法规，可中止或撤销其认可。", "summary": "规定了 FDA 对签发机构采取制裁措施的条件。"}, {"num": "830.200", "title": "FDA 作为签发机构", "subpart": "子部分D：FDA 作为签发机构", "detail": "(a) 当无认可签发机构时，FDA 将充当签发机构。 (b) 若 FDA 确定大量小企业因所有认可签发机构收费而受到重大不利影响，FDA 将充当签发机构。 (c) FDA 可酌情为确保系统连续性或有效性而充当签发机构。 (d) 为促进替代方案的实施，FDA 可酌情充当签发机构。", "summary": "规定了 FDA 在特定情况下自己充当签发机构的条件。"}, {"num": "830.210", "title": "使用 FDA 作为签发机构的资格", "subpart": "子部分D：FDA 作为签发机构", "detail": "当 FDA 充当签发机构时，任何标签商均被允许使用 FDA 的 UDI 系统，无论其是否为小企业。", "summary": "FDA 作为签发机构时，对所有标签商开放。"}, {"num": "830.220", "title": "FDA 终止作为签发机构", "subpart": "子部分D：FDA 作为签发机构", "detail": "(a) 若 FDA 确定促使采取行动的条件不复存在且终止服务不会导致条件再现，可终止服务。 (b) 若 FDA 终止服务，标签商可继续使用已分配的 DI，直至 §830.50 要求使用新 DI。", "summary": "规定了 FDA 终止作为签发机构的条件及后续安排。"}, {"num": "830.300", "title": "须提交 UDI 信息的器械", "subpart": "子部分E：GUDID", "detail": "(a) 一般情况下，须带 UDI 的器械的标签商须为每个版本/型号提供本子部分要求的信息。 (b) 若自愿在标签上包含 UDI，也可自愿提交信息。 (c) FDA 可拒绝或删除不符合 §830.20、非美国制造/商业、非器械、未获批准、被禁止或签发机构认可被暂停的器械数据。", "summary": "明确了须向 GUDID 提交数据的器械范围及 FDA 的审查权。"}, {"num": "830.310", "title": "UDI 所需信息", "subpart": "子部分E：GUDID", "detail": "指定的器械标识联系人须向 FDA 提供以下信息： (a) 标签商信息：名称、电话/邮箱、使用的签发机构名称。 (b) 每个版本/型号信息：DI、新 DI 替换旧 DI 时的旧 DI、直接标记信息、品牌名、版本号、无菌标识、乳胶标识、MRI 安全信息、尺寸、PI 类型、FDA 上市前提交号、FDA 列名号、GMDN 术语/代码、包装内器械总数。", "summary": "详细列出标签商须向 GUDID 提交的每项数据字段。"}, {"num": "830.320", "title": "UDI 信息提交", "subpart": "子部分E：GUDID", "detail": "(a) 指定器械标识联系人，负责确保向 FDA 提供所有要求的信息。 (b) 所有信息须以电子形式提交至 GUDID，除非获得豁免。 (c) 可申请电子提交豁免，须说明技术上不可行的理由。", "summary": "规定了信息提交方式及豁免申请程序。"}, {"num": "830.330", "title": "提交时间", "subpart": "子部分E：GUDID", "detail": "(a) 标签商须在不晚于标签须带 UDI 的日期提交 §830.310 所需信息。 (b) 信息变更时须更新，若信息出现在标签上，则不晚于首次标注变更信息的日期提交；若未出现在标签上，则须在变更后 10 个营业日内提交。", "summary": "规定了提交初始信息和更新信息的时限。"}, {"num": "830.340", "title": "辅助信息的自愿提交", "subpart": "子部分E：GUDID", "detail": "(a) 除 §830.310 指定的信息外，不得向 GUDID 提交其他信息，除非 FDA 允许提交特定辅助信息。 (b) FDA 将通过网站公布可提交的辅助信息类型。 (c) FDA 可定期变更辅助信息类型，变更前至少 60 天公布。", "summary": "允许 FDA 扩充可提交的信息类型，并规定了通知期限。"}, {"num": "830.350", "title": "GUDID 信息的更正", "subpart": "子部分E：GUDID", "detail": "(a) 若 FDA 发现信息不正确或有误导性，可通知标签商，标签商须在 30 天内提供更正或解释。 (b) 若标签商未回应或 FDA 确定信息不正确，FDA 可删除或更正信息。", "summary": "规定了 FDA 对 GUDID 错误信息的通知、更正和删除程序。"}, {"num": "830.360", "title": "标签商须保存的记录", "subpart": "子部分E：GUDID", "detail": "(a) 每个标签商须保存所有用于识别须带 UDI 器械的 UDI 记录及关联版本/型号，保存期自停止销售该版本/型号起 3 年。 (b) 此要求不免除遵守其他 FDA 记录保存要求的义务。", "summary": "要求标签商长期保存 UDI 使用记录。"}], "definitions": [{"term": "UDI", "def": "充分标识器械通过其分销与使用的标识符，由 DI + PI 组成。"}, {"term": "器械标识 DI", "def": "UDI 中强制性、固定的部分，标识特定版本/型号及该器械的标签商。"}, {"term": "生产标识 PI", "def": "UDI 中条件性、可变的部分，标识批/序列号/有效期/生产日期等（当出现在标签上时）。"}, {"term": "标签商", "def": "使标签贴于器械且意图商业化分销而不再替换/修改标签者，或替换/修改标签者。"}, {"term": "GUDID", "def": "全球唯一器械标识数据库，作为便于器械在分销与使用中被识别的信息库。"}, {"term": "AIDC", "def": "自动识别与数据采集技术，以可经自动化流程进入电子病历或其他计算机系统的形式传达 UDI。"}], "related": ["part801b", "part820", "part821"]}, {"id": "part801b", "num": "Part 801 Subpart B", "category": "udi", "title_cn": "UDI 标签要求", "title_en": "Labeling Requirements for Unique Device Identification", "tags": ["UDI标签", "直接标记", "AIDC", "独立软件", "例外"], "overview": "Part 801 Subpart B 规定医疗器械标签与器械包装应如何承载 UDI：须以易读明文与 AIDC 两种形式呈现，并规定例外情形、直接标记（永久标记）、独立软件及例外/替代请求程序。", "applicability": "适用于所有须带 UDI 的成品器械标签与器械包装。具体器械的强制合规日期由 FDA 依品类分阶段规定。", "timelines": [{"when": "合规日期前制造并贴标", "what": "该器械例外于 §801.20，例外于合规日期后 3 年届满（§801.30(a)(1)）。"}, {"when": "器械须带 UDI 之日", "what": "该日原 NHRIC/NDC 编号停用，不得再提供于标签或包装（§801.57(a)）。"}, {"when": "2018-09-24", "what": "不要求带 UDI 的器械，其 NHRIC/NDC 编号于此日停用（§801.57(b)）。"}], "sections": [{"num": "801.20", "title": "标签须带 UDI", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 一般规定：(1) 每个医疗器械的标签应带有一个符合本子部分及第 830 部分要求的 UDI。(2) 每个器械包装应带有一个符合要求的 UDI。 (b) 例外：由 §§801.30、801.45、801.128(f)(2) 提供，§801.55 提供了请求例外或替代的途径。", "summary": "原则要求每个器械标签和包装都须标注 UDI。"}, {"num": "801.30", "title": "UDI 标签的一般例外", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 一般例外：以下类型器械免于 §801.20 要求：(1) 在合规日期前制造并贴标的成品器械，例外于合规日期后 3 年届满；(2) 依据法规豁免 GMP 要求的 I 类器械；(3) 在同一包装内一起分发的单个一次性使用器械（不用于单独商业分销）；(4) 仅用于研究、教学或化学分析的器械；(5) 定制器械；(6) 研究用器械；(7) 兽用器械；(8) 出口器械；(9) 战略国家储备持有的器械；(10) FDA 已建立性能标准并规定例外的器械；(11) 组合产品或便利包内包装内的器械，若组合产品或便利包标签带有 UDI。 (b) NDC 编号：若组合产品标签正确带有 NDC 编号，则不受 §801.20 约束。 (c) 运输容器例外。 (d) I 类器械的 UDI 不需要包含 PI。", "summary": "列举了无需在标签上标注 UDI 的各类例外情形。"}, {"num": "801.35", "title": "自愿标注 UDI", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 不要求带 UDI 的器械的标签商可自愿遵守 §801.20，并可自愿提交信息。 (b) 器械标签和包装上可同时带有 UPC 和 UDI。", "summary": "允许不要求 UDI 的器械自愿遵守规则，并可同时使用 UPC。"}, {"num": "801.40", "title": "UDI 的形式", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 每个 UDI 必须符合 §830.20 技术要求，并以两种形式呈现：(1) 易读明文；(2) AIDC 技术。 (b) UDI 须包含 DI 段。当标签包含批号、序列号、生产日期、有效期或 HCT/P 识别码时，UDI 须包含 PI 段。 (c) 若 AIDC 技术不明显，标签或包装须披露其存在。 (d) 带有 UPC 的 I 类器械，其 UPC 可视为满足要求的 UDI。", "summary": "规定 UDI 必须同时以明文和机器可读形式呈现，并明确 PI 的包含条件。"}, {"num": "801.45", "title": "须直接标记 UDI 的器械", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 一般规定：预期多次使用且每次使用前再处理的器械，除标签外，还须在器械本身上进行永久性直接标记。 (b) 直接标记的 UDI 可与标签上的 UDI 相同或不同。 (c) 直接标记形式：(1) 明文；(2) AIDC 或任何替代技术。 (d) 例外：若直接标记会干扰安全有效性、技术上不可行、一次性使用器械经额外加工用于额外单次使用，或已标记过。 (e) 例外须在设计开发文件中记录。", "summary": "要求可重复使用且需再处理的器械必须在器械本身进行永久性 UDI 直接标记。"}, {"num": "801.50", "title": "独立软件的标签要求", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 不以包装形式分发的独立软件（如从网站下载），若在软件启动时或通过菜单命令显示 UDI，且在其 PI 中传达版本号，则视为满足要求。 (b) 无论是否以包装形式分发，作为医疗器械监管的独立软件必须通过启动时显示或菜单命令显示其 UDI。 (c) 同时以包装和非包装形式分发的独立软件可使用相同的 DI。", "summary": "针对独立软件，规定了通过显示界面提供 UDI 的具体方式。"}, {"num": "801.55", "title": "请求 UDI 要求的例外或替代", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 标签商可提交书面请求，申请对特定器械或类型器械免除或替代本子部分要求。请求须说明器械信息、涉及条款、理由（技术不可行或替代方案更优）。 (b) 提交方式：CBER 或 CDRH 指定邮箱或地址。 (c) 中心主任可批准例外或替代，并附加保护性条件。 (d) FDA 可出于公共健康利益主动发起并批准例外或替代。 (e) 若情况变化或条件未满足，可撤销。", "summary": "提供了申请 UDI 要求例外或替代的正式程序。"}, {"num": "801.57", "title": "旧 FDA 标识编号的停用", "subpart": "子部分B：UDI 标签要求", "detail": "(a) 自器械须带 UDI 之日起，分配给该器械的任何 NHRIC 或 NDC 编号即被废止，不得再出现在标签或包装上。 (b) 若不要求带 UDI，NHRIC/NDC 编号自 2018-09-24 废止。 (c) 已分配 FDA 标签商代码者可继续使用该代码，前提是符合签发机构框架且最迟于 2014-09-24 提交并获得继续使用批准。", "summary": "规定在 UDI 合规日期后，原有的 NHRIC/NDC 编号停止使用。"}], "definitions": [{"term": "器械包装", "def": "含有固定数量特定版本/型号器械的包装。"}, {"term": "运输容器", "def": "器械运输/搬运中使用的容器，其内容每次装运可能不同；不要求 UDI。"}, {"term": "直接标记", "def": "在器械本身上提供的永久 UDI 标记，适用于多次使用且再处理的器械。"}, {"term": "独立软件", "def": "作为医疗器械监管、不以包装形式分发的软件。"}], "related": ["part830", "part820"]}, {"id": "part821", "num": "Part 821", "category": "udi", "title_cn": "医疗器械追溯要求", "title_en": "Medical Device Tracking Requirements", "tags": ["追溯", "跟踪", "植入", "生命支持", "分销商"], "overview": "Part 821 实施法案 §519(e)，要求制造商对满足三标准之一且收到 FDA 追溯令的 II/III 类器械建立追溯系统，使器械能从制造厂追踪到使用患者。法律责任的承担者为接受追溯令的制造商，不可经合同转移。", "applicability": "适用于收到 FDA 追溯令的 II/III 类器械（“被追溯器械”）。三标准（满足任一且 FDA 下令）：器械失败可能合理导致严重不良健康后果；预期植入人体超过 1 年；在用户机构外使用的生命支持/维持器械。进口追溯器械的进口商视为制造商并须遵守全部要求，且须在美国保存信息。", "timelines": [{"when": "FDA 请求后 3 个工作日", "what": "分销至患者前，制造商须提供分销链位置与持有人信息（§821.25(a)(1)，除非 §518(e) 令另定）。"}, {"when": "FDA 请求后 10 个工作日", "what": "单患者器械：提供 UDI/批/序列号、装运日期、患者信息、处方医师等；多患者器械：提供至多重分销商信息（§821.25(a)(2)/(3)）。"}, {"when": "前 3 年每 ≤6 个月，之后每年 ≥1 次", "what": "质量审核（统计抽样 + 系统功能测试）（§821.25(c)(3)）。"}, {"when": "器械有用寿命", "what": "记录保存期为被追溯器械的有用寿命（§821.60）。"}], "sections": [{"num": "821.1", "title": "范围", "subpart": "子部分A：一般规定", "detail": "(a) 本部分实施法案 §519(e)，该条款规定 FDA 可要求制造商对满足以下三个标准之一且 FDA 已向其发出命令的 II 类或 III 类器械采取追溯方法：器械失败合理可能导致严重不良健康后果；器械预期植入人体超过 1 年；器械是在用户机构外使用的生命支持或维持器械。符合该标准并受 FDA 命令约束的器械称为“被追溯器械”。 (b) 本部分旨在确保被追溯器械可从制造厂追溯到患者。有效的追溯对于实施患者通知或器械召回是必要的。尽管不禁止制造商引入外部组织参与追溯，但法律责任不可通过合同转移。 (c) 主要责任在于制造商。未能遵守要求的任何分销商或人员，其器械将被视为错标，并构成禁止行为。 (d) 永久停业者须通知 FDA 并提供完整追溯记录；若其他实体承担追溯责任，须书面确认。", "summary": "规定了追溯制度的法律依据、目的及责任主体。"}, {"num": "821.2", "title": "豁免与变更", "subpart": "子部分A：一般规定", "detail": "(a) 制造商、进口商或分销商可申请豁免或变更本部分要求。 (b) 请求应以请愿形式提交，并包含器械名称、类别、不遵守的理由及替代方案说明等。", "summary": "提供了申请追溯要求豁免或变更的程序。"}, {"num": "821.3", "title": "定义", "subpart": "子部分A：一般规定", "detail": "本部分适用的定义： “进口商”指受追溯令约束的进口器械的初始分销商。 “制造商”包括任何进口商、再包装商和/或重新标签商。 “器械失败”指器械未按预期发挥功能。 “严重不良健康后果”指危及生命或涉及永久/长期损伤的重大不良事件。 “预期植入人体超过 1 年”指预期置于人体腔隙内超过 1 年以持续辅助、恢复或替代器官系统功能的器械。 “在用户机构外使用的生命支持或维持器械”指对人类生命延续至关重要的器械，预期在院外使用。 “分销商”指进一步分销器械但不重新包装者。 “最终分销商”指将追踪器械分发给单患者使用的任何主体。 “多重分销商”指在器械有用寿命内分发给多名患者的生命支持/维持器械实体。 “HCT/P”指作为器械监管的人类细胞、组织产品。 “UDI”指符合第 830.20 要求的标识符。", "summary": "定义了追溯制度相关的特定术语，如最终分销商、多重分销商等。"}, {"num": "821.4", "title": "进口器械", "subpart": "子部分A：一般规定", "detail": "就本部分而言，被追溯器械的进口商应被视为制造商，并须遵守所有适用于制造商的要求。进口商必须将所有要求的信息保存在美国境内。", "summary": "规定进口商视同制造商，信息须保存在美国。"}, {"num": "821.20", "title": "须追溯的器械", "subpart": "子部分B：追溯要求", "detail": "(a) 符合 §821.1(a) 三个标准之一的 II/III 类器械制造商，若 FDA 向其发出追溯令，则须按本部分追溯该器械。 (b) 在对上市前通知或上市前批准申请作出回应时，FDA 将通知申办方其认为器械符合标准，并命令其进行追溯。", "summary": "明确 FDA 通过发布命令来指定须追溯的器械。"}, {"num": "821.25", "title": "追溯系统与内容要求", "subpart": "子部分B：追溯要求", "detail": "(a) 制造商须采用追溯方法，使其能在 FDA 要求时提供以下信息：(1) 在分销给患者前，3 个工作日内提供分销商/最终分销商持有器械的位置；(2) 单患者器械：10 个工作日内提供 UDI/批号、装运日期、患者信息、处方医师信息等；(3) 多患者器械：10 个工作日内提供 UDI、装运日期、多重分销商信息等。 (b) 须保持当前记录。 (c) 建立书面标准操作程序，包括数据收集、修改记录及质量审核程序（前 3 年每 6 个月一次，之后每年至少一次）。 (d) 若发现分销商未遵守，制造商须通知 FDA。 (e) 可申请豁免或变更。", "summary": "详细规定了制造商追溯系统中必须收集和保存的信息内容及质量审核要求。"}, {"num": "821.30", "title": "分销商的追溯义务", "subpart": "子部分C：附加要求与责任", "detail": "(a) 分销商、最终分销商或多重分销商在收购追溯器械后，须立即向制造商提供其名称、地址、UDI/批号、收到日期、来源等。 (b) 最终分销商在销售或分发器械后，须立即提供最终分销商信息、UDI、患者信息、处方医师等。 (c) 多重分销商须保存每次分发的患者信息、位置、日期、处方医师等记录，并按要求在 5 或 10 个工作日内向制造商或 FDA 提供。 (d) 须按要求向制造商提供记录以供审核。 (e) 可申请豁免或变更。", "summary": "规定了分销商层级在追溯系统中的信息提供义务。"}, {"num": "821.50", "title": "可用性", "subpart": "子部分D：记录与检查", "detail": "(a) 制造商和分销商须在 FDA 检查时提供所有要求的记录和信息。 (b) 记录须保存在美国境内的集中点。", "summary": "要求记录须在美国境内集中保存并随时供 FDA 检查。"}, {"num": "821.55", "title": "保密性", "subpart": "子部分D：记录与检查", "detail": "(a) 患者可拒绝为追溯目的披露其姓名、地址、电话、社保号等信息。 (b) 提交的记录受第 20 部分保护，患者身份信息不予公开。 (c) 患者信息可在健康或安全需要时披露给制造商或医师，但不得进一步披露。", "summary": "保护患者隐私，允许患者拒绝披露个人信息。"}, {"num": "821.60", "title": "记录的保存", "subpart": "子部分D：记录与检查", "detail": "要求保存记录的人员须在其制造或分销的每个被追溯器械的有用寿命期间保存记录。有用寿命指器械在使用或分销中的时间。", "summary": "规定记录保存期限为器械的有用寿命。"}], "definitions": [{"term": "被追溯器械", "def": "满足 §821.1(a) 三标准之一且受 FDA 追溯令约束的器械。"}, {"term": "严重不良健康后果", "def": "任何显著不良事件，含危及生命或导致永久/长期损伤的器械相关事件。"}, {"term": "多重分销商", "def": "用户机构、租赁公司或其他在器械有用寿命内分发给多名患者的生命支持/维持器械的实体。"}, {"term": "最终分销商", "def": "将被追溯器械分发予单患者使用的主体，含持证从业者、零售药房、医院等用户机构。"}], "related": ["part830", "part820", "part810", "part806"]}, {"id": "part803", "num": "Part 803", "category": "postmarket", "title_cn": "医疗器械报告（MDR）", "title_en": "Medical Device Reporting", "tags": ["MDR", "不良事件", "死亡", "严重伤害", "故障", "投诉"], "overview": "Part 803 规定器械用户机构、制造商、进口商与分销商的医疗器械报告（MDR）义务：报告导致或可能促成死亡、严重伤害的器械事件，以及（制造商/进口商）某些器械故障；并建立书面 MDR 程序与事件文件。", "applicability": "用户机构：报告死亡与严重伤害，建立不良事件文件，提交年度摘要报告。制造商/进口商：报告死亡、严重伤害及某些故障，建立事件文件，提交后续报告。分销商：仅须保存事件记录（不要求报告）。本部分补充而非取代本章其他规定（含 Part 820）。", "timelines": [{"when": "用户机构：10 个工作日", "what": "获悉可报告事件后，死亡报告送 FDA+制造商，严重伤害报告送制造商（未知则送 FDA）（§803.10(a), §803.30）。"}, {"when": "进口商：30 个日历日", "what": "获悉死亡/严重伤害报 FDA+制造商；故障报制造商（§803.10(b), §803.40）。"}, {"when": "制造商：30 个日历日", "what": "获悉死亡/严重伤害/故障后报告 FDA（§803.10(c), §803.50）。"}, {"when": "制造商：5 个工作日", "what": "需补救行动以防止对公共健康的重大不合理风险，或 FDA 书面要求时（§803.53）。"}, {"when": "事件后 2 年或预期寿命（取长者）", "what": "MDR 事件文件保存期（§803.18(c)）。"}, {"when": "变更后 5 天", "what": "外国制造商的美国代理信息变更须 5 日内报 FDA（§803.58(a)）。"}], "sections": [{"num": "803.1", "title": "本部分涵盖哪些内容？", "subpart": "子部分A：一般规定", "detail": "(a) 本部分为设备使用机构、制造商、进口商和分销商确立了医疗器械报告要求。若您是设备使用机构，您必须报告设备导致或可能导致死亡和严重伤害的事件，建立和维护不良事件文件，并提交年度摘要报告。若您是制造商或进口商，您必须报告设备导致或可能导致死亡和严重伤害的事件，报告某些器械故障，并建立和维护不良事件文件。若您是制造商，还必须提交指定后续报告。这些报告有助于 FDA 保护公共卫生。若您是分销商，您必须保存事件记录，但无需报告。 (b) 本部分补充而非取代本章其他规定，包括第 820 部分。 (c) 本部分对 CFR 章节的引用，除非另有说明，均指 21 篇第 I 章。", "summary": "概述了用户机构、制造商、进口商和分销商各自不同的报告义务。"}, {"num": "803.3", "title": "FDA 如何定义本部分使用的术语？", "subpart": "子部分A：一般规定", "detail": "本部分使用的术语定义如下： “门诊手术机构（ASF）”指主要提供当日门诊手术服务的独立实体，无论是否获得许可或认证。 “意识到”指需报告实体的员工获得了合理表明可报告不良事件已发生的信息。用户机构中“意识到”指医务人员获得信息；制造商中“意识到”指任何员工或负有管理/监督职责的人员从任何信息（包括趋势分析）中意识到。 “导致或促成”指死亡或严重伤害归因于或可能归因于器械，包括因失效、故障、设计不当、制造、标签或用户错误而发生的事件。 “设备使用机构”指医院、ASF、护理院、门诊诊断或治疗机构（非医师办公室）。学校护士室和员工健康室不是设备使用机构。 “分销商”指促进器械营销但不重新包装者。若重新包装，则视为制造商。 “预期寿命”指器械投入使用后预期保持功能的时间。 “5 天报告”指制造商须在 5 个工作日内向 FDA 提交的 MDR 报告。 “医院”指主要提供诊断、治疗、手术等服务的实体。 “进口商”指将器械进口到美国并促进营销但不重新包装者。 “故障”指器械未能达到其性能规格或按预期发挥功能。 “制造商”指通过化学、物理、生物或其他程序制造、准备、配制、组装或加工器械者，包括重新包装、发起规格、制造组件或作为外国制造商的美国代理。 “制造商或进口商报告编号”由注册号、年份和序列号组成。 “MDR 报告事件”指用户机构获悉的死亡/严重伤害，或制造商/进口商获悉的死亡/严重伤害/故障。 “医务人员”指获许可、注册或认证的卫生保健提供者等。 “护理院”指提供专业护理、临终关怀或康复服务的机构。 “门诊诊断设施”指主要进行医学诊断测试的实体。 “门诊治疗设施”指提供非手术门诊治疗（如心脏除颤、化疗等）的实体。 “患者”指在该机构接受诊断或治疗的个人。 “医师办公室”指主要进行体检、评估、治疗或转诊的设施。 “补救行动”指为防止可报告事件再次发生而采取的非例行维护行动。 “严重伤害”指危及生命、导致永久性身体功能损害或结构损伤，或需要医疗/手术干预以防止永久损害。 “工作日”指周一至周五，联邦假日除外。 “HCT/P”指作为器械监管的人类细胞、组织产品。 “UDI”指符合 §830.20 的标识符。", "summary": "详细定义了 MDR 法规中的 30 余个关键术语，包括用户机构、严重伤害、故障等。"}, {"num": "803.9", "title": "报告中的哪些信息会向公众披露？", "subpart": "子部分A：一般规定", "detail": "(a) 我们可向公众披露根据本部分提交的任何报告。 (b) 在披露前，我们将删除：商业秘密、个人隐私信息（包括植入物序列号）、第三方自愿报告者的身份信息。 (c) 我们不会披露用户机构的身份，除非在执行法规、与制造商沟通或向国会披露时。", "summary": "规定了报告公开披露时的保密规则，保护隐私和商业秘密。"}, {"num": "803.10", "title": "通常，哪些报告要求适用于我？", "subpart": "子部分A：一般规定", "detail": "(a) 用户机构：在获知可报告事件后 10 个工作日内提交报告：死亡报告给 FDA 和制造商，严重伤害报告给制造商（未知则给 FDA）；并提交年度报告。 (b) 进口商：在获知可报告事件后 30 个日历日内提交：死亡/严重伤害报告给 FDA 和制造商，故障报告给制造商。 (c) 制造商：在获知死亡/严重伤害/故障后 30 个日历日内向 FDA 报告；若需要补救行动或 FDA 书面要求，须在 5 个工作日内报告；并提交补充报告。", "summary": "分别概述了用户机构、进口商、制造商的报告时限和报告对象。"}, {"num": "803.11", "title": "应使用什么表格提交报告？", "subpart": "子部分A：一般规定", "detail": "(a) 制造商和进口商必须使用电子格式向 FDA 提交报告，除非获得豁免。 (b) 进口商提交给制造商的报告可采用纸质或电子格式。 (c) 用户机构按 §803.12(b) 提交。 (d) FDA 3500A 表格可在 FDA 网站获取。", "summary": "规定了报告的提交格式（电子优先）和表格来源。"}, {"num": "803.12", "title": "如何提交初始和补充或后续报告？", "subpart": "子部分A：一般规定", "detail": "(a) 制造商和进口商必须以 FDA 可处理、审查和存档的电子格式提交初始和补充报告。 (b) 用户机构可电子提交或纸质提交（邮寄至指定地址）。 (c) 若遇公共卫生紧急情况，可联系 FDA 应急中心后继续提交正式报告。 (d) 可自愿向 MedWatch 电话报告。", "summary": "具体说明了电子提交的要求及紧急情况下的处理方式。"}, {"num": "803.13", "title": "报告需要用英文提交吗？", "subpart": "子部分A：一般规定", "detail": "是的，所有报告必须用英文提交。", "summary": "规定报告语言为英文。"}, {"num": "803.15", "title": "如何得知 FDA 需要更多信息？", "subpart": "子部分A：一般规定", "detail": "(a) 若需要补充信息，FDA 将书面通知您，说明需要哪些信息。 (b) 在请求中，FDA 会说明理由、截止日期，并明确识别相关事件。若口头请求，会以书面确认。", "summary": "规定了 FDA 要求补充信息的正式通知流程。"}, {"num": "803.16", "title": "提交报告是否构成承认器械导致了事件？", "subpart": "子部分A：一般规定", "detail": "否。您提交报告及 FDA 发布该报告不构成承认器械或您方导致了可报告事件。您可以否认。", "summary": "明确报告提交不构成法律责任承认。"}, {"num": "803.17", "title": "MDR 书面程序的要求是什么？", "subpart": "子部分A：一般规定", "detail": "用户机构、进口商和制造商须制定、维护和实施书面 MDR 程序，包括： (a) 内部系统，确保及时识别、沟通和评估可能须报告的事件，并建立标准化审查流程，及时传输完整报告。 (b) 文档和记录保存，包括评估信息、所有已提交报告、年度报告准备信息，并确保 FDA 可及时跟进和检查。", "summary": "要求制定书面的 MDR 程序，涵盖事件识别、评估和记录保存。"}, {"num": "803.18", "title": "MDR 文件或记录的建立和维护要求是什么？", "subpart": "子部分A：一般规定", "detail": "(a) 用户机构、进口商和制造商须建立和维护 MDR 事件文件。 (b) MDR 事件文件可引用其他信息（如病历、工程报告），须包含：评估决策记录、提交报告的副本、FDA 电子确认函。 (c) 用户机构须保存 2 年；制造商/进口商须保存 2 年或器械预期寿命（取较长者）。 (d) 分销商须建立设备投诉记录，保存 2 年或预期寿命（取较长者）。 (e) 制造商可将 MDR 文件作为投诉文件的一部分，但须显著标识。", "summary": "规定了 MDR 事件文件和投诉记录的建立、内容与保存期限。"}, {"num": "803.19", "title": "是否有豁免、变更或替代报告形式？", "subpart": "子部分A：一般规定", "detail": "(a) 以下人员豁免报告：持证从业者（用于医患关系）、仅用于研究/教学的非商业制造商、牙科或光学实验室。 (b) 制造商、进口商或用户机构可书面请求豁免、变更或替代报告形式，须说明理由。 (c) FDA 可书面批准豁免或变更，并可改变报告频率（如每季度、每年）。 (d) 若有必要，FDA 可撤销或修改豁免。 (e) 批准后，须按批准条件提交报告。", "summary": "提供了申请报告要求豁免、变更的途径。"}, {"num": "803.20", "title": "如何完成并提交个人不良事件报告？", "subpart": "子部分B：个人不良事件报告的通用要求", "detail": "(a) 表格：(1) 自愿报告使用 FDA 3500；(2) 用户机构强制报告使用 FDA 3500A；(3) 电子提交须包含 FDA 3500A 相应模块的信息。 (b) 提交对象和时间：(1) 用户机构：死亡在 10 个工作日内报制造商和 FDA，严重伤害报制造商（未知则报 FDA）；(2) 进口商：死亡/严重伤害在 30 个日历日内报制造商和 FDA，故障报制造商；(3) 制造商：死亡/严重伤害/故障在 30 个日历日内报 FDA，5 日报告按 §803.53。 (c) 合理表明事件已发生的信息包括专业、科学或医学事实；若合格人员依据信息合理判断器械未导致事件，则无需报告。", "summary": "详细说明了报告表格的选择、提交对象、时限及无需报告的情形。"}, {"num": "803.21", "title": "在哪里可以找到 MDR 报告使用的编码？", "subpart": "子部分B：个人不良事件报告的通用要求", "detail": "(a) MedWatch MDR 编码说明手册包含用于 FDA 3500A 的事件编码，可在 FDA 网站获取。 (b) FDA 可能会增加或修改编码，并公布变更信息。", "summary": "指明了 MDR 报告编码的来源和获取方式。"}, {"num": "803.22", "title": "在哪些情况下无需提交报告？", "subpart": "子部分B：个人不良事件报告的通用要求", "detail": "(a) 若从多个来源获悉同一患者同一事件，可提交一份报告。 (b) 若确定收到的信息有误且设备不良事件未发生，则无需报告，但须保存相关文档。若制造商或进口商未制造或进口该设备，应转发信息并附说明信。", "summary": "列举了无需提交报告的例外情形。"}, {"num": "803.23", "title": "在哪里可以获得电子提交 MDR 的准备信息？", "subpart": "子部分B：个人不良事件报告的通用要求", "detail": "(a) 可在 FDA 网站获取电子提交的准备和提交信息。 (b) FDA 会更新信息并在 eMDR 网页上通知。", "summary": "提供了电子报告的技术资源获取途径。"}, {"num": "803.30", "title": "用户机构的报告要求是什么？", "subpart": "子部分C：用户机构报告要求", "detail": "(a) 死亡报告：须在获知器械可能导致患者死亡的信息后 10 个工作日内向 FDA 和制造商（如已知）报告。严重伤害报告：须在 10 个工作日内向制造商报告（未知则向 FDA 报告）。 (b) 需提交所有“合理已知”的信息，包括拥有的文档及合理跟踪可获得的信息，无需调查评估未知信息。", "summary": "具体规定了用户机构报告死亡和严重伤害的时限与对象。"}, {"num": "803.32", "title": "用户机构须在个人不良事件报告中包含哪些信息？", "subpart": "子部分C：用户机构报告要求", "detail": "须在合理已知的情况下包含以下信息（对应 FDA 3500A 模块）： (a) 患者信息（模块A）：姓名或标识、年龄、性别、体重。 (b) 不良事件或产品问题（模块B）：事件标识、结果（死亡/严重伤害）、事件日期、报告日期、事件描述（包括器械参与方式、问题性质、随访/治疗、环境条件）、相关测试及病史。 (c) 器械信息（模块D）：品牌名、产品代码、制造商信息、型号/目录/序列/批号、UDI、操作者、植入/取出日期、是否一次性使用再处理、再处理商、是否可评估/退回、伴随产品。 (d) 初始报告人信息（模块E）：姓名、地址、电话、是否为卫生专业人员、职业、是否抄送 FDA。 (e) 用户机构信息（模块F）：标记为用户报告、机构编号、地址、联系人、获知日期、报告类型、报告日期、器械大致年龄、事件代码、是否发送给 FDA/制造商等。", "summary": "详细列出了用户机构在 MDR 报告中必须填写的所有数据字段。"}, {"num": "803.33", "title": "用户机构年度报告包含哪些内容？", "subpart": "子部分C：用户机构报告要求", "detail": "(a) 须在每年 1 月 1 日前使用 FDA 3419 表格提交年度报告。 (b) 包含：CMS 编号、报告年度、名称地址、报告总数、报告日期范围、联系人信息、以及每个可报告事件的报告编号、制造商信息、器械名称、型号/UDI、事件简要描述、提交去向。 (c) 可提交报告副本代替列表。 (d) 若本年度未提交任何报告，则无需提交年度报告。", "summary": "规定了用户机构年度报告的内容和提交时间。"}, {"num": "803.40", "title": "进口商的报告要求是什么？", "subpart": "子部分D：进口商报告要求", "detail": "(a) 死亡或严重伤害：在收到或意识到信息后 30 个日历日内向 FDA 和制造商报告。 (b) 故障：在收到或意识到故障信息后 30 个日历日内向制造商报告，若该故障复发可能导致死亡或严重伤害。", "summary": "进口商须在 30 天内报告死亡/严重伤害/故障。"}, {"num": "803.42", "title": "进口商须在个人不良事件报告中包含哪些信息？", "subpart": "子部分D：进口商报告要求", "detail": "须包含与用户机构报告类似的信息（模块 A-F），但将“用户机构信息”替换为“进口商信息”，包括进口商报告编号、地址、联系人、获知日期、报告类型、事件代码、是否发送 FDA/制造商等。", "summary": "进口商报告内容与用户机构类似，但使用进口商信息模块。"}, {"num": "803.50", "title": "制造商的报告要求是什么？", "subpart": "子部分E：制造商报告要求", "detail": "(a) 须在获知信息后 30 个日历日内向 FDA 报告其营销的器械可能已导致或促成死亡/严重伤害，或发生故障且若复发可能导致死亡/严重伤害。 (b) “合理已知”包括：通过联系用户机构、进口商可获得的信息；自身拥有的信息；通过分析、测试或评估可获得的信息。制造商负责从用户设施和进口商处获取缺失信息，并对每个事件进行调查和评估。", "summary": "制造商须在 30 天内报告死亡、严重伤害及特定故障，并承担信息获取和调查责任。"}, {"num": "803.52", "title": "制造商须在个人不良事件报告中包含哪些信息？", "subpart": "子部分E：制造商报告要求", "detail": "须包含患者信息（模块A）、事件信息（模块B）、器械信息（模块D）、初始报告人信息（模块E）、制造商报告信息（模块G：联系人、来源、PMANumber、报告类型、报告编号）以及设备制造商信息（模块H：事件类型、后续类型、评估总结、制造日期、是否单次使用、评估代码、补救行动、使用状态、召回编号、附加说明及更正数据）。", "summary": "制造商报告在基础信息上，还需添加制造商专属的模块 G 和 H 信息。"}, {"num": "803.53", "title": "制造商何时须提交 5 天报告？", "subpart": "子部分E：制造商报告要求", "detail": "在以下情形后 5 个工作日内向 FDA 提交 5 天报告：(a) MDR 报告事件需要补救行动以防止对公共健康造成重大不合理风险；(b) FDA 书面要求提交 5 天报告。若收到 FDA 书面要求，对于随后发生的同类事件，须在指定期限内继续提交。", "summary": "规定了需要在 5 个工作日内报告的紧急情形。"}, {"num": "803.56", "title": "制造商何时须提交补充或后续报告？", "subpart": "子部分E：制造商报告要求", "detail": "若获得了初始报告时未知或不可用的信息，须在获得信息后 30 个日历日内向 FDA 提交补充信息。补充报告须注明为补充/后续，提供原报告编号，仅包含新的、变更的或更正的信息。", "summary": "规定制造商在获取新信息后须在 30 天内提交补充报告。"}, {"num": "803.58", "title": "外国制造商", "subpart": "子部分E：制造商报告要求", "detail": "(a) 在美国分销器械的每个外国制造商须指定一名美国代理负责报告。外国制造商须书面通知 FDA 代理信息，并在变更后 5 天内更新。 (b) 美国代理须：向 FDA 报告、获取调查信息、转发投诉、维护投诉文件、注册列名。 [注：§803.58 曾被无限期中止] ", "summary": "外国制造商须指定美国代理，代理承担本地报告和沟通责任。"}], "definitions": [{"term": "MDR 事件", "def": "用户机构获悉器械可能促成死亡/严重伤害，或制造商/进口商获悉其器械可能促成死亡/严重伤害或故障且类似器械复发可能致死亡/严重伤害。"}, {"term": "严重伤害", "def": "危及生命；导致身体功能永久损害或结构永久损伤；或需医疗/手术干预以防永久损害。"}, {"term": "故障", "def": "器械未满足其性能规格或未按预期发挥功能（性能规格含标签中所有声明）。"}, {"term": "引起或促成", "def": "死亡或严重伤害归因或可能归因、或可归因子器械，含失败、故障、设计不当、制造、标签或用户错误。"}, {"term": "用户机构", "def": "医院、门诊手术机构、护理院、门诊诊断或治疗机构（非医师办公室）；学校护士室与员工健康室不算。"}], "related": ["part820", "part806", "part810", "part807"]}, {"id": "part806", "num": "Part 806", "category": "postmarket", "title_cn": "纠正与移除报告", "title_en": "Medical Devices; Reports of Corrections and Removals", "tags": ["纠正", "移除", "召回", "报告", "记录"], "overview": "Part 806 实施法案 §519(g)，要求器械制造商与进口商就某些纠正与移除行动及时向 FDA 报告，并对所有纠正与移除（无论是否须报告）保存记录。", "applicability": "适用于制造商与进口商发起的纠正与移除。以下豁免报告：仅为提升性能/质量且未降低健康风险或补救违规；市场撤回；常规维修；库存恢复。", "timelines": [{"when": "发起后 10 个工作日", "what": "须报告的纠正/移除须于发起后 10 个工作日内书面报告 FDA（§806.10(b)）。"}, {"when": "扩展后 10 个工作日", "what": "同一纠正/移除扩展至同器械额外批/ lot 时，须修订报告（§806.10(d)）。"}, {"when": "停售/停进口后 2 年 + 预期寿命", "what": "不要求报告的纠正/移除记录须保存 2 年超出器械预期寿命，并转移给新制造商/进口商（§806.20(c)）。"}], "sections": [{"num": "806.1", "title": "范围", "subpart": "子部分A：一般规定", "detail": "(a) 本部分实施法案 §519(g)，要求制造商和进口商及时向 FDA 报告某些纠正和移除行动，并保存所有纠正和移除的记录（无论是否须报告）。 (b) 以下行动免于报告：(1) 仅为提高性能或质量但不降低健康风险或补救违规的行动；(2) 市场撤回；(3) 常规维修；(4) 库存恢复。", "summary": "概述了报告义务和报告豁免情形。"}, {"num": "806.2", "title": "定义", "subpart": "子部分A：一般规定", "detail": "本部分使用以下定义： “纠正”指在不将器械从使用点移走的情况下进行的修理、改装、调整、重新贴标、销毁或检查。 “移除”指将器械从使用点物理移走。 “市场撤回”指涉及轻微违规或无违规的纠正/移除（如正常库存轮换）。 “风险健康”指合理概率导致严重不良健康后果或死亡，或可能导致暂时/可逆不良后果。 “常规维修”指定期维护，包括正常寿命末期部件更换。 “库存恢复”指尚未上市或仍在制造商直接控制下的器械的纠正/移除。 “HCT/P”指作为器械监管的 HCT/P。 “进口商”指将器械进口到美国的人。 “制造商”指制造、准备、配制、组装或加工器械的人，包括重新包装者、发起规格者或制造组件者。", "summary": "定义了纠正、移除、市场撤回、常规维修等关键术语。"}, {"num": "806.10", "title": "纠正与移除报告", "subpart": "子部分B：报告与记录", "detail": "(a) 若纠正或移除是为降低健康风险或补救违规，制造商或进口商须向 FDA 提交书面报告。 (b) 须在发起纠正/移除后 10 个工作日内提交。 (c) 报告须包含：注册号、公司信息、器械品牌/名称、市场状态、UDI、事件描述、伤害情况、总数、生产/分销日期、收货人名单、通讯副本等。 (d) 若纠正/移除扩展到额外批次，须在 10 个工作日内修订报告。 (e) 报告不构成承认责任。 (f) 若已按第 803 或 1004 部分报告，则无需按本部分报告。", "summary": "详细规定了须报告的纠正/移除内容、格式和时限。"}, {"num": "806.20", "title": "不需要报告的纠正与移除记录", "subpart": "子部分B：报告与记录", "detail": "(a) 对于不需要向 FDA 报告的纠正或移除，制造商或进口商须保存记录。 (b) 记录须包含：器械品牌/名称、UDI、事件描述、不报告的理由、通讯副本。 (c) 记录须保存 2 年超出器械预期寿命，即使停止制造或进口。若器械转给新制造商，记录须转移。", "summary": "即使不报告，也须保存纠正/移除记录，并规定了保存期限。"}, {"num": "806.30", "title": "FDA 查阅记录", "subpart": "子部分B：报告与记录", "detail": "须在 FDA 要求时允许其查阅、复制和核实记录。", "summary": "确保 FDA 对记录的访问权。"}, {"num": "806.40", "title": "报告的公开性", "subpart": "子部分B：报告与记录", "detail": "(a) 报告按第 20 部分向公众公开。 (b) 披露前删除商业秘密、个人隐私及植入物序列号等信息。", "summary": "规定报告公开时的保密处理原则。"}], "definitions": [{"term": "纠正", "def": "不将器械从使用点移走而进行的修理、改装、调整、重新贴标、销毁或检查（含患者监测）。"}, {"term": "移除", "def": "将器械从使用点物理移走以进行修理、改装、调整、重新贴标、销毁或检查。"}, {"term": "市场撤回", "def": "涉及轻微违规或无违规的已分销器械纠正/移除，如正常库存轮换。"}, {"term": "常规维修", "def": "定期维护，含正常寿命末期部件更换（校准、电池更换、正常磨损）；非预期维修不算。"}, {"term": "库存恢复", "def": "尚未上市或仍在制造商直接控制下的器械的纠正/移除。"}], "related": ["part803", "part810", "part821", "part820"]}, {"id": "part810", "num": "Part 810", "category": "postmarket", "title_cn": "医疗器械召回权限", "title_en": "Medical Device Recall Authority", "tags": ["召回", "强制召回", "停止分销", "通知令", "FDA执法"], "overview": "Part 810 规定 FDA 依法案 §518(e) 行使强制医疗器械召回权力的程序：从“停止分销与通知令”到“强制召回令”，含监管听证、书面复核、召回策略、状态报告与终止。", "applicability": "适用于 FDA 认定存在合理概率（more likely than not）会导致严重不良健康后果或死亡的器械。召回定义为：为纠正或移除该器械，且 FDA 认定存在导致严重不良健康后果或死亡的合理概率。", "timelines": [{"when": "收到令后 ≥2 工作日（不迟于 10 工作日）", "what": "监管听证通常安排区间（§810.11(e)）。"}, {"when": "听证/复核后 15 工作日", "what": "FDA 发出最终决定（确认/修改/撤销或修订为强制召回）（§810.11(e), §810.12(c), §810.13）。"}, {"when": "策略提交后 7 工作日", "what": "FDA 审查并修改拟议召回策略（§810.14(b)(2)）。"}, {"when": "终止请求后 30 工作日", "what": "FDA 书面答复终止请求（§810.17(c)）。"}], "sections": [{"num": "810.1", "title": "范围", "subpart": "子部分A：一般规定", "detail": "本部分描述了 FDA 根据法案 §518(e) 行使医疗器械召回权力的程序。", "summary": "概述了强制召回程序的法规范围。"}, {"num": "810.2", "title": "定义", "subpart": "子部分A：一般规定", "detail": "本部分定义如下： “停止分销与通知策略”或“强制召回策略”指被指令人为遵守命令而制定的具体行动计划。 “收货人”指收到、购买或使用受令器械的主体（不含患者）。 “纠正”指不移动器械的修理、调整等。 “健康专业人员”指医师、护士、药师等。 “合理概率”指事件更可能发生。 “严重不良健康后果”指危及生命或永久/长期损伤。 “召回”指 FDA 认定存在合理概率导致严重不良健康后果或死亡的纠正或移除。 “移除”指物理移走器械。 “UDI”指符合 §830.20 的标识符。", "summary": "定义了召回程序中使用的关键术语，如召回、合理概率、严重不良健康后果等。"}, {"num": "810.3", "title": "时间计算", "subpart": "子部分A：一般规定", "detail": "计算时间时，起始事件日不计入，仅计算工作日。", "summary": "规定了时间计算规则（基于工作日）。"}, {"num": "810.4", "title": "命令送达", "subpart": "子部分A：一般规定", "detail": "命令可由 FDA 员工当面送达，或通过挂号信/类似邮件送达至记录中的最后地址。", "summary": "规定了命令的送达方式。"}, {"num": "810.10", "title": "停止分销与通知令", "subpart": "子部分B：强制召回程序", "detail": "(a) 若 FDA 经磋商后认定器械存在导致严重不良健康后果或死亡的合理概率，可发布停止分销与通知令，要求被指令人立即停止分销、通知健康专业人员和用户机构停止使用。 (b) 命令须包含：要求、器械描述（含 UDI）、FDA 认定理由。 (c) 可附通知信模板。 (d) 可要求提交产品数量、分销信息、通知信副本、进度报告等。 (e) 被指令人有权要求监管听证。 (f) 也可选择提交书面复核请求。", "summary": "详细规定了 FDA 发布停止分销与通知令的条件、内容和被指令人权利。"}, {"num": "810.11", "title": "监管听证", "subpart": "子部分B：强制召回程序", "detail": "(a) 听证请求须在指定时限内书面提交（通常不少于 3 个工作日）。 (b) 听证限于审查命令，决定是否确认、修改或撤销，或修订为强制召回。 (c) 听证按第 16 部分程序进行。 (d) 未在时限内请求视为放弃。 (e) 听证通常安排在收到请求后 2 至 10 个工作日内。FDA 在听证后 15 个工作日内书面通知最终决定。", "summary": "规定了监管听证的请求、时限、范围和最终决定时间。"}, {"num": "810.12", "title": "停止分销与通知令的书面复核请求", "subpart": "子部分B：强制召回程序", "detail": "(a) 可选择提交书面请求代替听证，要求修改或撤销命令。 (b) 请求须说明理由，并讨论适当的策略。 (c) FDA 官员在收到书面请求后 15 个工作日内书面通知决定。", "summary": "提供了不举行听证而要求复核的替代途径。"}, {"num": "810.13", "title": "强制召回令", "subpart": "子部分B：强制召回程序", "detail": "(a) 若被指令人未请求听证/复核，或听证/复核后 FDA 决定召回，FDA 应在 15 个工作日内修订命令为强制召回令。 (b) 命令可指定召回层级（批发/零售/用户）、时间表，要求提交策略和进度报告。 (c) 不得要求从个人召回，也不得要求从用户机构召回（若风险更大），除非可立即更换。 (d) 须包含对受影响个人的通知条款。", "summary": "规定了强制召回令的发布条件、内容和限制。"}, {"num": "810.14", "title": "停止分销/召回策略", "subpart": "子部分B：强制召回程序", "detail": "(a) 被指令人须制定适合具体情况的策略，考虑不良后果性质、器械识别难易度、风险明显程度等。 (b) 在指定时限内提交策略；FDA 在 7 个工作日内审查并做出必要修改。 (c) 策略须指定召回层级（消费者/零售/批发）、提供个人通知、并进行有效性核查（个人拜访、电话等）。", "summary": "描述了召回策略的制定原则、提交和审查流程。"}, {"num": "810.15", "title": "召回令相关通讯", "subpart": "子部分B：强制召回程序", "detail": "被指令人负责及时通知每个健康专业人员、用户机构、收货人或个人。", "summary": "要求被指令人负责执行通知。"}, {"num": "810.16", "title": "状态报告", "subpart": "子部分B：强制召回程序", "detail": "(a) 须按命令规定频率向 FDA 提交状态报告。 (b) 报告内容包含：通知数量、响应数量、器械退回/纠正数量、有效性检查结果、预计完成时间。 (c) 命令终止后可停止提交。", "summary": "规定了召回执行期间的定期状态报告要求。"}, {"num": "810.17", "title": "召回令的终止", "subpart": "子部分B：强制召回程序", "detail": "(a) 被指令人可书面请求终止命令，并证明已完全遵守。 (b) FDA 可在确认已采取一切合理努力通知并指示停止使用，或已将器械撤市/纠正后终止命令。 (c) FDA 在收到请求后 30 个工作日内书面答复。", "summary": "规定了召回令的终止条件和程序。"}, {"num": "810.18", "title": "公开通知", "subpart": "子部分B：强制召回程序", "detail": "FDA 将在每周执法报告中公布强制召回列表，但若过早通知可能引起不必要焦虑，则会延迟公布。", "summary": "规定 FDA 对强制召回的公开披露方式。"}], "definitions": [{"term": "召回", "def": "为纠正或移除器械，且 FDA 认定存在导致严重不良健康后果或死亡的合理概率。"}, {"term": "合理概率", "def": "事件更可能发生而非不发生。"}, {"term": "严重不良健康后果", "def": "任何显著不良体验，含危及生命或永久/长期损伤，不含非危及且暂时可逆转者。"}, {"term": "停止分销与通知策略/强制召回策略", "def": "被指令人须采取的计划性具体行动方针，涉及通知范围、公共警示必要性与有效性核查程度。"}, {"term": "收货人", "def": "收到、购买或使用受令器械的主体或企业（不含外行个人/患者）。"}], "related": ["part806", "part803", "part821"]}, {"id": "part807", "num": "Part 807", "category": "market", "title_cn": "企业注册与器械列名", "title_en": "Establishment Registration and Device Listing", "tags": ["注册", "列名", "510(k)", "美国代理", "外国企业", "FURLS"], "overview": "Part 807 规定医疗器械制造企业与初始进口商的企业注册与器械列名制度，以及外国企业的注册、美国代理与进口商识别要求，并包含上市前通知（510(k)）程序。", "applicability": "适用于从事制造/制备/繁殖/配制/装配/加工的本土与外国企业（含规格开发、灭菌、重新贴标、再制造、单用途器械再处理、初始进口等）。部分主体豁免注册（如原料/组件制造商、纯兽用、通用物品、持证从业者、药店、仅研究/教学、承运商、单纯服务提供者等）。", "timelines": [{"when": "进入运营后 30 天", "what": "首次须注册的企业须于进入 §807.20(a) 运营后 30 天内注册并提交列名（§807.22(a)）。"}, {"when": "每年 10-01 至 12-31", "what": "所有企业须年度注册并更新列名信息，确认准确性（§807.22(b)）。"}, {"when": "变更后 30 天", "what": "注册信息变更须 30 天内更新（§807.22(b)(2)）。"}, {"when": "上市前至少 90 天", "what": "须提交 510(k) 者须于拟开始商业分销前至少 90 天提交（§807.81(a)）。"}, {"when": "美国代理变更后 10 营业日", "what": "外国企业美国代理信息变更须 10 营业日内报 FDA（§807.40(b)(3)）。"}], "sections": [{"num": "807.3", "title": "定义", "subpart": "子部分A：一般规定", "detail": "本部分定义如下： “商业分销”指持有或提供销售的任何分销，但不包括内部转移、研究用器械豁免下的分销、某些 III 类研究器械、或外国企业不进口美国的分销。 “企业”指单一管理下单一物理位置的制造场所。 “制造、准备、配制、组装或加工”包括再包装、初始进口、发起规格等活动。 “官方通讯员”指负责年度注册、联络、列名及接收信函的指定人员。 “所有者或运营者”指直接负责注册企业活动的法人、子公司等。 “初始进口商”指从外国制造商进一步营销至最终用户的进口商（不重新包装）。 “进口商”指在美国的拥有者、收货人或接收者（不含最终消费者）。 “进口或拟进口人”指外国企业用于便利进口的代理、经纪人或实体。 “美国代理”指外国企业在美指定代理人（须实际存在）。 “510(k) 摘要”指安全性有效性信息摘要。 “510(k) 声明”指关于信息可应要求提供的声明。 “FURLS”指 FDA 统一注册与列名系统。", "summary": "定义了注册列名和 510(k) 相关的核心术语。"}, {"num": "807.20", "title": "谁必须注册并提交器械列名？", "subpart": "子部分B：企业注册程序", "detail": "(a) 从事制造、准备、配制、组装或加工供人使用器械的企业所有者或运营者须注册并提交列名信息，除非依 §510(g) 或 D 子部分豁免。 “器械”包括 IVD 产品。注册列名要求适用于规格开发、灭菌、再包装、重新标签、再处理、初始进口、组件/附件制造商等。 (b) 注册或列名不构成产品为器械的认定或承认。 (c) 批发分销商（不制造/再包装/加工/重新标签）不须注册。 (d) HCT/P 按第 1271 部分 B 子部分注册。 (e) 生物制品许可器械按第 607 部分注册。", "summary": "明确了须注册列名的实体范围及例外情形。"}, {"num": "807.21", "title": "如何注册和列名？", "subpart": "子部分B：企业注册程序", "detail": "(a) 须使用 FDA 电子注册列名系统提交信息，除非获得纸质提交豁免。 (b) 可申请电子提交豁免（须证明使用互联网不合理）。 (c) 获得豁免者按 §807.34 邮寄提交。 (d) 额外信息（如标签）可通过邮寄或电子邮件提交。", "summary": "规定了注册列名的电子提交方式及豁免申请流程。"}, {"num": "807.22", "title": "注册与列名时间", "subpart": "子部分B：企业注册程序", "detail": "(a) 初始注册：须在进入运营后 30 天内注册并提交列名。 (b) 更新：每年 10 月 1 日至 12 月 31 日进行年度注册；注册信息变更后 30 天内更新；列名信息每年审查更新，变更时可随时更新。 (c) 未按时提交将导致“注册失败”或“列名失败”状态。", "summary": "规定了初始注册、年度注册和信息更新的具体时间要求。"}, {"num": "807.25", "title": "注册与列名所需信息", "subpart": "子部分B：企业注册程序", "detail": "(a) 须通过电子系统提交，除非获豁免。电子提交须符合 Part 11（豁免 §11.10(b),(c),(e)）。 (b) 注册信息包括：企业名称地址、网站、所有者/运营者信息、官方通讯员信息、所有商号。 (c) 豁免者以纸质提交。 (d) 须保存官员/董事/合伙人名单，应要求提供。 (e) 指定官方通讯员。 (f) 官方通讯员指定不影响所有者责任。 (g) 列名信息包括：注册号、企业名称、产品代码、品牌名称、上市前提交号、每个企业开展的活动（制造、再包装、重新标签、规格开发等）。", "summary": "详细列出了注册和列名必须提交的信息字段。"}, {"num": "807.26", "title": "额外的列名信息", "subpart": "子部分B：企业注册程序", "detail": "(a) 须保存历史文件，包含初始列名日及 1978 年 10 月 10 日后使用的标签和广告。 (b) 列名后发生重大变更的标签/广告也须保存。 (c) 可丢弃停产器械 3 年后的标签/广告。 (d) 文件位置可多处存放，但须可及时检索。 (e) 应 FDA 具体要求提交：标签、广告副本、器械分类依据、分销商名单等。", "summary": "要求企业保存标签和广告历史文件，并应要求提交。"}, {"num": "807.28", "title": "更新列名信息", "subpart": "子部分B：企业注册程序", "detail": "(a) 若新增企业开始对列名器械开展活动，或企业开始/停止某项活动，须更新。 (b) 若引入新产品代码或新上市前提交号，须创建新列名。 (c) 外国企业在器械进口前须完成列名。 (d) 停产器械须在系统中停用列名。 (e) 若恢复生产，须重新激活列名并更新变更。 (f) FDA 为每个产品代码或上市前提交号分配一个列名编号。", "summary": "规定了列名信息的更新场景和操作方法。"}, {"num": "807.34", "title": "获得电子提交豁免者的要求摘要", "subpart": "子部分B：企业注册程序", "detail": "(a) 获得豁免者须邮寄包含所有注册和列名信息的信函至指定地址。 (b) 每年 10 月 1 日至 12 月 31 日更新。 (c) 未按时提交将导致“失败”状态。", "summary": "为纸质提交者提供了具体的邮寄地址和年度更新要求。"}, {"num": "807.35", "title": "注册人通知", "subpart": "子部分B：企业注册程序", "detail": "(a) FDA 验证初始注册信息后，将分配注册号和企业编号，发送给官方通讯员。 (b) 若同一企业也制造生物制品或药品，须按第 607 或 207 部分注册。 (c) 注册和列名不表示 FDA 对器械状态的法律认定。", "summary": "说明注册号码的分配和法律责任声明。"}, {"num": "807.37", "title": "注册与列名信息的公开性", "subpart": "子部分B：企业注册程序", "detail": "(a) 信息可供公众查阅，并发布在 FDA 网站，但 (b) 合同制造商、灭菌商、自有品牌制造商的专有名称和上市前提交号（若泄露商业关系）及列名编号不公开。", "summary": "规定了哪些信息公开，哪些信息保密。"}, {"num": "807.39", "title": "引用注册号的错标", "subpart": "子部分B：企业注册程序", "detail": "注册或分配编号不代表对产品或企业的批准。任何暗示官方批准的表述均属误导，构成错标。", "summary": "禁止利用注册号暗示官方批准。"}, {"num": "807.40", "title": "外国企业的注册列名", "subpart": "子部分C：外国企业注册程序", "detail": "(a) 外国企业须通过电子系统注册列名。 (b) 须提交美国代理信息（名称、地址、电话），代理须在美有实际存在，协助 FDA 沟通和检查安排。美国代理信息变更须在 10 个工作日内报告。 (c) 器械须在注册列名后方可进口，研究用器械除外。 (d) 信息须用英文。", "summary": "规定了外国企业的注册、美国代理任命及信息变更时限。"}, {"num": "807.41", "title": "进口商和进口申报人的识别", "subpart": "子部分C：外国企业注册程序", "detail": "(a) 外国企业须在初始注册、年度注册及变更时，通过电子系统提交其已知的每个进口商的名称、地址、联系方式及注册号，并指定该进口商接收哪些列名产品。 (b) 还须提交用于进口申报的每一人（代理、经纪人等）的信息。 (c) 须为每个个人或组织提交每个器械的现行上市前提交号。", "summary": "要求外国企业上报其美国进口商和进口代理的详细信息。"}, {"num": "807.65", "title": "企业注册豁免", "subpart": "子部分D：豁免", "detail": "以下类别免于注册： (a) 原材料或组件制造商； (b) 仅兽用器械制造商； (c) 通用物品制造商（如化学试剂）； (d) 仅用于自己诊所的持证从业人员； (e) 药房、外科用品店等零售机构； (f) 仅用于研究、教学或分析的人员； (g) 承运人； (i) 向最终用户提供服务的机构（如助听器验配师、验光师、临床实验室等）。", "summary": "列出了免于注册的各类主体和情形。"}, {"num": "807.81", "title": "何时须提交上市前通知（510(k)）", "subpart": "子部分E：上市前通知程序", "detail": "(a) 要求注册的人员须在拟开始商业分销前至少 90 天提交 510(k)，若器械：(1) 首次引入商业分销且不具有实质等同；(2) 首次由该注册人引入；(3) 已上市但有重大变更（可能显著影响安全有效性或用途变更）。 (b) 若 PMA 或重新分类请愿待决，或变更符合 PCCP，则无需提交。 (c) 辐射电子产品的还需遵守第 1002 部分。", "summary": "明确了须提交 510(k) 的三种情形和时限。"}, {"num": "807.85", "title": "上市前通知豁免", "subpart": "子部分E：上市前通知程序", "detail": "(a) 定制器械（满足 §520(b)）豁免。 (b) 首次以自己的名义分销的分销商或重新包装商，若器械在 1976-05-28 前已上市或已有他人提交 510(k)，则豁免。", "summary": "列举了 510(k) 豁免情形。"}, {"num": "807.87", "title": "510(k) 所需信息", "subpart": "子部分E：上市前通知程序", "detail": "每个 510(k) 须包含： (a) 器械名称（商品名和通用名）； (b) 注册号； (c) 分类及所属小组； (d) 遵守性能标准的措施； (e) 标签、标识和广告； (f) 与可比产品的异同说明及数据； (g) 变更/修改的安全有效性数据； (h) 510(k) 摘要或声明； (i) 财务披露； (j) 临床试验合规声明； (k) III 类器械的摘要和认证； (l) 真实性声明； (m) FDA 要求的其他信息。", "summary": "详细列出了 510(k) 提交必须包含的全部内容。"}, {"num": "807.90", "title": "510(k) 格式", "subpart": "子部分E：上市前通知程序", "detail": "每个 510(k) 须：(a) 提交至相应中心地址；(c) 以单一电子版本提交；(d) 每个产品单独提交；(e) 封面信标注“510(k) Notification”。", "summary": "规定了 510(k) 的提交地址和格式要求。"}, {"num": "807.92", "title": "510(k) 摘要的内容与格式", "subpart": "子部分E：上市前通知程序", "detail": "摘要须足够详细，包含：提交者信息、器械名称、声称的 predicate 器械、器械描述、预期用途、技术特征比较。若基于性能数据，还须讨论非临床和临床测试、结论。摘要须另起一页，标识为“510(k) summary”。", "summary": "描述了 510(k) 摘要的必备内容和格式规范。"}, {"num": "807.93", "title": "510(k) 声明的内容与格式", "subpart": "子部分E：上市前通知程序", "detail": "声明须包含证明人信息，承诺在 30 天内应要求提供安全有效性信息（不含患者标识和商业秘密）。声明须单独签署并标识。", "summary": "规定了 510(k) 声明的标准文本和签署要求。"}, {"num": "807.94", "title": "III 类认证的格式", "subpart": "子部分E：上市前通知程序", "detail": "认证须包含：证明人信息、已合理搜索问题信息的声明、对问题类型的了解，并附在 III 类摘要部分的开头。", "summary": "提供了 III 类器械 510(k) 中认证声明的标准格式。"}, {"num": "807.95", "title": "信息的保密性", "subpart": "子部分E：上市前通知程序", "detail": "(a) FDA 将公开披露是否存在 510(k)，若器械已上市或提交者已公开其上市意向。 (b) 若器械未上市且未公开意向，提交者可请求 90 天保密期，须满足特定条件。 (c) 在提交补充信息、III 类重新分类等情况下，保密期可延长。 (d) 在实质等同决定后 30 天内，摘要公开。 (e) 安全有效性数据在分类后公开。", "summary": "规定了 510(k) 存在和内容在提交后不同阶段的保密规则。"}, {"num": "807.97", "title": "引用 510(k) 的错标", "subpart": "子部分E：上市前通知程序", "detail": "提交 510(k) 及随后认定实质等同，不代表器械获得官方批准。任何暗示官方批准的表述均属误导，构成错标。", "summary": "禁止利用 510(k) 提交暗示官方批准。"}, {"num": "807.100", "title": "FDA 对 510(k) 的行动", "subpart": "子部分E：上市前通知程序", "detail": "(a) FDA 审查后可：(1) 宣布实质等同；(2) 宣布非实质等同；(3) 要求补充信息；(4) 等待财务披露。 (b) 实质等同判定标准：(1) 相同预期用途；(2) 相同技术特征，或虽不同但数据证明安全有效性等同且未引起不同问题；(3) predicate 未被撤市或判定为错标/掺假。", "summary": "总结了 FDA 对 510(k) 的可能行动及实质等同的判定标准。"}], "definitions": [{"term": "企业", "def": "单一管理、单一一般物理地点下制造/装配/加工器械的场所。"}, {"term": "初始进口商", "def": "将外国制造器械进一步推向市场至最终消费者/用户、且不重新包装或改变标签/包装者。"}, {"term": "官方通讯员", "def": "所有者/运营者指定的、负责年度注册及与 FDA 就注册列名联络的人员。"}, {"term": "美国代理", "def": "外国企业在美居住或设营业地的代理人，协助 FDA 沟通与检查安排。"}, {"term": "510(k) 上市前通知", "def": "证明新器械与已合法上市 predicate 器械实质等同的上市前提交，须提前 90 天。"}, {"term": "FURLS", "def": "FDA 统一注册与列名系统（电子提交平台）。"}], "related": ["part860", "part814", "part803", "part820", "part830"]}, {"id": "part814", "num": "Part 814", "category": "market", "title_cn": "上市前批准（PMA）", "title_en": "Premarket Approval of Medical Devices", "tags": ["PMA", "III类", "上市前批准", "HDE", "PDP", "临床"], "overview": "Part 814 实施法案 §515，规定 III 类器械的上市前批准（PMA）程序：申请内容、FDA 审查时限与决定、批准后的要求，以及人道主义器械豁免（HDE）与产品开发协议（PDP）。", "applicability": "适用于任何 III 类器械（除非依 §520(g) 豁免）：1976-05-28 前未在市且不实质等同者；或依 §515(b) 法规须有批准 PMA/已完成 PDP 者；或 1976-05-28 前按新药/抗生素监管的器械。", "timelines": [{"when": "标准审查 180 天", "what": "FDA 审查 PMA 的标准目标时限（自受理起）。"}, {"when": "优先/加速等", "what": "依《医疗器械用户付费法》与指南另有优先审查（如 60/90 天目标）与加速途径（如突破性器械）。"}, {"when": "补充信息后 180 天", "what": "PMA 被视为放弃的情形：未于 FDA 请求后 180 天内回应等（§814.9(g)）。"}], "sections": [{"num": "814.1", "title": "范围", "subpart": "子部分A：一般规定", "detail": "(a) 本部分通过提供供人使用医疗器械上市前批准的程序，实施法案第 515 和 515A 节。 (b) 本部分对 CFR 的引用，除非另有说明，均指 21 篇第 I 章。 (c) 本部分适用于任何 III 类器械（除非依 §520(g) 豁免）：(1) 1976-05-28 前未上市且不等同者；(2) 依 §515(b) 法规须有批准 PMA 或完成 PDP 者；(3) 1976-05-28 前按新药或抗生素药监管者。 (d) 本部分修订了本部分生效前已批准的 PMA 的批准条件。", "summary": "确定了 PMA 法规的适用范围，即 III 类器械。"}, {"num": "814.2", "title": "目的", "subpart": "子部分A：一般规定", "detail": "本部分旨在建立高效、彻底的器械审查流程：(a) 促进已证明安全有效且符合法定标准的器械的 PMA 批准；(b) 确保未证明安全有效或不符合标准的器械的 PMA 不予批准。", "summary": "阐明 PMA 审查流程的目标是批准安全有效的器械，否决不安全的器械。"}, {"num": "814.3", "title": "定义", "subpart": "子部分A：一般规定", "detail": "本部分定义： “PMA”指 III 类器械的上市前批准申请。 “HDE”指寻求人道主义器械豁免的 PMA 申请。 “HUD”指用于治疗/诊断每年美国不超过 8000 人疾病的器械。 “PMA 补充”指对已批准 PMA 的变更申请。 “IDE”指研究用器械豁免。 “合理概率”指事件更可能发生。 “严重不良健康后果”指危及生命或永久/长期损伤。 “UDI”指符合 §830.20 的标识符。", "summary": "定义了 PMA、HDE、HUD 等核心概念。"}, {"num": "814.9", "title": "PMA 文件中数据与信息的保密性", "subpart": "子部分A：一般规定", "detail": "(a) PMA 文件包括所有提交数据。 (b) PMA 文件的存在在批准令发出前不得披露。 (c) 若未公开，文件内容不公开。 (d) 若在批准前已公开，安全有效性数据摘要可在特定情况下披露。 (e) 批准或否决后，FDA 将公布摘要。 (f) 批准/否决后，安全性有效性数据、协议、不良事件报告等可公开（删除商业秘密和隐私）。 (g) PMA 被放弃、否决、撤销、重新分类或撤回后，未公开的数据可公开。 (h) 制造方法、销售数据和定量配方等通常保密。", "summary": "详细规定了 PMA 文件中各类信息的公开时间与保密原则。"}, {"num": "814.15", "title": "境外研究", "subpart": "子部分A：一般规定", "detail": "(a) 若使用境外临床数据支持 PMA，须遵守 §812.28。 (b) 仅基于境外数据的 PMA 可在数据适用于美国人群、研究者具公认能力、且数据可验证时批准。 (c) 鼓励申请人就境外数据计划进行预先沟通。", "summary": "规定了境外临床数据用于 PMA 支持的条件。"}, {"num": "814.17", "title": "命令送达", "subpart": "子部分A：一般规定", "detail": "命令可当面送达或挂号信送达。", "summary": "规定命令送达方式。"}, {"num": "814.19", "title": "产品开发协议（PDP）", "subpart": "子部分A：一般规定", "detail": "经 FDA 宣告完成的产品开发协议（PDP）视为具有已批准的 PMA。", "summary": "PDP 完成等同于 PMA 批准。"}, {"num": "814.20", "title": "申请", "subpart": "子部分B：PMA 申请", "detail": "(a) 申请人或授权代表须签署 PMA。外国申请人须由美国授权代表会签。 (b) PMA 须以电子格式包含：名称地址、目录、摘要（适应症、器械描述、替代方案、营销史、研究摘要、结论）、器械详细描述、标准引用、技术章节（非临床和临床研究）、单项研究合理性、参考文献、样品、标签、环境评估、财务披露、儿科信息等。 (c) 可引用 FDA 档案中的信息。 (d) 若认为某项信息不适用，可说明理由。 (e) 须定期更新新增安全有效性信息。 (f) 含色素的器械须满足相关要求。", "summary": "详细列出了 PMA 申请必须包含的所有内容，是 PMA 的核心条款。"}, {"num": "814.37", "title": "PMA 修正和重新提交", "subpart": "子部分B：PMA 申请", "detail": "(a) 申请人可主动修正。 (b) FDA 可要求修正。 (c) 重大修正可延长审查期最多 180 天。 (d) 若 180 天内未回应请求，视为自愿撤回。 (e) 撤回后可重新提交。", "summary": "规定了 PMA 的修正、回应时限及撤回后重新提交的规则。"}, {"num": "814.39", "title": "PMA 补充", "subpart": "子部分B：PMA 申请", "detail": "(a) 批准后，影响安全有效性的变更须提交 PMA 补充。 (b) 不影响安全有效性的变更可在年度报告中报告。 (c) 补充须包含相关信息和儿科信息。 (d) 为增强安全的变更可通过“特殊 PMA 补充”在 FDA 批准前实施。 (e) FDA 可指定某些变更只需 30 天补充报告。 (f) 生产工艺变更可通过 30 天通知实施。 (g) 某些例外可替代补充。", "summary": "详细规定了 PMA 批准后变更的管理方式（补充、30天通知、特殊补充）。"}, {"num": "814.40", "title": "PMA 审查时限", "subpart": "子部分C：FDA 对 PMA 的行动", "detail": "在受理且无重大修正的情况下，FDA 在 180 天内完成审查，并发送批准令、可批准信、不可批准信或否决令。", "summary": "规定 FDA 审查 PMA 的标准时限为 180 天。"}, {"num": "814.42", "title": "PMA 的受理", "subpart": "子部分C：FDA 对 PMA 的行动", "detail": "(a) 受理决定在收到后 45 天内作出。 (b) 若受理，通知申请人并分配编号。 (c) 若拒绝受理，通知理由。 (d) 申请人可重新提交或请求非正式会议。 (e) 拒绝受理理由：内容不完整、缺少项目、有未决 510(k)、虚假陈述、缺少财务披露。", "summary": "规定了 PMA 受理的决定时限、拒绝理由及申请人的补救措施。"}, {"num": "814.44", "title": "PMA 审查程序", "subpart": "子部分C：FDA 对 PMA 的行动", "detail": "(a) FDA 在受理后开始审查，可提交给专家组。 (b) 专家组举行公开会议并提交建议。 (c) FDA 在 180 天内或延长后的期限内做出决定。 (d) 若满足条件，发出批准令并公开通知。 (e) 可批准信要求补充信息或条件。 (f) 不可批准信说明缺陷。 (g) 若未回应或书面撤回，视为自愿撤回。", "summary": "描述了 PMA 从专家审查到最终决定的完整流程。"}, {"num": "814.45", "title": "PMA 的否决", "subpart": "子部分C：FDA 对 PMA 的行动", "detail": "(a) 若申请不符合要求或存在 §515(d)(2) 列出的原因（如虚假陈述、标签不合规、拒绝检查、非临床/临床研究不合规等），FDA 可否决。 (b) 否决令通知缺陷。 (c) 安全性有效性判定依据 §860.7。 (d) 公开否决通知。", "summary": "列举了 FDA 否决 PMA 的理由和程序。"}, {"num": "814.46", "title": "PMA 批准的撤回", "subpart": "子部分C：FDA 对 PMA 的行动", "detail": "(a) 若存在 §515(e)(1) 中的理由（如新信息发现不安全有效、未满足批准后要求、研究不合规等），FDA 可撤回批准。 (b) 可咨询专家组。 (c) 发出听证通知。 (d) 若未请求听证或听证后决定撤回，发出撤回令。 (e) 公开撤回通知。", "summary": "规定了 FDA 撤回 PMA 批准的理由和程序。"}, {"num": "814.47", "title": "PMA 批准的临时暂停", "subpart": "子部分C：FDA 对 PMA 的行动", "detail": "(a) 若持续分销存在导致严重不良健康后果或死亡的合理概率，FDA 可临时暂停批准。 (b) 监管听证程序。 (c) 若听证后确认风险，发出临时暂停令。 (d) 须在 60 天内推进永久撤回程序。", "summary": "规定了在紧急情况下临时暂停 PMA 批准的快速机制。"}, {"num": "814.80", "title": "一般规定", "subpart": "子部分E：批准后要求", "detail": "器械的制造、包装、储存、标签、分销或广告不得与 PMA 批准令中指定的任何批准条件不一致。", "summary": "要求上市后行为须符合批准令中的条件。"}, {"num": "814.82", "title": "批准后要求", "subpart": "子部分E：批准后要求", "detail": "(a) FDA 可在批准令中附加批准后要求，包括：销售限制、持续评估和报告、标签警告、患者信息卡、记录维护、定期报告、批次检测等。 (b) 申请人须允许 FDA 访问记录和检查工厂。 (c) 未遵守批准后要求构成撤回理由。", "summary": "列举了 FDA 可能对 PMA 批准后施加的多种持续监管要求。"}, {"num": "814.84", "title": "报告", "subpart": "子部分E：批准后要求", "detail": "(a) 须遵守第 803 部分及其他适用要求。 (b) 定期报告须识别变更、包含未提交的临床/非临床文献摘要、识别正在使用和已停用的 DI。", "summary": "规定了 PMA 批准后的定期报告内容。"}, {"num": "814.100", "title": "目的与范围", "subpart": "子部分H：人道主义使用器械", "detail": "(a) 本子部分实施 §515A 和 §520(m)。 (b) 目的是鼓励治疗每年≤8000 人疾病的器械的开发。 (c) 要求提交儿科信息。 (d) 非 HUD 用途须提交 PMA。 (e) 获得 HUD 批准分两步：获得 HUD 认定，提交 HDE。 (f) 须提交定期报告。 (g) FDA 可暂停或撤回 HDE。", "summary": "HDE 制度的总体框架和目的。"}, {"num": "814.102", "title": "HUD 认定", "subpart": "子部分H：人道主义使用器械", "detail": "(a) 在提交 HDE 前，须向 FDA 孤儿产品办公室提交 HUD 认定请求，包含疾病描述、器械科学依据、年患病率≤8000 人的文献证据。 (b) FDA 在 45 天内批准、退回或否决。 (c) 若存在虚假陈述或不符合资格，可撤销认定。", "summary": "HDE 提交前必须获得 HUD 认定的程序和要求。"}, {"num": "814.104", "title": "原始申请", "subpart": "子部分H：人道主义使用器械", "detail": "(a) 须由美国代表会签。 (b) 内容包含：HUD 认定、不可替代性说明、效益风险评估、§814.20(b) 要求的信息（但临床摘要除外）、标签说明、收费报告（>$250 需独立会计师报告）、儿科信息。 (c) 可不适用时说明理由。 (d) 以电子格式提交。", "summary": "详细列出 HDE 申请必须包含的全部内容。"}, {"num": "814.106", "title": "HDE 修正和重新提交", "subpart": "子部分H：人道主义使用器械", "detail": "可参照 §814.37 修正，但时限适用 75 天而非 180 天。若 75 天内未回应，视为撤回。重大修正可延长 75 天。", "summary": "HDE 的修正规则及时限（75 天）。"}, {"num": "814.108", "title": "补充申请", "subpart": "子部分H：人道主义使用器械", "detail": "批准后的变更须按 §814.39 提交补充，新适应症须遵守 §814.110。审查时限同 HDE（75 天）。", "summary": "HDE 批准后变更的管理参照 PMA 补充规则。"}, {"num": "814.110", "title": "新适应症", "subpart": "子部分H：人道主义使用器械", "detail": "(a) 寻求新适应症须获得新 HUD 认定并提交原始 HDE。 (b) 可引用先前提交的信息。", "summary": "新适应症须重新申请 HUD 认定和 HDE。"}, {"num": "814.112", "title": "HDE 的受理", "subpart": "子部分H：人道主义使用器械", "detail": "FDA 在 30 天内决定是否受理。拒绝受理理由：内容不完整、存在可比器械、虚假陈述、缺少财务披露。受理后通知。", "summary": "HDE 的受理时限（30 天）和拒绝受理理由。"}, {"num": "814.114", "title": "HDE 审查时限", "subpart": "子部分H：人道主义使用器械", "detail": "在受理且无重大修正情况下，FDA 在 75 天内发送决定。", "summary": "HDE 的审查时限为 75 天。"}, {"num": "814.116", "title": "HDE 审查程序", "subpart": "子部分H：人道主义使用器械", "detail": "实质性审查参照 §814.44，但时限为 75 天。可批准信、不可批准信、批准令或否决令的流程与 PMA 类似，但重大修正可延长 75 天。若未回应，75 天内视为撤回。", "summary": "HDE 审查的具体程序及时限（75 天）。"}, {"num": "814.118", "title": "HDE 的否决或撤回", "subpart": "子部分H：人道主义使用器械", "detail": "(a) 否决/撤回理由：未满足 §520(m) 要求、缺乏安全证据、无效益证据、虚假陈述、标签不合规、非临床/临床研究不合规、拒绝检查、HUD 认定被撤销。 (b) 同 PMA 的公开通知。 (c) 可批准/不可批准信后的否决程序。 (d) 撤回前须提供听证机会。", "summary": "列举了 HDE 否决或撤回的具体理由。"}, {"num": "814.120", "title": "HDE 的临时暂停", "subpart": "子部分H：人道主义使用器械", "detail": "HDE 可参照 §814.47 临时暂停。", "summary": "HDE 也可因公共健康风险被临时暂停。"}, {"num": "814.122", "title": "数据与信息的保密性", "subpart": "子部分H：人道主义使用器械", "detail": "HDE 文件的公开参照 §814.9(b)-(h)。", "summary": "HDE 文件保密规则同 PMA。"}, {"num": "814.124", "title": "机构审查委员会（IRB）要求", "subpart": "子部分H：人道主义使用器械", "detail": "(a) HUD 须在经 IRB 批准的机构使用，紧急情况可事后 5 天内通知。 (b) IRB 撤回批准须在 5 个工作日内通知 FDA。", "summary": "HUD 使用须有 IRB 监督。"}, {"num": "814.126", "title": "批准后要求与报告", "subpart": "子部分H：人道主义使用器械", "detail": "(a) 须遵守 E 子部分要求（§814.82(a)(7) 除外），MDR 报告还须提交 IRB。 (b) 定期报告包含：HUD 认定更新、效益费用更新、销售数量、临床经验、变更摘要。若数量超过 8000 或引发公共卫生关切，可能须额外信息。", "summary": "HDE 批准后的持续报告义务。"}], "definitions": [{"term": "PMA（上市前批准）", "def": "III 类器械的上市前批准申请，含全部提交或引用纳入的信息；须证成安全有效。"}, {"term": "HUD（人道主义使用器械）", "def": "用于治疗或诊断每年美国不超过 8000 人的疾病或病症的器械。"}, {"term": "HDE（人道主义器械豁免）", "def": "依 §520(m)(2) 寻求免于有效性要求的上市前批准申请。"}, {"term": "PDP（产品开发协议）", "def": "经 FDA 宣告完成的产品开发协议，视为具有批准 PMA。"}, {"term": "IDE", "def": "依 §520(g) 与 Part 812/813 批准或视为批准的器械研究豁免。"}], "related": ["part807", "part860", "part803"]}, {"id": "part860", "num": "Part 860", "category": "market", "title_cn": "医疗器械分类程序", "title_en": "Medical Device Classification Procedures", "tags": ["分类", "I类", "II类", "III类", "De Novo", "重新分类"], "overview": "Part 860 实施法案 §513/514(b)/515(b)/520(l)，规定器械分类与重新分类的标准与程序，确立 I/II/III 三类监管控制，并提供 De Novo（新型器械）分类请求与重新分类请愿路径。", "applicability": "适用于 FDA 与企业、进口商及其他利害关系人参与器械分类与重新分类的程序；确定某器械适用的一般控制、特殊控制或上市前批准。", "timelines": [{"when": "分类终规发布后 30 天", "what": "I/II 类器械的安全性有效性数据可供公开披露（§860.5(c)(2)）。"}, {"when": "请愿缺陷通知后 30 / 180 天", "what": "重新分类请愿缺陷 30 天内可补正；180 天未补正则退回（§860.5(d)）。"}], "sections": [{"num": "860.1", "title": "范围", "subpart": "子部分A：一般规定", "detail": "(a) 本部分实施法案第 513、514(b)、515(b) 和 520(l) 节关于供人使用器械的分类和重新分类。 (b) 本部分规定了顾问委员会（包括分类小组）及局长使用的标准和程序，以确定适用于特定器械的监管控制类别（I、II 或 III 类）。", "summary": "概述了 Part 860 在器械分类与重新分类中的法律依据和作用。"}, {"num": "860.3", "title": "定义", "subpart": "子部分A：一般规定", "detail": "本部分定义： “类别”指三类监管控制之一： I 类：仅受一般控制；或信息不足但非生命支持且无不合理风险。 II 类：一般控制不足，但有足够信息建立特殊控制。 III 类：须上市前批准；信息不足以安全有效，且为生命支持/重要用途或存在不合理风险。 “分类小组”指依 §513 设立的顾问委员会。 “分类法规”指第 862-892 部分中确定器械类别的内容。 “De Novo 请求”指依 §513(f)(2) 请求分类为 I/II 类的提交。 “一般控制”指法案 §501、502、510、516、518、519、520 授权的控制。 “植入物”指置于人体腔隙内、预期连续植入≥30 天的器械。 “生命支持或维持器械”指对人体生命延续至关重要的器械。 “特殊控制”指为 II 类器械提供安全有效保证所需的其他控制（性能标准、监测、登记等）。", "summary": "定义了 I 类、II 类、III 类器械、De Novo 请求、植入物等关键概念。"}, {"num": "860.5", "title": "分类与重新分类中数据和信息的保密", "subpart": "子部分A：一般规定", "detail": "(a) 本部分管理分类/重新分类中提交数据的公开和使用。 (b) 通常，提交给小组的数据立即公开。 (c) 安全有效性数据：若器械分入 III 类则保密；若分入 I/II 类，则在终规发布 30 天后公开，除非证明为商业秘密。 (d) 重新分类请愿：§860.130/132 的请愿在收到时即公开；§860.134/136 的请愿在确认无缺陷后公开。 (e) 不得将商业秘密信息用于 III 类到 II 类的重新分类。 (f) 安全有效性数据包括动物和人体研究数据。 (g) De Novo 文件：批准令发布前不公开，批准令发布后立即公开（依法豁免除外）。", "summary": "规定了分类和重新分类过程中不同阶段的数据保密与公开规则。"}, {"num": "860.7", "title": "安全有效性的确定", "subpart": "子部分A：一般规定", "detail": "(a) 小组和局长在审查安全有效性证据时将适用本规则。 (b) 考虑因素：预期使用者、使用条件、效益风险比、可靠性。 (c) 依赖“有效科学证据”（来自良好对照研究、部分对照研究、无对照研究、合格专家记录的病例史及市场经验）。 (d) 安全：当效益大于风险时，有合理保证。 (e) 有效性：当在显著部分目标人群中提供临床显著结果时，有合理保证。 (f) 良好对照研究的标准：明确目标、受试者选择方法、观察记录方法、对照比较（无治疗、安慰剂、活性对照、历史对照）。 (g) 制造商有责任提供有效科学证据；FDA 可要求报告。", "summary": "这是分类和 PMA 审查中判定器械安全有效的核心科学标准条款。"}, {"num": "860.10", "title": "植入物和生命支持/维持器械", "subpart": "子部分A：一般规定", "detail": "(a) 小组将建议将任何植入物或生命支持/维持器械分入 III 类，除非确定不必要。 (b) 局长将分入 III 类，除非确定不必要。若分入其他类，须附理由。", "summary": "对植入物和生命支持器械给予默认 III 类的特殊关注。"}, {"num": "860.15", "title": "法案第 510、519 和 520(f) 节的豁免", "subpart": "子部分A：一般规定", "detail": "(a) 小组对 I 类器械的推荐可包括豁免 510、519、520(f) 的建议；对 II 类器械可包括豁免 510(k) 的建议。 (b) 分类法规将规定哪些要求被豁免。 (c) 豁免须基于“不必要”的判定。", "summary": "规定了在分类过程中可给予的法规豁免。"}, {"num": "860.84", "title": "“修正前器械”的分类程序", "subpart": "子部分B：分类", "detail": "(a) 适用于 1976-05-28 前已商业分销的器械类型。 (b) 局长将器械提交给分类小组。 (c) 小组审查安全有效性，考虑 §860.7 因素，提供机会让利益相关者提交意见。 (d) 小组提交推荐，包括理由、数据摘要、风险识别、豁免建议、特殊控制建议等。 (e) 推荐为初步。 (f) 局长在联邦公报发布推荐和拟议法规。 (g) 局长审查意见后发布终规。", "summary": "描述了 1976 年 5 月 28 日前已上市器械（修正前器械）的初始分类程序。"}, {"num": "860.90", "title": "与小组的协商", "subpart": "子部分B：分类", "detail": "(a) 局长可通过电话/视频会议或小组会议与小组协商。 (b) 方式取决于问题的重要性和时间。", "summary": "规定 FDA 与分类小组协商的方式。"}, {"num": "860.120", "title": "一般规定", "subpart": "子部分C：重新分类", "detail": "(a) 法案提供了五种重新分类途径（§513(e), 513(f), 514(b), 515(b), 520(l)）。 (b) 重新分类影响整个器械类型。 (c) 利害关系人可提交请愿，局长可主动发起。", "summary": "概述了重新分类的法律依据和参与者。"}, {"num": "860.123", "title": "重新分类请愿：内容和形式", "subpart": "子部分C：重新分类", "detail": "(a) 请愿须包含：器械类型、请求的行动、与现有分类分歧的理由、支持数据（符合 §860.7）、不利信息、新信息摘要（若适用）、原始文件、财务披露。 (b) 须提交至相应中心，标注适用的法律条款，一式三份。", "summary": "详细说明了重新分类请愿的格式和内容要求。"}, {"num": "860.125", "title": "与小组的协商", "subpart": "子部分C：重新分类", "detail": "(a) 局长可选择将请愿提交小组。 (b) 通过电话/视频或会议协商。 (c) 依 §513(e) 的重新分类须咨询小组。", "summary": "重新分类过程中与小组的协商规则。"}, {"num": "860.130", "title": "§513(e) 一般程序", "subpart": "子部分C：重新分类", "detail": "(a) 基于新信息的重新分类。 (b) 可由局长主动或应请愿发起。 (c) 类别可在 I/II/III 之间变更。 (d) 须咨询小组，并发布命令。 (e) 请愿在 180 天内处理。 (f) 重新分类令可撤销不再适用的特殊控制。 (g) 分入 II 类可设定特殊控制。", "summary": "基于新信息重新分类的通用程序。"}, {"num": "860.132", "title": "§514(b)/515(b) 程序", "subpart": "子部分C：重新分类", "detail": "(a) 当 FDA 启动性能标准或 PMA 程序时，须通知利益相关者可基于新信息请愿重新分类。 (b) 若 FDA 同意新信息，按 §860.130 处理。 (c) 若不同意，则否决。 (d) §514(b) 程序：30 天内提交请愿，60 天内决定。", "summary": "在启动性能标准或 PMA 程序时，为利益相关者提供的重新分类请愿机会。"}, {"num": "860.133", "title": "§515(b) 要求 PMA 的程序", "subpart": "子部分C：重新分类", "detail": "(a) 适用于 III 类修正前器械。 (b) FDA 可通过命令要求 PMA，需经提议、小组会议及公众意见。", "summary": "FDA 通过命令要求 III 类器械提交 PMA 的程序。"}, {"num": "860.134", "title": "§513(f)(3) 修正后器械的重新分类", "subpart": "子部分C：重新分类", "detail": "(a) 适用于依 §513(f)(1) 自动归入 III 类的器械。 (b) 制造商/进口商请愿程序：提交请愿、30 天内缺陷通知、补正、可提交小组、90 天内小组建议、210 天内决定。 (c) 局长可主动发布命令重新分类。", "summary": "针对 1976 年后新型且被判定为不等同的器械（修正后器械）的重新分类程序。"}, {"num": "860.136", "title": "§520(l) 过渡产品的重新分类", "subpart": "子部分C：重新分类", "detail": "(a) 适用于 1976-05-28 前作为“新药”监管的器械。 (b) 制造商/进口商请愿程序：提交请愿、30 天内缺陷通知、咨询小组、180 天内决定。 (c) 局长可主动重新分类。", "summary": "针对之前作为新药监管的过渡器械的重新分类程序。"}, {"num": "860.200", "title": "目的与适用性", "subpart": "子部分D：De Novo 分类", "detail": "(a) 为无合法 predicate 的器械提供分类为 I/II 类的途径。 (b) 可在收到 NSE 决定后提交，或自行确定无 predicate。", "summary": "De Novo 途径的目的和适用场景。"}, {"num": "860.210", "title": "De Novo 请求格式", "subpart": "子部分D：De Novo 分类", "detail": "须以电子格式提交，发送至相应中心，签字，封面标注“De Novo Request”，内容用英文。", "summary": "De Novo 请求的提交格式要求。"}, {"num": "860.220", "title": "De Novo 请求内容", "subpart": "子部分D：De Novo 分类", "detail": "须包含：目录、管理信息、监管历史、器械名称、适应症、器械描述、替代方案、分类摘要（搜索证明无 predicate）、风险缓解摘要、拟议特殊控制（若 II 类）、分类推荐、标准引用、研究摘要、效益风险讨论、技术章节（非临床、软件、临床）、其他信息、样品、标签、财务披露等。", "summary": "详细列出了 De Novo 请求必须提交的全部内容，是最核心的条款。"}, {"num": "860.230", "title": "De Novo 请求的受理", "subpart": "子部分D：De Novo 分类", "detail": "(a) FDA 在收到后 15 天内决定是否受理。 (b) 若不存在拒绝受理理由或 15 天内未完成审查，则受理并通知。 (c) 拒绝受理理由：有未决提交、不完整、格式不符、请求多个器械类型、未回应先前缺陷。", "summary": "规定了 De Novo 请求受理的时限（15 天）和拒绝理由。"}, {"num": "860.240", "title": "De Novo 审查程序", "subpart": "子部分D：De Novo 分类", "detail": "(a) 受理后 120 天内发出批准或拒绝令。 (b) 申请人可补充/修改。 (c) FDA 可检查工厂以验证数据。", "summary": "De Novo 请求的审查时限（120 天）和补充程序。"}, {"num": "860.250", "title": "De Novo 请求的撤回", "subpart": "子部分D：De Novo 分类", "detail": "若 180 天内未回应补充请求，视为撤回。", "summary": "未回应 FDA 补充请求视为撤回。"}, {"num": "860.260", "title": "De Novo 的批准或拒绝", "subpart": "子部分D：De Novo 分类", "detail": "(a) 若符合 I/II 类标准，FDA 批准并发布通知。 (b) 若不符合，书面拒绝。 (c) 拒绝理由：不符合 I/II 类定义、虚假陈述、标签不合规、非器械、已有 PMA/分类、检查发现问题、非临床/临床研究不合规、研究未完成、未解决缺陷、重大变更。", "summary": "列出了 FDA 批准或拒绝 De Novo 请求的标准和理由。"}], "definitions": [{"term": "I 类器械", "def": "仅受一般控制即可合理保证安全有效的器械，或信息不足但非生命支持/维持、非重要健康用途且无不合理风险的器械。"}, {"term": "II 类器械", "def": "一般控制不足、但可通过特殊控制（性能标准、监测、指南等）合理保证安全有效的器械。"}, {"term": "III 类器械", "def": "须上市前批准；信息不足以合理保证安全有效，且为生命支持/维持或防健康损害重要用途，或存在不合理风险。"}, {"term": "植入物", "def": "置于人体外科或天然腔隙、预期持续植入 ≥30 天的器械（除非局长另定以保护健康）。"}, {"term": "De Novo 请求", "def": "依 §513(f)(2) 请求将新型（无合法 predicate）器械分类为 I/II 类的提交。"}, {"term": "特殊控制", "def": "为 II 类器械提供合理保证安全有效所必需的控制，含性能标准、检测、上市后监测、患者登记、指南等。"}], "related": ["part807", "part814", "part820"]}, {"id": "qmsr_final", "num": "QMSR 终版规则", "category": "qms", "title_cn": "QMSR 终版规则（背景与要点）", "title_en": "Quality Management System Regulation Final Rule", "tags": ["QMSR", "ISO 13485", "QS法规", "cGMP", "2026生效", "MDSAP"], "overview": "《医疗器械；质量体系法规修订》（QMSR 终版规则）于 2024-02-02 发布，2026-02-02 生效。该规则通过引用纳入 ISO 13485:2016，取代原有的“质量体系法规（QS regulation，即 cGMP）”，使美国质量体系要求与国际（尤其 MDSAP 参与国）接轨。", "applicability": "对所有受 Part 820 约束的成品器械制造商生效。旧 QS 法规（cGMP）同时废止，企业须从 2026-02-02 起符合 QMSR（ISO 13485:2016 + 本部分附加衔接要求）。", "timelines": [{"when": "2024-02-02", "what": "最终规则在《联邦公报》发布（89 FR 7523），进入 2 年过渡期。"}, {"when": "2026-02-02", "what": "规则生效，QMSR 取代 QS 法规；ISO 13485:2016 经引用纳入成为强制要求。"}], "sections": [{"num": "I", "title": "执行摘要", "subpart": "", "detail": "本文件为 QMSR 最终规则的执行摘要，概述了修订背景、主要条款、法律依据及成本效益。", "summary": "QMSR 终版规则摘要。"}, {"num": "I.A", "title": "终版规则目的", "subpart": "I 执行摘要", "detail": "FDA 历来认识到与其他监管机构协调的好处，并已采取多项措施促进一致性。作为这些活动的一部分，FDA 正在修订其医疗器械 CGMP 要求（即 QS 法规，编于第 820 部分）。FDA 主要通过引用纳入 2016 年版 ISO 13485 来实现此目的。通过此规则，FDA 将质量管理体系要求与其他监管机构使用的要求相协调。", "summary": "通过引用 ISO 13485 实现与国际协调。"}, {"num": "I.B", "title": "终版规则主要条款摘要", "subpart": "I 执行摘要", "detail": "我们正在修订第 820 部分，主要通过引用纳入 ISO 13485 的质量管理体系要求。我们确定 ISO 13485 的要求在整体上与 QS 法规的要求实质相似，在企业质量管理体系及持续生产安全有效器械能力方面提供相似水平的保证。因此，我们保留 QS 法规的范围，并修订了许多条款。我们还修订了法规标题，并增加了额外要求和规定，以澄清某些预期和 ISO 13485 中使用的某些概念。这些增补确保引用 ISO 13485 不会与其他适用 FDA 要求产生不一致。修订后的第 820 部分称为质量管理体系法规（QMSR）。FDA 还对第 4 部分进行了相应编辑，以澄清组合产品的器械 QMS 要求。", "summary": "通过引用 ISO 13485 修订第 820 部分，保留范围并增加补充规定。"}, {"num": "I.C", "title": "法律依据", "subpart": "I 执行摘要", "detail": "我们依据 FDA 最初颁布 QS 法规和组合产品法规的相同权力以及法案的一般行政规定发布此规则：21 U.S.C. 351, 352, 353, 360, 360c, 360d, 360e, 360h, 360i, 360j, 360l, 371, 374, 381, 383；42 U.S.C. 216, 262, 263a, 264。", "summary": "规则的法律授权依据。"}, {"num": "I.D", "title": "成本与效益", "subpart": "I 执行摘要", "detail": "我们估计 QMSR 将带来年度净成本节约（效益）约 5.32 亿美元（7% 折现率）和约 5.54 亿美元（3% 折现率）。除了成本节约外，定性效益包括患者更快获得新开发器械，从而提高生活质量。该规则还将第 820 部分与其他相关项目对齐，可能带来额外成本节约。", "summary": "预估 QMSR 将带来每年约 5.3-5.5 亿美元的成本节约。"}, {"num": "II", "title": "缩写表", "subpart": "", "detail": "本文件使用的常见缩写：CFR、CGMP、FDA、GHTF、ISO、ISO 13485、ISO 9000、MDSAP、QMSR、UDI 等。", "summary": "规则文件中使用的英文缩写对照表。"}, {"num": "III", "title": "背景", "subpart": "", "detail": "本章节概述了 QMSR 规则制定的历史背景和监管发展脉络。", "summary": "QMSR 修订背景介绍。"}, {"num": "III.A", "title": "引言", "subpart": "III 背景", "detail": "质量管理体系（QMS）指定要求以帮助制造商确保产品持续满足客户和法规要求。在美国，制定 CGMP 要求的权力依据法案 §520(f)。1978 年 FDA 发布了 CGMP 最终规则，创建了第 820 部分。1996 年 FDA 显著修订了第 820 部分，确立了 QS 法规。QS 法规有效提供了器械安全有效的保证。自 1996 年以来，FDA 未对第 820 部分进行重大修订。1996 年 ISO 发布了第一版 ISO 13485。随着时间的推移，ISO 13485 已发展成一个独立的 QMS 标准，其要求与 FDA 的 QS 法规更加紧密对齐，尤其是 2016 版。因此，FDA 认为现在是通过引用 ISO 13485 并将 QS 法规替换为 QMSR 来实现监管协调的时机。ISO 13485 被许多监管机构用作 QMS 要求的基础，并用于 MDSAP 等协调项目。FDA 自 2012 年起参与 MDSAP，积累了 ISO 13485 的经验，并确定它提供了全面有效的 QMS 方法。FDA 相信全球协调有助于提供安全、有效的器械，并通过更及时的患者访问为公共卫生做出贡献。", "summary": "详细阐述了从 1978 年 CGMP 到 1996 年 QS 法规，再到 2024 年 QMSR 引入 ISO 13485 的历史演变和协调动机。"}, {"num": "III.B", "title": "规则的必要性", "subpart": "III 背景", "detail": "在 FDA 注册的器械制造商必须遵守第 820 部分。此外，许多其他司法管辖区的制造商和出口制造商必须遵守 ISO 13485。同时遵守两份实质相似的要求造成效率低下和冗余负担。例如，协调将减少企业为检查和审计准备文件/记录的负担，减少内部培训成本。为了解决这种低效率，我们通过引用 ISO 13485 来对齐实质相似的要求。", "summary": "消除同时遵守 QS 法规和 ISO 13485 的重复负担是发布本规则的主要原因。"}, {"num": "III.C", "title": "FDA 当前监管框架", "subpart": "III 背景", "detail": "法案及其实施法规建立了器械监管的综合体系。QS 法规由 §520(f) 授权，最近一次修订是在 1996 年。§520(f)(1)(B) 指示 FDA 给 DGMP 咨询委员会机会提交建议并举行口头听证，并确保法规尽可能与国际公认的 QMS 标准一致。FDA 于 2022 年 3 月 2 日召集 DGMP 咨询委员会会议讨论本提案。DGMP 普遍同意协调提案。组合产品（含器械成分）具有独特的 CGMP 框架，第 4 部分进行了规定。", "summary": "描述了 QMSR 的法定授权（§520(f)）及与组合产品法规（第 4 部分）的关系。"}, {"num": "III.D", "title": "规则制定历史", "subpart": "III 背景", "detail": "本规则制定是自 1996 年以来第 820 部分的首次重大修订。FDA 长期致力于协调其要求与司法管辖区要求。2022 年 2 月 23 日，FDA 发布了拟议规则。本最终规则是在考虑了公众意见和 DGMP 咨询委员会建议后发布的。", "summary": "追溯了从 1996 年 QS 法规到 2022 年拟议规则再到 2024 年最终规则的历程。"}, {"num": "III.E", "title": "拟议规则的意见摘要", "subpart": "III 背景", "detail": "FDA 收到了医疗器械协会、行业、医疗保健协会、律师事务所和其他利益相关者（包括个人）的许多意见。虽然有些意见反对特定条款，但几乎所有意见都支持通过引入 ISO 13485 来更新 CGMP 要求的目标。一些意见关注生效日期、范围、定义、记录保存、实施、检查、认证和可追溯性。", "summary": "总结了公众对拟议规则提交的主要关切领域。"}, {"num": "III.F", "title": "终版规则总览", "subpart": "III 背景", "detail": "我们正在修订第 820 部分，主要是为了引用 ISO 13485。虽然 QS 法规提供了充分有效的要求，但自实施以来已过去 20 多年，监管期望已经演变。通过引用 ISO 13485，我们明确要求受 FDA 管辖的器械采用当前国际公认的 QMS 监管期望。我们还在增加额外的定义和规定，以确保与 FDA 的法定和监管框架一致。本规则是仅修订第 820 部分，不影响 FDA 依据 §704 的检查权。我们也在对第 4 部分进行相应修订。FDA 考虑了所有意见，并进行了以清晰度为主的更改。", "summary": "终版规则通过引用 ISO 13485 替代 QS 法规，增加衔接规定，并修订第 4 部分。"}, {"num": "III.G", "title": "引用纳入", "subpart": "III 背景", "detail": "FDA 正在引用纳入 ISO 13485:2016 和 ISO 9000:2015 第 3 条。这些标准可从 ISO 获取，也可在 ANSI IBR 门户免费只读查看。将来若标准有修订，FDA 将评估影响并酌情修订法规。", "summary": "正式引用纳入 ISO 13485 和 ISO 9000 第 3 条。"}, {"num": "IV", "title": "法律授权", "subpart": "", "detail": "我们依据 21 U.S.C. 321, 351, 352, 353, 360, 360c, 360d, 360e, 360h, 360i, 360j, 360l, 371, 374, 381, 383；42 U.S.C. 216, 262, 263a, 264 发布此规则。", "summary": "法律授权章节。"}, {"num": "V", "title": "对拟议规则的意见及 FDA 回应", "subpart": "", "detail": "我们收到了少于 100 件及时提交的意见，涵盖多个问题。我们已对每类意见进行了编号和回应。", "summary": "正式回应公众意见的总览。"}, {"num": "V.A", "title": "对拟议规则的一般意见", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "许多意见表达了支持，同意简化监管、减少行政负担、整合风险管理。FDA 感谢公众支持，并同意协调有助于提供安全有效器械，减少市场准入障碍。", "summary": "FDA 回应了表达总体支持的意见，肯定了协调的益处。"}, {"num": "V.B", "title": "范围", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "FDA 收到关于范围的评论。FDA 同意范围未变，但法律授权可扩展至组件制造商。FDA 不同意将第三方服务商纳入范围，因为 ISO 13485 并未对其施加全部要求。注册范围与 QMSR 范围目标不同。", "summary": "FDA 澄清了 QMSR 的范围与 QS 法规一致，并解释了为何不纳入第三方服务商。"}, {"num": "V.C", "title": "引用纳入", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "FDA 回应了关于引用 ISO 13485 是否恰当的质疑，确认引用纳入具有法律效力，且不违反 MDSAP。FDA 澄清遵守 QMSR 基本满足 ISO 13485，但仅遵守 ISO 13485 不完全满足 QMSR（因有额外要求）。FDA 不在此规则中纳入 ISO 14971 等其他标准。", "summary": "FDA 确认引用纳入的合法性和效力，并澄清了 QMSR 与 ISO 13485 的关系。"}, {"num": "V.D", "title": "定义", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "FDA 回应了关于定义的意见。FDA 采用了 ISO 9000 中“customer”、“nonconformity”、“verification”、“top management”的定义。采纳了 ISO 13485 中“product”的定义。未保留“establish”的单独定义。澄清了 DMR/DHF/DHR 与 MDF 的关系（概念被涵盖）。保留了“component”、“rework”等的 FDA 特定定义。", "summary": "详细回应了关于各项术语定义的采纳、删除和澄清决定。"}, {"num": "V.E", "title": "质量管理体系要求", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "FDA 回应了 §820.10 相关意见，确认所有 ISO 13485 条款均适用，并明确列出了 UDI（Part 830）、追溯（Part 821）、MDR（Part 803）和咨询通知（Part 806）为适用法规。澄清设计开发要求（Clause 7.3）适用于 II/III 类及指定的 I 类器械。对于支持/维持生命的器械，须遵守 Clause 7.5.9.2 可植入器械追溯要求。", "summary": "确认所有 ISO 条款适用，并明确了与 Part 830、821、803、806 的衔接。"}, {"num": "V.F", "title": "概念澄清", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "FDA 回应了“安全与性能”与“安全与有效性”的区别，澄清“安全与性能”仅在 ISO 13485 第 0.1 条引言中具有“安全与有效性”的含义，且不免除安全有效的责任。", "summary": "澄清了“安全与性能”在 QMSR 中的具体法律含义。"}, {"num": "V.G", "title": "补充规定（记录控制、标签包装）", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "FDA 回应了 §820.35 和 §820.45 的意见。确认记录控制增加了投诉、维修和 UDI 记录要求，并删除了“每次记录批准均需签名”的过度要求。保留了标签包装检查要求，并将“immediately”改为“before use”。拒绝了删除 §820.45(a)(2)-(5) 的建议，因为这些是 FDA 特有的标签包装准确性要求。", "summary": "确认并澄清了记录控制、投诉记录、维修记录和标签包装检查的具体补充要求。"}, {"num": "V.H", "title": "相应修订", "subpart": "V 对拟议规则的意见及 FDA 回应", "detail": "FDA 回应了第 4 部分的相应修订意见。确认第 4 部分和第 820 部分生效日期相同（2 年后）。修改了 §4.4(b)(1) 以包含 Clause 8.2.2 和 §820.35(a)。在 §4.4 中增加了“analysis of data”。", "summary": "对组合产品法规（Part 4）的相应修订进行了解释和完善。"}, {"num": "VI", "title": "生效日期与实施策略", "subpart": "", "detail": "本章节讨论规则的生效时间和实施方法。", "summary": "生效日期和实施策略总览。"}, {"num": "VI.A", "title": "生效日期", "subpart": "VI 生效日期与实施策略", "detail": "许多人建议 1 年不够。FDA 同意，将生效日期改为 2 年（自联邦公报发布之日起）。FDA 认为 2 年足以让企业熟悉并调整 QMS。FDA 不同意分阶段实施，因为同时运行两套检查程序效率低下。", "summary": "最终生效日期定为发布后 2 年（2026-02-02）。"}, {"num": "VI.B", "title": "实施策略", "subpart": "VI 生效日期与实施策略", "detail": "FDA 回应了关于检查和认证的意见。FDA 不接受 ISO 13485 证书替代 FDA 检查。MDSAP 审计报告可在自愿基础上作为替代检查工具，但证书本身不能替代。FDA 将更新 QSIT 检查方法以符合 QMSR。FDA 将培训员工并更新指导文件。", "summary": "明确 ISO 认证不能替代 FDA 检查，MDSAP 可作补充工具，FDA 将更新检查方法。"}, {"num": "VII", "title": "经济影响分析", "subpart": "", "detail": "根据行政命令评估了影响。OIRA 认定该规则具有显著性。小企业分析显示净成本节约超过 5 亿美元，因此不会对大量小实体产生重大经济影响。无资金授权。", "summary": "经济影响分析确认规则带来净成本节约，对小企业无重大负面影响。"}, {"num": "VIII", "title": "环境影响分析", "subpart": "", "detail": "依据 21 CFR 25.30(j)，确定此行动不会对环境产生显著影响，无需环境评估。", "summary": "对环境无显著影响。"}, {"num": "IX", "title": "1995 年文书削减法", "subpart": "", "detail": "包含须经 OMB 审查的信息收集条款。估计一次性负担约 398,681 小时，年度记录保存负担约 9,906,050 小时（较之前减少 333,502 小时）。", "summary": "信息收集负担的量化估计，显示总体负担减少。"}, {"num": "X", "title": "联邦制", "subpart": "", "detail": "依据行政命令 13132 分析，确定本规则不包含对州有重大直接影响的政策。", "summary": "对州政府无重大影响。"}, {"num": "XI", "title": "与印第安部落政府的协调", "subpart": "", "detail": "依据行政命令 13175 分析，确定对部落无重大影响。", "summary": "对部落无重大影响。"}, {"num": "XII", "title": "参考文献", "subpart": "", "detail": "列出了本规则引用的参考文献，包括 ISO 13485、ISO 9000、MDSAP 项目、DGMP 会议记录等。", "summary": "列出了支撑该规则的官方参考文献。"}], "definitions": [{"term": "QMSR", "def": "质量体系法规（Quality Management System Regulation），2026-02-02 生效的新规，纳入 ISO 13485:2016。"}, {"term": "QS regulation（旧）", "def": "原“质量体系法规”（即 cGMP），2026-02-02 被 QMSR 取代。"}, {"term": "ISO 13485:2016", "def": "医疗器械—质量体系—用于法规目的的要求（第三版，2016-03-01），被 QMSR 引用纳入。"}, {"term": "MDSAP", "def": "医疗器械单一审核程序，由第三方依核心 ISO 13485 进行审核，多国监管机构参与互认。"}], "related": ["part820", "part11", "part830", "part821", "part803", "part806"]}], "glossary": [{"term": "UDI", "def": "唯一器械标识（Unique Device Identification），由器械标识 DI + 生产标识 PI 组成，用于器械在分销与使用中的识别。", "parts": "Part 830 / 801B / 821 / 820 / 803 / 814"}, {"term": "标签商", "def": "使标签贴于器械且意图商业化分销不再修改标签者，或替换/修改标签者，承担 UDI 签发与 GUDID 提交义务。", "parts": "Part 830 / 801B"}, {"term": "制造商", "def": "设计、制造、装配、加工成品器械者；含合同灭菌、安装、重新贴标、再制造、重新包装、规格开发及外国企业初始分销商。", "parts": "Part 820 / 807 / 803 / 821 / 814"}, {"term": "进口商", "def": "将外国器械进一步推向市场至最终消费者/用户者；初始进口商不重新包装或改标签。", "parts": "Part 807 / 803 / 821"}, {"term": "用户机构", "def": "医院、门诊手术机构、护理院、门诊诊断/治疗机构（非医师办公室），须报告死亡/严重伤害。", "parts": "Part 803"}, {"term": "MDR 事件", "def": "器械可能促成死亡/严重伤害，或故障且类似器械复发可能致死亡/严重伤害的可报告事件。", "parts": "Part 803"}, {"term": "严重伤害", "def": "危及生命；致身体功能永久损害或结构永久损伤；或需医疗/手术干预以防永久损害。", "parts": "Part 803 / 810 / 814"}, {"term": "召回", "def": "为纠正或移除器械，且 FDA 认定存在导致严重不良健康后果或死亡的合理概率。", "parts": "Part 810 / 806"}, {"term": "纠正", "def": "不将器械从使用点移走而进行的修理/改装/调整/重新贴标/销毁/检查。", "parts": "Part 806 / 810"}, {"term": "移除", "def": "将器械从使用点物理移走以进行修理/改装/调整/重新贴标/销毁/检查。", "parts": "Part 806 / 810"}, {"term": "510(k)", "def": "证明新器械与已合法上市 predicate 实质等同的上市前通知，须提前 90 天提交。", "parts": "Part 807"}, {"term": "PMA", "def": "III 类器械的上市前批准申请，须证成安全有效。", "parts": "Part 814"}, {"term": "De Novo", "def": "依 §513(f)(2) 将无合法 predicate 的新型器械分类为 I/II 类的请求。", "parts": "Part 860"}, {"term": "QMSR", "def": "质量体系法规（2026-02-02 生效），纳入 ISO 13485:2016，取代旧 QS 法规（cGMP）。", "parts": "Part 820 / QMSR 终版规则"}, {"term": "GUDID", "def": "全球唯一器械标识数据库，标签商提交 UDI 信息的数据库。", "parts": "Part 830"}, {"term": "被追溯器械", "def": "满足 §821.1(a) 三标准之一且受 FDA 追溯令约束的器械。", "parts": "Part 821"}, {"term": "美国代理", "def": "外国企业在美代理人，协助 FDA 沟通、答问与检查安排。", "parts": "Part 807 / 803"}, {"term": "FURLS", "def": "FDA 统一注册与列名系统（电子提交平台）。", "parts": "Part 807 / 830"}, {"term": "HUD / HDE", "def": "人道主义使用器械（≤8000 人/年）/ 其豁免申请。", "parts": "Part 814"}, {"term": "封闭/开放系统", "def": "Part 11 中系统访问是否由对记录内容负责的人员控制的区分。", "parts": "Part 11"}, {"term": "审计追踪", "def": "Part 11 要求的带时间戳、独立记录创建/修改/删除的操作日志。", "parts": "Part 11"}], "flow": [{"step": "1", "title": "分类判定", "part": "part860", "desc": "确定器械为 I/II/III 类；新型无 predicate 者可走 De Novo 分为 I/II 类。"}, {"step": "2", "title": "企业注册与列名", "part": "part807", "desc": "制造/初始进口企业须于运营 30 天内注册列名（FURLS）；外国企业须指定美国代理。上市前 90 天提交 510(k)（或 PMA/HDE）。"}, {"step": "3", "title": "上市前提交", "part": "part814", "desc": "III 类须 PMA（或 HDE/PDP）；II/I 类通常 510(k) 实质等同；部分豁免。"}, {"step": "4", "title": "质量体系（QMSR）", "part": "part820", "desc": "建立符合 ISO 13485:2016 + Part 820 附加要求的质量体系；电子化系统须满足 Part 11。"}, {"step": "5", "title": "UDI 与标签", "part": "part830", "desc": "分配 UDI（DI+PI），标签以明文+AIDC 呈现（Part 801B），提交 GUDID；多次使用且再处理器械须直接标记。"}, {"step": "6", "title": "追溯（如适用）", "part": "part821", "desc": "II/III 类且满足三标准之一并收到 FDA 追溯令者，建立从制造到患者的追溯系统。"}, {"step": "7", "title": "上市后监管", "part": "part803", "desc": "持续 MDR 报告（死亡/严重伤害/故障）、书面程序与事件文件；分销商保存事件记录。"}, {"step": "8", "title": "纠正 / 移除 / 召回", "part": "part806", "desc": "纠正与移除 10 工作日内报告并保存记录；FDA 可启动强制召回（Part 810）。"}]};
