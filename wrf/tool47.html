                const printContainer = dom.printContainer;
                printContainer.innerHTML = '';

                try {
                    for (let i = 1; i <= state.totalPages; i++) {
                        dom.loadingDesc.textContent = `正在渲染第 ${i} / ${state.totalPages} 页...`;
                        const page = await state.pdfDoc.getPage(i);
                        const printScale = 2; // 高质量打印
                        const viewport = page.getViewport({ scale: printScale });
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        const ctx = canvas.getContext('2d');
                        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                        canvas.style.width = '100%';
                        canvas.style.height = 'auto';
                        canvas.style.display = 'block';
                        canvas.style.pageBreakAfter = 'always';
                        printContainer.appendChild(canvas);
                    }
                    // 最后一页不需要分页
                    const lastCanvas = printContainer.lastChild;
                    if (lastCanvas) lastCanvas.style.pageBreakAfter = 'avoid';

                    hideLoading();
                    updateStatus('正在打印...');
                    // 延迟以确保DOM更新
                    setTimeout(() => {
                        window.print();
                        state.isPrinting = false;
                        updateStatus('就绪');
                        // 清理打印容器
                        setTimeout(() => {
                            printContainer.innerHTML = '';
                        }, 1000);
                    }, 300);
                } catch (err) {
                    console.error('打印准备失败:', err);
                    hideLoading();
                    updateStatus('打印失败');
                    state.isPrinting = false;
                }
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    const el = dom.previewArea;
                    if (el.requestFullscreen) {
                        el.requestFullscreen();
                    } else if (el.webkitRequestFullscreen) {
                        el.webkitRequestFullscreen();
                    }
                    updateStatus('全屏模式');
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                    updateStatus('退出全屏');
                }
            }

            // ==================== 事件监听 ====================
            // 工具栏按钮
            dom.btnSidebar.addEventListener('click', toggleSidebar);
            dom.btnOpen.addEventListener('click', openFileDialog);
            dom.btnDownload.addEventListener('click', downloadPDF);
            dom.btnPrint.addEventListener('click', printPDF);
            dom.btnFirst.addEventListener('click', () => goToPage(1));
            dom.btnPrev.addEventListener('click', () => goToPage(state.currentPage - 1));
            dom.btnNext.addEventListener('click', () => goToPage(state.currentPage + 1));
            dom.btnLast.addEventListener('click', () => goToPage(state.totalPages));
            dom.btnZoomOut.addEventListener('click', zoomOut);
            dom.btnZoomIn.addEventListener('click', zoomIn);
            dom.btnRotateCW.addEventListener('click', () => rotatePage(90));
            dom.btnRotateCCW.addEventListener('click', () => rotatePage(-90));
            dom.btnRotateReset.addEventListener('click', resetRotation);
            dom.btnFullscreen.addEventListener('click', toggleFullscreen);
            dom.btnTheme.addEventListener('click', toggleTheme);
            dom.btnSearchPrev.addEventListener('click', searchPrev);
            dom.btnSearchNext.addEventListener('click', searchNext);

            // 文件输入
            dom.fileInput.addEventListener('change', handleFileSelect);

            // 页面输入
            dom.pageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const pageNum = parseInt(dom.pageInput.value);
                    if (pageNum >= 1 && pageNum <= state.totalPages) {
                        goToPage(pageNum);
                    } else {
                        dom.pageInput.value = state.currentPage;
                    }
                }
            });
            dom.pageInput.addEventListener('blur', () => {
                const pageNum = parseInt(dom.pageInput.value);
                if (!pageNum || pageNum < 1 || pageNum > state.totalPages) {
                    dom.pageInput.value = state.currentPage;
                } else {
                    goToPage(pageNum);
                }
            });

            // 缩放选择
            dom.zoomSelect.addEventListener('change', () => {
                setZoom(dom.zoomSelect.value);
            });

            // 搜索
            const debouncedSearch = debounce((query) => {
                if (query.length >= 2) {
                    performSearch(query);
                } else if (query.length === 0) {
                    state.searchResults = [];
                    state.searchCurrentIndex = -1;
                    state.searchQuery = '';
                    clearSearchHighlights();
                    dom.searchCount.textContent = '';
                    renderSidebarContent();
                }
            }, 400);

            dom.searchInput.addEventListener('input', () => {
                const query = dom.searchInput.value;
                if (query.length >= 2) {
                    debouncedSearch(query);
                } else if (query.length === 0) {
                    debouncedSearch('');
                }
            });
            dom.searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = dom.searchInput.value.trim();
                    if (query.length >= 1) {
                        if (state.searchQuery !== query) {
                            performSearch(query);
                        } else if (state.searchResults.length > 0) {
                            if (e.shiftKey) {
                                searchPrev();
                            } else {
                                searchNext();
                            }
                        }
                    }
                }
            });

            // 侧边栏标签
            dom.sidebarContent.parentElement.querySelector('.sidebar-tabs').addEventListener('click', (e) => {
                const tab = e.target.closest('.sidebar-tab');
                if (!tab) return;
                setSidebarTab(tab.dataset.tab);
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                // 如果焦点在输入框中，不处理快捷键（除了搜索框的Enter）
                const activeEl = document.activeElement;
                const isInputFocused = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName ===
                    'TEXTAREA' || activeEl.isContentEditable);

                if (isInputFocused && activeEl !== dom.searchInput) return;
                if (isInputFocused && activeEl === dom.searchInput && e.key === 'Enter') return;

                const ctrl = e.ctrlKey || e.metaKey;

                switch (true) {
                    case e.key === 'ArrowLeft' && !ctrl:
                        e.preventDefault();
                        goToPage(state.currentPage - 1);
                        break;
                    case e.key === 'ArrowRight' && !ctrl:
                        e.preventDefault();
                        goToPage(state.currentPage + 1);
                        break;
                    case e.key === 'ArrowUp' && !ctrl:
                        e.preventDefault();
                        goToPage(state.currentPage - 1);
                        break;
                    case e.key === 'ArrowDown' && !ctrl:
                        e.preventDefault();
                        goToPage(state.currentPage + 1);
                        break;
                    case e.key === 'Home' && !ctrl:
                        e.preventDefault();
                        goToPage(1);
                        break;
                    case e.key === 'End' && !ctrl:
                        e.preventDefault();
                        goToPage(state.totalPages);
                        break;
                    case e.key === 'PageUp' && !ctrl:
                        e.preventDefault();
                        goToPage(state.currentPage - 1);
                        break;
                    case e.key === 'PageDown' && !ctrl:
                        e.preventDefault();
                        goToPage(state.currentPage + 1);
                        break;
                    case (e.key === '+' || e.key === '=') && ctrl:
                        e.preventDefault();
                        zoomIn();
                        break;
                    case e.key === '-' && ctrl:
                        e.preventDefault();
                        zoomOut();
                        break;
                    case e.key === '0' && ctrl:
                        e.preventDefault();
                        setZoom('fit-page');
                        break;
                    case e.key === 'f' && ctrl:
                        e.preventDefault();
                        dom.searchInput.focus();
                        dom.searchInput.select();
                        break;
                    case e.key === 'F11':
                        e.preventDefault();
                        toggleFullscreen();
                        break;
                    case e.key === 'Escape':
                        if (document.fullscreenElement) {
                            document.exitFullscreen();
                        }
                        clearSearchHighlights();
                        state.searchResults = [];
                        state.searchCurrentIndex = -1;
                        state.searchQuery = '';
                        dom.searchInput.value = '';
                        dom.searchCount.textContent = '';
                        renderSidebarContent();
                        break;
                    case e.key === 'r' && ctrl:
                        e.preventDefault();
                        resetRotation();
                        break;
                }
            });

            // 拖拽上传
            let dragCounter = 0;
            document.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragCounter++;
                if (dragCounter === 1) {
                    dom.dropZone.classList.add('visible');
                }
            });
            document.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragCounter--;
                if (dragCounter === 0) {
                    dom.dropZone.classList.remove('visible');
                }
            });
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            document.addEventListener('drop', (e) => {
                e.preventDefault();
                dragCounter = 0;
                dom.dropZone.classList.remove('visible');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            loadPDFFromData(new Uint8Array(ev.target.result), file.name);
                        };
                        reader.readAsArrayBuffer(file);
                    } else {
                        alert('请拖放PDF文件');
                    }
                }
            });

            // 预览区点击（用于在空白处取消选择等）
            dom.previewArea.addEventListener('click', (e) => {
                if (e.target === dom.previewArea) {
                    // 点击空白区域
                }
            });

            // 触摸滑动翻页
            dom.previewArea.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    state.touchStartX = e.touches[0].clientX;
                    state.touchStartY = e.touches[0].clientY;
                    state.touchStartTime = Date.now();
                }
            }, { passive: true });

            dom.previewArea.addEventListener('touchend', (e) => {
                if (e.changedTouches.length === 1 && state.touchStartTime > 0) {
                    const dx = e.changedTouches[0].clientX - state.touchStartX;
                    const dy = e.changedTouches[0].clientY - state.touchStartY;
                    const dt = Date.now() - state.touchStartTime;
                    const absDx = Math.abs(dx);
                    const absDy = Math.abs(dy);

                    // 快速滑动（速度>0.3px/ms且距离>50px）或慢速大距离滑动
                    if (dt < 500 && absDx > absDy && absDx > 50) {
                        if (dx < -30) {
                            goToPage(state.currentPage + 1);
                        } else if (dx > 30) {
                            goToPage(state.currentPage - 1);
                        }
                    }
                }
                state.touchStartTime = 0;
            });

            // 窗口大小变化 - 重新计算适应模式
            const debouncedResize = debounce(() => {
                if (state.pdfDoc && (state.zoomMode === 'fit-width' || state.zoomMode === 'fit-page')) {
                    renderPage(state.currentPage);
                }
            }, 300);
            window.addEventListener('resize', debouncedResize);

            // 全屏变化监听
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement) {
                    updateStatus('退出全屏');
                }
            });
            document.addEventListener('webkitfullscreenchange', () => {
                if (!document.webkitFullscreenElement) {
                    updateStatus('退出全屏');
                }
            });

            // ==================== 初始化 ====================
            function init() {
                // 恢复主题
                try {
                    const savedTheme = localStorage.getItem('pdf-viewer-theme');
                    if (savedTheme === 'dark' || savedTheme === 'light') {
                        setTheme(savedTheme);
                    }
                } catch (e) {}

                // 初始状态
                dom.btnSidebar.classList.add('active');
                updateButtonStates();
                renderSidebarContent();

                // 检查URL参数中是否有PDF
                const urlParams = new URLSearchParams(window.location.search);
                const pdfUrl = urlParams.get('pdf') || urlParams.get('url');
                if (pdfUrl) {
                    setTimeout(() => loadPDFFromURL(pdfUrl), 500);
                }

                updateStatus('就绪 - 拖拽PDF文件或点击📂打开');
                console.log('📄 PDF预览器已就绪');
                console.log('  快捷键: ←→ 翻页 | Ctrl+F 搜索 | Ctrl+/Ctrl- 缩放 | Ctrl+0 适应页面');
                console.log('  拖拽PDF文件到页面即可打开');
            }

            init();
        })();
    </script>
</body>
</html>
