<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 14001:2026 环境管理体系 要求及使用指南 · 知识库</title>
<style>
/* ============ 主题变量 ============ */
:root{
  --bg:#0f1419; --bg2:#161b22; --bg3:#1c2330; --panel:#1a2230;
  --border:#2a3442; --text:#e6edf3; --text2:#9aa7b5; --text3:#6b7785;
  --accent:#3b82f6; --accent2:#22d3ee; --accent-soft:rgba(59,130,246,.15);
  --req:#f59e0b; --note:#8b95a3; --ok:#34d399; --danger:#f87171;
  --shadow:0 8px 30px rgba(0,0,0,.45); --radius:12px;
}
html[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#ffffff; --bg3:#eef2f8; --panel:#ffffff;
  --border:#dce3ec; --text:#1a2330; --text2:#46566a; --text3:#7a899b;
  --accent:#2563eb; --accent2:#0891b2; --accent-soft:rgba(37,99,235,.1);
  --req:#c2710a; --note:#6b7785; --ok:#059669; --danger:#dc2626;
  --shadow:0 8px 30px rgba(20,40,80,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Segoe UI","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.75;
  font-size:16px; transition:background .25s,color .25s;
}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--accent-soft)}

/* ============ 顶栏 ============ */
header{
  position:sticky;top:0;z-index:50;background:var(--bg2);
  border-bottom:1px solid var(--border);padding:10px 18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;white-space:nowrap}
.brand .logo{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;
}
.brand small{display:block;font-weight:400;color:var(--text3);font-size:11px}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:520px}
#search{
  width:100%;padding:9px 36px 9px 38px;border-radius:10px;
  border:1px solid var(--border);background:var(--bg3);color:var(--text);
  font-size:14px;outline:none;transition:.2s;
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-wrap .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.search-wrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  border:none;background:none;color:var(--text3);font-size:18px;display:none}
.search-wrap .clr:hover{color:var(--danger)}
.search-count{position:absolute;right:38px;top:50%;transform:translateY(-50%);
  font-size:11px;color:var(--text3);pointer-events:none}
.tools{display:flex;gap:6px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);padding:7px 10px;border-radius:9px;
  font-size:13px;transition:.18s;white-space:nowrap;
}
.btn:hover{color:var(--text);border-color:var(--accent);background:var(--accent-soft)}
.btn.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.btn .kbd{font-size:10px;opacity:.6}

/* ============ 布局 ============ */
.layout{display:flex;min-height:calc(100vh - 58px)}
/* 侧栏 */
aside{
  width:300px;flex:none;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s,margin .25s;
}
aside.collapsed{width:0;margin-left:-1px}
.side-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;gap:8px}
.side-head input{
  flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:13px;outline:none;min-width:0;
}
.nav{flex:1;overflow-y:auto;padding:8px 6px 30px}
.nav-group{margin-bottom:2px}
.nav-chap{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  cursor:pointer;color:var(--text);font-weight:600;font-size:14px;transition:.15s;
}
.nav-chap:hover{background:var(--bg3)}
.nav-chap .num{
  flex:none;width:26px;height:26px;border-radius:7px;background:var(--accent-soft);
  color:var(--accent);display:grid;place-items:center;font-size:12px;font-weight:700;
}
.nav-chap .ttl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-chap .cnt{font-size:11px;color:var(--text3);background:var(--bg3);
  padding:1px 7px;border-radius:20px}
.nav-chap .arrow{transition:transform .2s;color:var(--text3);font-size:11px}
.nav-chap.open .arrow{transform:rotate(90deg)}
.nav-items{display:none;padding:2px 0 4px 14px}
.nav-items.open{display:block}
.nav-item{
  display:flex;gap:8px;align-items:baseline;padding:5px 10px;border-radius:7px;
  cursor:pointer;color:var(--text2);font-size:13px;transition:.15s;
  border-left:2px solid transparent;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--text);border-left-color:var(--accent)}
.nav-item .id{color:var(--accent2);font-weight:600;font-variant-numeric:tabular-nums;flex:none}
.nav-item .it{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .star{margin-left:auto;color:var(--text3);font-size:12px;opacity:0}
.nav-item:hover .star,.nav-item.starred .star{opacity:1}
.nav-item.starred .star{color:var(--req)}

/* 主区 */
main{flex:1;min-width:0;display:flex;flex-direction:column}
.breadcrumb{padding:10px 22px;border-bottom:1px solid var(--border);background:var(--bg2);
  font-size:13px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.breadcrumb b{color:var(--text)}
.crumbs a{color:var(--accent2)}
.content{flex:1;overflow-y:auto;padding:26px 30px 80px;max-width:1080px;margin:0 auto;width:100%}
.clause-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;
  border-bottom:2px solid var(--border);padding-bottom:16px;margin-bottom:22px}
.clause-num{
  flex:none;font-size:15px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:8px 14px;border-radius:10px;font-variant-numeric:tabular-nums;letter-spacing:.5px;
}
.clause-title{flex:1;min-width:200px}
.clause-title h1{font-size:25px;line-height:1.35;margin-bottom:4px}
.clause-title .sub{color:var(--text3);font-size:13px}
.clause-actions{display:flex;gap:8px;flex-wrap:wrap}
.mini-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  padding:6px 11px;border-radius:8px;font-size:12.5px;transition:.18s;display:inline-flex;gap:5px;align-items:center}
.mini-btn:hover{color:var(--text);border-color:var(--accent)}
.mini-btn.on{color:var(--req);border-color:var(--req)}

/* 内容块 */
.block{margin-bottom:14px}
.block p{margin-bottom:12px}
.block .note{color:var(--note);font-size:14px;padding:10px 14px;border-left:3px solid var(--border);
  background:var(--bg2);border-radius:0 8px 8px 0;margin:10px 0}
.block .req-em{color:var(--req);font-weight:600}
ul.l{list-style:none;padding-left:4px;margin:8px 0}
ul.l>li{position:relative;padding:4px 0 4px 26px;margin-bottom:4px}
ul.l>li::before{content:attr(data-k);position:absolute;left:0;top:4px;font-weight:700;color:var(--accent2)}
ul.l2{padding-left:22px;margin:4px 0}
ul.l2>li{padding-left:24px}
ul.l2>li::before{color:var(--text3)}
.tip{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;
  padding:12px 16px;margin:14px 0;font-size:14px}
mark{background:var(--req);color:#1a1205;padding:0 2px;border-radius:3px}
mark.cur{background:var(--accent);color:#fff}

/* 翻页 */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:40px;
  padding-top:20px;border-top:1px solid var(--border)}
.pager a{padding:12px 18px;border:1px solid var(--border);border-radius:10px;
  background:var(--bg2);flex:1;max-width:48%;transition:.18s}
.pager a:hover{border-color:var(--accent);text-decoration:none}
.pager .pl{color:var(--text3);font-size:12px}
.pager .pt{color:var(--text);font-weight:600;font-size:14px;display:block;margin-top:2px}
.pager a.next{text-align:right}

/* 进度条 */
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  z-index:100;width:0;transition:width .3s}

/* ============ 右抽屉 ============ */
.drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--panel);
  border-left:1px solid var(--border);z-index:60;transform:translateX(105%);
  transition:transform .28s;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.drawer.open{transform:translateX(0)}
.drawer .dh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.drawer .dh h3{font-size:16px}
.drawer .dbody{flex:1;overflow-y:auto;padding:16px 18px}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;opacity:0;pointer-events:none;transition:.25s}
.mask.show{opacity:1;pointer-events:auto}

/* 搜索结果 */
.result{padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;
  cursor:pointer;transition:.15s;background:var(--bg2)}
.result:hover{border-color:var(--accent);background:var(--bg3)}
.result .rid{color:var(--accent2);font-weight:700;font-size:13px}
.result .rt{font-weight:600;font-size:14px;margin:2px 0}
.result .rs{color:var(--text2);font-size:13px;line-height:1.5}
.empty{color:var(--text3);text-align:center;padding:40px 10px}

/* 术语表 */
.term{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--bg2)}
.term b{color:var(--accent2)}
.term p{color:var(--text2);font-size:13px;margin-top:4px}

/* 统计卡 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800;color:var(--accent)}
.stat .l{font-size:12px;color:var(--text3);margin-top:2px}

/* 测验 */
.quiz-q{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.quiz-q .qt{font-weight:600;margin-bottom:10px}
.quiz-q label{display:block;padding:8px 12px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:6px;cursor:pointer;transition:.15s;font-size:14px}
.quiz-q label:hover{background:var(--bg3)}
.quiz-q label.ok{background:rgba(52,211,153,.16);border-color:var(--ok);color:var(--ok)}
.quiz-q label.bad{background:rgba(248,113,113,.16);border-color:var(--danger);color:var(--danger)}
.quiz-q .exp{font-size:13px;color:var(--text2);margin-top:8px;display:none}
.quiz-q.answered .exp{display:block}

/* 图 */
.diagram-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin:14px 0}
.diagram-wrap h4{margin-bottom:12px;font-size:15px}
.svg-box{width:100%;overflow-x:auto;text-align:center}
.svg-box svg{max-width:100%;height:auto}
.legend{font-size:12px;color:var(--text3);margin-top:8px}

/* 移动端 */
.hamburger{display:none}
@media(max-width:900px){
  aside{position:fixed;top:58px;bottom:0;left:0;z-index:40;box-shadow:var(--shadow)}
  .hamburger{display:inline-flex}
  .content{padding:18px 14px 70px}
  .clause-title h1{font-size:20px}
}
@media(max-width:560px){
  .brand small{display:none}
  .tools .btn span.txt{display:none}
  .clause-num{font-size:13px;padding:6px 10px}
}
/* 打印 */
@media print{
  aside,.tools,header .search-wrap,.pager,.clause-actions,.hamburger{display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  .layout{display:block}
  .content{max-width:100%;padding:0}
  .clause-head{border-color:#999}
  mark{background:#ffe28a;color:#000}
}
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<header>
  <button class="btn hamburger" id="toggleNav" title="目录">☰</button>
  <div class="brand">
    <div class="logo">ISO</div>
    <div>ISO 14001:2026 知识库
      <small>环境管理体系 要求及使用指南</small>
    </div>
  </div>
  <div class="search-wrap">
    <span class="ic">🔍</span>
    <input id="search" placeholder="全文搜索：如“环境因素”“合规义务”“生命周期”“管理评审”…" autocomplete="off">
    <span class="search-count" id="searchCount"></span>
    <button class="clr" id="searchClear">×</button>
  </div>
  <div class="tools">
    <button class="btn" id="btnNav" title="目录树">📑<span class="txt">目录</span></button>
    <button class="btn" id="btnStar" title="我的收藏">⭐<span class="txt">收藏</span></button>
    <button class="btn" id="btnGloss" title="术语表">📖<span class="txt">术语</span></button>
    <button class="btn" id="btnGraph" title="结构图">🗺️<span class="txt">图谱</span></button>
    <button class="btn" id="btnQuiz" title="自测">🎯<span class="txt">自测</span></button>
    <button class="btn" id="btnStat" title="统计">📊<span class="txt">统计</span></button>
    <button class="btn" id="btnTheme" title="主题">🌓</button>
    <button class="btn" id="btnFontD" title="缩小字号">A−</button>
    <button class="btn" id="btnFontU" title="放大字号">A+</button>
    <button class="btn" id="btnPrint" title="打印/导出PDF">🖨️</button>
  </div>
</header>

<div class="layout">
  <aside id="aside">
    <div class="side-head">
      <input id="navFilter" placeholder="筛选条款…">
      <button class="btn" id="collapseNav" title="收起">⟨</button>
    </div>
    <div class="nav" id="nav"></div>
  </aside>

  <main>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- 右抽屉：通用容器 -->
<div class="mask" id="mask"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <h3 id="drawerTitle">面板</h3>
    <button class="btn" id="drawerClose">✕</button>
  </div>
  <div class="dbody" id="drawerBody"></div>
</div>

<script>
/* =====================================================================
   ISO 14001:2026 数据（环境管理体系 要求及使用指南）
   每条 clause: {id, num, title, en?, blocks:[...]}
   block 类型:
     {t:'p', x:'文本'}           段落
     {t:'note', x:'文本'}        注
     {t:'ul', items:[...]}       列表，item 可为 字符串 或 {t:'ul',items:[...]}
   ===================================================================== */
const CLAUSES = [
 {
  "id": "0",
  "num": "引言",
  "title": "引言（Introduction）",
  "blocks": [
   {
    "t": "p",
    "x": "采用环境管理体系是组织的一项战略决策，能够帮助其提升环境绩效，并为可持续发展的环境支柱做出贡献。"
   },
   {
    "t": "p",
    "x": "本标准采用基于策划—实施—检查—改进（PDCA）循环与基于风险思维的过程方法，并结合生命周期观点。"
   }
  ]
 },
 {
  "id": "0.1",
  "num": "0.1",
  "title": "背景",
  "blocks": [
   {
    "t": "p",
    "x": "为了满足当代人的需求，又不损害后代人满足其需求的能力，必须实现环境、社会和经济三者之间的平衡。通过平衡这“三大支柱”的可持续性，以实现可持续发展目标。"
   },
   {
    "t": "p",
    "x": "社会对可持续发展、透明度和问责制的期望，随着法律法规的日趋严格，以及污染、资源低效使用、废物管理不当、气候变化、生态系统退化、生物多样性丧失等给环境造成的压力不断增大而演变。破坏环境不仅会带来环境影响，还会造成经济、社会和商业后果。"
   },
   {
    "t": "p",
    "x": "因此，这些期望促使各组织通过实施环境管理体系，采用系统的方法进行环境管理，以期对“环境支柱”的可持续性做出贡献。因此，组织能够更好地响应相关方的需求与期望，并满足自身的合规义务。"
   }
  ]
 },
 {
  "id": "0.2",
  "num": "0.2",
  "title": "环境管理体系的目的",
  "blocks": [
   {
    "t": "p",
    "x": "本标准旨在为各组织提供框架，以保护环境，响应变化的环境状况，同时与社会经济需求保持平衡。本标准规定了环境管理体系的要求，使组织能够实现其设定的环境管理体系的预期结果。"
   },
   {
    "t": "p",
    "x": "环境管理的系统方法可向最高管理者提供信息，通过下列途径以获得长期成功，并为促进可持续发展创造可选方案："
   },
   {
    "t": "ul",
    "items": [
     "——预防或减轻不利环境影响以保护环境；",
     "——减轻环境状况对组织的潜在不利影响；",
     "——帮助组织履行合规义务；",
     "——提升环境绩效；",
     "——运用生命周期观点，控制或影响组织的产品和服务的设计、制造、交付、消费和处置的方式，能够防止环境影响被无意地转移到生命周期的其他阶段；",
     "——实施环境友好的、且可巩固组织市场地位的可选方案，以获得财务和运营收益；",
     "——与有关的相关方沟通环境信息。"
    ]
   },
   {
    "t": "p",
    "x": "本标准不增加或改变组织的法律法规要求。"
   }
  ]
 },
 {
  "id": "0.3",
  "num": "0.3",
  "title": "成功因素",
  "blocks": [
   {
    "t": "p",
    "x": "环境管理体系的成功实施取决于最高管理者领导下的组织各层次和职能的承诺。组织可利用机遇，尤其是那些具有战略和竞争意义的机遇，预防或减轻不利的环境影响，增强有益的环境影响。"
   },
   {
    "t": "p",
    "x": "通过将环境管理融入到组织的业务过程、战略方向和决策制定过程，与其他业务的优先项相协调，并将环境治理纳入组织的全面管理体系中，最高管理者就能够有效地应对其风险和机遇。"
   },
   {
    "t": "p",
    "x": "成功实施本标准可使相关方确信组织已建立了有效的环境管理体系。然而，采用本标准本身并不能保证能够获得最佳环境结果。"
   },
   {
    "t": "p",
    "x": "本标准的应用可因组织所处环境的不同而存在差异。两个组织可能从事类似的活动，但是可能拥有不同的合规义务、环境方针承诺，使用不同的环境技术，并具有不同的环境绩效目标，然而它们均能满足本标准的要求。环境管理体系的详略和复杂程度将取决于组织所处的环境、其环境管理体系的范围、其合规义务，及其活动、产品和服务的性质，包括其环境因素和相关的环境影响。"
   }
  ]
 },
 {
  "id": "0.4",
  "num": "0.4",
  "title": "策划—实施—检查—改进模式",
  "blocks": [
   {
    "t": "p",
    "x": "构成环境管理体系的方法是基于策划、实施、检查与改进（PDCA）的概念。PDCA模式为组织提供了一个循环渐进的过程，用以实现持续改进。该模式可应用于环境管理体系及其每个单独的要素。该模式可简述如下："
   },
   {
    "t": "ul",
    "items": [
     "——策划：建立所需的环境目标和过程，以实现与组织的环境方针相一致的结果；",
     "——实施：实施所策划的过程；",
     "——检查：依据环境方针（包括其承诺）、环境目标和运行准则，对过程进行监视和测量，并报告结果；",
     "——改进：采取措施以持续改进。"
    ]
   },
   {
    "t": "note",
    "x": "图1展示了本标准采用的框架如何融入PDCA模式：第4章“组织环境”与第5章“领导作用”居于核心，第6章“策划”对应策划（Plan），第7章“支持”与第8章“运行”对应实施（Do），第9章“绩效评价”对应检查（Check），第10章“改进”对应处置（Act）。"
   }
  ]
 },
 {
  "id": "0.5",
  "num": "0.5",
  "title": "本标准内容",
  "blocks": [
   {
    "t": "p",
    "x": "本标准符合ISO对管理体系标准的要求。这些要求包括一个协调的结构，相同的核心正文，以及具有核心定义的通用术语，目的是方便使用者实施多个ISO管理体系标准。"
   },
   {
    "t": "p",
    "x": "本标准不包含针对其他管理体系的要求，例如：质量、职业健康安全、能源或财务管理。然而，本标准使组织能够运用共同的方法和基于风险的思维，将其环境管理体系与其他管理体系的要求进行整合。本标准包括了评价符合性所需的要求。任何有愿望的组织均可能通过以下方式证实符合本标准："
   },
   {
    "t": "ul",
    "items": [
     "——进行自我评价和自我声明；",
     "——寻求组织的相关方（例如：顾客），对其符合性进行确认；",
     "——寻求组织的外部机构对其自我声明的确认；",
     "——寻求外部组织对其环境管理体系进行认证或注册。"
    ]
   },
   {
    "t": "p",
    "x": "附录A提供了解释性信息以防止对本标准要求的错误理解。有关环境管理体系的实施指南包含在ISO 14004中。"
   },
   {
    "t": "p",
    "x": "本标准使用以下助动词："
   },
   {
    "t": "ul",
    "items": [
     "——“应”（shall）表示要求；",
     "——“应当”（should）表示建议；",
     "——“可以”（may）表示允许；",
     "——“可、能够”（can）表示可能性或能力。"
    ]
   },
   {
    "t": "note",
    "x": "标记“注”的信息旨在帮助理解或使用本文件。第3章使用的“注”提供了附加信息，以补充术语信息，可能包括使用术语的相关规定。"
   }
  ]
 },
 {
  "id": "1",
  "num": "1",
  "title": "范围（Scope）",
  "blocks": [
   {
    "t": "p",
    "x": "本标准规定了组织能够用于提升其环境绩效的环境管理体系的要求。本标准旨在供寻求以系统方式管理其环境责任的组织使用，从而为可持续发展的环境支柱做出贡献。"
   },
   {
    "t": "p",
    "x": "本标准可帮助组织实现其环境管理体系的预期结果，这些结果将为环境、组织自身和相关方带来价值。环境管理体系的预期结果包括："
   },
   {
    "t": "ul",
    "items": [
     "——提升环境绩效；",
     "——履行合规义务；",
     "——实现环境目标。"
    ]
   },
   {
    "t": "p",
    "x": "本标准适用于任何规模、类型和性质的组织，并适用于组织基于生命周期观点所确定的其活动、产品和服务中能够控制或施加影响的环境因素。"
   },
   {
    "t": "p",
    "x": "本标准并未提出具体的环境绩效准则。"
   },
   {
    "t": "p",
    "x": "本标准能够全部或部分地用于系统地改进环境管理，然而，只有当标准的所有要求都被包含在组织的环境管理体系中且全部得到满足，组织才能声明符合本标准。"
   }
  ]
 },
 {
  "id": "2",
  "num": "2",
  "title": "规范性引用文件",
  "blocks": [
   {
    "t": "p",
    "x": "无规范性引用文件。"
   }
  ]
 },
 {
  "id": "3",
  "num": "3",
  "title": "术语和定义",
  "blocks": [
   {
    "t": "p",
    "x": "本标准采用下列术语和定义。ISO和IEC在以下地址维护用于标准化的术语数据库：ISO在线浏览平台可在 https://www.iso.org/obp 获取；IEC电子百科可在 https://www.electropedia.org/ 获取。"
   }
  ]
 },
 {
  "id": "3.1",
  "num": "3.1",
  "title": "与组织和领导作用有关的术语",
  "blocks": [
   {
    "t": "p",
    "x": "管理体系（management system）：组织用于建立方针、目标以及实现这些目标的过程的相互关联或相互作用的一组要素。注1：一个管理体系可关注一个或多个领域，例如质量、环境、职业健康安全、能源或财务等领域。注2：管理体系要素包括组织的结构、角色和职责、策划和运行。"
   },
   {
    "t": "p",
    "x": "环境管理体系（environmental management system）：管理体系的一部分，用于管理环境因素、满足合规义务，并应对风险和机遇。"
   },
   {
    "t": "p",
    "x": "环境方针（environmental policy）：由最高管理者正式表述的、与环境绩效相关的组织意图和方向。"
   },
   {
    "t": "p",
    "x": "组织（organization）：为实现目标，由职责、权限和相互关系构成自身功能的一个人或一组人。注：组织包括但不限于个体经营者、公司、集团公司、企事业单位、政府机构、合伙企业、慈善机构、社团，或上述单位中的一部分或结合体，无论其是否具有法人资格、公有或私有。"
   },
   {
    "t": "p",
    "x": "最高管理者（top management）：在最高层指挥并控制组织的一个人或一组人。注：最高管理者有权在组织内部授权并提供资源。"
   },
   {
    "t": "p",
    "x": "相关方（interested party）：能够影响、被组织的决策或活动影响，或感觉自身受到组织决策或活动影响的个人或组织。示例：顾客、社区、供方、监管部门、非政府组织、投资者和员工。"
   }
  ]
 },
 {
  "id": "3.2",
  "num": "3.2",
  "title": "与策划有关的术语",
  "blocks": [
   {
    "t": "p",
    "x": "环境（environment）：组织运行活动的外部存在，包括空气、水、土地、自然资源、植物、动物、人，以及它们之间的相互关系。注：外部存在可能从组织内部延伸到当地、区域和全球系统；可用生物多样性、生态系统、气候或其他特征来描述。"
   },
   {
    "t": "p",
    "x": "环境因素（environmental aspect）：一个组织的活动、产品和服务中与环境或能与环境发生相互作用的要素。注：环境因素可能产生一种或多种环境影响，重大环境因素指具有或能够产生一种或多种重大环境影响的环境因素。"
   },
   {
    "t": "p",
    "x": "环境状况（environmental condition）：在某个特定时间点确定的环境的状态或特征。"
   },
   {
    "t": "p",
    "x": "环境影响（environmental impact）：全部或部分地由组织的环境因素给环境造成的不利或有益的变化。"
   },
   {
    "t": "p",
    "x": "目标（objective）：要实现的结果。环境目标（environmental objective）是组织依据其环境方针建立的目标。"
   },
   {
    "t": "p",
    "x": "污染预防（prevention of pollution）：为了降低有害的环境影响而采用（或综合采用）过程、惯例、技术、材料、产品、服务或能源以避免、减少或控制任何类型的污染物或废物的产生、排放或废弃。注：可包括源消减或消除，过程、产品或服务的更改，资源的有效利用，材料或能源替代，再利用、回收、再循环、再生或处理。"
   },
   {
    "t": "p",
    "x": "要求（requirement）：明示的、通常隐含的或必须满足的需求或期望。"
   },
   {
    "t": "p",
    "x": "合规义务（compliance obligations）：组织必须遵守的法律法规要求，以及组织必须遵守或选择遵守的其他要求。注：可能来自强制性要求（如适用的法律和法规），或来自自愿性承诺（如组织、行业标准、合同关系、与社团/非政府组织或其他相关方的协议）。"
   },
   {
    "t": "p",
    "x": "风险和机遇（risks and opportunities）：潜在的不利影响（威胁）和潜在的有益影响（机会）。"
   }
  ]
 },
 {
  "id": "3.3",
  "num": "3.3",
  "title": "与支持和运行有关的术语",
  "blocks": [
   {
    "t": "p",
    "x": "能力（competence）：运用知识和技能实现预期结果的本领。"
   },
   {
    "t": "p",
    "x": "文件化信息（documented information）：组织需要控制并保持的信息，以及承载信息的载体。注：可能包括环境管理体系（含相关过程）、为组织运行而创建的信息（文件），以及实现结果的证据（记录）。"
   },
   {
    "t": "p",
    "x": "过程（process）：使用或转化输入以交付结果的一组相互关联或相互作用的活动。"
   },
   {
    "t": "p",
    "x": "生命周期（life cycle）：产品（或服务）系统中前后衔接的一系列阶段，从自然界或从自然资源中获取原材料，直至最终处置。注：阶段包括原材料获取、设计、生产、运输和（或）交付、使用、寿命结束后处理和最终处置。"
   }
  ]
 },
 {
  "id": "3.4",
  "num": "3.4",
  "title": "与绩效评价和改进有关的术语",
  "blocks": [
   {
    "t": "p",
    "x": "审核（audit）：获取审核证据并予以客观评价，以判定审核准则满足程度的系统的、独立的过程。"
   },
   {
    "t": "p",
    "x": "符合（conformity）：满足要求。"
   },
   {
    "t": "p",
    "x": "绩效（performance）：可度量的结果。环境绩效（environmental performance）是与环境因素管理相关的绩效。"
   },
   {
    "t": "p",
    "x": "指标（indicator）：可测量或可描述的定量、定性或二元变量，用于表明运行、管理、状况或影响的状态。"
   },
   {
    "t": "p",
    "x": "监视（monitoring）：确定体系、过程或活动的状态。测量（measurement）：确定数值的过程。"
   },
   {
    "t": "p",
    "x": "不符合（nonconformity）：未满足要求。注：不符合与本标准要求及组织自身规定的附加的环境管理体系要求有关。"
   },
   {
    "t": "p",
    "x": "纠正措施（corrective action）：为消除不符合的原因并预防再次发生所采取的措施。"
   },
   {
    "t": "p",
    "x": "持续改进（continual improvement）：不断提升绩效的活动。注：提升绩效是指运用环境管理体系，提升与组织的环境方针相一致的环境绩效。"
   },
   {
    "t": "p",
    "x": "有效性（effectiveness）：实现策划的活动并取得策划的结果的程度。"
   }
  ]
 },
 {
  "id": "4",
  "num": "4",
  "title": "组织环境（Context of the organization）",
  "blocks": [
   {
    "t": "p",
    "x": "本章规定了理解组织及其所处的环境、理解相关方的需求和期望、确定环境管理体系的范围，以及建立环境管理体系及其过程的要求。"
   }
  ]
 },
 {
  "id": "4.1",
  "num": "4.1",
  "title": "理解组织及其所处的环境",
  "blocks": [
   {
    "t": "p",
    "x": "组织应确定与其宗旨相关且影响其实现环境管理体系预期结果的能力的外部和内部因素。这些因素应包括组织影响的或能够影响组织的环境状况，例如污染水平、自然资源的可得性、气候变化、生物多样性或生态系统健康（见A.4.1）。"
   },
   {
    "t": "p",
    "x": "组织应对这些内部和外部因素的相关信息进行监视和评审。"
   }
  ]
 },
 {
  "id": "4.2",
  "num": "4.2",
  "title": "理解相关方的需求和期望",
  "blocks": [
   {
    "t": "p",
    "x": "组织应确定："
   },
   {
    "t": "ul",
    "items": [
     "a）与环境管理体系有关的相关方；",
     "b）这些相关方的有关需求和期望（即要求）；",
     "c）这些需求和期望中哪些将成为其合规义务（见6.1.3）并将通过环境管理体系予以应对。"
    ]
   },
   {
    "t": "note",
    "x": "注1：相关方可对环境状况存在需求和期望，例如污染水平、自然资源的可得性、气候变化、生物多样性或生态系统健康。"
   },
   {
    "t": "note",
    "x": "注2：当组织决定遵守时，除法律要求外，相关方的其他需求和期望即构成合规义务。"
   }
  ]
 },
 {
  "id": "4.3",
  "num": "4.3",
  "title": "确定环境管理体系的范围",
  "blocks": [
   {
    "t": "p",
    "x": "组织应确定环境管理体系的边界和适用性，以确定其范围。确定范围时组织应考虑："
   },
   {
    "t": "ul",
    "items": [
     "a）4.1所提及的外部和内部因素；",
     "b）4.2所提及的合规义务；",
     "c）其组织单元、职能和物理边界；",
     "d）其活动、产品和服务；",
     "e）其对自身活动、产品和服务的生命周期实施控制与施加影响的权限和能力。"
    ]
   },
   {
    "t": "p",
    "x": "范围一经界定，该范围内组织的所有活动、产品和服务均需纳入环境管理体系。范围应作为文件化信息可获取，并应向相关方提供。"
   }
  ]
 },
 {
  "id": "4.4",
  "num": "4.4",
  "title": "环境管理体系",
  "blocks": [
   {
    "t": "p",
    "x": "组织应按照本文件的要求建立、实施、保持并持续改进环境管理体系，包括所需的过程及其相互作用。"
   },
   {
    "t": "p",
    "x": "组织建立并保持环境管理体系时，应考虑在4.1和4.2中所获得的知识。"
   }
  ]
 },
 {
  "id": "5",
  "num": "5",
  "title": "领导作用（Leadership）",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者应通过展现领导作用和承诺，确保环境管理体系的有效性，并保护环境。"
   }
  ]
 },
 {
  "id": "5.1",
  "num": "5.1",
  "title": "领导作用与承诺",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者应通过下述方式证实其在环境管理体系方面的领导作用和承诺："
   },
   {
    "t": "ul",
    "items": [
     "a）对环境管理体系的有效性负责；",
     "b）确保建立环境方针和环境目标，并确保其与组织的战略方向及所处的环境相一致；",
     "c）确保将环境管理体系要求融入组织的业务过程；",
     "d）确保可获得环境管理体系所需的资源；",
     "e）就有效环境管理的重要性和符合环境管理体系要求的重要性进行沟通；",
     "f）确保环境管理体系实现其预期结果；",
     "g）指导并支持人员对环境管理体系的有效性做出贡献；",
     "h）促进持续改进；",
     "i）支持其他相关岗位在其职责范围内证实其领导作用。"
    ]
   },
   {
    "t": "note",
    "x": "注：本标准所提及的“业务”可广义地理解为涉及组织存在目的的那些核心活动。"
   }
  ]
 },
 {
  "id": "5.2",
  "num": "5.2",
  "title": "环境方针",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者应在界定的环境管理体系范围内建立、实施并保持环境方针，环境方针应："
   },
   {
    "t": "ul",
    "items": [
     "a）适合于组织的宗旨和所处的环境，包括其活动、产品和服务的性质、规模和环境影响；",
     "b）为制定环境目标提供框架；",
     "c）包括保护环境的承诺，其中包含污染预防及其他与组织所处环境有关的特定承诺；",
     "d）包括履行其合规义务的承诺；",
     "e）包括持续改进环境管理体系以提升环境绩效的承诺。"
    ]
   },
   {
    "t": "note",
    "x": "注：保护环境的其他特定承诺可包括自然资源的保存或保护、资源的可持续利用、减缓和适应气候变化、保护生物多样性和生态系统。"
   },
   {
    "t": "p",
    "x": "环境方针应："
   },
   {
    "t": "ul",
    "items": [
     "——作为文件化信息予以保持并可获取；",
     "——在组织内得到沟通；",
     "——可为相关方获取。"
    ]
   }
  ]
 },
 {
  "id": "5.3",
  "num": "5.3",
  "title": "岗位、职责和权限",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者应确保组织内相关岗位的职责和权限得到分配和沟通。"
   },
   {
    "t": "p",
    "x": "最高管理者应对下列事项分配职责和权限："
   },
   {
    "t": "ul",
    "items": [
     "a）确保环境管理体系符合本标准的要求；",
     "b）向最高管理者报告环境管理体系的绩效，包括环境绩效。"
    ]
   }
  ]
 },
 {
  "id": "6",
  "num": "6",
  "title": "策划（Planning）",
  "blocks": [
   {
    "t": "p",
    "x": "策划旨在确保环境管理体系能够实现其预期结果，并应对风险和机遇（包括重要环境因素与合规义务）。"
   }
  ]
 },
 {
  "id": "6.1",
  "num": "6.1",
  "title": "应对风险和机遇的措施",
  "blocks": [
   {
    "t": "p",
    "x": "组织应建立、实施并保持满足6.1.2—6.1.5的要求所需的过程。6.1.2～6.1.5所需的过程应作为文件化信息予以保持并可获取，其详尽程度应使人确信这些过程能按策划得到实施。"
   }
  ]
 },
 {
  "id": "6.1.1",
  "num": "6.1.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "策划环境管理体系时，组织应考虑："
   },
   {
    "t": "ul",
    "items": [
     "a）4.1所提及的外部和内部因素；",
     "b）4.2所提及的相关方的有关需求和期望（即要求）；",
     "c）4.3所提及的其环境管理体系的范围。"
    ]
   },
   {
    "t": "p",
    "x": "并确定与环境要素（见6.1.2）、合规义务（见6.1.3）以及4.1和4.2中识别的其他因素和要求（如有）相关的、需要应对的组织风险和机遇，以："
   },
   {
    "t": "ul",
    "items": [
     "——确保环境管理体系能够实现其预期结果；",
     "——预防或减少不期望的影响，包括外部环境状况对组织的潜在影响；",
     "——实现持续改进。"
    ]
   },
   {
    "t": "p",
    "x": "需应对的风险和机遇应作为文件化信息予以保持并可获取。"
   }
  ]
 },
 {
  "id": "6.1.2",
  "num": "6.1.2",
  "title": "环境因素",
  "blocks": [
   {
    "t": "p",
    "x": "组织应在所界定的环境管理体系范围内，确定其活动、产品和服务中能够控制和能够施加影响的环境因素及其相关的环境影响，此时应考虑生命周期观点。"
   },
   {
    "t": "note",
    "x": "注：生命周期观点包括考虑各生命周期阶段的环境因素和影响。生命周期阶段包括原材料获取、设计、生产、运输/交付、使用、报废处理和最终处置。"
   },
   {
    "t": "p",
    "x": "组织应确定潜在的紧急情况（参见8.2），包括可能对环境造成影响的情况。"
   },
   {
    "t": "p",
    "x": "确定环境因素时，组织应考虑："
   },
   {
    "t": "ul",
    "items": [
     "a）正常和异常状况；",
     "b）变更，包括已纳入计划的或新的开发，以及新的或修改的活动、产品和服务（见6.3）；",
     "c）潜在的紧急情况。"
    ]
   },
   {
    "t": "p",
    "x": "组织应运用所建立的准则，确定那些具有或可能具有重大环境影响的环境因素，即重要环境因素。"
   },
   {
    "t": "note",
    "x": "注：重要环境因素可导致与不利或有益环境影响有关的风险和机遇。"
   },
   {
    "t": "p",
    "x": "适当时，组织应在各层次和职能间沟通其重要环境因素。"
   },
   {
    "t": "p",
    "x": "以下内容应作为文件化信息予以保持并可获取："
   },
   {
    "t": "ul",
    "items": [
     "——环境因素及相关环境影响；",
     "——用于确定其重要环境因素的准则；",
     "——重要环境因素。"
    ]
   }
  ]
 },
 {
  "id": "6.1.3",
  "num": "6.1.3",
  "title": "合规义务",
  "blocks": [
   {
    "t": "p",
    "x": "组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）确定并获取与其环境因素有关的合规义务；",
     "b）确定如何将这些合规义务应用于组织；",
     "c）在建立、实施、保持和持续改进其环境管理体系时应考虑这些合规义务。"
    ]
   },
   {
    "t": "note",
    "x": "注：合规义务可能给组织带来风险和机遇。"
   },
   {
    "t": "p",
    "x": "合规义务应作为文件化信息予以保持并可获取。"
   }
  ]
 },
 {
  "id": "6.1.4",
  "num": "6.1.4",
  "title": "风险和机遇",
  "blocks": [
   {
    "t": "p",
    "x": "除6.1.2所确定的环境因素和6.1.3所确定的合规义务之外，组织应确定其环境管理体系范围内其他需应对的风险和机遇。这些风险和机遇可源于4.1所识别的外部和内部因素以及4.2所识别的相关方需求和期望（如顾客对可持续性的期望、气候变化影响、供应链中断等）。"
   },
   {
    "t": "p",
    "x": "组织保留根据其缓解风险和有效利用机遇的能力来决定应应对哪些风险或机遇的权力。需应对的风险和机遇是策划措施（见6.1.5）和建立环境目标（见6.2）的输入，并应作为文件化信息予以保持并可获取。"
   }
  ]
 },
 {
  "id": "6.1.5",
  "num": "6.1.5",
  "title": "措施的策划",
  "blocks": [
   {
    "t": "p",
    "x": "组织应策划："
   },
   {
    "t": "ul",
    "items": [
     "a）采取措施应对其：",
     {
      "t": "ul",
      "items": [
       "1）6.1.2中所确定的重要环境因素；",
       "2）6.1.3中所确定的合规义务；",
       "3）6.1.4中所确定的风险和机遇；"
      ]
     },
     "b）如何：",
     {
      "t": "ul",
      "items": [
       "1）在其环境管理体系过程（见6.2、第7章、第8章和9.1）中实施这些措施，或将这些措施融入其他业务过程；",
       "2）评价这些措施的有效性（见9.1）。"
      ]
     }
    ]
   },
   {
    "t": "p",
    "x": "当策划这些措施时，组织应考虑其可选技术方案、财务、运行和经营要求。"
   }
  ]
 },
 {
  "id": "6.2",
  "num": "6.2",
  "title": "环境目标及其实现的策划",
  "blocks": [
   {
    "t": "p",
    "x": "组织应在相关职能和层次建立环境目标，并策划实现环境目标所需的措施，将重要环境因素、合规义务和风险与机遇作为考虑输入。"
   }
  ]
 },
 {
  "id": "6.2.1",
  "num": "6.2.1",
  "title": "环境目标",
  "blocks": [
   {
    "t": "p",
    "x": "组织应在相关职能和层次建立环境目标，应考虑组织的重要环境因素和相关的合规义务，并考虑其风险和机遇。环境目标应："
   },
   {
    "t": "ul",
    "items": [
     "a）与环境方针一致；",
     "b）可测量（如可行）；",
     "c）得到监视；",
     "d）予以沟通；",
     "e）适当时予以更新；",
     "f）作为文件化信息予以保持并可获取。"
    ]
   }
  ]
 },
 {
  "id": "6.2.2",
  "num": "6.2.2",
  "title": "实现环境目标措施的策划",
  "blocks": [
   {
    "t": "p",
    "x": "策划如何实现环境目标时，组织应确定："
   },
   {
    "t": "ul",
    "items": [
     "a）要做什么；",
     "b）需要什么资源；",
     "c）由谁负责；",
     "d）何时完成；",
     "e）如何评价结果，包括用于监视实现其可测量的环境目标的进展的指标（见9.1.1）。"
    ]
   },
   {
    "t": "p",
    "x": "组织应考虑如何能将实现环境目标的措施融入其业务过程。"
   }
  ]
 },
 {
  "id": "6.3",
  "num": "6.3",
  "title": "变更的策划",
  "blocks": [
   {
    "t": "p",
    "x": "组织确定需要实施影响或可能影响环境管理体系的变更时，变更应按计划实施。变更管理应确保组织能实现环境管理体系的预期结果。"
   },
   {
    "t": "note",
    "x": "注1：环境管理体系变更需求可能源于内部或外部因素。"
   },
   {
    "t": "note",
    "x": "注2：本标准中多项要求涉及变更管理，示例参见A.6.3。"
   },
   {
    "t": "p",
    "x": "当策划这些措施时，组织应考虑其可选技术方案、财务、运行和经营要求。"
   }
  ]
 },
 {
  "id": "7",
  "num": "7",
  "title": "支持（Support）",
  "blocks": [
   {
    "t": "p",
    "x": "支持章节规定了为建立、实施、保持和持续改进环境管理体系所需资源的确定与提供，以及能力、意识、信息交流和文件化信息的要求。"
   }
  ]
 },
 {
  "id": "7.1",
  "num": "7.1",
  "title": "资源",
  "blocks": [
   {
    "t": "p",
    "x": "组织应确定并提供建立、实施、保持和持续改进环境管理体系所需的资源。"
   }
  ]
 },
 {
  "id": "7.2",
  "num": "7.2",
  "title": "能力",
  "blocks": [
   {
    "t": "p",
    "x": "组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）确定在其控制下工作的、影响其环境绩效和满足合规义务能力的人员所需的能力；",
     "b）基于适当的教育、培训或经历，确保这些人员是胜任的；",
     "c）确定与其环境因素和环境管理体系相关的培训需求；",
     "d）适当时，采取措施以获得所需的能力，并评价所采取措施的有效性。"
    ]
   },
   {
    "t": "note",
    "x": "注：适用的措施可包括，例如：向现有员工提供培训、指导，或重新分配工作；或聘用或签约能胜任的人员。"
   },
   {
    "t": "p",
    "x": "适当的文件化信息应作为能力的证据予以保持并可获取。"
   }
  ]
 },
 {
  "id": "7.3",
  "num": "7.3",
  "title": "意识",
  "blocks": [
   {
    "t": "p",
    "x": "组织应确保在其控制下工作的人员知晓："
   },
   {
    "t": "ul",
    "items": [
     "a）环境方针；",
     "b）与他们的工作有关的重要环境因素和相关的实际或潜在的环境影响；",
     "c）他们对环境管理体系有效性的贡献，包括提升环境绩效的益处；",
     "d）不符合环境管理体系要求，包括未履行组织合规义务的后果。"
    ]
   }
  ]
 },
 {
  "id": "7.4",
  "num": "7.4",
  "title": "信息交流",
  "blocks": [
   {
    "t": "p",
    "x": "组织应就环境管理体系的相关信息进行内部和外部信息交流。"
   }
  ]
 },
 {
  "id": "7.4.1",
  "num": "7.4.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "组织应建立、实施并保持与环境管理体系相关的内外部信息交流所需的过程，包括："
   },
   {
    "t": "ul",
    "items": [
     "a）交流什么；",
     "b）何时交流；",
     "c）与谁交流；",
     "d）如何交流。"
    ]
   },
   {
    "t": "p",
    "x": "建立信息交流过程时，组织应："
   },
   {
    "t": "ul",
    "items": [
     "——考虑其合规义务；",
     "——确保所交流的环境信息与环境管理体系生成的信息一致且可靠。"
    ]
   },
   {
    "t": "p",
    "x": "组织应对其环境管理体系的相关信息交流做出响应。"
   },
   {
    "t": "p",
    "x": "适当的文件化信息应作为组织信息交流的证据予以保持并可获取。"
   }
  ]
 },
 {
  "id": "7.4.2",
  "num": "7.4.2",
  "title": "内部信息交流",
  "blocks": [
   {
    "t": "p",
    "x": "组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）在其各职能和层次间就环境管理体系的相关信息进行内部信息交流，适当时，包括交流环境管理体系的变更；",
     "b）确保其信息交流过程使在其控制下工作的人员能够为持续改进做出贡献。"
    ]
   }
  ]
 },
 {
  "id": "7.4.3",
  "num": "7.4.3",
  "title": "外部信息交流",
  "blocks": [
   {
    "t": "p",
    "x": "组织应按照组织建立的信息交流过程及其合规义务的要求，就环境管理体系的相关信息进行外部信息交流。"
   }
  ]
 },
 {
  "id": "7.5",
  "num": "7.5",
  "title": "文件化信息",
  "blocks": [
   {
    "t": "p",
    "x": "组织应控制本标准所要求的文件化信息，以确保其充分、适宜和得到有效使用。"
   }
  ]
 },
 {
  "id": "7.5.1",
  "num": "7.5.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "组织的环境管理体系应包括："
   },
   {
    "t": "ul",
    "items": [
     "a）本标准要求的文件化信息；",
     "b）组织确定的实现环境管理体系有效性所必需的文件化信息。"
    ]
   },
   {
    "t": "note",
    "x": "注：不同组织的环境管理体系文件化信息的详尽程度可能不同，这取决于：组织的规模及其活动、过程、产品和服务的类型；证明履行其合规义务的需要；过程的复杂性及其相互作用；在组织控制下工作的人员的能力。"
   }
  ]
 },
 {
  "id": "7.5.2",
  "num": "7.5.2",
  "title": "文件化信息的创建和更新",
  "blocks": [
   {
    "t": "p",
    "x": "创建和更新文件化信息时，组织应确保适当的："
   },
   {
    "t": "ul",
    "items": [
     "a）标识和说明（例如：标题、日期、作者或参考文件编号）；",
     "b）形式（例如语言文字、软件版本、图表）和载体（例如：纸质的、电子的）；",
     "c）评审和批准，以确保适宜性和充分性。"
    ]
   }
  ]
 },
 {
  "id": "7.5.3",
  "num": "7.5.3",
  "title": "文件化信息的控制",
  "blocks": [
   {
    "t": "p",
    "x": "本标准和环境管理体系要求的文件化信息应予以控制，以确保："
   },
   {
    "t": "ul",
    "items": [
     "a）在需要的时间和场所均可获得并适用；",
     "b）得到充分的保护（例如防止失密、不当使用或完整性受损）。"
    ]
   },
   {
    "t": "p",
    "x": "为了控制文件化信息，组织应进行适用的活动："
   },
   {
    "t": "ul",
    "items": [
     "——分发、访问、检索和使用；",
     "——存储和保护，包括保持可读性；",
     "——变更的控制（例如：版本的控制）；",
     "——保留和处置。"
    ]
   },
   {
    "t": "note",
    "x": "注：“访问”可能指仅允许查阅文件化信息的决定，或可能允许并授权查阅和更改文件化信息的决定。"
   },
   {
    "t": "p",
    "x": "组织确定的、对环境管理体系的策划和运行所必需的外部来源文件化信息，应适当地予以识别并控制。"
   }
  ]
 },
 {
  "id": "8",
  "num": "8",
  "title": "运行（Operation）",
  "blocks": [
   {
    "t": "p",
    "x": "运行章节规定了为满足环境管理体系要求所需的过程策划与控制，包括运行策划和控制，以及对潜在紧急情况的应急准备和响应。"
   }
  ]
 },
 {
  "id": "8.1",
  "num": "8.1",
  "title": "运行策划和控制",
  "blocks": [
   {
    "t": "p",
    "x": "组织应建立、实施、控制并保持满足环境管理体系要求以及实施第6章所确定的措施所需的过程，通过："
   },
   {
    "t": "ul",
    "items": [
     "——建立过程的运行准则；",
     "——按照运行准则实施过程控制。"
    ]
   },
   {
    "t": "note",
    "x": "注：控制可包括工程控制和程序。控制可按层级（例如：消除、替代、管理）实施，并可单独使用或结合使用。"
   },
   {
    "t": "p",
    "x": "组织应对计划内的变更进行控制，并对非预期变更的后果予以评审，必要时，应采取措施减轻任何不利影响。"
   },
   {
    "t": "p",
    "x": "组织应确保对与环境管理体系预期结果相关的由外部提供的过程、产品或服务实施控制或施加影响，应在环境管理体系内规定对这些过程实施控制或施加影响的类型与程度。"
   },
   {
    "t": "p",
    "x": "从生命周期观点出发，组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）适当时，制定控制措施，确保在产品或服务的设计和开发过程中，落实其环境要求，此时应考虑生命周期的每一阶段；",
     "b）适当时，确定产品和服务采购的环境要求；",
     "c）与外部供方（包括承包方）沟通组织的相关环境要求；",
     "d）考虑提供与其产品和服务的运输或交付、使用、报废处理和最终处置相关的潜在重大环境影响的信息的需求。"
    ]
   },
   {
    "t": "p",
    "x": "8.1所需的过程应作为文件化信息予以保持并可获取，其详尽程度应使人确信这些过程能按策划得到实施。"
   }
  ]
 },
 {
  "id": "8.2",
  "num": "8.2",
  "title": "应急准备和响应",
  "blocks": [
   {
    "t": "p",
    "x": "组织应建立、实施并保持对6.1.2中识别的潜在紧急情况进行应急准备和做出响应所需的过程。组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）通过策划的措施做好应急情况的准备，以预防或减轻紧急情况所带来的不利环境影响；",
     "b）对实际发生的紧急情况做出响应；",
     "c）根据紧急情况的严重程度和潜在环境影响，采取相应的措施以预防或减轻紧急情况带来的后果；",
     "d）可行时，定期试验所策划的响应措施；",
     "e）定期评审并修订过程和策划的响应措施，特别是发生紧急情况后或进行试验后；",
     "f）适当时，向相关方，包括在组织控制下工作的人员提供与应急准备和响应相关的信息和培训。"
    ]
   },
   {
    "t": "p",
    "x": "8.2所需的过程应作为文件化信息予以保持并可获取，其详尽程度应使人确信这些过程能按策划得到实施。"
   }
  ]
 },
 {
  "id": "9",
  "num": "9",
  "title": "绩效评价（Performance evaluation）",
  "blocks": [
   {
    "t": "p",
    "x": "绩效评价章节规定了监视、测量、分析和评价，合规性评价，内部审核，以及管理评审的要求。"
   }
  ]
 },
 {
  "id": "9.1",
  "num": "9.1",
  "title": "监视、测量、分析和评价",
  "blocks": [
   {
    "t": "p",
    "x": "组织应评价其环境绩效和环境管理体系的有效性。"
   }
  ]
 },
 {
  "id": "9.1.1",
  "num": "9.1.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "组织应确定："
   },
   {
    "t": "ul",
    "items": [
     "a）需要监视、测量和分析的内容；",
     "b）适用的监视、测量、分析与评价的方法，以确保有效的结果；",
     "c）组织评价其环境绩效所依据的准则和适当的指标；",
     "d）何时应实施监视和测量；",
     "e）何时应分析和评价监视和测量结果。"
    ]
   },
   {
    "t": "p",
    "x": "适当时，组织应确保使用和维护经校准或验证的监视和测量设备。"
   },
   {
    "t": "p",
    "x": "组织应按照其建立的信息交流过程及其合规义务的要求，就相关环境绩效信息进行内部和外部信息交流。"
   },
   {
    "t": "p",
    "x": "适当的文件化信息应作为监视、测量、分析和评价结果的证据予以保持并可获取。"
   }
  ]
 },
 {
  "id": "9.1.2",
  "num": "9.1.2",
  "title": "合规性评价",
  "blocks": [
   {
    "t": "p",
    "x": "组织应建立、实施并保持评价其合规义务满足状况所需的过程。组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）确定实施合规性评价的频次；",
     "b）评价合规性，需要时采取措施；",
     "c）保持对其合规状况的了解和理解。"
    ]
   },
   {
    "t": "p",
    "x": "适当的文件化信息应作为合规性评价结果的证据予以保持并可获取。"
   }
  ]
 },
 {
  "id": "9.2",
  "num": "9.2",
  "title": "内部审核",
  "blocks": [
   {
    "t": "p",
    "x": "组织应按策划的时间间隔实施内部审核，以提供环境管理体系符合性信息。"
   }
  ]
 },
 {
  "id": "9.2.1",
  "num": "9.2.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "组织应按策划的时间间隔实施内部审核，以提供环境管理体系是否符合以下要求的信息："
   },
   {
    "t": "ul",
    "items": [
     "a）符合：",
     {
      "t": "ul",
      "items": [
       "1）组织自身环境管理体系的要求；",
       "2）本标准的要求；"
      ]
     },
     "b）得到了有效的实施和保持。"
    ]
   }
  ]
 },
 {
  "id": "9.2.2",
  "num": "9.2.2",
  "title": "内部审核方案",
  "blocks": [
   {
    "t": "p",
    "x": "组织应建立、实施并保持一个或多个内部审核方案，包括内部审核的频次、方法、职责、策划要求和报告。建立内部审核方案时，组织应考虑相关过程的环境重要性、影响组织的变化以及以往审核的结果。组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）规定每次审核的目标、准则和范围；",
     "b）选择审核员并实施审核，确保审核过程的客观性与公正性；",
     "c）确保向相关管理者报告审核结果。"
    ]
   },
   {
    "t": "p",
    "x": "以下文件化信息应予以保持并可获取：审核方案；审核方案实施的证据；审核结果的证据。"
   }
  ]
 },
 {
  "id": "9.3",
  "num": "9.3",
  "title": "管理评审",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者应按计划的时间间隔对组织的环境管理体系进行评审，以确保其持续的适宜性、充分性和有效性。"
   }
  ]
 },
 {
  "id": "9.3.1",
  "num": "9.3.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者应按计划的时间间隔对组织的环境管理体系进行评审，以确保其持续的适宜性、充分性和有效性。"
   }
  ]
 },
 {
  "id": "9.3.2",
  "num": "9.3.2",
  "title": "管理评审输入",
  "blocks": [
   {
    "t": "p",
    "x": "管理评审输入应包括："
   },
   {
    "t": "ul",
    "items": [
     "a）以往管理评审所采取措施的状况；",
     "b）以下方面的变化：",
     {
      "t": "ul",
      "items": [
       "1）与环境管理体系相关的外部和内部因素；",
       "2）相关方的与环境管理体系有关的需求和期望，包括合规义务；",
       "3）其重要环境因素；",
       "4）风险和机遇。"
      ]
     },
     "c）环境目标的实现程度；",
     "d）组织环境绩效方面的信息，包括以下方面的趋势：",
     {
      "t": "ul",
      "items": [
       "1）不符合和纠正措施；",
       "2）监视和测量的结果；",
       "3）其合规义务的履行情况；",
       "4）审核结果。"
      ]
     },
     "e）资源的充分性；",
     "f）来自相关方的有关信息交流，包括抱怨；",
     "g）持续改进的机会。"
    ]
   }
  ]
 },
 {
  "id": "9.3.3",
  "num": "9.3.3",
  "title": "管理评审结果",
  "blocks": [
   {
    "t": "p",
    "x": "管理评审的结果应包括："
   },
   {
    "t": "ul",
    "items": [
     "a）对环境管理体系的持续适宜性、充分性和有效性的结论；",
     "b）与持续改进机会相关的决策；",
     "c）与环境管理体系变更的任何需求相关的决策，包括资源；",
     "d）如需要，环境目标未实现时采取的措施；",
     "e）如需要，改进环境管理体系与其他业务过程融合的机会；",
     "f）任何对组织战略方向的影响。"
    ]
   },
   {
    "t": "p",
    "x": "文件化信息应作为管理评审结果的证据予以保持并可获取。"
   }
  ]
 },
 {
  "id": "10",
  "num": "10",
  "title": "改进（Improvement）",
  "blocks": [
   {
    "t": "p",
    "x": "改进章节规定了持续改进，以及不符合和纠正措施的要求。"
   }
  ]
 },
 {
  "id": "10.1",
  "num": "10.1",
  "title": "持续改进",
  "blocks": [
   {
    "t": "p",
    "x": "组织应通过确定改进机会（见第9章和10.2）并实施必要的措施以实现其环境管理体系的预期结果，持续改进环境管理体系的适宜性、充分性和有效性，以提升环境绩效。"
   }
  ]
 },
 {
  "id": "10.2",
  "num": "10.2",
  "title": "不符合和纠正措施",
  "blocks": [
   {
    "t": "p",
    "x": "发生不符合时，组织应："
   },
   {
    "t": "ul",
    "items": [
     "a）对不符合做出响应，适用时：",
     {
      "t": "ul",
      "items": [
       "1）采取措施控制并纠正不符合；",
       "2）处理后果，包括减轻不利的环境影响。"
      ]
     },
     "b）通过以下活动评价消除不符合原因的措施需求，以防止不符合再次发生或在其他地方发生：",
     {
      "t": "ul",
      "items": [
       "——评审不符合；",
       "——确定不符合的原因；",
       "——确定是否存在或是否可能发生类似的不符合。"
      ]
     },
     "c）实施任何所需的措施；",
     "d）评审采取的任何纠正措施的有效性；",
     "e）必要时，对环境管理体系进行变更。"
    ]
   },
   {
    "t": "p",
    "x": "纠正措施应与所发生的不符合造成的影响（包括环境影响）的重要程度相适应。"
   },
   {
    "t": "p",
    "x": "文件化信息应作为以下事项的证据予以保持并可获取："
   },
   {
    "t": "ul",
    "items": [
     "——不符合的性质和所采取的任何后续措施；",
     "——任何纠正措施的结果。"
    ]
   }
  ]
 },
 {
  "id": "A",
  "num": "附录A",
  "title": "附录A（资料性附录）本标准使用指南",
  "blocks": [
   {
    "t": "p",
    "x": "本附录所给出的解释性信息旨在防止对本标准所包含要求的误解。这些信息阐述了这些要求并与之保持一致，不拟增加、减少或以任何方式修改本标准的要求。"
   }
  ]
 },
 {
  "id": "A.1",
  "num": "A.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "本附录所给出的解释性信息旨在防止对本标准所包含要求的误解。这些信息阐述了这些要求并与之保持一致，不拟增加、减少或以任何方式修改本标准的要求。"
   },
   {
    "t": "p",
    "x": "本标准所包含的要求应当从系统或整体视角进行考虑。使用者不应当脱离其他条款孤立地阅读本标准的特定句子或条款。某些条款中的要求与其他条款中的要求之间存在着相互联系。例如：组织的环境方针（见5.2）中的承诺与措施策划（见6.1.5）、合规性评价（见9.1.2）、持续改进（见10.1）规定的要求之间的联系。"
   }
  ]
 },
 {
  "id": "A.2",
  "num": "A.2",
  "title": "结构和术语的说明",
  "blocks": [
   {
    "t": "p",
    "x": "本标准采用的条款结构和部分术语，旨在使组织理解其与其他管理体系标准的一致性。然而，本标准并未要求将其条款结构或术语应用于组织的环境管理体系或其文件，也未要求以本标准使用的术语替代组织使用的术语。"
   },
   {
    "t": "p",
    "x": "组织可选择使用适合其业务的术语（例如：“记录”“文件”“规程”），而不一定使用“文件化信息”。"
   }
  ]
 },
 {
  "id": "A.3",
  "num": "A.3",
  "title": "概念的澄清",
  "blocks": [
   {
    "t": "p",
    "x": "除了第3章给出的术语和定义外，以下还对所选取的概念进行了澄清，以防止误解："
   },
   {
    "t": "ul",
    "items": [
     "——“任何”一词的使用意指选用或选择。",
     "——“适当的”与“适用的”不得互换。“适当的”意指适合于或适于……的，并意味着某种程度的自由；而“适用的”意指相关的或有可能应用的，且意味着如果能够做到，就必须要做。",
     "——“考虑”一词意指有必要思考该主题，但可不予考虑；而“予以考虑”意指有必要思考该主题，但不能不予考虑。",
     "——“持续”指发生在一段时期内、带有间断的持续过程；而“连续”指不间断的持续，因此应当使用“持续”来描述改进。",
     "——“结果”指实施环境管理体系所预期和策划的后果；“成效”指具体的效果或产出，通常与测量、定性或定量数据、计算或绩效指标相关。",
     "——“确保”一词意指职责可以委派，但问责不能委派。",
     "——“确定”一词暗示了一个通过发现过程获得知识的过程。",
     "——“预期结果”指组织通过实施其环境管理体系想要实现的结果。最低限度的预期结果包括提升环境绩效、满足合规义务和实现环境目标。",
     "——本标准使用了一些新的术语，例如“满足合规义务”替代前版“履行合规义务”；“外包”已被删除，替换为“外部提供的过程、产品或服务”。"
    ]
   }
  ]
 },
 {
  "id": "A.4",
  "num": "A.4",
  "title": "组织所处的环境",
  "blocks": [
   {
    "t": "p",
    "x": "理解组织所处的环境用于建立、实施、保持并持续改进其环境管理体系，从而支持组织宗旨和战略方向（见4.4）。4.1所确定的外部和内部因素（包括环境状况）可能给组织或环境管理体系带来风险和机遇（见6.1.4）。"
   }
  ]
 },
 {
  "id": "A.4.1",
  "num": "A.4.1",
  "title": "理解组织及其所处的环境",
  "blocks": [
   {
    "t": "p",
    "x": "4.1旨在广泛理解与组织宗旨相关、并可能正面或负面影响组织管理其环境责任方式的因素。因素是对组织而言的重要议题、需要辩论和讨论的事项，或是影响组织实现其环境管理体系预期结果能力的变化情况。"
   },
   {
    "t": "p",
    "x": "可能与组织所处的环境相关的外部和内部因素的示例包括："
   },
   {
    "t": "ul",
    "items": [
     "a）与气候、空气质量、水质、土地利用、现存污染、自然资源可获得性、生态系统健康和生物多样性等相关的，可能影响组织的宗旨或受其环境因素影响的环境状况；",
     "b）外部的自然、文化、社会、政治、法律、监管、财政、技术、经济和竞争环境，无论是地方的、区域的、国家的或国际的；",
     "c）组织内部特征或条件，例如：其活动、产品和服务、环境绩效、战略方向、文化与能力（即：人员、知识、过程、体系）。"
    ]
   },
   {
    "t": "p",
    "x": "环境状况可能具有局部性、区域性或全球性特征，并可能经历突发性或渐进性变化。生态系统健康是指生态系统的整体状况或完整性，以及其随时间推移维持结构、功能和韧性的能力。"
   }
  ]
 },
 {
  "id": "A.4.2",
  "num": "A.4.2",
  "title": "理解相关方的需求和期望",
  "blocks": [
   {
    "t": "p",
    "x": "组织宜对其已确定为相关的内、外部相关方所表达的需求和期望有一个总体概述。组织在确定这些需求和期望中哪些它必须满足或选择满足时，即其合规义务（见4.2），应考虑其所获得的知识。"
   },
   {
    "t": "p",
    "x": "相关方的要求不一定是组织必须满足的要求。一些相关方的要求体现了强制性的需求和期望，因为这些需求和期望已被纳入政府甚至法院判决所规定的法律、法规、许可和执照中。组织可决定自愿同意或采纳相关方的其他要求（例如：建立合同关系或参与自愿性倡议）。组织一旦采纳这些要求，它们就成为组织的要求（即合规义务），并在策划环境管理体系时予以考虑。"
   },
   {
    "t": "p",
    "x": "相关方对环境状况相关的需求与期望的示例包括：遵守环境污染物法规、报告自然资源消耗与温室气体排放信息，以及采取保护生物多样性与生态系统健康的组织实践。"
   }
  ]
 },
 {
  "id": "A.4.3",
  "num": "A.4.3",
  "title": "确定环境管理体系的范围",
  "blocks": [
   {
    "t": "p",
    "x": "环境管理体系的范围旨在明确环境管理体系所适用的物理边界和组织边界，尤其是当组织属于某大型组织的一部分时。组织可自主灵活地界定其边界。"
   },
   {
    "t": "p",
    "x": "设定范围时，环境管理体系的可信性取决于组织边界的选取。组织应运用生命周期观点考虑其对活动、产品和服务能够控制或施加影响的程度。范围的设定不应用于排除具有或可能具有重要环境因素的活动、产品、服务或设施，或规避其合规义务。范围是对包含在其环境管理体系边界内组织运行的真实且具有代表性的声明，不应具有误导性，也不得排除与符合环境管理体系要求的职能、运行或场所相关的相关信息。"
   },
   {
    "t": "p",
    "x": "一旦组织声明符合本文件的要求，即应向相关方提供其范围声明。"
   }
  ]
 },
 {
  "id": "A.4.4",
  "num": "A.4.4",
  "title": "环境管理体系",
  "blocks": [
   {
    "t": "p",
    "x": "组织保留权限和责任决定如何满足本文件的要求，包括以下事项的详细程度和范围："
   },
   {
    "t": "ul",
    "items": [
     "a）建立一个或多个过程（包括过程职责），以确信组织能够实现环境管理体系的预期结果；",
     "b）将环境管理体系要求融入其各项业务过程中，例如：设计和开发、采购、生产、人力资源、销售和市场营销过程；",
     "c）将与组织所处的环境相关的因素和相关方要求纳入其环境管理体系。"
    ]
   },
   {
    "t": "p",
    "x": "组织可灵活确定如何构建其过程结构以满足本文件的要求，本文件不要求为每个要求单独制定过程或程序。"
   }
  ]
 },
 {
  "id": "A.5",
  "num": "A.5",
  "title": "领导作用",
  "blocks": [
   {
    "t": "p",
    "x": "为了证实领导作用和承诺，最高管理者负有环境管理体系有关的特定职责，应当亲自参与或进行指导。最高管理者可依据5.1中“确保”一词的含义向他人委派这些行动的某些职责，但最高管理者仍保留担责。"
   }
  ]
 },
 {
  "id": "A.5.1",
  "num": "A.5.1",
  "title": "领导作用和承诺",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者通过营造一种文化氛围，支持其他岗位在其职责范围内证实其领导作用，激励为组织工作或代表组织工作的人员积极参与有助于实现环境管理体系预期结果的活动，包括提升环境绩效、满足合规义务以及实现环境目标。"
   },
   {
    "t": "p",
    "x": "最高管理者可通过在环境和可持续发展事项上的行动，证实领导作用并增强相关方的信任。"
   }
  ]
 },
 {
  "id": "A.5.2",
  "num": "A.5.2",
  "title": "环境方针",
  "blocks": [
   {
    "t": "p",
    "x": "环境方针是声明承诺的一系列原则，最高管理者在这些承诺中概述组织支持并提升其环境绩效的意图。环境方针使组织能够制定其环境目标（见6.2），采取措施实现环境管理体系的预期结果，并实现持续改进（见第10章）。"
   },
   {
    "t": "p",
    "x": "为与环境管理体系的预期结果相一致，本文件规定了环境方针的三项基本承诺："
   },
   {
    "t": "ul",
    "items": [
     "a）保护环境；",
     "b）满足组织的合规义务；",
     "c）持续改进环境管理体系以提升环境绩效。"
    ]
   },
   {
    "t": "p",
    "x": "保护环境的承诺不仅是通过污染预防防止不利的环境影响，还要保护自然环境免遭因组织的活动、产品和服务而导致的危害与退化。组织追求的特定承诺应当与其所处的环境（包括当地或区域的环境状况）相关。"
   }
  ]
 },
 {
  "id": "A.5.3",
  "num": "A.5.3",
  "title": "岗位、职责和权限",
  "blocks": [
   {
    "t": "p",
    "x": "参与组织环境管理体系的人员应当对其在符合本文件要求和实现环境管理体系的预期结果方面的角色、职责和权限有清晰的理解。分派职责和权限，同时确保员工具备专业能力（见7.2）、意识（见7.3）及内部沟通（见7.4.2），可有效提升员工对环境管理体系的参与度。"
   },
   {
    "t": "p",
    "x": "5.3识别的特定角色和职责可分派给某个人（有时被称为“管理者代表”），也可由几个人分担，或分派给最高管理者中的某位成员。"
   }
  ]
 },
 {
  "id": "A.6",
  "num": "A.6",
  "title": "策划",
  "blocks": [
   {
    "t": "p",
    "x": "环境管理体系的策划遵循基于风险的方法，以确定：基于其影响的重要环境因素（见6.1.2）、与环境因素相关的合规义务（见6.1.3）、需应对的风险与机遇（见6.1.4）。组织可自主决定如何确定需应对的风险与机遇，无特定的方法、步骤数量或过程要求。"
   }
  ]
 },
 {
  "id": "A.6.1",
  "num": "A.6.1",
  "title": "应对风险和机遇的措施",
  "blocks": [
   {
    "t": "p",
    "x": "组织为满足6.1.2—6.1.5的要求所建立的过程的总体目的，在于确保组织能够实现其环境管理体系的预期结果，预防或减少不期望的影响，并实现持续改进。"
   }
  ]
 },
 {
  "id": "A.6.1.1",
  "num": "A.6.1.1",
  "title": "总则",
  "blocks": [
   {
    "t": "p",
    "x": "组织可自主决定如何确定需应对的风险与机遇，无特定的方法、步骤数量或过程要求。例如，组织可采用一个过程来考虑环境因素和影响，采用不同的过程来考虑风险与机遇，或采用一个过程同时涵盖二者。"
   }
  ]
 },
 {
  "id": "A.6.1.2",
  "num": "A.6.1.2",
  "title": "环境因素",
  "blocks": [
   {
    "t": "p",
    "x": "组织应在环境管理体系范围内确定其环境因素和相关环境影响，进而确定那些重要的、因此将由其环境管理体系应对的环境因素。全部或部分由环境因素导致的、对环境的任何不利或有益变化称为环境影响。环境因素和环境影响之间是因果关系。"
   },
   {
    "t": "p",
    "x": "确定其环境因素时，组织可能考虑下列事项：向大气的排放；向水体的排放；向土地的排放；原材料和自然资源的使用；能源使用；能量释放（如热能、辐射、振动、声、光）；废物和（或）副产品的产生；土地利用；海洋和沿海地区的利用。"
   },
   {
    "t": "p",
    "x": "确定环境因素应考虑：与当前和既往活动、产品和服务相关的过程输入和输出（包括预期的和非预期的）；计划的或新的开发；新的或修改的活动、产品和服务。所使用的方法应考虑正常和异常运行状况、关闭与启动阶段，以及可合理预见的紧急情况。"
   },
   {
    "t": "p",
    "x": "确定重要环境因素的方法不是唯一的，但所使用的方法和准则应提供一致的结果。当仅考虑环境准则时，一项环境因素可能不是重要环境因素，但当考虑了其他准则（如法律要求或相关方关注）时，它可能达到或超过确定重要性的阈值。"
   }
  ]
 },
 {
  "id": "A.6.1.3",
  "num": "A.6.1.3",
  "title": "合规义务",
  "blocks": [
   {
    "t": "p",
    "x": "组织应足够详细地确定其在4.2中识别的适用于其环境因素的合规义务，并确定这些合规义务如何应用于组织。"
   },
   {
    "t": "p",
    "x": "如果适用，与组织环境因素相关的强制性法律法规要求可能包括：政府机构或其他相关权力机构的要求；国际的、国家的和地方的相关法律法规；许可、执照或其他形式授权中规定的要求；监管机构颁布的法令、条例或指南；法院或行政法庭的裁决。"
   },
   {
    "t": "p",
    "x": "合规义务也包括组织必须采纳或选择采纳的、与其环境管理体系有关的其他相关方要求，例如：与社会团体或非政府组织达成的协议；与公共机构或顾客达成的协议；组织的要求；自愿性原则或业务守则；自愿性标志或环境承诺；合同安排产生的义务；相关的组织标准或行业标准。"
   }
  ]
 },
 {
  "id": "A.6.1.4",
  "num": "A.6.1.4",
  "title": "风险和机遇",
  "blocks": [
   {
    "t": "p",
    "x": "在环境管理体系策划阶段，组织宜考虑其运行所处的更广泛环境，而不仅限于环境因素和合规义务。这需要认识到，组织所处环境中的外部和内部因素同样可能带来风险与机遇，这些因素将影响组织实现预期结果、预防或减少不期望的影响以及持续改进的能力。"
   },
   {
    "t": "p",
    "x": "具有潜在有益影响的风险和机遇示例包括：向循环经济转型；实施改进的土地管理措施以增强生物多样性；提升员工参与度和培训水平；利用先进分析技术和实时数据采集；与环保组织、当地社区及供应商建立合作伙伴关系；提前采用新兴环保法律法规；引入政府资助的新技术以降低污染水平。"
   },
   {
    "t": "p",
    "x": "具有潜在不利影响的风险和机遇示例包括：因员工读写能力或语言障碍导致的环境泄漏事故；气候变化影响（洪水、干旱、极端高温、野火）；资源约束对生产及可持续发展目标造成的冲击；生物多样性丧失、水资源短缺等环境变化对运营的长期影响；未能满足合规义务导致声誉受损或法律诉讼。"
   }
  ]
 },
 {
  "id": "A.6.1.5",
  "num": "A.6.1.5",
  "title": "措施的策划",
  "blocks": [
   {
    "t": "p",
    "x": "组织宜对环境管理体系中需采取的措施形成总体理解，以应对其重要环境因素（见6.1.2）、合规义务（见6.1.3），以及为实现其环境管理体系预期结果而需优先应对的风险和机遇（见6.1.4）。"
   },
   {
    "t": "p",
    "x": "策划的措施可单独或结合方式融入环境管理体系过程，包括：建立环境目标（见6.2）；资源提供（见7.1）；能力培养（见7.2）；意识（见7.3）；信息交流（见7.4）；文件化信息（见7.5）；运行策划和控制（见8.1）；应急准备与响应（见8.2）；监视、测量、分析与评价（见9.1）。"
   },
   {
    "t": "p",
    "x": "将环境管理体系要求融入各项业务流程的相关措施包括：将环境要求纳入设计与开发过程；将外部提供的产品与服务的环境要求纳入合同或采购过程；将教育或经验能力要求纳入人力资源过程；将产品报废或处置要求纳入销售与营销过程。"
   }
  ]
 },
 {
  "id": "A.6.2",
  "num": "A.6.2",
  "title": "环境目标及其实现的策划",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者可在战略层面、战术层面或运行层面建立环境目标。战略层面包括组织的最高层次，其环境目标可适用于整个组织；战术和运行层面可包括针对组织内特定单元或职能的环境目标，且应与组织的战略方向相一致。"
   },
   {
    "t": "p",
    "x": "“应考虑重要环境因素”的要求，并不意味着必须针对每项重要环境因素建立一个环境目标；但在建立环境目标时这些要素具有高优先级。“可测量”指有可能使用与规定尺度有关的定量或定性方法，来确定是否实现了环境目标；通过规定“如可行”，承认在某些情况下可能无法测量环境目标，然而这种情况应当被视为例外。"
   }
  ]
 },
 {
  "id": "A.6.3",
  "num": "A.6.3",
  "title": "变更的策划",
  "blocks": [
   {
    "t": "p",
    "x": "管理变更是保持环境管理体系的重要部分，以确保组织能够持续实现其环境管理体系的预期结果。影响环境管理体系的变更可能源自内部或外部因素。组织宜策划实施和控制可能影响环境绩效的临时性及永久性变更。"
   },
   {
    "t": "p",
    "x": "本文件中有多项条款包含变更管理的要求，例如：环境因素（见6.1.2）；内部交流（见7.4.2）；文件化信息的控制（见7.5.3）；运行控制（见8.1）；内部审核方案（见9.2.2）；不符合与纠正措施（见10.2）。"
   }
  ]
 },
 {
  "id": "A.7",
  "num": "A.7",
  "title": "支持",
  "blocks": [
   {
    "t": "p",
    "x": "资源是环境管理体系有效运行和持续改进，以及提升环境绩效所必需的。资源可包括人力资源、自然资源、基础设施、技术和财务资源。内部资源可由外部供方补充。"
   }
  ]
 },
 {
  "id": "A.7.1",
  "num": "A.7.1",
  "title": "资源",
  "blocks": [
   {
    "t": "p",
    "x": "最高管理者应当确保那些负有环境管理体系职责的人员得到必需的资源支持。资源可包括人力资源、自然资源、基础设施、技术和财务资源。例如：人力资源包括专业技能和知识；基础设施资源包括组织的建筑物、设备、地下储罐和排水系统等；技术资源包括工程化污染控制、信息数据库和软件。"
   }
  ]
 },
 {
  "id": "A.7.2",
  "num": "A.7.2",
  "title": "能力",
  "blocks": [
   {
    "t": "p",
    "x": "本标准的能力要求适用于那些可能影响组织环境绩效的、在组织控制下工作的人员，包括：其工作可能造成重大环境影响的人员；被分派了环境管理体系职责的人员（包括确定并评价环境影响或合规义务、为实现环境目标做出贡献、对紧急情况做出响应、实施内部审核、实施合规性评价的人员）。"
   }
  ]
 },
 {
  "id": "A.7.3",
  "num": "A.7.3",
  "title": "意识",
  "blocks": [
   {
    "t": "p",
    "x": "组织可通过多种方式提升员工意识，包括员工参与、沟通、培训以及内部方针（如行为准则）。对环境方针的认知不应理解为需要熟记承诺，也不应理解为在组织控制下工作的人员必须持有文件化的环境方针文本，而是这些人员应当意识到环境方针的存在、目的以及他们在实现承诺中所起的作用。"
   }
  ]
 },
 {
  "id": "A.7.4",
  "num": "A.7.4",
  "title": "信息交流",
  "blocks": [
   {
    "t": "p",
    "x": "信息交流使组织能够提供并获得与其环境管理体系相关的信息，包括与其重大环境因素、环境绩效、合规义务、相关方的需求和期望、持续改进建议相关的信息。信息交流是组织与相关方之间双向的过程。"
   },
   {
    "t": "p",
    "x": "信息交流应当具有以下特性：透明性；及时性；适当性（在格式、语言和媒介方面适当）；真实性；事实性、准确性和可信性；不排除相关信息；使相关方可理解。"
   }
  ]
 },
 {
  "id": "A.7.5",
  "num": "A.7.5",
  "title": "文件化信息",
  "blocks": [
   {
    "t": "p",
    "x": "组织应以确保环境管理体系适宜、充分和有效的方式创建和保持文件化信息。核心关注点应放在环境管理体系的实施和环境绩效上，而非复杂的文件化信息控制系统上。"
   },
   {
    "t": "p",
    "x": "除本标准特定条款要求的文件化信息外，组织可出于透明度、问责制、连续性、一致性、培训或便于审核的目的，选择创建额外的文件化信息。最初为非环境管理体系目的创建的文件化信息可予以使用，也可与其他信息管理体系整合，不必以手册的形式呈现。"
   }
  ]
 },
 {
  "id": "A.8",
  "num": "A.8",
  "title": "运行",
  "blocks": [
   {
    "t": "p",
    "x": "运行控制的类型和程度取决于运行的性质、重要环境因素、合规义务及风险和机遇。组织可灵活选择所需运行控制方法的类型，可单独或组合使用，以确保过程有效并实现预期结果。"
   }
  ]
 },
 {
  "id": "A.8.1",
  "num": "A.8.1",
  "title": "运行策划和控制",
  "blocks": [
   {
    "t": "p",
    "x": "运行控制方法可能包括：设计一个或多个预防或尽量减少不利环境影响并确保一致性结果的过程；运用技术来控制一个或多个过程并预防不利结果（即工程控制）；任用能胜任的人员；按规定的方式实施一个或多个过程；监视或测量一个或多个过程以检查结果；确定所需使用的文件化信息及其数量。"
   },
   {
    "t": "p",

    const chap = document.createElement('div'); chap.className='nav-chap'+(open?' open':'');
    chap.innerHTML = `<span class="num">${badge}</span>
      <span class="ttl">${g.label}</span><span class="cnt">${items.length}</span><span class="arrow">▶</span>`;
    const box = document.createElement('div'); box.className='nav-items'+(open?' open':'');
    items.forEach(c=>{
      const it = document.createElement('div');
      it.className='nav-item'+(stars.includes(c.id)?' starred':'');
      it.dataset.id=c.id;
      it.innerHTML=`<span class="id">${c.num}</span><span class="it">${c.title}</span>
        <span class="star" data-star="${c.id}" title="收藏">${stars.includes(c.id)?'★':'☆'}</span>`;
      it.addEventListener('click',e=>{
        if(e.target.dataset.star){toggleStar(c.id);return;}
        goto(c.id);
      });
      box.appendChild(it);
    });
    chap.addEventListener('click',()=>{
      const isOpen=box.classList.toggle('open'); chap.classList.toggle('open',isOpen);
      LS.set('open_'+g.key,isOpen);
    });
    gp.appendChild(chap); gp.appendChild(box); nav.appendChild(gp);
  });
}

/* ---------- 渲染条款内容 ---------- */
function renderBlocks(blocks, highlight=''){
  const re = highlight? new RegExp('('+escapeRe(highlight)+')','gi') : null;
  const hl = t=> re? t.replace(re,'<mark>$1</mark>') : escapeHtml(t);
  let html='';
  blocks.forEach(b=>{
    if(b.t==='p'){ html+=`<p>${hl(b.x)}</p>`; }
    else if(b.t==='note'){ html+=`<div class="block"><div class="note">${hl(b.x)}</div></div>`; }
    else if(b.t==='ul'){ html+=renderList(b,hl); }
  });
  return html;
}
function renderList(ul,hl){
  const letter=/^[a-z]\s*[）)、]/i;
  let html='<ul class="l">';
  ul.items.forEach(it=>{
    if(typeof it==='string'){
      const k = it.match(/^([a-z])\s*[）)、]/i)? it.match(/^([a-z])\s*[）)、]/i)[1]+'）'
               : it.match(/^(\d+)\s*[）)、.]/)? it.match(/^(\d+)\s*[）)、.]/)[1]+'）' : '';
      const content = k? it.slice(it.indexOf(k)+k.length).trim() : it;
      html+=`<li data-k="${k||'·'}">${hl(content)}</li>`;
    } else if(it.t==='ul'){
      html+=renderList(it,hl).replace('<ul class="l">','<ul class="l l2">');
    }
  });
  html+='</ul>';
  return html;
}

/* ---------- 跳转 / 显示条款 ---------- */
let currentId=null, currentHl='';
function goto(id, hl=''){
  const c = byId(id); if(!c) return;
  currentId=id; currentHl=hl; LS.set('last',id);
  if(!read.includes(id)){read.push(id);LS.set('read',read);}
  if($('#drawer').dataset.panel==='search') closeDrawer();
  recent = [id, ...recent.filter(r=>r!==id)].slice(0,12); LS.set('recent',recent);
  // 面包屑
  const g = topGroup(c);
  const gLabel = (GROUPS.find(x=>x.key===g)||{}).label||'';
  $('#breadcrumb').innerHTML = `<a onclick="goto('${id}')">知识库</a> <span>›</span> <b>${gLabel}</b> <span>›</span> <b>${c.num} ${c.title}</b>`;
  // 高亮侧栏
  $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  // 内容
  const idx = CLAUSES.findIndex(x=>x.id===id);
  const prev = CLAUSES[idx-1], next = CLAUSES[idx+1];
  const reqCount = (clauseText(c).match(/应/g)||[]).length;
  $('#content').innerHTML = `
    <div class="clause-head">
      <div class="clause-num">${c.num}</div>
      <div class="clause-title"><h1>${c.title}</h1>
        <div class="sub">${gLabel} · 含“应”要求 ${reqCount} 处 · ${read.includes(id)?'已读':'未读'}</div></div>
      <div class="clause-actions">
        <button class="mini-btn" id="copyBtn">📋 复制</button>
        <button class="mini-btn ${stars.includes(id)?'on':''}" id="starBtn">${stars.includes(id)?'★ 已收藏':'☆ 收藏'}</button>
        <button class="mini-btn" id="hlBtn">✨ 高亮要求</button>
      </div>
    </div>
    <div id="clauseBody">${renderBlocks(c.blocks, hl)}</div>
    <div class="pager">
      ${prev?`<a class="prev" onclick="goto('${prev.id}')"><span class="pl">← 上一条</span><span class="pt">${prev.num} ${prev.title}</span></a>`:'<span></span>'}
      ${next?`<a class="next" onclick="goto('${next.id}')"><span class="pl">下一条 →</span><span class="pt">${next.num} ${next.title}</span></a>`:'<span></span>'}
    </div>`;
  // 复制
  $('#copyBtn').addEventListener('click',()=>{
    const txt = `${c.num} ${c.title}\n\n`+clauseText(c);
    navigator.clipboard.writeText(txt).then(()=>toast('已复制到剪贴板'));
  });
  $('#starBtn').addEventListener('click',()=>{toggleStar(id); goto(id,currentHl);});
  $('#hlBtn').addEventListener('click',()=>highlightReq());
  $('#content').scrollTop=0;
  // 移动端自动收起侧栏
  if(window.innerWidth<=900) $('#aside').classList.add('collapsed');
  updateProgress();
}
function highlightReq(){
  const body=$('#clauseBody'); if(!body) return;
  // 切换：若已高亮则清除
  if(body.dataset.hl==='1'){ goto(currentId,currentHl); body.dataset.hl='0'; return; }
  const reg=/((?:组织|最高管理者|环境方针|环境目标)?应[^，。；、（）()\n]{0,40}?)(?:[，。；、]|$)/g;
  // 简单方案：对所有“应”出现的位置加标
  body.querySelectorAll('p,li,.note').forEach(node=>{
    node.innerHTML = node.innerHTML.replace(/应/g,'<span class="req-em">应</span>');
  });
  body.dataset.hl='1';
  toast('已高亮“应”要求条款');
}

/* ---------- 收藏 ---------- */
function toggleStar(id){
  if(stars.includes(id)) stars=stars.filter(s=>s!==id);
  else stars.push(id);
  LS.set('stars',stars);
  // 更新侧栏星标
  const it=document.querySelector(`.nav-item[data-id="${id}"]`);
  if(it){it.classList.toggle('starred',stars.includes(id));
    const s=it.querySelector('.star'); if(s)s.textContent=stars.includes(id)?'★':'☆';}
  buildNav($('#navFilter').value);
  // 刷新抽屉收藏列表（若打开）
  if($('#drawer').dataset.panel==='star') openStars();
}

/* ---------- 进度 ---------- */
function updateProgress(){
  const pct = Math.round(read.length/CLAUSES.length*100);
  $('#progress').style.width = pct+'%';
  $('#progress').title = `已读 ${read.length}/${CLAUSES.length}`;
}

/* ---------- 抽屉面板 ---------- */
function openDrawer(title,panel,html){
  $('#drawerTitle').textContent=title;
  $('#drawerBody').innerHTML=html;
  $('#drawer').classList.add('open');
  $('#drawer').dataset.panel=panel;
  $('#mask').classList.add('show');
}
function closeDrawer(){$('#drawer').classList.remove('open');$('#mask').classList.remove('show');$('#drawer').dataset.panel='';}
function openStars(){
  let h = stars.length? '' : '<div class="empty">还没有收藏任何条款。<br>点击条款右上角的 ☆ 即可收藏。</div>';
  stars.forEach(id=>{const c=byId(id); if(c) h+=`<div class="result" onclick="goto('${id}')"><div class="rid">${c.num}</div><div class="rt">${c.title}</div></div>`;});
  openDrawer(`⭐ 我的收藏（${stars.length}）`,'star',h);
}

function openQuiz(){

  QUIZ.forEach((q,i)=>{
    h+=`<div class="quiz-q" data-i="${i}"><div class="qt">Q${i+1}. ${q.q}</div>`;
    q.o.forEach((o,j)=>{h+=`<label data-j="${j}">${String.fromCharCode(65+j)}. ${o}</label>`;});
    h+=`<div class="exp">✅ 正确答案：${String.fromCharCode(65+q.a)}。${q.exp}</div></div>`;
  });
  openDrawer('🎯 自测练习','quiz',h);
  $$('#drawerBody .quiz-q label').forEach(lab=>{
    lab.addEventListener('click',()=>{
      const qbox=lab.closest('.quiz-q'); const i=+qbox.dataset.i; const j=+lab.dataset.j;
      if(qbox.classList.contains('answered')) return;
      qbox.classList.add('answered');
      qbox.querySelectorAll('label').forEach((L,k)=>{
        if(k===QUIZ[i].a) L.classList.add('ok');
        else if(k===j) L.classList.add('bad');
      });
    });
  });
}
function openStat(){
  const total=CLAUSES.length;
  const reqTotal=CLAUSES.reduce((s,c)=>s+(clauseText(c).match(/应/g)||[]).length,0);
  let chStat='';
  GROUPS.forEach(g=>{const items=groupOf[g.key]||[]; if(!items.length)return;
    const rc=items.filter(c=>read.includes(c.id)).length;
    chStat+=`<div class="stat" style="grid-column:span 1"><div class="n">${rc}/${items.length}</div><div class="l">${g.label.split(' ')[0]}</div></div>`;
  });
  let h=`<div class="stat-grid">
    <div class="stat"><div class="n">${total}</div><div class="l">条款总数</div></div>
    <div class="stat"><div class="n">${read.length}</div><div class="l">已读</div></div>
    <div class="stat"><div class="n">${Math.round(read.length/total*100)}%</div><div class="l">阅读进度</div></div>
    <div class="stat"><div class="n">${stars.length}</div><div class="l">收藏</div></div>
    <div class="stat"><div class="n">${reqTotal}</div><div class="l">“应”要求总数</div></div>
    <div class="stat"><div class="n">${PRINCIPLES.length}</div><div class="l">管理原则</div></div>
  </div>
  <h4 style="margin:18px 0 10px">各章阅读进度</h4>
  <div class="stat-grid">${chStat}</div>`;
  openDrawer('📊 统计','stat',h);
}

/* ---------- 搜索 ---------- */
function doSearch(q){
  q=q.trim();
  if(!q){ $('#searchCount').textContent=''; $('#searchClear').style.display='none'; goto(currentId||'0.1',currentHl); return; }
  $('#searchClear').style.display='block';
  const results=[];
  CLAUSES.forEach(c=>{
    const t=clauseText(c); const i=t.toLowerCase().indexOf(q.toLowerCase());
    if(i>=0){
      const start=Math.max(0,i-30); const snip=t.slice(start,i+ (t.length>i+30?60:q.length));
      results.push({c, snip});
    }
  });
  $('#searchCount').textContent = results.length? `${results.length} 条` : '无';
  let h='';
  if(!results.length) h='<div class="empty">未找到匹配“'+escapeHtml(q)+'”的条款。</div>';
  results.forEach(({c,snip})=>{
    const reg=new RegExp('('+escapeRe(q)+')','gi');
    const s=escapeHtml(snip).replace(reg,'<mark>$1</mark>');
    h+=`<div class="result" onclick="goto('${c.id}','${escapeHtml(q).replace(/'/g,"\\'")}')">
      <div class="rid">${c.num} · ${c.title}</div>
      <div class="rs">…${s}…</div></div>`;
  });
  // 将搜索结果放入侧栏下方？这里用抽屉展示，避免覆盖正文
  openDrawer('🔍 搜索结果：'+results.length+' 条','search',h);
}

/* ---------- 提示 ---------- */
let toastTimer;
function toast(msg){
  let t=$('#toast'); if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:10px;z-index:200;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.25s';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity='0',1600);
}

/* ---------- 主题 / 字号 ---------- */
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);}
function applyFont(){document.body.style.fontSize=fontSize+'px';}

/* ---------- 初始化 ---------- */
function init(){
  applyTheme(); applyFont(); updateProgress(); buildNav();
  goto(LS.get('last','0.1'));
  // 顶栏按钮
  $('#btnNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#toggleNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#collapseNav').addEventListener('click',()=>$('#aside').classList.add('collapsed'));
  $('#btnStar').addEventListener('click',openStars);
  $('#btnGloss').addEventListener('click',openGloss);
  $('#btnGraph').addEventListener('click',openGraph);
  $('#btnQuiz').addEventListener('click',openQuiz);
  $('#btnStat').addEventListener('click',openStat);
  $('#drawerClose').addEventListener('click',closeDrawer);
  $('#mask').addEventListener('click',closeDrawer);
  $('#btnTheme').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';LS.set('theme',theme);applyTheme();toast('主题：'+(theme==='dark'?'深色':'浅色'));});
  $('#btnFontU').addEventListener('click',()=>{fontSize=Math.min(24,fontSize+1);LS.set('font',fontSize);applyFont();});
  $('#btnFontD').addEventListener('click',()=>{fontSize=Math.max(12,fontSize-1);LS.set('font',fontSize);applyFont();});
  $('#btnPrint').addEventListener('click',()=>window.print());
  $('#navFilter').addEventListener('input',e=>buildNav(e.target.value));
  // 搜索
  const sb=$('#search');
  sb.addEventListener('input',e=>{ const v=e.target.value; if(!v){$('#searchCount').textContent='';$('#searchClear').style.display='none';return;} doSearch(v); });
  sb.addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(sb.value); });
  $('#searchClear').addEventListener('click',()=>{sb.value='';$('#searchCount').textContent='';$('#searchClear').style.display='none';closeDrawer();goto(currentId,currentHl);});
  // 键盘快捷键
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    const idx=CLAUSES.findIndex(x=>x.id===currentId);
    if(e.key==='ArrowRight'&&idx<CLAUSES.length-1) goto(CLAUSES[idx+1].id);
    if(e.key==='ArrowLeft'&&idx>0) goto(CLAUSES[idx-1].id);
    if(e.key==='/'&&!e.ctrlKey){e.preventDefault();sb.focus();}
    if(e.key==='Escape') closeDrawer();
  });
  // 关闭抽屉时若处于搜索态则不清空，仅隐藏
}
init();
</script>
