<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本机配置真实检测中心</title>
<style>
  :root{
    --bg:#0d1117; --bg2:#11161f; --panel:#161b22; --panel2:#1c2330;
    --border:#2a3340; --border2:#3a4658;
    --text:#c9d1d9; --text2:#8b97a7; --muted:#5f6b7d;
    --accent:#58a6ff; --accent2:#7ee787; --warn:#f0883e; --danger:#ff7b72;
    --mono:"SF Mono",ui-monospace,"Cascadia Code","JetBrains Mono",Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden}
  .app{display:flex;height:100vh}
  .sidebar{width:232px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
  .brand{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
  .brand p{font-size:11px;color:var(--muted);margin-top:4px}
  nav{padding:10px 8px;flex:1}
  .nav-group{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:14px 12px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:2px 0;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:background .15s,color .15s;user-select:none}
  .nav-item:hover{background:var(--panel);color:var(--text)}
  .nav-item.active{background:linear-gradient(90deg,rgba(88,166,255,.18),rgba(88,166,255,.04));color:var(--accent);font-weight:600}
  .nav-item .ico{width:16px;text-align:center;opacity:.9}
  .nav-item .badge{margin-left:auto;font-size:10px;background:var(--panel2);color:var(--text2);padding:1px 7px;border-radius:10px;border:1px solid var(--border)}
  .sidebar .foot{padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{height:54px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--bg2)}
  .topbar .title{font-size:15px;font-weight:700}
  .topbar .clock{font-family:var(--mono);color:var(--accent2);font-size:13px}
  .topbar .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--panel);color:var(--text);font-size:12.5px;cursor:pointer;transition:.15s;font-family:var(--sans)}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#06121f;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{filter:brightness(1.1);color:#06121f}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .content{flex:1;overflow-y:auto;padding:20px 24px 40px}
  .section{display:none;animation:fade .25s ease}
  .section.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .sec-head h2{font-size:17px;font-weight:700}
  .sec-head .sub{font-size:12px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:.15s}
  .card:hover{border-color:var(--border2);box-shadow:0 4px 18px rgba(0,0,0,.25)}
  .card h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .card h3 .ic{color:var(--accent)}
  .card h3 .cnt{margin-left:auto;font-size:10px;color:var(--muted)}
  .kv{display:flex;justify-content:space-between;gap:14px;padding:6px 0;border-bottom:1px dashed var(--border)}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--text2);font-size:12.5px;flex-shrink:0;max-width:55%}
  .kv .v{font-family:var(--mono);font-size:12.5px;text-align:right;word-break:break-word;color:var(--text)}
  .v.ok{color:var(--accent2)} .v.warn{color:var(--warn)} .v.bad{color:var(--danger)} .v.na{color:var(--muted)}
  .pill{display:inline-block;padding:1px 9px;border-radius:10px;font-size:11px;font-family:var(--mono)}
  .pill.ok{background:rgba(126,231,135,.13);color:var(--accent2)}
  .pill.warn{background:rgba(240,136,62,.13);color:var(--warn)}
  .pill.bad{background:rgba(255,123,114,.13);color:var(--danger)}
  .pill.na{background:rgba(95,107,125,.15);color:var(--muted)}
  .pill.maybe{background:rgba(88,166,255,.13);color:var(--accent)}
  .bar{height:8px;border-radius:6px;background:var(--panel2);overflow:hidden;margin-top:8px;border:1px solid var(--border)}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s}
  .bar.warn > i{background:linear-gradient(90deg,var(--warn),#ffb86b)}
  .bar.bad > i{background:linear-gradient(90deg,var(--danger),#ff9d96)}
  .list-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
  .list-row:last-child{border-bottom:none}
  .list-row .li-ico{width:30px;height:30px;border-radius:8px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .list-row .li-body{flex:1;min-width:0}
  .list-row .li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-row .li-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .list-row .li-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--panel2);color:var(--text2);flex-shrink:0}
  .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6}
  .empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}
  .overview-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px}
  .oc{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  .oc .t{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
  .oc .n{font-size:18px;font-weight:700;margin-top:6px;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .oc .s{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:var(--accent2)} .toast.err{border-color:var(--danger)}
  .search{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:6px 11px;width:200px}
  .search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:var(--sans)}
  .search input::placeholder{color:var(--muted)}
  .copy-btn{font-size:10px;padding:1px 6px;border:1px solid var(--border2);border-radius:6px;color:var(--text2);cursor:pointer;background:var(--panel2);margin-left:6px}
  .copy-btn:hover{color:var(--accent);border-color:var(--accent)}
  .scrollbox{max-height:180px;overflow:auto;font-family:var(--mono);font-size:11.5px;color:var(--text2);line-height:1.7;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg2)}
  .cap-row{display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-bottom:1px dashed var(--border);font-size:12px}
  .cap-row:last-child{border-bottom:none}
  .cap-row .ck{color:var(--text2);flex-shrink:0}
  .cap-row .cv{font-family:var(--mono);color:var(--text);text-align:right;word-break:break-word}
  .codec-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px}
  .codec-row:last-child{border-bottom:none}
  .codec-row .cn{font-family:var(--mono)}
  .perm-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px}
  .perm-row:last-child{border-bottom:none}
  .perm-row .pn{font-family:var(--mono);color:var(--text2)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#4a566a}
  @media(max-width:720px){
    .sidebar{position:fixed;z-index:50;height:100%;transform:translateX(-100%);transition:.25s}
    .sidebar.open{transform:none}
    .grid{grid-template-columns:1fr}
    .search{width:140px}
    .topbar .title{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1><span class="dot"></span>本机配置检测</h1>
      <p>仅显示本机真实读取的数据</p>
    </div>
    <nav id="nav">
      <div class="nav-group">总览与硬件</div>
      <div class="nav-item active" data-sec="overview"><span class="ico">📊</span>概览仪表盘</div>
      <div class="nav-item" data-sec="basic"><span class="ico">🧾</span>基础环境<span class="badge" id="b-basic">0</span></div>
      <div class="nav-item" data-sec="hardware"><span class="ico">⚙️</span>CPU / 内存<span class="badge" id="b-hardware">0</span></div>
      <div class="nav-item" data-sec="display"><span class="ico">🖥️</span>屏幕显示<span class="badge" id="b-display">0</span></div>
      <div class="nav-item" data-sec="gpu"><span class="ico">🎮</span>显卡 GPU<span class="badge" id="b-gpu">0</span></div>
      <div class="nav-group">设备与网络</div>
      <div class="nav-item" data-sec="battery"><span class="ico">🔋</span>电池电源<span class="badge" id="b-battery">0</span></div>
      <div class="nav-item" data-sec="network"><span class="ico">🌐</span>网络状态<span class="badge" id="b-network">0</span></div>
      <div class="nav-item" data-sec="storage"><span class="ico">💾</span>存储容量<span class="badge" id="b-storage">0</span></div>
      <div class="nav-item" data-sec="media"><span class="ico">🎥</span>媒体设备<span class="badge" id="b-media">0</span></div>
      <div class="nav-group">浏览器与系统</div>
      <div class="nav-item" data-sec="browser"><span class="ico">🧭</span>浏览器<span class="badge" id="b-browser">0</span></div>
      <div class="nav-item" data-sec="codecs"><span class="ico">🎞️</span>编解码支持<span class="badge" id="b-codecs">0</span></div>
      <div class="nav-item" data-sec="perf"><span class="ico">⚡</span>性能监视<span class="badge" id="b-perf">0</span></div>
      <div class="nav-item" data-sec="sensor"><span class="ico">📡</span>权限 / 字体 / 传感器<span class="badge" id="b-sensor">0</span></div>
      <div class="nav-item" data-sec="geo"><span class="ico">📍</span>地理位置<span class="badge" id="b-geo">0</span></div>
    </nav>
    <div class="foot">真实检测指标：<span id="totalCount">0</span> 项</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="btn" id="menuBtn" style="display:none">☰</button>
      <div class="title" id="secTitle">概览仪表盘</div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="spacer"></div>
      <div class="search"><span>🔎</span><input id="searchInput" placeholder="搜索指标…"></div>
      <button class="btn" id="copyAllBtn">📋 复制全部</button>
      <button class="btn" id="exportBtn">⬇️ 导出 JSON</button>
      <button class="btn primary" id="refreshBtn">🔄 重新检测</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const nav=$("#nav"), content=$("#content");
let DATA={};
let currentSec="overview";

/* ---------- 工具 ---------- */
function setVal(obj,k,v,status,hint){ obj[k]={label:k,value:v,status:status||"",hint:hint||""}; return obj[k]; }
function toast(msg,type){ const t=$("#toast"); t.textContent=msg; t.className="toast show "+(type||""); setTimeout(()=>t.className="toast",1800); }
async function copyText(t){ try{ await navigator.clipboard.writeText(t); toast("已复制到剪贴板","ok"); }catch(e){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");toast("已复制","ok");}catch(_){toast("复制失败","err");} document.body.removeChild(ta); } }
function pick(sec,key){ const o=DATA[sec]&&DATA[sec][key]; if(!o)return null; const v=o.value; return (typeof v==="object"&&v.t!==undefined)?v.t:String(v); }
function fmtBytes(b){ if(b===undefined||b===null||isNaN(b)||b<0)return null; const u=["B","KB","MB","GB","TB","PB"]; let i=0,n=b; while(n>=1024&&i<u.length-1){n/=1024;i++;} return (i===0?n:n.toFixed(2))+" "+u[i]; }
function fmtMS(ms){ if(ms===undefined||ms===null||isNaN(ms))return null; return ms>=1000?(ms/1000).toFixed(2)+" s":Math.round(ms)+" ms"; }
function yesNo(b){ return b?{t:"支持",s:"ok"}:{t:"不支持",s:"na"}; }

/* ---------- 检测模块（仅真实读取值） ---------- */
async function detectBasic(){
  const d={}, n=navigator;
  setVal(d,"用户代理 UA (UA)", n.userAgent);
  if(n.userAgentData&&n.userAgentData.brands&&n.userAgentData.brands.length)
    setVal(d,"UA 品牌/版本", n.userAgentData.brands.map(b=>b.brand+" "+b.version).join(", "));
  if(n.userAgentData&&typeof n.userAgentData.mobile==="boolean")
    setVal(d,"移动设备标识", n.userAgentData.mobile?{t:"是 (mobile)",s:"ok"}:{t:"否 (非 mobile)",s:"na"});
  setVal(d,"首选语言", n.language);
  if(n.languages&&n.languages.length) setVal(d,"支持语言列表", n.languages.join(", "));
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  if(tz) setVal(d,"系统时区", tz);
  setVal(d,"UTC 偏移", (-new Date().getTimezoneOffset()/60)+" 小时");
  setVal(d,"Cookie 启用", yesNo(!!n.cookieEnabled));
  if(n.doNotTrack!==null&&n.doNotTrack!==undefined&&n.doNotTrack!=="null")
    setVal(d,"Do Not Track", n.doNotTrack==="1"||n.doNotTrack==="yes"?{t:"开启",s:"warn"}:(n.doNotTrack==="0"?{t:"关闭",s:"ok"}:{t:String(n.doNotTrack),s:""}));
  setVal(d,"在线状态", n.onLine?{t:"在线",s:"ok"}:{t:"离线",s:"bad"});
  return d;
}
async function detectHardware(){
  const d={}, n=navigator;
  if(n.hardwareConcurrency) setVal(d,"CPU 逻辑核心数", n.hardwareConcurrency+" 核");
  if(n.userAgentData){
    const ua=n.userAgentData;
    if(ua.architecture) setVal(d,"CPU 架构", ua.architecture);
    if(ua.bitness) setVal(d,"CPU 位数", ua.bitness+" 位");
  }
  if(n.deviceMemory) setVal(d,"系统内存 (浏览器报告值)", n.deviceMemory+" GB（浏览器提供的近似值，非精确物理内存）");
  return d;
}
async function detectDisplay(){
  const d={}, s=screen;
  if(s.width&&s.height) setVal(d,"屏幕分辨率", s.width+" × "+s.height+" px");
  if(s.availWidth&&s.availHeight) setVal(d,"可用分辨率", s.availWidth+" × "+s.availHeight+" px");
  if(s.colorDepth) setVal(d,"色深", s.colorDepth+" bit");
  if(s.pixelDepth) setVal(d,"像素深度", s.pixelDepth+" bit");
  if(window.devicePixelRatio) setVal(d,"设备像素比 DPR", window.devicePixelRatio);
  if(s.colorGamut) setVal(d,"色彩空间", s.colorGamut);
  if(s.orientation&&s.orientation.type) setVal(d,"屏幕方向", s.orientation.type);
  if(window.matchMedia){
    if(window.matchMedia("(dynamic-range: high)").matches) setVal(d,"HDR 动态范围", {t:"支持 (high)",s:"ok"});
    if(window.matchMedia("(dynamic-range: standard)").matches) setVal(d,"HDR 动态范围", {t:"标准 (standard)",s:"na"});
  }
  if(window.innerWidth) setVal(d,"视口尺寸", window.innerWidth+" × "+window.innerHeight+" px");
  if(window.outerWidth) setVal(d,"浏览器窗口外径", window.outerWidth+" × "+window.outerHeight+" px");
  return d;
}
async function detectGPU(){
  const d={};
  // WebGPU（最贴近真实硬件的描述）
  if(navigator.gpu&&navigator.gpu.requestAdapter){
    try{
      const ad=await navigator.gpu.requestAdapter();
      if(ad){
        setVal(d,"WebGPU 适配器", "已获取");
        if(ad.isFallbackAdapter!==undefined) setVal(d,"WebGPU 是否为软件回退", ad.isFallbackAdapter?{t:"是 (软件渲染)",s:"warn"}:{t:"否 (硬件)",s:"ok"});
        const info=ad.info||(ad.requestAdapterInfo&&await ad.requestAdapterInfo().catch(()=>null));
        if(info){
          if(info.vendor) setVal(d,"WebGPU 厂商", info.vendor);
          if(info.architecture) setVal(d,"WebGPU 架构", info.architecture);
          if(info.device) setVal(d,"WebGPU 设备 ID", info.device);
          if(info.description) setVal(d,"WebGPU 描述", info.description);
        }
      } else { setVal(d,"WebGPU", {t:"不支持 / 无适配器",s:"na"}); }
    }catch(e){ setVal(d,"WebGPU", {t:"读取失败: "+e.message,s:"bad"}); }
  } else { setVal(d,"WebGPU", {t:"当前浏览器不支持",s:"na"}); }
  // WebGL（作为补充）
  try{
    const c=document.createElement("canvas"); c.width=1;c.height=1;
    const gl=c.getContext("webgl")||c.getContext("experimental-webgl");
    if(gl){
      const dbg=gl.getExtension("WEBGL_debug_renderer_info");
      const vendor=dbg?gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL):gl.getParameter(gl.VENDOR);
      const renderer=dbg?gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL):gl.getParameter(gl.RENDERER);
      if(vendor) setVal(d,"WebGL 厂商", vendor);
      if(renderer) setVal(d,"WebGL 渲染器", renderer);
      setVal(d,"WebGL 版本", gl.getParameter(gl.VERSION));
      if(gl.getParameter(gl.SHADING_LANGUAGE_VERSION)) setVal(d,"GLSL 版本", gl.getParameter(gl.SHADING_LANGUAGE_VERSION));
      const maxv=[
        ["MAX_TEXTURE_SIZE","最大纹理尺寸"],["MAX_CUBE_MAP_TEXTURE_SIZE","最大立方体贴图"],
        ["MAX_RENDERBUFFER_SIZE","最大渲染缓冲"],["MAX_VERTEX_ATTRIBS","最大顶点属性"],
        ["MAX_VERTEX_UNIFORM_VECTORS","顶点 Uniform 向量"],["MAX_FRAGMENT_UNIFORM_VECTORS","片元 Uniform 向量"],
        ["MAX_VARYING_VECTORS","最大 varying 向量"],["MAX_COMBINED_TEXTURE_IMAGE_UNITS","最大纹理单元"],
        ["MAX_DRAW_BUFFERS","最大绘制缓冲"],["MAX_TEXTURE_MAX_ANISOTROPY_EXT","最大各向异性"]
      ];
      maxv.forEach(([k,label])=>{ const v=gl.getParameter(gl[k]); if(v!==undefined&&v!==null) setVal(d,label,(Array.isArray(v)?v.join(" × "):v)); });
      const ext=gl.getSupportedExtensions()||[];
      setVal(d,"WebGL 扩展数量", ext.length+" 个");
      d._ext=ext;
    } else { setVal(d,"WebGL", {t:"不可用",s:"bad"}); }
  }catch(e){ setVal(d,"WebGL 检测", {t:"错误: "+e.message,s:"bad"}); }
  // WebGL2
  try{
    const c2=document.createElement("canvas");
    const gl2=c2.getContext("webgl2");
    setVal(d,"WebGL2 支持", gl2?{t:"支持 ("+gl2.getParameter(gl2.VERSION)+")",s:"ok"}:{t:"不支持",s:"na"});
  }catch(_){}
  return d;
}
async function detectBattery(){
  const d={};
  if(navigator.getBattery){
    try{
      const b=await navigator.getBattery();
      const upd=()=>{
        setVal(d,"充电状态", b.charging?{t:"充电中",s:"ok"}:{t:"使用电池",s:"warn"});
        setVal(d,"电量百分比", Math.round(b.level*100)+" %", b.level>0.5?"ok":(b.level>0.2?"warn":"bad"));
        setVal(d,"剩余/充满时间", b.charging?(b.chargingTime===Infinity?"计算中…":Math.round(b.chargingTime/60)+" 分钟充满"):(b.dischargingTime===Infinity?"计算中…":Math.round(b.dischargingTime/60)+" 分钟可用"));
        d._battery=b;
      };
      upd();
      b.addEventListener("chargingchange",upd);
      b.addEventListener("levelchange",upd);
      b.addEventListener("chargingtimechange",upd);
      b.addEventListener("dischargingtimechange",upd);
    }catch(e){ setVal(d,"电池", {t:"读取失败: "+e.message,s:"bad"}); }
  } else { setVal(d,"电池 API", {t:"当前浏览器不支持",s:"na"}); }
  return d;
}
async function detectNetwork(){

async function detectStorage(){
  const d={};
  if(navigator.storage&&navigator.storage.estimate){
    try{
      const e=await navigator.storage.estimate();
      const u=fmtBytes(e.usage), q=fmtBytes(e.quota);
      if(u) setVal(d,"已用空间", u);
      if(q) setVal(d,"配额/总量", q);
      if(e.quota){ const pct=Math.round(e.usage/e.quota*100); setVal(d,"使用占比", pct+" %", pct>90?"bad":(pct>70?"warn":"ok")); }
      if(navigator.storage.persisted) { const ps=await navigator.storage.persisted(); setVal(d,"持久化存储", ps?{t:"已开启",s:"ok"}:{t:"未开启",s:"warn"}); }
    }catch(e){ setVal(d,"存储", {t:"读取失败: "+e.message,s:"bad"}); }
  } else { setVal(d,"存储 API", {t:"不支持",s:"na"}); }
  return d;
}
async function detectMedia(){
  const d={}, devices=[];
  if(navigator.mediaDevices&&navigator.mediaDevices.enumerateDevices){
    try{ const raw=await navigator.mediaDevices.enumerateDevices();
      const hasLabel=raw.some(x=>x.label);
      if(hasLabel){ raw.forEach(x=>devices.push(x)); }
    }catch(e){ setVal(d,"媒体设备", {t:"枚举失败: "+e.message,s:"bad"}); }
  }
  // 仅在有真实 label 时展示；否则等待用户授权
  const cams=devices.filter(x=>x.kind==="videoinput"&&x.label);
  const mics=devices.filter(x=>x.kind==="audioinput"&&x.label);
  const spk=devices.filter(x=>x.kind==="audiooutput"&&x.label);
  d._devices=[];
  if(cams.length||mics.length||spk.length){
    cams.forEach(x=>d._devices.push({kind:"videoinput",name:x.label}));
    mics.forEach(x=>d._devices.push({kind:"audioinput",name:x.label}));
    spk.forEach(x=>d._devices.push({kind:"audiooutput",name:x.label}));
    setVal(d,"摄像头数量", cams.length+" 个");
    setVal(d,"麦克风数量", mics.length+" 个");
    setVal(d,"扬声器数量", spk.length+" 个");
  } else {
    d._needMediaAuth=true;
  }
  return d;
}
async function detectBrowser(){
  const d={}, n=navigator, ua=n.userAgent;
  let name="未知", ver="";
  if(/Edg\//.test(ua)){name="Microsoft Edge";ver=(ua.match(/Edg\/([\d.]+)/)||[])[1];}
  else if(/OPR\//.test(ua)||/Opera/.test(ua)){name="Opera";ver=(ua.match(/(?:OPR|Opera)\/([\d.]+)/)||[])[1];}
  else if(/Firefox\//.test(ua)){name="Firefox";ver=(ua.match(/Firefox\/([\d.+]+\w*)/)||[])[1];}
  else if(/Chrome\//.test(ua)&&!/Edg\//.test(ua)){name="Google Chrome";ver=(ua.match(/Chrome\/([\d.]+)/)||[])[1];}
  else if(/Safari\//.test(ua)&&/Version\//.test(ua)){name="Safari";ver=(ua.match(/Version\/([\d.]+)/)||[])[1];}
  else if(/Trident\//.test(ua)||/MSIE/.test(ua)){name="Internet Explorer";ver=(ua.match(/(?:MSIE |rv:)([\d.]+)/)||[])[1];}
  if(name!=="未知") setVal(d,"浏览器名称 (由 UA 识别)", name);
  if(ver) setVal(d,"浏览器版本 (由 UA 识别)", ver);
  // 特性支持（真实检测）
  const feats=[
    ["WebGL",()=>'WebGLRenderingContext'in window||!!document.createElement('canvas').getContext('webgl')],
    ["WebGL2",()=>'WebGL2RenderingContext'in window],
    ["WebGPU",()=>'gpu'in navigator],
    ["WebRTC",()=>!!(window.RTCPeerConnection||window.webkitRTCPeerConnection)],
    ["Service Worker",()=>'serviceWorker'in navigator],
    ["Web Worker",()=>typeof Worker!=='undefined'],
    ["WebSocket",()=>'WebSocket'in window],
    ["IndexedDB",()=>'indexedDB'in window],
    ["LocalStorage",()=>{try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true}catch(e){return false}}],
    ["SessionStorage",()=>{try{sessionStorage.setItem('_t','1');sessionStorage.removeItem('_t');return true}catch(e){return false}}],
    ["Geolocation",()=>'geolocation'in navigator],
    ["Notification",()=>'Notification'in window],
    ["Clipboard API",()=>!!(navigator.clipboard&&navigator.clipboard.writeText)],
    ["全屏 API",()=>'requestFullscreen'in document.documentElement||'webkitRequestFullscreen'in document.documentElement],
    ["Pointer Events",()=>'PointerEvent'in window],
    ["Touch Events",()=>'ontouchstart'in window],
    ["Web Bluetooth",()=>'bluetooth'in navigator],
    ["Web USB",()=>'usb'in navigator],
    ["Web Serial",()=>'serial'in navigator],
    ["Web Share",()=>'share'in navigator],
    ["Web Speech(语音识别)",()=>'webkitSpeechRecognition'in window||'SpeechRecognition'in window],
    ["Speech 合成",()=>'speechSynthesis'in window],
    ["Payment Request",()=>'PaymentRequest'in window],
    ["WebAuthn(通行密钥)",()=>!!(navigator.credentials&&navigator.credentials.create)],
    ["Push API",()=>'PushManager'in window],
    ["WebAssembly",()=>'WebAssembly'in window],
    ["Fetch API",()=>'fetch'in window],
    ["History API",()=>'history'in window&&!!history.pushState],
    ["BroadcastChannel",()=>'BroadcastChannel'in window],
    ["Channel Messaging",()=>'MessageChannel'in window],
    ["ResizeObserver",()=>'ResizeObserver'in window],
    ["IntersectionObserver",()=>'IntersectionObserver'in window],
    ["Permissions API",()=>!!(navigator.permissions&&navigator.permissions.query)],
    ["Storage Manager",()=>!!(navigator.storage&&navigator.storage.estimate)],
    ["Device Memory API",()=>'deviceMemory'in navigator],
    ["Hardware Concurrency",()=>'hardwareConcurrency'in navigator],
    ["User-Agent Client Hints",()=>!!navigator.userAgentData],
    ["High-Entropy UA",()=>!!(navigator.userAgentData&&navigator.userAgentData.getHighEntropyValues)],
    ["Display Media(屏幕共享)",()=>!!(navigator.mediaDevices&&navigator.mediaDevices.getDisplayMedia)],
    ["Idle Detection",()=>'IdleDetector'in window],
    ["Web Locks",()=>'locks'in navigator],
    ["File System Access",()=>'showOpenFilePicker'in window],
    ["Picture-in-Picture",()=>'document' in window && 'pictureInPictureEnabled' in document],
    ["Badge API",()=>'setAppBadge'in navigator],
    ["Contact Picker",()=>'contacts'in navigator&&'select'in navigator.contacts],
    ["VirtualKeyboard",()=>'virtualKeyboard'in navigator],
  ];
  feats.forEach(([k,fn])=>{ let ok=false; try{ok=!!fn();}catch(_){} setVal(d,k, ok?{t:"支持",s:"ok"}:{t:"不支持",s:"na"}); });
  // Notification 权限（真实）
  if('Notification'in window) setVal(d,"Notification 权限", Notification.permission);
  // Service Worker 注册（真实）
  if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations){
    try{ const regs=await navigator.serviceWorker.getRegistrations(); setVal(d,"Service Worker 注册数", regs.length+" 个"); }catch(_){}
  }
  // 偏好（真实媒体查询）
  if(window.matchMedia){
    if(window.matchMedia("(prefers-color-scheme: dark)").matches) setVal(d,"系统配色偏好", {t:"深色",s:"ok"});
    else if(window.matchMedia("(prefers-color-scheme: light)").matches) setVal(d,"系统配色偏好", {t:"浅色",s:"na"});
    if(window.matchMedia("(prefers-reduced-motion: reduce)").matches) setVal(d,"减少动效偏好", {t:"是",s:"warn"});
    else if(window.matchMedia("(prefers-reduced-motion: no-preference)").matches) setVal(d,"减少动效偏好", {t:"否",s:"na"});
  }
  return d;
}
async function detectCodecs(){
  const d={};
  const vEl=document.createElement("video"), aEl=document.createElement("audio");
  const vid=[
    ["H.264 基准 (MP4)","video/mp4; codecs=\"avc1.42E01E\""],
    ["H.264 高端 (MP4)","video/mp4; codecs=\"avc1.640028\""],
    ["HEVC / H.265","video/mp4; codecs=\"hev1.1.6.L93.B0\""],
    ["VP8 (WebM)","video/webm; codecs=\"vp8\""],
    ["VP9 (WebM)","video/webm; codecs=\"vp9\""],
    ["VP9 HDR (WebM)","video/webm; codecs=\"vp9.2\""],
    ["AV1 (MP4)","video/mp4; codecs=\"av01.0.05M.08\""],
    ["AV1 (WebM)","video/webm; codecs=\"av01.0.05M.08\""],
    ["Theora (Ogg)","video/ogg; codecs=\"theora\""],
    ["MPEG-1/2","video/mpeg"],
  ];
  const aud=[
    ["AAC (MP4)","audio/mp4; codecs=\"mp4a.40.2\""],
    ["MP3","audio/mpeg"],
    ["Opus (WebM)","audio/webm; codecs=\"opus\""],
    ["Opus (MP4)","audio/mp4; codecs=\"opus\""],
    ["FLAC","audio/flac"],
    ["FLAC (MP4)","audio/mp4; codecs=\"flac\""],
    ["WAV / PCM","audio/wav"],
    ["Vorbis (Ogg)","audio/ogg; codecs=\"vorbis\""],
    ["AMR","audio/amr"],
  ];
  const mse=[
    ["MSE: H.264","video/mp4; codecs=\"avc1.42E01E\""],
    ["MSE: VP9","video/webm; codecs=\"vp9\""],
    ["MSE: AV1","video/mp4; codecs=\"av01.0.05M.08\""],
    ["MSE: Opus","audio/mp4; codecs=\"opus\""],
  ];
  const map=r=> r==="probably"?{t:"支持 (probably)",s:"ok"}: r==="maybe"?{t:"可能 (maybe)",s:"maybe"}: {t:"不支持",s:"na"};
  d._vid=vid.map(([n,m])=>({n,res:vEl.canPlayType(m)}));
  d._aud=aud.map(([n,m])=>({n,res:aEl.canPlayType(m)}));
  d._mse=(window.MediaSource&&MediaSource.isTypeSupported)?mse.map(([n,m])=>({n,res:MediaSource.isTypeSupported(m)?{t:"支持",s:"ok"}:{t:"不支持",s:"na"}})):null;
  // 汇总到普通字段便于复制/导出
  d._vid.forEach(x=>setVal(d,"视频: "+x.n, map(x.res)));
  d._aud.forEach(x=>setVal(d,"音频: "+x.n, map(x.res)));
  if(d._mse) d._mse.forEach(x=>setVal(d,"MSE: "+x.n, x.res));
  return d;
}
async function detectPerf(){
  const d={};
  if(performance.memory){
    const m=performance.memory;
    const u=fmtBytes(m.usedJSHeapSize), t=fmtBytes(m.totalJSHeapSize), l=fmtBytes(m.jsHeapSizeLimit);
    if(u) setVal(d,"JS 堆 已用", u);
    if(t) setVal(d,"JS 堆 总量", t);
    if(l) setVal(d,"JS 堆 上限", l);
    if(l){ const pct=Math.round(m.usedJSHeapSize/m.jsHeapSizeLimit*100); setVal(d,"堆使用率", pct+" %", pct>85?"bad":(pct>65?"warn":"ok")); }
  }
  try{
    const nt=performance.getEntriesByType("navigation")[0];
    if(nt){
      const dns=(nt.domainLookupEnd)-(nt.domainLookupStart);
      const tcp=(nt.connectEnd)-(nt.connectStart);
      const req=(nt.responseStart)-(nt.requestStart);
      const res=(nt.responseEnd)-(nt.responseStart);
      const dom=(nt.domContentLoadedEventEnd)-(nt.domLoading||nt.startTime||0);
      const load=(nt.loadEventEnd)-(nt.startTime||0);
      const m=v=>{const s=fmtMS(v);return s?{t:s,s:""}:null;};
      let x;
      if((x=m(dns))) setVal(d,"DNS 解析耗时", x);
      if((x=m(tcp))) setVal(d,"TCP 连接耗时", x);
      if((x=m(req))) setVal(d,"请求耗时 (TTFB)", x);
      if((x=m(res))) setVal(d,"响应下载耗时", x);
      if((x=m(dom))) setVal(d,"DOM 就绪耗时", x);
      if((x=m(load))) setVal(d,"页面完全加载", x);
    }
  }catch(_){}
  try{
    const paints=performance.getEntriesByType("paint");
    paints.forEach(p=>{ if(p.name==="first-paint") setVal(d,"首次绘制 (FP)", fmtMS(p.startTime)); if(p.name==="first-contentful-paint") setVal(d,"首次内容绘制 (FCP)", fmtMS(p.startTime)); });
  }catch(_){}
  if(performance.now) setVal(d,"performance.now() 精度", (performance.now()).toFixed(3)+" ms（高精度计时器可用）");
  d._needFPS=true;
  return d;
}
async function detectSensor(){
  const d={}, n=navigator;
  if(n.maxTouchPoints!==undefined&&n.maxTouchPoints!==null) setVal(d,"最大触控点数", n.maxTouchPoints);
  if(window.matchMedia){
    if(window.matchMedia("(pointer:fine)").matches) setVal(d,"指针类型", {t:"精确 (鼠标/触控板)",s:"ok"});
    else if(window.matchMedia("(pointer:coarse)").matches) setVal(d,"指针类型", {t:"粗略 (触控)",s:"na"});
  }
  if('ondeviceorientation'in window) setVal(d,"设备方向事件", yesNo(true));
  if('ondevicemotion'in window) setVal(d,"设备运动事件", yesNo(true));
  if('vibrate'in navigator) setVal(d,"振动 API", yesNo(true));
  if(n.userAgentData&&n.userAgentData.getHighEntropyValues){
    try{
      const he=await n.userAgentData.getHighEntropyValues(['architecture','bitness','model','platform','platformVersion','uaFullVersion','wow64','formFactors']);
      if(he.platform) setVal(d,"HE: 平台", he.platform);
      if(he.platformVersion) setVal(d,"HE: 平台版本", he.platformVersion);
      if(he.model) setVal(d,"HE: 设备型号", he.model);
      if(he.uaFullVersion) setVal(d,"HE: 完整 UA 版本", he.uaFullVersion);
      if(he.wow64!==undefined) setVal(d,"HE: WOW64", he.wow64?{t:"是",s:"warn"}:{t:"否",s:"na"});
      if(he.formFactors) setVal(d,"HE: 形态因子", he.formFactors.join(", "));
    }catch(_){}
  }
  // 权限状态（真实查询当前授权）
  d._perms=[];
  const permNames=['geolocation','notifications','camera','microphone','persistent-storage','clipboard-read','clipboard-write','background-sync','accelerometer','gyroscope','magnetometer','storage-access','idle-detection','payment-handler'];
  if(navigator.permissions&&navigator.permissions.query){
    await Promise.all(permNames.map(async name=>{
      try{ const s=await navigator.permissions.query({name}); d._perms.push({name,state:s.state}); }
      catch(_){ /* 该权限名当前环境不支持查询，跳过（不显示即表示不可读） */ }
    }));
  }
  // 已加载字体（真实列出）
  if(document.fonts&&document.fonts.ready){
    try{
      await document.fonts.ready;
      const fams=new Set(); document.fonts.forEach(f=>fams.add(f.family));
      const arr=[...fams];
      if(arr.length){ d._fonts=arr; }
    }catch(_){}
  }
  // Speech 语音列表（真实）
  if('speechSynthesis'in window){
    const getV=()=>{ try{ return window.speechSynthesis.getVoices()||[]; }catch(_){ return []; } };
    let vs=getV();
    if(!vs.length){ await new Promise(res=>{ const t=setTimeout(res,1500); if(window.speechSynthesis){ window.speechSynthesis.onvoiceschanged=()=>{clearTimeout(t);res();}; } else {clearTimeout(t);res();} }); vs=getV(); }
    if(vs.length){ d._voices=vs.map(v=>v.name+(v.lang?" ("+v.lang+")":"")); }
  }
  return d;
}

function kvHTML(k,obj){
  const v=obj.value;
  let vhtml = (typeof v==="object"&&v!==null&&v.t!==undefined) ? `<span class="v ${v.s}">${v.t}</span>` : `<span class="v ${obj.status||""}">${v}</span>`;
  return `<div class="kv"><span class="k" title="${k}">${k}<span class="copy-btn" data-copy="${encodeURIComponent(String(k))}">复制</span></span>${vhtml}</div>`;
}
function realRows(data){ return Object.keys(data).filter(k=>!k.startsWith("_")).map(k=>kvHTML(k,data[k])).join(""); }

  else if(id==="media"){
    if(data._needMediaAuth){
      html=`<div class="grid"><div class="card"><h3><span class="ic">🎥</span>媒体设备</h3><div class="empty">尚未读取设备列表。</div><div class="hint">浏览器出于隐私，未授权时无法读取设备名称。点击下方按钮授权（会短暂亮起摄像头/麦克风指示灯），随后展示真实设备。</div><button class="btn" id="mediaBtn" style="margin-top:10px">🔓 授权并读取设备</button></div></div>`;
    } else {
      const devRows=data._devices.map(x=>{ const ico=x.kind==="videoinput"?"📷":x.kind==="audioinput"?"🎤":"🔊"; const tag=x.kind==="videoinput"?"摄像头":x.kind==="audioinput"?"麦克风":"扬声器"; return `<div class="list-row"><div class="li-ico">${ico}</div><div class="li-body"><div class="li-name">${x.name}</div></div><div class="li-tag">${tag}</div></div>`; }).join("")||'<div class="empty">无可用设备</div>';
      html=`<div class="grid"><div class="card"><h3><span class="ic">🎥</span>已授权设备 (${data._devices.length})</h3>${devRows}${realRows(data)?'':'<div class="hint">点击左侧「重新检测」可刷新设备列表。</div>'}</div></div>`;
    }
  }
  else if(id==="codecs"){
    const cMap=r=> r==="probably"?'<span class="pill ok">支持</span>': r==="maybe"?'<span class="pill maybe">可能</span>': '<span class="pill na">不支持</span>';
    const vRows=(data._vid||[]).map(x=>`<div class="codec-row"><span class="cn">${x.n}</span>${cMap(x.res)}</div>`).join("");
    const aRows=(data._aud||[]).map(x=>`<div class="codec-row"><span class="cn">${x.n}</span>${cMap(x.res)}</div>`).join("");
    const mRows=(data._mse||[]).map(x=>`<div class="codec-row"><span class="cn">${x.n}</span>${x.res.t==='支持'?'<span class="pill ok">支持</span>':'<span class="pill na">不支持</span>'}</div>`).join("");
    html=`<div class="grid">
      <div class="card"><h3><span class="ic">🎬</span>视频编解码</h3>${vRows}</div>
      <div class="card"><h3><span class="ic">🎵</span>音频编解码</h3>${aRows}</div>
      ${mRows?`<div class="card"><h3><span class="ic">📦</span>Media Source 扩展</h3>${mRows}</div>`:""}
    </div>`;
  }
  else if(id==="perf"){
    html=`<div class="grid"><div class="card"><h3><span class="ic">⚡</span>性能数据</h3>${realRows(data)}<div class="hint">实时帧率在检测后持续采样显示。</div></div></div>`;
  }
  else if(id==="sensor"){
    const permRows=(data._perms||[]).map(p=>`<div class="perm-row"><span class="pn">${p.name}</span><span class="pill ${p.state==='granted'?'ok':p.state==='denied'?'bad':'na'}">${p.state}</span></div>`).join("");
    const fontRows=(data._fonts||[]).map(f=>`<span class="pill na" style="margin:2px">${f}</span>`).join(" ");
    const voiceRows=(data._voices||[]).map(v=>`<span class="pill ok" style="margin:2px">${v}</span>`).join(" ");
    html=`<div class="grid">
      ${permRows?`<div class="card"><h3><span class="ic">🔐</span>权限授权状态 (${data._perms.length})</h3>${permRows}</div>`:""}
      ${realRows(data)?`<div class="card"><h3><span class="ic">📡</span>设备与环境</h3>${realRows(data)}</div>`:""}
      ${fontRows?`<div class="card"><h3><span class="ic">🔤</span>已加载字体 (${data._fonts.length})</h3><div>${fontRows}</div></div>`:""}
      ${voiceRows?`<div class="card"><h3><span class="ic">🗣️</span>可用语音 (${data._voices.length})</h3><div>${voiceRows}</div></div>`:""}
    </div>`;
  }
  else if(id==="geo"){
    const gk=Object.keys(data).filter(k=>!k.startsWith("_"));
    if(gk.length){
      html=`<div class="grid"><div class="card"><h3><span class="ic">📍</span>地理位置</h3>${gk.map(k=>kvHTML(k,data[k])).join("")}<button class="btn" id="geoBtn" style="margin-top:10px">📍 重新获取</button></div></div>`;
    } else {
      html=`<div class="grid"><div class="card"><h3><span class="ic">📍</span>地理位置</h3><div class="empty">尚未读取位置。</div><div class="hint">位置由浏览器在授权后真实获取（精度取决于设备 GPS / 网络）。点击按钮授权读取。</div><button class="btn" id="geoBtn" style="margin-top:10px">📍 获取我的位置</button></div></div>`;
    }
  }
  else {
    html=`<div class="grid"><div class="card"><h3><span class="ic">${sec.icon}</span>${sec.title}</h3>${realRows(data)||'<div class="empty">无可用数据</div>'}</div></div>`;
  }
  return `<div class="section ${id===currentSec?'active':''}" id="sec-${id}">
    <div class="sec-head"><h2>${sec.icon} ${sec.title}</h2><span class="sub">${sec.sub||""}</span></div>
    ${html}
  </div>`;
}

function renderOverview(){
  const cards=[
    {t:"浏览器", v:pick("browser","浏览器名称 (由 UA 识别)"), s:pick("browser","浏览器版本 (由 UA 识别)")},
    {t:"CPU 核心", v:pick("hardware","CPU 逻辑核心数"), s:pick("hardware","CPU 架构")||pick("hardware","CPU 位数")||""},
    {t:"系统内存", v:pick("hardware","系统内存 (浏览器报告值)"), s:""},
    {t:"屏幕分辨率", v:pick("display","屏幕分辨率"), s:pick("display","设备像素比 DPR")?"DPR "+pick("display","设备像素比 DPR"):""},
    {t:"GPU", v:pick("gpu","WebGPU 描述")||pick("gpu","WebGPU 厂商")||pick("gpu","WebGL 渲染器")||pick("gpu","WebGL 厂商"), s:pick("gpu","WebGPU 架构")||""},
    {t:"电量", v:pick("battery","电量百分比"), s:pick("battery","充电状态")},
    {t:"网络", v:pick("network","有效连接类型"), s:pick("network","下行带宽 (估算)")},
    {t:"在线状态", v:pick("basic","在线状态"), s:new Date().toLocaleString()},
  ].filter(c=>c.v);
  const ocs=cards.map(c=>`<div class="oc"><div class="t">${c.t}</div><div class="n" title="${c.s}">${c.v}</div><div class="s">${c.s}</div></div>`).join("");
  let detail="";
  SECTIONS.filter(s=>s.id!=="overview").forEach(s=>{
    const dt=DATA[s.id]||{}, keys=Object.keys(dt).filter(k=>!k.startsWith("_"));
    if(keys.length){
      const rows=keys.slice(0,6).map(k=>kvHTML(k,dt[k])).join("");
      detail+=`<div class="card"><h3><span class="ic">${s.icon}</span>${s.title}<span class="cnt">${keys.length}</span></h3>${rows}${keys.length>6?'<div class="hint">更多请查看「'+s.title+'」</div>':''}</div>`;
    }
  });
  return `<div class="overview-cards">${ocs}</div><div class="grid">${detail}</div>`;
}

/* ---------- 流程 ---------- */
function renderAll(){ let html=""; SECTIONS.forEach(s=>html+=renderSection(s.id)); content.innerHTML=html; bindSectionButtons(); applySearch(); }
function refreshBadges(){
  SECTIONS.forEach(s=>{ if(s.id==="overview")return; const n=Object.keys(DATA[s.id]||{}).filter(k=>!k.startsWith("_")).length; const el=$("#b-"+s.id); if(el)el.textContent=n; });
  $("#totalCount").textContent=Object.values(DATA).reduce((a,o)=>a+Object.keys(o).filter(k=>!k.startsWith("_")).length,0);
}
async function runDetect(){
  $("#refreshBtn").textContent="⏳ 检测中…"; $("#refreshBtn").disabled=true;
  for(const s of SECTIONS){ if(s.id==="overview"||!s.fn)continue; try{ DATA[s.id]=await s.fn(); }catch(e){ DATA[s.id]={__error:{label:"错误",value:e.message,status:"bad"}}; } }
  renderAll(); refreshBadges();
  $("#refreshBtn").textContent="🔄 重新检测"; $("#refreshBtn").disabled=false;
  toast("检测完成（仅显示本机真实数据）","ok");
}
function switchSec(id){
  currentSec=id;
  $$(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.sec===id));
  $$(".section").forEach(s=>s.classList.toggle("active",s.id==="sec-"+id));
  $("#secTitle").textContent=(SECTIONS.find(s=>s.id===id)||{}).title||"";
  $("#sidebar").classList.remove("open"); content.scrollTop=0;
}
function bindSectionButtons(){
  const ipB=$("#ipBtn"); if(ipB)ipB.onclick=queryIP;
  const geoB=$("#geoBtn"); if(geoB)geoB.onclick=getGeo;
  const medB=$("#mediaBtn"); if(medB)medB.onclick=authMedia;
}
async function queryIP(){
  const btn=$("#ipBtn"); if(!btn)return; btn.textContent="查询中…"; btn.disabled=true;
  try{
    const r=await fetch("https://ipapi.co/json/",{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();
    DATA.network["公网 IP"]={value:j.ip||"—",status:"ok"};
    DATA.network["IP 归属地"]={value:[j.city,j.region,j.country_name].filter(Boolean).join(", ")||"—",status:""};
    DATA.network["运营商/组织"]={value:j.org||"—",status:""};
    DATA.network["IP ASN"]={value:j.asn?("AS"+j.asn):"—",status:""};
    DATA.network["IP 经纬度"]={value:(j.latitude!=null&&j.longitude!=null)?(j.latitude+", "+j.longitude):"—",status:""};
    toast("IP 查询成功","ok");
  }catch(e){ DATA.network["公网 IP"]={value:"查询失败: "+e.message,status:"bad"}; toast("IP 查询失败(可能离线或被拦截)","err"); }
  finally{ btn.textContent="🔍 重新查询 IP"; btn.disabled=false; const el=$("#sec-network"); if(el){el.outerHTML=renderSection("network");bindSectionButtons();} refreshBadges(); }
}
async function authMedia(){
  const btn=$("#mediaBtn"); if(!btn)return; btn.textContent="授权中…"; btn.disabled=true;
  try{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia) throw new Error("不支持");
    const s=await navigator.mediaDevices.getUserMedia({audio:true,video:true});
    s.getTracks().forEach(t=>t.stop());
    DATA.media=await detectMedia();
    toast("设备读取成功","ok");
  }catch(e){ toast("授权失败: "+e.message,"err"); }
  finally{ const el=$("#sec-media"); if(el){el.outerHTML=renderSection("media");bindSectionButtons();} refreshBadges(); }
}
function getGeo(){
  const btn=$("#geoBtn"); if(!btn)return;
  if(!navigator.geolocation){ toast("当前浏览器不支持","err"); return; }
  btn.textContent="授权中…"; btn.disabled=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    DATA.geo["纬度 Latitude"]={value:pos.coords.latitude.toFixed(6),status:"ok"};
    DATA.geo["经度 Longitude"]={value:pos.coords.longitude.toFixed(6),status:"ok"};
    DATA.geo["精度"]={value:Math.round(pos.coords.accuracy)+" m",status:pos.coords.accuracy<100?"ok":"warn"};
    if(pos.coords.altitude!=null) DATA.geo["海拔 Altitude"]={value:pos.coords.altitude.toFixed(1)+" m",status:""};
    if(pos.coords.speed!=null) DATA.geo["速度 Speed"]={value:pos.coords.speed.toFixed(2)+" m/s",status:""};
    if(pos.coords.heading!=null) DATA.geo["朝向 Heading"]={value:pos.coords.heading.toFixed(0)+"°",status:""};
    DATA.geo["获取时间"]={value:new Date(pos.timestamp).toLocaleString(),status:""};
    toast("位置已获取","ok"); reRender();
  },err=>{ toast("获取失败: "+err.message,"err"); reRender(); },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
  function reRender(){ const g=$("#sec-geo"); if(g){g.outerHTML=renderSection("geo");bindSectionButtons();} refreshBadges(); }
}
function tickClock(){ $("#clock").textContent=new Date().toLocaleTimeString("zh-CN",{hour12:false}); }
setInterval(tickClock,1000); tickClock();
let fpsFrames=0,fpsLast=performance.now();
function sampleFPS(){ fpsFrames++; const now=performance.now(); if(now-fpsLast>=1000){ const fps=Math.round(fpsFrames*1000/(now-fpsLast)); fpsFrames=0; fpsLast=now; if(DATA.perf&&DATA.perf["实时帧率"]){ DATA.perf["实时帧率"]={value:fps+" FPS",status:fps>=50?"ok":(fps>=30?"warn":"bad")}; } } requestAnimationFrame(sampleFPS); }
function applySearch(){ const q=$("#searchInput").value.trim().toLowerCase(); if(!q){ $$(".kv,.card").forEach(e=>e.style.display=""); return; } $$(".section.active .kv").forEach(kv=>{ kv.style.display=kv.textContent.toLowerCase().includes(q)?"":"none"; }); }
async function copyAll(){
  let out="============ 本机配置真实检测报告 ============\n生成时间: "+new Date().toLocaleString()+"\n用户代理: "+navigator.userAgent+"\n\n";
  SECTIONS.filter(s=>s.id!=="overview").forEach(s=>{
    const dt=DATA[s.id]||{}, keys=Object.keys(dt).filter(k=>!k.startsWith("_"));
    if(!keys.length)return;
    out+="【"+s.title+"】\n";
    keys.forEach(k=>{ const v=dt[k].value; out+="  • "+k+": "+((typeof v==="object"&&v.t!==undefined)?v.t:String(v))+"\n"; });
    out+="\n";
  });
  await copyText(out);
}
function exportJSON(){
  const out={ _meta:{ generated:new Date().toISOString(), userAgent:navigator.userAgent, note:"仅含本机真实读取到的数据，未读取项不出现" }, data:{} };
  SECTIONS.filter(s=>s.id!=="overview").forEach(s=>{
    const dt=DATA[s.id]||{}, o={};
    Object.keys(dt).filter(k=>!k.startsWith("_")).forEach(k=>{ const v=dt[k].value; o[k]=(typeof v==="object"&&v.t!==undefined)?v.t:String(v); });
    out.data[s.id]=o;
  });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="system-info-"+Date.now()+".json"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast("已导出 JSON 文件","ok");
}
/* 事件 */
nav.addEventListener("click",e=>{ const i=e.target.closest(".nav-item"); if(i)switchSec(i.dataset.sec); });
$("#refreshBtn").onclick=async()=>{ await runDetect(); sampleFPS(); };
$("#exportBtn").onclick=exportJSON;
$("#copyAllBtn").onclick=copyAll;
$("#searchInput").oninput=applySearch;
content.addEventListener("click",e=>{ const cb=e.target.closest(".copy-btn"); if(cb){ const k=decodeURIComponent(cb.dataset.copy); const sec=cb.closest(".section").id.replace("sec-",""); const it=DATA[sec]&&DATA[sec][k]; if(it){ const v=it.value; copyText(typeof v==="object"&&v.t!==undefined?v.t:String(v)); } } });
$("#menuBtn").onclick=()=>$("#sidebar").classList.toggle("open");
function checkMobile(){ $("#menuBtn").style.display=window.innerWidth<=720?"inline-flex":"none"; }
window.addEventListener("resize",checkMobile); checkMobile();
window.addEventListener("online",()=>{ if(DATA.basic){DATA.basic["在线状态"]={value:"在线",status:"ok"};renderAll();} toast("网络已连接","ok"); });
window.addEventListener("offline",()=>{ if(DATA.basic){DATA.basic["在线状态"]={value:"离线",status:"bad"};renderAll();} toast("网络已断开","err"); });

(async function init(){ await runDetect(); sampleFPS(); })();
</script>
</body>
</html>
