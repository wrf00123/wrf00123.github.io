<style>
  :root {

  html[data-theme="dark"] {
    --bg: #14161a; --bg-soft: #1c1f25; --bg-card: #1f232a; --border: #2c313a;

  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",

    font-size: 15px; line-height: 1.5; -webkit-text-size-adjust: 100%;

  a { color: var(--accent); }
  .topbar {
    position: sticky; top: 0; z-index: 50; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 12px 16px;
  }
  .topbar-inner {
    max-width: 1180px; margin: 0 auto; display: flex; flex-wrap: wrap;
    align-items: center; gap: 10px;
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 17px; }
  .brand .logo { font-size: 22px; }
  .search-wrap { flex: 1 1 260px; position: relative; min-width: 200px; }
  .search-wrap input {
    width: 100%; padding: 9px 12px 9px 34px; border: 1px solid var(--border);
    border-radius: 999px; background: var(--bg-soft); color: var(--text);
    font-size: 14px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); background: var(--bg-card); }
  .search-wrap .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-soft); }
  .btn {
    border: 1px solid var(--border); background: var(--bg-soft); color: var(--text);
    padding: 8px 12px; border-radius: 999px; cursor: pointer; font-size: 13px;
    white-space: nowrap; transition: .15s; user-select: none;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .tabs {
    position: sticky; top: 57px; z-index: 40; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 8px 16px;
  }
  .tabs-inner {
    max-width: 1180px; margin: 0 auto; display: flex; gap: 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tabs-inner::-webkit-scrollbar { height: 6px; }
  .tabs-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .tab {
    flex: 0 0 auto; cursor: pointer; padding: 7px 13px; border-radius: 999px;
    border: 1px solid transparent; color: var(--text-soft); font-size: 13.5px;
    white-space: nowrap; transition: .15s; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  .tab:hover { background: var(--bg-soft); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab .ti { font-size: 15px; }
  .toolbar {
    max-width: 1180px; margin: 14px auto 0; padding: 0 16px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .toolbar .meta { color: var(--text-soft); font-size: 13px; margin-right: auto; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
  .seg button { border: 0; background: var(--bg-soft); color: var(--text-soft); padding: 7px 12px; cursor: pointer; font-size: 13px; }
  .seg button.active { background: var(--accent); color: #fff; }
  .seg button + button { border-left: 1px solid var(--border); }
  .grid {
    max-width: 1180px; margin: 14px auto 40px; padding: 0 16px;
    display: flex; flex-wrap: wrap; justify-content: center;
  }
  .cell {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    min-height: 72px; width: 78px; margin: 5px; flex: 0 0 auto;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; cursor: pointer; transition: .12s; position: relative;
    overflow: hidden; box-shadow: var(--shadow);
  }
  html[data-size="s"] .cell { border-radius: 8px; }
  .cell:hover { transform: translateY(-2px); border-color: var(--accent); }
  .cell .glyph { font-size: var(--glyph-size, 30px); line-height: 1; color: var(--text); }
  .cell .name {
    font-size: 10px; color: var(--text-soft); margin-top: 4px; text-align: center;
    padding: 0 4px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  html[data-size="s"] .cell .name { display: none; }
  .cell .fav { position: absolute; top: 4px; right: 5px; font-size: 13px; opacity: 0; transition: .12s; color: #f4b400; }
  .cell:hover .fav { opacity: .55; }
  .cell.faved .fav { opacity: 1; }
  .cell .cp { position: absolute; bottom: 3px; left: 5px; font-size: 8px; color: var(--text-soft); opacity: 0; }
  .cell:hover .cp { opacity: .7; }
  .empty { max-width: 1180px; margin: 60px auto; text-align: center; color: var(--text-soft); display: none; }
  .empty .big { font-size: 48px; }
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 999px;
    font-size: 14px; opacity: 0; pointer-events: none; transition: .25s; z-index: 200;
    box-shadow: var(--shadow); max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .modal-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100;
    display: none; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-mask.show { display: flex; }
  .modal {
    position: relative; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; width: 100%; max-width: 380px; padding: 22px; box-shadow: var(--shadow);
  }
  .modal .big-glyph { font-size: 64px; text-align: center; line-height: 1; }
  .modal h3 { margin: 14px 0 2px; text-align: center; font-size: 16px; }
  .modal .sub { text-align: center; color: var(--text-soft); font-size: 13px; margin-bottom: 14px; }
  .modal .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
  .modal .row label { width: 84px; flex: 0 0 auto; color: var(--text-soft); font-size: 13px; }
  .modal .row .val {
    flex: 1; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 10px; font-size: 13px; font-family: ui-monospace, Menlo, Consolas, monospace;

  .modal .row .copy { flex: 0 0 auto; }
  .modal .actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal .actions .btn { flex: 1; text-align: center; justify-content: center; }
  .close-x { position: absolute; top: 10px; right: 14px; font-size: 22px; color: var(--text-soft); cursor: pointer; }
  .footer { max-width: 1180px; margin: 0 auto 30px; padding: 0 16px; color: var(--text-soft); font-size: 12.5px; text-align: center; }
  @media (max-width: 520px) {
    .cell { width: 64px; min-height: 60px; margin: 4px; }
    .cell .glyph { font-size: 26px; }
  }
</style>

/* ===== 工具函数 ===== */
function codePoints(str){
  var out=[];
  for(var i=0;i<str.length;i++){
    var c=str.charCodeAt(i);
    if(c>=0xD800 && c<=0xDBFF && i+1<str.length){
      var d=str.charCodeAt(i+1);
      var cp=((c-0xD800)*0x400+(d-0xDC00))+0x10000;
      out.push(cp); i++;
    } else { out.push(c); }
  }
  return out;
}
function pad4(hex){ while(hex.length<4){ hex="0"+hex; } return hex; }
function toCodePointStr(str){
  var cps=codePoints(str), res=[];
  for(var i=0;i<cps.length;i++) res.push("U+"+pad4(cps[i].toString(16).toUpperCase()));
  return res.join(" ");
}
function toHtmlEntity(str){
  var cps=codePoints(str), res=[];
  for(var i=0;i<cps.length;i++) res.push("&#"+cps[i]+";");
  return res.join("");
}
function idxOf(arr,key){
  for(var i=0;i<arr.length;i++){
    var item=arr[i];
    if(Array.isArray(item) ? item[0]===key : item===key) return i;
  }
  return -1;
}

/* ===== 本地存储 ===== */
var LS_FAV="symfa_fav", LS_REC="symfa_rec", LS_THEME="symfa_theme", LS_SIZE="symfa_size";
function loadLS(k){ try{ return JSON.parse(localStorage.getItem(k)) || []; }catch(e){ return []; } }
function saveLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
var favs=loadLS(LS_FAV), recents=loadLS(LS_REC);

/* ===== 状态 ===== */
var state={ cat:"all", q:"", mode:"char", view:"normal" };

/* ===== DOM ===== */
var $=function(id){ return document.getElementById(id); };
var gridEl=$("grid"), tabsEl=$("tabs"), metaEl=$("meta"),
    emptyEl=$("empty"), searchEl=$("search"), toastEl=$("toast"),
    clearRecentBtn=$("clearRecentBtn");

/* ===== 渲染分类标签 ===== */
function renderTabs(){
  tabsEl.innerHTML="";
  for(var i=0;i<CATS.length;i++){
    (function(cat){
      var t=document.createElement("div");
      t.className="tab"+(state.cat===cat.id?" active":"");
      t.innerHTML='<span class="ti">'+cat.icon+'</span>'+cat.name;
      t.onclick=function(){ state.cat=cat.id; renderTabs(); renderGrid(); };
      tabsEl.appendChild(t);
    })(CATS[i]);
  }
}

/* ===== 过滤数据 ===== */
function filtered(){
  var q=state.q.trim().toLowerCase(), res=[];
  for(var i=0;i<DATA.length;i++){
    var d=DATA[i];
    if(state.cat!=="all" && d[3]!==state.cat) continue;
    if(state.view==="fav" && idxOf(favs,d[0])<0) continue;
    if(state.view==="recent" && idxOf(recents,d[0])<0) continue;
    if(q){
      var hay=(d[1]+" "+d[2]+" "+d[0]).toLowerCase();
      if(hay.indexOf(q)<0) continue;
    }
    res.push(d);
  }
  if(state.view==="recent"){
    res.sort(function(a,b){ return idxOf(recents,b[0])-idxOf(recents,a[0]); });
  }
  return res;
}

/* ===== 渲染网格 ===== */
function renderGrid(){
  var list=filtered();
  metaEl.textContent=(state.view==="fav"?"收藏 · ":state.view==="recent"?"最近 · ":"")+"共 "+list.length+" 个符号";
  gridEl.innerHTML="";
  clearRecentBtn.style.display = state.view==="recent" ? "" : "none";
  if(list.length===0){ emptyEl.style.display="block"; return; }
  emptyEl.style.display="none";
  for(var i=0;i<list.length;i++){
    (function(d){
      var cpStr=toCodePointStr(d[0]);
      var cell=document.createElement("div");
      cell.className="cell"+(idxOf(favs,d[0])>=0?" faved":"");
      var glyphHtml= state.mode==="char"?d[0]
                    : state.mode==="cp"?'<span style="font-size:11px">'+cpStr+'</span>'
                    : '<span style="font-size:10px">'+toHtmlEntity(d[0])+'</span>';
      cell.innerHTML='<span class="glyph">'+glyphHtml+'</span><span class="name">'+d[1]+'</span><span class="fav">★</span><span class="cp">'+cpStr+'</span>';
      cell.title=d[1]+" · 点击复制";
      cell.onclick=function(){ copyItem(d); };
      cell.ondblclick=function(){ openModal(d); };
      var favSpan=cell.querySelector(".fav");
      favSpan.onclick=function(e){ e.stopPropagation(); toggleFav(d); };
      gridEl.appendChild(cell);
    })(list[i]);
  }
}

/* ===== 复制 ===== */
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{ return navigator.clipboard.writeText(text); }catch(e){}
  }
  return new Promise(function(resolve,reject){
    try{
      var ta=document.createElement("textarea");
      ta.value=text;
      ta.setAttribute("readonly","");
      ta.style.position="fixed"; ta.style.top="0"; ta.style.left="0";
      ta.style.width="1px"; ta.style.height="1px";
      ta.style.opacity="0"; ta.style.border="none"; ta.style.padding="0";
      ta.style.background="transparent";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try{ ta.setSelectionRange(0, ta.value.length); }catch(e){}
      var ok=false;
      try{ ok=document.execCommand("copy"); }catch(e){ ok=false; }
      document.body.removeChild(ta);
      ok ? resolve() : reject(new Error("copy failed"));
    }catch(e){ reject(e); }
  });
}
function copyItem(d){
  var text= state.mode==="char"?d[0]
          : state.mode==="cp"?toCodePointStr(d[0])
          : toHtmlEntity(d[0]);
  copyText(text).then(function(){
    toast("已复制："+(state.mode==="char"?d[0]:text));
    var k=d[0], ix=idxOf(recents,k);
    if(ix>=0) recents.splice(ix,1);
    recents.unshift(k); if(recents.length>60) recents.length=60;
    saveLS(LS_REC, recents);
    renderGrid();
  }).catch(function(){ toast("复制失败，请手动复制"); });
}

/* ===== 收藏 ===== */
function toggleFav(d){
  var k=d[0], ix=idxOf(favs,k);
  if(ix>=0){ favs.splice(ix,1); toast("已取消收藏"); }
  else{ favs.push(k); toast("已加入收藏 ★"); }
  saveLS(LS_FAV,favs); renderGrid();
}

/* ===== 弹窗 ===== */
var modalItem=null;
function openModal(d){
  modalItem=d;
  $("mGlyph").textContent=d[0];
  $("mName").textContent=d[1];
  var catName=""; for(var i=0;i<CATS.length;i++){ if(CATS[i].id===d[3]) catName=CATS[i].name; }
  $("mCat").textContent=catName+" · 点击按钮复制不同格式";
  $("mChar").textContent=d[0];
  $("mCp").textContent=toCodePointStr(d[0]);
  $("mHtml").textContent=toHtmlEntity(d[0]);
  $("mFav").textContent = idxOf(favs,d[0])>=0?"★ 取消收藏":"⭐ 收藏";
  $("modalMask").className="modal-mask show";
}
function closeModal(){ $("modalMask").className="modal-mask"; modalItem=null; }
$("modalClose").onclick=closeModal;
$("mClose").onclick=closeModal;
$("modalMask").onclick=function(e){ if(e.target===$("modalMask")) closeModal(); };
$("mFav").onclick=function(){ if(modalItem){ toggleFav(modalItem); $("mFav").textContent=idxOf(favs,modalItem[0])>=0?"★ 取消收藏":"⭐ 收藏"; } };
var copyBtns=document.querySelectorAll(".modal .copy");
for(var i=0;i<copyBtns.length;i++){
  (function(btn){
    btn.onclick=function(){
      if(!modalItem) return;
      var m=btn.getAttribute("data-copy");
      var text= m==="char"?modalItem[0] : m==="cp"?toCodePointStr(modalItem[0]) : toHtmlEntity(modalItem[0]);
      copyText(text).then(function(){ toast("已复制："+text); }).catch(function(){ toast("复制失败"); });
    };
  })(copyBtns[i]);
}

/* ===== Toast ===== */
var toastTimer=null;
function toast(msg){
  toastEl.textContent=msg; toastEl.className="toast show";
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ toastEl.className="toast"; }, 1600);
}

/* ===== 主题/大小 ===== */
function applyTheme(){
  var t=localStorage.getItem(LS_THEME)||"light";
  document.documentElement.setAttribute("data-theme", t);
  $("themeBtn").textContent = t==="dark"?"☀️":"🌙";
}
function applySize(){
  var s=localStorage.getItem(LS_SIZE)||"m";
  document.documentElement.setAttribute("data-size", s==="s"?"s":"m");
  var sz=s==="s"?22:30;
  document.documentElement.style.setProperty("--glyph-size", sz+"px");
  $("sizeBtn").textContent = s==="s"?"🔠":"🔡";
}
$("themeBtn").onclick=function(){
  var cur=document.documentElement.getAttribute("data-theme");
  var nxt=cur==="dark"?"light":"dark";
  localStorage.setItem(LS_THEME,nxt); applyTheme();
};
$("sizeBtn").onclick=function(){
  var cur=document.documentElement.getAttribute("data-size");
  var nxt=cur==="s"?"m":"s";
  localStorage.setItem(LS_SIZE,nxt); applySize();
};

/* ===== 视图切换 ===== */
$("favBtn").onclick=function(){
  if(state.view==="fav"){ state.view="normal"; this.classList.remove("active"); }
  else{ state.view="fav"; this.classList.add("active"); $("recentBtn").classList.remove("active"); }
  renderGrid();
};
$("recentBtn").onclick=function(){
  if(state.view==="recent"){ state.view="normal"; this.classList.remove("active"); }
  else{ state.view="recent"; this.classList.add("active"); $("favBtn").classList.remove("active"); }
  renderGrid();
};

/* ===== 模式切换 ===== */
var modeBtns=document.querySelectorAll("#modeSeg button");
for(var i=0;i<modeBtns.length;i++){
  (function(btn){
    btn.onclick=function(){
      state.mode=btn.getAttribute("data-mode");
      for(var j=0;j<modeBtns.length;j++) modeBtns[j].classList.remove("active");
      btn.classList.add("active");
      renderGrid();
    };
  })(modeBtns[i]);
}

/* ===== 复制全部 ===== */
$("copyAllBtn").onclick=function(){
  var list=filtered();
  if(list.length===0){ toast("没有可复制的内容"); return; }
  var texts=[];
  for(var i=0;i<list.length;i++){
    texts.push(state.mode==="char"?list[i][0]
      : state.mode==="cp"?toCodePointStr(list[i][0]) : toHtmlEntity(list[i][0]));
  }
  copyText(texts.join(state.mode==="char"?" ":"\n")).then(function(){
    toast("已复制 "+list.length+" 个符号");
  }).catch(function(){ toast("复制失败"); });
};

/* ===== 清空最近 ===== */
clearRecentBtn.onclick=function(){
  recents=[];
  saveLS(LS_REC,recents);
  toast("最近记录已清空");
  if(state.view==="recent"){
    state.view="normal";
    $("recentBtn").classList.remove("active");
  }
  renderGrid();
};

/* ===== 搜索 ===== */
var searchTimer=null;
searchEl.oninput=function(){
  if(searchTimer) clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){ state.q=searchEl.value; renderGrid(); }, 120);
};

/* ===== 键盘 ===== */
document.addEventListener("keydown", function(e){
  if(e.key==="Escape") closeModal();
  if(e.key==="/" && document.activeElement!==searchEl){ e.preventDefault(); searchEl.focus(); }
});

/* ===== 初始化 ===== */
applyTheme(); applySize(); renderTabs(); renderGrid();
</script>
