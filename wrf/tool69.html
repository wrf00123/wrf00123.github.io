<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聚餐菜谱清单 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --primary: #FF6B35;
  --primary-light: #FF8A5B;
  --primary-dark: #E55A2B;
  --secondary: #7CB342;
  --accent-red: #E53935;
  --accent-blue: #1E88E5;
  --bg: #FFFBF5;
  --bg-card: #FFFFFF;
  --text-primary: #2D2D2D;
  --text-secondary: #6B7280;
  --text-light: #9CA3AF;
  --border: #F0E6D8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -1px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.06);
  --shadow-xl: 0 20px 40px -10px rgba(255,107,53,0.2);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Noto Sans SC', sans-serif;
}

[data-theme="dark"] {
  --primary: #FF8A5B;
  --bg: #1A1A2E;
  --bg-card: #16213E;
  --text-primary: #EAEAEA;
  --text-secondary: #A0A0B0;
  --border: #2A2A4A;
}

[data-theme="green"] {
  --primary: #4CAF50;
  --primary-light: #66BB6A;
  --primary-dark: #388E3C;
  --bg: #F1F8E9;
}

[data-theme="purple"] {
  --primary: #8B5CF6;
  --primary-light: #A78BFA;
  --primary-dark: #7C3AED;
  --bg: #FAF5FF;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  border-radius: var(--radius-xl);
  padding: 32px 40px;
  margin-bottom: 28px;
  color: white;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-xl);
}

.header::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -30%;
  right: 15%;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}

.header-content {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.header h1 {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}

.btn-primary {
  background: white;
  color: var(--primary);
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.btn-secondary {
  background: var(--primary);
  color: white;
}

.btn-secondary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.btn-outline {
  background: transparent;
  border: 2px solid rgba(255,255,255,0.6);
  color: white;
}

.btn-outline:hover {
  background: rgba(255,255,255,0.15);
  border-color: white;
}

.btn-ghost {
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  background: var(--bg);
  color: var(--text-primary);
}

.btn-danger {
  background: #FEF2F2;
  color: var(--accent-red);
  border: 1px solid #FECACA;
}

.btn-danger:hover {
  background: #FEE2E2;
}

.btn-sm {
  padding: 6px 12px;
  font-size: 0.8rem;
}

.btn-icon {
  padding: 8px;
  width: 36px;
  height: 36px;
  justify-content: center;
  border-radius: var(--radius-sm);
}

/* Grid Layout */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 24px;
}

@media (max-width: 1100px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
}

/* Cards */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  transition: box-shadow 0.3s ease;
}

.card:hover {
  box-shadow: var(--shadow-md);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.card-title {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Dinner Info */
.dinner-info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.info-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.info-field label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.info-field input,
.info-field textarea {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.9rem;
  background: var(--bg);
  color: var(--text-primary);
  transition: all 0.2s ease;
}

.info-field input:focus,
.info-field textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
}

.info-field.full {
  grid-column: 1 / -1;
}

.info-field textarea {
  resize: vertical;
  min-height: 60px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 6px;
  padding: 6px;
  background: var(--bg);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 10px 16px;
  border: none;
  background: transparent;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.tab-btn:hover {
  color: var(--text-primary);
  background: rgba(255,107,53,0.05);
}

.tab-btn.active {
  background: var(--bg-card);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

/* Dish Grid */
.dish-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.dish-card {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 18px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.dish-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--primary);
  transform: scaleY(0);
  transition: transform 0.3s ease;
}

.dish-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: transparent;
}

.dish-card:hover::before {
  transform: scaleY(1);
}

.dish-emoji {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.dish-name {
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 6px;
}

.dish-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--border);
}

.dish-price {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary);
}

.dish-servings {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.dish-ingredients-preview {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.dish-delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(229, 57, 53, 0.1);
  color: var(--accent-red);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  opacity: 0;
  transition: all 0.25s ease;
  z-index: 2;
}

.dish-card:hover .dish-delete-btn {
  opacity: 1;
}

.dish-delete-btn:hover {
  background: var(--accent-red);
  color: white;
  transform: scale(1.1);
}

.dish-checkbox {
  position: absolute;
  top: 12px;
  left: 12px;
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: var(--bg-card);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: all 0.2s ease;
}

.dish-checkbox.checked {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.dish-checkbox.checked::after {
  content: '✓';
  font-size: 0.9rem;
  font-weight: bold;
}

.batch-mode .dish-checkbox {
  display: flex;
}

.batch-mode .dish-card {
  cursor: pointer;
}

.batch-mode .dish-card.selected {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
}

.batch-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.batch-count {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.dish-card.batch-select-disabled {
  opacity: 0.5;
  pointer-events: none;
}

.add-dish-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 160px;
  border: 2px dashed var(--border);
  cursor: pointer;
  transition: all 0.3s ease;
  color: var(--text-secondary);
}

.add-dish-card:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(255,107,53,0.03);
}

.add-dish-icon {
  font-size: 2.5rem;
  margin-bottom: 8px;
}

.add-dish-text {
  font-weight: 500;
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.stat-card {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  border-radius: var(--radius-md);
  padding: 18px;
  color: white;
  position: relative;
  overflow: hidden;
}

.stat-card:nth-child(2) {
  background: linear-gradient(135deg, var(--secondary) 0%, #9CCC65 100%);
}

.stat-card:nth-child(3) {
  background: linear-gradient(135deg, var(--accent-blue) 0%, #42A5F5 100%);
}

.stat-card:nth-child(4) {
  background: linear-gradient(135deg, var(--accent-red) 0%, #EF5350 100%);
}

.stat-label {
  font-size: 0.8rem;
  opacity: 0.9;
  margin-bottom: 6px;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
}

.stat-unit {
  font-size: 0.9rem;
  opacity: 0.85;
  margin-left: 4px;
}

/* Category Chart */
.chart-container {
  margin-top: 16px;
}

.chart-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 14px;
  color: var(--text-secondary);
}

.chart-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.chart-bar-label {
  width: 60px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.chart-bar-track {
  flex: 1;
  height: 24px;
  background: var(--bg);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.chart-bar-fill {
  height: 100%;
  border-radius: 12px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
}

.chart-bar-value {
  font-size: 0.7rem;
  font-weight: 600;
  color: white;
}

/* Person List */
.person-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.person-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  transition: all 0.2s ease;
}

.person-item:hover {
  background: var(--border);
}

.person-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.person-info {
  flex: 1;
  min-width: 0;
}

.person-name {
  font-weight: 500;
  font-size: 0.9rem;
}

.person-share {
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.person-paid {
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--secondary);
  font-size: 0.9rem;
}

.add-person {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.add-person input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.9rem;
  background: var(--bg);
  color: var(--text-primary);
}

.add-person input:focus {
  outline: none;
  border-color: var(--primary);
}

/* Shopping List */
.shopping-category {
  margin-bottom: 18px;
}

.shopping-category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  user-select: none;
}

.shopping-category-icon {
  font-size: 1.2rem;
}

.shopping-category-name {
  font-weight: 600;
  font-size: 0.95rem;
}

.shopping-category-count {
  font-size: 0.75rem;
  color: var(--text-secondary);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
}

.shopping-items {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-left: 8px;
}

.shopping-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  transition: all 0.2s ease;
}

.shopping-item:hover {
  background: var(--border);
}

.shopping-item.checked {
  opacity: 0.5;
}

.shopping-item.checked .shopping-item-name {
  text-decoration: line-through;
}

.shopping-checkbox {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.shopping-checkbox.checked {
  background: var(--secondary);
  border-color: var(--secondary);
  color: white;
}

.shopping-checkbox.checked::after {
  content: '✓';
  font-size: 0.8rem;
  font-weight: bold;
}

.shopping-item-name {
  flex: 1;
  font-size: 0.9rem;
}

.shopping-item-qty {
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.shopping-progress {
  margin-bottom: 18px;
}

.progress-bar {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--secondary), #8BC34A);
  border-radius: 4px;
  transition: width 0.5s ease;
}

.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  padding: 20px;
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(0.9) translateY(20px);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-overlay.active .modal {
  transform: scale(1) translateY(0);
}

.modal-header {
  padding: 24px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg-card);
  z-index: 1;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 600;
}

.modal-close {
  width: 32px;
  height: 32px;
  border: none;
  background: var(--bg);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: var(--text-secondary);
  transition: all 0.2s ease;
}

.modal-close:hover {
  background: var(--border);
  color: var(--text-primary);
}

.modal-body {
  padding: 24px 28px;
}

.modal-footer {
  padding: 20px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Form */
.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  margin-bottom: 8px;
  color: var(--text-secondary);
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.95rem;
  background: var(--bg);
  color: var(--text-primary);
  transition: all 0.2s ease;
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* Ingredient List */
.ingredients-section {
  margin-top: 20px;
}

.ingredients-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.ingredient-item {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr auto;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

.ingredient-item .form-input {
  padding: 8px 10px;
  font-size: 0.85rem;
}

.ingredient-delete {
  width: 32px;
  height: 32px;
  border: none;
  background: #FEF2F2;

.toggle-switch {

  border-radius: 13px;
  cursor: pointer;
  transition: background 0.3s ease;
}

.toggle-switch.active {
  background: var(--primary);
}

.toggle-switch::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;

.toggle-switch.active::after {
  transform: translateX(22px);

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function saveState() {
  localStorage.setItem(STORAGE_KEYS.DINNER, JSON.stringify(state.dinner));
  localStorage.setItem(STORAGE_KEYS.DISHES, JSON.stringify(state.dishes));
  localStorage.setItem(STORAGE_KEYS.PEOPLE, JSON.stringify(state.people));
  localStorage.setItem(STORAGE_KEYS.SHOPPING, JSON.stringify(state.shoppingChecked));
}

function loadState() {
  const dinner = localStorage.getItem(STORAGE_KEYS.DINNER);
  const dishes = localStorage.getItem(STORAGE_KEYS.DISHES);
  const people = localStorage.getItem(STORAGE_KEYS.PEOPLE);
  const shopping = localStorage.getItem(STORAGE_KEYS.SHOPPING);
  const theme = localStorage.getItem(STORAGE_KEYS.THEME);

  if (dinner) state.dinner = JSON.parse(dinner);
  if (dishes) state.dishes = JSON.parse(dishes);
  if (people) state.people = JSON.parse(people);
  if (shopping) state.shoppingChecked = JSON.parse(shopping);
  if (theme) setTheme(theme);

  if (!dishes || JSON.parse(dishes).length === 0) {
    initSampleData();
    saveState();
  }
}

// ========== UI Rendering ==========
function renderAll() {
  renderDinnerInfo();
  renderDishes();
  renderStats();
  renderPeople();
  renderShoppingList();
}

function renderDinnerInfo() {
  document.getElementById('dinnerName').value = state.dinner.name || '';
  document.getElementById('dinnerDate').value = state.dinner.date || '';
  document.getElementById('dinnerLocation').value = state.dinner.location || '';
  document.getElementById('dinnerPeople').value = state.dinner.people || 1;
  document.getElementById('dinnerNote').value = state.dinner.note || '';
}

function renderDishes() {
  const grid = document.getElementById('dishGrid');
  const filtered = state.currentCategory === 'all'
    ? state.dishes
    : state.dishes.filter(d => d.category === state.currentCategory);

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state-icon">🍽️</div>
        <div class="empty-state-text">还没有菜品，点击上方"添加菜品"按钮开始吧</div>
      </div>
    `;
    return;
  }

  const isBatchMode = state.batchMode;
  const selectedSet = new Set(state.selectedDishes || []);

  grid.innerHTML = filtered.map(dish => {
    const isSelected = selectedSet.has(dish.id);
    return `
    <div class="dish-card ${isSelected ? 'selected' : ''}" 
         onclick="${isBatchMode ? `toggleSelectDish('${dish.id}')` : `editDish('${dish.id}')`}">
      <div class="dish-checkbox ${isSelected ? 'checked' : ''}"></div>
      <button class="dish-delete-btn" onclick="event.stopPropagation(); deleteDish('${dish.id}')" title="删除">×</button>
      <div class="dish-emoji">${dish.emoji || '🍽️'}</div>
      <div class="dish-name">${dish.name}</div>
      <div class="dish-ingredients-preview">
        ${dish.ingredients?.map(i => i.name).join('、') || '暂无食材'}
      </div>
      <div class="dish-meta">
        <div class="dish-price">¥${dish.price}</div>
        <div class="dish-servings">${dish.servings}人份</div>
      </div>
    </div>
  `}).join('') + `
    <div class="dish-card add-dish-card ${isBatchMode ? 'batch-select-disabled' : ''}" onclick="openDishModal()">
      <div class="add-dish-icon">➕</div>
      <div class="add-dish-text">添加菜品</div>
    </div>
  `;

  document.getElementById('selectedCount').textContent = (state.selectedDishes || []).length;
}

function renderStats() {
  const total = state.dishes.reduce((sum, d) => sum + (d.price || 0), 0);
  const peopleCount = state.people.length || state.dinner.people || 1;
  const perPerson = total / peopleCount;

  document.getElementById('totalPrice').textContent = total.toFixed(0);
  document.getElementById('perPerson').textContent = perPerson.toFixed(0);
  document.getElementById('dishCount').textContent = state.dishes.length;
  document.getElementById('peopleCount').textContent = peopleCount;

  // Category chart
  const categoryTotals = {};
  let maxTotal = 0;
  Object.keys(CATEGORIES).forEach(cat => {
    const catTotal = state.dishes
      .filter(d => d.category === cat)
      .reduce((sum, d) => sum + (d.price || 0), 0);
    categoryTotals[cat] = catTotal;
    if (catTotal > maxTotal) maxTotal = catTotal;
  });

  const chart = document.getElementById('categoryChart');
  const hasData = maxTotal > 0;
  chart.innerHTML = Object.entries(CATEGORIES).map(([key, cat]) => {
    const value = categoryTotals[key] || 0;
    const percent = hasData ? (value / maxTotal * 100) : 0;
    return `
      <div class="chart-bar">
        <div class="chart-bar-label">${cat.emoji} ${cat.name}</div>
        <div class="chart-bar-track">
          <div class="chart-bar-fill" style="width: ${percent}%; background: ${cat.color};">
            ${percent > 30 ? `<span class="chart-bar-value">¥${value}</span>` : ''}
          </div>
        </div>
        ${percent <= 30 ? `<span style="font-size:0.7rem;color:var(--text-secondary);min-width:40px;">¥${value}</span>` : ''}
      </div>
    `;
  }).join('');
}

function renderPeople() {
  const list = document.getElementById('personList');
  const total = state.dishes.reduce((sum, d) => sum + (d.price || 0), 0);
  const perPerson = state.people.length > 0 ? total / state.people.length : 0;

  if (state.people.length === 0) {
    list.innerHTML = `
      <div class="empty-state" style="padding: 20px;">
        <div class="empty-state-icon" style="font-size: 2rem;">👥</div>
        <div class="empty-state-text">添加参与人员计算费用分摊</div>
      </div>
    `;
    return;
  }

  list.innerHTML = state.people.map(person => `
    <div class="person-item">
      <div class="person-avatar">${person.name.charAt(0)}</div>
      <div class="person-info">
        <div class="person-name">${person.name}</div>
        <div class="person-share">应付: ¥${perPerson.toFixed(0)}</div>
      </div>
      <button class="btn-icon btn btn-ghost btn-sm" onclick="deletePerson('${person.id}'); event.stopPropagation();" title="删除">
        ×
      </button>
    </div>
  `).join('');
}

function renderShoppingList() {
  const allIngredients = {};
  state.dishes.forEach(dish => {
    dish.ingredients?.forEach(ing => {
      const key = ing.name + '_' + ing.unit;
      if (!allIngredients[key]) {
        allIngredients[key] = {
          name: ing.name,
          unit: ing.unit,
          quantity: 0,
          category: ing.category || 'other',
          key: key
        };
      }
      const qty = parseFloat(ing.quantity);
      if (!isNaN(qty)) {
        allIngredients[key].quantity += qty;
      } else {
        allIngredients[key].quantity = ing.quantity;
      }
    });
  });

  const byCategory = {};
  Object.values(allIngredients).forEach(item => {
    if (!byCategory[item.category]) byCategory[item.category] = [];
    byCategory[item.category].push(item);
  });

  const list = document.getElementById('shoppingList');
  const totalItems = Object.values(allIngredients).length;
  const checkedItems = Object.values(allIngredients).filter(i => state.shoppingChecked[i.key]).length;

  document.getElementById('progressText').textContent = `${checkedItems}/${totalItems}`;
  document.getElementById('progressFill').style.width = totalItems > 0 ? `${checkedItems / totalItems * 100}%` : '0%';

  if (totalItems === 0) {
    list.innerHTML = `
      <div class="empty-state" style="padding: 20px;">
        <div class="empty-state-icon" style="font-size: 2rem;">🛒</div>
        <div class="empty-state-text">添加菜品后自动生成购物清单</div>
      </div>
    `;
    return;
  }

  list.innerHTML = Object.entries(INGREDIENT_CATEGORIES).map(([catKey, cat]) => {
    const items = byCategory[catKey] || [];
    if (items.length === 0) return '';
    return `
      <div class="shopping-category">
        <div class="shopping-category-header">
          <span class="shopping-category-icon">${cat.emoji}</span>
          <span class="shopping-category-name">${cat.name}</span>
          <span class="shopping-category-count">${items.length}项</span>
        </div>
        <div class="shopping-items">
          ${items.map(item => {
            const checked = state.shoppingChecked[item.key] || false;
            const qtyDisplay = typeof item.quantity === 'number' ? item.quantity + item.unit : item.quantity + item.unit;
            return `
              <div class="shopping-item ${checked ? 'checked' : ''}" onclick="toggleShoppingItem('${item.key}')">
                <div class="shopping-checkbox ${checked ? 'checked' : ''}"></div>
                <span class="shopping-item-name">${item.name}</span>
                <span class="shopping-item-qty">${qtyDisplay}</span>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ========== Event Handlers ==========
function initEvents() {
  // Dinner info
  ['dinnerName', 'dinnerDate', 'dinnerLocation', 'dinnerPeople', 'dinnerNote'].forEach(id => {
    document.getElementById(id).addEventListener('input', (e) => {
      const key = id.replace('dinner', '').toLowerCase();
      const fieldMap = { name: 'name', date: 'date', location: 'location', people: 'people', note: 'note' };
      state.dinner[fieldMap[key] || key] = id === 'dinnerPeople' ? parseInt(e.target.value) || 1 : e.target.value;
      saveState();
      renderStats();
      renderPeople();
    });
  });

  // Category tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.currentCategory = btn.dataset.category;
      renderDishes();
    });
  });

  // Emoji picker
  document.querySelectorAll('.emoji-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.emoji-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      state.selectedEmoji = opt.dataset.emoji;
    });
  });

  // Theme selector
  document.querySelectorAll('.theme-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
      setTheme(dot.dataset.theme);
    });
  });

  // Close modal on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });
  });
}

function setTheme(theme) {
  if (theme === 'orange') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', theme);
  }
  localStorage.setItem(STORAGE_KEYS.THEME, theme);
}

// ========== Dish Management ==========
function openDishModal() {
  state.editingDishId = null;
  document.getElementById('dishModalTitle').textContent = '添加菜品';
  document.getElementById('dishNameInput').value = '';
  document.getElementById('dishCategory').value = 'hot';
  document.getElementById('dishPrice').value = '';
  document.getElementById('dishServings').value = '4';
  document.getElementById('dishNote').value = '';
  state.selectedEmoji = '🍗';
  document.querySelectorAll('.emoji-option').forEach(o => {
    o.classList.toggle('selected', o.dataset.emoji === '🍗');
  });
  document.getElementById('ingredientList').innerHTML = '';
  addIngredientRow();
  document.getElementById('dishModal').classList.add('active');
}

function editDish(id) {
  const dish = state.dishes.find(d => d.id === id);
  if (!dish) return;

  state.editingDishId = id;
  document.getElementById('dishModalTitle').textContent = '编辑菜品';
  document.getElementById('dishNameInput').value = dish.name;
  document.getElementById('dishCategory').value = dish.category;
  document.getElementById('dishPrice').value = dish.price;
  document.getElementById('dishServings').value = dish.servings;
  document.getElementById('dishNote').value = dish.note || '';
  state.selectedEmoji = dish.emoji || '🍽️';

  document.querySelectorAll('.emoji-option').forEach(o => {
    o.classList.toggle('selected', o.dataset.emoji === state.selectedEmoji);
  });

  const list = document.getElementById('ingredientList');
  list.innerHTML = '';
  (dish.ingredients || []).forEach(ing => {
    addIngredientRow(ing);
  });
  if ((dish.ingredients || []).length === 0) addIngredientRow();

  document.getElementById('dishModal').classList.add('active');
}

function closeDishModal() {
  document.getElementById('dishModal').classList.remove('active');
}

function addIngredientRow(ingredient = null) {
  const list = document.getElementById('ingredientList');
  const row = document.createElement('div');
  row.className = 'ingredient-item';
  row.innerHTML = `
    <input type="text" class="form-input" placeholder="食材名称" value="${ingredient?.name || ''}">
    <input type="text" class="form-input" placeholder="数量" value="${ingredient?.quantity || ''}">
    <select class="form-select">
      ${Object.entries(INGREDIENT_CATEGORIES).map(([key, cat]) => `
        <option value="${key}" ${ingredient?.category === key ? 'selected' : ''}>${cat.emoji} ${cat.name}</option>
      `).join('')}
    </select>
    <button class="ingredient-delete" onclick="this.parentElement.remove()" title="删除">×</button>
  `;
  list.appendChild(row);
}

function saveDish() {
  const name = document.getElementById('dishNameInput').value.trim();
  if (!name) {
    showToast('请输入菜品名称', 'error');
    return;
  }

  const price = parseFloat(document.getElementById('dishPrice').value) || 0;
  const servings = parseInt(document.getElementById('dishServings').value) || 1;
  const category = document.getElementById('dishCategory').value;
  const note = document.getElementById('dishNote').value.trim();

  const ingredientRows = document.querySelectorAll('.ingredient-item');
  const ingredients = [];
  ingredientRows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const select = row.querySelector('select');
    const ingName = inputs[0].value.trim();
    if (ingName) {
      ingredients.push({
        name: ingName,
        quantity: inputs[1].value.trim(),
        unit: '',
        category: select.value
      });
    }
  });

  if (state.editingDishId) {
    const idx = state.dishes.findIndex(d => d.id === state.editingDishId);
    if (idx > -1) {
      state.dishes[idx] = {
        ...state.dishes[idx],
        name, category, price, servings, note, ingredients,
        emoji: state.selectedEmoji
      };
    }
    showToast('菜品已更新', 'success');
  } else {
    state.dishes.push({
      id: genId(),
      name, category, price, servings, note, ingredients,
      emoji: state.selectedEmoji
    });
    showToast('菜品已添加', 'success');
  }

  saveState();
  renderDishes();
  renderStats();
  renderShoppingList();
  closeDishModal();
}

function deleteDish(id) {
  const dish = state.dishes.find(d => d.id === id);
  if (!dish) return;
  if (!confirm(`确定要删除「${dish.name}」吗？`)) return;

  state.dishes = state.dishes.filter(d => d.id !== id);
  if (state.selectedDishes) {
    state.selectedDishes = state.selectedDishes.filter(sid => sid !== id);
  }
  saveState();
  renderDishes();
  renderStats();
  renderShoppingList();
  showToast('菜品已删除', 'success');
}

function toggleBatchMode() {
  state.batchMode = !state.batchMode;
  if (!state.batchMode) {
    state.selectedDishes = [];
  } else {
    state.selectedDishes = [];
  }

  const dishesCard = document.getElementById('dishesCard');
  const batchModeBtn = document.getElementById('batchModeBtn');
  const batchDeleteBtn = document.getElementById('batchDeleteBtn');
  const batchCount = document.getElementById('batchCount');

  if (state.batchMode) {
    dishesCard.classList.add('batch-mode');
    batchModeBtn.textContent = '✖️ 取消批量';
    batchDeleteBtn.style.display = 'inline-flex';
    batchCount.style.display = 'inline';
  } else {
    dishesCard.classList.remove('batch-mode');
    batchModeBtn.textContent = '☑️ 批量管理';
    batchDeleteBtn.style.display = 'none';
    batchCount.style.display = 'none';
  }

  renderDishes();
}

function toggleSelectDish(id) {
  if (!state.selectedDishes) state.selectedDishes = [];
  const idx = state.selectedDishes.indexOf(id);
  if (idx > -1) {
    state.selectedDishes.splice(idx, 1);
  } else {
    state.selectedDishes.push(id);
  }
  renderDishes();
}

function batchDeleteDishes() {
  if (!state.selectedDishes || state.selectedDishes.length === 0) {
    showToast('请先选择要删除的菜品', 'error');
    return;
  }
  const count = state.selectedDishes.length;
  if (!confirm(`确定要删除选中的 ${count} 道菜品吗？`)) return;

  state.dishes = state.dishes.filter(d => !state.selectedDishes.includes(d.id));
  state.selectedDishes = [];
  state.batchMode = false;

  const dishesCard = document.getElementById('dishesCard');
  const batchModeBtn = document.getElementById('batchModeBtn');
  const batchDeleteBtn = document.getElementById('batchDeleteBtn');
  const batchCount = document.getElementById('batchCount');
  dishesCard.classList.remove('batch-mode');
  batchModeBtn.textContent = '☑️ 批量管理';
  batchDeleteBtn.style.display = 'none';
  batchCount.style.display = 'none';

  saveState();
  renderDishes();
  renderStats();
  renderShoppingList();
  showToast(`已删除 ${count} 道菜品`, 'success');
}

function clearAllDishes() {
  if (state.dishes.length === 0) {
    showToast('菜品清单已经是空的了', '');
    return;
  }
  if (!confirm(`确定要清空全部 ${state.dishes.length} 道菜品吗？此操作不可撤销。`)) return;

  state.dishes = [];
  state.selectedDishes = [];
  if (state.batchMode) {
    state.batchMode = false;
    const dishesCard = document.getElementById('dishesCard');
    const batchModeBtn = document.getElementById('batchModeBtn');
    const batchDeleteBtn = document.getElementById('batchDeleteBtn');
    const batchCount = document.getElementById('batchCount');
    dishesCard.classList.remove('batch-mode');
    batchModeBtn.textContent = '☑️ 批量管理';
    batchDeleteBtn.style.display = 'none';
    batchCount.style.display = 'none';
  }
  saveState();
  renderDishes();
  renderStats();
  renderShoppingList();
  showToast('已清空所有菜品', 'success');
}

// ========== Person Management ==========
function addPerson() {
  const input = document.getElementById('newPersonName');
  const name = input.value.trim();
  if (!name) return;

  state.people.push({ id: genId(), name, paid: 0 });
  input.value = '';
  saveState();
  renderPeople();
  renderStats();
  showToast(`已添加 ${name}`, 'success');
}

function deletePerson(id) {
  state.people = state.people.filter(p => p.id !== id);
  saveState();
  renderPeople();
  renderStats();
  showToast('已删除', 'success');
}

// ========== Shopping List ==========
function toggleShoppingItem(key) {
  state.shoppingChecked[key] = !state.shoppingChecked[key];
  saveState();
  renderShoppingList();
}

function resetShopping() {
  state.shoppingChecked = {};
  saveState();
  renderShoppingList();
  showToast('购物清单已重置', 'success');
}

// ========== Export ==========
function openExportModal() {
  document.getElementById('exportModal').classList.add('active');
}

function closeExportModal() {
  document.getElementById('exportModal').classList.remove('active');
}

function getExportSettings() {
  return {
    details: document.getElementById('toggleDetails').classList.contains('active'),
    shopping: document.getElementById('toggleShopping').classList.contains('active'),
    stats: document.getElementById('toggleStats').classList.contains('active')
  };
}

function generateExportHTML() {
  const settings = getExportSettings();
  const total = state.dishes.reduce((sum, d) => sum + (d.price || 0), 0);
  const perPerson = state.people.length > 0 ? total / state.people.length : total / (state.dinner.people || 1);

  let html = `
    <div style="font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; width: 1000px; margin: 0 auto; padding: 20px; color: #333; background: white;">
      <div style="text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 3px solid #FF6B35;">
        <h1 style="font-size: 32px; margin: 0 0 12px 0; color: #FF6B35; font-weight: bold;">🍽️ ${state.dinner.name}</h1>
        <p style="margin: 6px 0; color: #666; font-size: 16px;">
          ${state.dinner.date ? `📅 ${state.dinner.date}` : ''}
          ${state.dinner.location ? ` &nbsp;|&nbsp; 📍 ${state.dinner.location}` : ''}
          ${state.people.length > 0 ? ` &nbsp;|&nbsp; 👥 ${state.people.length}人` : ''}
        </p>
        ${state.dinner.note ? `<p style="margin: 10px 0 0 0; color: #888; font-size: 15px;">📝 ${state.dinner.note}</p>` : ''}
      </div>
  `;

  if (settings.stats) {
    html += `
      <div style="display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 180px; background: linear-gradient(135deg, #FF6B35, #FF8A5B); color: white; padding: 22px; border-radius: 14px;">
          <div style="font-size: 15px; opacity: 0.95; margin-bottom: 6px;">💰 总预算</div>
          <div style="font-size: 32px; font-weight: bold;">¥${total.toFixed(0)}</div>
        </div>
        <div style="flex: 1; min-width: 180px; background: linear-gradient(135deg, #7CB342, #9CCC65); color: white; padding: 22px; border-radius: 14px;">
          <div style="font-size: 15px; opacity: 0.95; margin-bottom: 6px;">👤 人均费用</div>
          <div style="font-size: 32px; font-weight: bold;">¥${perPerson.toFixed(0)}</div>
        </div>
        <div style="flex: 1; min-width: 180px; background: linear-gradient(135deg, #1E88E5, #42A5F5); color: white; padding: 22px; border-radius: 14px;">
          <div style="font-size: 15px; opacity: 0.95; margin-bottom: 6px;">🍽️ 菜品数量</div>
          <div style="font-size: 32px; font-weight: bold;">${state.dishes.length}道</div>
        </div>
      </div>
    `;
  }

  if (settings.details) {
    html += `
      <h2 style="color: #FF6B35; font-size: 22px; margin-bottom: 16px; font-weight: bold;">🍳 菜品清单</h2>
      <table style="width: 100%; border-collapse: collapse; margin-bottom: 28px; font-size: 15px;">
        <thead>
          <tr style="background: #FFF5F0;">
            <th style="padding: 14px 16px; text-align: left; border-bottom: 2px solid #FF6B35; font-size: 15px;">菜品</th>
            <th style="padding: 14px 16px; text-align: left; border-bottom: 2px solid #FF6B35; font-size: 15px;">分类</th>
            <th style="padding: 14px 16px; text-align: center; border-bottom: 2px solid #FF6B35; font-size: 15px;">份量</th>
            <th style="padding: 14px 16px; text-align: right; border-bottom: 2px solid #FF6B35; font-size: 15px;">价格</th>
          </tr>
        </thead>
        <tbody>
    `;

    Object.keys(CATEGORIES).forEach(catKey => {
      const dishes = state.dishes.filter(d => d.category === catKey);
      if (dishes.length === 0) return;
      const cat = CATEGORIES[catKey];
      dishes.forEach(dish => {
        html += `
          <tr>
            <td style="padding: 12px 16px; border-bottom: 1px solid #EEE;">
              <span style="font-size: 22px;">${dish.emoji}</span> <strong style="font-size: 16px;">${dish.name}</strong>
              ${dish.ingredients?.length ? `<div style="font-size: 13px; color: #999; margin-top: 6px;">${dish.ingredients.map(i => i.name).join('、')}</div>` : ''}
            </td>
            <td style="padding: 12px 16px; border-bottom: 1px solid #EEE;">${cat.emoji} ${cat.name}</td>
            <td style="padding: 12px 16px; text-align: center; border-bottom: 1px solid #EEE;">${dish.servings}人份</td>
            <td style="padding: 12px 16px; text-align: right; border-bottom: 1px solid #EEE; font-weight: bold; color: #FF6B35; font-size: 16px;">¥${dish.price}</td>
          </tr>
        `;
      });
    });

    html += `
          <tr style="background: #FFF5F0; font-weight: bold;">
            <td style="padding: 14px 16px;" colspan="3">合计</td>
            <td style="padding: 14px 16px; text-align: right; color: #FF6B35; font-size: 20px;">¥${total.toFixed(0)}</td>
          </tr>
        </tbody>
      </table>
    `;

    if (state.people.length > 0) {
      html += `
        <h2 style="color: #FF6B35; font-size: 22px; margin-bottom: 16px; font-weight: bold;">👥 参与人员</h2>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 28px; font-size: 15px;">
          <thead>
            <tr style="background: #F1F8E9;">
              <th style="padding: 14px 16px; text-align: left; border-bottom: 2px solid #7CB342; font-size: 15px;">姓名</th>
              <th style="padding: 14px 16px; text-align: right; border-bottom: 2px solid #7CB342; font-size: 15px;">应付金额</th>
            </tr>
          </thead>
          <tbody>
      `;
      state.people.forEach(person => {
        html += `
          <tr>
            <td style="padding: 12px 16px; border-bottom: 1px solid #EEE;">${person.name}</td>
            <td style="padding: 12px 16px; text-align: right; border-bottom: 1px solid #EEE; font-weight: 500;">¥${perPerson.toFixed(0)}</td>
          </tr>
        `;
      });
      html += `
          </tbody>
        </table>
      `;
    }
  }

  if (settings.shopping) {
    const allIngredients = {};
    state.dishes.forEach(dish => {
      dish.ingredients?.forEach(ing => {
        const key = ing.name + '_' + ing.unit;
        if (!allIngredients[key]) {
          allIngredients[key] = {
            name: ing.name,
            unit: ing.unit,
            quantity: 0,
            category: ing.category || 'other'
          };
        }
        const qty = parseFloat(ing.quantity);
        if (!isNaN(qty)) {
          allIngredients[key].quantity += qty;
        } else {
          allIngredients[key].quantity = ing.quantity;
        }
      });
    });

    const byCategory = {};
    Object.values(allIngredients).forEach(item => {
      if (!byCategory[item.category]) byCategory[item.category] = [];
      byCategory[item.category].push(item);
    });

    html += `
      <h2 style="color: #FF6B35; font-size: 22px; margin-bottom: 16px; font-weight: bold;">🛒 购物清单</h2>
    `;

    Object.entries(INGREDIENT_CATEGORIES).forEach(([catKey, cat]) => {
      const items = byCategory[catKey] || [];
      if (items.length === 0) return;
      html += `
        <div style="margin-bottom: 22px;">
          <h3 style="color: #555; font-size: 17px; margin-bottom: 12px; font-weight: 600;">${cat.emoji} ${cat.name}</h3>
          <div style="display: flex; flex-wrap: wrap; gap: 10px;">
      `;
      items.forEach(item => {
        const qtyDisplay = typeof item.quantity === 'number' ? item.quantity + item.unit : item.quantity + item.unit;
        html += `
          <div style="background: #F5F5F5; padding: 10px 18px; border-radius: 10px; font-size: 15px;">
            ☐ ${item.name} <span style="color: #888; font-size: 14px;">(${qtyDisplay})</span>
          </div>
        `;
      });
      html += `
          </div>
        </div>
      `;
    });
  }

  html += `
      <div style="text-align: center; margin-top: 40px; padding-top: 16px; border-top: 1px solid #DDD; color: #999; font-size: 13px;">
        由 聚餐菜谱清单 生成 | ${new Date().toLocaleDateString('zh-CN')}
      </div>
    </div>
  `;

  return html;
}

async function exportAsImage() {
  const printArea = document.getElementById('print-area');
  printArea.innerHTML = generateExportHTML();
  printArea.style.display = 'block';
  printArea.style.position = 'absolute';
  printArea.style.left = '-9999px';
  printArea.style.top = '0';

  try {
    showToast('正在生成图片...', '');
    await new Promise(resolve => requestAnimationFrame(resolve));
    const canvas = await html2canvas(printArea, {
      scale: 1.5,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      allowTaint: true,
      imageTimeout: 5000
    });

    const link = document.createElement('a');
    link.download = `${state.dinner.name || '聚餐菜谱'}_菜谱清单.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('图片导出成功', 'success');
  } catch (err) {
    console.error(err);
    showToast('导出失败，请重试', 'error');
  } finally {
    printArea.style.display = 'none';
    printArea.style.position = '';
    printArea.style.left = '';
    printArea.style.top = '';
    closeExportModal();
  }
}

async function exportAsPDF() {
  const printArea = document.getElementById('print-area');
  printArea.innerHTML = generateExportHTML();
  printArea.style.display = 'block';
  printArea.style.position = 'absolute';
  printArea.style.left = '-9999px';
  printArea.style.top = '0';

  try {
    showToast('正在生成PDF...', '');
    await new Promise(resolve => requestAnimationFrame(resolve));
    const canvas = await html2canvas(printArea, {
      scale: 1.5,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      allowTaint: true,
      imageTimeout: 5000
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const margin = 8;
    const imgWidth = pageWidth - margin * 2;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    const imgData = canvas.toDataURL('image/jpeg', 0.9);

    let heightLeft = imgHeight;
    let position = margin;

    pdf.addImage(imgData, 'JPEG', margin, position, imgWidth, imgHeight, undefined, 'FAST');
    heightLeft -= (pageHeight - margin * 2);

    while (heightLeft >= 0) {
      position = heightLeft - imgHeight + margin;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', margin, position, imgWidth, imgHeight, undefined, 'FAST');
      heightLeft -= (pageHeight - margin * 2);
    }

    pdf.save(`${state.dinner.name || '聚餐菜谱'}_菜谱清单.pdf`);
    showToast('PDF导出成功', 'success');
  } catch (err) {
    console.error(err);
    showToast('导出失败，请重试', 'error');
  } finally {
    printArea.style.display = 'none';
    printArea.style.position = '';
    printArea.style.left = '';
    printArea.style.top = '';
    closeExportModal();
  }
}

function printPage() {
  const printArea = document.getElementById('print-area');
  printArea.innerHTML = generateExportHTML();
  printArea.style.display = 'block';
  closeExportModal();
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      printArea.style.display = 'none';
    }, 500);
  }, 200);
}

function copyToClipboard() {
  const total = state.dishes.reduce((sum, d) => sum + (d.price || 0), 0);
  const perPerson = state.people.length > 0 ? total / state.people.length : total / (state.dinner.people || 1);

  let text = `🍽️ ${state.dinner.name}\n`;
  if (state.dinner.date) text += `📅 ${state.dinner.date}\n`;
  if (state.dinner.location) text += `📍 ${state.dinner.location}\n`;
  text += `\n💰 总预算: ¥${total.toFixed(0)}\n👥 人均: ¥${perPerson.toFixed(0)}\n🍳 菜品数: ${state.dishes.length}道\n\n`;

  text += `【菜品清单】\n`;
  Object.keys(CATEGORIES).forEach(catKey => {
    const dishes = state.dishes.filter(d => d.category === catKey);
    if (dishes.length === 0) return;
    const cat = CATEGORIES[catKey];
    text += `\n${cat.emoji} ${cat.name}:\n`;
    dishes.forEach(dish => {
      text += `  ${dish.emoji} ${dish.name} - ¥${dish.price}\n`;
    });
  });

  if (state.people.length > 0) {
    text += `\n【参与人员】\n`;
    state.people.forEach(p => {
      text += `  ${p.name}: 应付¥${perPerson.toFixed(0)}\n`;
    });
  }

  if (state.dinner.note) {
    text += `\n📝 备注: ${state.dinner.note}\n`;
  }

  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板', 'success');
  }).catch(() => {
    showToast('复制失败', 'error');
  });
  closeExportModal();
}

// ========== Data Import/Export ==========
function exportData() {
  const data = {
    dinner: state.dinner,
    dishes: state.dishes,
    people: state.people
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${state.dinner.name || '聚餐菜谱'}_数据备份.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据导出成功', 'success');
}

function importData() {
  document.getElementById('fileInput').click();
}

function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.dinner) state.dinner = data.dinner;
      if (data.dishes) state.dishes = data.dishes;
      if (data.people) state.people = data.people;
      saveState();
      renderAll();
      showToast('数据导入成功', 'success');
    } catch (err) {
      showToast('文件格式错误', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ========== Toast ==========
function showToast(message, type = '') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${message}`;
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100px)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// ========== Initialize ==========
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  initEvents();
  renderAll();
});
