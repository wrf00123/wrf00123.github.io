<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 9001:2015 质量管理体系 要求 · 知识库</title>
<style>
/* ============ 主题变量 ============ */
:root{
  --bg:#0f1419; --bg2:#161b22; --bg3:#1c2330; --panel:#1a2230;
  --border:#2a3442; --text:#e6edf3; --text2:#9aa7b5; --text3:#6b7785;
  --accent:#3b82f6; --accent2:#22d3ee; --accent-soft:rgba(59,130,246,.15);
  --req:#f59e0b; --note:#8b95a3; --ok:#34d399; --danger:#f87171;
  --shadow:0 8px 30px rgba(0,0,0,.45); --radius:12px;
}
html[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#ffffff; --bg3:#eef2f8; --panel:#ffffff;
  --border:#dce3ec; --text:#1a2330; --text2:#46566a; --text3:#7a899b;
  --accent:#2563eb; --accent2:#0891b2; --accent-soft:rgba(37,99,235,.1);
  --req:#c2710a; --note:#6b7785; --ok:#059669; --danger:#dc2626;
  --shadow:0 8px 30px rgba(20,40,80,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Segoe UI","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.75;
  font-size:16px; transition:background .25s,color .25s;
}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--accent-soft)}

/* ============ 顶栏 ============ */
header{
  position:sticky;top:0;z-index:50;background:var(--bg2);
  border-bottom:1px solid var(--border);padding:10px 18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;white-space:nowrap}
.brand .logo{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;
}
.brand small{display:block;font-weight:400;color:var(--text3);font-size:11px}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:520px}
#search{
  width:100%;padding:9px 36px 9px 38px;border-radius:10px;
  border:1px solid var(--border);background:var(--bg3);color:var(--text);
  font-size:14px;outline:none;transition:.2s;
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-wrap .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.search-wrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  border:none;background:none;color:var(--text3);font-size:18px;display:none}
.search-wrap .clr:hover{color:var(--danger)}
.search-count{position:absolute;right:38px;top:50%;transform:translateY(-50%);
  font-size:11px;color:var(--text3);pointer-events:none}
.tools{display:flex;gap:6px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);padding:7px 10px;border-radius:9px;
  font-size:13px;transition:.18s;white-space:nowrap;
}
.btn:hover{color:var(--text);border-color:var(--accent);background:var(--accent-soft)}
.btn.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.btn .kbd{font-size:10px;opacity:.6}

/* ============ 布局 ============ */
.layout{display:flex;min-height:calc(100vh - 58px)}
/* 侧栏 */
aside{
  width:300px;flex:none;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s,margin .25s;
}
aside.collapsed{width:0;margin-left:-1px}
.side-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;gap:8px}
.side-head input{
  flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:13px;outline:none;min-width:0;
}
.nav{flex:1;overflow-y:auto;padding:8px 6px 30px}
.nav-group{margin-bottom:2px}
.nav-chap{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  cursor:pointer;color:var(--text);font-weight:600;font-size:14px;transition:.15s;
}
.nav-chap:hover{background:var(--bg3)}
.nav-chap .num{
  flex:none;width:26px;height:26px;border-radius:7px;background:var(--accent-soft);
  color:var(--accent);display:grid;place-items:center;font-size:12px;font-weight:700;
}
.nav-chap .ttl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-chap .cnt{font-size:11px;color:var(--text3);background:var(--bg3);
  padding:1px 7px;border-radius:20px}
.nav-chap .arrow{transition:transform .2s;color:var(--text3);font-size:11px}
.nav-chap.open .arrow{transform:rotate(90deg)}
.nav-items{display:none;padding:2px 0 4px 14px}
.nav-items.open{display:block}
.nav-item{
  display:flex;gap:8px;align-items:baseline;padding:5px 10px;border-radius:7px;
  cursor:pointer;color:var(--text2);font-size:13px;transition:.15s;
  border-left:2px solid transparent;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--text);border-left-color:var(--accent)}
.nav-item .id{color:var(--accent2);font-weight:600;font-variant-numeric:tabular-nums;flex:none}
.nav-item .it{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .star{margin-left:auto;color:var(--text3);font-size:12px;opacity:0}
.nav-item:hover .star,.nav-item.starred .star{opacity:1}
.nav-item.starred .star{color:var(--req)}

/* 主区 */
main{flex:1;min-width:0;display:flex;flex-direction:column}
.breadcrumb{padding:10px 22px;border-bottom:1px solid var(--border);background:var(--bg2);
  font-size:13px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.breadcrumb b{color:var(--text)}
.crumbs a{color:var(--accent2)}
.content{flex:1;overflow-y:auto;padding:26px 30px 80px;max-width:1080px;margin:0 auto;width:100%}
.clause-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;
  border-bottom:2px solid var(--border);padding-bottom:16px;margin-bottom:22px}
.clause-num{
  flex:none;font-size:15px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:8px 14px;border-radius:10px;font-variant-numeric:tabular-nums;letter-spacing:.5px;
}
.clause-title{flex:1;min-width:200px}
.clause-title h1{font-size:25px;line-height:1.35;margin-bottom:4px}
.clause-title .sub{color:var(--text3);font-size:13px}
.clause-actions{display:flex;gap:8px;flex-wrap:wrap}
.mini-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  padding:6px 11px;border-radius:8px;font-size:12.5px;transition:.18s;display:inline-flex;gap:5px;align-items:center}
.mini-btn:hover{color:var(--text);border-color:var(--accent)}
.mini-btn.on{color:var(--req);border-color:var(--req)}

/* 内容块 */
.block{margin-bottom:14px}
.block p{margin-bottom:12px}
.block .note{color:var(--note);font-size:14px;padding:10px 14px;border-left:3px solid var(--border);
  background:var(--bg2);border-radius:0 8px 8px 0;margin:10px 0}
.block .req-em{color:var(--req);font-weight:600}
ul.l{list-style:none;padding-left:4px;margin:8px 0}
ul.l>li{position:relative;padding:4px 0 4px 26px;margin-bottom:4px}
ul.l>li::before{content:attr(data-k);position:absolute;left:0;top:4px;font-weight:700;color:var(--accent2)}
ul.l2{padding-left:22px;margin:4px 0}
ul.l2>li{padding-left:24px}
ul.l2>li::before{color:var(--text3)}
.tip{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;
  padding:12px 16px;margin:14px 0;font-size:14px}
mark{background:var(--req);color:#1a1205;padding:0 2px;border-radius:3px}
mark.cur{background:var(--accent);color:#fff}

/* 翻页 */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:40px;
  padding-top:20px;border-top:1px solid var(--border)}
.pager a{padding:12px 18px;border:1px solid var(--border);border-radius:10px;
  background:var(--bg2);flex:1;max-width:48%;transition:.18s}
.pager a:hover{border-color:var(--accent);text-decoration:none}
.pager .pl{color:var(--text3);font-size:12px}
.pager .pt{color:var(--text);font-weight:600;font-size:14px;display:block;margin-top:2px}
.pager a.next{text-align:right}

/* 进度条 */
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  z-index:100;width:0;transition:width .3s}

/* ============ 右抽屉 ============ */
.drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--panel);
  border-left:1px solid var(--border);z-index:60;transform:translateX(105%);
  transition:transform .28s;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.drawer.open{transform:translateX(0)}
.drawer .dh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.drawer .dh h3{font-size:16px}
.drawer .dbody{flex:1;overflow-y:auto;padding:16px 18px}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;opacity:0;pointer-events:none;transition:.25s}
.mask.show{opacity:1;pointer-events:auto}

/* 搜索结果 */
.result{padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;
  cursor:pointer;transition:.15s;background:var(--bg2)}
.result:hover{border-color:var(--accent);background:var(--bg3)}
.result .rid{color:var(--accent2);font-weight:700;font-size:13px}
.result .rt{font-weight:600;font-size:14px;margin:2px 0}
.result .rs{color:var(--text2);font-size:13px;line-height:1.5}
.empty{color:var(--text3);text-align:center;padding:40px 10px}

/* 术语表 */
.term{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--bg2)}
.term b{color:var(--accent2)}
.term p{color:var(--text2);font-size:13px;margin-top:4px}

/* 统计卡 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800;color:var(--accent)}
.stat .l{font-size:12px;color:var(--text3);margin-top:2px}

/* 测验 */
.quiz-q{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.quiz-q .qt{font-weight:600;margin-bottom:10px}
.quiz-q label{display:block;padding:8px 12px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:6px;cursor:pointer;transition:.15s;font-size:14px}
.quiz-q label:hover{background:var(--bg3)}
.quiz-q label.ok{background:rgba(52,211,153,.16);border-color:var(--ok);color:var(--ok)}
.quiz-q label.bad{background:rgba(248,113,113,.16);border-color:var(--danger);color:var(--danger)}
.quiz-q .exp{font-size:13px;color:var(--text2);margin-top:8px;display:none}
.quiz-q.answered .exp{display:block}

/* 图 */
.diagram-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin:14px 0}
.diagram-wrap h4{margin-bottom:12px;font-size:15px}
.svg-box{width:100%;overflow-x:auto;text-align:center}
.svg-box svg{max-width:100%;height:auto}
.legend{font-size:12px;color:var(--text3);margin-top:8px}

/* 移动端 */
.hamburger{display:none}
@media(max-width:900px){
  aside{position:fixed;top:58px;bottom:0;left:0;z-index:40;box-shadow:var(--shadow)}
  .hamburger{display:inline-flex}
  .content{padding:18px 14px 70px}
  .clause-title h1{font-size:20px}
}
@media(max-width:560px){
  .brand small{display:none}
  .tools .btn span.txt{display:none}
  .clause-num{font-size:13px;padding:6px 10px}
}
/* 打印 */
@media print{
  aside,.tools,header .search-wrap,.pager,.clause-actions,.hamburger{display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  .layout{display:block}
  .content{max-width:100%;padding:0}
  .clause-head{border-color:#999}
  mark{background:#ffe28a;color:#000}
}
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<header>
  <button class="btn hamburger" id="toggleNav" title="目录">☰</button>
  <div class="brand">
    <div class="logo">ISO</div>
    <div>ISO 9001:2015 知识库
      <small>GB/T 19001—2016 质量管理体系 要求</small>
    </div>
  </div>
  <div class="search-wrap">
    <span class="ic">🔍</span>
    <input id="search" placeholder="全文搜索：如“风险”“成文信息”“管理评审”…" autocomplete="off">
    <span class="search-count" id="searchCount"></span>
    <button class="clr" id="searchClear">×</button>
  </div>
  <div class="tools">
    <button class="btn" id="btnNav" title="目录树">📑<span class="txt">目录</span></button>
    <button class="btn" id="btnStar" title="我的收藏">⭐<span class="txt">收藏</span></button>
    <button class="btn" id="btnGloss" title="术语表">📖<span class="txt">术语</span></button>
    <button class="btn" id="btnGraph" title="结构图">🗺️<span class="txt">图谱</span></button>
    <button class="btn" id="btnQuiz" title="自测">🎯<span class="txt">自测</span></button>
    <button class="btn" id="btnStat" title="统计">📊<span class="txt">统计</span></button>
    <button class="btn" id="btnTheme" title="主题">🌓</button>
    <button class="btn" id="btnFontD" title="缩小字号">A−</button>
    <button class="btn" id="btnFontU" title="放大字号">A+</button>
    <button class="btn" id="btnPrint" title="打印/导出PDF">🖨️</button>
  </div>
</header>

<div class="layout">
  <aside id="aside">
    <div class="side-head">
      <input id="navFilter" placeholder="筛选条款…">
      <button class="btn" id="collapseNav" title="收起">⟨</button>
    </div>
    <div class="nav" id="nav"></div>
  </aside>

  <main>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- 右抽屉：通用容器 -->
<div class="mask" id="mask"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <h3 id="drawerTitle">面板</h3>
    <button class="btn" id="drawerClose">✕</button>
  </div>
  <div class="dbody" id="drawerBody"></div>
</div>

<script>
/* =====================================================================
   ISO 9001:2015 数据（GB/T 19001—2016 等同采用 ISO 9001:2015）
   每条 clause: {id, num, title, en?, blocks:[...]}
   block 类型:
     {t:'p', x:'文本'}           段落
     {t:'note', x:'文本'}        注
     {t:'ul', items:[...]}       列表，item 可为 字符串 或 {t:'ul',items:[...]}
   ===================================================================== */
const CLAUSES = [

/* ===== 引言 ===== */
{id:'0',num:'引言',title:'引言（Introduction）',blocks:[
  {t:'p',x:'采用质量管理体系是组织的一项战略决策，能够帮助其提高整体绩效，为推动可持续发展奠定良好基础。'},
  {t:'p',x:'本标准采用过程方法，该方法结合了“策划—实施—检查—处置”（PDCA）循环与基于风险的思维。'},
]},
{id:'0.1',num:'0.1',title:'总则',blocks:[
  {t:'p',x:'采用质量管理体系是组织的一项战略决策，能够帮助其提高整体绩效，为推动可持续发展奠定良好基础。'},
  {t:'p',x:'组织根据本标准实施质量管理体系的潜在益处是：'},
  {t:'ul',items:[
    'a）稳定提供满足顾客要求以及适用的法律法规要求的产品和服务的能力；',
    'b）促成增强顾客满意的机会；',
    'c）应对与组织环境和目标相关的风险和机遇；',
    'd）证实符合规定的质量管理体系要求的能力。',
  ]},
  {t:'p',x:'本标准可用于内部和外部各方。'},
  {t:'p',x:'实施本标准并非需要：'},
  {t:'ul',items:[
    '——统一不同质量管理体系的架构；',
    '——形成与本标准条款结构相一致的文件；',
    '——在组织内使用本标准的特定术语。',
  ]},
  {t:'p',x:'本标准规定的质量管理体系要求是对产品和服务要求的补充。'},
  {t:'p',x:'本标准采用过程方法，该方法结合了“策划—实施—检查—处置”（PDCA）循环与基于风险的思维。'},
  {t:'p',x:'过程方法使组织能够策划过程及其相互作用。PDCA 循环使组织能够确保其过程得到充分的资源和管理，确定改进机会并采取行动。基于风险的思维使组织能够确定可能导致其过程和质量管理体系偏离策划结果的各种因素，采取预防控制，最大限度地降低不利影响，并最大限度地利用出现的机遇。'},
  {t:'p',x:'在日益复杂的动态环境中持续满足要求，并针对未来需求和期望采取适当行动，这无疑是一项挑战。为了实现这一目标，组织可能会发现，除了纠正和持续改进，还有必要采取各种形式的改进，如突破性变革、创新和重组。'},
  {t:'p',x:'在本标准中使用如下助动词：'},
  {t:'ul',items:[
    '“应”表示要求；',
    '“宜”表示建议；',
    '“可”表示允许；',
    '“能”表示可能或能够。',
  ]},
  {t:'note',x:'“注”的内容是理解和说明有关要求的指南。'},
]},
{id:'0.2',num:'0.2',title:'质量管理原则',blocks:[
  {t:'p',x:'本标准是在 GB/T 19000 所阐述的质量管理原则基础上制定的。每项原则的介绍均包含概述、该原则对组织的重要性的依据，应用该原则的主要益处示例以及应用该原则提高组织绩效的典型措施示例。'},
  {t:'p',x:'质量管理原则包括：'},
  {t:'ul',items:[
    '——以顾客为关注焦点；',
    '——领导作用；',
    '——全员参与；',
    '——过程方法；',
    '——改进；',
    '——循证决策；',
    '——关系管理。',
  ]},
]},
{id:'0.3',num:'0.3',title:'过程方法',blocks:[
  {t:'p',x:'本标准倡导在建立、实施质量管理体系以及提高其有效性时采用过程方法，通过满足顾客要求增强顾客满意。采用过程方法所需考虑的具体要求见 4.4。'},
  {t:'p',x:'将相互关联的过程作为一个体系加以理解和管理，有助于组织有效和高效地实现其预期结果。这种方法使组织能够对其体系的过程之间相互关联和相互依赖的关系进行有效控制，以提高组织整体绩效。'},
  {t:'p',x:'过程方法包括按照组织的质量方针和战略方向，对各过程及其相互作用进行系统的规定和管理，从而实现预期结果。可通过采用 PDCA 循环以及始终基于风险的思维对过程和整个体系进行管理，旨在有效利用机遇并防止发生不良结果。'},
  {t:'p',x:'在质量管理体系中应用过程方法能够：'},
  {t:'ul',items:[
    'a）理解并持续满足要求；',
    'b）从增值的角度考虑过程；',
    'c）获得有效的过程绩效；',
    'd）在评价数据和信息的基础上改进过程。',
  ]},
  {t:'p',x:'单一过程各要素及其相互作用如图 1 所示。每一过程均有特定的监视和测量检查点，以用于控制，这些检查点根据相关的风险有所不同。'},
]},
{id:'0.3.1',num:'0.3.1',title:'总则',blocks:[
  {t:'p',x:'本标准倡导在建立、实施质量管理体系以及提高其有效性时采用过程方法，通过满足顾客要求增强顾客满意。采用过程方法所需考虑的具体要求见 4.4。'},
  {t:'p',x:'将相互关联的过程作为一个体系加以理解和管理，有助于组织有效和高效地实现其预期结果。这种方法使组织能够对其体系的过程之间相互关联和相互依赖的关系进行有效控制，以提高组织整体绩效。'},
]},
{id:'0.3.2',num:'0.3.2',title:'PDCA 循环',blocks:[
  {t:'p',x:'PDCA 循环能够应用于所有过程以及整个质量管理体系。本标准第 4 章至第 10 章是如何构成 PDCA 循环的。'},
  {t:'p',x:'PDCA 循环可以简要描述如下：'},
  {t:'ul',items:[
    '——策划（Plan）：根据顾客的要求和组织的方针，建立体系的目标及其过程、确定实现结果所需的资源，并识别和应对风险和机遇；',
    '——实施（Do）：执行所做的策划；',
    '——检查（Check）：根据方针、目标、要求和所策划的活动，对过程以及形成产品和服务进行监视和测量（适用时），并报告结果；',
    '——处置（Act）：必要时，采取措施提高绩效。',
  ]},
]},
{id:'0.3.3',num:'0.3.3',title:'基于风险的思维',blocks:[
  {t:'p',x:'基于风险的思维（见附录 A.4）是实现质量管理体系有效性的基础。本标准以前的版本已经隐含基于风险思维的概念，例如：采取预防措施消除潜在的不合格，对发生的不合格进行分析，并采取与不合格的影响相适当措施，防止其再次发生。'},
  {t:'p',x:'为了满足本标准的要求，组织需策划和实施应对风险和机遇的措施。应对风险和机遇，为提高质量管理体系有效性、获得改进结果以及防止不利影响奠定基础。'},
  {t:'p',x:'某些有利于实现预期结果的情况可能导致机遇的出现，例如：有利于组织吸引顾客、开发新产品和服务、减少浪费或提高生产率的一系列情形。利用机遇所采取的实施也可能包括考虑相关风险。风险是不确定性的影响，不确定性可能有正面的影响，也可能有负面的影响。风险的正面影响可能提供机遇，但并非所有的正面影响均可提供机遇。'},
]},
{id:'0.4',num:'0.4',title:'与其他管理体系标准的关系',blocks:[
  {t:'p',x:'本标准采用 ISO 制定的管理体系标准框架，以提高与其他管理体系标准的协调一致性（见附录 A.1）。'},
  {t:'p',x:'本标准使组织能够使用过程方法，并结合 PDCA 循环和基于风险的思维，将其质量管理体系与其他管理体系标准要求进行协调或整合。'},
  {t:'p',x:'本标准与 GB/T 19000 和 GB/T 19004 存在如下关系：'},
  {t:'ul',items:[
    '——GB/T 19000《质量管理体系 基础和术语》为正确理解和实施本标准提供必要基础；',
    '——GB/T 19004《追求组织的持续成功 质量管理方法》为选择超出本标准要求的组织提供指南。',
  ]},
  {t:'p',x:'附录 B 给出了 SAC/TC 151 制定的其他质量管理和质量管理体系标准（等同采用 ISO/TC 176 质量管理和质量保证技术委员会制定的国际标准）的详细信息。'},
  {t:'p',x:'本标准不包括针对环境管理、职业健康和安全管理或财务管理等其他管理体系的特定要求。'},
  {t:'p',x:'在本标准的基础上，已经制定了若干行业特定要求的质量管理体系标准。其中的某些标准规定了质量管理体系的附加要求，而另一些标准则仅限于提供在特定行业应用本标准的指南。'},
  {t:'p',x:'本标准的章节内容与之前版本（GB/T 19001-2008/ISO 9001:2008）章节内容之间的对应关系见 ISO/TC176/SC2 的公开网站：www.iso.org/tc176/sc02/public。'},
]},

/* ===== 第1章 范围 ===== */
{id:'1',num:'1',title:'范围（Scope）',blocks:[
  {t:'p',x:'本标准为下列组织规定了质量管理体系要求：'},
  {t:'ul',items:[
    'a）需要证实其具有稳定提供满足顾客要求及适用法律法规要求的产品和服务的能力；',
    'b）通过体系的有效应用，包括体系改进的过程，以及保证符合顾客要求和适用的法律法规要求，旨在增强顾客满意。',
  ]},
  {t:'p',x:'本标准规定的所有要求是通用的，旨在适用于各种类型、不同规模和提供不同产品和服务的组织。'},
  {t:'note',x:'注 1：在本标准中，术语“产品”或“服务”仅适用于预期提供给顾客或顾客所要求的产品和服务；'},
  {t:'note',x:'注 2：法律法规要求可称作为法定要求。'},
]},

/* ===== 第2章 规范性引用文件 ===== */
{id:'2',num:'2',title:'规范性引用文件',blocks:[
  {t:'p',x:'下列文件对于本文件的应用是必不可少的。凡是注日期的引用文件，仅注日期的版本适用于本文件。凡是不注日期的引用文件，其最新版本（包括所有的修改单）适用于本文件。'},
  {t:'ul',items:['GB/T 19000-2016 质量管理体系 基础和术语（ISO 9000:2015，IDT）']},
]},

/* ===== 第3章 术语和定义 ===== */
{id:'3',num:'3',title:'术语和定义',blocks:[
  {t:'p',x:'GB/T 19000-2016 界定的术语和定义适用于本文件。'},
]},

/* ===== 第4章 组织环境 ===== */
{id:'4',num:'4',title:'组织环境（Context of the organization）',blocks:[
  {t:'p',x:'本章规定了理解组织及其环境、理解相关方需求和期望、确定质量管理体系范围，以及建立质量管理体系及其过程的要求。'},
]},
{id:'4.1',num:'4.1',title:'理解组织及其环境',blocks:[
  {t:'p',x:'组织应确定与其宗旨和战略方向相关并影响其实现质量管理体系预期结果的能力的各种外部和内部因素。'},
  {t:'p',x:'组织应对这些内部和外部因素的相关信息进行监视和评审。'},
  {t:'note',x:'注 1：这些因素可以包括需要考虑的正面和负面要素或条件。'},
  {t:'note',x:'注 2：考虑来自于国际、国内、地区和当地的各种法律法规、技术、竞争、市场、文化、社会和经济因素，有助于理解外部环境。'},
  {t:'note',x:'注 3：考虑组织的价值观、文化、知识和绩效等相关因素，有助于理解内部环境。'},
]},
{id:'4.2',num:'4.2',title:'理解相关方的需求和期望',blocks:[
  {t:'p',x:'由于相关方对组织稳定提供符合顾客要求及适用法律法规要求的产品和服务的能力具有影响或潜在影响，因此，组织应确定：'},
  {t:'ul',items:[
    'a）与质量管理体系有关的相关方；',
    'b）与质量管理体系有关的相关方的要求。',
  ]},
  {t:'p',x:'组织应监视和评审这些相关方的信息及其相关要求。'},
]},
{id:'4.3',num:'4.3',title:'确定质量管理体系的范围',blocks:[
  {t:'p',x:'组织应明确质量管理体系的边界和适用性，以确定其范围。'},
  {t:'p',x:'在确定范围时，组织应考虑：'},
  {t:'ul',items:[
    'a）4.1 中提及的各种外部和内部因素；',
    'b）4.2 中提及的相关方的要求；',
    'c）组织的产品和服务。',
  ]},
  {t:'p',x:'如果本标准的全部要求适用于组织确定的质量管理体系范围，组织应实施本标准的全部要求。'},
  {t:'p',x:'组织的质量管理体系范围应作为成文信息，可获得并得到保持。该范围应描述所覆盖的产品和服务类型，如果组织确定本标准的某些要求不适用于其质量管理体系范围，应说明理由。'},
  {t:'p',x:'只有所确定的不适用的要求不影响组织确保其产品和服务合格的能力或责任，对增强顾客满意也不会产生影响，方可声称符合本标准的要求。'},
]},
{id:'4.4',num:'4.4',title:'质量管理体系及其过程',blocks:[
  {t:'p',x:'组织应按照本标准的要求，建立、实施、保持和持续改进质量管理体系，包括所需过程及其相互作用。'},
  {t:'p',x:'组织应确定质量管理体系所需的过程及其在整个组织中的应用，且应：'},
  {t:'ul',items:[
    'a）确定这些过程所需的输入和期望的输出；',
    'b）确定这些过程的顺序和相互作用；',
    'c）确定和应用所需的准则和方法（包括监视、测量和相关绩效指标），以确保这些过程的有效运行和控制；',
    'd）确定这些过程所需的资源并确保可获得；',
    'e）分配这些过程的职责和权限；',
    'f）按照 6.1 的要求应对风险和机遇；',
    'g）评价这些过程，实施所需的变更，以确保实现这些过程的预期结果；',
    'h）改进过程和质量管理体系。',
  ]},
  {t:'p',x:'在必要的范围和程度上，组织应：'},
  {t:'ul',items:[
    'a）保持成文信息以支持过程运行；',
    'b）保留成文信息以确信其过程按策划进行。',
  ]},
]},

/* ===== 第5章 领导作用 ===== */
{id:'5',num:'5',title:'领导作用（Leadership）',blocks:[
  {t:'p',x:'最高管理者应通过展现领导作用和承诺，确保质量管理体系的有效性，并以顾客为关注焦点。'},
]},
{id:'5.1',num:'5.1',title:'领导作用和承诺',blocks:[{t:'p',x:'最高管理者应通过以下方面，证实其对质量管理体系的领导作用和承诺。'}]},
{id:'5.1.1',num:'5.1.1',title:'总则',blocks:[
  {t:'ul',items:[
    'a）对质量管理体系的有效性负责；',
    'b）确保制定质量管理体系的质量方针和质量目标，并与组织环境相适应，与战略方向相一致；',
    'c）确保质量管理体系要求融入组织的业务过程；',
    'd）促进使用过程方法和基于风险的思维；',
    'e）确保质量管理体系所需的资源是可获得的；',
    'f）沟通有效的质量管理和符合质量管理体系要求的重要性；',
    'g）确保质量管理体系实现预期结果；',
    'h）促使人员积极参与、指导和支持他们为质量管理体系的有效性作出贡献；',
    'i）推动改进；',
    'j）支持其他相关管理者在其职责范围内发挥领导作用。',
  ]},
  {t:'note',x:'注：本标准使用的“业务”一词可广义地理解为涉及组织存在目的的核心活动，无论是公营、私营、营利或非营利组织。'},
]},
{id:'5.1.2',num:'5.1.2',title:'以顾客为关注焦点',blocks:[
  {t:'p',x:'最高管理者应通过确保以下方面，证实其以顾客为关注焦点的领导作用和承诺：'},
  {t:'ul',items:[
    'a）确定、理解并持续地满足顾客要求以及适用的法律法规要求；',
    'b）确定和应对风险和机遇，这些风险和机遇可能影响产品和服务合格以及增强顾客满意能力；',
    'c）始终致力于增强顾客满意。',
  ]},
]},
{id:'5.2',num:'5.2',title:'方针',blocks:[{t:'p',x:'最高管理者应制定、实施和保持质量方针。'}]},
{id:'5.2.1',num:'5.2.1',title:'制定质量方针',blocks:[
  {t:'p',x:'最高管理者应制定、实施和保持质量方针，质量方针应：'},
  {t:'ul',items:[
    'a）适应组织的宗旨和环境并支持其战略方向；',
    'b）为建立质量目标提供框架；',
    'c）包括满足适用要求的承诺；',
    'd）包括持续改进质量管理体系的承诺。',
  ]},
]},
{id:'5.2.2',num:'5.2.2',title:'沟通质量方针',blocks:[
  {t:'p',x:'质量方针应：'},
  {t:'ul',items:[
    'a）可获取并保持成文信息；',
    'b）在组织内得到沟通、理解和应用；',
    'c）适宜时，可为有关相关方所获取。',
  ]},
]},
{id:'5.3',num:'5.3',title:'组织内的角色、职责和权限',blocks:[
  {t:'p',x:'最高管理者应确保组织内相关角色的职责、权限得到分配、沟通和理解。'},
  {t:'p',x:'最高管理者应分配职责和权限，以：'},
  {t:'ul',items:[
    'a）确保质量管理体系符合本标准的要求；',
    'b）确保各过程获得其预期输出；',
    'c）报告质量管理体系的绩效及其改进机会（见 10.1），特别是向最高管理者报告；',
    'd）确保在整个组织推动以顾客为关注焦点；',
    'e）确保在策划和实施质量管理体系变更时保持其完整性。',
  ]},
]},

/* ===== 第6章 策划 ===== */
{id:'6',num:'6',title:'策划（Planning）',blocks:[{t:'p',x:'策划旨在确保质量管理体系能够实现其预期结果，并应对风险和机遇。'}]},
{id:'6.1',num:'6.1',title:'应对风险和机遇的措施',blocks:[]},
{id:'6.1.1',num:'6.1.1',title:'总则',blocks:[
  {t:'p',x:'在策划质量管理体系时，组织应考虑到 4.1 所提及的因素和 4.2 所提及的要求，并确定需要应对的风险和机遇，以：'},
  {t:'ul',items:[
    'a）确保质量管理体系能够实现其预期结果；',
    'b）增强有利影响；',
    'c）预防或减少不利影响；',
    'd）实现改进。',
  ]},
]},
{id:'6.1.2',num:'6.1.2',title:'策划措施',blocks:[
  {t:'p',x:'组织应策划：'},
  {t:'ul',items:[
    'a）应对这些风险和机遇的措施；',
    'b）如何：',
    {t:'ul',items:[
      '1）在质量管理体系过程中整合并实施这些措施（见 4.4）；',
      '2）评价这些措施的有效性。',
    ]},
  ]},
  {t:'p',x:'应对措施应与风险和机遇对产品和服务符合性的潜在影响相适应。'},
  {t:'note',x:'注 1：通过信息充分的决策，应对风险可选择规避风险，为寻求机遇承担风险，消除风险源，改变风险的可能性和后果，分担风险，或保留风险。'},
  {t:'note',x:'注 2：机遇可能导致采用新实践，推出新产品，开辟新市场，赢得新客户，建立合作伙伴关系，利用新技术和其他可行之处，以应对组织或其顾客的需求。'},
]},
{id:'6.2',num:'6.2',title:'质量目标及其实现的策划',blocks:[]},
{id:'6.2.1',num:'6.2.1',title:'质量目标',blocks:[
  {t:'p',x:'组织应对相关职能、层次和质量管理体系所需的过程设定质量目标。'},
  {t:'p',x:'质量目标应：'},
  {t:'ul',items:[
    'a）与质量方针保持一致；',
    'b）可测量；',
    'c）考虑适用的要求；',
    'd）与产品和服务合格以及增强顾客满意相关；',
    'e）予以监视；',
    'f）予以沟通；',
    'g）适时更新。',
  ]},
  {t:'p',x:'组织应保持有关质量目标的成文信息。'},
]},
{id:'6.2.2',num:'6.2.2',title:'实现质量目标的策划',blocks:[
  {t:'p',x:'策划如何实现质量目标时，组织应确定：'},
  {t:'ul',items:[
    'a）要做什么；',
    'b）需要什么资源；',
    'c）由谁负责；',
    'd）何时完成；',
    'e）如何评价结果。',
  ]},
]},
{id:'6.3',num:'6.3',title:'变更的策划',blocks:[
  {t:'p',x:'当组织确定需要对质量管理体系进行变更时，变更应按所策划的方式实施（见 4.4）。'},
  {t:'p',x:'组织应考虑到：'},
  {t:'ul',items:[
    'a）变更目的及其潜在后果；',
    'b）质量管理体系的完整性；',
    'c）资源的可获得性；',
    'd）责任和权限的分配或再分配。',
  ]},
]},

/* ===== 第7章 支持 ===== */
{id:'7',num:'7',title:'支持（Support）',blocks:[{t:'p',x:'支持章节规定了为建立、实施、保持和持续改进质量管理体系所需资源的确定与提供。'}]},
{id:'7.1',num:'7.1',title:'资源',blocks:[]},
{id:'7.1.1',num:'7.1.1',title:'总则',blocks:[
  {t:'p',x:'组织应确定并提供所需的资源，以建立、实施、保持和持续改进质量管理体系。'},
  {t:'p',x:'组织应考虑：'},
  {t:'ul',items:[
    'a）现有内部资源的能力和局限；',
    'b）需要从外部供方获得的资源。',
  ]},
]},
{id:'7.1.2',num:'7.1.2',title:'人员',blocks:[
  {t:'p',x:'组织应确定并提供所需要的人员，以有效实施质量管理体系，并运行和控制其过程。'},
]},
{id:'7.1.3',num:'7.1.3',title:'基础设施',blocks:[
  {t:'p',x:'组织应确定、提供和维护所需的基础设施，以运行过程，并获得合格产品和服务。'},
  {t:'note',x:'注：基础设施可包括：'},
  {t:'ul',items:[
    'a）建筑物和相关设施；',
    'b）设备，包括硬件和软件；',
    'c）运输资源；',
    'd）信息和通信技术。',
  ]},
]},
{id:'7.1.4',num:'7.1.4',title:'过程运行环境',blocks:[
  {t:'p',x:'组织应确定、提供并维护所需的环境，以运行过程，并获得合格产品和服务。'},
  {t:'note',x:'注：适当的过程运行环境可能是人文因素与物理因素的结合，例如：'},
  {t:'ul',items:[
    'a）社会因素（如无歧视、和谐稳定、无对抗）；',
    'b）心理因素（减压、预防过度疲劳、保证情绪稳定）；',
    'c）物理因素（如温度、热量、湿度、照明、空气流通、卫生、噪声等）。',
  ]},
  {t:'p',x:'由于所提供的产品和服务不同，这些因素可能存在显著差异。'},
]},
{id:'7.1.5',num:'7.1.5',title:'监视和测量资源',blocks:[]},
{id:'7.1.5.1',num:'7.1.5.1',title:'总则',blocks:[
  {t:'p',x:'当利用监视或测量来验证产品和服务符合要求时，组织应确定并提供所需的资源，以确保结果有效和可靠。'},
  {t:'p',x:'组织应确保所提供的资源：'},
  {t:'ul',items:[
    'a）适合所开展的监视和测量活动的特定类型；',
    'b）得到维护，以确保持续适合其用途。',
  ]},
  {t:'p',x:'组织应保留适当的成文信息，作为监视和测量资源适合其用途的证据。'},
]},
{id:'7.1.5.2',num:'7.1.5.2',title:'测量溯源',blocks:[
  {t:'p',x:'当要求测量溯源时，或组织认为测量溯源是信任测量结果有效的基础时，测量设备应：'},
  {t:'ul',items:[
    'a）对照能溯源到国际或国家标准的测量标准，按照规定的时间间隔或在使用前进行校准和（或）检定，当不存在上述标准时，应保留作为校准或验证依据的成文信息；',
    'b）予以标识，以确定其状态；',
    'c）予以保护，防止由于调整、损坏或衰减所导致的校准状态和随后的测量结果的失效。',
  ]},
  {t:'p',x:'当发现测量设备不符合预期用途时，组织应确定以往测量结果的有效性是否受到不利影响，必要时应采取适当的措施。'},
]},
{id:'7.1.6',num:'7.1.6',title:'组织的知识',blocks:[
  {t:'p',x:'组织应确定必要的知识，以运行过程，并获得合格产品和服务。'},
  {t:'p',x:'这些知识应予以保持，并能在所需的范围内得到。'},
  {t:'p',x:'为应对不断变化的需求和发展趋势，组织应审视现有的知识，确定如何获取或接触更多必要的知识和知识更新。'},
  {t:'note',x:'注 1：组织的知识是组织特有的知识，通常从其经验中获得，是以实现组织目标所使用和共享的信息。'},
  {t:'note',x:'注 2：组织的知识可以基于：'},
  {t:'ul',items:[
    'a）内部来源（例知识产权；从经验获得的知识；从失败和成功项目吸取的经验教训；获取和分享未成文的知识和经验，过程、产品和服务的改进结果）；',
    'b）外部来源（例如标准；学术交流；专业会议；从顾客或外部供方收集的知识）。',
  ]},
]},
{id:'7.2',num:'7.2',title:'能力',blocks:[
  {t:'p',x:'组织应：'},
  {t:'ul',items:[
    'a）确定其控制下工作的人员所需具备的能力，这些人员从事的工作影响质量管理体系绩效和有效性；',
    'b）基于适当的教育、培训或经验，确保这些人员是胜任的；',
    'c）适用时，采取措施以获得所需的能力，并评价措施的有效性；',
    'd）保留适当的成文信息，作为人员能力的证据。',
  ]},
  {t:'note',x:'注：适当措施可包括对在职人员进行培训、辅导或重新分配工作，或者聘用、外包胜任的人员。'},
]},
{id:'7.3',num:'7.3',title:'意识',blocks:[
  {t:'p',x:'组织应确保在其控制下工作人员知晓：'},
  {t:'ul',items:[
    'a）质量方针；',
    'b）相关的质量目标；',
    'c）他们对质量管理体系有效性的贡献，包括改进质量绩效的益处；',
    'd）不符合质量管理体系要求的后果。',
  ]},
]},
{id:'7.4',num:'7.4',title:'沟通',blocks:[
  {t:'p',x:'组织应确定与质量管理体系相关的内部和外部沟通，包括：'},
  {t:'ul',items:[
    'a）沟通什么；',
    'b）何时沟通；',
    'c）与谁沟通；',
    'd）如何沟通；',
    'e）由谁沟通。',
  ]},
]},
{id:'7.5',num:'7.5',title:'成文信息',blocks:[]},
{id:'7.5.1',num:'7.5.1',title:'总则',blocks:[
  {t:'p',x:'组织的质量管理体系应包括：'},
  {t:'ul',items:[
    'a）本标准要求的成文信息；',
    'b）组织确定的为确保质量管理体系有效性所需的成文信息。',
  ]},
  {t:'note',x:'注：对于不同组织，质量管理体系成文信息的多少与详略程度可以不同，取决于：'},
  {t:'ul',items:[
    '——组织的规模，以及活动、过程、产品和服务的类型；',
    '——过程及其相互作用的复杂程度；',
    '——人员的能力。',
  ]},
]},
{id:'7.5.2',num:'7.5.2',title:'创建和更新',blocks:[
  {t:'p',x:'在创建和更新成文信息时，组织应确保适当的：'},
  {t:'ul',items:[
    'a）标识和说明（如：标题、日期、作者、索引编号）；',
    'b）形式（如语言、软件版本、图表）和载体（如纸质的、电子的）；',
    'c）评审和批准，以确保适宜性和充分性。',
  ]},
]},
{id:'7.5.3',num:'7.5.3',title:'成文信息的控制',blocks:[]},
{id:'7.5.3.1',num:'7.5.3.1',title:'控制要求',blocks:[
  {t:'p',x:'应控制质量管理体系和本标准所要求的成文信息，以确保：'},
  {t:'ul',items:[
    'a）在需求的场合和时机，均可获得并适用；',
    'b）予以妥善保护（如防止泄密、不当使用或缺失）。',
  ]},
]},
{id:'7.5.3.2',num:'7.5.3.2',title:'控制活动',blocks:[
  {t:'p',x:'为控制成文信息，适用时，组织应进行下列活动：'},
  {t:'ul',items:[
    'a）分发、访问、检索和使用；',
    'b）存储和防护，包括保持可读性；',
    'c）变更控制（如版本控制）；',
    'd）保留和处置。',
  ]},
  {t:'p',x:'对于组织确定的策划和运行质量管理体系所必需的来自外部的成文信息，组织应进行适当识别，并予以控制。'},
  {t:'p',x:'对所保留的、作为符合性证据的成文信息应予以保护，防止非预期的更改。'},
  {t:'note',x:'注：对成文信息的“访问”可能意味着仅允许查阅，或者意味着允许查阅并授权修改。'},
]},

/* ===== 第8章 运行 ===== */
{id:'8',num:'8',title:'运行（Operation）',blocks:[{t:'p',x:'运行章节涵盖了为满足产品和服务提供要求所需的过程策划与控制，包括产品和服务要求的确定、设计和开发、外部供方控制、生产和服务提供以及不合格输出的控制。'}]},
{id:'8.1',num:'8.1',title:'运行策划和控制',blocks:[
  {t:'p',x:'为满足产品和服务提供的要求，并实施第 6 章所确定的措施，组织应通过以下措施对所需的过程（见 4.4）进行策划、实施和控制：'},
  {t:'ul',items:[
    'a）确定产品和服务的要求；',
    'b）建立下列内容的准则：',
    {t:'ul',items:['1）过程；','2）产品和服务的接收。']},
    'c）确定所需的资源以使产品和服务符合要求；',
    'd）按照准则实施过程控制；',
    'e）在必要的范围和程度上，确定并保持、保留成文信息，以：',
    {t:'ul',items:['1）确信过程已经按策划进行；','2）证明产品和服务符合要求。']},
  ]},
  {t:'p',x:'策划的输出应适于组织的运行。'},
  {t:'p',x:'组织应控制策划的变更，评审非预期变更的后果，必要时，采取措施减轻不利影响。'},
  {t:'p',x:'组织应确保外包过程受控（见 8.4）。'},
]},
{id:'8.2',num:'8.2',title:'产品和服务的要求',blocks:[]},
{id:'8.2.1',num:'8.2.1',title:'顾客沟通',blocks:[
  {t:'p',x:'与顾客沟通的内容应包括：'},
  {t:'ul',items:[
    'a）提供有关产品和服务的信息；',
    'b）处理问询、合同或订单，包括更改；',
    'c）获取有关产品和服务的顾客反馈，包括顾客投诉；',
    'd）处置或控制顾客财产；',
    'e）关系重大时，制定应急措施的特定要求。',
  ]},
]},
{id:'8.2.2',num:'8.2.2',title:'与产品和服务要求的确定',blocks:[
  {t:'p',x:'在确定向顾客提供的产品和服务的要求时，组织应确保：'},
  {t:'ul',items:[
    'a）产品和服务的要求得到规定，包括：',
    {t:'ul',items:['1）适用的法律法规要求；','2）组织认为的必要要求。']},
    'b）提供的产品和服务能够满足所声明的要求。',
  ]},
]},
{id:'8.2.3',num:'8.2.3',title:'产品和服务要求的评审',blocks:[]},
{id:'8.2.3.1',num:'8.2.3.1',title:'评审要求',blocks:[
  {t:'p',x:'组织应确保有能力向顾客提供满足要求的产品和服务。在承诺向顾客提供产品和服务之前，组织应对如下各项要求进行评审：'},
  {t:'ul',items:[
    'a）顾客规定的要求，包括对交付及交付后活动的要求；',
    'b）顾客虽然没有明示，但规定的用途或已知的预期用途所必需的要求；',
    'c）组织规定的要求；',
    'd）适用于产品和服务的法律法规要求；',
    'e）与以前表述不一致的合同或订单要求。',
  ]},
  {t:'p',x:'组织应确保与以前规定不一致的合同或订单要求已得到解决。'},
  {t:'p',x:'若顾客没有提供成文的要求，组织在接受顾客要求前应对顾客要求进行确认。'},
  {t:'note',x:'注：在某些情况下，如网上销售，对每一个订单进行正式的评审可能是不实际的，作为替代方法，可评审有关的产品信息，如产品目录。'},
]},
{id:'8.2.3.2',num:'8.2.3.2',title:'成文信息',blocks:[
  {t:'p',x:'适用时，组织应保留与下列方面有关的成文信息：'},
  {t:'ul',items:['a）评审结果；','b）产品和服务的新要求。']},
]},
{id:'8.2.4',num:'8.2.4',title:'产品和服务要求的更改',blocks:[
  {t:'p',x:'若产品和服务要求发生更改，组织应确保相关的成文信息得到修改，并确保相关人员知道已更改的要求。'},
]},
{id:'8.3',num:'8.3',title:'产品和服务的设计和开发',blocks:[]},
{id:'8.3.1',num:'8.3.1',title:'总则',blocks:[
  {t:'p',x:'组织应建立、实施和保持适当的设计和开发过程，以确保后续的产品和服务的提供。'},
]},
{id:'8.3.2',num:'8.3.2',title:'设计和开发策划',blocks:[
  {t:'p',x:'在确定设计和开发的各个阶段和控制时，组织应考虑：'},
  {t:'ul',items:[
    'a）设计和开发活动的性质、持续时间和复杂程度；',
    'b）所需的过程阶段，包括适用的设计和开发评审；',
    'c）所需的设计和开发验证及确认活动；',
    'd）设计和开发过程涉及的职责和权限；',
    'e）产品和服务的设计和开发所需的内部和外部资源；',
    'f）设计和开发过程参与人员之间接口的控制需求；',
    'g）顾客和使用者参与设计和开发过程的需求；',
    'h）对后续产品和服务提供的要求；',
    'i）顾客和其他相关方期望的设计和开发过程的控制水平；',
    'j）证实已经满足设计和开发要求所需的成文信息。',
  ]},
]},
{id:'8.3.3',num:'8.3.3',title:'设计和开发输入',blocks:[
  {t:'p',x:'组织应针对所设计和开发的具体类型的产品和服务，确定必需的要求。要求应考虑：'},
  {t:'ul',items:[
    'a）功能和性能要求；',
    'b）来源于以前类似设计和开发活动的信息；',
    'c）法律法规要求；',
    'd）组织承诺实施的标准或行业规范；',
    'e）由产品和服务性质所导致的潜在失效后果。',
  ]},
  {t:'p',x:'针对设计和开发的目的，输入应是充分和适宜的，且应完整、清楚。'},
  {t:'p',x:'相互矛盾的设计和开发输入应得到解决。'},
  {t:'p',x:'组织应保留有关设计和开发输入的成文信息。'},
]},
{id:'8.3.4',num:'8.3.4',title:'设计和开发控制',blocks:[
  {t:'p',x:'组织应对设计和开发过程进行控制，以确保：'},
  {t:'ul',items:[
    'a）规定拟获得的结果；',
    'b）实施评审活动，以评价设计和开发的结果满足要求的能力；',
    'c）实施验证活动，以确保设计和开发输出满足输入的要求；',
    'd）实施确认活动，以确保产品和服务能够满足规定的使用要求或预期用途；',
    'e）针对评审、验证和确认过程中确定的问题采取必要措施；',
    'f）保留这些活动的成文信息。',
  ]},
  {t:'note',x:'注：设计和开发的评审、验证和确认具有不同目的。根据组织的产品和服务的具体情况，可单独或以任意组合的方式进行。'},
]},
{id:'8.3.5',num:'8.3.5',title:'设计和开发输出',blocks:[
  {t:'p',x:'组织应确保设计和开发输出：'},
  {t:'ul',items:[
    'a）满足输入的要求；',
    'b）满足后续产品和服务提供过程的需要；',
    'c）包括或引用监视和测量的要求，适当时，包括接收准则；',
    'd）规定产品和服务特性，这些特性对于预期目的、安全和正常提供是必需的。',
  ]},
  {t:'p',x:'组织应保留有关设计和开发输出的成文信息。'},
]},
{id:'8.3.6',num:'8.3.6',title:'设计和开发更改',blocks:[
  {t:'p',x:'组织应对产品和服务设计和开发期间以及后续所做的更改进行适当的识别、评审和控制，以确保这些更改对满足要求不会产生不利影响。'},
  {t:'p',x:'组织应保留下列方面的成文信息：'},
  {t:'ul',items:[
    'a）设计和开发更改；',
    'b）评审的结果；',
    'c）更改的授权；',
    'd）为防止不利影响而采取的措施。',
  ]},
]},
{id:'8.4',num:'8.4',title:'外部提供过程、产品和服务的控制',blocks:[]},
{id:'8.4.1',num:'8.4.1',title:'总则',blocks:[
  {t:'p',x:'组织应确保外部提供的过程、产品和服务符合要求。'},
  {t:'p',x:'在下列情况下，组织应确定对外部提供的过程、产品和服务实施的控制：'},
  {t:'ul',items:[
    'a）外部供方的产品和服务将构成组织自身的产品和服务的一部分；',
    'b）外部供方代表组织直接将产品和服务提供给顾客；',
    'c）组织决定由外部供方提供过程或部分过程。',
  ]},
  {t:'p',x:'组织应基于外部供方按照要求提供过程、产品或服务的能力，确定并实施外部供方的评价、选择、绩效监视以及再评价的准则。对于这些活动和由评价引发的任何必要的措施，组织应保留成文信息。'},
]},
{id:'8.4.2',num:'8.4.2',title:'控制类型和程度',blocks:[
  {t:'p',x:'组织应确保外部提供的过程、产品和服务不会对组织稳定地向顾客交付合格产品和服务的能力产生不利影响。'},
  {t:'p',x:'组织应：'},
  {t:'ul',items:[
    'a）确保外部提供的过程保持在其质量管理体系的控制之中；',
    'b）规定对外部供方的控制及其输出结果的控制；',
    'c）考虑：',
    {t:'ul',items:[
      '1）外部提供的过程、产品和服务对组织稳定地满足顾客要求和适用的法律法规要求的能力的潜在影响；',
      '2）外部供方实施控制的有效性。',
    ]},
    'd）确定必要的验证或其他活动，以确保外部提供的过程、产品和服务满足要求。',
  ]},
]},
{id:'8.4.3',num:'8.4.3',title:'提供给外部供方的信息',blocks:[
  {t:'p',x:'组织应确保在与外部供方沟通之前所确定的要求是充分和适宜的。'},
  {t:'p',x:'组织应与外部供方沟通以下要求：'},
  {t:'ul',items:[
    'a）需提供的过程、产品和服务；',
    'b）对下列内容的批准：',
    {t:'ul',items:['1）产品和服务；','2）方法、过程和设备；','3）产品和服务的放行。']},
    'c）能力，包括所要求的人员资格；',
    'd）外部供方与组织的互动；',
    'e）组织使用的对外部供方绩效的控制和监视；',
    'f）组织或其顾客拟在外部供方现场实施的验证或确认活动。',
  ]},
]},
{id:'8.5',num:'8.5',title:'生产和服务提供',blocks:[]},
{id:'8.5.1',num:'8.5.1',title:'生产和服务提供的控制',blocks:[
  {t:'p',x:'组织应在受控条件下进行生产和服务提供。'},
  {t:'p',x:'适用时，受控条件应包括：'},
  {t:'ul',items:[
    'a）可获得成文信息，以规定以下内容：',
    {t:'ul',items:['1）拟生产的产品、提供的服务或进行的活动的特征；','2）拟获得的结果。']},
    'b）可获得和使用适宜的监视和测量资源；',
    'c）在适当阶段实施监视和测量活动，以验证是否符合过程或输出的控制准则以及产品和服务的接收准则；',
    'd）为过程的运行使用适宜的基础设施，并保持适宜的环境；',
    'e）配备胜任的人员，包括所要求的资格；',
    'f）若输出结果不能由后续的监视或测量加以验证，应对生产和服务提供过程实现策划结果的能力进行确认，并定期再确认；',
    'g）采取措施防止人为错误；',
    'h）实施放行、交付和交付后活动。',
  ]},
]},
{id:'8.5.2',num:'8.5.2',title:'标识和可追溯性',blocks:[
  {t:'p',x:'需要时，组织应采用适当的方法识别输出，以确保产品和服务合格。'},
  {t:'p',x:'组织应在生产和服务提供的整个过程中按照监视和测量要求识别输出状态。'},
  {t:'p',x:'当有可追溯要求时，组织应控制输出的唯一性标识，并应保留所需的成文信息以实现可追溯。'},
]},
{id:'8.5.3',num:'8.5.3',title:'顾客或外部供方的财产',blocks:[
  {t:'p',x:'组织应爱护在组织控制下或组织使用的顾客或外部供方的财产。'},
  {t:'p',x:'对组织使用的或构成产品和服务一部分的顾客和外部供方财产，组织应予以识别、验证、保护和防护。'},
  {t:'p',x:'若顾客或外部供方的财产发生丢失、损坏或发现不适用情况，组织应向顾客或外部供方报告，并保留所发生情况的成文信息。'},
  {t:'note',x:'注：顾客或外部供方的财产可能包括材料、零部件、工具和设备，顾客的场所，知识产权和个人资料。'},
]},
{id:'8.5.4',num:'8.5.4',title:'防护',blocks:[
  {t:'p',x:'组织应在生产和服务提供期间对输出进行必要的防护，以确保符合要求。'},
  {t:'note',x:'注：防护可包括标识、处置、污染控制、包装、储存、传输或运输以及保护。'},
]},
{id:'8.5.5',num:'8.5.5',title:'交付后的活动',blocks:[
  {t:'p',x:'组织应满足与产品和服务相关的交付后活动的要求。'},
  {t:'p',x:'在确定所要求的交付后活动的覆盖范围和程度时，组织应考虑：'},
  {t:'ul',items:[
    'a）法律法规要求；',
    'b）与产品和服务相关的潜在不良的后果；',
    'c）产品和服务的性质、使用和预期寿命；',
    'd）顾客要求；',
    'e）顾客反馈。',
  ]},
  {t:'note',x:'注：交付后活动可包括保证条款所规定的措施、合同义务（如维护服务等）、附加服务（如回收或最终处置等）。'},
]},
{id:'8.5.6',num:'8.5.6',title:'更改控制',blocks:[
  {t:'p',x:'组织应对生产或服务提供的更改进行必要的评审和控制，以确保持续地符合要求。'},
  {t:'p',x:'组织应保留成文信息，包括有关更改评审的结果、授权进行更改的人员以及根据评审所采取的必要措施。'},
]},
{id:'8.6',num:'8.6',title:'产品和服务的放行',blocks:[
  {t:'p',x:'组织应在适当阶段实施策划的安排，以验证产品和服务的要求已得到满足。'},
  {t:'p',x:'除非得到有关授权人员的批准，适用时得到顾客的批准，否则在策划的安排已圆满完成之前，不应向顾客放行产品和交付服务。'},
  {t:'p',x:'组织应保留有关产品和服务放行的成文信息。成文信息应包括：'},
  {t:'ul',items:[
    'a）符合接收准则的证据；',
    'b）可追溯到授权放行人员的信息。',
  ]},
]},
{id:'8.7',num:'8.7',title:'不合格输出的控制',blocks:[]},
{id:'8.7.1',num:'8.7.1',title:'控制要求',blocks:[
  {t:'p',x:'组织应确保对不符合要求的输出进行识别和控制，以防止非预期的使用或交付。'},
  {t:'p',x:'组织应根据不合格的性质及其对产品和服务符合性的影响采取适当措施。这也适用于在产品交付之后，以及在服务提供期间或之后发现的不合格产品和服务。'},
  {t:'p',x:'组织应通过下列一种或几种途径处置不合格输出：'},
  {t:'ul',items:[
    'a）纠正；',
    'b）隔离、限制、退货或暂停对产品和服务的提供；',
    'c）告知顾客；',
    'd）获得让步接收的授权。',
  ]},
  {t:'p',x:'对不合格输出进行纠正之后应验证其是否符合要求。'},
]},
{id:'8.7.2',num:'8.7.2',title:'成文信息',blocks:[
  {t:'p',x:'组织应保留下列成文信息：'},
  {t:'ul',items:[
    'a）描述不合格；',
    'b）描述所采取的措施；',
    'c）描述获得的让步；',
    'd）识别处置不合格的授权。',
  ]},
]},

/* ===== 第9章 绩效评价 ===== */
{id:'9',num:'9',title:'绩效评价（Performance evaluation）',blocks:[{t:'p',x:'绩效评价章节规定了监视、测量、分析和评价，内部审核，以及管理评审的要求。'}]},
{id:'9.1',num:'9.1',title:'监视、测量、分析和评价',blocks:[]},
{id:'9.1.1',num:'9.1.1',title:'总则',blocks:[
  {t:'p',x:'组织应确定：'},
  {t:'ul',items:[
    'a）需要监视和测量什么；',
    'b）需要用什么方法进行监视、测量、分析和评价，以确保结果有效；',
    'c）何时实施监视和测量；',
    'd）何时对监视和测量的结果进行分析和评价。',
  ]},
  {t:'p',x:'组织应评价质量管理体系的绩效和有效性。'},
  {t:'p',x:'组织应保留适当的成文信息，以作为结果的证据。'},
]},
{id:'9.1.2',num:'9.1.2',title:'顾客满意',blocks:[
  {t:'p',x:'组织应监视顾客对其需求和期望已得到满足的程度的感受。组织应确定获取、监视和评审该信息的方法。'},
  {t:'note',x:'注：监视顾客感受的例子可包括顾客调查、顾客对交付产品或服务的反馈、顾客座谈、市场占有率分析、顾客赞扬、担保索赔和经销商报告。'},
]},
{id:'9.1.3',num:'9.1.3',title:'分析与评价',blocks:[
  {t:'p',x:'组织应分析和评价通过监视和测量获得的适当的数据和信息。'},
  {t:'p',x:'应利用分析结果评价：'},
  {t:'ul',items:[
    'a）产品和服务的符合性；',
    'b）顾客满意程度；',
    'c）质量管理体系的绩效和有效性；',
    'd）策划是否得到有效实施；',
    'e）应对风险和机遇所采取措施的有效性；',
    'f）外部供方的绩效；',
    'g）质量管理体系改进的需求。',
  ]},
  {t:'note',x:'注：数据分析方法可包括统计技术。'},
]},
{id:'9.2',num:'9.2',title:'内部审核',blocks:[
  {t:'p',x:'组织应按照策划的时间间隔进行内部审核，以提供有关质量管理体系的下列信息：'},
  {t:'ul',items:[
    'a）是否符合：',
    {t:'ul',items:['1）组织自身的质量管理体系要求；','2）本标准的要求。']},
    'b）是否得到有效的实施和保持。',
  ]},
]},
{id:'9.2.2',num:'9.2.2',title:'审核方案',blocks:[
  {t:'p',x:'组织应：'},
  {t:'ul',items:[
    'a）依据有关过程的重要性、对组织产生影响的变化和以往的审核结果，策划、制定、实施和保持审核方案，审核方案包括频次、方法、职责、策划要求和报告；',
    'b）规定每次审核的审核准则和范围；',
    'c）选择审核员并实施审核，以确保审核过程客观公正；',
    'd）确保将审核结果报告给相关管理者；',
    'e）及时采取适当的纠正和纠正措施；',
    'f）保留成文信息，作为实施审核方案以及审核结果的证据。',
  ]},
  {t:'note',x:'注：相关指南参见 GB/T 19011。'},
]},
{id:'9.3',num:'9.3',title:'管理评审',blocks:[]},
{id:'9.3.1',num:'9.3.1',title:'总则',blocks:[
  {t:'p',x:'最高管理者应按照策划的时间间隔对组织的质量管理体系进行评审，以确保其持续的适宜性、充分性和有效性，并与组织的战略方向一致。'},
]},
{id:'9.3.2',num:'9.3.2',title:'管理评审输入',blocks:[
  {t:'p',x:'策划和实施管理评审时应考虑下列内容：'},
  {t:'ul',items:[
    'a）以往管理评审所采取措施的情况；',
    'b）与质量管理体系相关的内外部因素的变化；',
    'c）下列有关质量管理体系绩效和有效性的信息，包括其趋势：',
    {t:'ul',items:[
      '1）顾客满意和有关相关方的反馈；',
      '2）质量目标的实现程度；',
      '3）过程绩效以及产品和服务的合格情况；',
      '4）不合格及纠正措施；',
      '5）监视和测量结果；',
      '6）审核结果；',
      '7）外部供方的绩效。',
    ]},
    'd）资源的充分性；',
    'e）应对风险和机遇所采取措施的有效性（见 6.1）；',
    'f）改进的机会。',
  ]},
]},
{id:'9.3.3',num:'9.3.3',title:'管理评审输出',blocks:[
  {t:'p',x:'管理评审的输出应包括与下列事项相关的决定和措施：'},
  {t:'ul',items:[
    'a）改进的机会；',
    'b）质量管理体系所需的变更；',
    'c）资源需求。',
  ]},
  {t:'p',x:'组织应保留成文信息，作为管理评审结果的证据。'},
]},

/* ===== 第10章 改进 ===== */
{id:'10',num:'10',title:'改进（Improvement）',blocks:[{t:'p',x:'改进章节规定了改进的总则、不合格和纠正措施，以及持续改进的要求。'}]},
{id:'10.1',num:'10.1',title:'总则',blocks:[
  {t:'p',x:'组织应确定和选择改进机会，并采取必要措施，以满足顾客要求和增强顾客满意。'},
  {t:'p',x:'这应包括：'},
  {t:'ul',items:[
    'a）改进产品和服务，以满足要求并应对未来的需求和期望；',
    'b）纠正、预防或减少不利影响；',
    'c）改进质量管理体系的绩效和有效性。',
  ]},
  {t:'note',x:'注：改进的例子可包括纠正、纠正措施、持续改进、突破性变革、创新和重组。'},
]},
{id:'10.2',num:'10.2',title:'不合格和纠正措施',blocks:[]},
{id:'10.2.1',num:'10.2.1',title:'纠正措施',blocks:[
  {t:'p',x:'当出现不合格时，包括来自投诉的不合格，组织应：'},
  {t:'ul',items:[
    'a）对不合格做出应对，并在适用时：',
    {t:'ul',items:['1）采取措施以控制和纠正不合格；','2）处置后果。']},
    'b）通过下列活动，评价是否需要采取措施，以消除产生不合格的原因，避免其再次发生或者在其他场合发生：',
    {t:'ul',items:['1）评审和分析不合格；','2）确定不合格的原因；','3）确定是否存在或可能发生类似的不合格。']},
    'c）实施所需的措施；',
    'd）评审所采取的纠正措施的有效性；',
    'e）需要时，更新策划期间确定的风险和机遇；',
    'f）需要时，变更质量管理体系。',
  ]},
  {t:'p',x:'纠正措施应与不合格所产生的影响相适应。'},
]},
{id:'10.2.2',num:'10.2.2',title:'成文信息',blocks:[
  {t:'p',x:'组织应保留成文信息，作为下列事项的证据：'},
  {t:'ul',items:[
    'a）不合格的性质以及随后所采取的措施；',
    'b）纠正措施的结果。',
  ]},
]},
{id:'10.3',num:'10.3',title:'持续改进',blocks:[
  {t:'p',x:'组织应持续改进质量管理体系的适宜性、充分性和有效性。'},
  {t:'p',x:'组织应考虑分析和评价的结果以及管理评审输出，以确定是否存在需求和机遇，这些需求或机遇应作为持续改进的一部分加以应对。'},
]},

/* ===== 附录A ===== */
{id:'A',num:'附录A',title:'附录A（资料性附录）新结构、术语和概念说明',blocks:[
  {t:'p',x:'本附录为理解本标准相对于 GB/T 19001—2008 在结构、术语和概念上的变化提供说明。'},
]},
{id:'A.1',num:'A.1',title:'结构和术语',blocks:[
  {t:'p',x:'为了更好地与其他管理体系标准保持一致，与此前的版本（GB/T 19001—2008）相比，本版标准的章节结构（即章节顺序）和某些术语发生了变更。'},
  {t:'p',x:'本标准未要求在组织质量管理体系的成文信息中应用本标准的结构和术语。'},
  {t:'p',x:'本标准的结构旨在对相关要求进行连贯表述，而不是作为组织的方针、目标和过程的文件结构范例。'},
  {t:'p',x:'无需在规定质量管理体系要求时以本标准中使用的术语代替组织使用的术语。组织可以选择使用适合其运行的术语（例如：可使用“记录”、“文件”或“协议”，而不是“成文信息”；或者使用“供应商”、“伙伴”或“卖方”，而不是“外部供方”）。本标准与此前版本之间的主要术语差异如表 A.1 所示。'},
  {t:'p',x:'表 A.1 — ISO 9001：2008 和 ISO 9001：2015 之间的主要术语差异：'},
  {t:'ul',items:[
    '产品 → 产品和服务',
    '删减 → 未使用（见 A.5 对适用性的说明）',
    '管理者代表 → 未使用（赋予类似的职责和权限，但不要求委任一名管理者代表）',
    '文件、质量手册、程序文件、记录 → 成文信息',
    '工作环境 → 过程运行环境',
    '监视和测量设备 → 监视和测量资源',
    '采购产品 → 外部提供的产品和服务',
    '供方 → 外部供方',
  ]},
]},
{id:'A.2',num:'A.2',title:'产品和服务',blocks:[
  {t:'p',x:'GB/T 19001—2008 使用的术语“产品”包括所有的输出类别。本版标准则使用“产品和服务”。“产品和服务”包括所有的输出类别（硬件、服务、软件和流程性材料）。'},
  {t:'p',x:'特别包含“服务”旨在强调在某些要求的应用方面，产品和服务之间存在的差异。服务的特征表明至少有一部分输出，是在与顾客接触面上实现的。这意味着在提供服务之前不一定能够确认其是否符合要求。'},
  {t:'p',x:'在大多数情况下，“产品和服务”一起使用。由组织向顾客提供的或外部供方提供的大多数输出包括产品和服务两方面。'},
]},
{id:'A.3',num:'A.3',title:'理解相关方的需求和期望',blocks:[
  {t:'p',x:'4.2 规定的要求包括了组织确定与质量管理体系有关的相关方，并确定来自这些相关方的要求。然而，4.2 并不意味着因质量管理体系要求的扩展而超出了本标准的范围。'},
  {t:'p',x:'本标准未要求组织考虑其确定的与其质量管理体系无关的相关方。有关相关方的某个特定要求是否与其质量管理体系相关，需要由组织自行判断。'},
]},
{id:'A.4',num:'A.4',title:'基于风险的思维',blocks:[
  {t:'p',x:'本标准以前的版本中已经隐含基于风险的思维的概念，如：有关策划、评审和改进的要求。本标准要求组织理解其组织环境（见 4.1），并以确定风险作为策划的基础（见 6.1）。这意味着将基于风险的思维应用于策划和实施质量管理体系过程（见 4.4），并有助于确定成文信息的范围和程度。'},
  {t:'p',x:'质量管理体系的主要用途之一是作为预防工具。因此，本标准并未就“预防措施”安排单独条款或子条款，预防措施概念是通过在质量管理体系要求中融入基于风险的思维来表达的。'},
  {t:'p',x:'由于在本标准中使用基于风险的思维，因而一定程度上减少了规定性要求，并以基于绩效的要求替代。在过程、成文信息和组织职责方面的要求比 GB/T 19001—2008 具有更大的灵活性。'},
  {t:'p',x:'虽然 6.1 规定组织应策划应对风险的措施，但并未要求运用正式的风险管理方法或将风险管理过程形成文件。组织可以决定是否采用超出本标准要求的更多风险管理方法。'},
]},
{id:'A.5',num:'A.5',title:'适用性',blocks:[
  {t:'p',x:'本标准在其要求对组织质量管理体系的适用性方面不使用“删减”一词。然而，组织可根据其规模和复杂程度、所采用的管理模式、活动领域以及所面临风险和机遇的性质，对相关要求的适用性进行评审。'},
  {t:'p',x:'在 4.3 中有关适用性方面的要求，规定了在什么条件下，组织能确定某项要求不适用于其质量管理体系范围内的过程。只有不实施某项要求不会对提供合格的产品和服务造成不利影响，组织才能决定该要求不适用。'},
]},
{id:'A.6',num:'A.6',title:'成文信息',blocks:[
  {t:'p',x:'作为与其他管理体系标准相一致的共同内容，本标准有“成文信息”的条款，内容未做显著变更或增加（见 7.5）。'},
  {t:'p',x:'在 GB/T 19001—2008 中使用的特定术语如“文件”、“形成文件的程序”、“质量手册”或“质量计划”等，在本版标准中表述的要求为“保持成文信息”。'},
  {t:'p',x:'在 GB/T 19001—2008 中使用“记录”这一术语表示提供符合要求的证据所需要的文件，现在表述的要求为“保留成文信息”。组织有责任确定需要保留的成文信息及其存储时间和所用载体。'},
  {t:'p',x:'“保持”成文信息的要求并不排除基于特殊目的，组织也可能需要“保留”同一成文信息，如：保留其先前版本。'},
]},
{id:'A.7',num:'A.7',title:'组织的知识',blocks:[
  {t:'p',x:'本标准在 7.1.6 中要求组织确定并管理其拥有的知识，以确保其过程的运行，并能够提供合格的产品和服务。'},
  {t:'p',x:'引入组织的知识的要求的目的是：'},
  {t:'ul',items:[

/* 全文搜索（在所有条款文本中检索） */
function clauseText(c){
  return c.blocks.map(b=>{
    if(b.t==='ul') return b.items.map(it=>typeof it==='string'?it:(it.items?it.items.join(' '):'')).join(' ');
    return b.x||'';
  }).join(' ');
}
function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- 侧栏导航 ---------- */
function buildNav(filter=''){
  const nav = $('#nav'); nav.innerHTML='';
  GROUPS.forEach(g=>{
    const items = (groupOf[g.key]||[]).filter(c=>{
      if(!filter) return true;
      const f=filter.toLowerCase();
      return c.num.toLowerCase().includes(f)||c.title.toLowerCase().includes(f)||clauseText(c).toLowerCase().includes(f);
    });
    if(!items.length) return;
    const open = filter? true : LS.get('open_'+g.key,true);
    const gp = document.createElement('div'); gp.className='nav-group';
    const badge = {引言:'0','附录A':'A','附录B':'B','参考文献':'R'}[g.key] || g.key;
    const chap = document.createElement('div'); chap.className='nav-chap'+(open?' open':'');
    chap.innerHTML = `<span class="num">${badge}</span>
      <span class="ttl">${g.label}</span><span class="cnt">${items.length}</span><span class="arrow">▶</span>`;
    const box = document.createElement('div'); box.className='nav-items'+(open?' open':'');
    items.forEach(c=>{
      const it = document.createElement('div');
      it.className='nav-item'+(stars.includes(c.id)?' starred':'');
      it.dataset.id=c.id;
      it.innerHTML=`<span class="id">${c.num}</span><span class="it">${c.title}</span>
        <span class="star" data-star="${c.id}" title="收藏">${stars.includes(c.id)?'★':'☆'}</span>`;
      it.addEventListener('click',e=>{
        if(e.target.dataset.star){toggleStar(c.id);return;}
        goto(c.id);
      });
      box.appendChild(it);
    });
    chap.addEventListener('click',()=>{
      const isOpen=box.classList.toggle('open'); chap.classList.toggle('open',isOpen);
      LS.set('open_'+g.key,isOpen);
    });
    gp.appendChild(chap); gp.appendChild(box); nav.appendChild(gp);
  });
}

/* ---------- 渲染条款内容 ---------- */
function renderBlocks(blocks, highlight=''){
  const re = highlight? new RegExp('('+escapeRe(highlight)+')','gi') : null;
  const hl = t=> re? t.replace(re,'<mark>$1</mark>') : escapeHtml(t);
  let html='';
  blocks.forEach(b=>{
    if(b.t==='p'){ html+=`<p>${hl(b.x)}</p>`; }
    else if(b.t==='note'){ html+=`<div class="block"><div class="note">${hl(b.x)}</div></div>`; }
    else if(b.t==='ul'){ html+=renderList(b,hl); }
  });
  return html;
}
function renderList(ul,hl){
  const letter=/^[a-z]\s*[）)、]/i;
  let html='<ul class="l">';
  ul.items.forEach(it=>{
    if(typeof it==='string'){
      const k = it.match(/^([a-z])\s*[）)、]/i)? it.match(/^([a-z])\s*[）)、]/i)[1]+'）'
               : it.match(/^(\d+)\s*[）)、.]/)? it.match(/^(\d+)\s*[）)、.]/)[1]+'）' : '';
      const content = k? it.slice(it.indexOf(k)+k.length).trim() : it;
      html+=`<li data-k="${k||'·'}">${hl(content)}</li>`;
    } else if(it.t==='ul'){
      html+=renderList(it,hl).replace('<ul class="l">','<ul class="l l2">');
    }
  });
  html+='</ul>';
  return html;
}

/* ---------- 跳转 / 显示条款 ---------- */
let currentId=null, currentHl='';
function goto(id, hl=''){
  const c = byId(id); if(!c) return;
  currentId=id; currentHl=hl; LS.set('last',id);
  if(!read.includes(id)){read.push(id);LS.set('read',read);}
  if($('#drawer').dataset.panel==='search') closeDrawer();
  recent = [id, ...recent.filter(r=>r!==id)].slice(0,12); LS.set('recent',recent);
  // 面包屑
  const g = topGroup(c);
  const gLabel = (GROUPS.find(x=>x.key===g)||{}).label||'';
  $('#breadcrumb').innerHTML = `<a onclick="goto('${id}')">知识库</a> <span>›</span> <b>${gLabel}</b> <span>›</span> <b>${c.num} ${c.title}</b>`;
  // 高亮侧栏
  $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  // 内容
  const idx = CLAUSES.findIndex(x=>x.id===id);
  const prev = CLAUSES[idx-1], next = CLAUSES[idx+1];
  const reqCount = (clauseText(c).match(/应/g)||[]).length;
  $('#content').innerHTML = `
    <div class="clause-head">
      <div class="clause-num">${c.num}</div>
      <div class="clause-title"><h1>${c.title}</h1>
        <div class="sub">${gLabel} · 含“应”要求 ${reqCount} 处 · ${read.includes(id)?'已读':'未读'}</div></div>
      <div class="clause-actions">
        <button class="mini-btn" id="copyBtn">📋 复制</button>
        <button class="mini-btn ${stars.includes(id)?'on':''}" id="starBtn">${stars.includes(id)?'★ 已收藏':'☆ 收藏'}</button>
        <button class="mini-btn" id="hlBtn">✨ 高亮要求</button>
      </div>
    </div>
    <div id="clauseBody">${renderBlocks(c.blocks, hl)}</div>
    <div class="pager">
      ${prev?`<a class="prev" onclick="goto('${prev.id}')"><span class="pl">← 上一条</span><span class="pt">${prev.num} ${prev.title}</span></a>`:'<span></span>'}
      ${next?`<a class="next" onclick="goto('${next.id}')"><span class="pl">下一条 →</span><span class="pt">${next.num} ${next.title}</span></a>`:'<span></span>'}
    </div>`;
  // 复制
  $('#copyBtn').addEventListener('click',()=>{
    const txt = `${c.num} ${c.title}\n\n`+clauseText(c);
    navigator.clipboard.writeText(txt).then(()=>toast('已复制到剪贴板'));
  });
  $('#starBtn').addEventListener('click',()=>{toggleStar(id); goto(id,currentHl);});
  $('#hlBtn').addEventListener('click',()=>highlightReq());
  $('#content').scrollTop=0;
  // 移动端自动收起侧栏
  if(window.innerWidth<=900) $('#aside').classList.add('collapsed');
  updateProgress();
}
function highlightReq(){
  const body=$('#clauseBody'); if(!body) return;
  // 切换：若已高亮则清除
  if(body.dataset.hl==='1'){ goto(currentId,currentHl); body.dataset.hl='0'; return; }
  const reg=/((?:组织|最高管理者|质量方针|产品|服务)?应[^，。；、（）()\n]{0,40}?)(?:[，。；、]|$)/g;
  // 简单方案：对所有“应”出现的位置加标
  body.querySelectorAll('p,li,.note').forEach(node=>{
    node.innerHTML = node.innerHTML.replace(/应/g,'<span class="req-em">应</span>');
  });
  body.dataset.hl='1';
  toast('已高亮“应”要求条款');
}

/* ---------- 收藏 ---------- */
function toggleStar(id){
  if(stars.includes(id)) stars=stars.filter(s=>s!==id);
  else stars.push(id);
  LS.set('stars',stars);
  // 更新侧栏星标
  const it=document.querySelector(`.nav-item[data-id="${id}"]`);
  if(it){it.classList.toggle('starred',stars.includes(id));
    const s=it.querySelector('.star'); if(s)s.textContent=stars.includes(id)?'★':'☆';}
  buildNav($('#navFilter').value);
  // 刷新抽屉收藏列表（若打开）
  if($('#drawer').dataset.panel==='star') openStars();
}

/* ---------- 进度 ---------- */
function updateProgress(){
  const pct = Math.round(read.length/CLAUSES.length*100);
  $('#progress').style.width = pct+'%';
  $('#progress').title = `已读 ${read.length}/${CLAUSES.length}`;
}

/* ---------- 抽屉面板 ---------- */
function openDrawer(title,panel,html){
  $('#drawerTitle').textContent=title;
  $('#drawerBody').innerHTML=html;
  $('#drawer').classList.add('open');
  $('#drawer').dataset.panel=panel;
  $('#mask').classList.add('show');
}
function closeDrawer(){$('#drawer').classList.remove('open');$('#mask').classList.remove('show');$('#drawer').dataset.panel='';}
function openStars(){
  let h = stars.length? '' : '<div class="empty">还没有收藏任何条款。<br>点击条款右上角的 ☆ 即可收藏。</div>';
  stars.forEach(id=>{const c=byId(id); if(c) h+=`<div class="result" onclick="goto('${id}')"><div class="rid">${c.num}</div><div class="rt">${c.title}</div></div>`;});
  openDrawer(`⭐ 我的收藏（${stars.length}）`,'star',h);
}
function openGloss(){
  let h='<input id="glSearch" placeholder="搜索术语…" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);margin-bottom:12px;outline:none">';
  GLOSSARY.forEach(([t,d])=>{h+=`<div class="term" data-t="${t}"><b>${t}</b><p>${d}</p></div>`;});
  openDrawer('📖 术语表','gloss',h);
  const gs=$('#glSearch'); if(gs) gs.addEventListener('input',()=>{
    const v=gs.value.toLowerCase();
    $$('#drawerBody .term').forEach(t=>t.style.display = t.dataset.t.toLowerCase().includes(v)?'':'none');
  });
}
function openGraph(){
  let h=`
  <div class="diagram-wrap">
    <h4>📊 PDCA 循环与本标准结构</h4>
    <div class="svg-box">${svgPDCA()}</div>
    <div class="legend">图2：第 4–10 章如何构成 PDCA 循环（括号为对应章节）</div>
  </div>
  <div class="diagram-wrap">
    <h4>🔗 单一过程要素</h4>
    <div class="svg-box">${svgProcess()}</div>
    <div class="legend">图1：每个过程均有输入、活动、输出及监视/测量检查点</div>
  </div>
  <div class="diagram-wrap">
    <h4>🧭 七项质量管理原则</h4>
    <ul class="l">${PRINCIPLES.map(p=>`<li data-k="•"><b>${p[0]}</b>：${p[1]}</li>`).join('')}</ul>
  </div>`;
  openDrawer('🗺️ 结构图谱','graph',h);
}
function openQuiz(){
  let h=`<p style="color:var(--text3);font-size:13px;margin-bottom:12px">共 ${QUIZ.length} 题，点击选项查看答案与解析。</p>`;
  QUIZ.forEach((q,i)=>{
    h+=`<div class="quiz-q" data-i="${i}"><div class="qt">Q${i+1}. ${q.q}</div>`;
    q.o.forEach((o,j)=>{h+=`<label data-j="${j}">${String.fromCharCode(65+j)}. ${o}</label>`;});
    h+=`<div class="exp">✅ 正确答案：${String.fromCharCode(65+q.a)}。${q.exp}</div></div>`;
  });
  openDrawer('🎯 自测练习','quiz',h);
  $$('#drawerBody .quiz-q label').forEach(lab=>{
    lab.addEventListener('click',()=>{
      const qbox=lab.closest('.quiz-q'); const i=+qbox.dataset.i; const j=+lab.dataset.j;
      if(qbox.classList.contains('answered')) return;
      qbox.classList.add('answered');
      qbox.querySelectorAll('label').forEach((L,k)=>{
        if(k===QUIZ[i].a) L.classList.add('ok');
        else if(k===j) L.classList.add('bad');
      });
    });
  });
}
function openStat(){
  const total=CLAUSES.length;
  const reqTotal=CLAUSES.reduce((s,c)=>s+(clauseText(c).match(/应/g)||[]).length,0);
  let chStat='';
  GROUPS.forEach(g=>{const items=groupOf[g.key]||[]; if(!items.length)return;
    const rc=items.filter(c=>read.includes(c.id)).length;
    chStat+=`<div class="stat" style="grid-column:span 1"><div class="n">${rc}/${items.length}</div><div class="l">${g.label.split(' ')[0]}</div></div>`;
  });
  let h=`<div class="stat-grid">
    <div class="stat"><div class="n">${total}</div><div class="l">条款总数</div></div>
    <div class="stat"><div class="n">${read.length}</div><div class="l">已读</div></div>
    <div class="stat"><div class="n">${Math.round(read.length/total*100)}%</div><div class="l">阅读进度</div></div>
    <div class="stat"><div class="n">${stars.length}</div><div class="l">收藏</div></div>
    <div class="stat"><div class="n">${reqTotal}</div><div class="l">“应”要求总数</div></div>
    <div class="stat"><div class="n">7</div><div class="l">质量原则</div></div>
  </div>
  <h4 style="margin:18px 0 10px">各章阅读进度</h4>
  <div class="stat-grid">${chStat}</div>`;
  openDrawer('📊 统计','stat',h);
}

/* ---------- 搜索 ---------- */
function doSearch(q){
  q=q.trim();
  if(!q){ $('#searchCount').textContent=''; $('#searchClear').style.display='none'; goto(currentId||'0.1',currentHl); return; }
  $('#searchClear').style.display='block';
  const results=[];
  CLAUSES.forEach(c=>{
    const t=clauseText(c); const i=t.toLowerCase().indexOf(q.toLowerCase());
    if(i>=0){
      const start=Math.max(0,i-30); const snip=t.slice(start,i+ (t.length>i+30?60:q.length));
      results.push({c, snip});
    }
  });
  $('#searchCount').textContent = results.length? `${results.length} 条` : '无';
  let h='';
  if(!results.length) h='<div class="empty">未找到匹配“'+escapeHtml(q)+'”的条款。</div>';
  results.forEach(({c,snip})=>{
    const reg=new RegExp('('+escapeRe(q)+')','gi');
    const s=escapeHtml(snip).replace(reg,'<mark>$1</mark>');
    h+=`<div class="result" onclick="goto('${c.id}','${escapeHtml(q).replace(/'/g,"\\'")}')">
      <div class="rid">${c.num} · ${c.title}</div>
      <div class="rs">…${s}…</div></div>`;
  });
  // 将搜索结果放入侧栏下方？这里用抽屉展示，避免覆盖正文
  openDrawer('🔍 搜索结果：'+results.length+' 条','search',h);
}

/* ---------- 提示 ---------- */
let toastTimer;
function toast(msg){
  let t=$('#toast'); if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:10px;z-index:200;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.25s';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity='0',1600);
}

/* ---------- 主题 / 字号 ---------- */
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);}
function applyFont(){document.body.style.fontSize=fontSize+'px';}

/* ---------- 初始化 ---------- */
function init(){
  applyTheme(); applyFont(); updateProgress(); buildNav();
  goto(LS.get('last','0.1'));
  // 顶栏按钮
  $('#btnNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#toggleNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#collapseNav').addEventListener('click',()=>$('#aside').classList.add('collapsed'));
  $('#btnStar').addEventListener('click',openStars);
  $('#btnGloss').addEventListener('click',openGloss);
  $('#btnGraph').addEventListener('click',openGraph);
  $('#btnQuiz').addEventListener('click',openQuiz);
  $('#btnStat').addEventListener('click',openStat);
  $('#drawerClose').addEventListener('click',closeDrawer);
  $('#mask').addEventListener('click',closeDrawer);
  $('#btnTheme').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';LS.set('theme',theme);applyTheme();toast('主题：'+(theme==='dark'?'深色':'浅色'));});
  $('#btnFontU').addEventListener('click',()=>{fontSize=Math.min(24,fontSize+1);LS.set('font',fontSize);applyFont();});
  $('#btnFontD').addEventListener('click',()=>{fontSize=Math.max(12,fontSize-1);LS.set('font',fontSize);applyFont();});
  $('#btnPrint').addEventListener('click',()=>window.print());
  $('#navFilter').addEventListener('input',e=>buildNav(e.target.value));
  // 搜索
  const sb=$('#search');
  sb.addEventListener('input',e=>{ const v=e.target.value; if(!v){$('#searchCount').textContent='';$('#searchClear').style.display='none';return;} doSearch(v); });
  sb.addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(sb.value); });
  $('#searchClear').addEventListener('click',()=>{sb.value='';$('#searchCount').textContent='';$('#searchClear').style.display='none';closeDrawer();goto(currentId,currentHl);});
  // 键盘快捷键
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    const idx=CLAUSES.findIndex(x=>x.id===currentId);
    if(e.key==='ArrowRight'&&idx<CLAUSES.length-1) goto(CLAUSES[idx+1].id);
    if(e.key==='ArrowLeft'&&idx>0) goto(CLAUSES[idx-1].id);
    if(e.key==='/'&&!e.ctrlKey){e.preventDefault();sb.focus();}
    if(e.key==='Escape') closeDrawer();
  });
  // 关闭抽屉时若处于搜索态则不清空，仅隐藏
}
init();
</script>
