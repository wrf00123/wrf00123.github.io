<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子签名生成器 · 20款差异化字体</title>

    <!-- 预连接 Google Fonts，加载失败不影响系统字体使用 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-secondary: #6b5e4a;
            --border: #e0d8cc;
            --accent: #5b4636;
            --accent-light: #8b7355;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, #faf7f3 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, #f0ebe0 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #f8f4ed 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 32px 32px 28px;
            position: relative;
            overflow: hidden;
        }

        .main-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #c9a96e, #b8956a, #a07848, #b8956a, #c9a96e);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .header .icon {
            font-size: 40px;
            margin-bottom: 6px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            color: #3d2e1c;
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 400;
        }

        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #4a3d2f;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .name-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            font-size: 1.05rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: #fefdfb;
            color: var(--text);
            transition: var(--transition);
            outline: none;
        }
        .name-input:focus {
            border-color: #b8956a;
            box-shadow: 0 0 0 4px rgba(184,149,106,0.1);
            background: #fff;
        }
        .btn-clear {
            padding: 12px 16px;
            font-size: 0.9rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: #fefdfb;
            cursor: pointer;
            color: #8c7b65;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-clear:hover {
            background: #f5f0e8;
            border-color: #c4b49e;
            color: #5b4636;
        }

        .section-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #4a3d2f;
        }

        .font-type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .font-type-btn {
            padding: 8px 18px;
            border: 2px solid var(--border);
            border-radius: 24px;
            background: #fefdfb;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: #5b4636;
            transition: var(--transition);
        }
        .font-type-btn.active {
            background: #b8956a;
            color: #fff;
            border-color: #b8956a;
        }
        .font-type-btn:hover:not(.active) {
            background: #f5f0e8;
            border-color: #c9a96e;
        }

        .font-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px;
            margin-bottom: 18px;
            max-height: 260px;
            overflow-y: auto;
            padding: 2px;
        }
        .font-card {
            padding: 10px 6px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            background: #fefdfb;
            user-select: none;
            position: relative;
        }
        .font-card:hover {
            border-color: #c9a96e;
            background: #fdfaf5;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .font-card:active { transform: scale(0.96); }
        .font-card.active {
            border-color: #b8956a;
            background: #fdf7ef;
            box-shadow: 0 0 0 4px rgba(184,149,106,0.12);
        }
        .font-card .font-preview {
            font-size: 1.2rem;
            line-height: 1.3;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .font-card .font-name-tag {
            font-size: 0.65rem;
            color: #8c7b65;
            margin-top: 3px;
            display: block;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        }

        .color-section { margin-bottom: 14px; }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .preset-colors {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }
        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.active {
            border-color: #3d2e1c;
            box-shadow: 0 0 0 5px rgba(61,46,28,0.15);
            transform: scale(1.1);
        }
        .color-dot.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }
        .color-dot.light-color.active::after {
            color: #333;
            text-shadow: 0 1px 2px rgba(255,255,255,0.6);
        }
        .custom-color-input {
            width: 34px;
            height: 30px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            padding: 2px;
            background: #fff;
        }

        .size-section { margin-bottom: 16px; }
        .size-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .size-slider {
            flex: 1;
            min-width: 140px;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: #e0d8cc;
            outline: none;
        }
        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #b8956a;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: var(--shadow-sm);
        }
        .size-value {
            font-weight: 600;
            font-size: 0.85rem;
            color: #5b4636;
            min-width: 40px;
            text-align: center;
        }

        .preview-paper {
            background: #fefdfb;
            border: 2px solid #e8e0d4;
            border-radius: var(--radius);
            padding: 20px 16px 26px;
            position: relative;
            text-align: center;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.03);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }
        .preview-paper::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(180,160,130,0.03) 1px, rgba(180,160,130,0.03) 2px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(175,155,125,0.02) 3px, rgba(175,155,125,0.02) 4px);
            pointer-events: none;
            z-index: 1;
        }
        .preview-paper::after {
            content: '';
            position: absolute;
            bottom: 26px;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4c8b0 15%, #d4c8b0 85%, transparent);
            pointer-events: none;
            z-index: 1;
        }
        .preview-canvas {
            position: relative;
            z-index: 2;
            max-width: 100%;
            height: auto;
            display: block;
        }
        .preview-placeholder {
            position: relative;
            z-index: 2;
            color: #c4b9a8;
            font-size: 1.1rem;
            font-style: italic;
            pointer-events: none;
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 13px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-primary {
            flex: 1;
            min-width: 160px;
            background: linear-gradient(135deg, #5b4636 0%, #4a3528 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(75,50,30,0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #6b5543 0%, #5a4030 100%);
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            background: #c4b9a8;
            box-shadow: none;
            cursor: not-allowed;
            color: #e8e0d4;
        }
        .btn-secondary {
            background: #fefdfb;
            color: #5b4636;
            border: 2px solid #d4c8b0;
        }
        .btn-secondary:hover {
            background: #f5f0e8;
            border-color: #b8956a;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #3d2e1c;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 500;
            z-index: 999;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { background: #2e5d3a; }

        @media (max-width: 600px) {
            .main-container { padding: 20px 14px 18px; }
            .font-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <span class="icon">✍️</span>
            <h1>电子签名生成器</h1>
            <p class="subtitle">20种差异化字体 · 风格跨度拉满 · 免费可商用</p>
        </div>

        <div class="input-group">
            <label for="nameInput">👤 输入您的名字</label>
            <div class="input-row">
                <input type="text" id="nameInput" class="name-input" placeholder="如：张三 或 John" autocomplete="off" maxlength="30" />
                <button class="btn-clear" id="btnClear">✕ 清空</button>
            </div>
        </div>

        <div class="section-label">🖋️ 选择签名字体</div>
        <div class="font-type-tabs">
            <button class="font-type-btn active" data-type="chinese">中文字体</button>
            <button class="font-type-btn" data-type="english">英文字体</button>
        </div>
        <div class="font-grid" id="fontGrid"></div>

        <div class="color-section">
            <div class="section-label">🎨 签名颜色</div>
            <div class="color-row">
                <div class="preset-colors" id="presetColors"></div>
                <input type="color" id="customColor" class="custom-color-input" value="#1a1a1a" title="自定义颜色" />
            </div>
        </div>

        <div class="size-section">
            <div class="section-label">📏 签名大小</div>
            <div class="size-row">
                <span style="font-size:0.8rem;color:#8c7b65;">小</span>
                <input type="range" id="sizeSlider" class="size-slider" min="55" max="150" value="95" step="5" />
                <span style="font-size:0.8rem;color:#8c7b65;">大</span>
                <span class="size-value" id="sizeValue">95</span>
            </div>
        </div>

        <div class="section-label">👁️ 实时预览</div>
        <div class="preview-paper" id="previewPaper">
            <canvas id="previewCanvas" class="preview-canvas"></canvas>
            <span class="preview-placeholder" id="previewPlaceholder">在此处预览您的签名</span>
        </div>

        <div class="button-row">
            <button class="btn btn-primary" id="btnExport" disabled>
                <span class="btn-icon">📥</span> 导出签名图片 (PNG)
            </button>
            <button class="btn btn-secondary" id="btnReset">
                <span class="btn-icon">🔄</span> 重置
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ==================== DOM 元素 ====================
            const nameInput = document.getElementById('nameInput');
            const btnClear = document.getElementById('btnClear');
            const fontGrid = document.getElementById('fontGrid');
            const fontTypeButtons = document.querySelectorAll('.font-type-btn');
            const presetColorsContainer = document.getElementById('presetColors');
            const customColorInput = document.getElementById('customColor');
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeValue = document.getElementById('sizeValue');
            const previewPaper = document.getElementById('previewPaper');
            const previewCanvas = document.getElementById('previewCanvas');
            const previewPlaceholder = document.getElementById('previewPlaceholder');
            const btnExport = document.getElementById('btnExport');
            const btnReset = document.getElementById('btnReset');
            const toast = document.getElementById('toast');

            // ==================== 字体配置（20种，风格差异极大） ====================
            // 中文字体（10种，覆盖草书、行楷、隶书、楷书、艺术字、可爱体、宋体、黑体）
            const chineseFonts = [
                { id: 'cao-shu-kuang', label: '狂野狂草', fontFamily: '"Zhi Mang Xing", "STXingkai", "华文行楷", cursive', preview: '签名', googleFamily: 'Zhi Mang Xing' },
                { id: 'mao-bi-cao', label: '毛笔草书', fontFamily: '"Liu Jian Mao Cao", "STXingkai", "华文行楷", cursive', preview: '签名', googleFamily: 'Liu Jian Mao Cao' },
                { id: 'xing-kai', label: '端正行楷', fontFamily: '"STXingkai", "华文行楷", "KaiTi", serif', preview: '签名' },
                { id: 'li-shu', label: '古朴隶书', fontFamily: '"STLiti", "华文隶书", "SimLi", serif', preview: '签名' },
                { id: 'kai-ti', label: '工整楷书', fontFamily: '"KaiTi", "楷体", "华文楷体", serif', preview: '签名' },
                { id: 'hu-po', label: '粗体艺术', fontFamily: '"STHupo", "华文琥珀", "SimHei", sans-serif', preview: '签名' },
                { id: 'cai-yun', label: '镂空艺术', fontFamily: '"STCaiyun", "华文彩云", "SimHei", sans-serif', preview: '签名' },
                { id: 'you-yuan', label: '圆润可爱', fontFamily: '"YouYuan", "幼圆", "Microsoft YaHei", sans-serif', preview: '签名' },
                { id: 'song-ti', label: '复古宋体', fontFamily: '"SimSun", "宋体", serif', preview: '签名' },
                { id: 'hei-ti', label: '现代黑体', fontFamily: '"Microsoft YaHei", "微软雅黑", "PingFang SC", sans-serif', preview: '签名' },
            ];

            // 英文字体（10种，覆盖花体、手写、卡通、打字机、黑体、衬线等）
            const englishFonts = [
                { id: 'great-vibes', label: '华丽花体', fontFamily: '"Great Vibes", "Brush Script MT", cursive', preview: 'John', googleFamily: 'Great Vibes' },
                { id: 'dancing-script', label: '优雅花体', fontFamily: '"Dancing Script", "Brush Script MT", cursive', preview: 'John', googleFamily: 'Dancing Script' },
                { id: 'caveat', label: '随性手写', fontFamily: '"Caveat", "Comic Sans MS", cursive', preview: 'John', googleFamily: 'Caveat' },
                { id: 'pacifico', label: '流畅连笔', fontFamily: '"Pacifico", "Brush Script MT", cursive', preview: 'John', googleFamily: 'Pacifico' },
                { id: 'satisfy', label: '粗犷手写', fontFamily: '"Satisfy", "Comic Sans MS", cursive', preview: 'John', googleFamily: 'Satisfy' },
                { id: 'comic-sans', label: '卡通手绘', fontFamily: '"Comic Sans MS", cursive', preview: 'John' },
                { id: 'courier', label: '复古打字机', fontFamily: '"Courier New", monospace', preview: 'John' },
                { id: 'impact', label: '粗犷黑体', fontFamily: '"Impact", sans-serif', preview: 'John' },
                { id: 'times', label: '复古衬线', fontFamily: '"Times New Roman", serif', preview: 'John' },
                { id: 'arial', label: '现代无衬线', fontFamily: '"Arial", sans-serif', preview: 'John' },
            ];

            const presetColors = [
                { color: '#1a1a1a', label: '经典黑' },
                { color: '#1a237e', label: '深蓝' },
                { color: '#8b0000', label: '暗红' },
                { color: '#1b3a1b', label: '墨绿' },
                { color: '#3e1f47', label: '深紫' },
                { color: '#4a3520', label: '棕色' },
                { color: '#003d5c', label: '藏青' },
                { color: '#5d1a3d', label: '酒红' },
            ];

            // ==================== 状态 ====================
            const state = {
                name: '',
                fontType: 'chinese',
                fontId: 'cao-shu-kuang',
                color: '#1a1a1a',
                fontSize: 95,
            };

            const loadedFonts = new Set();

            function getCurrentFont() {
                const list = state.fontType === 'chinese' ? chineseFonts : englishFonts;
                return list.find(f => f.id === state.fontId) || list[0];
            }

            // ==================== Toast ====================
            let toastTimer;
            function showToast(msg, type = '') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + type;
                toast.offsetHeight;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimer = null;
                }, 2200);
            }

            // ==================== 按需加载 Google Font ====================
            function loadGoogleFont(family) {
                if (loadedFonts.has(family)) return;
                loadedFonts.add(family);
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${family.replace(/ /g, '+')}&display=swap`;
                link.onload = () => renderPreview();
                link.onerror = () => console.warn(`字体 ${family} 加载失败，已自动使用系统兜底字体`);
                document.head.appendChild(link);
            }

            function loadFontById(fontId) {
                const all = [...chineseFonts, ...englishFonts];
                const cfg = all.find(f => f.id === fontId);
                if (cfg && cfg.googleFamily) loadGoogleFont(cfg.googleFamily);
            }

            // ==================== Canvas 渲染 ====================
            function getDPR() { return Math.min(devicePixelRatio || 1, 3); }

            let renderPending = false;
            function requestRender() {
                if (renderPending) return;
                renderPending = true;
                requestAnimationFrame(() => {
                    renderPending = false;
                    renderImmediately();
                });
            }

            function renderPreview() { requestRender(); }

            function renderImmediately() {
                const dpr = getDPR();
                const rect = previewPaper.getBoundingClientRect();
                const maxWidth = Math.min(rect.width - 28, 540);
                const cssH = 110;
                previewCanvas.style.width = maxWidth + 'px';
                previewCanvas.style.height = cssH + 'px';

                const w = Math.floor(maxWidth * dpr);
                const h = Math.floor(cssH * dpr);
                previewCanvas.width = w;
                previewCanvas.height = h;
                const ctx = previewCanvas.getContext('2d');
                ctx.clearRect(0, 0, w, h);

                if (!state.name.trim()) {
                    previewCanvas.style.display = 'none';
                    previewPlaceholder.style.display = 'block';
                    btnExport.disabled = true;
                    return;
                }

                previewCanvas.style.display = 'block';
                previewPlaceholder.style.display = 'none';
                btnExport.disabled = false;

                const cfg = getCurrentFont();
                const fontSize = Math.round(state.fontSize * (maxWidth / 700) * dpr);

                ctx.fillStyle = state.color;
                ctx.font = `${fontSize}px ${cfg.fontFamily}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const cx = w / 2;
                const cy = h / 2 - h * 0.08;

                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.06)';
                ctx.shadowBlur = h * 0.04;
                ctx.shadowOffsetX = w * 0.003;
                ctx.shadowOffsetY = h * 0.03;
                ctx.fillText(state.name.trim(), cx, cy);
                ctx.restore();
            }

            // ==================== 导出 PNG ====================
            function exportSignature() {
                if (!state.name.trim()) return showToast('请先输入名字');
                const cfg = getCurrentFont();
                const name = state.name.trim();
                const exportSize = state.fontSize;

                const tempC = document.createElement('canvas').getContext('2d');
                tempC.font = `${exportSize}px ${cfg.fontFamily}`;
                const tw = tempC.measureText(name).width;
                const pw = Math.round(exportSize * 0.5);
                const ph = Math.round(exportSize * 0.4);
                const cw = Math.max(Math.ceil(tw + pw * 2), 300);
                const ch = Math.max(Math.ceil(exportSize * 1.6 + ph * 2), 120);

                const expC = document.createElement('canvas');
                expC.width = cw;
                expC.height = ch;
                const ctx = expC.getContext('2d');
                ctx.fillStyle = state.color;
                ctx.font = `${exportSize}px ${cfg.fontFamily}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(name, cw/2, ch/2);

                const url = expC.toDataURL('image/png');
                const safeName = name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g, '_');
                const a = document.createElement('a');
                a.download = `电子签名_${safeName}.png`;
                a.href = url;
                a.click();
                showToast('✅ 已导出透明背景 PNG', 'success');
            }

            // ==================== 构建字体网格 ====================
            function buildFontGrid() {
                fontGrid.innerHTML = '';
                const list = state.fontType === 'chinese' ? chineseFonts : englishFonts;
                list.forEach(cfg => {
                    const card = document.createElement('div');
                    card.className = 'font-card';
                    card.dataset.fontId = cfg.id;
                    card.title = cfg.label;
                    card.innerHTML = `
                        <span class="font-preview" style="font-family:${cfg.fontFamily}">${cfg.preview}</span>
                        <span class="font-name-tag">${cfg.label}</span>
                    `;
                    if (cfg.id === state.fontId) card.classList.add('active');
                    card.addEventListener('click', () => selectFont(cfg.id));
                    fontGrid.appendChild(card);
                });
            }

            function selectFont(fontId) {
                state.fontId = fontId;
                document.querySelectorAll('.font-card').forEach(c =>
                    c.classList.toggle('active', c.dataset.fontId === fontId)
                );
                loadFontById(fontId);
                renderPreview();
            }

            // ==================== 切换中英文 ====================
            function switchFontType(type) {
                if (state.fontType === type) return;
                state.fontType = type;
                const list = type === 'chinese' ? chineseFonts : englishFonts;
                state.fontId = list[0].id;
                fontTypeButtons.forEach(b => b.classList.toggle('active', b.dataset.type === type));
                loadFontById(state.fontId);
                buildFontGrid();
                renderPreview();
            }

            // ==================== 预设颜色 ====================
            function buildPresetColors() {
                presetColorsContainer.innerHTML = '';
                presetColors.forEach(pc => {
                    const dot = document.createElement('span');
                    dot.className = 'color-dot';
                    dot.style.backgroundColor = pc.color;
                    dot.title = pc.label;
                    dot.dataset.color = pc.color;
                    if (isLight(pc.color)) dot.classList.add('light-color');
                    if (pc.color === state.color) dot.classList.add('active');
                    dot.addEventListener('click', () => selectColor(pc.color, true));
                    presetColorsContainer.appendChild(dot);
                });
            }

            function isLight(hex) {
                const r = parseInt(hex.slice(1,3),16);
                const g = parseInt(hex.slice(3,5),16);
                const b = parseInt(hex.slice(5,7),16);
                return (0.299*r + 0.587*g + 0.114*b)/255 > 0.65;
            }

            function selectColor(color, updateInput = true) {
                state.color = color;
                document.querySelectorAll('.color-dot').forEach(d =>
                    d.classList.toggle('active', d.dataset.color === color)
                );
                if (updateInput) customColorInput.value = color;
                renderPreview();
            }

            // ==================== 事件绑定 ====================
            nameInput.addEventListener('input', () => {
                state.name = nameInput.value;
                renderPreview();
            });
            btnClear.addEventListener('click', () => {
                nameInput.value = '';
                state.name = '';
                renderPreview();
                nameInput.focus();
            });
            customColorInput.addEventListener('input', () => {
                selectColor(customColorInput.value, false);
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            });
            sizeSlider.addEventListener('input', () => {
                state.fontSize = +sizeSlider.value;
                sizeValue.textContent = state.fontSize;
                renderPreview();
            });
            btnExport.addEventListener('click', exportSignature);
            btnReset.addEventListener('click', () => {
                state.name = '';
                state.fontType = 'chinese';
                state.fontId = 'cao-shu-kuang';
                state.color = '#1a1a1a';
                state.fontSize = 95;
                nameInput.value = '';
                sizeSlider.value = 95;
                sizeValue.textContent = '95';
                customColorInput.value = '#1a1a1a';
                fontTypeButtons.forEach(b => b.classList.toggle('active', b.dataset.type === 'chinese'));
                document.querySelectorAll('.color-dot').forEach(d =>
                    d.classList.toggle('active', d.dataset.color === '#1a1a1a')
                );
                buildFontGrid();
                renderPreview();
                showToast('已重置所有设置');
            });
            fontTypeButtons.forEach(btn => btn.addEventListener('click', () => switchFontType(btn.dataset.type)));

            window.addEventListener('resize', () => {
                clearTimeout(window._resizeTimer);
                window._resizeTimer = setTimeout(renderPreview, 200);
            });
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    if (state.name.trim()) exportSignature();
                }
            });

            // ==================== 启动 ====================
            loadFontById('cao-shu-kuang');
            buildFontGrid();
            buildPresetColors();
            sizeValue.textContent = state.fontSize;
            sizeSlider.value = state.fontSize;
            customColorInput.value = state.color;
            renderPreview();

            document.fonts.ready.then(() => renderPreview());

            console.log('✍️ 电子签名生成器（20款差异化字体）已就绪');
            console.log('   - 中文10款：覆盖狂野狂草、端正行楷、古朴隶书、工整楷书、艺术字、可爱体等多种风格');
            console.log('   - 英文10款：覆盖华丽花体、卡通手绘、复古打字机、粗犷黑体等完全不同画风');
            console.log('   - 所有字体均带系统兜底，在线字体加载失败不影响使用');
        })();
    </script>
</body>
</html>
