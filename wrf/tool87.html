<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 13485:2016 医疗器械质量管理体系 用于法规的要求 · 知识库</title>
<style>
/* ============ 主题变量 ============ */
:root{
  --bg:#0f1419; --bg2:#161b22; --bg3:#1c2330; --panel:#1a2230;
  --border:#2a3442; --text:#e6edf3; --text2:#9aa7b5; --text3:#6b7785;
  --accent:#3b82f6; --accent2:#22d3ee; --accent-soft:rgba(59,130,246,.15);
  --req:#f59e0b; --note:#8b95a3; --ok:#34d399; --danger:#f87171;
  --shadow:0 8px 30px rgba(0,0,0,.45); --radius:12px;
}
html[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#ffffff; --bg3:#eef2f8; --panel:#ffffff;
  --border:#dce3ec; --text:#1a2330; --text2:#46566a; --text3:#7a899b;
  --accent:#2563eb; --accent2:#0891b2; --accent-soft:rgba(37,99,235,.1);
  --req:#c2710a; --note:#6b7785; --ok:#059669; --danger:#dc2626;
  --shadow:0 8px 30px rgba(20,40,80,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Segoe UI","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.75;
  font-size:16px; transition:background .25s,color .25s;
}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--accent-soft)}

/* ============ 顶栏 ============ */
header{
  position:sticky;top:0;z-index:50;background:var(--bg2);
  border-bottom:1px solid var(--border);padding:10px 18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;white-space:nowrap}
.brand .logo{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;
}
.brand small{display:block;font-weight:400;color:var(--text3);font-size:11px}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:520px}
#search{
  width:100%;padding:9px 36px 9px 38px;border-radius:10px;
  border:1px solid var(--border);background:var(--bg3);color:var(--text);
  font-size:14px;outline:none;transition:.2s;
}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-wrap .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.search-wrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  border:none;background:none;color:var(--text3);font-size:18px;display:none}
.search-wrap .clr:hover{color:var(--danger)}
.search-count{position:absolute;right:38px;top:50%;transform:translateY(-50%);
  font-size:11px;color:var(--text3);pointer-events:none}
.tools{display:flex;gap:6px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);padding:7px 10px;border-radius:9px;
  font-size:13px;transition:.18s;white-space:nowrap;
}
.btn:hover{color:var(--text);border-color:var(--accent);background:var(--accent-soft)}
.btn.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.btn .kbd{font-size:10px;opacity:.6}

/* ============ 布局 ============ */
.layout{display:flex;min-height:calc(100vh - 58px)}
aside{
  width:300px;flex:none;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s,margin .25s;
}
aside.collapsed{width:0;margin-left:-1px}
.side-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;gap:8px}
.side-head input{
  flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:13px;outline:none;min-width:0;
}
.nav{flex:1;overflow-y:auto;padding:8px 6px 30px}
.nav-group{margin-bottom:2px}
.nav-chap{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  cursor:pointer;color:var(--text);font-weight:600;font-size:14px;transition:.15s;
}
.nav-chap:hover{background:var(--bg3)}
.nav-chap .num{
  flex:none;width:26px;height:26px;border-radius:7px;background:var(--accent-soft);
  color:var(--accent);display:grid;place-items:center;font-size:12px;font-weight:700;
}
.nav-chap .ttl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-chap .cnt{font-size:11px;color:var(--text3);background:var(--bg3);
  padding:1px 7px;border-radius:20px}
.nav-chap .arrow{transition:transform .2s;color:var(--text3);font-size:11px}
.nav-chap.open .arrow{transform:rotate(90deg)}
.nav-items{display:none;padding:2px 0 4px 14px}
.nav-items.open{display:block}
.nav-item{
  display:flex;gap:8px;align-items:baseline;padding:5px 10px;border-radius:7px;
  cursor:pointer;color:var(--text2);font-size:13px;transition:.15s;
  border-left:2px solid transparent;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--text);border-left-color:var(--accent)}
.nav-item .id{color:var(--accent2);font-weight:600;font-variant-numeric:tabular-nums;flex:none}
.nav-item .it{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .star{margin-left:auto;color:var(--text3);font-size:12px;opacity:0}
.nav-item:hover .star,.nav-item.starred .star{opacity:1}
.nav-item.starred .star{color:var(--req)}

/* 主区 */
main{flex:1;min-width:0;display:flex;flex-direction:column}
.breadcrumb{padding:10px 22px;border-bottom:1px solid var(--border);background:var(--bg2);
  font-size:13px;color:var(--text3);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.breadcrumb b{color:var(--text)}
.crumbs a{color:var(--accent2)}
.content{flex:1;overflow-y:auto;padding:26px 30px 80px;max-width:1080px;margin:0 auto;width:100%}
.clause-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;
  border-bottom:2px solid var(--border);padding-bottom:16px;margin-bottom:22px}
.clause-num{
  flex:none;font-size:15px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:8px 14px;border-radius:10px;font-variant-numeric:tabular-nums;letter-spacing:.5px;
}
.clause-title{flex:1;min-width:200px}
.clause-title h1{font-size:25px;line-height:1.35;margin-bottom:4px}
.clause-title .sub{color:var(--text3);font-size:13px}
.clause-actions{display:flex;gap:8px;flex-wrap:wrap}
.mini-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  padding:6px 11px;border-radius:8px;font-size:12.5px;transition:.18s;display:inline-flex;gap:5px;align-items:center}
.mini-btn:hover{color:var(--text);border-color:var(--accent)}
.mini-btn.on{color:var(--req);border-color:var(--req)}

/* 内容块 */
.block{margin-bottom:14px}
.block p{margin-bottom:12px}
.block .note{color:var(--note);font-size:14px;padding:10px 14px;border-left:3px solid var(--border);
  background:var(--bg2);border-radius:0 8px 8px 0;margin:10px 0}
.block .req-em{color:var(--req);font-weight:600}
ul.l{list-style:none;padding-left:4px;margin:8px 0}
ul.l>li{position:relative;padding:4px 0 4px 26px;margin-bottom:4px}
ul.l>li::before{content:attr(data-k);position:absolute;left:0;top:4px;font-weight:700;color:var(--accent2)}
ul.l2{padding-left:22px;margin:4px 0}
ul.l2>li{padding-left:24px}
ul.l2>li::before{color:var(--text3)}
.tip{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;
  padding:12px 16px;margin:14px 0;font-size:14px}
mark{background:var(--req);color:#1a1205;padding:0 2px;border-radius:3px}
mark.cur{background:var(--accent);color:#fff}

/* 翻页 */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:40px;
  padding-top:20px;border-top:1px solid var(--border)}
.pager a{padding:12px 18px;border:1px solid var(--border);border-radius:10px;
  background:var(--bg2);flex:1;max-width:48%;transition:.18s}
.pager a:hover{border-color:var(--accent);text-decoration:none}
.pager .pl{color:var(--text3);font-size:12px}
.pager .pt{color:var(--text);font-weight:600;font-size:14px;display:block;margin-top:2px}
.pager a.next{text-align:right}

/* 进度条 */
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  z-index:100;width:0;transition:width .3s}

/* ============ 右抽屉 ============ */
.drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--panel);
  border-left:1px solid var(--border);z-index:60;transform:translateX(105%);
  transition:transform .28s;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.drawer.open{transform:translateX(0)}
.drawer .dh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.drawer .dh h3{font-size:16px}
.drawer .dbody{flex:1;overflow-y:auto;padding:16px 18px}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;opacity:0;pointer-events:none;transition:.25s}
.mask.show{opacity:1;pointer-events:auto}

/* 搜索结果 */
.result{padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;
  cursor:pointer;transition:.15s;background:var(--bg2)}
.result:hover{border-color:var(--accent);background:var(--bg3)}
.result .rid{color:var(--accent2);font-weight:700;font-size:13px}
.result .rt{font-weight:600;font-size:14px;margin:2px 0}
.result .rs{color:var(--text2);font-size:13px;line-height:1.5}
.empty{color:var(--text3);text-align:center;padding:40px 10px}

/* 术语表 */
.term{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--bg2)}
.term b{color:var(--accent2)}
.term p{color:var(--text2);font-size:13px;margin-top:4px}

/* 统计卡 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .n{font-size:26px;font-weight:800;color:var(--accent)}
.stat .l{font-size:12px;color:var(--text3);margin-top:2px}

/* 测验 */
.quiz-q{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.quiz-q .qt{font-weight:600;margin-bottom:10px}
.quiz-q label{display:block;padding:8px 12px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:6px;cursor:pointer;transition:.15s;font-size:14px}
.quiz-q label:hover{background:var(--bg3)}
.quiz-q label.ok{background:rgba(52,211,153,.16);border-color:var(--ok);color:var(--ok)}
.quiz-q label.bad{background:rgba(248,113,113,.16);border-color:var(--danger);color:var(--danger)}
.quiz-q .exp{font-size:13px;color:var(--text2);margin-top:8px;display:none}
.quiz-q.answered .exp{display:block}

/* 图 */
.diagram-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin:14px 0}
.diagram-wrap h4{margin-bottom:12px;font-size:15px}
.svg-box{width:100%;overflow-x:auto;text-align:center}
.svg-box svg{max-width:100%;height:auto}
.legend{font-size:12px;color:var(--text3);margin-top:8px}
.maprow{display:flex;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px;background:var(--bg2)}
.maprow .a{color:var(--accent2);font-weight:700;flex:none;min-width:120px}
.maprow .b{color:var(--text2)}

/* 移动端 */
.hamburger{display:none}
@media(max-width:900px){
  aside{position:fixed;top:58px;bottom:0;left:0;z-index:40;box-shadow:var(--shadow)}
  .hamburger{display:inline-flex}
  .content{padding:18px 14px 70px}
  .clause-title h1{font-size:20px}
}
@media(max-width:560px){
  .brand small{display:none}
  .tools .btn span.txt{display:none}
  .clause-num{font-size:13px;padding:6px 10px}
}
/* 打印 */
@media print{
  aside,.tools,header .search-wrap,.pager,.clause-actions,.hamburger{display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  .layout{display:block}
  .content{max-width:100%;padding:0}
  .clause-head{border-color:#999}
  mark{background:#ffe28a;color:#000}
}
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<header>
  <button class="btn hamburger" id="toggleNav" title="目录">☰</button>
  <div class="brand">
    <div class="logo">ISO</div>
    <div>ISO 13485:2016 知识库
      <small>医疗器械质量管理体系 — 用于法规的要求</small>
    </div>
  </div>
  <div class="search-wrap">
    <span class="ic">🔍</span>
    <input id="search" placeholder="全文搜索：如“风险”“可追溯性”“忠告性通知”“管理评审”…" autocomplete="off">
    <span class="search-count" id="searchCount"></span>
    <button class="clr" id="searchClear">×</button>
  </div>
  <div class="tools">
    <button class="btn" id="btnNav" title="目录树">📑<span class="txt">目录</span></button>
    <button class="btn" id="btnStar" title="我的收藏">⭐<span class="txt">收藏</span></button>
    <button class="btn" id="btnGloss" title="术语表">📖<span class="txt">术语</span></button>
    <button class="btn" id="btnGraph" title="结构图">🗺️<span class="txt">图谱</span></button>
    <button class="btn" id="btnQuiz" title="自测">🎯<span class="txt">自测</span></button>
    <button class="btn" id="btnStat" title="统计">📊<span class="txt">统计</span></button>
    <button class="btn" id="btnTheme" title="主题">🌓</button>
    <button class="btn" id="btnFontD" title="缩小字号">A−</button>
    <button class="btn" id="btnFontU" title="放大字号">A+</button>
    <button class="btn" id="btnPrint" title="打印/导出PDF">🖨️</button>
  </div>
</header>

<div class="layout">
  <aside id="aside">
    <div class="side-head">
      <input id="navFilter" placeholder="筛选条款…">
      <button class="btn" id="collapseNav" title="收起">⟨</button>
    </div>
    <div class="nav" id="nav"></div>
  </aside>

  <main>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- 右抽屉：通用容器 -->
<div class="mask" id="mask"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <h3 id="drawerTitle">面板</h3>
    <button class="btn" id="drawerClose">✕</button>
  </div>
  <div class="dbody" id="drawerBody"></div>
</div>

<script>
/* =====================================================================
   ISO 13485:2016 数据（医疗器械质量管理体系 — 用于法规的要求）
   每条 clause: {id, num, title, blocks:[...]}
   block 类型:
     {t:'p', x:'文本'}           段落
     {t:'note', x:'文本'}        注 / 来源
     {t:'ul', items:[...]}       列表，item 可为 字符串 或 {t:'ul',items:[...]}
   ===================================================================== */
const CLAUSES = [

/* ===== 前言 ===== */
{id:'preface',num:'前言',title:'前言（Foreword）',blocks:[
  {t:'p',x:'国际标准化组织(ISO)是由各国标准化团体(ISO 成员团体)组成的世界性的联合会。制定国际标准的工作通常由 ISO 的技术委员会完成。各成员团体若对某技术委员会确定的项目感兴趣，均有权参加该委员会的工作。'},
  {t:'p',x:'本文件由医疗器械质量管理和通用要求技术委员会 ISO/TC 210 负责。'},
  {t:'p',x:'第 3 版标准经技术性修改，取消并替代第 2 版 (ISO 13485:2003) 和 ISO/TR 14969:2004，并已将 ISO 13485:2003/Cor.1:2009 勘误内容整合进来。附录 A 中概述了第 3 版标准与第 2 版之间的变化。'},
  {t:'p',x:'需要注意，本文件中的一些要素可能涉及到专利权的内容。ISO 不应负责识别任何及所有这些专利权问题。'},
  {t:'note',x:'本文件版权归 ISO 2016 所有。除内部使用外，任何部分未经书面许可不得以任何形式复制或利用。'},
]},

/* ===== 引言 ===== */
{id:'0',num:'引言',title:'引言（Introduction）',blocks:[
  {t:'p',x:'本标准规定了质量管理体系要求，适用于参与到医疗器械生命周期的一个或多个阶段（包括设计开发、生产、贮存和销售、安装、服务、最终停用和处置）的组织，也可被提供相关产品的供方或外部方使用。'},
  {t:'p',x:'引言包含以下小节：0.1 总则、0.2 概念说明、0.3 过程方法、0.4 和 ISO 9001 的关系、0.5 和其他管理体系的兼容性。'},
]},
{id:'0.1',num:'0.1',title:'总则',blocks:[
  {t:'p',x:'本标准规定了质量管理体系要求，这些要求能够被参与到医疗器械生命周期的一个或多个阶段的组织所采用，包括医疗器械设计和开发、生产、贮存和销售、安装、服务、最终停用和处置，以及相关活动（如技术支持）的设计开发或提供。本国际标准的要求也可被提供产品（比如原材料、配件、组件、医疗器械、灭菌服务、校准服务、分销服务和维护服务）的供方或其他外部方使用。供方和外部方可自愿选择遵守本国际标准的要求或按照合同要求遵守。'},
  {t:'p',x:'有些管辖区域的法规要求在医疗器械供应链中具有多职能的组织应采用质量管理体系。因此，本标准期望组织：'},
  {t:'ul',items:[
    '——识别在适用的法规要求下的职能；',
    '——识别在其职能范围内适用于其活动的法规要求；',
    '——将这些适用的法规要求融入组织的质量管理体系。',
  ]},
  {t:'p',x:'不同国家、区域适用法规要求所包含的定义是不同的。组织需基于可获得医疗器械管辖区域的法规要求，理解其在本标准中的含义。'},
  {t:'p',x:'本国际标准也能被内部和外部使用（包括认证机构），以评定满足顾客和适用于组织质量管理体系和组织自身要求的法规要求。它强调本国际标准中规定的质量管理体系要求作为在产品安全和性能方面满足顾客和适用的法规要求所必需的产品技术要求的补充。'},
  {t:'p',x:'采用质量管理体系是组织的一项战略性决策，组织的质量管理体系的设计和实施受以下方面影响：'},
  {t:'ul',items:[
    'a) 组织的环境、该环境变化和组织的环境对医疗器械符合性的影响；',
    'b) 组织不断变化的需求；',
    'c) 组织的具体目标；',
    'd) 组织所提供的产品；',
    'e) 组织所采用的过程；',
    'f) 组织的规模和组织的结构；',
    'g) 组织活动所适用的法规要求。',
  ]},
  {t:'p',x:'本国际标准的目的不是统一不同质量管理体系的结构、文件及形成与本标准条款结构相一致的文件。'},
  {t:'p',x:'医疗器械种类很多，本国际标准一些专用的要求只适用于指定的医疗器械类别，这些类别在第 3 章中定义。'},
]},
{id:'0.2',num:'0.2',title:'概念说明',blocks:[
  {t:'p',x:'在本标准中，以下术语或短语用于本文：'},
  {t:'ul',items:[
    '—当一要求被短语“适当时”修饰时，即认为是“适当的”，除非组织能提供其他合理理由。如果一项要求对以下方面是必需的，则认为该项要求是“适当的”：产品满足要求；符合适用的法规要求；组织实施纠正措施；组织管理风险；',
    '—当使用术语“风险”一词，在本国际标准范围内，“风险”是涉及到医疗器械安全/性能要求或满足适用的法规要求；',
    '—当一项要求被要求“文件化”，也就是要求其建立、实施和保持；',
    '—当使用术语“产品”，也可指“服务”。术语“产品”适用于预期或经顾客要求的输出，以及产品实现过程所产生的任何预期输出；',
    '—当使用术语“法规要求”，它包含适用于本国际标准使用者的任何法律法规要求（比如法律、法规、条例或指令）。术语“法规要求”的应用仅限于质量管理体系的要求和医疗器械安全和性能方面的要求。',
  ]},
  {t:'p',x:'在本标准中使用如下助动词：'},
  {t:'ul',items:[
    '—“应”表示要求；',
    '—“宜”表示建议；',
    '—“可以”表示允许；',
    '—“能”表示可能或能够。',
  ]},
  {t:'note',x:'“注”是理解和说明有关要求的指南。'},
]},
{id:'0.3',num:'0.3',title:'过程方法',blocks:[
  {t:'p',x:'本标准基于质量管理的过程方法，任何接收输入并将其转换为输出的活动可视作一个“过程”，通常一个过程的输出形成下一个过程的输入。为使组织有效运行，必须确定和管理众多相互关联的活动。为了产生期望的结果，由过程组成的系统在组织内的应用，连同这些过程的识别和相互作用，以及对这些过程的管理，可称之为“过程方法”。'},
  {t:'p',x:'在质量管理体系中应用过程方法时，强调以下方面的重要性：'},
  {t:'ul',items:[
    'a) 理解和满足要求；',
    'b) 从增值的角度考虑过程；',
    'c) 获得过程绩效和有效性的结果；',
    'd) 基于客观的测量改进过程。',
  ]},
]},
{id:'0.4',num:'0.4',title:'和 ISO 9001 的关系',blocks:[
  {t:'p',x:'本标准是基于 ISO 9001:2008 的独立标准（ISO 9001:2015 已取代 ISO 9001:2008）。为方便使用者，附录 B 提供了本国际标准和 ISO 9001:2015 之间的对照表。'},
  {t:'p',x:'本国际标准旨在，为参与到医疗器械生命周期的一个或多个阶段的组织所适用的质量管理体系，促进法规要求的总体对比。本标准包含了一些医疗器械的专用要求，删减 ISO 9001 中不适于作为法规要求的某些要求。由于这些删减，质量管理体系符合本标准的组织不能声称符合 ISO 9001 标准，除非其质量管理体系还符合 ISO 9001 中所有的要求。'},
]},
{id:'0.5',num:'0.5',title:'和其他管理体系的兼容性',blocks:[
  {t:'p',x:'本标准不包括针对其他管理体系的要求，如环境管理、职业健康与安全管理或财务管理的特定要求。然而，本标准使组织能够将其自身的质量管理体系与相关的管理体系要求结合或整合。组织为了建立符合本标准要求的质量管理体系，可能会改变现行的管理体系。'},
]},

/* ===== 第1章 范围 ===== */
{id:'1',num:'1',title:'范围（Scope）',blocks:[
  {t:'p',x:'本标准为需要证实其有能力提供持续满足顾客要求和适用法规要求的医疗器械和相关服务的组织规定了质量管理体系要求。组织可能参与到医疗器械生命周期的一个或多个阶段，包括医疗器械设计和开发、生产、贮存和销售、安装，或医疗器械的服务和设计、开发或提供相关活动（如技术支持）。供方或外部方也能使用本标准以提供包含与质量管理体系相关服务的产品给这些组织。'},
  {t:'p',x:'不论组织的类型和规模，除非有明确的规定，本国际标准的要求适用于组织。任何规定适用于“医疗器械”要求之处，这样的要求也同样适用组织所提供的相关服务。'},
  {t:'p',x:'对那些本国际标准要求且适用于组织，而不是由组织亲自来实施的过程，组织应当对其负责并以监视、测量、控制该过程的方式在质量管理体系中进行澄清（说明）。'},
  {t:'p',x:'如果法规要求允许对设计和开发控制进行删减，则在质量管理体系中删减他们可认为是合理的。这些法规能够提供另一种安排，这些安排要在质量管理体系中加以说明。组织有责任确保在符合本标准的声明中明确对设计和开发控制的删减。'},
  {t:'p',x:'本标准第 6、7 或 8 章中任何要求，如果因质量管理体系所涉及的医疗器械的特点而不适用时，组织不需要在其质量管理体系中包含这样的要求。对于任何不适用条款，组织应在 4.2.2 中记录其合理性。'},
]},

/* ===== 第2章 规范性引用文件 ===== */
{id:'2',num:'2',title:'规范性引用文件',blocks:[
  {t:'p',x:'下列文件通过全部或部分地被本文件所引用，并且其应用是必需的。凡是注日期的引用文件，仅该引用版本适用于本文件。凡是不注日期的引用文件，其最新版本（包括所有的修改单）适用于本文件。'},
  {t:'ul',items:['ISO 9000:2015, 质量管理体系 — 基础和术语']},
]},

/* ===== 第3章 术语和定义 ===== */
{id:'3',num:'3',title:'术语和定义',blocks:[
  {t:'p',x:'ISO 9000:2015 中确立的及下列术语和定义适用于本标准。以下 3.1–3.20 为本标准新增或重新定义的医疗器械行业专用术语。'},
]},
{id:'3.1',num:'3.1',title:'忠告性通知',blocks:[
  {t:'p',x:'在医疗器械交付后，由组织发布的通知，旨在下列方面给出补充信息或建议采取的措施：医疗器械的使用；医疗器械的改动；医疗器械返回组织；或医疗器械的销毁。'},
  {t:'note',x:'注 1：忠告性通知的发布要符合适用的法规要求。'},
]},
{id:'3.2',num:'3.2',title:'授权代表',blocks:[
  {t:'p',x:'在一个国家或行政管辖区域范围内，经制造商书面委托并代表制造商履行随后在此国家或行政管辖区域的法律义务的自然人或法人。'},
  {t:'note',x:'[来源: GHTF/SG1/N055:2009, 5.2]'},
]},
{id:'3.3',num:'3.3',title:'临床评价',blocks:[
  {t:'p',x:'评定和分析与医疗器械有关的临床数据，当按照制造商的预期使用时，以验证医疗器械的安全和性能。'},
  {t:'note',x:'[来源: GHTF/SG5/N4: 2010, Clause 4]'},
]},
{id:'3.4',num:'3.4',title:'抱怨',blocks:[
  {t:'p',x:'任何以书面、电讯、口头的形式宣称，已经从组织控制中放行的医疗器械在其特性、质量、耐用性、可靠性、使用性、可用性及性能存在不足的行为或影响医疗器械性能的服务。'},
  {t:'note',x:'注 1：此处“抱怨”的定义不同于 ISO 9000:2015 所给出的定义。'},
]},
{id:'3.5',num:'3.5',title:'经销商',blocks:[
  {t:'p',x:'在供应链中亲自参与并促使医疗器械为最终用户所获得的自然人或法人。'},
  {t:'note',x:'注 1：在供应链中可能有一个以上的经销商参与进来。'},
  {t:'note',x:'注 2：参与到供应链中并代表生产商、进口商或经销商进行贮存和运输的人员，不是该定义中的经销商。'},
  {t:'note',x:'[来源: GHTF/SG1/N055:2009, 5.3]'},
]},
{id:'3.6',num:'3.6',title:'植入性医疗器械',blocks:[
  {t:'p',x:'只能通过内科或外科手段取出来达到下列目的的医疗器械：全部或部分插入人体或自然腔口中；或为替代上表皮或眼表面用的，并且使其在体内至少存留 30 天。'},
  {t:'note',x:'注 1：植入性医疗器械的定义包括有源植入性医疗器械。'},
]},
{id:'3.7',num:'3.7',title:'进口商',blocks:[
  {t:'p',x:'在医疗器械供应链中排在首位，并且使得在其他国家或管辖区域制造的医疗器械能够在其国家或管辖区域市场上能够获得的自然人或法人。'},
  {t:'note',x:'[来源: GHTF/SG1/N055:2009, 5.4]'},
]},
{id:'3.8',num:'3.8',title:'标记',blocks:[
  {t:'p',x:'与医疗器械的标识、技术说明、预期目的和使用说明相关的标签、使用说明和任何其他的信息，但不包含货运文件。'},
  {t:'note',x:'[来源: GHTF/SG1/N70:2011, 第 4 章]'},
]},
{id:'3.9',num:'3.9',title:'寿命期',blocks:[
  {t:'p',x:'在医疗器械的生命中，从最初的概念到最终停用和处置的所有阶段。'},
  {t:'note',x:'[来源: ISO 14971:2007, 2.7]'},
]},
{id:'3.10',num:'3.10',title:'制造商',blocks:[
  {t:'p',x:'以其自身名义使医疗器械可获得投入使用，并对医疗器械的设计和（或）制造负责的自然人或法人；无论该医疗器械是由其设计（或）制造，还是由其他人代表其实施。'},
  {t:'note',x:'注 1：此自然人或法人应确保符合预期销售或可获得医疗器械的国家或管辖区域所有适用法规要求，并对其负有最终的法律责任，除非在其管辖区域任监管机构明确地将该责任施加于其他人。'},
  {t:'note',x:'注 2：制造商的责任在其他 GHTF 指南文件中有描述，这些责任包括符合上市前要求和上市后要求，例如不良事件报告和纠正措施通告。'},
  {t:'note',x:'注 3：“设计和（或）制造”可以包括医疗器械规范开发、生产、装配、组装、加工、包装、重新包装、标记、重新标记、灭菌、安装、或重新制造；为实现某一医疗目的，而将一些器械和其他产品组合在一起。'},
  {t:'note',x:'注 4：为单个患者的使用，依照使用说明，对其他人提供的医疗器械进行拼装或改装的（同时，未因拼装或改装改变医疗器械预期用途）任何人，不属于制造商。'},
  {t:'note',x:'注 5：更改或改变医疗器械的预期用途，不是代表原始制造商而是以其自身的名义使得医疗器械可获得使用的任何人，应当被认为是医疗器械改装制造商。'},
  {t:'note',x:'注 6：授权代表、经销商或进口商只将其地址和联系方式内容附加到医疗器械或包装上，但并没有覆盖或改变已有标签，不得认为是制造商。'},
  {t:'note',x:'注 7：在一定程度上，医疗器械附件应遵照医疗器械的法规要求，对其设计和（或）制造负责的人应认为是制造商。'},
  {t:'note',x:'[来源: GHTF/SG1/N055:2009, 5.1]'},
]},
{id:'3.11',num:'3.11',title:'医疗器械',blocks:[
  {t:'p',x:'制造商的预期用途是为下列一个或多个特定医疗目的用于人类的，不论单独使用或组合使用的仪器、设备、器具、机器、用具、植入物、体外试剂、软件或其他相似或相关物品。这些目的是：'},
  {t:'ul',items:[
    '——疾病的诊断、预防、监护、治疗或者缓解；',
    '——损伤的诊断、监护、治疗、缓解或者补偿；',
    '——解剖或生理过程的研究、替代、调节或者支持；',
    '——支持或维持生命；',
    '——妊娠控制；',
    '——医疗器械的消毒；',
    '——通过对取自人体的样本进行体外检查的方式来提供医疗信息；',
  ]},
  {t:'p',x:'其作用于人体体表或体内的主要设计作用不是用药理学、免疫学或代谢的手段获得，但可能有这些手段参与并起一定辅助作用。'},
  {t:'note',x:'注 1：在有些管辖范围内可认为是医疗器械，而在其他地方不认为是医疗器械的产品包括：消毒物质；残疾人的辅助用品；含有动物和（或）人体组织的器械；用于体外受精或生育辅助的器械。'},
  {t:'note',x:'[来源: GHTF/SG1/N071:2012, 5.1]'},
]},
{id:'3.12',num:'3.12',title:'医疗器械族',blocks:[
  {t:'p',x:'由相同组织制造或为其制造，具有相同的与其安全相关的基本设计和性能特性、预期用途和功能的一类医疗器械。'},
]},
{id:'3.13',num:'3.13',title:'性能评价',blocks:[
  {t:'p',x:'为建立或验证体外诊断医疗器械达到其预期用途所进行的评定和数据分析。'},
]},
{id:'3.14',num:'3.14',title:'上市后监督',blocks:[
  {t:'p',x:'对已投放市场的医疗器械所获取的经验进行收集和分析的系统过程。'},
]},
{id:'3.15',num:'3.15',title:'产品',blocks:[
  {t:'p',x:'过程的结果。'},
  {t:'note',x:'注 1：有四种通用的产品类别：服务（如运输）；软件（如计算机程序、字典）；硬件（如发动机机械零件）；流程性材料（如润滑油）。许多产品由分属于不同产品类别的成分构成，其属性取决于产品的主导成分。'},
  {t:'note',x:'注 3：本标准“产品”定义与 ISO 9001:2015 中所给出的定义是不同的。'},
]},
{id:'3.16',num:'3.16',title:'采购的产品',blocks:[
  {t:'p',x:'由组织质量管理体系之外的外部方提供的产品。'},
  {t:'note',x:'注 1：产品的提供不一定推定商业或财务安排。'},
]},
{id:'3.17',num:'3.17',title:'风险',blocks:[
  {t:'p',x:'损害发生的概率与该损害严重程度的结合。'},
  {t:'note',x:'注 1：本标准“风险”定义与 ISO 9001:2015 中所给出的定义是不同的。'},
  {t:'note',x:'[来源: ISO 14971:2007, 2.16]'},
]},
{id:'3.18',num:'3.18',title:'风险管理',blocks:[
  {t:'p',x:'用于风险分析、评价、控制和监视工作的管理方针、程序及其实践的系统运用。'},
  {t:'note',x:'[来源: ISO 14971:2007, 2.22]'},
]},
{id:'3.19',num:'3.19',title:'无菌屏障系统',blocks:[
  {t:'p',x:'防止微生物进入并能使产品在使用地点无菌使用的最小包装。'},
  {t:'note',x:'[来源: ISO 11607-1:2006, 3.22]'},
]},
{id:'3.20',num:'3.20',title:'无菌医疗器械',blocks:[
  {t:'p',x:'旨在满足无菌要求的医疗器械。'},
  {t:'note',x:'注 1：对医疗器械无菌的要求，能按适用的法规或标准执行。'},
]},

/* ===== 第4章 质量管理体系 ===== */
{id:'4',num:'4',title:'质量管理体系（Quality management system）',blocks:[
  {t:'p',x:'本章规定组织对质量管理体系的总要求，以及文件要求（质量手册、医疗器械文件、文件控制、记录控制）。'},
]},
{id:'4.1',num:'4.1',title:'总要求',blocks:[
  {t:'p',x:'组织应按本国际标准的要求和适用的法规要求，对质量管理体系形成文件并保持其有效性，建立、实施和保持本国际标准或适用法规所要求形成的文件的任何要求、程序、活动或安排，并对在适用的法规要求下组织所承担的职能形成文件（职能包括生产商、授权代表、进口商或经销商）。以下为细分要求 4.1.1–4.1.6。'},
]},
{id:'4.1.1',num:'4.1.1',title:'总要求 — 文件化',blocks:[
  {t:'p',x:'组织应按本国际标准的要求和适用的法规要求，对质量管理体系形成文件并保持其有效性。'},
  {t:'p',x:'组织应建立、实施和保持本国际标准或适用法规所要求形成的文件的任何要求、程序、活动或安排。'},
  {t:'p',x:'组织应对在适用的法规要求下组织所承担的职能形成文件。'},
  {t:'note',x:'注：组织承担的职能包括生产商、授权代表、进口商或经销商。'},
]},
{id:'4.1.2',num:'4.1.2',title:'总要求 — 确定过程',blocks:[
  {t:'p',x:'组织应:'},
  {t:'ul',items:[
    'a) 确定在所承担职能下质量管理体系所需的过程及其在整个组织的应用；',
    'b) 采用基于风险的方法控制质量管理体系所需的适当的过程；',
    'c) 确定这些过程的顺序和相互作用。',
  ]},
]},
{id:'4.1.3',num:'4.1.3',title:'总要求 — 过程管理',blocks:[
  {t:'p',x:'对各质量管理体系过程，组织应：'},
  {t:'ul',items:[
    'a) 确定为保证这些过程的有效运行和控制所需的准则和方法；',
    'b) 确保可以获得必要的资源和信息，以支持这些过程的运作和监视；',
    'c) 实施必要的措施，以实现对这些过程策划的结果并保持这些过程的有效性；',
    'd) 监视、测量(适用时)和分析这些过程；',
    'e) 建立并保持为证实符合本国际标准和适用的法规要求的记录 (见 4.2.5)。',
  ]},
]},
{id:'4.1.4',num:'4.1.4',title:'总要求 — 过程变更',blocks:[
  {t:'p',x:'组织应按本国际标准和适用的法规要求来管理这些质量管理体系过程。这些过程的变更应:'},
  {t:'ul',items:[
    'a) 评价它们对质量管理体系的影响；',
    'b) 评价它们对依照本质量管理体系所生产的医疗器械的影响；',
    'c) 依据本国际标准和适用的法规要求得到控制。',
  ]},
]},
{id:'4.1.5',num:'4.1.5',title:'总要求 — 外包过程',blocks:[
  {t:'p',x:'当组织选择将任何影响产品符合要求的过程外包时，应监视和确保对这些过程的控制。组织应对符合本国际标准、客户要求及外包过程所适用的法规要求负责。采用的控制应与所涉及的风险和外部方满足 7.4 规定要求的能力相一致。控制应包含书面的质量协议。'},
]},
{id:'4.1.6',num:'4.1.6',title:'总要求 — 软件确认',blocks:[
  {t:'p',x:'组织应对用于质量管理体系的计算机软件的应用确认的程序形成文件。这类软件应在初次使用前进行确认，适当时，在这类软件的变更后或应用时进行确认。'},
  {t:'p',x:'软件确认和再确认有关的特定方法和活动应与软件应用相关的风险相一致。应保持这些活动的记录 (见 4.2.5)。'},
]},
{id:'4.2',num:'4.2',title:'文件要求',blocks:[
  {t:'p',x:'文件要求包括总则、质量手册、医疗器械文件、文件控制、记录控制（4.2.1–4.2.5）。'},
]},
{id:'4.2.1',num:'4.2.1',title:'文件要求 — 总则',blocks:[
  {t:'p',x:'质量管理体系文件 (见 4.2.4) 应包括:'},
  {t:'ul',items:[
    'a) 形成文件的质量方针和质量目标；',
    'b) 质量手册；',
    'c) 本国际标准所要求形成文件的程序和记录；',
    'd) 组织确定的为确保其过程有效策划、运作和控制所需的文件，包括记录；',
    'e) 适用的法规要求规定的其他文件。',
  ]},
]},
{id:'4.2.2',num:'4.2.2',title:'质量手册',blocks:[
  {t:'p',x:'组织应形成文件的质量手册，包括:'},
  {t:'ul',items:[
    'a) 质量管理体系的范围，包括任何删减的细节与理由；',
    'b) 为质量管理体系建立的形成文件的程序或对其引用；',
    'c) 质量管理体系过程之间的相互作用的表述。',
  ]},
  {t:'p',x:'质量手册应概述质量管理体系中所使用的文件结构。'},
]},
{id:'4.2.3',num:'4.2.3',title:'医疗器械文件',blocks:[
  {t:'p',x:'对于各类型医疗器械或医疗器械族，组织应建立和保持一个或多个包含或引用用于证明符合本国际标准的要求和适用法规要求的文件。'},
  {t:'p',x:'文件的内容应包括，但不限于：'},
  {t:'ul',items:[
    'a) 医疗器械的总体描述、预期用途/目的和标签，包括任何使用说明；',
    'b) 产品规范；',
    'c) 生产、包装、贮存、处理和销售的规范或程序；',
    'd) 测量和监视的程序；',
    'e) 适当时，安装要求；',
    'f) 适当时，服务程序。',
  ]},
]},
{id:'4.2.4',num:'4.2.4',title:'文件控制',blocks:[
  {t:'p',x:'质量管理体系所要求的文件应予以控制。记录是一种特殊类型的文件，应依据 4.2.5 的要求进行控制。'},
  {t:'p',x:'应编制形成文件的程序，以规定以下方面所需的控制：'},
  {t:'ul',items:[
    'a) 文件发布前得到评审和批准，以确保文件是充分的；',
    'b) 必要时对文件进行评审与更新，并再次批准；',
    'c) 确保文件的更改和现行修订状态得到识别；',
    'd) 确保在使用处可获得适用文件的有关版本；',
    'e) 确保文件保持清晰、易于识别；',
    'f) 确保组织所确定的策划和运行质量管理体系所需的外来文件得到识别，并控制其分发；',
    'g) 防止文件退化或遗失；',
    'h) 防止作废文件的非预期使用，并对这些文件进行适当的标识。',
  ]},
  {t:'p',x:'组织应确保文件的更改得到原审批部门或指定的其他审批部门的评审和批准，该被指定的审批部门应能获取用于作出决定的相关背景资料。'},
  {t:'p',x:'组织应至少保存一份作废的文件，并确定其保存期限。这个期限应确保至少在组织所规定的医疗器械寿命期内，可以得到此医疗器械的制造和试验的文件，但不要少于记录(见 4.2.5 )或相关法规要求所规定的保存期限。'},
]},
{id:'4.2.5',num:'4.2.5',title:'记录控制',blocks:[
  {t:'p',x:'应保持记录以提供符合要求和质量管理体系有效运行的证据。'},
  {t:'p',x:'组织应编制形成文件的程序，以规定记录的标识、贮存、安全和完整性、检索、保存期限和处置所需的控制。'},
  {t:'p',x:'组织按法规要求规定并实施用以保护记录中健康保密信息的方法。'},
  {t:'p',x:'记录应保持清晰、易于识别和检索，记录的变更应保持可识别。'},
  {t:'p',x:'组织保存记录的期限应至少为组织所规定的医疗器械的寿命期，但从组织放行产品的日期起不少于 2 年，或按适用的法规要求规定。'},
]},

/* ===== 第5章 管理职责 ===== */
{id:'5',num:'5',title:'管理职责（Management responsibility）',blocks:[
  {t:'p',x:'最高管理者应对建立、实施质量管理体系并保持其有效性作出承诺，包括管理承诺、以顾客为关注焦点、质量方针、策划、职责权限与沟通、管理评审（5.1–5.6）。'},
]},
{id:'5.1',num:'5.1',title:'管理承诺',blocks:[
  {t:'p',x:'最高管理者应通过以下活动，对其建立、实施质量管理体系并保持其有效性的承诺提供证据：'},
  {t:'ul',items:[
    'a) 向组织传达满足顾客和法律法规要求的重要性；',
    'b) 制定质量方针；',
    'c) 确保质量目标的制定；',
    'd) 进行管理评审；',
    'e) 确保资源的获得。',
  ]},
]},
{id:'5.2',num:'5.2',title:'以顾客为关注焦点',blocks:[
  {t:'p',x:'最高管理者应确保顾客要求和适用的法规要求得到确定并予以满足。'},
]},
{id:'5.3',num:'5.3',title:'质量方针',blocks:[
  {t:'p',x:'最高管理者应确保质量方针：'},
  {t:'ul',items:[
    'a) 与组织的宗旨相适应；',
    'b) 包括对满足要求和保持质量管理体系有效性的承诺；',
    'c) 提供制定和评审质量目标的框架；',
    'd) 在组织内得到沟通和理解；',
    'e) 在持续适宜性方面得到评审。',
  ]},
]},
{id:'5.4',num:'5.4',title:'策划',blocks:[
  {t:'p',x:'策划包括质量目标与质量管理体系策划（5.4.1、5.4.2）。'},
]},
{id:'5.4.1',num:'5.4.1',title:'质量目标',blocks:[
  {t:'p',x:'最高管理者应确保在组织的相关职能和层次上建立质量目标，质量目标包括满足适用的法规要求和产品要求所需的内容。质量目标应是可测量的，并与质量方针保持一致。'},
]},
{id:'5.4.2',num:'5.4.2',title:'质量管理体系策划',blocks:[
  {t:'p',x:'最高管理者应确保：'},
  {t:'ul',items:[
    'a) 对质量管理体系进行策划，以满足质量目标以及 4.1 的要求；',
    'b) 在对质量管理体系的变更进行策划和实施时，保持质量管理体系的完整性。',
  ]},
]},
{id:'5.5',num:'5.5',title:'职责、权限与沟通',blocks:[
  {t:'p',x:'包括职责和权限、管理者代表、内部沟通（5.5.1–5.5.3）。'},
]},
{id:'5.5.1',num:'5.5.1',title:'职责和权限',blocks:[
  {t:'p',x:'最高管理者应确保组织内的职责、权限得到规定、形成文件和沟通。'},
  {t:'p',x:'最高管理者应确定所有从事对质量有影响的管理、执行和验证工作的人员的相互关系，并应确保其完成这些任务所必要的独立性和权限。'},
]},
{id:'5.5.2',num:'5.5.2',title:'管理者代表',blocks:[
  {t:'p',x:'最高管理者应指定一名管理者，无论该成员在其他方面的职责如何，应具有以下方面的职责和权限：'},
  {t:'ul',items:[
    'a) 确保质量管理体系所需的过程文件化；',
    'b) 向最高管理者报告质量管理体系的有效性和任何改进的需求；',
    'c) 确保在整个组织内提高满足适用的法规要求和质量管理体系要求的意识。',
  ]},
]},
{id:'5.5.3',num:'5.5.3',title:'内部沟通',blocks:[
  {t:'p',x:'最高管理者应确保在组织内建立适当的沟通过程，并确保对质量管理体系的有效性进行沟通。'},
]},
{id:'5.6',num:'5.6',title:'管理评审',blocks:[
  {t:'p',x:'包括总则、评审输入、评审输出（5.6.1–5.6.3）。'},
]},
{id:'5.6.1',num:'5.6.1',title:'管理评审 — 总则',blocks:[
  {t:'p',x:'组织应形成文件的管理评审程序。最高管理者应按已文件化的策划时间间隔评审组织的质量管理体系，以确保其持续的适宜性、充分性和有效性。评审应包括评价质量管理体系改进的机会和变更的需要，包括质量方针和质量目标。'},
  {t:'p',x:'应保持管理评审的记录 (见 4.2.5)。'},
]},
{id:'5.6.2',num:'5.6.2',title:'管理评审 — 输入',blocks:[
  {t:'p',x:'管理评审的输入应包括，但不限于以下来源的信息：'},
  {t:'ul',items:[
    'a) 反馈；',
    'b) 抱怨处理；',
    'c) 向监管机构的报告；',
    'd) 审核；',
    'e) 过程的监视和测量；',
    'f) 产品的监视和测量；',
    'g) 纠正措施；',
    'h) 预防措施；',
    'i) 以往管理评审的跟踪措施；',
    'j) 影响质量管理体系的变更；',
    'k) 改进的建议；',
    'l) 适用的新的或修订的法规要求。',
  ]},
]},
{id:'5.6.3',num:'5.6.3',title:'管理评审 — 输出',blocks:[
  {t:'p',x:'管理评审的输出应形成记录 (见 4.2.5)，包括以下方面有关的输入评审和任何的决定和措施：'},
  {t:'ul',items:[
    'a) 保持质量管理体系及其过程适宜性、充分性和有效性所需的改进；',
    'b) 与顾客要求有关的产品的改进；',
    'c) 为响应适用的新的或修订的法规要求所需的变更；',
    'd) 资源需求。',
  ]},
]},

/* ===== 第6章 资源管理 ===== */
{id:'6',num:'6',title:'资源管理（Resource management）',blocks:[
  {t:'p',x:'包括资源提供、人力资源、基础设施、工作环境和污染控制（6.1–6.4）。'},
]},
{id:'6.1',num:'6.1',title:'资源提供',blocks:[
  {t:'p',x:'组织应确定并提供以下方面所需的资源：'},
  {t:'ul',items:[
    'a) 实施质量管理体系并保持其有效；',
    'b) 满足适用的法规和顾客要求。',
  ]},
]},
{id:'6.2',num:'6.2',title:'人力资源',blocks:[
  {t:'p',x:'基于适当的教育、培训、技能和经验，从事影响产品质量工作的人员应是能够胜任的。'},
  {t:'p',x:'组织应对建立人员能力、提供所需的培训和保证人员意识的过程形成文件。'},
  {t:'p',x:'组织应：'},
  {t:'ul',items:[
    'a) 确定从事影响产品质量工作的人员所必要的能力；',
    'b) 提供培训或采取其他措施以达到或保持必要的能力；',
    'c) 评价所采取措施的有效性；',
    'd) 确保员工认识到所从事活动的相关性和重要性，以及如何为实现质量目标作出贡献；',
    'e) 保持教育、培训、技能和经验的适当记录 (见 4.2.5)。',
  ]},
  {t:'note',x:'注：用于检查有效性的方法与培训或提供其他措施的相关的风险相一致。'},
]},
{id:'6.3',num:'6.3',title:'基础设施',blocks:[
  {t:'p',x:'组织应为达到产品要求的符合性、防止产品混淆和保证产品的有序处理所需的基础设施的要求形成文件。适当时，基础设施包括：'},
  {t:'ul',items:[
    'a) 建筑物、工作场所和相关的设施；',
    'b) 过程设备(硬件和软件)；',
    'c) 支持性服务(如运输、通讯或信息系统)。',
  ]},
  {t:'p',x:'当这些维护或缺少这样的维护活动能影响产品质量时，组织应将维护活动的要求形成文件，包括维护活动的频率。适当时，这些要求应适用于在生产、工作环境的控制和监视和测量中所采用的设备。应保持此类维护记录 (见 4.2.5)。'},
]},
{id:'6.4',num:'6.4',title:'工作环境和污染控制',blocks:[
  {t:'p',x:'包括工作环境、污染控制（6.4.1、6.4.2）。'},
]},
{id:'6.4.1',num:'6.4.1',title:'工作环境',blocks:[
  {t:'p',x:'组织应对工作环境的要求形成文件，以达到产品要求的符合性。'},
  {t:'p',x:'如果工作环境的条件能对产品质量有负面影响，组织应使工作环境和监视/控制工作环境的要求形成文件。'},
  {t:'p',x:'组织应：'},
  {t:'ul',items:[
    'a) 若人员与产品或工作环境的接触会对医疗器械的安全或性能有影响，则形成人员健康、清洁和服装的要求文件；',
    'b) 确保所有要在特殊环境条件下临时工作的人员是胜任的或在胜任的人员监督下工作。',
  ]},
  {t:'note',x:'注：进一步信息见 ISO 14644 和 ISO 14698。'},
]},
{id:'6.4.2',num:'6.4.2',title:'污染控制',blocks:[
  {t:'p',x:'适当时，为了防止对其他产品、工作环境或人员的污染，组织应策划并为已污染或潜在污染产品的控制安排形成文件。'},
  {t:'p',x:'对于无菌医疗器械，组织应对微生物或微粒物的控制要求形成文件，并保持装配或包装过程所要求的清洁度。'},
]},

/* ===== 第7章 产品实现 ===== */
{id:'7',num:'7',title:'产品实现（Product realization）',blocks:[
  {t:'p',x:'本章覆盖产品实现策划、与顾客有关的过程、设计和开发、采购、生产和服务提供、监视和测量装置的控制（7.1–7.6），是标准的核心运行章节。'},
]},
{id:'7.1',num:'7.1',title:'产品实现的策划',blocks:[
  {t:'p',x:'组织应策划和开发产品所需的过程，产品实现的策划应与质量管理体系的其他过程的要求一致。'},
  {t:'p',x:'在产品的实现过程中，组织应对风险管理的一个或多个过程形成文件。应保持风险管理活动的记录 (见 4.2.5)。'},
  {t:'p',x:'在对产品实现进行策划时，组织应确定以下方面的适当内容：'},
  {t:'ul',items:[
    'a) 产品的质量目标和要求；',
    'b) 建立过程和文件(见 4.2.4)的需求，以及为特定的产品提供资源（包括基础设施和工作环境）的需求；',
    'c) 特定的产品所要求的验证、确认、监视、测量、检验和试验、处理、贮存、销售和追溯活动，以及产品接收准则；',
    'd) 为实现过程及其产品满足要求提供证据所需的记录 (见 4.2.5)。',
  ]},
  {t:'p',x:'策划的输出应以适合于组织的运作方式形成文件。'},
  {t:'note',x:'注：进一步信息见 ISO 14971。'},
]},
{id:'7.2',num:'7.2',title:'与顾客有关的过程',blocks:[
  {t:'p',x:'包括与产品有关要求的确定、评审、顾客沟通（7.2.1–7.2.3）。'},
]},
{id:'7.2.1',num:'7.2.1',title:'与产品有关的要求的确定',blocks:[
  {t:'p',x:'组织应确定：'},
  {t:'ul',items:[
    'a) 顾客规定的要求，包括对交付及交付后活动的要求；',
    'b) 顾客虽然没有明示，但规定的或已知的预期用途所必需的要求；',
    'c) 与产品有关的适用的法规要求；',
    'd) 任何为保证医疗器械规定的性能和安全使用所需的用户培训；',
    'e) 组织确定的任何附加要求。',
  ]},
]},
{id:'7.2.2',num:'7.2.2',title:'与产品有关的要求的评审',blocks:[
  {t:'p',x:'组织评审与产品有关的要求。评审应在组织向顾客作出提供产品的承诺之前进行（如：提交标书、接受合同或订单及接受合同或订单的更改），并应确保：'},
  {t:'ul',items:[
    'a) 产品要求得到规定并形成文件；',
    'b) 与以前表述不一致的合同或订单的要求已予解决；',
    'c) 满足适用的法规要求；',
    'd) 任何依据 7.2.1 识别的用户培训是可获得的或预期可获得的；',
    'e) 组织有能力满足规定的要求。',
  ]},
  {t:'p',x:'评审结果及评审所形成的措施的记录应予保持 (见 4.2.5)。若顾客提供的要求没有形成文件，组织在接受顾客要求前应对顾客要求进行确认。若产品要求发生变更，组织应确保相关文件得到修改，并确保相关人员知道已变更的要求。'},
]},
{id:'7.2.3',num:'7.2.3',title:'顾客沟通',blocks:[
  {t:'p',x:'组织应策划以下与顾客沟通有关的安排并形成文件：'},
  {t:'ul',items:[
    'a) 产品信息；',
    'b) 问询、合同或订单处理，包括对其修改；',
    'c) 顾客反馈，包括顾客抱怨；',
    'd) 忠告性通知。',
  ]},
  {t:'p',x:'组织应依据适用的法规要求与监管机构进行沟通。'},
]},
{id:'7.3',num:'7.3',title:'设计和开发',blocks:[
  {t:'p',x:'包括总则、策划、输入、输出、评审、验证、确认、转化、更改控制、设计开发文件（7.3.1–7.3.10）。'},
]},
{id:'7.3.1',num:'7.3.1',title:'设计和开发 — 总则',blocks:[
  {t:'p',x:'组织应对设计和开发的程序形成文件。'},
]},
{id:'7.3.2',num:'7.3.2',title:'设计和开发策划',blocks:[
  {t:'p',x:'组织应策划和控制产品的设计和开发。适当时，随着设计和开发的进展，应保持和更新设计和开发计划文件。'},
  {t:'p',x:'设计和开发策划过程中，组织应对以下形成文件：'},
  {t:'ul',items:[
    'a) 设计和开发阶段；',
    'b) 每个设计和开发阶段所需要的评审；',
    'c) 适用于每个设计和开发阶段的验证、确认和设计转换活动；',
    'd) 设计和开发的职责和权限；',
    'e) 为确保设计和开发输出到设计和开发输入可追溯性的方法；',
    'f) 包括必要的人员能力在内的所需资源。',
  ]},
]},
{id:'7.3.3',num:'7.3.3',title:'设计和开发输入',blocks:[
  {t:'p',x:'应确定与产品要求有关的输入并保持记录 (见 4.2.5)，这些输入应包括：'},
  {t:'ul',items:[
    'a) 依据预期用途，功能、性能、可用性和安全要求；',
    'b) 适用的法规要求和标准；',
    'c) 适用的风险管理输出；',
    'd) 适当时，以前类似设计提供的信息；',
    'e) 产品和过程的设计和开发所必需的其他要求；',
  ]},
  {t:'p',x:'应对这些输入的充分性和适宜性进行评审并批准。要求应完整、明确，能被验证或确认，并且不能自相矛盾。'},
  {t:'note',x:'注：进一步信息见 IEC 62366–1。'},
]},
{id:'7.3.4',num:'7.3.4',title:'设计和开发输出',blocks:[
  {t:'p',x:'设计和开发输出应：'},
  {t:'ul',items:[
    'a) 满足设计和开发输入的要求；',
    'b) 给出采购、生产和服务提供适当的信息；',
    'c) 包含或引用产品接收准则；',
    'd) 规定对产品的安全和正常使用所必需的产品特性。',
  ]},
  {t:'p',x:'设计和开发输出的形式应适合于设计和开发输入的验证，并应在发布前批准。应保持设计和开发输出的记录 (见 4.2.5)。'},
]},
{id:'7.3.5',num:'7.3.5',title:'设计和开发评审',blocks:[
  {t:'p',x:'在适宜的阶段，应依据策划和文件化的安排，对设计和开发进行系统的评审，以便：'},
  {t:'ul',items:[
    'a) 评价设计和开发的结果满足要求的能力；',
    'b) 识别和提出必要的措施。',
  ]},
  {t:'p',x:'评审的参加者应包括与所评审的设计和开发阶段有关的职能的代表和其他的专家。评审结果及任何必要措施的记录应予保持 (见 4.2.5)。'},
]},
{id:'7.3.6',num:'7.3.6',title:'设计和开发验证',blocks:[
  {t:'p',x:'为确保设计和开发输出满足设计开发输入的要求，应依据所策划和文件化的安排对设计和开发进行验证。'},
  {t:'p',x:'组织应将验证计划形成文件，包括方法、接收准则，适当时，为确定抽样量所采用的统计技术与原理。'},
  {t:'p',x:'如果预期用途需要医疗器械与其他医疗器械连接或接合，验证应包含依此连接或接合时，证实设计输出满足设计输入的内容。'},
  {t:'p',x:'验证结果和结论以及必要措施的记录应予保持 (见 4.2.4 和 4.2.5)。'},
]},
{id:'7.3.7',num:'7.3.7',title:'设计和开发确认',blocks:[
  {t:'p',x:'为确保产品能够满足规定的适用要求或预期用途的要求，应依据所策划并文件化的安排对设计和开发进行确认。'},
  {t:'p',x:'组织应将确认计划形成文件，包括方法、接收准则，适当时，为确定抽样量所采用的统计技术与原理。'},
  {t:'p',x:'应对代表性产品进行设计确认，代表性产品包括最初的生产单位、批或其他等同物。应记录用于进行确认的产品的合理性 (见 4.2.5)。'},
  {t:'p',x:'作为设计和开发确认的一部分，组织应按照适用的法规要求进行临床评价或性能评价。用于临床评价或性能评价的医疗器械不应视作放行给顾客使用。如果预期用途需要医疗器械与其他医疗器械连接或接合，确认应包含依此连接或接合时，证实规定的适用要求或预期用途已得到满足的内容。确认应在产品交付给客户使用之前完成。确认结果及必要措施的记录应予保持 (见 4.2.4 和 4.2.5)。'},
]},
{id:'7.3.8',num:'7.3.8',title:'设计和开发转化',blocks:[
  {t:'p',x:'组织应将设计和开发输出到制造的转换程序形成文件。这些程序应确保设计和开发的输出在成为最终生产规范之前以适用于生产的方式经过验证，并且生产能力能满足产品要求。'},
  {t:'p',x:'转换的结果和结论应予以记录 (见 4.2.5)。'},
]},
{id:'7.3.9',num:'7.3.9',title:'设计和开发更改的控制',blocks:[
  {t:'p',x:'组织应将控制设计和开发变更的程序形成文件。组织应确定与医疗器械的功能、性能、可用性、安全和适用的医疗器械法规要求和其预期使用有关的重要变更。'},
  {t:'p',x:'设计和开发变更应被识别，实施前，这些变更应：'},
  {t:'ul',items:[
    'a) 经过评审；',
    'b) 经过验证；',
    'c) 适当时，经确认；',
    'd) 经过批准。',
  ]},
  {t:'p',x:'设计和开发变更的评审应包括过程中或已经配送的部件和产品的变化和风险管理和产品实现过程的输入和输出的变化的影响的评价。更改的评审结果及任何必要措施的记录应予保持 (见 4.2.5)。'},
]},
{id:'7.3.10',num:'7.3.10',title:'设计和开发文件',blocks:[
  {t:'p',x:'组织应保持每一医疗器械类型或医疗器械族的设计和开发文件，此文件应包括或引用为证实符合设计和开发要求所产生的记录，以及设计和开发变更的记录。'},
]},
{id:'7.4',num:'7.4',title:'采购',blocks:[
  {t:'p',x:'包括采购过程、采购信息、采购产品的验证（7.4.1–7.4.3）。'},
]},
{id:'7.4.1',num:'7.4.1',title:'采购过程',blocks:[
  {t:'p',x:'组织应形成文件的程序 (见 4.2.4)，以确保采购的产品符合规定的采购信息。'},
  {t:'p',x:'组织应建立评价和选择供方的准则，准则应：'},
  {t:'ul',items:[
    'a) 基于供方提供符合组织要求产品的能力；',
    'b) 基于供方的绩效；',
    'c) 基于采购产品对医疗器械质量的影响；',
    'd) 与医疗器械有关风险相一致。',
  ]},
  {t:'p',x:'组织应对供方的监视和再评价进行策划。采购产品满足要求方面的供方绩效应予以监视。监视的结果应作为供方再评价过程的输入。应表述不满足的采购要求和相应的有对应风险的采购产品的供方，并符合适用的法规要求。'},
  {t:'p',x:'对供方评价的结果、选择、监视和再评价的记录或因这些活动所采取的任何必要措施的记录应予保持 (见 4.2.5)。'},
]},
{id:'7.4.2',num:'7.4.2',title:'采购信息',blocks:[
  {t:'p',x:'采购信息应表述或引用拟采购的产品，适当时包括：'},
  {t:'ul',items:[
    'a) 产品规范；',
    'b) 产品接受准则、程序、过程和设备的要求；',
    'c) 供方人员资质的要求；',
    'd) 质量管理体系的要求。',
  ]},
  {t:'p',x:'在与供方沟通前，组织应确保所规定的采购要求是充分与适宜的。适当时，任何影响采购产品符合规定采购要求的能力的变更，在实施之前，采购信息应包含书面的协议，由供方告知组织采购产品的变化。按照 7.5.9 规定的可追溯性要求的程度，组织应以文件(见 4.2.4)和记录(见 4.2.5)的形式保持相关的采购信息。'},
]},
{id:'7.4.3',num:'7.4.3',title:'采购产品的验证',blocks:[
  {t:'p',x:'组织应建立并实施检验或其他必要的活动，以确保采购的产品满足规定的采购要求。验证活动的范围和程度应基于供方的评价结果和与采购产品的风险相一致。'},
  {t:'p',x:'当组织意识到采购产品发生任何变化时，组织应确定这些变化是否影响产品实现过程或医疗器械。当组织或其顾客拟在供方的现场实施验证时，组织应在采购信息中对拟验证的安排和产品放行的方法作出规定。应保持验证记录 (见 4.2.5)。'},
]},
{id:'7.5',num:'7.5',title:'生产和服务提供',blocks:[
  {t:'p',x:'包括生产和服务提供的控制、产品清洁、安装活动、服务活动、无菌医疗器械专用要求、过程确认、灭菌和无菌屏障系统确认、标识、可追溯性、顾客财产、产品防护（7.5.1–7.5.11）。'},
]},
{id:'7.5.1',num:'7.5.1',title:'生产和服务提供的控制',blocks:[
  {t:'p',x:'为确保产品符合规范，应对生产和服务的提供进行策划、实施、监视和控制。适当时，生产控制应包括，但不限于：'},
  {t:'ul',items:[
    'a) 用于生产控制的程序/方法的文件 (见 4.2.4)；',
    'b) 经认定的基础设施；',
    'c) 对过程参数和产品特性进行监视和测量；',
    'd) 获得和使用监视和测量装置；',
    'e) 按照规定进行标签和包装操作；',
    'f) 放行、交付和交付后活动的实施。',
  ]},
  {t:'p',x:'组织应建立并保持每一（或一批）医疗器械的记录 (见 4.2.5)，以提供 7.5.9 中规定的可追性的范围和程度的记录，并标明生产数量和批准销售的数量。记录应经过验证和批准。'},
]},
{id:'7.5.2',num:'7.5.2',title:'产品的清洁',blocks:[
  {t:'p',x:'组织应使产品清洁或产品污染控制的要求形成文件，如果：'},
  {t:'ul',items:[
    'a) 在灭菌和或使用前由组织进行产品清洁；',
    'b) 以非无菌形式提供的和在灭菌或使用先进行清洁处理的产品；',
    'c) 在灭菌或使用前不能被清洁的产品，使用时清洁是至关重要的；',
    'd) 以非无菌形式提供的产品，其清洁是至关重要的；',
    'e) 制造过程中从产品中除去加工助剂。',
  ]},
  {t:'p',x:'如产品是按照上述 a) 或 b) 要求进行清洁的，则在清洁处理前不必满足 6.4.1 要求。'},
]},
{id:'7.5.3',num:'7.5.3',title:'安装活动',blocks:[
  {t:'p',x:'适当时，组织应将医疗器械安装和安装验证接收准则的要求形成文件。如果经同意的顾客要求允许除组织或其供方以外的外部方安装医疗器械时，则组织应对医疗器械安装和安装验证提供形成文件的要求。应保持由组织或其供方完成的安装和验证记录 (见 4.2.5)。'},
]},
{id:'7.5.4',num:'7.5.4',title:'服务活动',blocks:[
  {t:'p',x:'在规定有服务要求的情况下，必要时，组织应建立用于服务提供活动并验证该服务是否满足规定要求的形成文件的程序、参考材料和测量程序。'},
  {t:'p',x:'组织应分析组织或其供方实施服务活动的记录：'},
  {t:'ul',items:[
    'a) 确定信息是否作为抱怨进行处理；',
    'b) 适当时，作为改进过程的输入。',
  ]},
  {t:'p',x:'应保持组织或其供方所开展的服务活动的记录 (见 4.2.5)。'},
]},
{id:'7.5.5',num:'7.5.5',title:'无菌医疗器械的专用要求',blocks:[
  {t:'p',x:'组织应保持每一灭菌批的灭菌过程参数记录 (见 4.2.5)，灭菌记录应可追溯到医疗器械的每一生产批。'},
]},
{id:'7.5.6',num:'7.5.6',title:'生产和服务提供过程的确认',blocks:[
  {t:'p',x:'当生产和服务提供过程的输出不能或没有被后续的监视或测量加以验证时，因此，缺陷在产品使用中或服务已交付之后才会显现。确认应能证实这些过程持续实现所策划的结果的能力。'},
  {t:'p',x:'组织应将过程的确认程序形成文件，包括：'},
  {t:'ul',items:[
    'a) 为过程的评审和批准所规定的准则；',
    'b) 设备的鉴定和人员资质；',
    'c) 使用特定的方法、程序和接受准则；',
    'd) 适当时，为确定抽样量所采用的统计技术与原理；',
    'e) 记录的要求 (见 4.2.5)；',
    'f) 再确认，包括再确认的准则；',
    'g) 过程变更的批准。',
  ]},
  {t:'p',x:'组织应将用于生产和服务提供中的计算软件的确认形成文件化的程序。此软件的确认应在初次使用前确认，适当时，在此软件发生变更或应用后。与软件确认和再确认的特定方法和活动应与应用此软件有关的风险相一致，包括对产品符合规范能力的影响。确认的必要措施和确认的结果和结论的记录应予以保持 (见 4.2.4 和 4.2.5)。'},
]},
{id:'7.5.7',num:'7.5.7',title:'灭菌和无菌屏障系统的过程确认',blocks:[
  {t:'p',x:'组织应将灭菌和无菌屏障系统的过程确认的程序形成文件 (见 4.2.4)。适当时，灭菌过程和无菌屏障系统应在实施前以及随后产品或过程变更之前经过确认。'},
  {t:'p',x:'确认结果和结论以及因确认所采取的必要措施的记录应予以保持 (见 4.2.4 和 4.2.5)。'},
  {t:'note',x:'注：进一步信息见 ISO 11607-1 和 ISO 11607-2。'},
]},
{id:'7.5.8',num:'7.5.8',title:'标识',blocks:[
  {t:'p',x:'组织应将产品标识的程序形成文件，并在产品实现的全过程中使用适宜的方法识别产品。在产品实现的全过程中，组织应根据监视测量的要求识别产品状态。在产品的整个生产、贮存、安装和服务过程中，应保持产品的状态标识，以确保只有通过必需的检验和试验或经授权让步放行的产品才能被发送、使用或安装。'},
  {t:'p',x:'若有适用的法规要求规定，组织应对分配医疗器械唯一性标识的系统形成文件。组织应形成文件的程序，以确保返回组织的医疗器械均能被识别，且能与合格的产品区分开来。'},
]},
{id:'7.5.9',num:'7.5.9',title:'可追溯性',blocks:[
  {t:'p',x:'包括总则、植入性医疗器械的专项要求（7.5.9.1、7.5.9.2）。'},
]},
{id:'7.5.9.1',num:'7.5.9.1',title:'可追溯性 — 总则',blocks:[
  {t:'p',x:'组织应将可追溯性程序形成文件，这些程序应规定符合适用的法规要求的可追溯性的范围、程序和所保持的记录 (见 4.2.5)。'},
]},
{id:'7.5.9.2',num:'7.5.9.2',title:'可追溯性 — 植入性医疗器械专项',blocks:[
  {t:'p',x:'可追溯性所要求的记录，应包括可能导至医疗器械不满足其规定的安全和性能要求的组件、材料和所采用的工作环境条件的记录。'},
  {t:'p',x:'组织应要求分售服务的供方或经销商保持医疗器械分销记录以便追溯，当检查需要时，可获得此记录。货运包装收件人的名字和地址的记录应予以保持 (见 4.2.5)。'},
]},
{id:'7.5.10',num:'7.5.10',title:'顾客财产',blocks:[
  {t:'p',x:'当顾客财产在组织的控制或使用下，组织应识别、验证、保护和维护供其使用的或构成产品一部分的顾客财产。如果顾客材料发生丢失、损坏或发现不适用情况时，应报告顾客，并保持纪录 (见 4.2.5)。'},
]},
{id:'7.5.11',num:'7.5.11',title:'产品防护',blocks:[
  {t:'p',x:'在加工、贮存、处理和销售中，组织应对产品符合要求的防护程序形成文件。防护应适用于医疗器械的组成部分。'},
  {t:'p',x:'在加工、贮存、处理和分销中，当产品暴露在预期处境和危害时，组织应通过以下方面来保护产品避免改变、污染或损坏：'},
  {t:'ul',items:[
    'a) 设计和构建适当的包装和货运容器；',
    'b) 如果仅用包装不能提供防护，应对所需的特殊条件要求形成文件。',
  ]},
  {t:'p',x:'如果有特殊条件要求，则应被控制和记录 (见 4.2.5)。'},
]},
{id:'7.6',num:'7.6',title:'监视和测量装置的控制',blocks:[
  {t:'p',x:'组织应确定监视和测量以及所需的监视和测量装置，为产品符合确定的要求提供证据。'},
  {t:'p',x:'组织应将程序形成文件，以确保监视和测量活动可行并以与监视和测量的要求相一致的方式实施。'},
  {t:'p',x:'为确保结果有效，必要时，测量设备应：'},
  {t:'ul',items:[
    'a) 对照能溯源到国际和/或国家标准的测量标准，按照规定的时间间隔或在使用前进行校准或检定。当不存在上述标准时，应记录校准或检定的依据 (见 4.2.5)；',
    'b) 进行调整或必要时再调整；这样的调整或再调整应予以记录 (见 4.2.5)；',
    'c) 获得标识，以确定其校准状态；',
    'd) 防止可能使测量结果失效的调整；',
    'e) 在搬运、维护和贮存期间防止损坏或失效。',
  ]},
  {t:'p',x:'组织应依据所形成文件的程序进行校准或验证。此外，当发现设备不符合要求时，组织应对以往测量结果的有效性进行评价和记录，并对该设备和任何受影响的产品采取适当的措施。校准和检定结果的记录应予以保持 (见 4.2.5)。'},
  {t:'p',x:'组织应对用于监视测量要求的计算机软件的应用确认的程序形成文件。这类软件应在初次使用前进行确认，适当时，在这类软件变更后或应用时进行确认。软件确认和再确认有关的特定方法和活动应与软件使用相关的风险保持一致，包括对产品符合规范能力的影响在内的风险。结果和确认的结论以及因确认所采取的必要措施的记录应予以保持 (见 4.2.4 和 4.2.5)。'},
  {t:'note',x:'注：进一步信息见 ISO 10012。'},
]},

/* ===== 第8章 测量、分析和改进 ===== */
{id:'8',num:'8',title:'测量、分析和改进（Measurement, analysis and improvement）',blocks:[
  {t:'p',x:'包括总则、监视和测量、不合格品控制、数据分析、改进（8.1–8.5）。'},
]},
{id:'8.1',num:'8.1',title:'总则',blocks:[
  {t:'p',x:'组织应策划并实施以下方面所需的监视、测量、分析和改进过程：'},
  {t:'ul',items:[
    'a) 证实产品的符合性；',
    'b) 确保质量管理体系的符合性；',
    'c) 保持质量管理体系的有效性。',
  ]},
  {t:'p',x:'这应包括对统计技术在内的适当方法及其应用程度的确定。'},
]},
{id:'8.2',num:'8.2',title:'监视和测量',blocks:[
  {t:'p',x:'包括反馈、抱怨处理、向监管机构报告、内部审核、过程的监视和测量、产品的监视和测量（8.2.1–8.2.6）。'},
]},
{id:'8.2.1',num:'8.2.1',title:'反馈',blocks:[
  {t:'p',x:'作为对质量管理体系业绩的一种测量，组织应对有关组织是否已满足顾客要求的信息进行监视和收集。应将获取和利用这种信息的方法形成文件。'},
  {t:'p',x:'组织应将反馈系统的程序形成文件。这样的反馈过程应包括收集来自于生产和生产后活动数据的规定。反馈过程所收集的信息应能为监视和保持产品要求以及产品实现或改进过程提供风险管理潜在的输入。如果适用法规要求组织获得来自生产后活动的特定经验，此经验的评审应构成反馈过程的一部分。'},
]},
{id:'8.2.2',num:'8.2.2',title:'抱怨处理',blocks:[
  {t:'p',x:'组织应将依据适用的法规要求及时处理抱怨的程序形成文件。这些程序应至少包含以下要求和职责：'},
  {t:'ul',items:[
    'a) 接收和记录信息；',
    'b) 评价信息以确定反馈是否构成抱怨；',
    'c) 调查抱怨；',
    'd) 确定将信息报告给适当的监管机构的需求；',
    'e) 处理与抱怨相关产品；',
    'f) 确定开展纠正或纠正措施的需求。',
  ]},
  {t:'p',x:'如果抱怨未经调查，应将其理由形成文件。任何因抱怨处理过程所产生的纠正或纠正措施应形成文件。如果调查确定抱怨是组织外的活动所致，相关信息应在组织和相关外部方之间交换。抱怨处理记录应予保持 (见 4.2.5)。'},
]},
{id:'8.2.3',num:'8.2.3',title:'向监管机构报告',blocks:[
  {t:'p',x:'如果适用的法规要求将符合规定的不良事件报告准则的抱怨进行告示或发布忠告性通知，组织应通知适当的监管机构的程序形成文件。报告监管机构的记录应予保持 (见 4.2.5)。'},
]},
{id:'8.2.4',num:'8.2.4',title:'内部审核',blocks:[
  {t:'p',x:'组织应按策划的时间间隔进行内部审核，以确定质量管理体系是否：'},
  {t:'ul',items:[
    'a) 符合策划和文件化的安排、本标准的要求以及组织所建立的质量管理体系的要求和适用的法规要求；',
    'b) 得到有效实施与保持。',
  ]},
  {t:'p',x:'组织应将程序形成文件，以表述策划、实施审核以及报告审核结果的职责和要求。考虑拟受审区域和过程的状态和重要性以及以往审核的结果，应对审核方案进行策划。应规定和记录审核的准则、范围、间隔和方法 (见 4.2.5)，审核员的选择和审核的实施应确保审核过程的客观性和公正性。审核员不应审核自己的工作。'},
  {t:'p',x:'审核及其结果的记录，包含过程的识别和受审核区域及其结论的记录，应予以保持 (见 4.2.5)。负责受审区域的管理者应确保及时采取任何必要的纠正和纠正措施，以消除所发现的不合格及其原因。跟踪活动应包括对所采取措施的验证和验证结果的报告。'},
  {t:'note',x:'注：进一步信息见 ISO 19011。'},
]},
{id:'8.2.5',num:'8.2.5',title:'过程的监视和测量',blocks:[
  {t:'p',x:'组织应采用适宜的方法对质量管理体系过程进行监视，适当时，对质量管理体系过程进行测量。这些方法应证实过程实现所策划结果的能力。当未达到所策划的结果时，适当时，应采取纠正和纠正措施。'},
]},
{id:'8.2.6',num:'8.2.6',title:'产品的监视和测量',blocks:[
  {t:'p',x:'组织应对产品的特性进行监视和测量，以验证产品要求已得到满足。这种监视和测量应依据所策划的文件化的安排和文件化的程序，在产品实现过程的适当阶段进行。'},
  {t:'p',x:'应保持符合接收准则的证据。授权放行产品的人员身份应予以记录 (见 4.2.5)。适当时，记录应识别用于开展测量活动的测试设备。只有在已策划的文件化的安排已圆满完成时，才能放行产品和交付服务。对于植入性医疗器械，组织应记录检验和试验人员的身份。'},
]},
{id:'8.3',num:'8.3',title:'不合格品的控制',blocks:[
  {t:'p',x:'包括总则、交付前/交付后不符合产品的响应措施、返工（8.3.1–8.3.4）。'},
]},
{id:'8.3.1',num:'8.3.1',title:'不合格品控制 — 总则',blocks:[
  {t:'p',x:'组织应确保不符合产品要求的产品得到识别和控制，以防止其非预期的使用或交付。组织应将规定不合格品控制以及规定不合格品识别、文件证明、隔离、评价和处置不合格品相关职责和权限的程序形成文件。'},
  {t:'p',x:'不合格的评价应包括决定采取调查的需求和通知对此不合格负责的任何外部方。应保持不合格的性质以及随后采取任何措施的记录，包括评价、任何调查和决定理由的记录 (见 4.2.5)。'},
]},
{id:'8.3.2',num:'8.3.2',title:'交付前不符合产品的响应措施',blocks:[
  {t:'p',x:'组织应按以下一个或多个方式处理不合格品：'},
  {t:'ul',items:[
    'a) 采取措施消除已发现的不合格；',
    'b) 采取措施防止其原预期使用或应用；',
    'c) 授权让步使用、放行或接受不合格品。',
  ]},
  {t:'p',x:'组织应确保不合格品仅在已提供其合理性、获得批准并且满足适用的法规要求情况下，才能实施让步接收。让步接受和授权让步人员身份的记录应予以保持 (见 4.2.5)。'},
]},
{id:'8.3.3',num:'8.3.3',title:'交付后不符合产品的响应措施',blocks:[
  {t:'p',x:'当交付或开始使用后发现不合格品时，组织应采取与不合格的影响或潜在影响相适应的措施。采取措施的记录应予以保持 (见 4.2.5)。'},
  {t:'p',x:'组织应将符合适用的法规要求所发布的忠告性通知的程序形成文件。这些程序应能随时实施。与发布忠告性通知有关的措施记录应予以保持 (见 4.2.5)。'},
]},
{id:'8.3.4',num:'8.3.4',title:'返工',blocks:[
  {t:'p',x:'基于返工对产品潜在的不利影响的考虑，组织应依据文件化的程序实施返工。这些（返工）程序应经历和原程序相同的评审和批准。返工结束后，产品应经过验证以确保其符合适用的接收准则和法规要求。应保持返工的记录 (见 4.2.5)。'},
]},
{id:'8.4',num:'8.4',title:'数据分析',blocks:[
  {t:'p',x:'组织应将确定、收集和分析适当的数据，以证实质量管理体系的适宜性和有效性的程序形成文件。程序应包含统计技术及其应用范围和程度在内的适当方法的确定。'},
  {t:'p',x:'数据分析应包括由监视测量所产生的数据和其他相关来源的数据，至少包括以下方面的输入：'},
  {t:'ul',items:[
    'a) 反馈；',
    'b) 与产品要求的符合性；',
    'c) 过程和产品的特性及趋势，包括采取预防措施的机会；',
    'd) 供方；',
    'e) 审核；',
    'f) 适当时，服务报告。',
  ]},
  {t:'p',x:'如果数据分析显示质量管理体系不适宜，不充分或不有效，组织应按 8.5 的要求将此分析作为改进的输入。数据分析结果的记录应予保持 (见 4.2.5)。'},
]},
{id:'8.5',num:'8.5',title:'改进',blocks:[
  {t:'p',x:'包括总则、纠正措施、预防措施（8.5.1–8.5.3）。'},
]},
{id:'8.5.1',num:'8.5.1',title:'改进 — 总则',blocks:[
  {t:'p',x:'组织应利用质量方针、质量目标、审核结果、上市后监督、数据分析、纠正和预防措施以及管理评审来识别和实施任何必要的更改，以确保和保持质量管理体系的持续适宜性、充分性和有效性以及医疗器械的安全和性能。'},
]},
{id:'8.5.2',num:'8.5.2',title:'纠正措施',blocks:[
  {t:'p',x:'组织应采取措施，以消除不合格的原因，防止不合格的再发生。应及时采取任何必要的纠正措施。纠正措施应与所遇到不合格的影响程度相适应。'},
  {t:'p',x:'组织应编制形成文件的程序，以规定以下方面的要求：'},
  {t:'ul',items:[
    'a) 评审不合格(包括顾客抱怨)；',
    'b) 确定不合格的原因；',
    'c) 评价确保不合格不再发生的措施的需求；',
    'd) 策划并对所需的措施形成文件，实施措施，适当时，包括更新文件；',
    'e) 验证纠正措施未对满足适用的法规要求的能力或医疗器械的安全和性能带来不利影响；',
    'f) 评审所采取的纠正措施的有效性。',
  ]},
  {t:'p',x:'任何调查和采取措施的记录应予保持 (见 4.2.5)。'},
]},
{id:'8.5.3',num:'8.5.3',title:'预防措施',blocks:[
  {t:'p',x:'组织应确定措施，以消除潜在不合格的原因，防止不合格发生。预防措施应与潜在问题的影响程度相适应。'},
  {t:'p',x:'组织应形成文件的程序，以描述以下要求：'},
  {t:'ul',items:[
    'a) 确定潜在不合格及其原因；',
    'b) 评价防止不合格发生的措施的需求；',
    'c) 策划并对所需的措施形成文件，实施措施，适当时，包括更新文件；',
    'd) 验证纠正措施未对满足适用的法规要求的能力或医疗器械的安全和性能带来不利影响；',
    'e) 适当时，评审所采取的预防措施的有效性。',
  ]},
  {t:'p',x:'任何调查和采取的措施的记录应予保持 (见 4.2.5)。'},
]},

/* ===== 附录A ===== */
{id:'附录A',num:'附录A',title:'附录A（资料性）ISO 13485:2003 与 2016 对比',blocks:[
  {t:'p',x:'本附录（表 A.1）概述第 3 版（2016）与第 2 版（2003）之间的主要变化。以下为关键变化摘要：'},
  {t:'ul',items:[
    '前言 / 引言：强调供应商或外部组织也可在合同要求或自愿情况下采用；明确组织在质量管理法规要求方面的责任；新增过程方法说明、与 ISO 9001 的关系（附录 B）。',
    '1 范围：强调产品安全性和性能；新增两个对质量管理体系的影响因素；阐明“形成文件”包括建立、实施和维护；“产品”适用于顾客需求或产品实现过程的输出；限制“法规要求”的应用范围。',
    '3 术语和定义：增加若干新定义（如忠告性通知、授权代表、临床评价、抱怨、经销商、植入性医疗器械、进口商、标记、寿命期、制造商、医疗器械、医疗器械族、性能评价、上市后监督、采购的产品、风险、风险管理、无菌屏障系统、无菌医疗器械），并重新定义部分旧定义。',
    '4.1 总要求：新增基于风险控制的适当过程、过程变更要求、软件确认要求、文件控制中的记录控制。',
    '4.2 文件要求：列出医疗器械文件清单；新增健康隐私信息保护、文件丢失或损坏的要求。',
    '5.6 管理审评：增加文件化要求与“记录计划时间间隔”的评审要求；扩充输入和输出清单（含抱怨处理、向监管机构报告、适用的新/修订法规要求等）。',
    '6.2 人力资源：新增人员能力、意识及培训的文件化过程要求。',
    '6.3 基础设施：增加防止产品混乱、有序处理、后勤服务信息化要求。',
    '6.4 工作环境和污染控制：增加工作环境文件要求；新增无菌医疗器械的微生物/微粒污染控制要求。',
    '7.1 / 7.2 / 7.3：扩充产品实现策划、与顾客有关过程、设计和开发各子条款的清单与文件要求（新增 7.3.8 设计与开发转化、7.3.10 设计与开发文件；强化验证/确认计划、接口考虑、变更控制等）。',
    '7.4 采购：供应商选择更注重对产品质量和风险的影响；新增供应商监视/再评价、不符合应对措施、采购记录细节、变更通知。',
    '7.5 生产和服务提供：细化控制要求；新增安装、服务、无菌、灭菌和无菌屏障系统确认、唯一性标识、可追溯性（含植入性专项）等要求。',
    '8.2 反馈 / 抱怨 / 监管报告：明确反馈来自生产和生产后行为，并纳入风险管理；新增抱怨处理、向监管机构报告子条款。',
    '8.3 不合格品控制：新增特许权要求；区分交付前/交付后处理；新增忠告性通知记录要求。',
    '8.5.2 / 8.5.3：增加纠正/预防措施不得带来不利影响的验证要求、及时采取要求。',
  ]},
]},

/* ===== 附录B ===== */
{id:'附录B',num:'附录B',title:'附录B（资料性）ISO 13485:2016 与 ISO 9001:2015 对应关系',blocks:[
  {t:'p',x:'本附录（表 B.1）给出 ISO 13485:2016 与 ISO 9001:2015 的条款对应关系。由于 ISO 13485 基于 ISO 9001:2008 并删减了不适于法规要求的条款，许多医疗器械专用要求（如忠告性通知、抱怨、可追溯性、无菌、软件确认）在 ISO 9001:2015 中没有等同条款。主要对应如下：'},
  {t:'ul',items:[
    '1 范围 ↔ 1 范围',
    '4 质量管理体系 ↔ 4 组织的背景（4.1 理解组织及其环境、4.2 相关方、4.3 确定范围、4.4 体系及其过程）',
    '4.1 总要求 ↔ 4.4 质量管理体系及其过程',
    '4.2 文件要求 ↔ 4.4 / 7.5 文件信息（7.5.1 总则、7.5.2 创建和更新、7.5.3 控制）',
    '4.2.2 质量手册 ↔ 无直接等同（部分对应 8.4 / 7.5）',
    '5 管理职责 ↔ 4.3 / 5 领导（5.1 领导承诺、5.2 质量方针、5.3 角色职责权限）',
    '5.4 策划 ↔ 6 策划（6.1 风险、6.2 质量目标、6.3 变更策划）',
    '5.5 职责权限沟通 ↔ 5.3 / 7.4 沟通',
    '5.6 管理审评 ↔ 9.3 管理审评（9.3.1 总则、9.3.2 输入、9.3.3 输出）',
    '6 资源管理 ↔ 7.1 资源（7.1.1 总则、7.1.2 人、7.1.3 基础设施、7.1.4 过程作业环境、7.1.5 监视测量资源）',
    '7.1 产品实现策划 ↔ 8.1 运作策划和控制',
    '7.2 与顾客有关过程 ↔ 8.2 产品和服务要求（8.2.1 顾客沟通、8.2.2/8.2.3 确定与评审、8.2.4 变更）',
    '7.3 设计和开发 ↔ 8.3 产品和服务的设计和开发（8.3.1–8.3.6）',
    '7.4 采购 ↔ 8.4 外部供应产品和服务的控制（8.4.1–8.4.3）',

/* 收藏 / 进度 / 主题 持久化 */
const LS = {
  get(k,d){try{return JSON.parse(localStorage.getItem('iso13_'+k))??d;}catch(e){return d;}},
  set(k,v){localStorage.setItem('iso13_'+k,JSON.stringify(v));}

/* 全文搜索（在所有条款文本中检索） */
function clauseText(c){
  return c.blocks.map(b=>{
    if(b.t==='ul') return b.items.map(it=>typeof it==='string'?it:(it.items?it.items.join(' '):'')).join(' ');
    return b.x||'';
  }).join(' ');
}
function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- 侧栏导航 ---------- */
function buildNav(filter=''){
  const nav = $('#nav'); nav.innerHTML='';
  GROUPS.forEach(g=>{
    const items = (groupOf[g.key]||[]).filter(c=>{
      if(!filter) return true;
      const f=filter.toLowerCase();
      return c.num.toLowerCase().includes(f)||c.title.toLowerCase().includes(f)||clauseText(c).toLowerCase().includes(f);
    });
    if(!items.length) return;
    const open = filter? true : LS.get('open_'+g.key,true);
    const gp = document.createElement('div'); gp.className='nav-group';
    const badge = {前言:'前','引言':'0','附录A':'A','附录B':'B','参考资料':'R'}[g.key] || g.key;
    const chap = document.createElement('div'); chap.className='nav-chap'+(open?' open':'');
    chap.innerHTML = `<span class="num">${badge}</span>
      <span class="ttl">${g.label}</span><span class="cnt">${items.length}</span><span class="arrow">▶</span>`;
    const box = document.createElement('div'); box.className='nav-items'+(open?' open':'');
    items.forEach(c=>{
      const it = document.createElement('div');
      it.className='nav-item'+(stars.includes(c.id)?' starred':'');
      it.dataset.id=c.id;
      it.innerHTML=`<span class="id">${c.num}</span><span class="it">${c.title}</span>
        <span class="star" data-star="${c.id}" title="收藏">${stars.includes(c.id)?'★':'☆'}</span>`;
      it.addEventListener('click',e=>{
        if(e.target.dataset.star){toggleStar(c.id);return;}
        goto(c.id);
      });
      box.appendChild(it);
    });
    chap.addEventListener('click',()=>{
      const isOpen=box.classList.toggle('open'); chap.classList.toggle('open',isOpen);
      LS.set('open_'+g.key,isOpen);
    });
    gp.appendChild(chap); gp.appendChild(box); nav.appendChild(gp);
  });
}

/* ---------- 渲染条款内容 ---------- */
function renderBlocks(blocks, highlight=''){
  const re = highlight? new RegExp('('+escapeRe(highlight)+')','gi') : null;
  const hl = t=> re? t.replace(re,'<mark>$1</mark>') : escapeHtml(t);
  let html='';
  blocks.forEach(b=>{
    if(b.t==='p'){ html+=`<p>${hl(b.x)}</p>`; }
    else if(b.t==='note'){ html+=`<div class="block"><div class="note">${hl(b.x)}</div></div>`; }
    else if(b.t==='ul'){ html+=renderList(b,hl); }
  });
  return html;
}
function renderList(ul,hl){
  const letter=/^[a-z]\s*[）)、]/i;
  let html='<ul class="l">';
  ul.items.forEach(it=>{
    if(typeof it==='string'){
      const k = it.match(/^([a-z])\s*[）)、]/i)? it.match(/^([a-z])\s*[）)、]/i)[1]+'）'
               : it.match(/^(\d+)\s*[）)、.]/)? it.match(/^(\d+)\s*[）)、.]/)[1]+'）' : '';
      const content = k? it.slice(it.indexOf(k)+k.length).trim() : it;
      html+=`<li data-k="${k||'·'}">${hl(content)}</li>`;
    } else if(it.t==='ul'){
      html+=renderList(it,hl).replace('<ul class="l">','<ul class="l l2">');
    }
  });
  html+='</ul>';
  return html;
}

/* ---------- 跳转 / 显示条款 ---------- */
let currentId=null, currentHl='';
function goto(id, hl=''){
  const c = byId(id); if(!c) return;
  currentId=id; currentHl=hl; LS.set('last',id);
  if(!read.includes(id)){read.push(id);LS.set('read',read);}
  if($('#drawer').dataset.panel==='search') closeDrawer();
  recent = [id, ...recent.filter(r=>r!==id)].slice(0,12); LS.set('recent',recent);
  const g = topGroup(c);
  const gLabel = (GROUPS.find(x=>x.key===g)||{}).label||'';
  $('#breadcrumb').innerHTML = `<a onclick="goto('${id}')">知识库</a> <span>›</span> <b>${gLabel}</b> <span>›</span> <b>${c.num} ${c.title}</b>`;
  $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  const idx = CLAUSES.findIndex(x=>x.id===id);
  const prev = CLAUSES[idx-1], next = CLAUSES[idx+1];
  const reqCount = (clauseText(c).match(/应/g)||[]).length;
  $('#content').innerHTML = `
    <div class="clause-head">
      <div class="clause-num">${c.num}</div>
      <div class="clause-title"><h1>${c.title}</h1>
        <div class="sub">${gLabel} · 含“应”要求 ${reqCount} 处 · ${read.includes(id)?'已读':'未读'}</div></div>
      <div class="clause-actions">
        <button class="mini-btn" id="copyBtn">📋 复制</button>
        <button class="mini-btn ${stars.includes(id)?'on':''}" id="starBtn">${stars.includes(id)?'★ 已收藏':'☆ 收藏'}</button>
        <button class="mini-btn" id="hlBtn">✨ 高亮要求</button>
      </div>
    </div>
    <div id="clauseBody">${renderBlocks(c.blocks, hl)}</div>
    <div class="pager">
      ${prev?`<a class="prev" onclick="goto('${prev.id}')"><span class="pl">← 上一条</span><span class="pt">${prev.num} ${prev.title}</span></a>`:'<span></span>'}
      ${next?`<a class="next" onclick="goto('${next.id}')"><span class="pl">下一条 →</span><span class="pt">${next.num} ${next.title}</span></a>`:'<span></span>'}
    </div>`;
  $('#copyBtn').addEventListener('click',()=>{
    const txt = `${c.num} ${c.title}\n\n`+clauseText(c);
    navigator.clipboard.writeText(txt).then(()=>toast('已复制到剪贴板'));
  });
  $('#starBtn').addEventListener('click',()=>{toggleStar(id); goto(id,currentHl);});
  $('#hlBtn').addEventListener('click',()=>highlightReq());
  $('#content').scrollTop=0;
  if(window.innerWidth<=900) $('#aside').classList.add('collapsed');
  updateProgress();
}
function highlightReq(){
  const body=$('#clauseBody'); if(!body) return;
  if(body.dataset.hl==='1'){ goto(currentId,currentHl); body.dataset.hl='0'; return; }
  body.querySelectorAll('p,li,.note').forEach(node=>{
    node.innerHTML = node.innerHTML.replace(/应/g,'<span class="req-em">应</span>');
  });
  body.dataset.hl='1';
  toast('已高亮“应”要求条款');
}

/* ---------- 收藏 ---------- */
function toggleStar(id){
  if(stars.includes(id)) stars=stars.filter(s=>s!==id);
  else stars.push(id);
  LS.set('stars',stars);
  const it=document.querySelector(`.nav-item[data-id="${id}"]`);
  if(it){it.classList.toggle('starred',stars.includes(id));
    const s=it.querySelector('.star'); if(s)s.textContent=stars.includes(id)?'★':'☆';}
  buildNav($('#navFilter').value);
  if($('#drawer').dataset.panel==='star') openStars();
}

/* ---------- 进度 ---------- */
function updateProgress(){
  const pct = Math.round(read.length/CLAUSES.length*100);
  $('#progress').style.width = pct+'%';
  $('#progress').title = `已读 ${read.length}/${CLAUSES.length}`;
}

/* ---------- 抽屉面板 ---------- */
function openDrawer(title,panel,html){
  $('#drawerTitle').textContent=title;
  $('#drawerBody').innerHTML=html;
  $('#drawer').classList.add('open');
  $('#drawer').dataset.panel=panel;
  $('#mask').classList.add('show');
}
function closeDrawer(){$('#drawer').classList.remove('open');$('#mask').classList.remove('show');$('#drawer').dataset.panel='';}
function openStars(){
  let h = stars.length? '' : '<div class="empty">还没有收藏任何条款。<br>点击条款右上角的 ☆ 即可收藏。</div>';
  stars.forEach(id=>{const c=byId(id); if(c) h+=`<div class="result" onclick="goto('${id}')"><div class="rid">${c.num}</div><div class="rt">${c.title}</div></div>`;});
  openDrawer(`⭐ 我的收藏（${stars.length}）`,'star',h);
}
function openGloss(){
  let h='<input id="glSearch" placeholder="搜索术语…" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);margin-bottom:12px;outline:none">';
  GLOSSARY.forEach(([t,d])=>{h+=`<div class="term" data-t="${t}"><b>${t}</b><p>${d}</p></div>`;});
  openDrawer('📖 术语表（第3章）','gloss',h);
  const gs=$('#glSearch'); if(gs) gs.addEventListener('input',()=>{
    const v=gs.value.toLowerCase();
    $$('#drawerBody .term').forEach(t=>t.style.display = t.dataset.t.toLowerCase().includes(v)?'':'none');
  });
}
function openGraph(){
  let h=`
  <div class="diagram-wrap">
    <h4>📊 过程方法与 ISO 13485 结构</h4>
    <div class="svg-box">${svgPDCA()}</div>
    <div class="legend">图：第 4–8 章如何构成“策划—实施—检查—处置”在医疗器械 QMS 中的应用</div>
  </div>
  <div class="diagram-wrap">
    <h4>🔗 单一过程要素</h4>
    <div class="svg-box">${svgProcess()}</div>
    <div class="legend">图：每个过程均有输入、活动、输出及监视/测量检查点</div>
  </div>
  <div class="diagram-wrap">
    <h4>🧭 ISO 13485 的七大核心关注点</h4>
    <ul class="l">${PRINCIPLES.map(p=>`<li data-k="•"><b>${p[0]}</b>：${p[1]}</li>`).join('')}</ul>
  </div>
  <div class="diagram-wrap">
    <h4>🔁 ISO 13485:2016 ↔ ISO 9001:2015 关系</h4>
    <div class="maprow"><span class="a">基础</span><span class="b">基于 ISO 9001:2008 的独立标准；附录 B 给出与 ISO 9001:2015 的条款对照</span></div>
    <div class="maprow"><span class="a">删减</span><span class="b">删去 ISO 9001 中不适于法规要求的条款 → 符合 13485 不等于符合 9001</span></div>
    <div class="maprow"><span class="a">专用要求</span><span class="b">忠告性通知、抱怨处理、监管报告、可追溯性、无菌/灭菌确认、软件确认等无 ISO 9001 等同条款</span></div>
    <div class="maprow"><span class="a">对应关系</span><span class="b">4→4.4；5→5；6→7.1；7→8；8→9；8.5→10（详见附录 B）</span></div>
  </div>`;
  openDrawer('🗺️ 结构图谱','graph',h);
}
function openQuiz(){
  let h=`<p style="color:var(--text3);font-size:13px;margin-bottom:12px">共 ${QUIZ.length} 题，点击选项查看答案与解析。</p>`;
  QUIZ.forEach((q,i)=>{
    h+=`<div class="quiz-q" data-i="${i}"><div class="qt">Q${i+1}. ${q.q}</div>`;
    q.o.forEach((o,j)=>{h+=`<label data-j="${j}">${String.fromCharCode(65+j)}. ${o}</label>`;});
    h+=`<div class="exp">✅ 正确答案：${String.fromCharCode(65+q.a)}。${q.exp}</div></div>`;
  });
  openDrawer('🎯 自测练习','quiz',h);
  $$('#drawerBody .quiz-q label').forEach(lab=>{
    lab.addEventListener('click',()=>{
      const qbox=lab.closest('.quiz-q'); const i=+qbox.dataset.i; const j=+lab.dataset.j;
      if(qbox.classList.contains('answered')) return;
      qbox.classList.add('answered');
      qbox.querySelectorAll('label').forEach((L,k)=>{
        if(k===QUIZ[i].a) L.classList.add('ok');
        else if(k===j) L.classList.add('bad');
      });
    });
  });
}
function openStat(){
  const total=CLAUSES.length;
  const reqTotal=CLAUSES.reduce((s,c)=>s+(clauseText(c).match(/应/g)||[]).length,0);
  let chStat='';
  GROUPS.forEach(g=>{const items=groupOf[g.key]||[]; if(!items.length)return;
    const rc=items.filter(c=>read.includes(c.id)).length;
    chStat+=`<div class="stat" style="grid-column:span 1"><div class="n">${rc}/${items.length}</div><div class="l">${g.label.split(' ')[0]}</div></div>`;
  });
  let h=`<div class="stat-grid">
    <div class="stat"><div class="n">${total}</div><div class="l">条款总数</div></div>
    <div class="stat"><div class="n">${read.length}</div><div class="l">已读</div></div>
    <div class="stat"><div class="n">${Math.round(read.length/total*100)}%</div><div class="l">阅读进度</div></div>
    <div class="stat"><div class="n">${stars.length}</div><div class="l">收藏</div></div>
    <div class="stat"><div class="n">${reqTotal}</div><div class="l">“应”要求总数</div></div>
    <div class="stat"><div class="n">7</div><div class="l">核心关注点</div></div>
  </div>
  <h4 style="margin:18px 0 10px">各章阅读进度</h4>
  <div class="stat-grid">${chStat}</div>`;
  openDrawer('📊 统计','stat',h);
}

/* ---------- 搜索 ---------- */
function doSearch(q){
  q=q.trim();
  if(!q){ $('#searchCount').textContent=''; $('#searchClear').style.display='none'; goto(currentId||'preface',currentHl); return; }
  $('#searchClear').style.display='block';
  const results=[];
  CLAUSES.forEach(c=>{
    const t=clauseText(c); const i=t.toLowerCase().indexOf(q.toLowerCase());
    if(i>=0){
      const start=Math.max(0,i-30); const snip=t.slice(start,i+ (t.length>i+30?60:q.length));
      results.push({c, snip});
    }
  });
  $('#searchCount').textContent = results.length? `${results.length} 条` : '无';
  let h='';
  if(!results.length) h='<div class="empty">未找到匹配“'+escapeHtml(q)+'”的条款。</div>';
  results.forEach(({c,snip})=>{
    const reg=new RegExp('('+escapeRe(q)+')','gi');
    const s=escapeHtml(snip).replace(reg,'<mark>$1</mark>');
    h+=`<div class="result" onclick="goto('${c.id}','${escapeHtml(q).replace(/'/g,"\\'")}')">
      <div class="rid">${c.num} · ${c.title}</div>
      <div class="rs">…${s}…</div></div>`;
  });
  openDrawer('🔍 搜索结果：'+results.length+' 条','search',h);
}

/* ---------- 提示 ---------- */
let toastTimer;
function toast(msg){
  let t=$('#toast'); if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:10px;z-index:200;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.25s';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity='0',1600);
}

/* ---------- 主题 / 字号 ---------- */
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);}
function applyFont(){document.body.style.fontSize=fontSize+'px';}

/* ---------- 初始化 ---------- */
function init(){
  applyTheme(); applyFont(); updateProgress(); buildNav();
  goto(LS.get('last','preface'));
  $('#btnNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#toggleNav').addEventListener('click',()=>$('#aside').classList.toggle('collapsed'));
  $('#collapseNav').addEventListener('click',()=>$('#aside').classList.add('collapsed'));
  $('#btnStar').addEventListener('click',openStars);
  $('#btnGloss').addEventListener('click',openGloss);
  $('#btnGraph').addEventListener('click',openGraph);
  $('#btnQuiz').addEventListener('click',openQuiz);
  $('#btnStat').addEventListener('click',openStat);
  $('#drawerClose').addEventListener('click',closeDrawer);
  $('#mask').addEventListener('click',closeDrawer);
  $('#btnTheme').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';LS.set('theme',theme);applyTheme();toast('主题：'+(theme==='dark'?'深色':'浅色'));});
  $('#btnFontU').addEventListener('click',()=>{fontSize=Math.min(24,fontSize+1);LS.set('font',fontSize);applyFont();});
  $('#btnFontD').addEventListener('click',()=>{fontSize=Math.max(12,fontSize-1);LS.set('font',fontSize);applyFont();});
  $('#btnPrint').addEventListener('click',()=>window.print());
  $('#navFilter').addEventListener('input',e=>buildNav(e.target.value));
  const sb=$('#search');
  sb.addEventListener('input',e=>{ const v=e.target.value; if(!v){$('#searchCount').textContent='';$('#searchClear').style.display='none';return;} doSearch(v); });
  sb.addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(sb.value); });
  $('#searchClear').addEventListener('click',()=>{sb.value='';$('#searchCount').textContent='';$('#searchClear').style.display='none';closeDrawer();goto(currentId,currentHl);});
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    const idx=CLAUSES.findIndex(x=>x.id===currentId);
    if(e.key==='ArrowRight'&&idx<CLAUSES.length-1) goto(CLAUSES[idx+1].id);
    if(e.key==='ArrowLeft'&&idx>0) goto(CLAUSES[idx-1].id);
    if(e.key==='/'&&!e.ctrlKey){e.preventDefault();sb.focus();}
    if(e.key==='Escape') closeDrawer();
  });
}
init();
</script>
