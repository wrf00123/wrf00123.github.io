<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片拼接工具 - 批量拼图神器</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --card-bg: #ffffff;
            --primary: #4f6ef7;
            --primary-hover: #3b54d4;
            --danger: #e0556a;
            --danger-hover: #c94a5d;
            --text: #2c3e50;
            --text-light: #6b7d8e;
            --border: #e2e8f0;
            --border-focus: #a0b4f0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #eef1f5;
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== 头部 ========== */
        .app-header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.3px;
        }
        .app-header .logo .icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #4f6ef7, #7b8ff7);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ========== 按钮 ========== */
        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            user-select: none;
            position: relative;
            overflow: hidden;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 16px rgba(79, 110, 247, 0.4);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--border);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            background: #f8f9ff;
        }
        .btn-danger {
            background: #fff;
            color: var(--danger);
            border: 2px solid #fdd;
        }
        .btn-danger:hover {
            background: #fff5f5;
            border-color: var(--danger);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-light);
            padding: 6px 10px;
            border: 1px solid transparent;
        }
        .btn-ghost:hover {
            background: #f1f3f5;
            border-color: var(--border);
            color: var(--text);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.78rem;
            border-radius: 4px;
        }
        .btn-xs {
            padding: 3px 7px;
            font-size: 0.7rem;
            border-radius: 3px;
            letter-spacing: 0;
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(15%);
        }

        /* ========== 主体布局 ========== */
        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px 24px;
            max-width: 1500px;
            margin: 0 auto;
            min-height: calc(100vh - 130px);
        }
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
            }
        }

        /* ========== 左侧设置面板 ========== */
        .settings-panel {
            width: 320px;
            min-width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        @media (max-width: 1024px) {
            .settings-panel {
                width: 100%;
                min-width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 10px;
            }
            .settings-panel .card {
                flex: 1;
                min-width: 200px;
            }
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-light);
            margin-bottom: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 10px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #4a5568;
        }
        .form-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .form-row>* {
            flex: 1;
        }
        select,
        input[type="number"],
        input[type="color"],
        input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-family: inherit;
            background: #fafbfc;
            transition: all var(--transition);
            color: var(--text);
        }
        select:focus,
        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
            background: #fff;
        }
        input[type="color"] {
            height: 38px;
            padding: 3px 6px;
            cursor: pointer;
            min-width: 50px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .range-with-value {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .range-with-value input[type="range"] {
            flex: 1;
        }
        .range-value {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            min-width: 32px;
            text-align: center;
            font-family: var(--font-mono);
        }

        /* ========== 右侧预览区 ========== */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
        }
        .preview-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .preview-header {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            background: #fafbfc;
        }
        .preview-header .info {
            font-size: 0.82rem;
            color: var(--text-light);
            font-family: var(--font-mono);
        }
        .preview-canvas-wrap {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: repeating-conic-gradient(#e8ecf1 0% 25%, #f5f6f8 0% 50%) 50% / 20px 20px;
            min-height: 250px;
            position: relative;
        }
        .preview-canvas-wrap canvas {
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-radius: 2px;
            image-rendering: auto;
        }
        .preview-placeholder {
            color: #c0c7cf;
            text-align: center;
            font-size: 1rem;
            user-select: none;
        }
        .preview-placeholder .big-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        /* ========== 图片列表区 ========== */
        .image-list-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: 320px;
        }
        .image-list-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            background: #fafbfc;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .image-list {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            overflow-x: auto;
            overflow-y: hidden;
            flex: 1;
            align-items: center;
            min-height: 90px;
            scroll-behavior: smooth;
        }
        .image-list.empty::after {
            content: '点击上方按钮或拖拽图片到此处上传';
            color: #c0c7cf;
            font-size: 0.9rem;
            white-space: nowrap;
            padding: 20px;
            pointer-events: none;
        }
        .image-thumb {
            flex-shrink: 0;
            width: 75px;
            height: 75px;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            cursor: grab;
            position: relative;
            overflow: visible;
            transition: all var(--transition);
            background: #f0f1f3;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .image-thumb:active {
            cursor: grabbing;
        }
        .image-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
            pointer-events: none;
        }
        .image-thumb:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 110, 247, 0.2);
            z-index: 5;
        }
        .image-thumb.drag-over {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.2);
            transform: scale(1.05);
            z-index: 10;
        }
        .image-thumb.dragging {
            opacity: 0.45;
            transform: scale(0.9);
            border-style: dashed;
        }
        .image-thumb .thumb-index {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 22px;
            height: 22px;
            background: var(--primary);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .image-thumb .thumb-delete {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            transition: all var(--transition);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            line-height: 1;
        }
        .image-thumb:hover .thumb-delete {
            opacity: 1;
        }
        .image-thumb .thumb-delete:hover {
            background: #c0392b;
            transform: scale(1.15);
        }
        .image-thumb .thumb-size {
            position: absolute;
            bottom: 3px;
            right: 4px;
            font-size: 0.55rem;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 1px 4px;
            border-radius: 3px;
            pointer-events: none;
            font-family: var(--font-mono);
            letter-spacing: -0.2px;
        }

        /* ========== 上传区域 ========== */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: #fafcfd;
            color: var(--text-light);
            font-size: 0.9rem;
            position: relative;
        }
        .upload-zone:hover,
        .upload-zone.drag-hover {
            border-color: var(--primary);
            background: #f8f9ff;
            color: var(--primary);
        }
        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .upload-zone .upload-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 4px;
        }

        /* ========== Toast ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #2c3e50;
            color: #fff;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.2s forwards;
            pointer-events: auto;
            max-width: 380px;
            word-break: break-word;
        }
        .toast.success {
            background: #27ae60;
        }
        .toast.warning {
            background: #e67e22;
        }
        .toast.error {
            background: #c0392b;
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* ========== 响应式微调 ========== */
        @media (max-width: 640px) {
            .app-header {
                padding: 10px 14px;
                gap: 8px;
            }
            .app-header .logo {
                font-size: 1rem;
            }
            .btn {
                padding: 7px 12px;
                font-size: 0.78rem;
                gap: 4px;
            }
            .image-thumb {
                width: 55px;
                height: 55px;
            }
            .image-thumb .thumb-index {
                width: 18px;
                height: 18px;
                font-size: 0.55rem;
                top: -6px;
                left: -6px;
            }
            .image-thumb .thumb-delete {
                width: 18px;
                height: 18px;
                font-size: 0.55rem;
                top: -6px;
                right: -6px;
            }
            .preview-canvas-wrap {
                padding: 10px;
                min-height: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 头部 -->
    <header class="app-header">
        <div class="logo">
            <span class="icon">🧩</span>
            <span>图片拼接工具</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-outline btn-sm" onclick="reverseOrder()" title="反转图片顺序">🔄 反转顺序</button>
            <button class="btn btn-outline btn-sm" onclick="shuffleOrder()" title="随机排序">🎲 随机排序</button>
            <button class="btn btn-danger btn-sm" onclick="clearAllImages()" id="btnClearAll">🗑️ 清空全部</button>
            <button class="btn btn-primary" onclick="exportImage()" id="btnExport">💾 导出拼接图</button>
        </div>
    </header>

    <!-- 主体 -->
    <div class="main-container">
        <!-- 左侧设置面板 -->
        <aside class="settings-panel">
            <!-- 上传 -->
            <div class="card">
                <div class="card-title">📤 添加图片</div>
                <div class="upload-zone" id="uploadZone">
                    <span class="upload-icon">🖼️</span>
                    <strong>点击上传</strong> 或拖拽图片到此处
                    <br><small>支持批量选择 · 也可粘贴图片</small>
                    <input type="file" id="fileInput" accept="image/*" multiple>
                </div>
            </div>

            <!-- 拼接模式 -->
            <div class="card">
                <div class="card-title">⚙️ 拼接设置</div>
                <div class="form-group">
                    <label class="form-label">拼接模式</label>
                    <select id="spliceMode">
                        <option value="horizontal">水平拼接 → 横向排列</option>
                        <option value="vertical">垂直拼接 ↓ 纵向排列</option>
                        <option value="grid" selected>网格拼接 ▦ 多行多列</option>
                    </select>
                </div>
                <div class="form-group" id="gridColsGroup">
                    <label class="form-label">网格列数</label>
                    <input type="number" id="gridCols" value="3" min="1" max="20" step="1">
                </div>
                <div class="form-group">
                    <label class="form-label">图片间距 (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="gapSize" value="8" min="0" max="80" step="1">
                        <span class="range-value" id="gapSizeVal">8</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">内边距 (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="paddingSize" value="12" min="0" max="100" step="1">
                        <span class="range-value" id="paddingSizeVal">12</span>
                    </div>
                </div>
            </div>

            <!-- 图片尺寸设置 -->
            <div class="card">
                <div class="card-title">📐 尺寸设置</div>
                <div class="form-group">
                    <label class="form-label">统一尺寸模式</label>
                    <select id="sizeMode">
                        <option value="auto" selected>自动适应（保持比例）</option>
                        <option value="uniformWidth">统一宽度</option>
                        <option value="uniformHeight">统一高度</option>
                        <option value="uniformBoth">统一宽高（可能裁剪）</option>
                    </select>
                </div>
                <div class="form-row" id="uniformWidthGroup" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">统一宽度 (px)</label>
                        <input type="number" id="uniformWidth" value="300" min="20" max="8000" step="10">
                    </div>
                </div>
                <div class="form-row" id="uniformHeightGroup" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">统一高度 (px)</label>
                        <input type="number" id="uniformHeight" value="300" min="20" max="8000" step="10">
                    </div>
                </div>
                <div class="form-group" id="maxSizeGroup">
                    <label class="form-label">图片最大尺寸限制 (px) <small style="color:#999;">0=不限制</small></label>
                    <input type="number" id="maxImageSize" value="2000" min="0" max="16000" step="100">
                </div>
            </div>

            <!-- 样式设置 -->
            <div class="card">
                <div class="card-title">🎨 样式设置</div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">背景颜色</label>
                        <input type="color" id="bgColor" value="#ffffff">
                    </div>
                    <div class="form-group">
                        <label class="form-label">边框颜色</label>
                        <input type="color" id="borderColor" value="#e0e0e0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">边框宽度 (px)</label>
                        <input type="number" id="borderWidth" value="0" min="0" max="30" step="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">圆角半径 (px)</label>
                        <input type="number" id="borderRadius" value="0" min="0" max="100" step="1">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">对齐方式</label>
                    <select id="alignment">
                        <option value="center" selected>居中对齐</option>
                        <option value="start">起始对齐（左/上）</option>
                        <option value="end">末尾对齐（右/下）</option>
                    </select>
                </div>
            </div>

            <!-- 导出设置 -->
            <div class="card">
                <div class="card-title">💾 导出设置</div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">导出格式</label>
                        <select id="exportFormat">
                            <option value="image/png" selected>PNG（支持透明）</option>
                            <option value="image/jpeg">JPEG（体积小）</option>
                            <option value="image/webp">WebP（推荐）</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">导出缩放</label>
                        <select id="exportScale">
                            <option value="1">1x 标准</option>
                            <option value="2" selected>2x 高清</option>
                            <option value="3">3x 超清</option>
                            <option value="0.5">0.5x 预览</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="jpegQualityGroup" style="display:none;">
                    <label class="form-label">JPEG质量</label>
                    <div class="range-with-value">
                        <input type="range" id="jpegQuality" value="90" min="10" max="100" step="1">
                        <span class="range-value" id="jpegQualityVal">90%</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧预览 -->
        <div class="preview-area">
            <div class="preview-card">
                <div class="preview-header">
                    <span class="info" id="previewInfo">📏 拼接尺寸：--</span>
                    <span class="info" id="imageCount">🖼️ 图片：0 张</span>
                </div>
                <div class="preview-canvas-wrap" id="previewCanvasWrap">
                    <div class="preview-placeholder" id="previewPlaceholder">
                        <span class="big-icon">🖼️</span>
                        <span>请上传图片开始拼接</span>
                    </div>
                    <canvas id="previewCanvas" style="display:none;"></canvas>
                </div>
            </div>

            <!-- 图片缩略图列表 -->
            <div class="image-list-section">
                <div class="image-list-header">
                    <span>📋 图片列表（拖拽排序）</span>
                    <span style="font-size:0.75rem;color:var(--text-light);" id="listCount">共 0 张</span>
                </div>
                <div class="image-list empty" id="imageList"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ DOM 引用 ============
            const fileInput = document.getElementById('fileInput');
            const uploadZone = document.getElementById('uploadZone');
            const imageList = document.getElementById('imageList');
            const previewCanvas = document.getElementById('previewCanvas');
            const previewCanvasWrap = document.getElementById('previewCanvasWrap');
            const previewPlaceholder = document.getElementById('previewPlaceholder');
            const previewInfo = document.getElementById('previewInfo');
            const imageCountEl = document.getElementById('imageCount');
            const listCount = document.getElementById('listCount');
            const btnExport = document.getElementById('btnExport');
            const btnClearAll = document.getElementById('btnClearAll');
            const toastContainer = document.getElementById('toastContainer');

            // 设置控件
            const spliceMode = document.getElementById('spliceMode');
            const gridColsGroup = document.getElementById('gridColsGroup');
            const gridCols = document.getElementById('gridCols');
            const gapSize = document.getElementById('gapSize');
            const gapSizeVal = document.getElementById('gapSizeVal');
            const paddingSize = document.getElementById('paddingSize');
            const paddingSizeVal = document.getElementById('paddingSizeVal');
            const sizeMode = document.getElementById('sizeMode');
            const uniformWidthGroup = document.getElementById('uniformWidthGroup');
            const uniformHeightGroup = document.getElementById('uniformHeightGroup');
            const uniformWidth = document.getElementById('uniformWidth');
            const uniformHeight = document.getElementById('uniformHeight');
            const maxImageSize = document.getElementById('maxImageSize');
            const bgColor = document.getElementById('bgColor');
            const borderColor = document.getElementById('borderColor');
            const borderWidth = document.getElementById('borderWidth');
            const borderRadius = document.getElementById('borderRadius');
            const alignment = document.getElementById('alignment');
            const exportFormat = document.getElementById('exportFormat');
            const exportScale = document.getElementById('exportScale');
            const jpegQualityGroup = document.getElementById('jpegQualityGroup');
            const jpegQuality = document.getElementById('jpegQuality');
            const jpegQualityVal = document.getElementById('jpegQualityVal');

            // ============ 状态 ============
            let images = []; // { id, dataUrl, imgObj, naturalW, naturalH, name }
            let imageIdCounter = 0;
            let draggedIndex = -1;

            // ============ Toast ============
            function showToast(msg, type = '') {
                const toast = document.createElement('div');
                toast.className = 'toast ' + type;
                toast.textContent = msg;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 2600);
            }

            // ============ 更新UI状态 ============
            function updateUICounters() {
                const count = images.length;
                imageCountEl.textContent = '🖼️ 图片：' + count + ' 张';
                listCount.textContent = '共 ' + count + ' 张';
                btnClearAll.disabled = count === 0;
                btnExport.disabled = count === 0;
                if (count === 0) {
                    imageList.classList.add('empty');
                } else {
                    imageList.classList.remove('empty');
                }
            }

            function updateRangeDisplay() {
                gapSizeVal.textContent = gapSize.value;
                paddingSizeVal.textContent = paddingSize.value;
                jpegQualityVal.textContent = jpegQuality.value + '%';
            }

            function updateVisibility() {
                const mode = spliceMode.value;
                gridColsGroup.style.display = mode === 'grid' ? 'block' : 'none';

                const sm = sizeMode.value;
                uniformWidthGroup.style.display = (sm === 'uniformWidth' || sm === 'uniformBoth') ? 'flex' : 'none';
                uniformHeightGroup.style.display = (sm === 'uniformHeight' || sm === 'uniformBoth') ? 'flex' : 'none';

                const fmt = exportFormat.value;
                jpegQualityGroup.style.display = fmt === 'image/jpeg' ? 'block' : 'none';
            }

            // ============ 图片列表渲染 ============
            function renderImageList() {
                imageList.innerHTML = '';
                images.forEach((imgData, index) => {
                    const thumb = document.createElement('div');
                    thumb.className = 'image-thumb';
                    thumb.draggable = true;
                    thumb.dataset.index = index;
                    thumb.title = imgData.name + '\n尺寸: ' + imgData.naturalW + '×' + imgData.naturalH +
                        '\n拖拽可排序 · 点击×删除';

                    const img = document.createElement('img');
                    img.src = imgData.dataUrl;
                    img.alt = imgData.name;
                    img.draggable = false;

                    const idxBadge = document.createElement('span');
                    idxBadge.className = 'thumb-index';
                    idxBadge.textContent = index + 1;

                    const delBtn = document.createElement('button');
                    delBtn.className = 'thumb-delete';
                    delBtn.textContent = '×';
                    delBtn.title = '删除此图片';
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        removeImage(index);
                    });

                    const sizeLabel = document.createElement('span');
                    sizeLabel.className = 'thumb-size';
                    sizeLabel.textContent = imgData.naturalW + '×' + imgData.naturalH;

                    thumb.appendChild(img);
                    thumb.appendChild(idxBadge);
                    thumb.appendChild(delBtn);
                    thumb.appendChild(sizeLabel);

                    // 拖拽事件
                    thumb.addEventListener('dragstart', handleDragStart);
                    thumb.addEventListener('dragover', handleDragOver);
                    thumb.addEventListener('dragenter', handleDragEnter);
                    thumb.addEventListener('dragleave', handleDragLeave);
                    thumb.addEventListener('drop', handleDrop);
                    thumb.addEventListener('dragend', handleDragEnd);

                    // 移动端触摸长按提示
                    thumb.addEventListener('touchstart', function(e) {
                        if (e.touches.length === 1) {
                            this._touchStartTime = Date.now();
                            this._touchStartX = e.touches[0].clientX;
                            this._touchStartY = e.touches[0].clientY;
                        }
                    }, { passive: true });
                    thumb.addEventListener('touchend', function(e) {
                        const duration = Date.now() - (this._touchStartTime || 0);
                        const dx = (e.changedTouches[0]?.clientX || 0) - (this._touchStartX || 0);
                        const dy = (e.changedTouches[0]?.clientY || 0) - (this._touchStartY || 0);
                        if (duration > 500 && Math.abs(dx) < 8 && Math.abs(dy) < 8) {
                            showToast('💡 长按后可拖拽排序（桌面端体验更佳）', '');
                        }
                    });

                    imageList.appendChild(thumb);
                });
                updateUICounters();
                updatePreview();
            }

            // ============ 拖拽处理 ============
            function handleDragStart(e) {
                draggedIndex = parseInt(this.dataset.index);
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', draggedIndex);
                // 设置拖拽图像为透明（使用缩略图本身）
                try {
                    const dt = e.dataTransfer;
                    dt.setDragImage(this, 35, 35);
                } catch (err) { /* 忽略 */ }
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            }

            function handleDragEnter(e) {
                e.preventDefault();
                const targetIndex = parseInt(this.dataset.index);
                if (targetIndex !== draggedIndex && draggedIndex >= 0) {
                    this.classList.add('drag-over');
                }
            }

            function handleDragLeave(e) {
                this.classList.remove('drag-over');
            }

            function handleDrop(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.remove('drag-over');
                const targetIndex = parseInt(this.dataset.index);
                if (targetIndex !== draggedIndex && draggedIndex >= 0 && targetIndex >= 0) {
                    moveImage(draggedIndex, targetIndex);
                }
                draggedIndex = -1;
            }

            function handleDragEnd(e) {
                this.classList.remove('dragging');
                document.querySelectorAll('.image-thumb.drag-over').forEach(el => el.classList.remove(
                'drag-over'));
                draggedIndex = -1;
            }

            function moveImage(fromIndex, toIndex) {
                if (fromIndex === toIndex) return;
                const [moved] = images.splice(fromIndex, 1);
                images.splice(toIndex, 0, moved);
                renderImageList();
                showToast('✅ 图片顺序已更新', 'success');
            }

            function removeImage(index) {
                if (index < 0 || index >= images.length) return;
                const name = images[index].name;
                // 释放内存
                if (images[index].dataUrl && images[index].dataUrl.startsWith('blob:')) {
                    URL.revokeObjectURL(images[index].dataUrl);
                }
                images.splice(index, 1);
                renderImageList();
                showToast('已删除：' + name, '');
            }

            function clearAllImages() {
                if (images.length === 0) return;
                if (!confirm('确定要清空全部 ' + images.length + ' 张图片吗？此操作不可恢复。')) return;
                images.forEach(img => {
                    if (img.dataUrl && img.dataUrl.startsWith('blob:')) {
                        URL.revokeObjectURL(img.dataUrl);
                    }
                });
                images = [];
                imageIdCounter = 0;
                renderImageList();
                previewCanvas.style.display = 'none';
                previewPlaceholder.style.display = 'block';
                previewInfo.textContent = '📏 拼接尺寸：--';
                showToast('已清空全部图片', '');
            }

            function reverseOrder() {
                if (images.length < 2) {
                    showToast('至少需要2张图片才能反转顺序', 'warning');
                    return;
                }
                images.reverse();
                renderImageList();
                showToast('🔄 顺序已反转', 'success');
            }

            function shuffleOrder() {
                if (images.length < 2) {
                    showToast('至少需要2张图片才能随机排序', 'warning');
                    return;
                }
                // Fisher-Yates 洗牌
                for (let i = images.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [images[i], images[j]] = [images[j], images[i]];
                }
                renderImageList();
                showToast('🎲 顺序已随机打乱', 'success');
            }

            // ============ 图片加载 ============
            function loadImageFromFile(file) {
                return new Promise((resolve, reject) => {
                    if (!file.type.match(/image\//)) {
                        reject(new Error('不是有效的图片文件：' + file.name));
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const dataUrl = e.target.result;
                        const img = new Image();
                        img.onload = function() {
                            resolve({
                                dataUrl,
                                imgObj: img,
                                naturalW: img.naturalWidth,
                                naturalH: img.naturalHeight,
                                name: file.name,
                                id: ++imageIdCounter,
                            });
                        };
                        img.onerror = function() {
                            reject(new Error('图片加载失败：' + file.name));
                        };
                        img.src = dataUrl;
                    };
                    reader.onerror = function() {
                        reject(new Error('文件读取失败：' + file.name));
                    };
                    reader.readAsDataURL(file);
                });
            }

            async function addFiles(files) {
                if (!files || files.length === 0) return;
                const validFiles = Array.from(files).filter(f => f.type.match(/image\//));
                if (validFiles.length === 0) {
                    showToast('未检测到有效的图片文件', 'warning');
                    return;
                }
                if (validFiles.length < files.length) {
                    showToast('已过滤 ' + (files.length - validFiles.length) + ' 个非图片文件', 'warning');
                }

                const totalBefore = images.length;
                let successCount = 0;
                let failCount = 0;

                // 分批加载，避免一次性占用过多内存
                const batchSize = 10;
                for (let i = 0; i < validFiles.length; i += batchSize) {
                    const batch = validFiles.slice(i, i + batchSize);
                    const results = await Promise.allSettled(batch.map(f => loadImageFromFile(f)));
                    results.forEach(r => {
                        if (r.status === 'fulfilled') {
                            images.push(r.value);
                            successCount++;
                        } else {
                            failCount++;
                            console.warn(r.reason);
                        }
                    });
                }

                renderImageList();
                if (successCount > 0) {
                    showToast(`✅ 成功添加 ${successCount} 张图片` + (failCount > 0 ? `，${failCount} 张失败` : ''),
                        'success');
                } else if (failCount > 0) {
                    showToast('❌ 所有图片加载失败，请检查文件', 'error');
                }
                if (images.length > 0 && totalBefore === 0 && successCount > 0) {
                    // 首次添加，滚动到预览区
                    previewCanvasWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            // ============ 粘贴图片 ============
            document.addEventListener('paste', function(e) {
                const items = e.clipboardData?.items;
                if (!items) return;
                const imageFiles = [];
                for (const item of items) {
                    if (item.type.match(/image\//)) {
                        const file = item.getAsFile();
                        if (file) imageFiles.push(file);
                    }
                }
                if (imageFiles.length > 0) {
                    e.preventDefault();
                    addFiles(imageFiles);
                }
            });

            // ============ 拖拽上传 ============
            uploadZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.add('drag-hover');
            });
            uploadZone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.remove('drag-hover');
            });
            uploadZone.addEventListener('drop', function(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.remove('drag-hover');
                const files = e.dataTransfer?.files;
                if (files && files.length > 0) {
                    addFiles(files);
                }
            });
            uploadZone.addEventListener('click', function(e) {
                if (e.target === fileInput) return;
                fileInput.click();
            });
            fileInput.addEventListener('change', function() {
                if (this.files && this.files.length > 0) {
                    addFiles(this.files);
                    this.value = '';
                }
            });

            // 也支持拖拽到整个页面（除设置面板外的区域）
            document.addEventListener('dragover', function(e) {
                e.preventDefault();
            });
            document.addEventListener('drop', function(e) {
                e.preventDefault();
                // 检查是否拖到了设置面板上
                const settingsPanel = document.querySelector('.settings-panel');
                if (settingsPanel && settingsPanel.contains(e.target)) {
                    const files = e.dataTransfer?.files;
                    if (files && files.length > 0) {
                        addFiles(files);
                    }
                }
            });

            // ============ Canvas 绘制 ============
            function getSettings() {
                return {
                    mode: spliceMode.value,
                    gridCols: Math.max(1, parseInt(gridCols.value) || 3),
                    gap: Math.max(0, parseInt(gapSize.value) || 0),
                    padding: Math.max(0, parseInt(paddingSize.value) || 0),
                    sizeMode: sizeMode.value,
                    uniformW: Math.max(20, parseInt(uniformWidth.value) || 300),
                    uniformH: Math.max(20, parseInt(uniformHeight.value) || 300),
                    maxSize: Math.max(0, parseInt(maxImageSize.value) || 0),
                    bgColor: bgColor.value,
                    borderColor: borderColor.value,
                    borderW: Math.max(0, parseInt(borderWidth.value) || 0),
                    borderRadius: Math.max(0, parseInt(borderRadius.value) || 0),
                    alignment: alignment.value,
                    exportFormat: exportFormat.value,
                    exportScale: parseFloat(exportScale.value) || 1,
                    jpegQuality: Math.max(0.1, Math.min(1, (parseInt(jpegQuality.value) || 90) / 100)),
                };
            }

            function getScaledDimensions(imgW, imgH, settings) {
                let w = imgW;
                let h = imgH;

                // 最大尺寸限制
                if (settings.maxSize > 0) {
                    if (w > settings.maxSize || h > settings.maxSize) {
                        const ratio = Math.min(settings.maxSize / w, settings.maxSize / h);
                        w = Math.round(w * ratio);
                        h = Math.round(h * ratio);
                    }
                }

                // 统一尺寸模式
                switch (settings.sizeMode) {
                    case 'uniformWidth':
                        const uwRatio = settings.uniformW / w;
                        w = settings.uniformW;
                        h = Math.round(h * uwRatio);
                        break;
                    case 'uniformHeight':
                        const uhRatio = settings.uniformH / h;
                        h = settings.uniformH;
                        w = Math.round(w * uhRatio);
                        break;
                    case 'uniformBoth':
                        w = settings.uniformW;
                        h = settings.uniformH;
                        break;
                    case 'auto':
                    default:
                        break;
                }

                return { w: Math.max(1, w), h: Math.max(1, h) };
            }

            function drawRoundedRect(ctx, x, y, w, h, r) {
                if (r <= 0) {
                    ctx.rect(x, y, w, h);
                    return;
                }
                const rr = Math.min(r, w / 2, h / 2);
                ctx.beginPath();
                ctx.moveTo(x + rr, y);
                ctx.lineTo(x + w - rr, y);
                ctx.arcTo(x + w, y, x + w, y + rr, rr);
                ctx.lineTo(x + w, y + h - rr);
                ctx.arcTo(x + w, y + h, x + w - rr, y + h, rr);
                ctx.lineTo(x + rr, y + h);
                ctx.arcTo(x, y + h, x, y + h - rr, rr);
                ctx.lineTo(x, y + rr);
                ctx.arcTo(x, y, x + rr, y, rr);
                ctx.closePath();
            }

            function computeLayout(settings) {
                if (images.length === 0) return null;

                // 计算每张图片缩放后的尺寸
                const scaledImages = images.map(img => {
                    const scaled = getScaledDimensions(img.naturalW, img.naturalH, settings);
                    return {
                        ...img,
                        scaledW: scaled.w,
                        scaledH: scaled.h,
                    };
                });

                const gap = settings.gap;
                const pad = settings.padding;
                const bw = settings.borderW;
                const totalBorderPerImage = bw * 2; // 边框在图片四周

                let positions = []; // { x, y, w, h } 每张图片在canvas中的位置（不含边框偏移，边框在w/h内）
                let canvasW = 0;
                let canvasH = 0;

                if (settings.mode === 'horizontal') {
                    // 水平拼接
                    const totalWidth = scaledImages.reduce((sum, si) => sum + si.scaledW + totalBorderPerImage, 0) +
                        (scaledImages.length - 1) * gap + pad * 2;
                    const maxHeight = Math.max(...scaledImages.map(si => si.scaledH)) + totalBorderPerImage;
                    const totalHeight = maxHeight + pad * 2;

                    canvasW = totalWidth;
                    canvasH = totalHeight;
                    let cx = pad;
                    scaledImages.forEach(si => {
                        const cellW = si.scaledW + totalBorderPerImage;
                        const cellH = si.scaledH + totalBorderPerImage;
                        let cy;
                        switch (settings.alignment) {
                            case 'start':
                                cy = pad;
                                break;
                            case 'end':
                                cy = pad + maxHeight - cellH;
                                break;
                            case 'center':
                            default:
                                cy = pad + (maxHeight - cellH) / 2;
                        }
                        positions.push({ x: cx, y: cy, w: si.scaledW, h: si.scaledH, bw: bw });
                        cx += cellW + gap;
                    });
                } else if (settings.mode === 'vertical') {
                    // 垂直拼接
                    const maxWidth = Math.max(...scaledImages.map(si => si.scaledW)) + totalBorderPerImage;
                    const totalWidth = maxWidth + pad * 2;
                    const totalHeight = scaledImages.reduce((sum, si) => sum + si.scaledH + totalBorderPerImage, 0) +
                        (scaledImages.length - 1) * gap + pad * 2;

                    canvasW = totalWidth;
                    canvasH = totalHeight;
                    let cy = pad;
                    scaledImages.forEach(si => {
                        const cellW = si.scaledW + totalBorderPerImage;
                        const cellH = si.scaledH + totalBorderPerImage;
                        let cx;
                        switch (settings.alignment) {
                            case 'start':
                                cx = pad;
                                break;
                            case 'end':
                                cx = pad + maxWidth - cellW;
                                break;
                            case 'center':
                            default:
                                cx = pad + (maxWidth - cellW) / 2;
                        }
                        positions.push({ x: cx, y: cy, w: si.scaledW, h: si.scaledH, bw: bw });
                        cy += cellH + gap;
                    });
                } else if (settings.mode === 'grid') {
                    // 网格拼接
                    const cols = Math.max(1, Math.min(settings.gridCols, scaledImages.length));
                    const rows = Math.ceil(scaledImages.length / cols);

                    // 计算每列的最大宽度和每行的最大高度
                    const colWidths = new Array(cols).fill(0);
                    const rowHeights = new Array(rows).fill(0);
                    for (let i = 0; i < scaledImages.length; i++) {
                        const col = i % cols;
                        const row = Math.floor(i / cols);
                        colWidths[col] = Math.max(colWidths[col], scaledImages[i].scaledW + totalBorderPerImage);
                        rowHeights[row] = Math.max(rowHeights[row], scaledImages[i].scaledH + totalBorderPerImage);
                    }

                    const totalWidth = colWidths.reduce((sum, cw) => sum + cw, 0) + (cols - 1) * gap + pad * 2;
                    const totalHeight = rowHeights.reduce((sum, rh) => sum + rh, 0) + (rows - 1) * gap + pad * 2;
                    canvasW = totalWidth;
                    canvasH = totalHeight;

                    // 计算每列的起始x坐标
                    const colStartX = [];
                    let cx = pad;
                    for (let c = 0; c < cols; c++) {
                        colStartX.push(cx);
                        cx += colWidths[c] + gap;
                    }
                    // 计算每行的起始y坐标
                    const rowStartY = [];
                    let cy = pad;
                    for (let r = 0; r < rows; r++) {
                        rowStartY.push(cy);
                        cy += rowHeights[r] + gap;
                    }

                    for (let i = 0; i < scaledImages.length; i++) {
                        const col = i % cols;
                        const row = Math.floor(i / cols);
                        const cellW = colWidths[col];
                        const cellH = rowHeights[row];
                        const si = scaledImages[i];
                        const contentW = si.scaledW + totalBorderPerImage;
                        const contentH = si.scaledH + totalBorderPerImage;

                        let ox, oy;
                        switch (settings.alignment) {
                            case 'start':
                                ox = colStartX[col];
                                oy = rowStartY[row];
                                break;
                            case 'end':
                                ox = colStartX[col] + cellW - contentW;
                                oy = rowStartY[row] + cellH - contentH;
                                break;
                            case 'center':
                            default:
                                ox = colStartX[col] + (cellW - contentW) / 2;
                                oy = rowStartY[row] + (cellH - contentH) / 2;
                        }
                        positions.push({ x: ox, y: oy, w: si.scaledW, h: si.scaledH, bw: bw });
                    }
                }

                return {
                    canvasW: Math.round(canvasW),
                    canvasH: Math.round(canvasH),
                    positions,
                    scaledImages,
                };
            }

            function renderCanvas(layout, settings, targetCanvas) {
                if (!layout) return;
                const { canvasW, canvasH, positions, scaledImages } = layout;
                const scale = settings.exportScale || 1;
                const finalW = Math.round(canvasW * scale);
                const finalH = Math.round(canvasH * scale);

                // 检查canvas尺寸限制
                const MAX_CANVAS = 16384;
                let effectiveScale = scale;
                if (finalW > MAX_CANVAS || finalH > MAX_CANVAS) {
                    const limitRatio = Math.min(MAX_CANVAS / finalW, MAX_CANVAS / finalH);
                    effectiveScale = scale * limitRatio;
                    console.warn('Canvas尺寸超限，自动调整缩放比例至', effectiveScale.toFixed(2));
                }

                const renderW = Math.round(canvasW * effectiveScale);
                const renderH = Math.round(canvasH * effectiveScale);

                targetCanvas.width = renderW;
                targetCanvas.height = renderH;
                const ctx = targetCanvas.getContext('2d');

                // 背景
                ctx.fillStyle = settings.bgColor;
                ctx.fillRect(0, 0, renderW, renderH);

                // 绘制每张图片
                positions.forEach((pos, i) => {
                    const si = scaledImages[i];
                    const sx = Math.round(pos.x * effectiveScale);
                    const sy = Math.round(pos.y * effectiveScale);
                    const sw = Math.round(pos.w * effectiveScale);
                    const sh = Math.round(pos.h * effectiveScale);
                    const bwScaled = Math.round((pos.bw || settings.borderW) * effectiveScale);
                    const brScaled = Math.round(settings.borderRadius * effectiveScale);
                    const totalW = sw + bwScaled * 2;
                    const totalH = sh + bwScaled * 2;

                    ctx.save();

                    // 如果有边框，先绘制边框
                    if (bwScaled > 0) {
                        const borderX = sx;
                        const borderY = sy;
                        drawRoundedRect(ctx, borderX, borderY, totalW, totalH, brScaled + bwScaled * 0.5);
                        ctx.fillStyle = settings.borderColor;
                        ctx.fill();
                    }

                    // 绘制图片区域（带圆角裁剪）
                    const imgX = sx + bwScaled;
                    const imgY = sy + bwScaled;
                    drawRoundedRect(ctx, imgX, imgY, sw, sh, brScaled);
                    ctx.clip();

                    // 绘制图片
                    if (si.imgObj && si.imgObj.complete && si.imgObj.naturalWidth > 0) {
                        ctx.drawImage(si.imgObj, imgX, imgY, sw, sh);
                    } else {
                        // 备用：使用dataUrl重新加载
                        ctx.fillStyle = '#e0e0e0';
                        ctx.fillRect(imgX, imgY, sw, sh);
                        ctx.fillStyle = '#999';
                        ctx.font = Math.max(10, sw * 0.08) + 'px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('🖼️', imgX + sw / 2, imgY + sh / 2);
                    }

                    ctx.restore();
                });

                return { renderW, renderH, effectiveScale };
            }

            function updatePreview() {
                const settings = getSettings();
                // 预览时使用1x缩放以保证性能
                const previewSettings = { ...settings, exportScale: 1 };
                const layout = computeLayout(previewSettings);

                if (!layout || images.length === 0) {
                    previewCanvas.style.display = 'none';
                    previewPlaceholder.style.display = 'block';
                    previewInfo.textContent = '📏 拼接尺寸：--';
                    return;
                }

                previewPlaceholder.style.display = 'none';
                previewCanvas.style.display = 'block';
                const result = renderCanvas(layout, previewSettings, previewCanvas);
                previewInfo.textContent =
                    '📏 拼接尺寸：' + layout.canvasW + ' × ' + layout.canvasH + ' px' +
                    ' | 图片数：' + images.length +
                    ' | 模式：' + (settings.mode === 'grid' ? '网格(' + settings.gridCols + '列)' :
                        settings.mode === 'horizontal' ? '水平' : '垂直');
            }

            // ============ 导出 ============
            async function exportImage() {
                if (images.length === 0) {
                    showToast('请先添加图片', 'warning');
                    return;
                }
                const settings = getSettings();
                const layout = computeLayout(settings);
                if (!layout) {
                    showToast('计算布局失败', 'error');
                    return;
                }

                // 检查导出尺寸
                const exportW = Math.round(layout.canvasW * settings.exportScale);
                const exportH = Math.round(layout.canvasH * settings.exportScale);
                const MAX_CANVAS = 16384;
                if (exportW > MAX_CANVAS || exportH > MAX_CANVAS) {
                    if (!confirm(
                            `导出尺寸 (${exportW}×${exportH}px) 可能超过浏览器限制。\n建议降低导出缩放或图片尺寸。\n\n是否仍然尝试导出？`
                            )) {
                        return;
                    }
                }

                showToast('正在生成拼接图...', '');

                // 使用离屏canvas进行导出渲染
                const offCanvas = document.createElement('canvas');
                try {
                    const result = renderCanvas(layout, settings, offCanvas);
                    const effectiveW = result.renderW;
                    const effectiveH = result.renderH;
                    const effectiveScale = result.effectiveScale;

                    if (effectiveScale < settings.exportScale) {
                        showToast('⚠️ 已自动缩小以适应浏览器限制 (×' + effectiveScale.toFixed(1) + ')', 'warning');
                    }

                    // 导出
                    const mimeType = settings.exportFormat;
                    const quality = mimeType === 'image/jpeg' ? settings.jpegQuality : undefined;

                    if (offCanvas.toBlob) {
                        offCanvas.toBlob(function(blob) {
                            const url = URL.createObjectURL(blob);
                            triggerDownload(url, mimeType);
                            URL.revokeObjectURL(url);
                            showToast('✅ 导出成功！尺寸：' + effectiveW + '×' + effectiveH + ' px', 'success');
                        }, mimeType, quality);
                    } else {
                        // 降级方案
                        const dataUrl = offCanvas.toDataURL(mimeType, quality);
                        triggerDownload(dataUrl, mimeType);
                        showToast('✅ 导出成功！尺寸：' + effectiveW + '×' + effectiveH + ' px', 'success');
                    }
                } catch (err) {
                    console.error('导出失败:', err);
                    showToast('❌ 导出失败：' + err.message, 'error');
                }
            }

            function triggerDownload(url, mimeType) {
                const ext = mimeType === 'image/jpeg' ? 'jpg' : mimeType === 'image/webp' ? 'webp' : 'png';
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const filename = '拼接图_' + timestamp + '.' + ext;
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            // ============ 事件监听 ============
            // 设置变化时更新预览
            const settingInputs = [
                spliceMode, gridCols, gapSize, paddingSize, sizeMode,
                uniformWidth, uniformHeight, maxImageSize, bgColor,
                borderColor, borderWidth, borderRadius, alignment,
            ];
            settingInputs.forEach(input => {
                input.addEventListener('input', function() {
                    updateVisibility();
                    updateRangeDisplay();
                    updatePreview();
                });
                input.addEventListener('change', function() {
                    updateVisibility();
                    updateRangeDisplay();
                    updatePreview();
                });
            });

            // 范围滑块实时更新
            gapSize.addEventListener('input', () => { gapSizeVal.textContent = gapSize.value;
                updatePreview(); });
            paddingSize.addEventListener('input', () => { paddingSizeVal.textContent = paddingSize.value;
                updatePreview(); });
            jpegQuality.addEventListener('input', () => { jpegQualityVal.textContent = jpegQuality.value + '%'; });

            exportFormat.addEventListener('change', () => { updateVisibility();
                updatePreview(); });
            exportScale.addEventListener('change', () => { updatePreview(); });

            // 窗口大小变化时更新预览（响应式）
            let resizeDebounce;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(updatePreview, 300);
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    exportImage();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                    e.preventDefault();
                    fileInput.click();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'a' && e.target === document.body) {
                    // 不阻止默认，但提示
                }
            });

            // ============ 初始状态 ============
            updateVisibility();
            updateRangeDisplay();
            updateUICounters();
            updatePreview();

            // ============ 暴露全局函数 ============
            window.reverseOrder = reverseOrder;
            window.shuffleOrder = shuffleOrder;
            window.clearAllImages = clearAllImages;
            window.exportImage = exportImage;
            window.removeImage = removeImage;
            window.moveImage = moveImage;

            console.log('🧩 图片拼接工具已就绪');
            console.log('  - 支持批量上传、拖拽排序、粘贴图片');
            console.log('  - 支持水平/垂直/网格三种拼接模式');
            console.log('  - 快捷键：Ctrl+S 导出 | Ctrl+O 打开文件');
            console.log('  - 当前图片数：' + images.length);
        })();
    </script>
</body>
</html>
