<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车间限高标识生成器</title>
  <style>
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-primary: #3b82f6;
  --accent-hover: #2563eb;
  --border-color: #334155;
  --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
  --radius-lg: 12px;
  --radius-md: 8px;
  --radius-sm: 6px;

  --sign-bg: #F6E05E;
  --sign-text: #1A202C;
  --sign-accent: #1A202C;
  --sign-stripe: #1A202C;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.control-panel {
  width: 360px;
  min-width: 360px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.control-panel::-webkit-scrollbar {
  width: 6px;
}

.control-panel::-webkit-scrollbar-track {
  background: var(--bg-secondary);
}

.control-panel::-webkit-scrollbar-thumb {
  background: var(--bg-tertiary);
  border-radius: 3px;
}

.panel-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border-color);
}

.panel-header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.panel-header .subtitle {
  font-size: 13px;
  color: var(--text-secondary);
}

.panel-section {
  padding: 20px;
  border-bottom: 1px solid var(--border-color);
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--accent-primary);
  border-radius: 2px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group:last-child {
  margin-bottom: 0;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.input-group {
  display: flex;
  gap: 8px;
}

.input-group input {
  flex: 1;
}

.input-group select {
  width: 120px;
  flex-shrink: 0;
}

input[type="text"],
input[type="number"],
select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 14px;
  transition: all 0.2s ease;
  outline: none;
}

input[type="text"]:focus,
input[type="number"]:focus,
select:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

input[type="text"]::placeholder {
  color: var(--text-muted);
}

.radio-group {
  display: flex;
  gap: 12px;
}

.radio-item {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  transition: all 0.2s ease;
  flex: 1;
  justify-content: center;
}

.radio-item:hover {
  border-color: var(--accent-primary);
}

.radio-item input[type="radio"] {
  accent-color: var(--accent-primary);
  cursor: pointer;
}

.radio-item span {
  font-size: 13px;
  color: var(--text-primary);
}

.radio-item:has(input:checked) {
  background: rgba(59, 130, 246, 0.1);
  border-color: var(--accent-primary);
}

.checkbox-group {
  margin-bottom: 12px;
}

.checkbox-item {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 10px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  transition: all 0.2s ease;
}

.checkbox-item:hover {
  border-color: var(--accent-primary);
}

.checkbox-item input[type="checkbox"] {
  accent-color: var(--accent-primary);
  cursor: pointer;
  width: 16px;
  height: 16px;
}

.checkbox-item span {
  font-size: 13px;
  color: var(--text-primary);
}

.slider {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--bg-primary);
  border-radius: 3px;
  outline: none;
}

.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent-primary);
  cursor: pointer;
  transition: transform 0.15s ease;
}

.slider::-webkit-slider-thumb:hover {
  transform: scale(1.1);
}

.template-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.template-card {
  cursor: pointer;
  border: 2px solid var(--border-color);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: all 0.2s ease;
  background: var(--bg-primary);
}

.template-card:hover {
  border-color: var(--accent-primary);
  transform: translateY(-2px);
}

.template-card.active {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}

.template-preview {
  height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.template-warning-yellow {
  background: #F6E05E;
  color: #1A202C;
}

.template-danger-red {
  background: #E53E3E;
  color: #FFFFFF;
}

.template-industrial-blue {
  background: #2B6CB0;
  color: #FFFFFF;
}

.template-minimal-white {
  background: #FFFFFF;
  color: #1A202C;
}

.template-preview .stripe {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: repeating-linear-gradient(
    45deg,
    currentColor,
    currentColor 8px,
    transparent 8px,
    transparent 16px
  );
  opacity: 0.3;
}

.template-icon {
  font-size: 24px;
  margin-bottom: 4px;
}

.template-text {
  font-size: 11px;
  font-weight: 600;
}

.template-name {
  display: block;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-primary);
}

.panel-actions {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 20px;
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-primary {
  background: var(--accent-primary);
  color: white;
}

.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.btn-secondary:hover {
  background: #475569;
}

.btn-icon {
  font-size: 16px;
}

.panel-footer {
  padding: 16px 20px 24px;
}

.panel-footer p {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}

.preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
  overflow: hidden;
}

.preview-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-secondary);
}

.zoom-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.zoom-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.zoom-btn:hover {
  background: #475569;
  border-color: var(--accent-primary);
}

.zoom-level {
  font-size: 13px;
  color: var(--text-secondary);
  min-width: 50px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.preview-label {
  font-size: 13px;
  color: var(--text-muted);
  padding: 4px 12px;
  background: var(--bg-tertiary);
  border-radius: 20px;
}

.preview-wrapper {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px;
}

.preview-wrapper::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.preview-wrapper::-webkit-scrollbar-track {
  background: var(--bg-primary);
}

.preview-wrapper::-webkit-scrollbar-thumb {
  background: var(--bg-tertiary);
  border-radius: 5px;
}

.preview-wrapper::-webkit-scrollbar-thumb:hover {
  background: #475569;
}

.a4-page {
  background: white;
  box-shadow: var(--shadow-lg);
  transition: transform 0.2s ease;
  transform-origin: top center;
  flex-shrink: 0;
  overflow: hidden;
  page-break-inside: avoid;
  break-inside: avoid;
}

.a4-page.portrait {
  width: 210mm;
  height: 297mm;
}

.a4-page.landscape {
  width: 297mm;
  height: 210mm;
}

.sign-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--sign-bg);
  color: var(--sign-text);
  position: relative;
  transition: all 0.3s ease;
}

.sign-container.has-border {
  border: 4px solid var(--sign-accent);
  box-sizing: border-box;
}

.stripe-top,
.stripe-bottom {
  height: 20mm;
  background: repeating-linear-gradient(
    45deg,
    var(--sign-stripe),
    var(--sign-stripe) 10mm,
    var(--sign-bg) 10mm,
    var(--sign-bg) 20mm
  );
  flex-shrink: 0;
  transition: opacity 0.3s ease;
}

.stripe-top {
  border-bottom: 2px solid var(--sign-accent);
}

.stripe-bottom {
  border-top: 2px solid var(--sign-accent);
}

.sign-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20mm;
  text-align: center;
  gap: 8mm;
}

.sign-icon {
  width: 60mm;
  height: 60mm;
  color: var(--sign-accent);
  transition: all 0.3s ease;
}

.sign-icon svg {
  width: 100%;
  height: 100%;
}

.sign-title {
  font-size: 28mm;
  font-weight: 900;
  letter-spacing: 4mm;
  color: var(--sign-text);
  line-height: 1.1;
}

.sign-subtitle {
  font-size: 10mm;
  font-weight: 600;
  letter-spacing: 2mm;
  color: var(--sign-text);
  opacity: 0.8;
  text-transform: uppercase;
}

.height-display {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 4mm;
  margin: 10mm 0;
}

.height-number {
  font-size: 60mm;
  font-weight: 900;
  color: var(--sign-text);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.height-unit {
  font-size: 20mm;
  font-weight: 700;
  color: var(--sign-text);
  opacity: 0.9;
}

.sign-remark {
  font-size: 8mm;
  color: var(--sign-text);
  opacity: 0.85;
  margin-top: 5mm;
  letter-spacing: 1mm;
}

.sign-container.template-warning-yellow {
  --sign-bg: #F6E05E;
  --sign-text: #1A202C;
  --sign-accent: #1A202C;
  --sign-stripe: #1A202C;
}

.sign-container.template-danger-red {
  --sign-bg: #E53E3E;
  --sign-text: #FFFFFF;
  --sign-accent: #1A202C;
  --sign-stripe: #1A202C;
}

.sign-container.template-industrial-blue {
  --sign-bg: #2B6CB0;
  --sign-text: #FFFFFF;
  --sign-accent: #1A365D;
  --sign-stripe: #1A365D;
}

.sign-container.template-minimal-white {
  --sign-bg: #FFFFFF;
  --sign-text: #1A202C;
  --sign-accent: #E53E3E;
  --sign-stripe: #CBD5E0;
}

.a4-page.landscape .stripe-top,
.a4-page.landscape .stripe-bottom {
  height: 14mm;
}

.a4-page.landscape .sign-content {
  padding: 12mm 20mm;
  gap: 5mm;
}

.a4-page.landscape .sign-icon {
  width: 40mm;
  height: 40mm;
}

.a4-page.landscape .sign-title {
  font-size: 20mm;
  letter-spacing: 3mm;
}

.a4-page.landscape .sign-subtitle {
  font-size: 7mm;
  letter-spacing: 1.5mm;
}

.a4-page.landscape .height-display {
  gap: 3mm;
  margin: 5mm 0;
}

.a4-page.landscape .height-number {
  font-size: 42mm;
}

.a4-page.landscape .height-unit {
  font-size: 14mm;
}

.a4-page.landscape .sign-remark {
  font-size: 6mm;
  margin-top: 3mm;
  letter-spacing: 0.8mm;
}

@media (max-width: 1024px) {
  .app {
    flex-direction: column;
    height: auto;
    min-height: 100vh;
  }
  
  .control-panel {
    width: 100%;
    min-width: unset;
    max-height: 50vh;
    border-right: none;
    border-bottom: 1px solid var(--border-color);
  }
  
  .preview-area {
    flex: 1;
    min-height: 50vh;
  }
}

@media (max-width: 640px) {
  .template-grid {
    grid-template-columns: 1fr 1fr;
  }
  
  .panel-header h1 {
    font-size: 18px;
  }
  
  .preview-wrapper {
    padding: 20px;
  }
}

@page {
  size: A4 portrait;
  margin: 0;
}

@page landscape {
  size: A4 landscape;
  margin: 0;
}

@media print {
  html, body {
    background: white !important;
    overflow: visible !important;
    height: auto !important;
    margin: 0 !important;
    padding: 0 !important;
    width: auto !important;
  }
  
  .app {
    display: block !important;
    height: auto !important;
    margin: 0 !important;
    padding: 0 !important;
  }
  
  .control-panel,
  .preview-toolbar {
    display: none !important;
  }
  
  .preview-area {
    background: white !important;
    overflow: visible !important;
  }
  
  .preview-wrapper {
    padding: 0 !important;
    overflow: visible !important;
    display: block !important;
  }
  
  .a4-page {
    box-shadow: none !important;
    transform: none !important;
    margin: 0 !important;
    overflow: hidden !important;
    page-break-inside: avoid !important;
    break-inside: avoid !important;
  }
  
  .a4-page.portrait {
    width: 210mm !important;
    height: 297mm !important;
  }
  
  .a4-page.landscape {
    width: 297mm !important;
    height: 210mm !important;
    page: landscape;
  }
  
  .a4-page.landscape .stripe-top,
  .a4-page.landscape .stripe-bottom {
    height: 14mm !important;
  }
  
  .a4-page.landscape .sign-content {
    padding: 12mm 20mm !important;
    gap: 5mm !important;
  }
  
  .a4-page.landscape .sign-icon {
    width: 40mm !important;
    height: 40mm !important;
  }
  
  .a4-page.landscape .sign-title {
    font-size: 20mm !important;
    letter-spacing: 3mm !important;
  }
  
  .a4-page.landscape .sign-subtitle {
    font-size: 7mm !important;
    letter-spacing: 1.5mm !important;
  }
  
  .a4-page.landscape .height-display {
    gap: 3mm !important;
    margin: 5mm 0 !important;
  }
  
  .a4-page.landscape .height-number {
    font-size: 42mm !important;
  }
  
  .a4-page.landscape .height-unit {
    font-size: 14mm !important;
  }
  
  .a4-page.landscape .sign-remark {
    font-size: 6mm !important;
    margin-top: 3mm !important;
    letter-spacing: 0.8mm !important;
  }
  
  .sign-container {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
}

@page landscapePage {
  size: A4 landscape;
  margin: 0;
}
  </style>
</head>
<body>
  <div class="app">
    <aside class="control-panel">
      <div class="panel-header">
        <h1>车间限高标识生成器</h1>
        <p class="subtitle">A4纸尺寸 · 支持PDF导出</p>
      </div>

      <div class="panel-section">
        <h2 class="section-title">基本参数</h2>
        
        <div class="form-group">
          <label for="height">限高数值</label>
          <div class="input-group">
            <input type="number" id="height" value="2.2" step="0.1" min="0.1">
            <select id="unit">
              <option value="m">米 (m)</option>
              <option value="cm">厘米 (cm)</option>
              <option value="mm">毫米 (mm)</option>
              <option value="ft">英尺 (ft)</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="title">主标题</label>
          <input type="text" id="title" value="限高标识">
        </div>

        <div class="form-group">
          <label for="subtitle">副标题</label>
          <input type="text" id="subtitle" value="HEIGHT LIMIT">
        </div>

        <div class="form-group">
          <label for="remark">备注文字</label>
          <input type="text" id="remark" value="请注意头顶障碍物">
        </div>
      </div>

      <div class="panel-section">
        <h2 class="section-title">样式模板</h2>
        <div class="template-grid">
          <div class="template-card active" data-template="warning-yellow">
            <div class="template-preview template-warning-yellow">
              <div class="stripe"></div>
              <div class="template-icon">⚠</div>
              <div class="template-text">限高</div>
            </div>
            <span class="template-name">黄黑警示</span>
          </div>
          <div class="template-card" data-template="danger-red">
            <div class="template-preview template-danger-red">
              <div class="stripe"></div>
              <div class="template-icon">⛔</div>
              <div class="template-text">限高</div>
            </div>
            <span class="template-name">红黑警示</span>
          </div>
          <div class="template-card" data-template="industrial-blue">
            <div class="template-preview template-industrial-blue">
              <div class="stripe"></div>
              <div class="template-icon">📏</div>
              <div class="template-text">限高</div>
            </div>
            <span class="template-name">工业蓝</span>
          </div>
          <div class="template-card" data-template="minimal-white">
            <div class="template-preview template-minimal-white">
              <div class="stripe"></div>
              <div class="template-icon">⚠</div>
              <div class="template-text">限高</div>
            </div>
            <span class="template-name">简约白底</span>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h2 class="section-title">显示设置</h2>
        
        <div class="form-group">
          <label>纸张方向</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="orientation" value="portrait" checked>
              <span>竖版</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="orientation" value="landscape">
              <span>横版</span>
            </label>
          </div>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="showIcon" checked>
            <span>显示限高图标</span>
          </label>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="showBorder" checked>
            <span>显示边框</span>
          </label>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="showStripe" checked>
            <span>显示警示条纹</span>
          </label>
        </div>
      </div>

      <div class="panel-section">
        <h2 class="section-title">文字大小</h2>
        <div class="form-group">
          <label for="fontScale">字号比例: <span id="fontScaleValue">100</span>%</label>
          <input type="range" id="fontScale" min="60" max="150" value="100" class="slider">
        </div>
      </div>

      <div class="panel-actions">
        <button class="btn btn-primary" id="btnPrint">
          <span class="btn-icon">📄</span>
          导出PDF
        </button>
        <button class="btn btn-secondary" id="btnReset">
          <span class="btn-icon">↺</span>
          重置参数
        </button>
      </div>

      <div class="panel-footer">
        <p>提示：点击导出PDF后，在打印对话框中选择"另存为PDF"即可保存文件</p>
      </div>
    </aside>

    <main class="preview-area">
      <div class="preview-toolbar">
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoomOut">−</button>
          <span class="zoom-level" id="zoomLevel">100%</span>
          <button class="zoom-btn" id="zoomIn">+</button>
        </div>
        <span class="preview-label">A4 预览</span>
      </div>
      
      <div class="preview-wrapper">
        <div class="a4-page portrait" id="a4Page">
          <div class="sign-container" id="signContainer">
            <div class="stripe-top" id="stripeTop"></div>
            
            <div class="sign-content">
              <div class="sign-icon" id="signIcon">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="50" cy="50" r="45" fill="none" stroke-width="6" stroke="currentColor"/>
                  <line x1="15" y1="50" x2="85" y2="50" stroke-width="8" stroke="currentColor"/>
                  <text x="50" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="currentColor">限高</text>
                </svg>
              </div>
              
              <h1 class="sign-title" id="signTitle">限高标识</h1>
              <p class="sign-subtitle" id="signSubtitle">HEIGHT LIMIT</p>
              
              <div class="height-display">
                <span class="height-number" id="heightNumber">2.2</span>
                <span class="height-unit" id="heightUnit">m</span>
              </div>
              
              <p class="sign-remark" id="signRemark">请注意头顶障碍物</p>
            </div>
            
            <div class="stripe-bottom" id="stripeBottom"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
const state = {
  height: '2.2',
  unit: 'm',
  title: '限高标识',
  subtitle: 'HEIGHT LIMIT',
  remark: '请注意头顶障碍物',
  template: 'warning-yellow',
  orientation: 'portrait',
  showIcon: true,
  showBorder: true,
  showStripe: true,
  fontScale: 100,
  zoom: 100
};

const templates = {
  'warning-yellow': {
    name: '黄黑警示',
    colors: { bg: '#F6E05E', text: '#1A202C', accent: '#1A202C', stripe: '#1A202C' }
  },
  'danger-red': {
    name: '红黑警示',
    colors: { bg: '#E53E3E', text: '#FFFFFF', accent: '#1A202C', stripe: '#1A202C' }
  },
  'industrial-blue': {
    name: '工业蓝',
    colors: { bg: '#2B6CB0', text: '#FFFFFF', accent: '#1A365D', stripe: '#1A365D' }
  },
  'minimal-white': {
    name: '简约白底',
    colors: { bg: '#FFFFFF', text: '#1A202C', accent: '#E53E3E', stripe: '#CBD5E0' }
  }
};

const elements = {
  height: document.getElementById('height'),
  unit: document.getElementById('unit'),
  title: document.getElementById('title'),
  subtitle: document.getElementById('subtitle'),
  remark: document.getElementById('remark'),
  showIcon: document.getElementById('showIcon'),
  showBorder: document.getElementById('showBorder'),
  showStripe: document.getElementById('showStripe'),
  fontScale: document.getElementById('fontScale'),
  fontScaleValue: document.getElementById('fontScaleValue'),
  zoomLevel: document.getElementById('zoomLevel'),
  a4Page: document.getElementById('a4Page'),
  signContainer: document.getElementById('signContainer'),
  signIcon: document.getElementById('signIcon'),
  signTitle: document.getElementById('signTitle'),
  signSubtitle: document.getElementById('signSubtitle'),
  heightNumber: document.getElementById('heightNumber'),
  heightUnit: document.getElementById('heightUnit'),
  signRemark: document.getElementById('signRemark'),
  stripeTop: document.getElementById('stripeTop'),
  stripeBottom: document.getElementById('stripeBottom'),
  btnPrint: document.getElementById('btnPrint'),
  btnReset: document.getElementById('btnReset'),
  zoomIn: document.getElementById('zoomIn'),
  zoomOut: document.getElementById('zoomOut'),
  templateCards: document.querySelectorAll('.template-card'),
  orientationRadios: document.querySelectorAll('input[name="orientation"]')
};

function updatePreview() {
  elements.heightNumber.textContent = state.height;
  elements.heightUnit.textContent = state.unit;
  elements.signTitle.textContent = state.title;
  elements.signSubtitle.textContent = state.subtitle;
  elements.signRemark.textContent = state.remark;

  elements.signContainer.className = 'sign-container';
  elements.signContainer.classList.add(`template-${state.template}`);
  
  if (state.showBorder) {
    elements.signContainer.classList.add('has-border');
  }

  elements.signIcon.style.display = state.showIcon ? 'block' : 'none';
  elements.stripeTop.style.display = state.showStripe ? 'block' : 'none';
  elements.stripeBottom.style.display = state.showStripe ? 'block' : 'none';

  const scale = state.fontScale / 100;
  signContentFontScale(scale);

  elements.a4Page.className = 'a4-page';
  elements.a4Page.classList.add(state.orientation);
}

function signContentFontScale(scale) {
  const signContent = document.querySelector('.sign-content');
  if (!signContent) return;
  
  signContent.style.setProperty('--font-scale', scale);
  
  const isLandscape = state.orientation === 'landscape';
  
  const baseSizes = isLandscape ? {
    title: 20,
    subtitle: 7,
    heightNum: 42,
    heightUnit: 14,
    remark: 6,
    icon: 40,
    gap: 5,
    paddingV: 12,
    paddingH: 20,
    letterSpacingTitle: 3,
    letterSpacingSubtitle: 1.5,
    letterSpacingRemark: 0.8,
    marginTopRemark: 3,
    marginHeight: 5,
    stripeHeight: 14
  } : {
    title: 28,
    subtitle: 10,
    heightNum: 60,
    heightUnit: 20,
    remark: 8,
    icon: 60,
    gap: 8,
    paddingV: 20,
    paddingH: 20,
    letterSpacingTitle: 4,
    letterSpacingSubtitle: 2,
    letterSpacingRemark: 1,
    marginTopRemark: 5,
    marginHeight: 10,
    stripeHeight: 20
  };
  
  const title = elements.signTitle;
  const subtitle = elements.signSubtitle;
  const heightNum = elements.heightNumber;
  const heightUnit = elements.heightUnit;
  const remark = elements.signRemark;
  const icon = elements.signIcon;
  const stripeTop = elements.stripeTop;
  const stripeBottom = elements.stripeBottom;
  
  title.style.fontSize = `${baseSizes.title * scale}mm`;
  title.style.letterSpacing = `${baseSizes.letterSpacingTitle * scale}mm`;
  subtitle.style.fontSize = `${baseSizes.subtitle * scale}mm`;
  subtitle.style.letterSpacing = `${baseSizes.letterSpacingSubtitle * scale}mm`;
  heightNum.style.fontSize = `${baseSizes.heightNum * scale}mm`;
  heightUnit.style.fontSize = `${baseSizes.heightUnit * scale}mm`;
  remark.style.fontSize = `${baseSizes.remark * scale}mm`;
  remark.style.letterSpacing = `${baseSizes.letterSpacingRemark * scale}mm`;
  remark.style.marginTop = `${baseSizes.marginTopRemark * scale}mm`;
  icon.style.width = `${baseSizes.icon * scale}mm`;
  icon.style.height = `${baseSizes.icon * scale}mm`;
  
  const content = document.querySelector('.sign-content');
  content.style.gap = `${baseSizes.gap * scale}mm`;
  content.style.padding = `${baseSizes.paddingV * scale}mm ${baseSizes.paddingH * scale}mm`;
  
  const heightDisplay = document.querySelector('.height-display');
  if (heightDisplay) {
    heightDisplay.style.gap = `${baseSizes.gap * 0.6 * scale}mm`;
    heightDisplay.style.margin = `${baseSizes.marginHeight * scale}mm 0`;
  }
  
  stripeTop.style.height = `${baseSizes.stripeHeight * scale}mm`;
  stripeBottom.style.height = `${baseSizes.stripeHeight * scale}mm`;
}

function updateZoom() {
  elements.a4Page.style.transform = `scale(${state.zoom / 100})`;
  elements.zoomLevel.textContent = `${state.zoom}%`;
}

function selectTemplate(templateId) {
  state.template = templateId;
  elements.templateCards.forEach(card => {
    card.classList.toggle('active', card.dataset.template === templateId);
  });
  updatePreview();
}

function handleInputChange(e) {
  const { id, value, type, checked } = e.target;
  
  if (type === 'checkbox') {
    state[id] = checked;
  } else if (type === 'radio') {
    if (e.target.name === 'orientation') {
      state.orientation = value;
    }
  } else if (id === 'fontScale') {
    state.fontScale = parseInt(value);
    elements.fontScaleValue.textContent = value;
  } else {
    state[id] = value;
  }
  
  updatePreview();
}

function handlePrint() {
  setPageOrientation(state.orientation);
  setTimeout(() => {
    window.print();
  }, 50);
}

function setPageOrientation(orientation) {
  let styleEl = document.getElementById('print-page-style');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'print-page-style';
    document.head.appendChild(styleEl);
  }
  
  if (orientation === 'landscape') {
    styleEl.textContent = `
      @page {
        size: A4 landscape;
        margin: 0;
      }
    `;
  } else {
    styleEl.textContent = `
      @page {
        size: A4 portrait;
        margin: 0;
      }
    `;
  }
}

function handleReset() {
  state.height = '2.2';
  state.unit = 'm';
  state.title = '限高标识';
  state.subtitle = 'HEIGHT LIMIT';
  state.remark = '请注意头顶障碍物';
  state.template = 'warning-yellow';
  state.orientation = 'portrait';
  state.showIcon = true;
  state.showBorder = true;
  state.showStripe = true;
  state.fontScale = 100;
  state.zoom = 100;

  elements.height.value = state.height;
  elements.unit.value = state.unit;
  elements.title.value = state.title;
  elements.subtitle.value = state.subtitle;
  elements.remark.value = state.remark;
  elements.showIcon.checked = state.showIcon;
  elements.showBorder.checked = state.showBorder;
  elements.showStripe.checked = state.showStripe;
  elements.fontScale.value = state.fontScale;
  elements.fontScaleValue.textContent = state.fontScale;

  elements.orientationRadios.forEach(radio => {
    radio.checked = radio.value === state.orientation;
  });

  selectTemplate(state.template);
  updateZoom();
}

function initEventListeners() {
  elements.height.addEventListener('input', handleInputChange);
  elements.unit.addEventListener('change', handleInputChange);
  elements.title.addEventListener('input', handleInputChange);
  elements.subtitle.addEventListener('input', handleInputChange);
  elements.remark.addEventListener('input', handleInputChange);
  elements.showIcon.addEventListener('change', handleInputChange);
  elements.showBorder.addEventListener('change', handleInputChange);
  elements.showStripe.addEventListener('change', handleInputChange);
  elements.fontScale.addEventListener('input', handleInputChange);

  elements.templateCards.forEach(card => {
    card.addEventListener('click', () => {
      selectTemplate(card.dataset.template);
    });
  });

  elements.orientationRadios.forEach(radio => {
    radio.addEventListener('change', handleInputChange);
  });

  elements.btnPrint.addEventListener('click', handlePrint);
  elements.btnReset.addEventListener('click', handleReset);

  elements.zoomIn.addEventListener('click', () => {
    if (state.zoom < 200) {
      state.zoom += 10;
      updateZoom();
    }
  });

  elements.zoomOut.addEventListener('click', () => {
    if (state.zoom > 30) {
      state.zoom -= 10;
      updateZoom();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'p') {
        e.preventDefault();
        handlePrint();
      }
      if (e.key === '=') {
        e.preventDefault();
        if (state.zoom < 200) {
          state.zoom += 10;
          updateZoom();
        }
      }
      if (e.key === '-') {
        e.preventDefault();
        if (state.zoom > 30) {
          state.zoom -= 10;
          updateZoom();
        }
      }
      if (e.key === '0') {
        e.preventDefault();
        state.zoom = 100;
        updateZoom();
      }
    }
  });

  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      fitZoomToScreen();
    }, 200);
  });
}

function fitZoomToScreen() {
  const wrapper = document.querySelector('.preview-wrapper');
  if (!wrapper || !elements.a4Page) return;
  
  const wrapperWidth = wrapper.clientWidth - 80;
  const wrapperHeight = wrapper.clientHeight - 80;
  
  const pageWidth = elements.a4Page.offsetWidth;
  const pageHeight = elements.a4Page.offsetHeight;
  
  const scaleX = (wrapperWidth / pageWidth) * 100;
  const scaleY = (wrapperHeight / pageHeight) * 100;
  
  state.zoom = Math.min(Math.floor(Math.min(scaleX, scaleY) / 10) * 10, 100);
  state.zoom = Math.max(state.zoom, 30);
  
  updateZoom();
}

function init() {
  initEventListeners();
  updatePreview();
  
  setTimeout(() => {
    fitZoomToScreen();
  }, 100);
}

document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
