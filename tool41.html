<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 单词卡片制作工具 - 双面打印</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --primary: #4a6fa5;
            --primary-dark: #3a5685;
            --accent: #e8826b;
            --text: #2c3e50;
            --text-light: #5a6c7d;
            --border: #d9cec3;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== 顶部导航栏 ========== */
        .app-header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .app-header .logo .icon {
            font-size: 1.6em;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* ========== 按钮样式 ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(74, 111, 165, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 16px rgba(74, 111, 165, 0.4);
        }
        .btn-accent {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(232, 130, 107, 0.3);
        }
        .btn-accent:hover {
            background: #d4725b;
            box-shadow: 0 4px 16px rgba(232, 130, 107, 0.4);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: #f0f5fa;
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-light);
            border: 1px solid transparent;
        }
        .btn-ghost:hover {
            background: #f5f5f5;
            border-color: var(--border);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 6px;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: 0.78em;
            border-radius: 5px;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        .btn-success:hover {
            background: #1e8449;
        }

        /* ========== 主体布局 ========== */
        .main-container {
            display: flex;
            gap: 24px;
            padding: 24px 28px;
            max-width: 1500px;
            margin: 0 auto;
            min-height: calc(100vh - 140px);
        }
        @media (max-width: 1100px) {
            .main-container {
                flex-direction: column;
                padding: 16px;
            }
        }

        /* ========== 左侧面板 ========== */
        .panel-left {
            flex: 1 1 420px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-width: 320px;
        }
        @media (max-width: 1100px) {
            .panel-left {
                max-width: 100%;
                flex: 1 1 auto;
            }
        }

        .panel-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .panel-card h3 {
            font-size: 1.05em;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }
        .panel-card h3 .emoji {
            font-size: 1.3em;
        }

        /* 表单输入 */
        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .form-row input {
            flex: 1 1 100px;
            min-width: 70px;
            padding: 10px 12px;
            border: 2px solid #e8e1d8;
            border-radius: var(--radius-sm);
            font-size: 0.93em;
            transition: all var(--transition);
            background: #fafaf8;
            font-family: inherit;
        }
        .form-row input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.08);
            background: #fff;
        }
        .form-row input::placeholder {
            color: #bfb8ae;
            font-size: 0.9em;
        }
        .input-word {
            flex: 1.5 1 120px !important;
            font-weight: 600;
            font-size: 1em !important;
        }
        .input-meaning {
            flex: 2 1 150px !important;
        }

        /* 批量导入 */
        .batch-textarea {
            width: 100%;
            min-height: 130px;
            padding: 12px;
            border: 2px solid #e8e1d8;
            border-radius: var(--radius-sm);
            font-size: 0.9em;
            font-family: var(--font-mono);
            resize: vertical;
            background: #fafaf8;
            transition: all var(--transition);
            line-height: 1.7;
        }
        .batch-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.08);
            background: #fff;
        }
        .batch-hint {
            font-size: 0.78em;
            color: #999;
            margin-top: 4px;
            line-height: 1.5;
        }
        .batch-hint code {
            background: #f0ede6;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: var(--font-mono);
        }

        /* 单词列表 */
        .word-list-container {
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: #fafaf8;
        }
        .word-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .word-list-container::-webkit-scrollbar-thumb {
            background: #d5cdc3;
            border-radius: 3px;
        }
        .word-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-bottom: 1px solid #f0ebe0;
            transition: background var(--transition);
            cursor: default;
            flex-wrap: wrap;
        }
        .word-item:hover {
            background: #fdfcf9;
        }
        .word-item:last-child {
            border-bottom: none;
        }
        .word-item .index {
            font-size: 0.75em;
            color: #bbb;
            min-width: 22px;
            text-align: center;
            font-weight: 600;
            flex-shrink: 0;
        }
        .word-item .w-word {
            font-weight: 700;
            color: var(--text);
            min-width: 80px;
            flex-shrink: 0;
            font-size: 0.95em;
        }
        .word-item .w-meaning {
            color: var(--text-light);
            flex: 1 1 100px;
            font-size: 0.9em;
            min-width: 60px;
        }
        .word-item .w-phonetic {
            color: #999;
            font-size: 0.8em;
            font-family: var(--font-mono);
            flex-shrink: 0;
        }
        .word-item .w-pos {
            color: #888;
            font-size: 0.78em;
            background: #f0ede6;
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
            font-style: italic;
        }
        .word-item .item-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .empty-list {
            text-align: center;
            padding: 40px 20px;
            color: #c5bdb2;
            font-size: 0.95em;
        }
        .empty-list .big-emoji {
            font-size: 3em;
            display: block;
            margin-bottom: 10px;
        }

        /* ========== 右侧预览面板 ========== */
        .panel-right {
            flex: 1.2 1 500px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-width: 350px;
        }
        @media (max-width: 1100px) {
            .panel-right {
                min-width: 100%;
            }
        }
        .preview-area {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: auto;
            /* 允许滚动查看完整纸张 */
        }
        .preview-label {
            font-weight: 700;
            font-size: 0.9em;
            color: var(--text-light);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            align-self: flex-start;
        }
        .preview-sheet {
            background: #fff;
            border: 2px solid #ddd;
            box-shadow: var(--shadow-lg);
            flex-shrink: 0;
            display: grid;
            gap: 4px;
            padding: 8px;
            /* 宽度自适应，保持A4比例 */
            width: 100%;
            max-width: 800px;
            /* 最大宽度，保证在大多数屏幕上可完整显示 */
        }
        .preview-sheet.portrait {
            aspect-ratio: 210 / 297;
        }
        .preview-sheet.landscape {
            aspect-ratio: 297 / 210;
        }
        .preview-card {
            background: #fefefc;
            border: 1.5px dashed #e0d8cc;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            transition: all var(--transition);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        .preview-card:hover {
            border-color: var(--primary);
            background: #f8f6ff;
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.08);
            z-index: 2;
        }
        .preview-card.front-card .card-word {
            font-weight: 700;
            font-size: 1em;
            color: var(--text);
            line-height: 1.3;
        }
        .preview-card.back-card .card-meaning {
            font-weight: 700;
            font-size: 0.9em;
            color: var(--text);
            line-height: 1.3;
        }
        .preview-card.back-card .card-phonetic {
            font-size: 0.7em;
            color: #888;
            font-family: var(--font-mono);
        }
        .preview-card.back-card .card-pos {
            font-size: 0.65em;
            color: #999;
            font-style: italic;
        }
        .preview-card.empty-card {
            background: #fdfdfb;
            border-style: dotted;
            border-color: #eee;
        }
        .preview-card .card-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        /* ========== 设置面板 ========== */
        .settings-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .settings-row label {
            font-weight: 600;
            font-size: 0.85em;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .settings-row select,
        .settings-row input[type="number"] {
            padding: 8px 10px;
            border: 2px solid #e8e1d8;
            border-radius: 6px;
            font-size: 0.9em;
            background: #fafaf8;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition);
        }
        .settings-row select:focus,
        .settings-row input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        .settings-row input[type="number"] {
            width: 55px;
            text-align: center;
        }
        .settings-row input[type="range"] {
            accent-color: var(--primary);
            cursor: pointer;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ccc;
            border-radius: 24px;
            transition: var(--transition);
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: var(--transition);
        }
        .toggle-switch input:checked+.toggle-slider {
            background: var(--primary);
        }
        .toggle-switch input:checked+.toggle-slider:before {
            transform: translateX(20px);
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background: #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transform: translateX(40px);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            max-width: 400px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        .toast.success {
            background: #27ae60;
        }
        .toast.error {
            background: #e74c3c;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-dialog {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px 28px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-dialog h3 {
            margin-bottom: 16px;
        }
        .modal-dialog .btn-row {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        /* ========== 打印样式 ========== */
        @media print {
            body {
                background: #fff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .app-header,
            .panel-left,
            .panel-right,
            .toast,
            .modal-overlay,
            .no-print {
                display: none !important;
            }
            .print-container {
                display: block !important;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                background: #fff;
            }
            .print-page {
                width: 210mm;
                height: 297mm;
                page-break-after: always;
                display: grid;
                gap: 3mm;
                padding: 8mm;
                background: #fff;
                box-sizing: border-box;
                margin: 0 auto;
            }
            .print-page.landscape-print {
                width: 297mm;
                height: 210mm;
            }
            .print-page:last-child {
                page-break-after: avoid;
            }
            .print-card {
                border: 1.5px dashed #bbb;
                border-radius: 2px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 2mm;
                overflow: hidden;
                background: #fff;
                box-sizing: border-box;
            }
            .print-card .card-word {
                font-weight: 700;
                font-size: 11pt;
                color: #000;
                line-height: 1.3;
            }
            .print-card .card-meaning {
                font-weight: 700;
                font-size: 10pt;
                color: #000;
                line-height: 1.3;
            }
            .print-card .card-phonetic {
                font-size: 7.5pt;
                color: #555;
                font-family: 'Segoe UI', 'Arial Unicode MS', sans-serif;
            }
            .print-card .card-pos {
                font-size: 7pt;
                color: #666;
                font-style: italic;
            }
            .print-card .card-inner {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.5mm;
            }
            .print-card.empty-print-card {
                border-style: dotted;
                border-color: #ddd;
                background: #fefefe;
            }
            @page {
                size: A4 portrait;
                margin: 0;
            }
            @page landscape-print {
                size: A4 landscape;
                margin: 0;
            }
        }

        /* 打印容器在屏幕中隐藏 */
        .print-container {
            display: none;
        }

        /* ========== 响应式微调 ========== */
        @media (max-width: 600px) {
            .app-header {
                padding: 10px 14px;
                gap: 8px;
            }
            .app-header .logo {
                font-size: 1.1em;
            }
            .btn {
                padding: 7px 12px;
                font-size: 0.82em;
                gap: 4px;
            }
            .panel-card {
                padding: 14px 12px;
            }
            .form-row input {
                padding: 8px 10px;
                font-size: 0.85em;
            }
            .preview-sheet {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航 ==================== -->
    <header class="app-header">
        <div class="logo">
            <span class="icon">📝</span>
            <span>单词卡片制作工具</span>
        </div>
        <div class="header-actions">
            <span style="font-size:0.85em;color:#888;" id="wordCount">单词: 0</span>
            <span style="font-size:0.85em;color:#888;" id="pageEstimate">| 约0页</span>
            <button class="btn btn-outline btn-sm" onclick="loadSampleData()" title="加载示例单词">📋 示例数据</button>
            <button class="btn btn-outline btn-sm" onclick="clearAllWords()" title="清空所有单词">🗑️ 清空</button>
        </div>
    </header>

    <!-- ==================== 主体 ==================== -->
    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="panel-left">
            <!-- 添加单词 -->
            <div class="panel-card">
                <h3><span class="emoji">✍️</span> 添加单词</h3>
                <div class="form-row">
                    <input type="text" class="input-word" id="inputWord" placeholder="单词 (必填)" autocomplete="off">
                    <input type="text" id="inputPhonetic" placeholder="音标 如 /ˈeksəmpəl/" autocomplete="off" style="flex:1.2 1 90px;">
                    <input type="text" id="inputPos" placeholder="词性 如 n." autocomplete="off" style="flex:0.7 1 60px;">
                </div>
                <div class="form-row">
                    <input type="text" class="input-meaning" id="inputMeaning" placeholder="中文翻译 (必填)" autocomplete="off">
                    <button class="btn btn-primary btn-sm" onclick="addWord()" style="flex-shrink:0;">➕ 添加</button>
                </div>
            </div>

            <!-- 批量导入 -->
            <div class="panel-card">
                <h3><span class="emoji">📥</span> 批量导入</h3>
                <textarea class="batch-textarea" id="batchInput" placeholder="每行一个单词，格式：&#10;单词  音标  词性  翻译&#10;或&#10;单词  翻译&#10;（可用Tab、逗号、或多个空格分隔）"></textarea>
                <div class="batch-hint">
                    支持格式：<code>单词[TAB]音标[TAB]词性[TAB]翻译</code> 或 <code>单词 翻译</code>（用逗号或制表符分隔）。每行一个单词。
                </div>
                <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn btn-accent btn-sm" onclick="batchImport()">📥 批量导入</button>
                    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('batchInput').value=''">清除文本框</button>
                </div>
            </div>

            <!-- 单词列表 -->
            <div class="panel-card">
                <h3><span class="emoji">📋</span> 单词列表 <span style="font-weight:400;font-size:0.8em;color:#999;" id="listCount">(0个)</span></h3>
                <div class="word-list-container" id="wordListContainer">
                    <div class="empty-list">
                        <span class="big-emoji">📭</span>
                        还没有添加单词<br>使用上方表单添加或批量导入
                    </div>
                </div>
                <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="btn btn-ghost btn-xs" onclick="exportWordsCSV()">💾 导出CSV</button>
                    <button class="btn btn-ghost btn-xs" onclick="document.getElementById('fileImportInput').click()">📂 导入CSV文件</button>
                    <input type="file" id="fileImportInput" accept=".csv,.txt,.tsv" style="display:none;" onchange="importCSVFile(event)">
                </div>
            </div>
        </div>

        <!-- 右侧预览面板 -->
        <div class="panel-right">
            <!-- 设置 -->
            <div class="panel-card no-print">
                <h3><span class="emoji">⚙️</span> 卡片布局设置</h3>
                <div class="settings-row" style="margin-bottom:10px;">
                    <label>纸张方向：
                        <select id="orientationSelect" onchange="updatePreview()">
                            <option value="portrait">纵向 (Portrait)</option>
                            <option value="landscape">横向 (Landscape)</option>
                        </select>
                    </label>
                    <label>列数：
                        <select id="colsSelect" onchange="updatePreview()">
                            <option value="2">2列</option>
                            <option value="3" selected>3列</option>
                            <option value="4">4列</option>
                            <option value="5">5列</option>
                        </select>
                    </label>
                    <label>行数：
                        <select id="rowsSelect" onchange="updatePreview()">
                            <option value="2">2行</option>
                            <option value="3">3行</option>
                            <option value="4" selected>4行</option>
                            <option value="5">5行</option>
                            <option value="6">6行</option>
                        </select>
                    </label>
                </div>
                <div class="settings-row" style="margin-bottom:6px;">
                    <label>字体缩放：<input type="range" id="fontScale" min="70" max="140" value="125" step="5" oninput="updatePreview();document.getElementById('fontScaleVal').textContent=this.value+'%'">
                        <span id="fontScaleVal" style="min-width:40px;">125%</span>
                    </label>
                </div>
                <div class="settings-row">
                    <label style="gap:8px;">
                        <span>显示裁剪线</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="showCutMarks" checked onchange="updatePreview()">
                            <span class="toggle-slider"></span>
                        </label>
                    </label>
                    <label style="gap:8px;">
                        <span>预览背面</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="previewBack" onchange="updatePreview()">
                            <span class="toggle-slider"></span>
                        </label>
                    </label>
                </div>
            </div>

            <!-- 预览区域 -->
            <div class="preview-area" id="previewArea">
                <div class="preview-label">📄 卡片布局预览 <span style="font-weight:400;font-size:0.8em;color:#999;">（真实A4比例，可滚动查看）</span></div>
                <div class="preview-sheet portrait" id="previewSheet">
                    <!-- 动态生成预览卡片 -->
                </div>
                <div style="margin-top:8px;font-size:0.78em;color:#999;text-align:center;">
                    点击下方按钮导出PDF / 打印
                </div>
            </div>

            <!-- 打印按钮区 -->
            <div class="panel-card no-print" style="text-align:center;">
                <h3 style="margin-bottom:12px;">🖨️ 导出 & 打印</h3>
                <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
                    <button class="btn btn-primary" onclick="printFrontOnly()" title="仅打印单词正面">📄 打印正面（单词）</button>
                    <button class="btn btn-accent" onclick="printBackOnly()" title="仅打印背面（翻译等）">📄 打印背面（翻译）</button>
                    <button class="btn btn-success" onclick="printDuplex()" title="正反面交替，适合自动双面打印">🔄 双面打印PDF</button>
                </div>
                <div style="margin-top:10px;font-size:0.8em;color:#888;line-height:1.5;">
                    💡 <strong>手动双面：</strong>先打印正面→翻纸→再打印背面<br>
                    💡 <strong>自动双面：</strong>使用"双面打印PDF"，在打印对话框选择双面打印<br>
                    💡 打印时请在浏览器对话框中选择<strong>"另存为PDF"</strong>或选择A4纸张
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 打印容器（屏幕隐藏） ==================== -->
    <div class="print-container" id="printContainer">
        <!-- 动态生成打印页面 -->
    </div>

    <!-- ==================== Toast ==================== -->
    <div class="toast" id="toast"></div>

    <!-- ==================== 编辑单词模态框 ==================== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-dialog">
            <h3>✏️ 编辑单词</h3>
            <div class="form-row">
                <input type="text" id="editWord" placeholder="单词" class="input-word">
                <input type="text" id="editPhonetic" placeholder="音标">
            </div>
            <div class="form-row">
                <input type="text" id="editPos" placeholder="词性" style="flex:0.7;">
                <input type="text" id="editMeaning" placeholder="中文翻译" class="input-meaning">
            </div>
            <input type="hidden" id="editIndex" value="-1">
            <div class="btn-row">
                <button class="btn btn-ghost btn-sm" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary btn-sm" onclick="saveEditWord()">💾 保存</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 全局状态 ====================
            const STORAGE_KEY = 'wordcard_words_data_v2';
            let words = []; // { word, phonetic, pos, meaning }

            // ==================== 初始化 ====================
            function init() {
                loadFromStorage();
                updateAll();
                if (words.length === 0) {
                    loadSampleDataSilent();
                }
            }

            function loadFromStorage() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    if (data) {
                        words = JSON.parse(data);
                        if (!Array.isArray(words)) words = [];
                    }
                } catch (e) {
                    words = [];
                }
            }

            function saveToStorage() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
                } catch (e) {
                    showToast('⚠️ 本地存储空间不足，请清理一些数据', 'error');
                }
            }

            // ==================== Toast ====================
            let toastTimer;
            function showToast(msg, type = '') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = 'toast ' + type + ' show';
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2200);
            }

            // ==================== 单词操作 ====================
            function addWord() {
                const word = document.getElementById('inputWord').value.trim();
                const phonetic = document.getElementById('inputPhonetic').value.trim();
                const pos = document.getElementById('inputPos').value.trim();
                const meaning = document.getElementById('inputMeaning').value.trim();

                if (!word) {
                    showToast('⚠️ 请输入单词', 'error');
                    document.getElementById('inputWord').focus();
                    return;
                }
                if (!meaning) {
                    showToast('⚠️ 请输入中文翻译', 'error');
                    document.getElementById('inputMeaning').focus();
                    return;
                }

                const exists = words.some(w => w.word.toLowerCase() === word.toLowerCase());
                if (exists) {
                    if (!confirm(`单词 "${word}" 已存在，是否仍然添加？`)) {
                        return;
                    }
                }

                words.push({
                    word: word,
                    phonetic: phonetic,
                    pos: pos,
                    meaning: meaning
                });

                saveToStorage();
                updateAll();
                clearInputs();
                showToast(`✅ 已添加: ${word}`, 'success');
                document.getElementById('inputWord').focus();
            }

            function clearInputs() {
                document.getElementById('inputWord').value = '';
                document.getElementById('inputPhonetic').value = '';
                document.getElementById('inputPos').value = '';
                document.getElementById('inputMeaning').value = '';
            }

            function deleteWord(index) {
                const w = words[index];
                if (confirm(`确定删除单词 "${w.word}" 吗？`)) {
                    words.splice(index, 1);
                    saveToStorage();
                    updateAll();
                    showToast(`🗑️ 已删除: ${w.word}`, 'error');
                }
            }

            function openEditModal(index) {
                const w = words[index];
                document.getElementById('editIndex').value = index;
                document.getElementById('editWord').value = w.word;
                document.getElementById('editPhonetic').value = w.phonetic || '';
                document.getElementById('editPos').value = w.pos || '';
                document.getElementById('editMeaning').value = w.meaning || '';
                document.getElementById('editModal').classList.add('active');
            }

            function closeEditModal() {
                document.getElementById('editModal').classList.remove('active');
            }

            function saveEditWord() {
                const index = parseInt(document.getElementById('editIndex').value);
                if (isNaN(index) || index < 0 || index >= words.length) return;
                const word = document.getElementById('editWord').value.trim();
                const meaning = document.getElementById('editMeaning').value.trim();
                if (!word || !meaning) {
                    showToast('⚠️ 单词和翻译不能为空', 'error');
                    return;
                }
                words[index] = {
                    word: word,
                    phonetic: document.getElementById('editPhonetic').value.trim(),
                    pos: document.getElementById('editPos').value.trim(),
                    meaning: meaning
                };
                saveToStorage();
                updateAll();
                closeEditModal();
                showToast(`✅ 已更新: ${word}`, 'success');
            }

            function clearAllWords() {
                if (words.length === 0) {
                    showToast('列表已为空', '');
                    return;
                }
                if (confirm(`确定清空全部 ${words.length} 个单词吗？此操作不可撤销。`)) {
                    words = [];
                    saveToStorage();
                    updateAll();
                    showToast('🗑️ 已清空所有单词', 'error');
                }
            }

            function loadSampleData() {
                if (words.length > 0) {
                    if (!confirm('加载示例数据将覆盖现有单词，确定继续吗？')) {
                        return;
                    }
                }
                loadSampleDataSilent();
                showToast('📋 已加载示例单词数据', 'success');
            }

            function loadSampleDataSilent() {
                words = [
                    { word: 'abandon', phonetic: '/əˈbændən/', pos: 'v.', meaning: '放弃；抛弃' },
                    { word: 'brilliant', phonetic: '/ˈbrɪliənt/', pos: 'adj.', meaning: '杰出的；明亮的' },
                    { word: 'comprehensive', phonetic: '/ˌkɒmprɪˈhensɪv/', pos: 'adj.', meaning: '全面的；综合的' },
                    { word: 'dilemma', phonetic: '/dɪˈlemə/', pos: 'n.', meaning: '困境；进退两难' },
                    { word: 'eloquent', phonetic: '/ˈeləkwənt/', pos: 'adj.', meaning: '雄辩的；有口才的' },
                    { word: 'fluctuate', phonetic: '/ˈflʌktʃueɪt/', pos: 'v.', meaning: '波动；起伏' },
                    { word: 'genuine', phonetic: '/ˈdʒenjuɪn/', pos: 'adj.', meaning: '真正的；真诚的' },
                    { word: 'hypothesis', phonetic: '/haɪˈpɒθəsɪs/', pos: 'n.', meaning: '假设；假说' },
                    { word: 'inevitable', phonetic: '/ɪnˈevɪtəbl/', pos: 'adj.', meaning: '不可避免的' },
                    { word: 'jeopardize', phonetic: '/ˈdʒepədaɪz/', pos: 'v.', meaning: '危及；损害' },
                    { word: 'meticulous', phonetic: '/məˈtɪkjʊləs/', pos: 'adj.', meaning: '一丝不苟的；细致的' },
                    { word: 'nostalgia', phonetic: '/nɒˈstældʒə/', pos: 'n.', meaning: '怀旧；乡愁' },
                ];
                saveToStorage();
                updateAll();
            }

            // ==================== 批量导入 ====================
            function batchImport() {
                const rawText = document.getElementById('batchInput').value.trim();
                if (!rawText) {
                    showToast('⚠️ 请粘贴或输入单词数据', 'error');
                    return;
                }

                const lines = rawText.split(/[\n\r]+/).filter(line => line.trim());
                let importedCount = 0;
                let skippedCount = 0;
                const newWords = [];

                for (const line of lines) {
                    let parts = line.split('\t');
                    if (parts.length < 2) parts = line.split(',');
                    if (parts.length < 2) parts = line.split(/\s{2,}/);
                    if (parts.length < 2) {
                        const spaceParts = line.trim().split(/\s+/);
                        if (spaceParts.length >= 2) {
                            parts = [spaceParts[0], spaceParts.slice(1).join(' ')];
                        }
                    }

                    if (parts.length >= 2 && parts[0].trim()) {
                        const word = parts[0].trim();
                        const meaning = parts[parts.length - 1].trim();
                        let phonetic = '';
                        let pos = '';
                        if (parts.length >= 4) {
                            phonetic = parts[1].trim();
                            pos = parts[2].trim();
                        } else if (parts.length === 3) {
                            const second = parts[1].trim();
                            if (second.startsWith('/') || second.startsWith('[')) {
                                phonetic = second;
                            } else {
                                pos = second;
                            }
                        }
                        if (word && meaning) {
                            newWords.push({ word, phonetic, pos, meaning });
                            importedCount++;
                        } else {
                            skippedCount++;
                        }
                    } else {
                        skippedCount++;
                    }
                }

                if (newWords.length > 0) {
                    const existingWords = new Set(words.map(w => w.word.toLowerCase()));
                    const duplicates = newWords.filter(w => existingWords.has(w.word.toLowerCase()));
                    if (duplicates.length > 0 && !confirm(`有 ${duplicates.length} 个单词已存在（如 "${duplicates[0].word}"），是否仍然全部导入？`)) {
                        const uniqueNew = newWords.filter(w => !existingWords.has(w.word.toLowerCase()));
                        words.push(...uniqueNew);
                        importedCount = uniqueNew.length;
                        skippedCount += duplicates.length;
                    } else {
                        words.push(...newWords);
                    }
                    saveToStorage();
                    updateAll();
                    showToast(`✅ 成功导入 ${importedCount} 个单词` + (skippedCount > 0 ? `，跳过 ${skippedCount} 行` : ''), 'success');
                } else {
                    showToast('⚠️ 未能解析到有效单词，请检查格式', 'error');
                }
            }

            function exportWordsCSV() {
                if (words.length === 0) {
                    showToast('⚠️ 没有单词可导出', 'error');
                    return;
                }
                const csvContent = words.map(w => [w.word, w.phonetic || '', w.pos || '', w.meaning].join('\t')).join('\n');
                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = '单词卡片_' + new Date().toISOString().slice(0, 10) + '.csv';
                link.click();
                URL.revokeObjectURL(url);
                showToast('💾 CSV已导出', 'success');
            }

            function importCSVFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('batchInput').value = e.target.result;
                    showToast('📂 文件已加载到批量导入框，点击"批量导入"按钮完成导入', 'success');
                };
                reader.readAsText(file, 'UTF-8');
                event.target.value = '';
            }

            // ==================== 更新UI ====================
            function updateAll() {
                updateWordList();
                updatePreview();
                updateStats();
            }

            function updateStats() {
                document.getElementById('wordCount').textContent = '单词: ' + words.length;
                const perPage = getCardsPerPage();
                const pages = Math.ceil(words.length / perPage);
                document.getElementById('pageEstimate').textContent = '| 约' + pages + '页(单面)';
                document.getElementById('listCount').textContent = '(' + words.length + '个)';
            }

            function updateWordList() {
                const container = document.getElementById('wordListContainer');
                if (words.length === 0) {
                    container.innerHTML = `<div class="empty-list"><span class="big-emoji">📭</span>还没有添加单词<br>使用上方表单添加或批量导入</div>`;
                    return;
                }
                container.innerHTML = words.map((w, i) => `
                    <div class="word-item">
                        <span class="index">#${i + 1}</span>
                        <span class="w-word">${escapeHTML(w.word)}</span>
                        ${w.phonetic ? `<span class="w-phonetic">${escapeHTML(w.phonetic)}</span>` : ''}
                        ${w.pos ? `<span class="w-pos">${escapeHTML(w.pos)}</span>` : ''}
                        <span class="w-meaning">${escapeHTML(w.meaning)}</span>
                        <span class="item-actions">
                            <button class="btn btn-ghost btn-xs" onclick="openEditModal(${i})" title="编辑">✏️</button>
                            <button class="btn btn-ghost btn-xs" onclick="deleteWord(${i})" title="删除" style="color:#e74c3c;">🗑️</button>
                        </span>
                    </div>
                `).join('');
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 预览 ====================
            function getOrientation() {
                return document.getElementById('orientationSelect').value;
            }
            function getCols() {
                return parseInt(document.getElementById('colsSelect').value);
            }
            function getRows() {
                return parseInt(document.getElementById('rowsSelect').value);
            }
            function getFontScale() {
                return parseInt(document.getElementById('fontScale').value) / 100;
            }
            function getShowCutMarks() {
                return document.getElementById('showCutMarks').checked;
            }
            function getPreviewBack() {
                return document.getElementById('previewBack').checked;
            }
            function getCardsPerPage() {
                return getCols() * getRows();
            }

            function updatePreview() {
                const sheet = document.getElementById('previewSheet');
                const orientation = getOrientation();
                const cols = getCols();
                const rows = getRows();
                const fontScale = getFontScale();
                const showCutMarks = getShowCutMarks();
                const previewBack = getPreviewBack();
                const cardsPerPage = cols * rows;

                // 更新纸张方向class
                sheet.className = 'preview-sheet ' + orientation;

                // 设置grid
                sheet.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                sheet.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

                // 生成预览卡片
                let html = '';
                const displayWords = words.slice(0, cardsPerPage);

                for (let i = 0; i < cardsPerPage; i++) {
                    if (i < displayWords.length) {
                        const w = displayWords[i];
                        if (previewBack) {
                            html += `
                            <div class="preview-card back-card" style="font-size:${fontScale}em;" title="${escapeHTML(w.word)} - 背面">
                                <div class="card-inner">
                                    ${w.phonetic ? `<span class="card-phonetic" style="font-size:${0.7*fontScale}em;">${escapeHTML(w.phonetic)}</span>` : ''}
                                    <span class="card-meaning" style="font-size:${0.9*fontScale}em;">${escapeHTML(w.meaning)}</span>
                                    ${w.pos ? `<span class="card-pos" style="font-size:${0.65*fontScale}em;">${escapeHTML(w.pos)}</span>` : ''}
                                </div>
                            </div>`;
                        } else {
                            html += `
                            <div class="preview-card front-card" style="font-size:${fontScale}em;" title="${escapeHTML(w.word)}">
                                <span class="card-word">${escapeHTML(w.word)}</span>
                            </div>`;
                        }
                    } else {
                        html += `<div class="preview-card empty-card" style="font-size:${fontScale}em;"></div>`;
                    }
                }
                sheet.innerHTML = html;

                if (!showCutMarks) {
                    sheet.querySelectorAll('.preview-card').forEach(card => {
                        card.style.borderStyle = 'solid';
                        card.style.borderColor = '#e8e1d8';
                    });
                } else {
                    sheet.querySelectorAll('.preview-card').forEach(card => {
                        card.style.borderStyle = 'dashed';
                        card.style.borderColor = '#d5cdc3';
                    });
                }

                updateStats();
            }

            // ==================== 打印功能 ====================
            function buildPrintPages(forBack = false, duplexMode = false) {
                const cols = getCols();
                const rows = getRows();
                const cardsPerPage = cols * rows;
                const orientation = getOrientation();
                const fontScale = getFontScale();
                const showCutMarks = getShowCutMarks();
                const totalPages = Math.ceil(words.length / cardsPerPage);

                const printContainer = document.getElementById('printContainer');
                printContainer.innerHTML = '';

                const pageSequence = [];
                if (duplexMode) {
                    for (let p = 0; p < totalPages; p++) {
                        pageSequence.push({ pageIndex: p, isBack: false });
                        pageSequence.push({ pageIndex: p, isBack: true });
                    }
                } else if (forBack) {
                    for (let p = 0; p < totalPages; p++) pageSequence.push({ pageIndex: p, isBack: true });
                } else {
                    for (let p = 0; p < totalPages; p++) pageSequence.push({ pageIndex: p, isBack: false });
                }

                pageSequence.forEach(({ pageIndex, isBack }) => {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'print-page';
                    if (orientation === 'landscape') pageDiv.classList.add('landscape-print');
                    pageDiv.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                    pageDiv.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
                    pageDiv.style.gap = '3mm';
                    pageDiv.style.padding = '8mm';

                    const startIdx = pageIndex * cardsPerPage;
                    const endIdx = Math.min(startIdx + cardsPerPage, words.length);

                    for (let i = 0; i < cardsPerPage; i++) {
                        const cardDiv = document.createElement('div');
                        cardDiv.className = 'print-card';
                        if (!showCutMarks) {
                            cardDiv.style.borderStyle = 'solid';
                            cardDiv.style.borderColor = '#ccc';
                        }

                        const wordIndex = startIdx + i;
                        if (wordIndex < endIdx) {
                            const w = words[wordIndex];
                            const innerDiv = document.createElement('div');
                            innerDiv.className = 'card-inner';
                            if (isBack) {
                                if (w.phonetic) {
                                    const ph = document.createElement('span');
                                    ph.className = 'card-phonetic';
                                    ph.textContent = w.phonetic;
                                    ph.style.fontSize = (7.5 * fontScale) + 'pt';
                                    innerDiv.appendChild(ph);
                                }
                                const meaning = document.createElement('span');
                                meaning.className = 'card-meaning';
                                meaning.textContent = w.meaning;
                                meaning.style.fontSize = (10 * fontScale) + 'pt';
                                innerDiv.appendChild(meaning);
                                if (w.pos) {
                                    const pos = document.createElement('span');
                                    pos.className = 'card-pos';
                                    pos.textContent = w.pos;
                                    pos.style.fontSize = (7 * fontScale) + 'pt';
                                    innerDiv.appendChild(pos);
                                }
                            } else {
                                const wordSpan = document.createElement('span');
                                wordSpan.className = 'card-word';
                                wordSpan.textContent = w.word;
                                wordSpan.style.fontSize = (11 * fontScale) + 'pt';
                                innerDiv.appendChild(wordSpan);
                            }
                            cardDiv.appendChild(innerDiv);
                        } else {
                            cardDiv.classList.add('empty-print-card');
                        }
                        pageDiv.appendChild(cardDiv);
                    }
                    printContainer.appendChild(pageDiv);
                });
                return pageSequence.length;
            }

            function triggerPrint(printLabel) {
                const orientation = getOrientation();
                const styleId = 'dynamic-print-style';
                let styleEl = document.getElementById(styleId);
                if (!styleEl) {
                    styleEl = document.createElement('style');
                    styleEl.id = styleId;
                    document.head.appendChild(styleEl);
                }
                const pageSize = orientation === 'landscape' ? 'A4 landscape' : 'A4 portrait';
                styleEl.textContent = `
                    @media print {
                        @page { size: ${pageSize}; margin: 0; }
                        .print-page { width: ${orientation === 'landscape' ? '297mm' : '210mm'}; height: ${orientation === 'landscape' ? '210mm' : '297mm'}; }
                    }
                `;
                setTimeout(() => { window.print(); }, 200);
                showToast(`🖨️ 正在准备打印：${printLabel}。请在打印对话框中选择"另存为PDF"或选择A4纸张。`, 'success');
            }

            function printFrontOnly() {
                if (words.length === 0) { showToast('⚠️ 请先添加单词', 'error'); return; }
                buildPrintPages(false, false);
                triggerPrint('正面（单词）');
            }

            function printBackOnly() {
                if (words.length === 0) { showToast('⚠️ 请先添加单词', 'error'); return; }
                buildPrintPages(true, false);
                triggerPrint('背面（翻译/音标/词性）');
            }

            function printDuplex() {
                if (words.length === 0) { showToast('⚠️ 请先添加单词', 'error'); return; }
                buildPrintPages(false, true);
                triggerPrint('双面打印（正反面交替）');
            }

            // ==================== 键盘快捷键 ====================
            function setupKeyboard() {
                document.addEventListener('keydown', function(e) {
                    if (e.ctrlKey && e.key === 'Enter') {
                        const activeEl = document.activeElement;
                        if (activeEl && (activeEl.id === 'inputWord' || activeEl.id === 'inputPhonetic' || activeEl.id === 'inputPos' || activeEl.id === 'inputMeaning')) {
                            e.preventDefault();
                            addWord();
                        }
                    }
                    if (e.key === 'Escape') closeEditModal();
                });

                document.getElementById('editModal').addEventListener('click', function(e) {
                    if (e.target === this) closeEditModal();
                });

                const inputs = ['inputWord', 'inputPhonetic', 'inputPos', 'inputMeaning'];
                inputs.forEach(id => {
                    document.getElementById(id).addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
                            e.preventDefault();
                            const currentIdx = inputs.indexOf(id);
                            if (currentIdx < inputs.length - 1) {
                                document.getElementById(inputs[currentIdx + 1]).focus();
                            } else {
                                addWord();
                            }
                        }
                    });
                });
            }

            // 暴露全局函数
            window.addWord = addWord;
            window.deleteWord = deleteWord;
            window.openEditModal = openEditModal;
            window.closeEditModal = closeEditModal;
            window.saveEditWord = saveEditWord;
            window.clearAllWords = clearAllWords;
            window.loadSampleData = loadSampleData;
            window.batchImport = batchImport;
            window.exportWordsCSV = exportWordsCSV;
            window.importCSVFile = importCSVFile;
            window.updatePreview = updatePreview;
            window.printFrontOnly = printFrontOnly;
            window.printBackOnly = printBackOnly;
            window.printDuplex = printDuplex;

            // 启动
            init();
            setupKeyboard();

            ['orientationSelect', 'colsSelect', 'rowsSelect', 'fontScale', 'showCutMarks', 'previewBack'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', updatePreview);
                    if (el.type === 'range') el.addEventListener('input', updatePreview);
                }
            });

            console.log('📝 单词卡片制作工具已就绪 (字体缩放默认125%，预览真实A4比例)');
        })();
    </script>
</body>
</html>
