<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 转图片 - 在线转换工具</title>

    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
    </script>
    <!-- JSZip CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>

    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4f6ef7;
            --primary-hover: #3b54d4;
            --primary-light: #eef1fe;
            --text: #1a1d2e;
            --text-secondary: #5a5f72;
            --border: #e2e7ef;
            --border-focus: #b8c4f8;
            --danger: #e74c5e;
            --success: #2ecc71;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(79, 110, 247, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -25%;
            left: -15%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(79, 110, 247, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .app-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .app-header .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: var(--radius-lg);
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(79, 110, 247, 0.25);
            font-size: 28px;
            color: #fff;
        }
        .app-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .app-header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* 卡片容器 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 24px 28px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition), border-color var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .card-header .icon-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
        }

        /* 上传区域 */
        .upload-zone {
            position: relative;
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 32px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: #fafbfd;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 0 0 6px rgba(79, 110, 247, 0.06);
        }
        .upload-zone.drag-over {
            border-style: solid;
            box-shadow: 0 0 0 10px rgba(79, 110, 247, 0.1);
            transform: scale(1.01);
        }
        .upload-zone .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            transition: transform var(--transition);
        }
        .upload-zone:hover .upload-icon {
            transform: translateY(-4px);
        }
        .upload-zone .upload-text {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text);
            margin-bottom: 4px;
        }
        .upload-zone .upload-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* 文件信息条 */
        .file-info-bar {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .file-info-bar.active {
            display: flex;
        }
        .file-info-bar .file-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: #fef3f2;
            color: #e74c3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .file-info-bar .file-details {
            flex: 1;
            min-width: 0;
        }
        .file-info-bar .file-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-info-bar .file-meta {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .file-info-bar .btn-remove {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .file-info-bar .btn-remove:hover {
            background: #fee2e2;
            border-color: #fca5a5;
            color: var(--danger);
        }

        /* 缩略图预览 */
        .preview-section {
            display: none;
        }
        .preview-section.active {
            display: block;
        }
        .preview-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .preview-toolbar .btn-sm {
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            color: var(--text);
        }
        .preview-toolbar .btn-sm:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }
        .preview-toolbar .btn-sm.active-select {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .preview-toolbar .selected-count {
            font-size: 0.82rem;
            color: var(--primary);
            font-weight: 600;
            margin-left: auto;
            white-space: nowrap;
        }
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            max-height: 420px;
            overflow-y: auto;
            padding: 4px;
            scroll-behavior: smooth;
        }
        .thumbnail-grid::-webkit-scrollbar {
            width: 5px;
        }
        .thumbnail-grid::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }
        .thumbnail-grid::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        .thumbnail-item {
            position: relative;
            border: 3px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            background: #f9fafb;
            overflow: hidden;
            aspect-ratio: 0.707;
            /* A4比例近似 */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }
        .thumbnail-item:hover {
            border-color: #c5cef8;
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .thumbnail-item.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.15);
            transform: translateY(-2px);
        }
        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .thumbnail-item .page-num {
            position: absolute;
            bottom: 4px;
            right: 6px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 500;
            pointer-events: none;
        }
        .thumbnail-item .check-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            pointer-events: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .thumbnail-item.selected .check-badge {
            display: flex;
        }
        .thumbnail-item .loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 设置面板 */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .setting-group label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 5px;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .setting-group select,
        .setting-group input[type="number"],
        .setting-group input[type="range"] {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            background: #fafbfd;
            transition: all var(--transition);
            color: var(--text);
            outline: none;
        }
        .setting-group select:focus,
        .setting-group input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
            background: #fff;
        }
        .setting-group input[type="range"] {
            padding: 0;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #e2e7ef;
            border-radius: 3px;
            cursor: pointer;
            border: none;
        }
        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: transform var(--transition);
        }
        .setting-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 3px;
        }
        .quality-value {
            display: inline-block;
            font-weight: 600;
            color: var(--primary);
            min-width: 32px;
            text-align: center;
        }

        /* 页面范围输入 */
        .page-range-input {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .page-range-input input {
            flex: 1;
            min-width: 180px;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: var(--font-mono);
            background: #fafbfd;
            transition: all var(--transition);
            color: var(--text);
            outline: none;
        }
        .page-range-input input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
            background: #fff;
        }
        .page-range-input .btn-apply {
            padding: 9px 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .page-range-input .btn-apply:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
        }
        .page-range-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 操作按钮 */
        .action-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            letter-spacing: -0.01em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 110, 247, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(79, 110, 247, 0.4);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.15);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(20%);
        }

        /* 进度覆盖层 */
        .progress-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .progress-overlay.active {
            display: flex;
        }
        .progress-card {
            background: #fff;
            border-radius: var(--radius-xl);
            padding: 32px 36px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            min-width: 320px;
            max-width: 90vw;
        }
        .progress-card .progress-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .progress-card .progress-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }
        .progress-bar-track {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f6ef7, #6c8cff);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-percent {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            margin-top: 10px;
        }
        .btn-cancel {
            margin-top: 16px;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all var(--transition);
        }
        .btn-cancel:hover {
            background: #fee2e2;
            border-color: #fca5a5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1d2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 2000;
            box-shadow: var(--shadow-lg);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #dc2626;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .app-container {
                padding: 16px 12px 30px;
            }
            .card {
                padding: 18px 16px;
                border-radius: var(--radius-lg);
            }
            .upload-zone {
                padding: 32px 16px;
            }
            .upload-zone .upload-icon {
                font-size: 36px;
            }
            .thumbnail-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 6px;
                max-height: 320px;
            }
            .settings-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
            .action-bar {
                gap: 8px;
            }
            .app-header h1 {
                font-size: 1.4rem;
            }
        }
        @media (max-width: 480px) {
            .thumbnail-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 5px;
                max-height: 260px;
            }
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .action-bar {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <div class="logo-icon">📄</div>
            <h1>PDF 转图片</h1>
            <p class="subtitle">高质量 · 多格式 · 批量转换 · 纯本地处理</p>
        </div>

        <!-- 上传区域 -->
        <div class="card" id="uploadCard">
            <div class="upload-zone" id="uploadZone">
                <span class="upload-icon">📤</span>
                <p class="upload-text">点击上传或拖拽 PDF 文件到此处</p>
                <p class="upload-hint">支持任意大小的 PDF 文件 · 所有处理均在本地完成</p>
                <input type="file" id="fileInput" accept=".pdf,application/pdf">
            </div>
            <!-- 文件信息条 -->
            <div class="file-info-bar" id="fileInfoBar">
                <div class="file-icon">PDF</div>
                <div class="file-details">
                    <div class="file-name" id="fileNameDisplay">-</div>
                    <div class="file-meta" id="fileMetaDisplay">-</div>
                </div>
                <button class="btn-remove" id="btnRemoveFile" title="移除文件">✕</button>
            </div>
        </div>

        <!-- 缩略图预览 -->
        <div class="card preview-section" id="previewSection">
            <div class="card-header">
                <span class="icon-dot"></span> 页面预览 · 点击缩略图选择页面
            </div>
            <div class="preview-toolbar">
                <button class="btn-sm" id="btnSelectAll">✅ 全选</button>
                <button class="btn-sm" id="btnDeselectAll">⬜ 取消全选</button>
                <button class="btn-sm" id="btnInvertSelect">🔄 反选</button>
                <span class="selected-count" id="selectedCount">已选: 0 页</span>
            </div>
            <div class="thumbnail-grid" id="thumbnailGrid">
                <!-- 动态填充 -->
            </div>
            <p style="font-size:0.75rem;color:var(--text-secondary);margin-top:8px;text-align:center;">
                💡 点击缩略图可切换选中状态 · 下方也可使用范围输入精确选择
            </p>
        </div>

        <!-- 设置面板 -->
        <div class="card" id="settingsCard">
            <div class="card-header">
                <span class="icon-dot"></span> 输出设置
            </div>
            <div class="settings-grid">
                <!-- 页面范围 -->
                <div class="setting-group" style="grid-column: 1 / -1;">
                    <label>📑 页面范围（如：1-3,5,7-10）</label>
                    <div class="page-range-input">
                        <input type="text" id="pageRangeInput" placeholder="留空 = 转换全部已选页面" value="">
                        <button class="btn-apply" id="btnApplyRange">应用范围</button>
                    </div>
                    <p class="page-range-hint">示例：1-5,8,10-12 · 应用后将自动更新上方缩略图选择</p>
                </div>
                <!-- 图片格式 -->
                <div class="setting-group">
                    <label>🖼️ 输出格式</label>
                    <select id="formatSelect">
                        <option value="png">PNG（无损 · 文件较大）</option>
                        <option value="jpeg" selected>JPEG（有损 · 文件较小）</option>
                        <option value="webp">WebP（平衡 · 推荐）</option>
                    </select>
                </div>
                <!-- 缩放比例 -->
                <div class="setting-group">
                    <label>🔍 缩放比例</label>
                    <select id="scaleSelect">
                        <option value="1">1x（标清 · 72 DPI 等效）</option>
                        <option value="1.5">1.5x（中等清晰度）</option>
                        <option value="2" selected>2x（高清 · 推荐）</option>
                        <option value="3">3x（超清 · 文件较大）</option>
                        <option value="4">4x（极致清晰）</option>
                        <option value="custom">自定义...</option>
                    </select>
                </div>
                <!-- 自定义缩放 -->
                <div class="setting-group" id="customScaleGroup" style="display:none;">
                    <label>✏️ 自定义缩放 (0.5 - 5.0)</label>
                    <input type="number" id="customScaleInput" value="2" min="0.5" max="5" step="0.1">
                </div>
                <!-- JPEG/WebP 质量 -->
                <div class="setting-group" id="qualityGroup">
                    <label>🎚️ 图片质量：<span class="quality-value" id="qualityValue">92%</span></label>
                    <input type="range" id="qualityRange" min="10" max="100" value="92" step="1">
                    <div class="range-labels"><span>10% (体积小)</span><span>100% (最佳)</span></div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <button class="btn btn-primary" id="btnConvertDownload" disabled>
                ⬇️ 转换并下载
            </button>
            <button class="btn btn-outline" id="btnDownloadSelected" disabled>
                📥 下载选中页（ZIP打包）
            </button>
        </div>
    </div>

    <!-- 进度覆盖层 -->
    <div class="progress-overlay" id="progressOverlay">
        <div class="progress-card">
            <p class="progress-title">⏳ 正在转换...</p>
            <p class="progress-subtitle" id="progressSubtitle">准备中...</p>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <p class="progress-percent" id="progressPercent">0%</p>
            <button class="btn-cancel" id="btnCancelConvert">取消</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ 设置 PDF.js Worker ============
            if (typeof pdfjsLib !== 'undefined') {
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }

            // ============ DOM 引用 ============
            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');
            const fileInfoBar = document.getElementById('fileInfoBar');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const fileMetaDisplay = document.getElementById('fileMetaDisplay');
            const btnRemoveFile = document.getElementById('btnRemoveFile');
            const previewSection = document.getElementById('previewSection');
            const thumbnailGrid = document.getElementById('thumbnailGrid');
            const selectedCount = document.getElementById('selectedCount');
            const pageRangeInput = document.getElementById('pageRangeInput');
            const btnApplyRange = document.getElementById('btnApplyRange');
            const formatSelect = document.getElementById('formatSelect');
            const scaleSelect = document.getElementById('scaleSelect');
            const customScaleGroup = document.getElementById('customScaleGroup');
            const customScaleInput = document.getElementById('customScaleInput');
            const qualityGroup = document.getElementById('qualityGroup');
            const qualityRange = document.getElementById('qualityRange');
            const qualityValue = document.getElementById('qualityValue');
            const btnConvertDownload = document.getElementById('btnConvertDownload');
            const btnDownloadSelected = document.getElementById('btnDownloadSelected');
            const progressOverlay = document.getElementById('progressOverlay');
            const progressBarFill = document.getElementById('progressBarFill');
            const progressPercent = document.getElementById('progressPercent');
            const progressSubtitle = document.getElementById('progressSubtitle');
            const btnCancelConvert = document.getElementById('btnCancelConvert');
            const toast = document.getElementById('toast');
            const btnSelectAll = document.getElementById('btnSelectAll');
            const btnDeselectAll = document.getElementById('btnDeselectAll');
            const btnInvertSelect = document.getElementById('btnInvertSelect');

            // ============ 状态 ============
            let pdfDoc = null;
            let totalPages = 0;
            let selectedPagesSet = new Set(); // 选中的页码（1-based）
            let thumbnailDataUrls = {}; // 缩略图缓存 {pageNum: dataUrl}
            let cancelRequested = false;
            let renderToken = 0; // 用于中止旧的渲染
            let currentFileName = 'document';

            // ============ Toast ============
            let toastTimer;

            function showToast(msg, type = '') {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }

            // ============ 文件大小格式化 ============
            function formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            // ============ 页面范围解析 ============
            function parsePageRange(rangeStr, maxPage) {
                // 支持格式: "1-5,8,10-12" 或 "1,3,5"
                if (!rangeStr || !rangeStr.trim()) return null; // 空 = 全部
                const pages = new Set();
                const parts = rangeStr.split(',');
                for (let part of parts) {
                    part = part.trim();
                    if (!part) continue;
                    if (part.includes('-')) {
                        const [startStr, endStr] = part.split('-');
                        const start = parseInt(startStr.trim(), 10);
                        const end = parseInt(endStr.trim(), 10);
                        if (isNaN(start) || isNaN(end)) continue;
                        const s = Math.max(1, Math.min(start, end));
                        const e = Math.min(maxPage, Math.max(start, end));
                        for (let i = s; i <= e; i++) pages.add(i);
                    } else {
                        const num = parseInt(part, 10);
                        if (!isNaN(num) && num >= 1 && num <= maxPage) {
                            pages.add(num);
                        }
                    }
                }
                return pages.size > 0 ? Array.from(pages).sort((a, b) => a - b) : null;
            }

            function pagesToRangeString(pagesArray) {
                if (!pagesArray || pagesArray.length === 0) return '';
                const sorted = [...pagesArray].sort((a, b) => a - b);
                const ranges = [];
                let start = sorted[0];
                let end = sorted[0];
                for (let i = 1; i < sorted.length; i++) {
                    if (sorted[i] === end + 1) {
                        end = sorted[i];
                    } else {
                        ranges.push(start === end ? `${start}` : `${start}-${end}`);
                        start = sorted[i];
                        end = sorted[i];
                    }
                }
                ranges.push(start === end ? `${start}` : `${start}-${end}`);
                return ranges.join(',');
            }

            // ============ 更新选中计数 ============
            function updateSelectedCount() {
                const count = selectedPagesSet.size;
                selectedCount.textContent = `已选: ${count} 页`;
                // 同步范围输入框
                const sorted = Array.from(selectedPagesSet).sort((a, b) => a - b);
                pageRangeInput.value = pagesToRangeString(sorted);
                // 更新按钮状态
                const hasSelection = count > 0;
                btnConvertDownload.disabled = !hasSelection;
                btnDownloadSelected.disabled = !hasSelection;
                if (hasSelection) {
                    btnConvertDownload.textContent = `⬇️ 转换并下载 (${count} 页)`;
                    btnDownloadSelected.textContent = `📥 下载选中页 · ZIP打包 (${count} 页)`;
                } else {
                    btnConvertDownload.textContent = '⬇️ 转换并下载';
                    btnDownloadSelected.textContent = '📥 下载选中页（ZIP打包）';
                }
            }

            // ============ 渲染缩略图 ============
            async function renderThumbnails(token) {
                if (!pdfDoc) return;
                thumbnailGrid.innerHTML = '';
                thumbnailDataUrls = {};
                const scale = 0.25; // 缩略图缩放
                const batchSize = 4; // 每批渲染页数

                for (let i = 1; i <= totalPages; i++) {
                    // 创建缩略图占位
                    const item = document.createElement('div');
                    item.className = 'thumbnail-item';
                    if (selectedPagesSet.has(i)) item.classList.add('selected');
                    item.dataset.page = i;
                    item.innerHTML = `
                        <div class="loading-spinner"></div>
                        <span class="page-num">${i}</span>
                        <span class="check-badge">✓</span>
                    `;
                    item.addEventListener('click', () => togglePageSelection(i, item));
                    thumbnailGrid.appendChild(item);
                }

                // 分批渲染
                for (let batchStart = 1; batchStart <= totalPages; batchStart += batchSize) {
                    if (token !== renderToken) return; // 被取消
                    const batchEnd = Math.min(batchStart + batchSize - 1, totalPages);
                    const batchPromises = [];
                    for (let i = batchStart; i <= batchEnd; i++) {
                        batchPromises.push(renderSingleThumbnail(i, scale, token));
                    }
                    await Promise.all(batchPromises);
                }
            }

            async function renderSingleThumbnail(pageNum, scale, token) {
                try {
                    if (token !== renderToken) return;
                    const page = await pdfDoc.getPage(pageNum);
                    const viewport = page.getViewport({ scale });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    await page.render({ canvasContext: ctx, viewport }).promise;
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    thumbnailDataUrls[pageNum] = dataUrl;

                    // 更新DOM
                    if (token !== renderToken) return;
                    const item = thumbnailGrid.querySelector(`[data-page="${pageNum}"]`);
                    if (item) {
                        const spinner = item.querySelector('.loading-spinner');
                        if (spinner) spinner.remove();
                        let img = item.querySelector('img');
                        if (!img) {
                            img = document.createElement('img');
                            img.alt = `第 ${pageNum} 页`;
                            item.insertBefore(img, item.firstChild);
                        }
                        img.src = dataUrl;
                    }
                } catch (err) {
                    console.warn(`渲染缩略图第${pageNum}页失败:`, err);
                }
            }

            function togglePageSelection(pageNum, itemElement) {
                if (selectedPagesSet.has(pageNum)) {
                    selectedPagesSet.delete(pageNum);
                    if (itemElement) itemElement.classList.remove('selected');
                } else {
                    selectedPagesSet.add(pageNum);
                    if (itemElement) itemElement.classList.add('selected');
                }
                // 同步更新所有同页码的元素（以防万一）
                const allItems = thumbnailGrid.querySelectorAll(`[data-page="${pageNum}"]`);
                allItems.forEach(el => {
                    if (selectedPagesSet.has(pageNum)) {
                        el.classList.add('selected');
                    } else {
                        el.classList.remove('selected');
                    }
                });
                updateSelectedCount();
            }

            // ============ 加载PDF ============
            async function loadPDF(file) {
                // 清理旧状态
                pdfDoc = null;
                totalPages = 0;
                selectedPagesSet.clear();
                thumbnailDataUrls = {};
                thumbnailGrid.innerHTML = '';
                previewSection.classList.remove('active');
                fileInfoBar.classList.remove('active');
                btnConvertDownload.disabled = true;
                btnDownloadSelected.disabled = true;
                pageRangeInput.value = '';
                renderToken++; // 中止旧渲染
                const token = renderToken;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    if (token !== renderToken) return;
                    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                    pdfDoc = await loadingTask.promise;
                    if (token !== renderToken) return;
                    totalPages = pdfDoc.numPages;
                    currentFileName = file.name.replace(/\.pdf$/i, '') || 'document';

                    // 默认全选
                    for (let i = 1; i <= totalPages; i++) {
                        selectedPagesSet.add(i);
                    }

                    // 显示文件信息
                    fileNameDisplay.textContent = file.name;
                    fileMetaDisplay.textContent = `${totalPages} 页 · ${formatFileSize(file.size)}`;
                    fileInfoBar.classList.add('active');

                    // 显示预览区
                    previewSection.classList.add('active');

                    // 渲染缩略图
                    await renderThumbnails(token);
                    if (token !== renderToken) return;

                    updateSelectedCount();
                    showToast(`✅ 已加载：${file.name}（${totalPages} 页）`, 'success');
                } catch (err) {
                    console.error('加载PDF失败:', err);
                    showToast('❌ 无法加载PDF文件，请确认文件格式正确', 'error');
                    pdfDoc = null;
                    totalPages = 0;
                    selectedPagesSet.clear();
                    previewSection.classList.remove('active');
                    fileInfoBar.classList.remove('active');
                    updateSelectedCount();
                }
            }

            // ============ 获取缩放比例 ============
            function getScale() {
                const val = scaleSelect.value;
                if (val === 'custom') {
                    const customVal = parseFloat(customScaleInput.value);
                    if (isNaN(customVal) || customVal < 0.5) return 0.5;
                    if (customVal > 5) return 5;
                    return customVal;
                }
                return parseFloat(val);
            }

            // ============ 获取输出格式和MIME类型 ============
            function getFormatInfo() {
                const format = formatSelect.value;
                const mimeMap = {
                    'png': 'image/png',
                    'jpeg': 'image/jpeg',
                    'webp': 'image/webp',
                };
                const extMap = {
                    'png': 'png',
                    'jpeg': 'jpg',
                    'webp': 'webp',
                };
                return {
                    format,
                    mimeType: mimeMap[format] || 'image/png',
                    extension: extMap[format] || 'png',
                };
            }

            // ============ 获取质量参数 ============
            function getQuality() {
                return parseInt(qualityRange.value) / 100;
            }

            // ============ 渲染单页为Blob ============
            async function renderPageToBlob(pageNum, scale, formatInfo, quality) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;

                return new Promise((resolve, reject) => {
                    const options = {};
                    if (formatInfo.format === 'jpeg' || formatInfo.format === 'webp') {
                        options.quality = quality;
                    }
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject(new Error('Canvas toBlob 失败'));
                        }
                    }, formatInfo.mimeType, quality);
                });
            }

            // ============ 下载单个Blob ============
            function downloadBlob(blob, filename) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            }

            // ============ 转换并下载 ============
            async function convertAndDownload(pagesToConvert) {
                if (!pdfDoc || pagesToConvert.length === 0) {
                    showToast('⚠️ 请先选择要转换的页面', 'error');
                    return;
                }

                cancelRequested = false;
                progressOverlay.classList.add('active');
                progressBarFill.style.width = '0%';
                progressPercent.textContent = '0%';
                progressSubtitle.textContent = '准备中...';
                btnCancelConvert.style.display = 'inline-block';

                const scale = getScale();
                const formatInfo = getFormatInfo();
                const quality = getQuality();
                const total = pagesToConvert.length;

                try {
                    if (total === 1) {
                        // 单页直接下载
                        progressSubtitle.textContent = `正在渲染第 ${pagesToConvert[0]} 页...`;
                        progressBarFill.style.width = '30%';
                        progressPercent.textContent = '30%';
                        const blob = await renderPageToBlob(pagesToConvert[0], scale, formatInfo, quality);
                        if (cancelRequested) return;
                        progressBarFill.style.width = '100%';
                        progressPercent.textContent = '100%';
                        const filename =
                            `${currentFileName}_第${pagesToConvert[0]}页.${formatInfo.extension}`;
                        downloadBlob(blob, filename);
                        showToast(`✅ 已下载：${filename}`, 'success');
                    } else {
                        // 多页打包ZIP
                        if (typeof JSZip === 'undefined') {
                            throw new Error('JSZip 库未加载，请刷新页面后重试');
                        }
                        const zip = new JSZip();
                        for (let i = 0; i < total; i++) {
                            if (cancelRequested) return;
                            const pageNum = pagesToConvert[i];
                            const percent = Math.round((i / total) * 90);
                            progressBarFill.style.width = percent + '%';
                            progressPercent.textContent = percent + '%';
                            progressSubtitle.textContent = `正在渲染第 ${pageNum} 页... (${i + 1}/${total})`;
                            const blob = await renderPageToBlob(pageNum, scale, formatInfo, quality);
                            const filename =
                                `${currentFileName}_第${String(pageNum).padStart(3, '0')}页.${formatInfo.extension}`;
                            zip.file(filename, blob);
                        }
                        if (cancelRequested) return;
                        progressSubtitle.textContent = '正在打包 ZIP 文件...';
                        progressBarFill.style.width = '92%';
                        progressPercent.textContent = '92%';
                        const zipBlob = await zip.generateAsync({
                            type: 'blob',
                            compression: 'DEFLATE',
                            compressionOptions: { level: 6 },
                        }, (meta) => {
                            if (cancelRequested) return;
                            const pct = Math.min(99, 92 + Math.round(meta.percent * 0.07));
                            progressBarFill.style.width = pct + '%';
                            progressPercent.textContent = pct + '%';
                        });
                        if (cancelRequested) return;
                        progressBarFill.style.width = '100%';
                        progressPercent.textContent = '100%';
                        const zipFilename = `${currentFileName}_图片合集.zip`;
                        downloadBlob(zipBlob, zipFilename);
                        showToast(`✅ 已下载：${zipFilename}（${total} 页）`, 'success');
                    }
                } catch (err) {
                    console.error('转换失败:', err);
                    showToast('❌ 转换过程中出现错误：' + (err.message || '未知错误'), 'error');
                } finally {
                    progressOverlay.classList.remove('active');
                    btnCancelConvert.style.display = 'inline-block';
                    cancelRequested = false;
                }
            }

            // ============ 事件监听 ============

            // 上传区域点击
            uploadZone.addEventListener('click', (e) => {
                if (e.target !== fileInput) {
                    fileInput.click();
                }
            });

            // 文件选择
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file && (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
                    loadPDF(file);
                } else if (file) {
                    showToast('⚠️ 请选择PDF文件', 'error');
                }
                fileInput.value = '';
            });

            // 拖拽事件
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadZone.classList.add('drag-over');
            });
            uploadZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadZone.classList.remove('drag-over');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                uploadZone.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file && (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
                    loadPDF(file);
                } else if (file) {
                    showToast('⚠️ 请拖入PDF文件', 'error');
                }
            });

            // 全局拖拽（防止浏览器打开PDF）
            document.addEventListener('dragover', (e) => {
                if (e.dataTransfer.types.includes('Files')) {
                    e.preventDefault();
                }
            });
            document.addEventListener('drop', (e) => {
                if (e.dataTransfer.types.includes('Files') && !uploadZone.contains(e.target)) {
                    e.preventDefault();
                }
            });

            // 移除文件
            btnRemoveFile.addEventListener('click', () => {
                pdfDoc = null;
                totalPages = 0;
                selectedPagesSet.clear();
                thumbnailDataUrls = {};
                thumbnailGrid.innerHTML = '';
                previewSection.classList.remove('active');
                fileInfoBar.classList.remove('active');
                pageRangeInput.value = '';
                btnConvertDownload.disabled = true;
                btnDownloadSelected.disabled = true;
                updateSelectedCount();
                renderToken++;
                showToast('已清除当前文件');
            });

            // 全选
            btnSelectAll.addEventListener('click', () => {
                if (!pdfDoc) return;
                selectedPagesSet.clear();
                for (let i = 1; i <= totalPages; i++) selectedPagesSet.add(i);
                syncThumbnailSelection();
                updateSelectedCount();
            });

            // 取消全选
            btnDeselectAll.addEventListener('click', () => {
                selectedPagesSet.clear();
                syncThumbnailSelection();
                updateSelectedCount();
            });

            // 反选
            btnInvertSelect.addEventListener('click', () => {
                if (!pdfDoc) return;
                const newSet = new Set();
                for (let i = 1; i <= totalPages; i++) {
                    if (!selectedPagesSet.has(i)) newSet.add(i);
                }
                selectedPagesSet = newSet;
                syncThumbnailSelection();
                updateSelectedCount();
            });

            function syncThumbnailSelection() {
                const items = thumbnailGrid.querySelectorAll('.thumbnail-item');
                items.forEach(item => {
                    const page = parseInt(item.dataset.page, 10);
                    if (selectedPagesSet.has(page)) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }

            // 应用范围
            btnApplyRange.addEventListener('click', () => {
                if (!pdfDoc) return;
                const rangeStr = pageRangeInput.value.trim();
                if (!rangeStr) {
                    // 空输入 = 全选
                    selectedPagesSet.clear();
                    for (let i = 1; i <= totalPages; i++) selectedPagesSet.add(i);
                } else {
                    const parsed = parsePageRange(rangeStr, totalPages);
                    if (parsed === null) {
                        showToast('⚠️ 无法解析范围，请检查格式', 'error');
                        return;
                    }
                    selectedPagesSet = new Set(parsed);
                }
                syncThumbnailSelection();
                updateSelectedCount();
                showToast('✅ 范围已应用', 'success');
            });

            // 范围输入框回车
            pageRangeInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    btnApplyRange.click();
                }
            });

            // 格式变化 - 显示/隐藏质量设置
            formatSelect.addEventListener('change', () => {
                const fmt = formatSelect.value;
                if (fmt === 'png') {
                    qualityGroup.style.opacity = '0.5';
                    qualityGroup.style.pointerEvents = 'none';
                    qualityRange.value = 100;
                    qualityValue.textContent = '100% (PNG无损)';
                } else {
                    qualityGroup.style.opacity = '1';
                    qualityGroup.style.pointerEvents = 'auto';
                    qualityRange.value = 92;
                    qualityValue.textContent = '92%';
                }
            });

            // 缩放比例变化
            scaleSelect.addEventListener('change', () => {
                if (scaleSelect.value === 'custom') {
                    customScaleGroup.style.display = 'block';
                } else {
                    customScaleGroup.style.display = 'none';
                }
            });

            // 质量滑块
            qualityRange.addEventListener('input', () => {
                const val = qualityRange.value;
                if (formatSelect.value === 'png') {
                    qualityValue.textContent = '100% (PNG无损)';
                } else {
                    qualityValue.textContent = val + '%';
                }
            });

            // 转换下载按钮
            btnConvertDownload.addEventListener('click', () => {
                if (!pdfDoc || selectedPagesSet.size === 0) return;
                const pages = Array.from(selectedPagesSet).sort((a, b) => a - b);
                convertAndDownload(pages);
            });

            // 下载选中页按钮
            btnDownloadSelected.addEventListener('click', () => {
                if (!pdfDoc || selectedPagesSet.size === 0) return;
                const pages = Array.from(selectedPagesSet).sort((a, b) => a - b);
                convertAndDownload(pages);
            });

            // 取消转换
            btnCancelConvert.addEventListener('click', () => {
                cancelRequested = true;
                progressSubtitle.textContent = '正在取消...';
                btnCancelConvert.style.display = 'none';
                setTimeout(() => {
                    progressOverlay.classList.remove('active');
                    btnCancelConvert.style.display = 'inline-block';
                    showToast('已取消转换');
                }, 300);
            });

            // 点击进度覆盖层空白处不关闭
            progressOverlay.addEventListener('click', (e) => {
                if (e.target === progressOverlay) {
                    // 不关闭，用户需点击取消按钮
                }
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'a' && document.activeElement === document.body &&
                    pdfDoc) {
                    e.preventDefault();
                    btnSelectAll.click();
                }
            });

            // ============ 初始状态 ============
            updateSelectedCount();
            btnConvertDownload.disabled = true;
            btnDownloadSelected.disabled = true;
            formatSelect.dispatchEvent(new Event('change'));

            console.log('📄 PDF转图片工具已就绪');
            console.log('   - 支持拖拽上传PDF文件');
            console.log('   - 点击缩略图选择页面');
            console.log('   - 支持PNG/JPEG/WebP格式');
            console.log('   - 多页自动打包ZIP下载');
            console.log('   - 所有处理均在本地浏览器完成，文件不会上传到服务器');
        })();
    </script>
</body>
</html>
