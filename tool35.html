<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵签宝 - 求运势·做决定·测吉凶</title>
    <style>
        :root {
            --bg: #1a0a0a;
            --gold: #d4a853;
            --gold-light: #f0d68a;
            --red: #b5343a;
            --red-dark: #7a1f22;
            --cream: #fdf5e6;
            --brown: #3d1f0a;
            --card-bg: #1e1111;
            --text: #e8d5b7;
            --text-light: #c4a882;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --gold-grad: linear-gradient(135deg, #d4a853, #f0d68a, #b8963f, #e8c97a);
            --red-grad: linear-gradient(135deg, #b5343a, #d4454a, #8b1a1f);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'STSong', 'Songti SC', 'Noto Serif SC', 'KaiTi', 'STKaiti', 'SimSun', 'serif';
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(212, 168, 83, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(180, 50, 40, 0.06) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 25 L55 30 L35 35 L30 55 L25 35 L5 30 L25 25 Z' fill='rgba(212,168,83,0.03)'/%3E%3C/svg%3E");
            min-height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            40% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 16px 8px;
            position: relative;
        }
        .header .logo-icon {
            font-size: 52px;
            display: block;
            animation: gentleBounce 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(212, 168, 83, 0.5));
        }
        @keyframes gentleBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-12px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-6px);
            }
        }
        .header h1 {
            font-size: 2rem;
            background: var(--gold-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 4px 0;
        }
        .header .subtitle {
            font-size: 0.85rem;
            color: var(--text-light);
            letter-spacing: 2px;
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(212, 168, 83, 0.25);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gold-grad);
            opacity: 0.6;
            border-radius: 20px 20px 0 0;
        }
        .card:hover {
            border-color: rgba(212, 168, 83, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 40px rgba(212, 168, 83, 0.05);
        }

        /* 功能网格 */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .feature-btn {
            background: linear-gradient(180deg, rgba(212, 168, 83, 0.1) 0%, rgba(212, 168, 83, 0.03) 100%);
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: 16px;
            padding: 20px 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            color: var(--text);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .feature-btn:hover {
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.18);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .feature-btn:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        .feature-btn .icon {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 6px;
        }
        .feature-btn .label {
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .feature-btn .desc {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .feature-btn.full-width {
            grid-column: 1 / -1;
        }
        .feature-btn.accent {
            border-color: rgba(212, 68, 74, 0.5);
            background: linear-gradient(180deg, rgba(180, 50, 40, 0.2) 0%, rgba(180, 50, 40, 0.05) 100%);
        }
        .feature-btn.accent:hover {
            border-color: #d4454a;
            background: rgba(180, 50, 40, 0.3);
        }

        /* 签筒选择区 */
        .tube-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tube-chip {
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            border: 1px solid rgba(212, 168, 83, 0.3);
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.3s;
            white-space: nowrap;
            letter-spacing: 1px;
        }
        .tube-chip.active {
            background: var(--gold-grad);
            color: #1a0a0a;
            border-color: transparent;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 168, 83, 0.4);
        }
        .tube-chip:hover {
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.15);
        }
        .tube-chip.active:hover {
            background: var(--gold-grad);
        }

        /* 摇签区域 */
        .shake-area {
            text-align: center;
            padding: 20px 0;
            position: relative;
        }
        .shake-tube {
            font-size: 6rem;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.1s;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.5));
            position: relative;
            user-select: none;
        }
        .shake-tube.shaking {
            animation: shake 0.6s ease-in-out;
        }
        @keyframes shake {
            0%,
            100% {
                transform: rotate(0deg) translateY(0);
            }
            10% {
                transform: rotate(-8deg) translateY(-15px);
            }
            20% {
                transform: rotate(8deg) translateY(-5px);
            }
            30% {
                transform: rotate(-12deg) translateY(-20px);
            }
            40% {
                transform: rotate(12deg) translateY(-8px);
            }
            50% {
                transform: rotate(-6deg) translateY(-18px);
            }
            60% {
                transform: rotate(6deg) translateY(-3px);
            }
            70% {
                transform: rotate(-15deg) translateY(-22px);
            }
            80% {
                transform: rotate(10deg) translateY(-10px);
            }
            90% {
                transform: rotate(-3deg) translateY(-5px);
            }
        }
        .shake-hint {
            color: var(--text-light);
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-top: 8px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        /* 签文结果 */
        .result-card {
            background: linear-gradient(180deg, rgba(30, 17, 17, 0.98) 0%, rgba(40, 20, 15, 0.95) 100%);
            border: 2px solid rgba(212, 168, 83, 0.5);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
            box-shadow: 0 0 40px rgba(212, 168, 83, 0.15);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-level {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .level-best {
            background: #d4a853;
            color: #1a0a0a;
            box-shadow: 0 0 25px rgba(212, 168, 83, 0.5);
        }
        .level-good {
            background: #c49b4a;
            color: #1a0a0a;
            box-shadow: 0 0 18px rgba(196, 155, 74, 0.4);
        }
        .level-mid {
            background: #8b7d6b;
            color: #fff;
            box-shadow: 0 0 12px rgba(139, 125, 107, 0.3);
        }
        .level-bad {
            background: #6b4a4a;
            color: #f0d0d0;
            box-shadow: 0 0 12px rgba(107, 74, 74, 0.3);
        }
        .level-worst {
            background: #4a3030;
            color: #e0c0c0;
            box-shadow: 0 0 10px rgba(74, 48, 48, 0.3);
        }
        .result-number {
            font-size: 3rem;
            font-weight: bold;
            color: var(--gold);
            margin: 8px 0;
            letter-spacing: 3px;
        }
        .result-poem {
            font-style: italic;
            color: #e8d5b7;
            line-height: 2;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin: 10px 0;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .result-interpretation {
            text-align: left;
            color: #c4a882;
            line-height: 1.8;
            font-size: 0.85rem;
            margin-top: 8px;
            padding: 8px 0;
            border-top: 1px dashed rgba(212, 168, 83, 0.2);
        }

        /* 运势卡片 */
        .fortune-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 14px;
            border: 1px solid rgba(212, 168, 83, 0.15);
            cursor: pointer;
            transition: all 0.3s;
        }
        .fortune-card:hover {
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.08);
        }
        .fortune-card .f-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }
        .fortune-card .f-info {
            flex: 1;
            min-width: 0;
        }
        .fortune-card .f-name {
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .fortune-card .f-stars {
            color: var(--gold);
            font-size: 0.85rem;
        }
        .fortune-card .f-advice {
            font-size: 0.7rem;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-gold {
            background: var(--gold-grad);
            color: #1a0a0a;
            box-shadow: 0 4px 20px rgba(212, 168, 83, 0.35);
        }
        .btn-gold:hover {
            box-shadow: 0 6px 28px rgba(212, 168, 83, 0.55);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }
        .btn-outline:hover {
            background: rgba(212, 168, 83, 0.1);
        }
        .btn-sm {
            padding: 6px 16px;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }

        /* 决定输入 */
        .decision-input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212, 168, 83, 0.15);
            border: 1px solid rgba(212, 168, 83, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .option-tag .remove-tag {
            cursor: pointer;
            color: #d4454a;
            font-weight: bold;
            font-size: 1rem;
            line-height: 1;
        }
        .option-tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        input[type="text"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 168, 83, 0.3);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
            width: 100%;
        }
        input[type="text"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 168, 83, 0.2);
        }
        input[type="text"]::placeholder {
            color: rgba(200, 180, 150, 0.4);
        }

        /* 决策结果动画 */
        .decision-result {
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from {
                transform: scale(0.3);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .decision-result .big-emoji {
            font-size: 5rem;
            display: block;
        }
        .decision-result .chosen {
            font-size: 1.8rem;
            font-weight: bold;
            background: var(--gold-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        /* 历史记录 */
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(212, 168, 83, 0.1);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 6px;
        }
        .history-item:hover {
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.06);
        }
        .history-item .h-level {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
            padding: 20px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #1e1111;
            border: 2px solid rgba(212, 168, 83, 0.5);
            border-radius: 20px;
            padding: 24px 20px;
            max-width: 450px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            animation: fadeInUp 0.3s ease-out;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 5;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a1a10;
            color: var(--gold);
            padding: 10px 24px;
            border-radius: 25px;
            border: 1px solid rgba(212, 168, 83, 0.5);
            z-index: 200;
            letter-spacing: 1px;
            font-size: 0.8rem;
            animation: toastIn 0.3s ease-out, toastOut 0.3s 1.8s ease-in forwards;
            pointer-events: none;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-15px);
            }
        }

        /* 骰子 */
        .dice-container {
            perspective: 500px;
            display: inline-block;
        }
        .dice-rolling {
            font-size: 5rem;
            animation: diceRoll 0.8s ease-out;
            display: inline-block;
        }
        @keyframes diceRoll {
            0% {
                transform: rotateX(0) rotateY(0) rotateZ(0) scale(0.5);
            }
            30% {
                transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg) scale(1.3);
            }
            60% {
                transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg) scale(0.9);
            }
            100% {
                transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg) scale(1);
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212, 168, 83, 0.3);
            border-radius: 4px;
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .feature-btn {
                padding: 14px 10px;
            }
            .feature-btn .icon {
                font-size: 1.6rem;
            }
            .feature-btn .label {
                font-size: 0.8rem;
            }
            .shake-tube {
                font-size: 4.5rem;
            }
            .result-number {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>

    <!-- 应用容器 -->
    <div class="app-container" id="appContainer">
        <!-- 头部 -->
        <div class="header">
            <span class="logo-icon">🏮</span>
            <h1>灵 签 宝</h1>
            <p class="subtitle">求运势 · 做决定 · 测吉凶</p>
        </div>

        <!-- 主内容区 -->
        <div id="mainContent"></div>
    </div>

    <!-- Toast容器 -->
    <div id="toastContainer"></div>

    <script>
        (function() {
            // ==================== 数据定义 ====================

            // 签文等级
            const LEVELS = {
                '上上签': { cls: 'level-best', emoji: '🌟', weight: 8 },
                '上签': { cls: 'level-good', emoji: '✨', weight: 15 },
                '中上签': { cls: 'level-good', emoji: '💫', weight: 18 },
                '中签': { cls: 'level-mid', emoji: '🔸', weight: 25 },
                '中下签': { cls: 'level-bad', emoji: '⚠️', weight: 18 },
                '下签': { cls: 'level-bad', emoji: '🌧️', weight: 10 },
                '下下签': { cls: 'level-worst', emoji: '💧', weight: 6 },
            };

            // 观音灵签库
            const guanyinQian = [
                { id: 1, level: '上上签', poem: '日出扶桑万里明，\n祥云瑞气满门庭。\n所求遂意皆如愿，\n百事亨通福自生。',
                    interpretation: '此签大吉，如旭日东升，光芒万丈。凡事有贵人相助，所求之事皆能顺利达成。事业上有新的机遇出现，财运亨通，宜积极进取。感情方面，单身者有望遇到良缘，已有伴侣者感情和睦。健康无忧，诸事顺遂。',

            const state = {

            // 从localStorage加载历史
            function loadHistory() {
                try {
                    const saved = localStorage.getItem('lingqianbao_history');
                    if (saved) state.history = JSON.parse(saved);
                } catch (e) {
                    state.history = [];
                }
            }

            function saveHistory() {
                try {
                    // 只保留最近100条
                    if (state.history.length > 100) state.history = state.history.slice(-100);
                    localStorage.setItem('lingqianbao_history', JSON.stringify(state.history));
                } catch (e) {}
            }

            function addHistory(entry) {
                state.history.unshift({
                    ...entry,
                    timestamp: Date.now(),
                    dateStr: new Date().toLocaleString('zh-CN', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    }),

                saveHistory();

            // ==================== 工具函数 ====================
            function $(selector) { return document.querySelector(selector); }

            function $$(selector) { return document.querySelectorAll(selector); }

            function showToast(msg, duration = 2000) {
                const container = $('#toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                container.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.remove();
                }, duration + 300);
            }

            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function pickWeighted(items) {
                const totalWeight = items.reduce((sum, item) => {
                    const levelInfo = LEVELS[item.level];
                    return sum + (levelInfo ? levelInfo.weight : 15);
                }, 0);
                let random = Math.random() * totalWeight;
                for (const item of items) {
                    const levelInfo = LEVELS[item.level];
                    const w = levelInfo ? levelInfo.weight : 15;
                    random -= w;
                    if (random <= 0) return item;
                }
                return items[items.length - 1];
            }

            function getLevelEmoji(level) {
                return LEVELS[level] ? LEVELS[level].emoji : '🔸';
            }

            function getLevelClass(level) {
                return LEVELS[level] ? LEVELS[level].cls : 'level-mid';
            }

            // ==================== 粒子背景 ====================
            function createParticles() {
                const container = $('#particles');

                    particle.className = 'particle';
                    const size = Math.random() * 4 + 1.5;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = Math.random() * 8 + 6 + 's';
                    particle.style.animationDelay = Math.random() * 10 + 's';
                    container.appendChild(particle);
                }
            }

                        break;

            function renderDivination(main) {

                    ).join('') :

            `;
                // 重置coin和choice结果显示状态

                let itemsHTML = state.history.slice(0, 30).map((h, i) => {

                    state._keepChoiceResult = false;

                selectLibrary(key) {
                    state.activeLibrary = key;
                    state.lastResult = null;
                    state.shakeCount = 0;
                    state.isShaking = false;
                    renderView();

                triggerShake() {
                    if (state.isShaking) return;
                    state.isShaking = true;
                    state.shakeCount++;
                    renderView();
                    // 重新绑定事件
                    const tube = $('#shakeTube');
                    if (tube) {
                        tube.classList.add('shaking');

                    const hint = $('#shakeHint');
                    if (hint) hint.textContent = '🎋 正在摇签中...';

                    setTimeout(() => {
                        state.isShaking = false;

                        const qian = pickWeighted(lib.data);
                        state.lastResult = {
                            type: 'divination',
                            libraryKey: state.activeLibrary,
                            libraryName: lib.name,

                            level: qian.level,
                            poem: qian.poem,
                            resultText: qian.level + ' 第' + qian.id + '签',
                            qianId: qian.id,

                            summary: '财运运势',
                            detail: '财运方面' + ['需谨慎理财', '宜保守', '稳定增长', '有小惊喜', '财运亨通'][stars - 1] +
                                '。正财稳定，偏财需看时机。今日适合做财务规划，避免冲动消费。',
                            luckyColor: ['棕色', '金色', '黄色', '橙色', '红色'][stars - 1],
                            luckyNum: randomInt(1, 99),
                        },
                        'love': {
                            summary: '感情运势',
                            detail: '感情方面' + ['需耐心经营', '宜多沟通', '温暖融洽', '甜蜜升温', '桃花盛开'][stars - 1] +
                                '。单身者适合扩大社交圈，已有伴侣者适合一起做些温馨的事情。真诚是最好的吸引力。',
                            luckyColor: ['粉色', '白色', '红色', '玫瑰色', '桃红色'][stars - 1],
                            luckyNum: randomInt(1, 99),
                        },
                        'health': {
                            summary: '健康运势',
                            detail: '健康方面' + ['需注意休息', '保持规律作息', '状态良好', '精力充沛', '身心俱佳'][stars -
                                1] + '。适合进行适度运动，注意饮食均衡。保持愉悦心情是最好的养生之道。',
                            luckyColor: ['绿色', '青色', '蓝色', '白色', '金色'][stars - 1],
                            luckyNum: randomInt(1, 99),
                        },
                    };
                    const d = details[key];
                    const starStr = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);

                    // 加入历史
                    addHistory({
                        type: 'fortune',
                        fortuneType: name,
                        level: stars >= 4 ? '好运' : stars >= 3 ? '平稳' : '需注意',
                        resultText: starStr + ' ' + d.summary,
                    });

                    // 弹窗展示
                    const overlay = document.createElement('div');
                    overlay.className = 'modal-overlay';
                    overlay.innerHTML = `
                    <div class="modal">
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                        <p style="text-align:center;font-size:1.5rem;">${icon}</p>
                        <p style="text-align:center;font-weight:bold;letter-spacing:2px;color:var(--gold);font-size:1.1rem;">${name} · ${d.summary}</p>
                        <p style="text-align:center;font-size:1.5rem;">${starStr}</p>
                        <p style="line-height:1.8;color:var(--text);margin:12px 0;">${d.detail}</p>
                        <p style="color:var(--gold);font-size:0.85rem;">🍀 幸运色：${d.luckyColor}</p>
                        <p style="color:var(--gold);font-size:0.85rem;">🔢 幸运数字：${d.luckyNum}</p>
                        <p style="text-align:center;font-size:0.7rem;color:var(--text-light);margin-top:10px;">🕯️ 心诚则灵，积极生活</p>
                    </div>`;
                    overlay.addEventListener('click', function(e) {
                        if (e.target === overlay) overlay.remove();
                    });
                    document.body.appendChild(overlay);
                },

                addOption() {
                    const input = $('#optionInput');
                    if (!input) return;
                    const val = input.value.trim();
                    if (!val) return showToast('请输入选项内容');
                    if (state.decisionOptions.length >= 20) return showToast('最多添加20个选项');
                    if (state.decisionOptions.includes(val)) return showToast('选项已存在');
                    state.decisionOptions.push(val);
                    input.value = '';
                    state.choiceResult = null;
                    state._keepChoiceResult = false;
                    renderView();
                    // 重新聚焦
                    setTimeout(() => {
                        const newInput = $('#optionInput');
                        if (newInput) newInput.focus();
                    }, 100);
                },

                removeOption(index) {
                    state.decisionOptions.splice(index, 1);
                    state.choiceResult = null;
                    state._keepChoiceResult = false;
                    renderView();
                },

                clearOptions() {
                    state.decisionOptions = [];
                    state.choiceResult = null;
                    state._keepChoiceResult = false;
                    renderView();
                },

                randomChoice() {
                    if (state.decisionOptions.length < 2) return showToast('至少需要2个选项');
                    // 动画效果：快速轮换
                    let count = 0;
                    const totalFlashes = 12;
                    const flashInterval = 80;
                    state._keepChoiceResult = true;

                    function flash() {
                        if (count < totalFlashes) {
                            state.choiceResult = state.decisionOptions[randomInt(0, state.decisionOptions
                                .length - 1)];
                            renderView();
                            count++;
                            setTimeout(flash, flashInterval + count * 15);
                        } else {
                            // 最终结果
                            state.choiceResult = state.decisionOptions[randomInt(0, state.decisionOptions.length -
                                1)];
                            renderView();
                            addHistory({
                                type: 'choice',
                                resultText: state.choiceResult,
                                level: '选择结果',
                            });
                            if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
                        }
                    }
                    flash();
                },

                flipCoin() {
                    state._keepCoinResult = true;
                    state.coinResult = undefined;
                    renderView();
                    // 动画延迟
                    setTimeout(() => {
                        state.coinResult = Math.random() > 0.5;
                        renderView();
                        addHistory({
                            type: 'coin',
                            resultText: state.coinResult ? '正面（是）' : '反面（否）',
                            level: state.coinResult ? '上签' : '中签',
                        });
                    }, 600);
                },

                rollDice() {
                    state.diceResult = null;
                    renderView();
                    setTimeout(() => {
                        state.diceResult = randomInt(1, 6);
                        renderView();
                        addHistory({
                            type: 'dice',
                            resultText: String(state.diceResult),
                            level: state.diceResult >= 4 ? '好运' : state.diceResult >= 3 ? '一般' : '不佳',
                        });
                        if (navigator.vibrate) navigator.vibrate(40);
                    }, 700);
                },

                viewHistoryDetail(index) {
                    const h = state.history[index];
                    if (!h) return;
                    if (h.type === 'divination') {
                        state.activeLibrary = h.libraryKey || 'guanyin';
                        state.lastResult = {
                            type: 'divination',
                            libraryKey: h.libraryKey || 'guanyin',
                            libraryName: h.libraryName || '',
                            libraryIcon: allQianLibraries[h.libraryKey]?.icon || '🏮',
                            qianId: h.qianId,
                            level: h.level,
                            poem: h.poem || '',
                            interpretation: h.interpretation || '（历史记录，详细解读请重新摇签）',
                            advice: h.advice || '',
                            keywords: h.keywords || '',
                        };
                        state.shakeCount = 1;
                        state.currentView = 'divination';
                        renderView();
                    } else {
                        showToast('点击查看：' + (h.resultText || h.fortuneType || '详情'));
                    }
                },

                clearHistory() {
                    if (confirm('确定清除所有历史记录吗？此操作不可撤销。')) {
                        state.history = [];
                        saveHistory();
                        renderView();
                        showToast('历史记录已清除');
                    }
                },
            };

            // ==================== 初始化 ====================
            function init() {
                createParticles();
                loadHistory();
                renderView();

                // 点击模态框外部关闭
                document.addEventListener('click', function(e) {
                    if (e.target.classList.contains('modal-overlay')) {
                        e.target.remove();
                    }
                });

                // 键盘快捷键
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        const overlay = document.querySelector('.modal-overlay');
                        if (overlay) overlay.remove();
                    }
                });

                console.log('🏮 灵签宝已就绪');
                console.log('  求运势 · 做决定 · 测吉凶');
                console.log('  心诚则灵，仅供参考，积极生活');
            }

            // 暴露到全局
            window.app = app;
            window.initApp = init;

            // 启动
            init();
        })();
    </script>
</body>
</html>
