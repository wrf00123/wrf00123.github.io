<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源库 - 优质资源免费分享网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 共享的顶部边框线 -->
        <div class="top-border-line"></div>
        
        <!-- 左侧侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="logo"><i class="fas fa-compass"></i> 资源库</h2>
                <div class="header-right">
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
            
            <!-- 搜索框 - 用于搜索一级菜单 -->
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="sidebarSearchInput" placeholder="搜索分类">
            </div>
            
            <!-- 导航菜单 -->
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- 分类菜单将通过JavaScript动态生成 -->
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content" id="mainContent">
            <!-- 顶部头部 -->
            <header class="content-header">
                <div class="header-left">
                    <h1 class="page-title" id="pageTitle">全部</h1>
                    <span class="page-count" id="pageCount">(0)</span>
                </div>
                <div class="header-right">
                    <!-- 主搜索框 - 用于搜索网站卡片 -->
                    <div class="main-search-container">
                        <i class="fas fa-search main-search-icon"></i>
                        <input type="text" class="main-search-input" id="mainSearchInput" placeholder="搜索网站名称或描述">
                    </div>
                    <!-- 网址征集按钮 -->
                    <button class="collect-btn" id="collectBtn">
                        <i class="fas fa-plus"></i>
                        网址征集
                    </button>
                </div>
            </header>
            
            <!-- 二级菜单区 -->
            <div class="sub-menu-container" id="subMenuContainer">
                <div class="sub-menu-bar" id="subMenuBar">
                    <!-- 二级菜单将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <!-- 网址卡片区域 -->
            <div id="bookmarksContainer">
                <!-- 分类和卡片将通过JavaScript动态生成 -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
