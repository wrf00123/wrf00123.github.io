                const quality = format === 'image/png' ? undefined : parseInt(outputQuality.value) / 100;
                modalImage.src = canvas.toDataURL(format, quality);
            }

            function closePreviewModal() {
                previewModal.style.display = 'none';
                document.body.style.overflow = '';
                currentPreviewModalImageId = null;
            }

            // ==================== 下载功能 ====================
            function downloadSingleImage(imgId) {
                const imgData = uploadedImages.find(img => img.id == imgId);
                if (!imgData) return;
                const canvas = generateWatermarkedImage(imgData);
                const format = outputFormat.value;
                const quality = format === 'image/png' ? undefined : parseInt(outputQuality.value) / 100;
                const ext = format === 'image/png' ? 'png' : format === 'image/webp' ? 'webp' : 'jpg';
                const baseName = imgData.name.replace(/\.[^.]+$/, '');
                const fileName = `${baseName}_水印.${ext}`;

                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast(`✅ 已下载：${fileName}`, 'success');
                }, format, quality);
            }

            async function downloadAllAsZip() {
                if (uploadedImages.length === 0) {
                    showToast('⚠️ 没有可下载的图片', 'error');
                    return;
                }

                if (typeof JSZip === 'undefined') {
                    showToast('❌ JSZip库加载失败，请检查网络连接后刷新页面', 'error');
                    return;
                }

                showLoading(`正在处理 ${uploadedImages.length} 张图片...`);
                const zip = new JSZip();
                const format = outputFormat.value;
                const quality = format === 'image/png' ? undefined : parseInt(outputQuality.value) / 100;
                const ext = format === 'image/png' ? 'png' : format === 'image/webp' ? 'webp' : 'jpg';

                try {
                    for (let i = 0; i < uploadedImages.length; i++) {
                        const imgData = uploadedImages[i];
                        updateLoadingText(`正在处理... (${i + 1}/${uploadedImages.length})`);
                        const canvas = generateWatermarkedImage(imgData);
                        const blob = await new Promise((resolve) => {
                            canvas.toBlob((b) => resolve(b), format, quality);
                        });
                        const baseName = imgData.name.replace(/\.[^.]+$/, '');
                        const fileName = `${baseName}_水印.${ext}`;
                        zip.file(fileName, blob);
                    }

                    updateLoadingText('正在打包ZIP文件...');
                    const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE',
                        compressionOptions: { level: 6 } });

                    const url = URL.createObjectURL(zipBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
                    a.download = `水印图片_${timestamp}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    hideLoading();
                    showToast(`✅ 打包下载完成！共 ${uploadedImages.length} 张图片`, 'success');
                } catch (err) {
                    hideLoading();
                    console.error('打包下载失败:', err);
                    showToast('❌ 打包下载失败，请重试', 'error');
                }
            }

            // ==================== 辅助功能 ====================
            function removeImage(imgId) {
                const index = uploadedImages.findIndex(img => img.id == imgId);
                if (index > -1) {
                    const name = uploadedImages[index].name;
                    uploadedImages.splice(index, 1);
                    if (currentPreviewModalImageId == imgId) {
                        closePreviewModal();
                    }
                    updateUI();
                    if (uploadedImages.length > 0) {
                        regenerateAllPreviews();
                    }
                    showToast(`🗑️ 已移除：${name}`, 'info');
                }
            }

            function clearAllImages() {
                if (uploadedImages.length === 0) return;
                if (confirm(`确定要清空全部 ${uploadedImages.length} 张图片吗？此操作不可恢复。`)) {
                    uploadedImages = [];
                    closePreviewModal();
                    updateUI();
                    showToast('🗑️ 已清空全部图片', 'info');
                }
            }

            function showLoading(msg) {
                loadingText.textContent = msg || '正在处理...';
                loadingOverlay.style.display = 'flex';
            }

            function updateLoadingText(msg) {
                loadingText.textContent = msg;
            }

            function hideLoading() {
                loadingOverlay.style.display = 'none';
            }

            function showToast(msg, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = msg;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(120%)';
                    toast.style.transition = '0.35s ease';
                    setTimeout(() => toast.remove(), 350);
                }, 2500);
            }

            // ==================== 初始化 ====================
            updateWatermarkTypeUI();
