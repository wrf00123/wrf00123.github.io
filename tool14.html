                        'inner-glow': 'inset 0 0 20px rgba(0, 245, 255, 0.1)',

                    animation: {
                        'float-slow': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',

                        'grid-move': 'gridMove 20s linear infinite',
                        'spin-slow': 'spin 8s linear infinite',
                        'bounce-subtle': 'bounceSubtle 2s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '1', filter: 'brightness(1)' },
                            '50%': { opacity: '0.8', filter: 'brightness(1.3)' },
                        },
                        scanLine: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' },
                        },
                        gridMove: {
                            '0%': { backgroundPosition: '0 0' },
                            '100%': { backgroundPosition: '50px 50px' },
                        },
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(0)' },

        function convert() {
            const value = parseFloat(document.getElementById('input-value').value);
            const fromUnit = document.getElementById('select-from').value;
            const toUnit = document.getElementById('select-to').value;
            const cat = unitCategories[currentCategory];

            if (isNaN(value)) {
                resultValueEl.textContent = '---';
                resultFromTextEl.textContent = '请输入有效数值';
                return;
            }

            let result;
            if (cat.isSpecial && currentCategory === 'temperature') {
                result = convertTemperature(value, fromUnit, toUnit);
            } else {
                const fromFactor = cat.units[fromUnit].factor;
                const toFactor = cat.units[toUnit].factor;
                result = (value * fromFactor) / toFactor;
            }

            const fromSymbol = cat.units[fromUnit].symbol;
            const toSymbol = cat.units[toUnit].symbol;
            const toName = cat.units[toUnit].name;

            resultValueEl.textContent = formatNumber(result);
            resultFromTextEl.textContent = `${formatNumber(value)} ${cat.units[fromUnit].name} (${fromSymbol})`;
            resultUnitTextEl.textContent = `${toName} (${toSymbol})`;

            updateMetricPrefixes(result, toUnit, cat);
        }

        function convertTemperature(value, from, to) {
            let celsius;
            switch(from) {
                case 'celsius':
                    celsius = value;
                    break;
                case 'fahrenheit':
                    celsius = (value - 32) * 5 / 9;
                    break;
                case 'kelvin':
                    celsius = value - 273.15;
                    break;
                case 'rankine':
                    celsius = (value - 491.67) * 5 / 9;
                    break;
                case 'reaumur':
                    celsius = value * 1.25;
                    break;
                default:
                    celsius = value;
            }

            switch(to) {
                case 'celsius':
                    return celsius;
                case 'fahrenheit':
                    return celsius * 9 / 5 + 32;
                case 'kelvin':
                    return celsius + 273.15;
                case 'rankine':
                    return (celsius + 273.15) * 9 / 5;
                case 'reaumur':
                    return celsius * 0.8;
                default:
                    return celsius;
            }
        }

        function updateMetricPrefixes(value, unit, cat) {
            const prefixes = {
                'kilo-value': 1000,
                'hecto-value': 100,
                'deci-value': 0.1,
                'milli-value': 0.001
            };

            for (const [id, factor] of Object.entries(prefixes)) {
                const el = document.getElementById(id);
                if (el) {
                    el.textContent = formatNumber(value * factor);
                }
            }
        }

        function swapUnits() {
            const selectFrom = document.getElementById('select-from');
            const selectTo = document.getElementById('select-to');
            const temp = selectFrom.value;
            selectFrom.value = selectTo.value;
            selectTo.value = temp;
            convert();
        }

        function formatNumber(num) {
            if (num === 0) return '0';
            if (Math.abs(num) >= 1e12 || (Math.abs(num) < 1e-6 && num !== 0)) {
                return num.toExponential(6);
            }
            let precision = 6;
            if (Math.abs(num) >= 1000) precision = 2;
            else if (Math.abs(num) >= 100) precision = 3;
            else if (Math.abs(num) >= 10) precision = 4;

            let formatted = parseFloat(num.toFixed(precision)).toString();
            if (formatted.includes('e')) return formatted;

            const parts = formatted.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

                        if (t.getAttribute('data-category') === category) {
                            t.classList.add('active');
                            t.classList.remove('text-gray-400');
                        }
                    });

                    currentCategory = category;
                    renderConverter(category);

                    setTimeout(() => {
                        document.getElementById('input-value').value = value;
                        document.getElementById('select-from').value = from;
                        document.getElementById('select-to').value = to;
                        convert();
                        addToHistory();
                    }, 50);
                });
            });
        }

        function setupHistoryToggle() {
            const toggleBtn = document.getElementById('history-toggle');
            const historyPanel = document.getElementById('history-panel');

            function checkScreenSize() {
                if (window.innerWidth >= 1024) {
                    historyPanel.classList.remove('hidden');
                    historyVisible = true;
                }
            }

            window.addEventListener('resize', checkScreenSize);
            checkScreenSize();

            toggleBtn.addEventListener('click', function() {
                historyVisible = !historyVisible;
                if (historyVisible) {
                    historyPanel.classList.remove('hidden');
                } else {
                    historyPanel.classList.add('hidden');
                }
            });
        }

        function setupCopyButton() {
            document.getElementById('copy-result').addEventListener('click', function() {
                const resultText = resultValueEl.textContent + ' ' + resultUnitTextEl.textContent;
                navigator.clipboard.writeText(resultText).then(() => {
                    showToast('已复制到剪贴板');
                });
            });
        }

        function setupClearHistory() {
            document.getElementById('clear-history').addEventListener('click', function() {
                if (history.length === 0) return;
                if (confirm('确定要清空所有历史记录吗？')) {
                    history = [];
                    saveHistoryToStorage();
                    updateHistoryUI();
                    showToast('历史记录已清空');
                }
            });
        }

        function addToHistory() {
            const value = parseFloat(document.getElementById('input-value').value);
            const fromUnit = document.getElementById('select-from').value;
            const toUnit = document.getElementById('select-to').value;
            const cat = unitCategories[currentCategory];

            if (isNaN(value)) return;

            let result;
            if (cat.isSpecial && currentCategory === 'temperature') {
                result = convertTemperature(value, fromUnit, toUnit);
            } else {
                const fromFactor = cat.units[fromUnit].factor;
                const toFactor = cat.units[toUnit].factor;
                result = (value * fromFactor) / toFactor;
            }

            const record = {
                id: Date.now(),
                category: currentCategory,
                categoryName: cat.name,
                value: value,
                fromUnit: fromUnit,
                fromName: cat.units[fromUnit].name,
                fromSymbol: cat.units[fromUnit].symbol,
                toUnit: toUnit,
                toName: cat.units[toUnit].name,
                toSymbol: cat.units[toUnit].symbol,
                result: result,
                timestamp: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
            };

            history.unshift(record);
            if (history.length > 50) history.pop();

            saveHistoryToStorage();
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const count = history.length;
            historyBadgeEl.textContent = count;
            statHistoryEl.textContent = count;

            if (count > 0) {
                historyBadgeEl.classList.remove('hidden');
            } else {
                historyBadgeEl.classList.add('hidden');
            }

            if (count === 0) {
                historyListEl.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fa fa-clock-o text-4xl mb-3 opacity-30"></i>
                        <p class="text-sm">暂无换算记录</p>
                        <p class="text-xs mt-1 opacity-60">开始换算后记录将显示在这里</p>
                    </div>
                `;
                return;
            }

            historyListEl.innerHTML = history.map(item => `
                <div class="history-item rounded-lg p-3 cursor-pointer" onclick="useHistory(${item.id})">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs text-quantum-purple">${item.categoryName}</span>
                        <span class="text-xs text-gray-500">${item.timestamp}</span>
                    </div>
                    <p class="text-sm text-gray-400">${formatNumber(item.value)} ${item.fromSymbol}</p>
                    <p class="text-xs text-gray-600 my-1">↓</p>
                    <p class="text-sm text-quantum-cyan font-mono">${formatNumber(item.result)} ${item.toSymbol}</p>
                </div>
            `).join('');
        }

        function useHistory(id) {
            const record = history.find(h => h.id === id);
            if (!record) return;

            document.querySelectorAll('.tab-quantum').forEach(t => {
                t.classList.remove('active');
                t.classList.add('text-gray-400');
                if (t.getAttribute('data-category') === record.category) {
                    t.classList.add('active');
                    t.classList.remove('text-gray-400');
                }
            });

            currentCategory = record.category;
            renderConverter(record.category);

            setTimeout(() => {
                document.getElementById('input-value').value = record.value;
                document.getElementById('select-from').value = record.fromUnit;
                document.getElementById('select-to').value = record.toUnit;
                convert();
            }, 50);
        }

        function saveHistoryToStorage() {
            try {
                localStorage.setItem('quantum-converter-history', JSON.stringify(history));
            } catch(e) {}
        }

        function loadHistoryFromStorage() {
            try {
                const saved = localStorage.getItem('quantum-converter-history');
                if (saved) {
                    history = JSON.parse(saved);
                }
            } catch(e) {}
        }

        function showToast(message) {
            toastMessageEl.textContent = message;
            toastEl.classList.remove('translate-y-20', 'opacity-0');
            toastEl.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toastEl.classList.add('translate-y-20', 'opacity-0');
                toastEl.classList.remove('translate-y-0', 'opacity-100');
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
