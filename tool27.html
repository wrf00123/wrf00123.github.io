            // ==================== FILE OPERATIONS ====================
            async function addFilesFromHandles(handles) {
                const newFiles = [];
                for (const handle of handles) {
                    const isDir = handle.kind === 'directory';
                    if (isDir && !state.includeDirectories) continue;
                    const existing = state.files.find(f => f.handle && f.handle.name === handle.name);
                    if (existing) continue;
                    let size = undefined;
                    let lastModified = undefined;
                    if (!isDir) {
                        try {
                            const file = await handle.getFile();
                            size = file.size;
                            lastModified = file.lastModified;
                        } catch (e) { /* ignore */ }
                    }
                    newFiles.push({
                        id: generateId(),
                        handle: handle,
                        name: handle.name,
                        size: size,
                        lastModified: lastModified,
                        isDirectory: isDir,
                        selected: true,
                    });
                }
                if (newFiles.length > 0) {
                    state.files.push(...newFiles);
                    // Reset individual edits for new files
                    newFiles.forEach(f => delete state.individuallyEditedNames[f.id]);
                    updatePreview();
                    showToast(`已添加 ${newFiles.length} 个文件`, 'success');
                } else {
                    showToast('没有新文件可添加（可能已存在或为文件夹）', 'info');
                }
            }

            async function selectDirectory() {
                try {
                    if (!('showDirectoryPicker' in window)) {
                        showToast('您的浏览器不支持目录选择功能，请使用文件选择或拖拽', 'error');
                        return;
                    }
                    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    state.directoryHandle = dirHandle;
                    const handles = [];
                    for await (const entry of dirHandle.values()) {
                        handles.push(entry);
                    }
                    // Sort handles
                    handles.sort((a, b) => a.name.localeCompare(b.name));
                    state.files = []; // Replace all
                    state.individuallyEditedNames = {};
                    await addFilesFromHandles(handles);
                    showToast(`已加载目录 "${dirHandle.name}" 中的 ${state.files.length} 个项目`, 'success');
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error(err);
                        showToast('选择目录失败: ' + err.message, 'error');
                    }
                }
            }

            function handleFileInputChange(e) {
                const fileList = e.target.files;
                if (!fileList || fileList.length === 0) return;
                const newFiles = [];
                for (const file of fileList) {
                    const existing = state.files.find(f => !f.handle && f.name === file.name && f.size === file
                        .size);
                    if (existing) continue;
                    newFiles.push({
                        id: generateId(),
                        handle: null,
                        name: file.name,
                        size: file.size,
                        lastModified: file.lastModified,
                        isDirectory: false,
                        selected: true,
                        _file: file, // Keep reference for download
                    });
                }
                if (newFiles.length > 0) {
                    state.files.push(...newFiles);
                    newFiles.forEach(f => delete state.individuallyEditedNames[f.id]);
                    updatePreview();
                    showToast(`已添加 ${newFiles.length} 个文件（仅预览模式）`, 'info');
                }
                dom.fileInput.value = '';
            }

            function handleDrop(e) {
                e.preventDefault();
                dom.dropZone.classList.remove('drag-over');
                const items = e.dataTransfer.items;
                if (!items) return;
                const entries = [];
                for (const item of items) {
                    if (item.kind === 'file') {
                        const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
                        if (entry && entry.isDirectory) {
                            // Skip directories in drag mode for simplicity
                            const file = item.getAsFile();
                            if (file) entries.push({ handle: null, _file: file, name: file.name, size: file.size,
                                lastModified: file.lastModified, isDirectory: false });
                        } else {
                            const file = item.getAsFile();
                            if (file) entries.push({ handle: null, _file: file, name: file.name, size: file.size,
                                lastModified: file.lastModified, isDirectory: false });
                        }
                    }
                }
                if (entries.length > 0) {
                    const newFiles = entries.map(e => ({
                        id: generateId(),
                        handle: e.handle,
                        name: e.name,
                        size: e.size,
                        lastModified: e.lastModified,
                        isDirectory: e.isDirectory || false,
                        selected: true,
                        _file: e._file,
                    })).filter(f => !state.files.some(ff => ff.name === f.name && ff.size === f.size));
                    if (newFiles.length > 0) {
                        state.files.push(...newFiles);
                        newFiles.forEach(f => delete state.individuallyEditedNames[f.id]);
                        updatePreview();
                        showToast(`已添加 ${newFiles.length} 个文件（仅预览模式）`, 'info');
                    }
                }
            }

            function clearAllFiles() {
                if (state.files.length === 0) return;
                showModal('确认清空', `确定要清空全部 ${state.files.length} 个文件吗？此操作不可恢复。`, [
                    { text: '取消', cls: 'btn-outline' },
                    {
                        text: '确认清空',
                        cls: 'btn-danger',
                        callback: () => {
                            state.files = [];
                            state.directoryHandle = null;
                            state.individuallyEditedNames = {};
                            state.renameHistory = [];
                            updatePreview();
                            showToast('文件列表已清空', 'info');
                        }
                    },
                ]);
            }

            // ==================== EXECUTE RENAME ====================
            async function executeRename() {
                const selectedFiles = state.files.filter(f => f.selected !== false);
                if (selectedFiles.length === 0) {
                    showToast('没有选中的文件', 'error');
                    return;
                }
                const previewMap = buildPreviewMap(selectedFiles);
                const conflicts = [];
                const willChange = [];
                selectedFiles.forEach(f => {
                    const p = previewMap.get(f.id);
                    if (p && p.conflict) conflicts.push(f);
                    if (p && p.changed && !p.conflict) willChange.push(f);
                });

                if (willChange.length === 0 && conflicts.length === 0) {
                    showToast('没有需要重命名的文件', 'info');
                    return;
                }

                if (conflicts.length > 0 && state.conflictStrategy === 'skip') {
                    const proceed = await showModal('检测到冲突',
                        `有 ${conflicts.length} 个文件存在命名冲突。当前策略为"跳过冲突"，将仅处理 ${willChange.length} 个无冲突的文件。是否继续？`,
                        [
                            { text: '取消', cls: 'btn-outline' },
                            { text: '继续处理无冲突文件', cls: 'btn-primary' },
                        ]);
                    if (proceed !== 1) return;
                }

                // Check if we can use File System Access API
                const hasHandles = willChange.some(f => f.handle && typeof f.handle.move === 'function');
                if (!hasHandles && state.directoryHandle) {
                    // Try to use directory handle
                }
                if (!hasHandles && willChange.some(f => !f.handle)) {
                    showToast('部分文件缺少目录句柄，无法直接重命名。请使用"选择目录"模式或生成脚本。', 'error');
                    return;
                }
                if (!hasHandles) {
                    showToast('无法直接重命名。请使用"选择目录"按钮重新加载文件，或使用"生成脚本"。', 'error');
                    return;
                }

                // Execute
                let successCount = 0;
                let skipCount = 0;
                const processed = [];
                const filesToProcess = state.conflictStrategy === 'skip' ? willChange : [...willChange, ...conflicts];

                for (const file of filesToProcess) {
                    const preview = previewMap.get(file.id);
                    if (!preview || !preview.changed) continue;
                    let newName = preview.newName;

                    // Handle conflict strategy
                    if (preview.conflict && state.conflictStrategy === 'rename') {
                        let counter = 1;
                        const ext = getExtension(newName);
                        const base = getBaseName(newName);
                        let candidate = newName;
                        while (state.files.some(ff => ff.name === candidate && ff.id !== file.id)) {
                            candidate = base + `(${counter})` + ext;
                            counter++;
                        }
                        newName = candidate;
                    } else if (preview.conflict && state.conflictStrategy === 'overwrite') {
                        // Overwrite - delete existing file first
                        const existing = state.files.find(ff => ff.name === newName && ff.id !== file.id);
                        if (existing && existing.handle && typeof existing.handle.remove === 'function') {
                            try {
                                await existing.handle.remove();
                                state.files = state.files.filter(ff => ff.id !== existing.id);
                            } catch (e) { /* ignore */ }
                        }
                    } else if (preview.conflict && state.conflictStrategy === 'skip') {
                        skipCount++;
                        continue;
                    }

                    if (file.handle && typeof file.handle.move === 'function') {
                        try {
                            await file.handle.move(newName);
                            processed.push({ handle: file.handle, oldName: file.name, newName: newName });
                            file.name = newName;
                            // Update file handle reference
                            if (state.directoryHandle) {
                                try {
                                    file.handle = await state.directoryHandle.getFileHandle(newName);
                                } catch (e) { /* handle may have updated */ }
                            }
                            successCount++;
                        } catch (err) {
                            console.error(`重命名失败: ${file.name} -> ${newName}`, err);
                            skipCount++;
                        }
                    } else {
                        skipCount++;
                    }
                }

                if (processed.length > 0) {
                    state.renameHistory.push(processed);
                    // Keep history manageable
                    if (state.renameHistory.length > 50) state.renameHistory.shift();
                }

                // Clear individual edits
                state.individuallyEditedNames = {};
                updatePreview();
                showToast(`重命名完成: ${successCount} 成功, ${skipCount} 跳过`, successCount > 0 ? 'success' : 'info');
            }

            async function undoLastRename() {
                if (state.renameHistory.length === 0) {
                    showToast('没有可撤销的操作', 'info');
                    return;
                }
                const lastBatch = state.renameHistory.pop();
                const confirmed = await showModal('确认撤销',
                    `将撤销上一次的 ${lastBatch.length} 个重命名操作。是否继续？`,
                    [
                        { text: '取消', cls: 'btn-outline' },
                        { text: '确认撤销', cls: 'btn-primary' },
                    ]);
                if (confirmed !== 1) {
                    state.renameHistory.push(lastBatch);
                    return;
                }
                let undone = 0;
                for (const item of lastBatch.reverse()) {
                    if (item.handle && typeof item.handle.move === 'function') {
                        try {
                            await item.handle.move(item.oldName);
                            const file = state.files.find(f => f.name === item.newName);
                            if (file) file.name = item.oldName;
                            undone++;
                        } catch (err) {
                            console.error('撤销失败:', err);
                        }
                    }
                }
                updatePreview();
                showToast(`已撤销 ${undone} 个重命名`, 'success');
            }

            // ==================== SCRIPT GENERATION ====================
            function generateScript() {
                const selectedFiles = state.files.filter(f => f.selected !== false);
                if (selectedFiles.length === 0) {
                    showToast('没有选中的文件', 'error');
                    return;
                }
                const previewMap = buildPreviewMap(selectedFiles);
                const changed = selectedFiles.filter(f => {
                    const p = previewMap.get(f.id);
                    return p && p.changed && !p.conflict;
                });
                if (changed.length === 0) {
                    showToast('没有需要重命名的文件', 'info');
                    return;
                }

                const isWindows = navigator.platform.toLowerCase().includes('win');
                let scriptContent;
                if (isWindows) {
                    // PowerShell script
                    const lines = ['# 文件批量重命名脚本', '# 请在文件所在目录运行此脚本', '# 生成时间: ' + new Date().toLocaleString(),
                        '', '$ErrorActionPreference = "Stop"', ''
                    ];
                    changed.forEach(f => {
                        const p = previewMap.get(f.id);
                        const oldName = f.name;
                        const newName = p.newName;
                        lines.push(
                            `Rename-Item -Path "${oldName.replace(/"/g, '`"')}" -NewName "${newName.replace(/"/g, '`"')}" -ErrorAction SilentlyContinue`
                            );
                    });
                    lines.push('', 'Write-Host "重命名完成!" -ForegroundColor Green');
                    scriptContent = lines.join('\n');
                    downloadFile('rename_files.ps1', scriptContent, 'text/plain');
                } else {
                    // Bash script
                    const lines = ['#!/bin/bash', '# 文件批量重命名脚本', '# 请在文件所在目录运行此脚本', '# 生成时间: ' + new Date()
                        .toLocaleString(), '', 'set -e', ''
                    ];
                    changed.forEach(f => {
                        const p = previewMap.get(f.id);
                        const oldName = f.name;
                        const newName = p.newName;
                        lines.push(
                            `mv -n "${oldName.replace(/"/g, '\\"')}" "${newName.replace(/"/g, '\\"')}" 2>/dev/null || true`
                            );
                    });
                    lines.push('', 'echo "重命名完成!"');
                    scriptContent = lines.join('\n');
                    downloadFile('rename_files.sh', scriptContent, 'text/x-sh');
                }
                showToast(`已生成${isWindows ? 'PowerShell' : 'Bash'}脚本，包含 ${changed.length} 个重命名操作`, 'success');
            }

            function downloadFile(filename, content, mimeType) {
                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // ==================== CONFIG IMPORT/EXPORT ====================
            function exportConfig() {
                const config = {
                    ruleConfig: state.ruleConfig,
                    activeRule: state.activeRule,
                    protectExtension: state.protectExtension,
                    conflictStrategy: state.conflictStrategy,
                    includeDirectories: state.includeDirectories,
                };
                const json = JSON.stringify(config, null, 2);
                downloadFile('rename_tool_config.json', json, 'application/json');
                showToast('配置已导出', 'success');
            }

            function importConfig() {
                dom.configFileInput.click();
            }

            function handleConfigImport(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function() {
                    try {
                        const config = JSON.parse(reader.result);
                        if (config.ruleConfig) state.ruleConfig = { ...state.ruleConfig, ...config.ruleConfig };
                        if (config.activeRule) state.activeRule = config.activeRule;
                        if (config.protectExtension !== undefined) state.protectExtension = config
                            .protectExtension;
                        if (config.conflictStrategy) state.conflictStrategy = config.conflictStrategy;
                        if (config.includeDirectories !== undefined) state.includeDirectories = config
                            .includeDirectories;
                        // Update UI
                        dom.chkProtectExt.checked = state.protectExtension;
                        dom.chkIncludeDirs.checked = state.includeDirectories;
                        dom.conflictStrategy.value = state.conflictStrategy;
                        updateRuleTabs();
                        renderRulePanel();
                        updatePreview();
                        showToast('配置已导入', 'success');
                    } catch (err) {
                        showToast('配置文件格式无效', 'error');
                    }
                };
                reader.readAsText(file);
                dom.configFileInput.value = '';
            }

            function updateRuleTabs() {
                const tabs = dom.ruleTabs.querySelectorAll('.rule-tab');
                tabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.rule === state.activeRule);
                });
            }

            // ==================== QUICK ACTIONS ====================
            function applyQuickAction(action) {
                const protectExt = state.protectExtension;
                state.files.forEach(f => {
                    if (f.selected === false) return;
                    const ext = protectExt ? getExtension(f.name) : '';
                    let base = protectExt ? getBaseName(f.name) : f.name;
                    switch (action) {
                        case 'trimSpaces':
                            base = base.trim();
                            break;
                        case 'removeBrackets':
                            base = base.replace(/\[.*?\]/g, '');
                            break;
                        case 'removeParentheses':
                            base = base.replace(/\(.*?\)/g, '');
                            break;
                        case 'replaceSpaces':
                            base = base.replace(/\s+/g, '_');
                            break;
                        case 'removeNumbers':
                            base = base.replace(/\d+/g, '');
                            break;
                        case 'onlyAlphanumeric':
                            base = base.replace(/[^a-zA-Z0-9]/g, '');
                            break;
                        case 'lowercase':
                            base = base.toLowerCase();
                            break;
                        case 'uppercase':
                            base = base.toUpperCase();
                            break;
                    }
                    const newName = base + ext;
                    if (newName !== f.name) {
                        state.individuallyEditedNames[f.id] = newName;
                    } else {
                        delete state.individuallyEditedNames[f.id];
                    }
                });
                updatePreview();
                showToast('快捷操作已应用', 'success');
            }

            // ==================== EVENT BINDINGS ====================
            function bindEvents() {
                // File input
                dom.btnSelectFiles.addEventListener('click', () => dom.fileInput.click());
                dom.fileInput.addEventListener('change', handleFileInputChange);
                dom.btnSelectDir.addEventListener('click', selectDirectory);

                // Drop zone
                dom.dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dom.dropZone.classList.add('drag-over');
                });
                dom.dropZone.addEventListener('dragleave', () => {
                    dom.dropZone.classList.remove('drag-over');
                });
                dom.dropZone.addEventListener('drop', handleDrop);

                // Rule tabs
                dom.ruleTabs.addEventListener('click', (e) => {
                    const tab = e.target.closest('.rule-tab');
                    if (!tab) return;
                    state.activeRule = tab.dataset.rule;
                    updateRuleTabs();
                    renderRulePanel();
                    updatePreview();
                });

                // Select all
                dom.selectAll.addEventListener('change', () => {
                    const checked = dom.selectAll.checked;
                    const filteredFiles = getFilteredFiles();
                    filteredFiles.forEach(f => {
                        f.selected = checked;
                    });
                    // Also update non-filtered files that match
                    if (dom.searchFilter.value.trim() === '' && dom.filterStatus.value === 'all') {
                        state.files.forEach(f => f.selected = checked);
                    } else {
                        const filteredIds = new Set(filteredFiles.map(f => f.id));
                        state.files.forEach(f => {
                            if (filteredIds.has(f.id)) f.selected = checked;
                        });
                    }
                    updatePreview();
                });

                // Filter changes
                dom.searchFilter.addEventListener('input', debounce(updatePreview, 200));
                dom.filterStatus.addEventListener('change', updatePreview);
                dom.sortBy.addEventListener('change', () => {
                    state.sortAsc = true;
                    updatePreview();
                });

                // Table header sorting
                dom.tableWrap.addEventListener('click', (e) => {
                    const th = e.target.closest('thead th');
                    if (!th || th.classList.contains('select-all-cell')) return;
                    const sortMap = { '原始文件名': 'name', '大小': 'size', '状态': 'status' };
                    const headerText = th.textContent.trim();
                    const sortKey = sortMap[headerText] || 'name';
                    if (dom.sortBy.value === sortKey) {
                        state.sortAsc = !state.sortAsc;
                    } else {
                        dom.sortBy.value = sortKey;
                        state.sortAsc = true;
                    }
                    updatePreview();
                });

                // Buttons
                dom.btnExecute.addEventListener('click', executeRename);
                dom.btnUndoLast.addEventListener('click', undoLastRename);
                dom.btnGenerateScript.addEventListener('click', generateScript);
                dom.btnClearAll.addEventListener('click', clearAllFiles);
                dom.btnToggleTheme.addEventListener('click', toggleTheme);
                dom.btnLoadConfig.addEventListener('click', importConfig);
                dom.btnSaveConfig.addEventListener('click', exportConfig);
                dom.configFileInput.addEventListener('change', handleConfigImport);

                // Checkboxes
                dom.chkProtectExt.addEventListener('change', () => {
                    state.protectExtension = dom.chkProtectExt.checked;
                    updatePreview();
                });
                dom.chkIncludeDirs.addEventListener('change', () => {
                    state.includeDirectories = dom.chkIncludeDirs.checked;
                });
                dom.conflictStrategy.addEventListener('change', () => {
                    state.conflictStrategy = dom.conflictStrategy.value;
                });

                // Quick actions
                document.querySelectorAll('.quick-action').forEach(btn => {
                    btn.addEventListener('click', () => {
                        applyQuickAction(btn.dataset.action);
                    });
                });

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'z' && !e.shiftKey) {
                        e.preventDefault();
                        undoLastRename();
                    }
                    if (e.ctrlKey && e.key === 'a' && document.activeElement === document.body) {
                        e.preventDefault();
                        dom.selectAll.checked = !dom.selectAll.checked;
                        dom.selectAll.dispatchEvent(new Event('change'));
                    }
                    if (e.ctrlKey && e.key === 'o') {
                        e.preventDefault();
                        selectDirectory();
                    }
                });
            }

            // ==================== INIT ====================
            function init() {
                initTheme();
                renderRulePanel();
                updateRuleTabs();
                bindEvents();
                updatePreview();
                // Check for File System Access API
                if (!('showDirectoryPicker' in window)) {
                    console.warn('File System Access API 不可用。将使用预览模式，需通过生成脚本执行重命名。');
                }
            }

            init();
            console.log('🚀 文件批量重命名工具已就绪');
            console.log('💡 功能提示:');
            console.log('  - 选择目录模式可真正重命名文件（需浏览器支持）');
            console.log('  - 拖拽/选择文件为预览模式，可通过生成脚本执行');
            console.log('  - 点击预览表格中的新文件名可单独编辑');
            console.log('  - Ctrl+O 快速选择目录');
            console.log('  - Ctrl+Z 撤销重命名');
            console.log('  - 支持7种重命名规则 + 快捷操作');
        })();
    </script>
</body>
</html>
