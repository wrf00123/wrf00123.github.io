<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多页标识批量打印工具（A4）</title>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #eef2f7;
            padding: 30px 15px;
        }

        .main-wrap {
            max-width: 1280px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            font-size: 26px;
            color: #1f2937;
            margin-bottom: 24px;
            font-weight: 600;
        }

        /* 控制面板卡片美化 */
        .control-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 26px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-item label {
            font-size: 14px;
            color: #4b5563;
            font-weight: 500;
        }

        .form-item input,
        .form-item select,
        .form-item textarea {
            padding: 0 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.2s;
        }
        .form-item textarea {
            min-height: 80px;
            padding: 10px 12px;
            resize: vertical;
        }
        .batch-textarea {
            min-height: 120px;
        }
        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn-row {
            grid-column: 1 / -1;
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }

        button {
            height: 44px;
            padding: 0 24px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh {
            background-color: #3b82f6;
            color: #fff;
        }
        .btn-refresh:hover {
            background-color: #2563eb;
        }

        .btn-export {
            background-color: #0891b2;
            color: #fff;
        }
        .btn-export:hover {
            background-color: #0e7490;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* A4预览区域 */
        .preview-card {
            background: #fff;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }

        .preview-title {
            font-size: 16px;
            color: #374151;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .preview-wrapper {
            margin: 0 auto;
            background: #fff;
            position: relative;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .preview-wrapper.portrait {
            width: 210mm;
            height: 297mm;
        }

        .preview-wrapper.landscape {
            width: 297mm;
            height: 210mm;
        }

        /* A4页面容器 */
        .sign-container {
            width: 100%;
            height: 100%;
            padding: 12mm;
            display: grid;
        }
        /* 单标识布局 */
        .sign-container.one {
            grid-template-rows: 1fr;
        }
        /* 双标识布局 */
        .sign-container.two {
            grid-template-rows: 1fr 1fr;
        }

        /* 每一块独立分区，单独居中容器 */
        .sign-block {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 外层容器：外边框 + padding夹层间距 + 夹层背景色 */
        .sign-outer {
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 内层文字容器：内边框 + 标识底色 */
        .sign-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            white-space: pre-wrap;
        }

        /* 裁剪虚线，固定水平左右边距，垂直永久居中 */
        .cut-line {
            position: absolute;
            left: 12mm;
            right: 12mm;
            top: 50%;
            transform: translateY(-50%);
            border-top: 1.2px dashed #ff3333;
            z-index: 99;
        }
        .cut-line.hidden,
        .cut-line.hide-one {
            display: none;
        }

        @media print {
            .control-card {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-wrap">
        <h2 class="page-title">多页标识批量打印工具（A4）</h2>

        <!-- 控制面板 -->
        <div class="control-card">
            <div class="control-grid">
                <div class="form-item">
                    <label>批量标识文本</label>
                    <textarea id="batchText" class="batch-textarea" placeholder="同文字模式：每行=1张A4；不同文字模式：每两行=1张A4（上行上标识、下行下标识）"></textarea>
                </div>

                <div class="form-item">
                    <label>每页标识数量</label>
                    <select id="perPageCount">
                        <option value="1">1个标识/页</option>
                        <option value="2" selected>2个标识/页</option>
                    </select>
                </div>

                <div class="form-item" id="twoTextModeWrap">
                    <label>双标识文字模式（仅2个/页生效）</label>
                    <select id="twoTextMode">
                        <option value="same">两个标识相同文字</option>
                        <option value="diff">两个标识不同文字</option>
                    </select>
                </div>

                <div class="form-item">
                    <label>字体</label>
                    <select id="fontFamily">
                        <option value="仿宋">仿宋</option>
                        <option value="Source Han Sans CN" selected>思源黑体</option>
                        <option value="微软雅黑">微软雅黑</option>
                        <option value="宋体">宋体</option>
                    </select>
                </div>

                <div class="form-item">
                    <label>字体大小 (px，最大220)</label>
                    <input type="number" id="fontSize" value="100" min="12" max="220">
                </div>

                <div class="form-item">
                    <label>字体颜色</label>
                    <input type="color" id="fontColor" value="#000000">
                </div>

                <div class="form-item">
                    <label>标识背景颜色</label>
                    <input type="color" id="signBgColor" value="#ffffff">
                </div>

                <!-- 交换位置：夹层填充色 放到此处 -->
                <div class="form-item" id="doubleGapColorWrap">
                    <label>双边框夹层填充色</label>
                    <input type="color" id="doubleGapColor" value="#ffffff">
                </div>

                <!-- 交换位置：上下间距移到夹层色下方 -->
                <div class="form-item">
                    <label>两个标识上下间距(mm)</label>
                    <input type="number" id="gapMm" value="34" min="0" max="40">
                </div>

                <div class="form-item">
                    <label>纸张方向</label>
                    <select id="pageOrientation">
                        <option value="portrait">纵向 A4</option>
                        <option value="landscape">横向 A4</option>
                    </select>
                </div>

                <div class="form-item">
                    <label>边框样式</label>
                    <select id="borderType">
                        <option value="single">单边框</option>
                        <option value="double">双边框（带间距）</option>
                    </select>
                </div>

                <div class="form-item">
                    <label>边框粗细</label>
                    <select id="borderWeight">
                        <option value="1">细</option>
                        <option value="1.5" selected>常规</option>
                        <option value="2.5">粗</option>
                    </select>
                </div>

                <div class="form-item">
                    <label>中间裁剪虚线</label>
                    <select id="cutLineStatus">
                        <option value="show">显示虚线</option>
                        <option value="hide">隐藏虚线</option>
                    </select>
                </div>

                <div class="btn-row">
                    <button class="btn-refresh" onclick="updatePreview()">实时刷新预览</button>
                    <button class="btn-export" onclick="exportMultiPagePDF()">批量导出多页PDF</button>
                </div>
            </div>
        </div>

        <!-- 预览区域 -->
        <div class="preview-card">
            <div class="preview-title">A4纸张预览效果</div>
            <div id="previewWrapper" class="preview-wrapper portrait">
                <div id="cutLine" class="cut-line"></div>
                <div id="signContainer" class="sign-container two">
                    <!-- 上半块独立区域 -->
                    <div class="sign-block" id="block1">
                        <div class="sign-outer" id="outer1">
                            <div class="sign-inner" id="inner1"></div>
                        </div>
                    </div>
                    <!-- 下半块独立区域 -->
                    <div class="sign-block" id="block2">
                        <div class="sign-outer" id="outer2">
                            <div class="sign-inner" id="inner2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let textTop = "";
        let textBottom = "";
        let currentFont = "Source Han Sans CN";
        let currentSize = 100;
        let currentColor = "#000000";
        let signBgColor = "#ffffff";
        let gapBgColor = "#ffffff";
        let currentOrientation = "portrait";
        let cutLineVisible = true;
        let borderType = "single";
        let borderWidth = "1.5";
        let blockGapMm = 34;
        let perPage = 2;
        let twoTextMode = "same";
        const gap = "4px";

        // 切换边框隐藏/显示夹层颜色控件
        function toggleGapColorControl() {
            const wrap = document.getElementById("doubleGapColorWrap");
            const type = document.getElementById("borderType").value;
            wrap.style.display = type === "double" ? "flex" : "none";
        }

        // 切换单/双标识布局，隐藏/显示文字模式选择框
        function togglePageLayout() {
            perPage = Number(document.getElementById('perPageCount').value);
            const container = document.getElementById('signContainer');
            const cutLine = document.getElementById('cutLine');
            const block2 = document.getElementById('block2');
            const modeWrap = document.getElementById("twoTextModeWrap");
            if (perPage === 1) {
                container.className = "sign-container one";
                block2.style.display = "none";
                cutLine.classList.add("hide-one");
                modeWrap.style.display = "none";
            } else {
                container.className = "sign-container two";
                block2.style.display = "flex";
                cutLine.classList.remove("hide-one");
                modeWrap.style.display = "flex";
            }
        }

        // 解析批量文本，获取预览上下两块文字
        function parsePreviewText() {
            twoTextMode = document.getElementById("twoTextMode").value;
            const batchVal = document.getElementById('batchText').value;
            const lines = batchVal.split(/\r?\n/).filter(x => x.trim() !== "");
            textTop = "";
            textBottom = "";
            if (lines.length === 0) return;
            if (twoTextMode === "same") {
                textTop = lines[0];
                textBottom = lines[0];
            } else {
                textTop = lines[0];
                if (lines.length >= 2) textBottom = lines[1];
            }
        }

        // 刷新预览主逻辑
        function updatePreview() {
            parsePreviewText();
            currentFont = document.getElementById('fontFamily').value;
            currentSize = document.getElementById('fontSize').value;
            currentColor = document.getElementById('fontColor').value;
            signBgColor = document.getElementById('signBgColor').value;
            gapBgColor = document.getElementById('doubleGapColor').value;
            currentOrientation = document.getElementById('pageOrientation').value;
            cutLineVisible = document.getElementById('cutLineStatus').value === 'show';
            borderType = document.getElementById('borderType').value;
            borderWidth = document.getElementById('borderWeight').value;
            blockGapMm = Number(document.getElementById('gapMm').value);

            toggleGapColorControl();
            togglePageLayout();

            // 纸张方向
            const wrapper = document.getElementById('previewWrapper');
            wrapper.className = 'preview-wrapper ' + currentOrientation;

            // 设置两块标识中间间距
            const container = document.getElementById('signContainer');
            container.style.gap = blockGapMm + "mm";

            // 虚线显示隐藏
            const cutLine = document.getElementById('cutLine');
            if (cutLineVisible && perPage === 2) {
                cutLine.classList.remove("hidden");
            } else {
                cutLine.classList.add("hidden");
            }

            const bw = borderWidth + "px";
            // 渲染上标识
            const outer1 = document.getElementById('outer1');
            const inner1 = document.getElementById('inner1');
            outer1.style.cssText = "";
            inner1.style.cssText = "";
            inner1.innerText = textTop;
            inner1.style.fontFamily = currentFont;
            inner1.style.fontSize = currentSize + 'px';
            inner1.style.color = currentColor;
            inner1.style.whiteSpace = "pre-wrap";
            inner1.style.backgroundColor = signBgColor;
            if (borderType === "single") {
                inner1.style.border = bw + " solid #000";
            } else {
                outer1.style.border = bw + " solid #000";
                outer1.style.padding = gap;
                outer1.style.backgroundColor = gapBgColor;
                inner1.style.border = bw + " solid #000";
            }

            // 渲染下标识
            const outer2 = document.getElementById('outer2');
            const inner2 = document.getElementById('inner2');
            outer2.style.cssText = "";
            inner2.style.cssText = "";
            inner2.innerText = textBottom;
            inner2.style.fontFamily = currentFont;
            inner2.style.fontSize = currentSize + 'px';
            inner2.style.color = currentColor;
            inner2.style.whiteSpace = "pre-wrap";
            inner2.style.backgroundColor = signBgColor;
            if (borderType === "single") {
                inner2.style.border = bw + " solid #000";
            } else {
                outer2.style.border = bw + " solid #000";
                outer2.style.padding = gap;
                outer2.style.backgroundColor = gapBgColor;
                inner2.style.border = bw + " solid #000";
            }
        }

        // 生成单页画布（供批量导出调用）
        async function renderPageText(doc, topTxt, bottomTxt) {
            return new Promise(async resolve => {
                const batchDom = document.getElementById('batchText');
                const oldBatch = batchDom.value;
                // 临时填充对应上下文字
                if (twoTextMode === "same") {
                    batchDom.value = topTxt;
                } else {
                    batchDom.value = topTxt + "\n" + bottomTxt;
                }
                updatePreview();
                await new Promise(r => setTimeout(r, 200));
                const dom = document.getElementById('previewWrapper');
                const canvas = await html2canvas(dom, {
                    scale: 3,
                    useCORS: true,
                    logging: false,
                    scrollX: 0,
                    scrollY: 0,
                    letterRendering: true
                });
                const img = canvas.toDataURL('image/png', 1);
                const w = currentOrientation === 'portrait' ? 210 : 297;
                const h = currentOrientation === 'portrait' ? 297 : 210;
                doc.addImage(img, 'PNG', 0, 0, w, h);
                // 恢复原始批量文本
                batchDom.value = oldBatch;
                updatePreview();
                resolve();
            })
        }

        // 批量多页PDF导出
        async function exportMultiPagePDF() {
            const btn = event.target;
            const oldTxt = btn.innerText;
            btn.innerText = "正在批量生成PDF...";
            btn.disabled = true;
            try {
                twoTextMode = document.getElementById("twoTextMode").value;
                const batchRaw = document.getElementById('batchText').value;
                const lines = batchRaw.split(/\r?\n/).filter(t => t.trim() !== "");
                if (lines.length === 0) {
                    alert("请在【批量标识文本】输入内容！");
                    btn.innerText = oldTxt;
                    btn.disabled = false;
                    return;
                }
                const pageList = [];
                if (twoTextMode === "same") {
                    // 每行一页，上下文字相同
                    lines.forEach(line => pageList.push({top: line, bottom: line}));
                } else {
                    // 每两行一页，不足两行自动补空
                    for (let i = 0; i < lines.length; i += 2) {
                        const top = lines[i];
                        const bottom = lines[i+1] || "";
                        pageList.push({top, bottom});
                    }
                }
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: currentOrientation,
                    unit: 'mm',
                    format: 'a4'
                });
                // 循环渲染每一页
                for (let i = 0; i < pageList.length; i++) {
                    if (i > 0) pdf.addPage();
                    await renderPageText(pdf, pageList[i].top, pageList[i].bottom);
                }
                pdf.save(`批量标识_${pageList.length}页.pdf`);
                alert(`导出完成！共${pageList.length}张A4纸`);
            } catch (e) {
                console.error(e);
                alert("导出失败：" + e.message + "\n请使用Chrome/Edge浏览器");
            } finally {
                btn.innerText = oldTxt;
                btn.disabled = false;
            }
        }

        // 全局绑定事件
        document.getElementById("batchText").addEventListener("input", updatePreview);
        document.getElementById("borderType").addEventListener("change", toggleGapColorControl);
        document.getElementById("perPageCount").addEventListener("change", updatePreview);
        document.getElementById("twoTextMode").addEventListener("change", updatePreview);
        document.querySelectorAll("select, input[type='number'], input[type='color']").forEach(el => {
            el.addEventListener("change", updatePreview);
        })

        window.addEventListener('load', () => {
            toggleGapColorControl();
            togglePageLayout();
            updatePreview();
        });
    </script>
</body>
</html>
