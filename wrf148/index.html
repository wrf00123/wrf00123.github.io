<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网址库</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <!-- ========== 顶部导航（一级菜单） ========== -->
        <nav class="top-nav" id="topNav">
            <!-- Logo -->
            <div class="logo">
                <i class="fas fa-compass"></i>
                <span>网址库</span>
            </div>

            <!-- 搜索框（居中） -->
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索网址名称或用途..." />
            </div>

            <!-- 右侧按钮组：主题 + 征集 -->
            <div class="right-actions">
                <button class="icon-btn" id="themeToggle">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <a class="icon-btn" href="https://www.wjx.top/vm/wAGGMpW.aspx#" target="_blank" rel="noopener noreferrer" title="网址征集">
                    <i class="fas fa-plus-circle"></i>
                </a>
            </div>

            <!-- 一级菜单列表 -->
            <div class="nav-level1" id="navLevel1">
                <!-- 由 JS 动态生成 -->
            </div>
        </nav>

        <!-- ========== 二级菜单（卡片上方横排） ========== -->
        <div class="subnav-wrap" id="subnavWrap">
            <div class="subnav-inner" id="subnavInner">
                <!-- 由 JS 动态生成 -->
            </div>
        </div>

        <!-- ========== 网址卡片区域 ========== -->
        <main id="bookmarksContainer">
            <!-- 由 JS 动态生成 -->
        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
